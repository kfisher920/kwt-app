<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kyle's Wed Training">
<meta name="theme-color" content="#0a0a0f">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230a0a0f'/%3E%3Ctext y='72' x='50' text-anchor='middle' font-size='60'%3E%F0%9F%8F%8B%EF%B8%8F%3C/text%3E%3C/svg%3E">
<title>Kyle's Wed Training</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS ─────────────────────────────────────────── */
:root{
  --bg:#0D0D0D; --s1:#161618; --s2:#1C1C1E; --s3:#2C2C2E; --s4:#3A3A3C;
  --bd:rgba(255,255,255,0.07); --bd2:rgba(255,255,255,0.13);
  --acc:#5F65D9; --acc-d:rgba(95,101,217,0.18);
  --grn:#BDF24B; --grn-d:rgba(189,242,75,0.14);
  --red:#FF453A; --red-d:rgba(255,69,58,0.14);
  --amb:#FFD60A; --amb-d:rgba(255,214,10,0.13);
  --tx:#FFFFFF; --mu:rgba(255,255,255,0.45); --mu2:rgba(255,255,255,0.28); --mu3:rgba(255,255,255,0.10);
  --r-xs:8px; --r-sm:12px; --r-md:16px; --r-lg:20px; --r-xl:24px;
  --st:env(safe-area-inset-top,0px); --sb:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);}
body{font-family:-apple-system,'SF Pro Text',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;padding-bottom:calc(76px + var(--sb));}
button,input,select,textarea{font-family:inherit;}
button{cursor:pointer;border:none;background:none;}
input:focus,select:focus,textarea:focus{outline:none;}

/* ── TOPBAR ─────────────────────────────────────────────────── */
.tb{position:sticky;top:0;z-index:200;padding:calc(var(--st) + 12px) 18px 12px;background:rgba(13,13,13,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:0.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}
.tb-title{font-size:17px;font-weight:700;letter-spacing:-0.4px;cursor:pointer;display:flex;align-items:center;gap:8px;}
.tb-sub{font-size:11px;color:var(--acc);font-weight:500;letter-spacing:0.05em;text-transform:uppercase;margin-top:2px;}
.tb-r{text-align:right;font-size:11px;color:var(--mu);line-height:1.6;}

/* ── BOTTOM NAV ─────────────────────────────────────────────── */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(22,22,24,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:0.5px solid var(--bd);display:flex;padding-bottom:var(--sb);}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;gap:3px;color:var(--mu2);font-size:10px;font-weight:500;transition:color 0.15s;}
.bn.active{color:var(--grn);}
.bn-ic{font-size:20px;line-height:1;}

/* ── PAGES ──────────────────────────────────────────────────── */
.page{display:none;padding:0 0 8px;}
.page.active{display:block;animation:fadeUp 0.18s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.pi{padding:0 16px;}

/* ── MODALS ─────────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-sheet{background:var(--s1);border-radius:var(--r-xl) var(--r-xl) 0 0;width:100%;max-height:90dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 18px calc(28px + var(--sb));}
.modal-handle{width:36px;height:4px;background:var(--s4);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:20px;font-weight:700;letter-spacing:-0.4px;margin-bottom:16px;}
.modal-close-btn{width:32px;height:32px;border-radius:50%;background:var(--s3);color:var(--mu);font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ── WORKOUT TIMER BANNER ───────────────────────────────────── */
.wtb{display:none;position:sticky;top:calc(var(--st) + 56px);z-index:150;background:rgba(95,101,217,0.10);border-bottom:0.5px solid rgba(95,101,217,0.22);padding:10px 18px;flex-direction:row;align-items:center;justify-content:space-between;}
.wtb.active{display:flex;}
.wtb-dot{width:8px;height:8px;border-radius:50%;background:var(--grn);box-shadow:0 0 8px rgba(189,242,75,0.7);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;};}
.wtb-time{font-size:24px;font-weight:800;letter-spacing:-1px;}
.wtb-lbl{font-size:11px;color:var(--mu);margin-top:1px;}

/* ── GREETING HEADER ────────────────────────────────────────── */
.greet-card{margin:16px 16px 0;border-radius:var(--r-lg);padding:18px 20px;background:linear-gradient(135deg,#1a1b3e 0%,#252660 100%);border:0.5px solid rgba(95,101,217,0.3);position:relative;overflow:hidden;}
.greet-card::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(95,101,217,0.15);}
.greet-card::before{content:'';position:absolute;bottom:-20px;right:20px;width:80px;height:80px;border-radius:50%;background:rgba(189,242,75,0.07);}
.greet-hi{font-size:12px;color:var(--mu);font-weight:500;margin-bottom:3px;}
.greet-name{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.greet-sub{font-size:12px;color:rgba(189,242,75,0.85);margin-top:6px;font-weight:500;}
.greet-meta{display:flex;gap:10px;margin-top:12px;}
.greet-pill{background:rgba(255,255,255,0.08);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:500;color:rgba(255,255,255,0.7);display:flex;align-items:center;gap:5px;}
.greet-pill-accent{background:rgba(189,242,75,0.12);color:var(--grn);}

/* ── START/STOP BUTTON ──────────────────────────────────────── */
.btn-sw{width:100%;border-radius:var(--r-md);padding:15px;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:8px;letter-spacing:0.01em;text-transform:uppercase;}
.btn-sw.idle{background:var(--grn);color:#0D0D0D;}
.btn-sw.active{background:var(--s2);border:1px solid var(--red-d);color:var(--red);}
.btn-sw:active{opacity:0.82;}

/* ── SECTION HEADER ─────────────────────────────────────────── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin:20px 16px 10px;}
.sec-title{font-size:16px;font-weight:700;letter-spacing:-0.2px;}
.sec-see-all{font-size:12px;font-weight:600;color:var(--grn);}

/* ── WEEK DAY STRIP (replaces carousel) ────────────────────── */
.week-strip{padding:0 16px 16px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.week-strip::-webkit-scrollbar{display:none;}
.wd{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;width:46px;}
.wd-label{font-size:10px;font-weight:600;color:var(--mu2);text-transform:uppercase;letter-spacing:0.06em;}
.wd-dot{width:6px;height:6px;border-radius:50%;background:var(--s3);}
.wd-dot.gym{background:var(--acc);}
.wd-dot.home{background:var(--grn);}
.wd-dot.rest{background:var(--s4);}
.wd-dot.free{background:var(--amb);}
.wd-circle{width:40px;height:40px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--mu);border:1.5px solid transparent;transition:all 0.15s;}
.wd-circle.today{border-color:var(--acc);color:var(--tx);}
.wd-circle.sel{background:var(--grn);color:#0D0D0D;border-color:var(--grn);}
.wd-type{font-size:9px;color:var(--mu2);font-weight:500;text-align:center;line-height:1.2;max-width:44px;}

/* ── HERO SESSION CARD ──────────────────────────────────────── */
.hero-card{margin:0 16px 4px;border-radius:var(--r-lg);overflow:hidden;position:relative;min-height:140px;background:var(--s2);}
.hero-img{width:100%;height:160px;object-fit:cover;display:block;filter:brightness(0.55);}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(13,13,13,0.92) 0%,rgba(13,13,13,0.3) 60%,transparent 100%);}
.hero-body{position:absolute;bottom:0;left:0;right:0;padding:16px;}
.hero-type-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;padding:4px 10px;border-radius:20px;margin-bottom:8px;}
.hero-title{font-size:20px;font-weight:800;letter-spacing:-0.4px;line-height:1.2;}
.hero-meta{display:flex;gap:10px;margin-top:8px;}
.hero-meta-item{display:flex;align-items:center;gap:4px;font-size:11px;color:rgba(255,255,255,0.7);font-weight:500;}

/* ── FILTER PILLS ───────────────────────────────────────────── */
.filter-wrap{padding:0 16px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;margin-bottom:2px;}
.filter-wrap::-webkit-scrollbar{display:none;}
.filter-pill{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;border:0.5px solid var(--bd2);color:var(--mu);transition:all 0.15s;white-space:nowrap;}
.filter-pill.active{background:var(--grn);color:#0D0D0D;border-color:var(--grn);}

/* ── EXERCISE CARDS ─────────────────────────────────────────── */
.ex-list{padding:0 16px;}
.ex-card{background:var(--s1);border:0.5px solid var(--bd);border-radius:var(--r-md);margin-bottom:8px;overflow:hidden;transition:border-color 0.15s;}
.ex-card.logged{border-color:rgba(189,242,75,0.3);}
.ex-card.bonus{border-color:var(--amb-d);}

/* Main row — always visible */
.ex-row{display:flex;align-items:stretch;cursor:pointer;min-height:72px;}
.ex-accent{width:3px;flex-shrink:0;border-radius:0;}
/* Image: white bg, rounded, scale to fit */
.ex-img-box{width:72px;flex-shrink:0;background:#fff;display:flex;align-items:center;justify-content:center;padding:4px;}
.ex-img-box img{width:100%;height:100%;object-fit:contain;display:block;}
.ex-img-fallback{width:72px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--s3);}
.ex-content{flex:1;padding:10px 10px 10px 12px;display:flex;flex-direction:column;justify-content:center;min-width:0;}
.ex-name{font-size:13px;font-weight:600;letter-spacing:-0.1px;line-height:1.3;}
.ex-card.logged .ex-name{color:var(--mu);text-decoration:line-through;text-decoration-color:var(--mu3);}
.ex-badges{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;align-items:center;}
.ex-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:0.04em;}
.eb-muscle{background:var(--acc-d);color:var(--acc);}
.eb-done{background:var(--grn-d);color:var(--grn);}
.eb-sec{background:var(--mu3);color:var(--mu);}
.eb-bonus{background:var(--amb-d);color:var(--amb);}
.eb-time{background:var(--s3);color:var(--mu2);}
.ex-expand-btn{width:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.ex-expand-circle{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--mu);transition:all 0.2s;}
.ex-expand-circle.open{background:var(--acc);border-color:var(--acc);color:#fff;transform:rotate(90deg);}

/* Expandable body */
.ex-body{display:none;border-top:0.5px solid var(--bd);}
.ex-body.open{display:block;}
/* GIF — white rounded container */
.ex-gif-box{margin:12px 12px 6px;border-radius:var(--r-sm);overflow:hidden;background:#fff;position:relative;}
.ex-gif-box img{width:100%;max-height:220px;object-fit:contain;display:block;}
.ex-gif-chips{position:absolute;bottom:8px;left:8px;right:8px;display:flex;gap:4px;flex-wrap:wrap;}
.muscle-chip{font-size:9px;padding:3px 8px;border-radius:20px;font-weight:700;backdrop-filter:blur(4px);}
.mc-p{background:rgba(95,101,217,0.88);color:#fff;}
.mc-s{background:rgba(0,0,0,0.6);color:rgba(255,255,255,0.85);}
.ex-note{font-size:12px;color:rgba(139,143,244,0.9);font-style:italic;line-height:1.5;padding:4px 12px 8px;}

/* ── SET LOGGER ─────────────────────────────────────────────── */
.set-logger{padding:10px 12px 14px;}
.set-logger-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--mu2);margin-bottom:9px;}
.set-hdr{display:grid;grid-template-columns:22px 1fr 1fr 34px 26px;gap:5px;align-items:center;padding:0 2px 7px;border-bottom:0.5px solid var(--bd);font-size:10px;color:var(--mu2);text-align:center;text-transform:uppercase;letter-spacing:0.07em;}
.set-row{display:grid;grid-template-columns:22px 1fr 1fr 34px 26px;gap:5px;align-items:center;padding:6px 2px;border-bottom:0.5px solid var(--mu3);}
.set-row:last-child{border-bottom:none;}
.set-num{font-size:12px;font-weight:600;color:var(--mu2);text-align:center;}
.set-inp{background:var(--s2);border:0.5px solid var(--bd2);border-radius:var(--r-xs);padding:7px 4px;color:var(--tx);font-size:13px;font-weight:600;text-align:center;width:100%;-webkit-appearance:none;}
.set-inp:focus{border-color:var(--acc);background:var(--s3);}
.set-done-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--mu);background:var(--s2);transition:all 0.15s;}
.set-done-btn.done{background:var(--grn);border-color:var(--grn);color:#0D0D0D;}
.set-del-btn{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--red);opacity:0.55;background:var(--red-d);}
.add-set-btn{width:100%;margin-top:10px;padding:10px;background:var(--s2);border:0.5px dashed var(--bd2);border-radius:var(--r-sm);color:var(--mu);font-size:12px;display:flex;align-items:center;justify-content:center;gap:6px;font-weight:600;}

/* ── REST TIMER ─────────────────────────────────────────────── */
.rest-timer{background:var(--acc-d);border:0.5px solid rgba(95,101,217,0.25);border-radius:var(--r-sm);padding:10px 14px;margin:4px 12px 10px;display:none;align-items:center;justify-content:space-between;}
.rest-timer.show{display:flex;}
.rt-time{font-size:20px;font-weight:800;letter-spacing:-0.5px;color:var(--acc);}
.rt-skip{font-size:12px;color:var(--mu);padding:5px 12px;background:var(--s2);border-radius:var(--r-xs);font-weight:600;}

/* ── MINI SESSIONS ──────────────────────────────────────────── */
.mini-gif-box{margin:10px 12px 4px;border-radius:var(--r-sm);overflow:hidden;background:#fff;position:relative;}
.mini-gif-box img{width:100%;max-height:180px;object-fit:contain;display:block;}

/* ── SHARED ─────────────────────────────────────────────────── */
.motiv{background:rgba(95,101,217,0.10);border:0.5px solid rgba(95,101,217,0.22);border-radius:var(--r-md);padding:12px 14px;margin:0 16px 14px;font-size:13px;color:rgba(189,196,255,0.85);line-height:1.65;font-style:italic;}
.ring-wrap{display:flex;justify-content:center;margin:4px 0 14px;}
.ring-inner{position:relative;width:84px;height:84px;}
.ring-lbl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.ring-num{font-size:20px;font-weight:800;letter-spacing:-0.5px;line-height:1;}
.ring-sub{font-size:10px;color:var(--mu2);margin-top:1px;}
.free-card{background:var(--amb-d);border:0.5px solid rgba(255,214,10,0.2);border-radius:var(--r-md);padding:16px;margin:0 16px 10px;}
.free-title{font-size:15px;font-weight:700;color:var(--amb);margin-bottom:8px;}
.free-body{font-size:13px;color:rgba(255,214,10,0.65);line-height:1.7;}
.rest-day-wrap{text-align:center;padding:32px 16px;}

/* ── CARDS / BOXES ──────────────────────────────────────────── */
.card{background:var(--s1);border:0.5px solid var(--bd);border-radius:var(--r-md);padding:14px 16px;margin-bottom:10px;}
.sbox{background:var(--s2);border-radius:var(--r-sm);padding:14px;}
.sbox.click{cursor:pointer;transition:background 0.12s;}
.sbox.click:active{background:var(--s3);}
.sbox-lbl{font-size:10px;color:var(--mu2);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;font-weight:600;}
.sbox-val{font-size:22px;font-weight:800;letter-spacing:-0.5px;line-height:1.2;}
.sbox-sub{font-size:11px;color:var(--mu2);margin-top:3px;}
.sgrid{display:grid;gap:8px;margin-bottom:12px;}
.sg2{grid-template-columns:1fr 1fr;}
.sg3{grid-template-columns:1fr 1fr 1fr;}
.sg4{grid-template-columns:repeat(4,1fr);}
.chart-wrap{position:relative;width:100%;height:180px;margin:8px 0;}
.log-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--bd);font-size:13px;gap:6px;}
.log-row:last-child{border-bottom:none;}
.wo-row{padding:11px 0;border-bottom:0.5px solid var(--bd);display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.wo-row:last-child{border-bottom:none;}
.prog-bar{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;margin:6px 0;}
.prog-fill{height:100%;border-radius:3px;transition:width 0.5s ease;}
.tab-pills{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.tpill{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;border:0.5px solid var(--bd2);color:var(--mu);transition:all 0.15s;}
.tpill.active{background:var(--grn);color:#0D0D0D;border-color:var(--grn);}
.phase-tabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;margin-bottom:12px;}
.phase-tabs::-webkit-scrollbar{display:none;}
.ptab{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;border:0.5px solid var(--bd2);color:var(--mu);transition:all 0.15s;}
.ptab.active{color:#0D0D0D;font-weight:700;}
.day-tabs{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;}
.dtab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:0.5px solid var(--bd);color:var(--mu);transition:all 0.15s;}
.dtab.active{background:var(--s2);color:var(--tx);border-color:var(--bd2);}
.bsel-wrap{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:3px;margin-bottom:12px;}
.bsel-wrap::-webkit-scrollbar{display:none;}
.bsel{flex-shrink:0;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;border:0.5px solid var(--bd);color:var(--mu);transition:all 0.15s;}
.bsel.active{color:#0D0D0D;font-weight:700;}
.phase-strip{border-radius:var(--r-md);padding:14px 16px;margin-bottom:12px;border:0.5px solid rgba(255,255,255,0.06);}
.plan-ex-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--bd);}
.plan-ex-row:last-child{border-bottom:none;}
.plan-ex-thumb{width:52px;height:52px;border-radius:var(--r-xs);overflow:hidden;flex-shrink:0;background:#fff;display:flex;align-items:center;justify-content:center;}
.plan-ex-thumb img{width:100%;height:100%;object-fit:contain;display:block;}

/* ── NUTRITION ──────────────────────────────────────────────── */
.food-cat-lbl{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:0.08em;padding:10px 0 6px;}
.food-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--bd);}
.food-item:last-child{border-bottom:none;}
.food-add-btn{width:32px;height:32px;border-radius:50%;background:var(--grn-d);border:0.5px solid rgba(189,242,75,0.3);color:var(--grn);font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;font-weight:300;}
.food-add-btn:active{background:var(--grn);color:#0D0D0D;}
.lf-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--bd);gap:8px;font-size:13px;}
.lf-row:last-child{border-bottom:none;}
.inp{width:100%;background:var(--s2);border:0.5px solid var(--bd2);border-radius:var(--r-sm);padding:13px 14px;color:var(--tx);font-size:15px;}
.inp:focus{border-color:var(--acc);}
.btn-p{background:var(--grn);color:#0D0D0D;border-radius:var(--r-sm);padding:14px 20px;font-size:14px;font-weight:700;}
.btn-p:active{opacity:0.8;}
.btn-s{background:var(--s2);color:var(--tx);border:0.5px solid var(--bd2);border-radius:var(--r-sm);padding:13px 16px;font-size:13px;font-weight:600;}
.wed-banner{background:var(--grn-d);border:0.5px solid rgba(189,242,75,0.2);border-radius:var(--r-md);padding:14px 16px;margin-bottom:12px;cursor:pointer;}
.wed-text{font-size:13px;color:rgba(189,242,75,0.85);line-height:1.6;}
.nrule{display:flex;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--bd);font-size:13px;}
.nrule:last-child{border-bottom:none;}
.nrule-n{font-size:15px;font-weight:800;color:var(--acc);width:20px;flex-shrink:0;}
.nrule-t{color:var(--mu);line-height:1.5;}
.swap-row{padding:9px 0;border-bottom:0.5px solid var(--bd);font-size:13px;}
.swap-row:last-child{border-bottom:none;}

/* ── CALENDAR ───────────────────────────────────────────────── */
.cal-month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-month-title{font-size:17px;font-weight:700;letter-spacing:-0.3px;}
.cal-nav-btn{width:34px;height:34px;border-radius:50%;background:var(--s2);color:var(--tx);font-size:17px;display:flex;align-items:center;justify-content:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dow{font-size:10px;color:var(--mu2);text-align:center;padding:4px 0;font-weight:700;}
.cal-day{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:600;position:relative;padding:1px;}
.cal-day.future{color:var(--mu2);opacity:0.4;}
.cal-day.worked{background:rgba(189,242,75,0.14);color:var(--grn);}
.cal-day.missed{background:rgba(255,69,58,0.10);color:var(--red);}
.cal-day.today-mk{outline:1.5px solid var(--acc);outline-offset:-1px;}
.cal-day .cal-icon{position:absolute;top:1px;right:1px;font-size:8px;}
.cal-legend{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;justify-content:center;}
.cal-legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--mu);}
.wed-expand{display:none;padding-top:12px;border-top:0.5px solid var(--bd);margin-top:10px;}
.wed-expand.show{display:block;}
@keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.25);}100%{transform:scale(1);}}
.pop{animation:pop 0.2s ease;}
</style>
</head>

function getEx(name){
  if(EX_DB[name])return EX_DB[name];
  const nl=name.toLowerCase();
  for(const[k,v]of Object.entries(EX_DB)){
    if(k.toLowerCase().split(' ').filter(w=>w.length>3).some(w=>nl.includes(w)))return v;
  }
  return null;

async function sbF(path,method='GET',body=null){
  // Build Prefer header correctly:
  // - upsert (POST with on_conflict) needs resolution=merge-duplicates
  // - plain POST needs return=representation
  // - GET/DELETE need nothing
  const isUpsert = method==='POST' && path.includes('on_conflict');
  const prefer = isUpsert
    ? 'resolution=merge-duplicates,return=representation'
    : method==='POST' ? 'return=representation' : '';
  const h={
    'apikey':SB_KEY,
    'Authorization':'Bearer '+SB_KEY,
    'Content-Type':'application/json',
  };
  if(prefer) h['Prefer']=prefer;
  const r=await fetch(SB_URL+'/rest/v1/'+path,{method,headers:h,body:body?JSON.stringify(body):null});
  if(!r.ok){
    const errText=await r.text();
    console.error('Supabase error',method,path,r.status,errText);
    throw new Error(errText);
  }
  return method==='DELETE'?null:r.json();
}
function queue(op,data){pendingQ.push({op,data});savePQ();}
async function flushQ(){
  if(!pendingQ.length)return;
  const q=[...pendingQ];pendingQ=[];savePQ();
  for(const item of q){
    try{
      if(item.op==='wo') await sbF('workouts','POST',item.data);
      else if(item.op==='wt') await sbF('weight_log?on_conflict=date','POST',item.data);
      else if(item.op==='sd') await sbF('set_data?on_conflict=key','POST',item.data);
      else if(item.op==='fl') await sbF('food_log','POST',item.data);
      else if(item.op==='dfl') await sbF(`food_log?id=eq.${item.data}`,'DELETE');
      else if(item.op==='ml') await sbF('mini_log?on_conflict=key','POST',item.data);
      else if(item.op==='dwo') await sbF(`workouts?date=eq.${item.data}`,'DELETE');
      else if(item.op==='dwt') await sbF(`weight_log?date=eq.${item.data}`,'DELETE');
    }catch(e){console.warn('Queue flush failed',item.op,e.message);pendingQ.push(item);}
  }
  savePQ();
}

async function loadCloud(){
  if(!syncOnline)return false;
  try{
    const[ws,wts,sds,mls,fls]=await Promise.all([
      sbF('workouts?order=date.desc&limit=200'),
      sbF('weight_log?order=date.asc'),
      sbF('set_data?limit=5000'),
      sbF('mini_log?limit=2000'),
      sbF('food_log?order=date.desc&limit=1000')
    ]);
    if(ws){
      workoutLog=ws.map(r=>({
        date:r.date,dayLabel:r.day_label,startTs:r.start_ts,
        endTs:r.end_ts,durationSec:r.duration_sec,
        exercises:r.exercises||[],isPast:r.is_past||false,
        _dbid:r.id  // keep db id for deletions
      }));
      ls('wlog9',workoutLog);
    }
    if(wts){
      weightLog=wts.map(r=>({date:r.date,w:parseFloat(r.weight)}));
      ls('wt9',weightLog);
    }
    if(sds){
      setData={};
      sds.forEach(r=>{setData[r.key]=r.data;});
      ls('sd9',setData);
    }
    if(mls){
      miniLog={};
      mls.forEach(r=>{
        // Support both JSON string and plain array storage
        miniLog[r.key]={
          done:r.done||false,
          sets:safeJ(r.sets)||[],
        };
      });
      ls('ml9',miniLog);
    }
    if(fls){
      // Rebuild foodLog keyed by date
      foodLog={};
      fls.forEach(r=>{
        if(!foodLog[r.date])foodLog[r.date]=[];
        foodLog[r.date].push({
          name:r.name,serving:r.serving||'',
          cal:r.cal||0,pro:r.pro||0,carb:r.carb||0,fat:r.fat||0,
          _id:r.id
        });
      });
      ls('fl9',foodLog);
    }
    return true;
  }catch(e){console.warn('Cloud load failed:',e.message);return false;}
}

function fmtDur(s){const m=Math.floor(s/60),ss=s%60;return`${m}:${String(ss).padStart(2,'0')}`;}

// ── WORKOUT TIMER ────────────────────────────────────────────────────────
function toggleWorkout(){workoutActive?endWorkout():startWorkout();}
function startWorkout(){
  workoutActive=true;workoutStart=Date.now();
  const d=carDay!==null?carDay:dow();const s=SCH[d];
  currentWorkout={date:todayKey(),dayLabel:s.label,startTs:workoutStart,exercises:[]};
  document.getElementById('wtb').classList.add('active');
  workoutInterval=setInterval(()=>{document.getElementById('wtbTime').textContent=fmtDur(Math.floor((Date.now()-workoutStart)/1000));},1000);
  const btn=document.getElementById('btnSW');
  if(btn){btn.className='btn-sw active';btn.innerHTML='<span>⏹</span> Stop & Finish Workout';}
}
function endWorkout(){
  if(!workoutActive)return;
  clearInterval(workoutInterval);
  const dur=Math.floor((Date.now()-workoutStart)/1000);
  if(currentWorkout){
    currentWorkout.endTs=Date.now();currentWorkout.durationSec=dur;currentWorkout._cid=workoutStart.toString(36);
    const d=carDay!==null?carDay:dow();const s=SCH[d];const tk=todayKey();
    currentWorkout.exercises=s.exercises.map((ex,i)=>{
      const sets=[];
      for(let j=0;j<parseInt(ex.sets)+10;j++){const k=`${tk}-${i}-${j}`;if(setData[k]&&setData[k].done)sets.push({reps:setData[k].reps||0,weight:setData[k].weight||0});}
      return{name:ex.name,sets};
    }).filter(e=>e.sets.length>0);
    workoutLog.unshift(currentWorkout);
    if(workoutLog.length>200)workoutLog=workoutLog.slice(0,200);
    ls('wlog9',workoutLog);sbSaveWo(currentWorkout);
  }
  workoutActive=false;workoutStart=null;currentWorkout=null;
  document.getElementById('wtb').classList.remove('active');
  document.getElementById('wtbTime').textContent='0:00';
  const btn=document.getElementById('btnSW');
  if(btn){btn.className='btn-sw idle';btn.innerHTML='<span>▶</span> Start Workout';}
  alert('Workout saved! Duration: '+fmtDurL(dur)+'. Great work!');
  renderDayDetail(carDay!==null?carDay:dow());
}
function openPastWo(){
  document.getElementById('pastWoDate').value=todayKey();
  openModal('pastWoModal');
}
function savePastWorkout(){
  const date=document.getElementById('pastWoDate').value;
  const label=document.getElementById('pastWoLabel').value;
  const dur=parseInt(document.getElementById('pastWoDur').value)||60;
  if(!date)return alert('Please select a date.');
  const wo={date,dayLabel:label,startTs:0,endTs:0,durationSec:dur*60,exercises:[],isPast:true,_cid:Date.now().toString(36)};
  workoutLog.unshift(wo);workoutLog.sort((a,b)=>b.date.localeCompare(a.date));
  ls('wlog9',workoutLog);sbSaveWo(wo);
  closeModal('pastWoModal');
  alert('Past session logged!');
  if(document.getElementById('page-history').classList.contains('active'))renderHistory();
}

function deleteWorkout(idx){
  if(!confirm('Delete this workout?'))return;
  const wo=workoutLog[idx];
  workoutLog.splice(idx,1);ls('wlog9',workoutLog);
  // Use DB id if available (more precise than date-based delete)
  if(wo&&wo._dbid) sbF(`workouts?id=eq.${wo._dbid}`,'DELETE').catch(e=>console.warn('delete wo failed',e));
  else if(wo&&wo.date) sbDelWo(wo.date);
  renderHistory();
}
function deleteWeightEntry(date){
  const idx=weightLog.findIndex(x=>x.date===date);
  if(idx<0)return;
  weightLog.splice(idx,1);ls('wt9',weightLog);
  sbDelWt(date);renderHistory();
}

// ── MINI SET LOGGER (FIX 1+2) ────────────────────────────────────────────
function buildMiniLogger(d,mi,mk,msd){
  const sets=msd.sets||[];
  const tot=Math.max(1,sets.length+(sets.length>0&&sets[sets.length-1]?.done?1:0));
  let h=`<div class="set-logger-lbl" style="color:var(--amb)">Log bonus sets</div>
  <div class="set-hdr"><div>Set</div><div>Reps</div><div>Lbs</div><div>✓</div><div>✕</div></div>`;
  for(let j=0;j<tot;j++){

      <div class="set-num">${j+1}</div>
      <input class="set-inp" type="number" id="mr-${d}-${mi}-${j}" placeholder="reps" value="${sd.reps||''}" min="0" max="999" onchange="saveMiniSet('${mk}',${d},${mi},${j})">

      <button class="set-done-btn${sd.done?' done':''}" id="mdb-${d}-${mi}-${j}" onclick="markMiniDone('${mk}',${d},${mi},${j})">${sd.done?'✓':'○'}</button>
      <button class="set-del-btn" onclick="delMiniSet('${mk}',${d},${mi},${j})">✕</button>
    </div>`;
  }

  return h;
}
// SET OPERATIONS
function saveSD(tk,d,ei,j){
  const k=`${tk}-${ei}-${j}`;if(!setData[k])setData[k]={};
  const r=document.getElementById(`rr-${d}-${ei}-${j}`);const w=document.getElementById(`rw-${d}-${ei}-${j}`);
  setData[k].reps=r?r.value:'';setData[k].weight=w?w.value:'';
  ls('sd9',setData);sbSaveSD(k,setData[k]);
}
let restTimers={};
function markDone(tk,d,ei,j,rest){
  saveSD(tk,d,ei,j);
  const k=`${tk}-${ei}-${j}`;if(!setData[k])setData[k]={};
  setData[k].done=!setData[k].done;ls('sd9',setData);sbSaveSD(k,setData[k]);
  const btn=document.getElementById(`sdb-${d}-${ei}-${j}`);
  if(btn){btn.className='set-done-btn'+(setData[k].done?' done':'');btn.textContent=setData[k].done?'✓':'○';btn.classList.add('pop');setTimeout(()=>btn.classList.remove('pop'),250);}
  const s=SCH[d];const ex=s.exercises[ei];const p=parseInt(ex?.sets)||3;
  let lc=0;for(let jj=0;jj<p+10;jj++){if(setData[`${tk}-${ei}-${jj}`]&&setData[`${tk}-${ei}-${jj}`].done)lc++;}
  const card=document.getElementById(`exc-${d}-${ei}`);
  if(card){card.classList.toggle('logged',lc>0);const lb=card.querySelector('.ex-logged-badge');if(lb)lb.textContent=lc>0?`✓ ${lc} set${lc>1?'s':''} logged`:'';else if(lc>0){const me=card.querySelector('.ex-meta');if(me){const b=document.createElement('div');b.className='ex-logged-badge';b.textContent=`✓ ${lc} set${lc>1?'s':''} logged`;me.after(b);}}}
  if(setData[k].done&&rest>0)startRest(d,ei,rest);else stopRest(d,ei);
  updateRing(d,tk);
}
function deleteSetRow(tk,d,ei,j){
  const k=`${tk}-${ei}-${j}`;delete setData[k];ls('sd9',setData);sbDelSD(k);
  const s=SCH[d];const ex=s.exercises[ei];
  const sl=document.getElementById(`sl-${d}-${ei}`);if(sl&&ex)sl.innerHTML=buildSetLogger(d,ei,ex,tk);
  updateRing(d,tk);
}
function addSet(tk,d,ei){
  const s=SCH[d];const ex=s.exercises[ei];const p=parseInt(ex?.sets)||3;
  let n=p;while(setData[`${tk}-${ei}-${n}`])n++;
  setData[`${tk}-${ei}-${n}`]={reps:'',weight:'',done:false};ls('sd9',setData);sbSaveSD(`${tk}-${ei}-${n}`,setData[`${tk}-${ei}-${n}`]);
  const sl=document.getElementById(`sl-${d}-${ei}`);if(sl&&ex)sl.innerHTML=buildSetLogger(d,ei,ex,tk);
}
function startRest(d,ei,sec){
  stopRest(d,ei);
  const rt=document.getElementById(`rt-${d}-${ei}`);const rtd=document.getElementById(`rtd-${d}-${ei}`);
  if(!rt)return;rt.classList.add('show');let rem=sec;
  if(rtd)rtd.textContent=fmtDur(rem);
  restTimers[`${d}-${ei}`]=setInterval(()=>{rem--;if(rtd)rtd.textContent=fmtDur(rem);if(rem<=0){stopRest(d,ei);if(rtd)rtd.textContent='Rest done!';}},1000);
}
function stopRest(d,ei){const id=restTimers[`${d}-${ei}`];if(id){clearInterval(id);delete restTimers[`${d}-${ei}`];}const rt=document.getElementById(`rt-${d}-${ei}`);if(rt)rt.classList.remove('show');}
function skipRest(d,ei){stopRest(d,ei);}
function updateRing(d,tk){
  const s=SCH[d];const total=s.exercises.length;
  const done=s.exercises.map((_,i)=>{const p=parseInt(_.sets)||3;for(let j=0;j<p+10;j++){if(setData[`${tk}-${i}-${j}`]&&setData[`${tk}-${i}-${j}`].done)return true;}return false;}).filter(Boolean).length;
  const arc=document.getElementById('ringArc');const rn=document.getElementById('ringNum');
  if(arc){arc.style.strokeDashoffset=total>0?214*(1-done/total):214;arc.style.stroke=done===total&&total>0?'#BDF24B':'#5F65D9';}
  if(rn)rn.textContent=done;
}
// MINI SET OPERATIONS
function saveMiniSet(mk,d,mi,j){
  if(!miniLog[mk])miniLog[mk]={sets:[]};

  miniLog[mk].sets[j].reps=r?r.value:'';miniLog[mk].sets[j].weight=w?w.value:'';
  ls('ml9',miniLog);sbSaveMini(mk,miniLog[mk]);
}
function markMiniDone(mk,d,mi,j){

function delMiniSet(mk,d,mi,j){
  if(!miniLog[mk]||!miniLog[mk].sets)return;

function addMiniSet(mk,d,mi){

// FIX 5+7: Food modal — index-based, closeable
function openFoodModal(){
  document.getElementById('foodSearch').value='';
  renderFoodList('');
  openModal('foodModal');
  // Store which date this food is being added to
  window._foodLogDate = nutritionDate||todayKey();
}
function renderFoodList(q){
  const ql=q.toLowerCase();let h='',lastCat='';
  FOOD_FLAT.forEach((f,i)=>{
    if(ql&&!f.name.toLowerCase().includes(ql))return;
    if(!ql&&f.cat!==lastCat){h+=`<div class="food-cat-lbl">${f.cat}</div>`;lastCat=f.cat;}
    h+=`<div class="food-item">
      <div style="flex:1"><div style="font-size:13px;font-weight:500">${f.name}</div><div style="font-size:11px;color:var(--mu)">${f.serving}</div></div>
      <div style="text-align:right;flex-shrink:0;margin-right:8px"><div style="font-size:13px;font-weight:500">${f.cal} kcal</div><div style="font-size:10px;color:var(--acc)">${f.pro}g protein</div></div>
      <button class="food-add-btn" onclick="addFoodByIdx(${i})">+</button>
    </div>`;
  });
  if(!h)h='<div style="font-size:13px;color:var(--mu);padding:12px 0">No matches found.</div>';
  const el=document.getElementById('foodList');if(el)el.innerHTML=h;
}
function filterFoods(){renderFoodList(document.getElementById('foodSearch')?.value||'');}
async function addFoodByIdx(i){await addFood(FOOD_FLAT[i]);}
async function addFood(f){
  const tk=window._foodLogDate||nutritionDate||todayKey();
  if(!foodLog[tk])foodLog[tk]=[];
  const entry={...f,_tid:Date.now()};
  foodLog[tk].push(entry);ls('fl9',foodLog);
  closeModal('foodModal');renderNutrition();
  const saved=await sbSaveFood(tk,f);
  if(saved&&saved.id){entry._id=saved.id;ls('fl9',foodLog);}
}
async function addCustomFood(){
  const name=document.getElementById('cName')?.value?.trim();
  const serving=document.getElementById('cServing')?.value?.trim()||'1 serving';
  const cal=parseInt(document.getElementById('cCal')?.value)||0;
  const pro=parseInt(document.getElementById('cPro')?.value)||0;
  const carb=parseInt(document.getElementById('cCarb')?.value)||0;
  const fat=parseInt(document.getElementById('cFat')?.value)||0;
  if(!name||!cal)return alert('Please enter at least a name and calories.');
  await addFood({name,serving,cal,pro,carb,fat});
  ['cName','cServing','cCal','cPro','cCarb','cFat'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
}
function removeFood(idx){
  const tk=nutritionDate||todayKey();if(!foodLog[tk])return;
  const entry=foodLog[tk][idx];
  if(entry&&entry._id)sbDelFood(entry._id);
  foodLog[tk].splice(idx,1);ls('fl9',foodLog);renderNutrition();
}
// ── NUTRITION DATE NAV ───────────────────────────────────────────────────
function nutChangeDay(delta){
  const current=new Date((nutritionDate||todayKey())+'T12:00:00');
  current.setDate(current.getDate()+delta);
  const newDate=current.toISOString().split('T')[0];
  // Don't go past today
  if(newDate>todayKey())return;
  // Don't go before plan start
  if(newDate<'2026-06-01')return;
  nutritionDate=newDate;
  // Load food for this date from cloud if not already cached
  loadFoodForDate(newDate).then(()=>renderNutrition());
}
function nutGoToToday(){
  nutritionDate=todayKey();
  renderNutrition();
}
async function loadFoodForDate(date){
  // Check if we already have data for this date in cache
  // (could be empty — that's fine, just means no food logged)
  if(foodLog[date]!==undefined)return; // already loaded (even if empty array)
  if(!syncOnline)return;
  try{
    const rows=await sbF(`food_log?date=eq.${date}&order=created_at.asc`);
    foodLog[date]=rows.map(r=>({
      name:r.name,serving:r.serving||'',
      cal:r.cal||0,pro:r.pro||0,carb:r.carb||0,fat:r.fat||0,
      _id:r.id
    }));
    ls('fl9',foodLog);
  }catch(e){
    console.warn('[KWT] loadFoodForDate failed:',e.message);
    foodLog[date]=[]; // Mark as loaded but empty to avoid repeated fetches
  }
}

// ── CALENDAR (FIX 4) ─────────────────────────────────────────────────────
const PHASE_RANGES=[
  {s:'2026-06-01',e:'2026-08-31',c:'rgba(95,101,217,0.12)',tc:'#5F65D9',n:'Phase 1'},
  {s:'2026-09-01',e:'2026-11-30',c:'rgba(189,242,75,0.12)',tc:'#BDF24B',n:'Phase 2'},
  {s:'2026-12-01',e:'2027-03-31',c:'rgba(251,191,36,0.12)',tc:'#fbbf24',n:'Phase 3'},
  {s:'2027-04-01',e:'2027-06-25',c:'rgba(167,139,250,0.12)',tc:'#a78bfa',n:'Phase 4'},
];
function phaseOfDate(ds){for(let i=0;i<PHASE_RANGES.length;i++){if(ds>=PHASE_RANGES[i].s&&ds<=PHASE_RANGES[i].e)return i;}return-1;}
function sessionType(lbl){
  if(!lbl)return'';const l=lbl.toLowerCase();
  if(l.includes('push'))return'Push';if(l.includes('pull'))return'Pull';
  if(l.includes('leg'))return'Legs';if(l.includes('full'))return'Full';
  if(l.includes('core')||l.includes('recovery'))return'Core';
  if(l.includes('cardio'))return'Cardio';return lbl.split('—')[0].trim().slice(0,5);
}
function openCalendar(){calOffset=0;renderCalendar();openModal('calModal');}
function renderCalendar(){
  const MY=['January','February','March','April','May','June','July','August','September','October','November','December'];
  let tm=5+calOffset,ty=2026+Math.floor(tm/12);tm=tm%12;
  const now=new Date(),ts=now.toISOString().split('T')[0];
  const fd=new Date(ty,tm,1).getDay(),dim=new Date(ty,tm+1,0).getDate();
  const woMap={};workoutLog.forEach(w=>{woMap[w.date]={dur:w.durationSec||0,lbl:w.dayLabel||''};});
  const msStr=`${ty}-${String(tm+1).padStart(2,'0')}-01`;
  const pi=phaseOfDate(msStr);const pn=pi>=0?PHASE_RANGES[pi].n:'';const ptc=pi>=0?PHASE_RANGES[pi].tc:'var(--mu)';
  let html=`<div class="cal-month-nav">
    <button class="cal-nav-btn" onclick="moveCalMonth(-1)" ${calOffset<=0?'disabled style="opacity:0.3"':''}>‹</button>
    <div><div class="cal-month-title">${MY[tm]} ${ty}</div>${pn?`<div style="font-size:10px;color:${ptc};font-weight:500;margin-top:1px">${pn}</div>`:''}</div>
    <button class="cal-nav-btn" onclick="moveCalMonth(1)" ${calOffset>=12?'disabled style="opacity:0.3"':''}>›</button>
  </div>
  ${pn?`<div style="background:${PHASE_RANGES[pi].c};border-radius:10px;padding:5px 10px;margin-bottom:10px;font-size:11px;color:${ptc};display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:50%;background:${ptc}"></div>${pn} · ${PHASE_RANGES[pi].s.slice(5)} – ${PHASE_RANGES[pi].e.slice(5)}</div>`:''}
  <div class="cal-grid">`;
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d=>html+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<fd;i++)html+=`<div></div>`;
  for(let day=1;day<=dim;day++){
    const ds=`${ty}-${String(tm+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dt=new Date(ds+'T12:00:00'),isT=ds===ts,isFut=dt>now;
    const isWed=ds==='2027-06-25',isSt=ds==='2026-06-01';
    const wo=woMap[ds],isWkd=!!wo,pi2=phaseOfDate(ds),ptc2=pi2>=0?PHASE_RANGES[pi2].tc:'';
    let cls='cal-day',style='',icon='',sub='';
    if(isWed){cls+=' worked';style='background:rgba(167,139,250,0.35);color:#a78bfa';icon='<div class="cal-icon">💍</div>';}
    else if(isSt){cls+=' worked';style='background:rgba(251,191,36,0.25);color:#fbbf24';icon='<div class="cal-icon">⭐</div>';}
    else if(isFut){cls+=' future';}
    else if(isWkd){
      cls+=' worked';
      const st=sessionType(wo.lbl);const dur=wo.dur>0?fmtDur(wo.dur):'';
      sub=`<div style="font-size:7px;color:rgba(189,242,75,0.9);font-weight:600;line-height:1;margin-top:1px">${st}</div>${dur?`<div style="font-size:7px;color:rgba(189,242,75,0.7);line-height:1">${dur}</div>`:''}`;
    } else if(ds>='2026-06-01'&&ds<='2027-06-25'){cls+=' missed';}
    if(isT)cls+=' today-mk';
    if(ptc2&&!isWkd&&!isFut)style+=(style?';':'')+'border-bottom:2px solid '+ptc2+'44';
    html+=`<div class="${cls}" style="${style}">${day}${icon}${sub}</div>`;
  }
  html+=`</div><div class="cal-legend">
    <div class="cal-legend-item"><div style="width:10px;height:10px;border-radius:50%;background:rgba(189,242,75,0.5)"></div>Trained</div>
    <div class="cal-legend-item"><div style="width:10px;height:10px;border-radius:50%;background:rgba(248,113,113,0.4)"></div>Missed</div>
    <div class="cal-legend-item"><div style="width:10px;height:10px;border-radius:50%;background:rgba(107,107,128,0.3)"></div>Future</div>
    <div class="cal-legend-item"><span>⭐ Start &nbsp;💍 Wedding</span></div>
  </div>
  <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
    ${PHASE_RANGES.map(p=>`<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:${p.tc}"><div style="width:8px;height:8px;border-radius:2px;background:${p.tc}"></div>${p.n}</div>`).join('')}
  </div>`;
  document.getElementById('calContent').innerHTML=html;
}
function moveCalMonth(d){calOffset=Math.max(0,Math.min(12,calOffset+d));renderCalendar();}

// ── INIT (FIX 6: cloud-first) ────────────────────────────────────────────
// STEP 1: Render immediately from localStorage cache (instant, works offline)
updateTopbar();buildCarousel();renderDayDetail(dow());

// STEP 2: Load from Supabase cloud in background, refresh UI when done
setSyncDot('syncing');
(async()=>{
  try{
    console.log('[KWT] Starting cloud sync...');
    await flushQ();
    console.log('[KWT] Queue flushed, loading cloud data...');
    const ok=await loadCloud();
    console.log('[KWT] Cloud load result:', ok, '| workouts:', workoutLog.length, '| weights:', weightLog.length);
    setSyncDot(ok?'synced':'offline');
    if(ok){
      updateTopbar();
      buildCarousel();
      renderDayDetail(carDay!==null?carDay:dow());
      const hp=document.getElementById('page-history');
      const np=document.getElementById('page-nutrition');
      if(hp&&hp.classList.contains('active'))renderHistory();
      if(np&&np.classList.contains('active'))renderNutrition();
    }
  }catch(e){
    console.warn('[KWT] Cloud sync failed, using local cache:',e.message);
    setSyncDot('offline');
  }
})();

// STEP 3: Re-sync when app becomes visible again (handles iOS PWA resume)
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'){
    setSyncDot('syncing');
    (async()=>{
      try{
        await flushQ();
        const ok=await loadCloud();
        setSyncDot(ok?'synced':'offline');
        if(ok){
          updateTopbar();buildCarousel();
          renderDayDetail(carDay!==null?carDay:dow());
          const hp=document.getElementById('page-history');
          const np=document.getElementById('page-nutrition');
          if(hp&&hp.classList.contains('active'))renderHistory();
          if(np&&np.classList.contains('active'))renderNutrition();
        }
      }catch(e){setSyncDot('offline');}
    })();
  }
});
</script>
