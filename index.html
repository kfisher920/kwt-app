l.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Reverse Wrist Curl","0385-BLCvwr2","forearms","biceps",["biceps","brachialis"],["Sit on a bench or chair with your feet flat on the ground.","Hold a dumbbell in each hand with an overhand grip, palms facing down.","Rest your forearms on your thighs, allowing your wrists to hang off the edge.","Slowly curl your wrists upward, bringing the dumbbells towards your body.","Pause for a moment at the top, then slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Romanian Deadlift","1459-rR0LJzx","glutes","hamstrings",["hamstrings","lower back"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand with an overhand grip.","Keeping your back straight and your core engaged, hinge at the hips and lower the dumbbells towards the ground, allowing your knees to bend slightly.","Lower the dumbbells until you feel a stretch in your hamstrings, then push through your heels and engage your glutes to return to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Rotation Reverse Fly","0386-prbWx1D","delts","trapezius",["trapezius","rhomboids"],["Stand with your feet shoulder-width apart and hold a dumbbell in each hand, palms facing inwards.","Bend your knees slightly and hinge forward at the hips, keeping your back straight and chest up.","Raise your arms out to the sides, keeping a slight bend in your elbows, until they are parallel to the floor.","Rotate your arms so that your palms are facing downwards.","Slowly lower your arms back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Scott Press","2397-5vfAI0I","delts","triceps",["triceps","chest"],["Sit on a bench with a dumbbell in each hand, palms facing forward.","Raise the dumbbells to shoulder height, with your elbows bent and palms facing forward.","Press the dumbbells upward until your arms are fully extended.","Pause for a moment at the top, then slowly lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Seated Alternate Front Raise","0387-gH5fRsC","delts","trapezius",["trapezius","biceps"],["Sit on a bench with your back straight and feet flat on the ground.","Hold a dumbbell in each hand with your palms facing your body and arms extended down by your sides.","Keeping your arms straight, raise one dumbbell in front of you until it is parallel to the ground.","Pause for a moment at the top, then slowly lower the dumbbell back down to the starting position.","Repeat with the other arm.","Alternate between arms for the desired number of repetitions."]],["Dumbbell Seated Alternate Hammer Curl On Exercise Ball","1676-QLRmNeT","biceps","forearms",["forearms"],["Sit on an exercise ball with your feet flat on the ground and your back straight.","Hold a dumbbell in each hand with your palms facing your body and your arms fully extended.","Keeping your upper arms stationary, exhale and curl one dumbbell up towards your shoulder while keeping your palm facing your body.","Continue to raise the dumbbell until your biceps are fully contracted and the dumbbell is at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly lower the dumbbell back to the starting position.","Repeat the movement with the opposite arm.","Continue alternating arms for the desired number of repetitions."]],["Dumbbell Seated Alternate Press","0388-QT5Q0nK","delts","triceps",["triceps","chest"],["Sit on a bench with a dumbbell in each hand, palms facing forward.","Raise the dumbbells to shoulder height, with your elbows bent and palms facing forward.","Press one dumbbell up overhead, fully extending your arm.","Lower the dumbbell back down to shoulder height.","Repeat with the other arm.","Continue alternating arms for the desired number of repetitions."]],["Dumbbell Seated Alternate Shoulder","3546-q7qkONO","delts","triceps",["triceps","upper back"],["Sit on a bench with your back straight and feet flat on the ground.","Hold a dumbbell in each hand, palms facing inwards, and raise them to shoulder height.","Press one dumbbell up overhead while keeping the other dumbbell at shoulder height.","Lower the raised dumbbell back to shoulder height while simultaneously pressing the other dumbbell up overhead.","Continue alternating between arms for the desired number of repetitions."]],["Dumbbell Seated Bench Extension","0389-JhYSVwT","triceps","shoulders",["shoulders"],["Sit on a bench with your back straight and feet flat on the ground.","Hold a dumbbell with both hands and extend your arms straight up above your head.","Slowly lower the dumbbell behind your head, keeping your elbows close to your ears.","Pause for a moment, then raise the dumbbell back up to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Seated Bent Arm Lateral Raise","2317-JzQbv7J","delts","trapezius",["trapezius","rhomboids"],["Sit on a bench with your back straight and feet flat on the ground.","Hold a dumbbell in each hand with your palms facing your body and your arms bent at a 90-degree angle.","Keeping your elbows bent, raise your arms out to the sides until they are parallel to the ground.","Pause for a moment at the top, then slowly lower your arms back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Seated Bent Over Alternate Kickback","1730-x0lwvfq","triceps","shoulders",["shoulders","back"],["Sit on a bench with a dumbbell in each hand, palms facing inwards.","Bend forward at the waist, keeping your back straight and parallel to the ground.","Extend one arm straight back, keeping it close to your body, until your arm is fully extended.","Pause for a moment, then slowly lower the dumbbell back to the starting position.","Repeat with the other arm.","Continue alternating arms for the desired number of repetitions."]],["Dumbbell Seated Bent Over Triceps Extension","1737-4ievMJ9","triceps","shoulders",["shoulders","back"],["Sit on a bench with your feet flat on the ground and hold a dumbbell in each hand.","Bend forward at the waist, keeping your back straight and your head up.","Extend your arms straight back, keeping your elbows close to your head.","Pause for a moment, then slowly lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Seated Bicep Curl","1677-xiA6lRr","biceps","forearms",["forearms"],["Sit on a bench with your feet flat on the ground and hold a dumbbell in each hand, palms facing up.","Keep your back straight and your elbows close to your torso.","Exhale and curl the dumbbells up towards your shoulders, contracting your biceps.","Pause for a moment at the top, then inhale and slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Seated Biceps Curl (On Stability Ball)","0390-WgJnBH5","biceps","forearms",["forearms"],["Sit on a stability ball with your feet flat on the ground and your back straight.","Hold a dumbbell in each hand with your palms facing forward and your arms fully extended.","Keeping your upper arms stationary, exhale and curl the dumbbells while contracting your biceps.","Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Seated Biceps Curl To Shoulder Press","3547-OeL23VY","biceps","shoulders",["shoulders"],["Sit on a bench with your back straight and feet flat on the ground.","Hold a dumbbell in each hand with your palms facing forward and arms fully extended.","Keeping your elbows close to your sides, curl the dumbbells up towards your shoulders.","Once your forearms are vertical, rotate your wrists so that your palms are facing forward.","Press the dumbbells overhead until your arms are fully extended.","Lower the dumbbells back down to the starting position by reversing the movement.","Repeat for the desired number of repetitions."]],["Dumbbell Seated Calf Raise","1379-r29jP7S","calves","hamstrings",["hamstrings"],["Sit on a bench or chair with your feet flat on the ground and a dumbbell resting on your thighs.","Place the balls of your feet on a raised surface such as a step or block, with your heels hanging off the edge.","Hold onto the dumbbell for stability.","Raise your heels as high as possible, lifting your body weight onto the balls of your feet.","Pause for a moment at the top, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Seated Curl","0391-TiaZTxx","biceps","forearms",["forearms"],["Sit on a bench with your feet flat on the ground and a dumbbell in each hand, palms facing forward.","Keep your back straight and your elbows close to your torso.","Exhale and curl the dumbbells up towards your shoulders, contracting your biceps.","Pause for a moment at the top, then inhale and slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Seated Front Raise","0392-Ys97II0","delts","trapezius",["trapezius","biceps"],["Sit on a bench with your feet flat on the ground and a dumbbell in each hand, resting on your thighs.","Keep your back straight and core engaged.","Raise the dumbbells in front of you, with your palms facing down, until they are at shoulder level.","Pause for a moment at the top, then slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Seated Hammer Curl","1678-IGtBdNT","biceps","forearms",["forearms"],["Sit on a bench with a dumbbell in each hand, palms facing your torso and arms extended straight down.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Seated Inner Biceps Curl","0393-KXyoEtA","biceps","forearms",["forearms"],["Sit on a bench with your feet flat on the ground and hold a dumbbell in each hand, palms facing up.","Rest your upper arms on your thighs, allowing the dumbbells to hang down.","Keeping your upper arms stationary, curl the dumbbells up towards your shoulders by contracting your biceps.","Pause for a moment at the top, then slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Seated Kickback","0394-en550rk","triceps","shoulders",["shoulders"],["Sit on a bench with your feet flat on the ground and hold a dumbbell in each hand.","Bend your knees slightly and lean forward from your hips, keeping your back straight.","Bring your upper arms close to your sides and keep your elbows bent at a 90-degree angle.","Extend your arms straight back, squeezing your triceps at the top of the movement.","Pause for a moment, then slowly lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Seated Lateral Raise","0396-hxyTtWj","delts","traps",["traps","upper back"],["Sit on a bench with your feet flat on the ground and a dumbbell in each hand, resting on your thighs.","Keep your back straight and core engaged.","Raise the dumbbells to your sides with a slight bend in your elbows, until your arms are parallel to the ground.","Pause for a moment at the top, then slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Seated Lateral Raise V. 2","0395-hrrS0Ed","delts","traps",["traps","triceps"],["Sit on a bench with your feet flat on the ground and a dumbbell in each hand, resting on your thighs.","Keep your back straight and core engaged.","Raise the dumbbells to your sides with a slight bend in your elbows, until your arms are parallel to the ground.","Pause for a moment at the top, then slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Seated Neutral Wrist Curl","0397-uJmK7Z1","biceps","forearms",["forearms"],["Sit on a bench with your feet flat on the ground and hold a dumbbell in each hand, palms facing each other.","Rest your forearms on your thighs, allowing the dumbbells to hang down.","Keeping your wrists in a neutral position, curl the dumbbells up towards your shoulders.","Pause for a moment at the top, then slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Seated One Arm Bicep Curl On Exercise Ball With Leg Raised","1679-84sESNy","biceps","forearms",["forearms","shoulders"],["Sit on an exercise ball with your feet flat on the ground and your back straight.","Hold a dumbbell in one hand with your palm facing up and your arm fully extended.","Place your other hand on your hip for stability.","Slowly curl the dumbbell towards your shoulder, keeping your upper arm stationary.","Pause for a moment at the top of the movement, squeezing your bicep.","Slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions.","Switch arms and repeat the exercise."]],["Dumbbell Seated One Arm Kickback","0398-VQ3sNCn","triceps","shoulders",["shoulders"],["Sit on a bench with your feet flat on the ground and hold a dumbbell in one hand.","Bend your torso forward at the waist, keeping your back straight and parallel to the ground.","Extend your arm straight back, keeping your elbow close to your body.","Pause for a moment at the top, then slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell Seated One Arm Rotate","0399-7f2jsqP","forearms","shoulders",["shoulders","biceps"],["Sit on a bench with your back straight and hold a dumbbell in one hand, resting it on your thigh.","Raise the dumbbell up to shoulder height, keeping your elbow close to your body.","Rotate your forearm outward, away from your body, while keeping your upper arm stationary.","Pause for a moment at the top, then slowly rotate your forearm back to the starting position.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Dumbbell Seated One Leg Calf Raise","0400-Ia7tumC","calves","hamstrings",["hamstrings","glutes"],["Sit on a bench or chair with your feet flat on the ground and a dumbbell resting on your right thigh.","Extend your left leg straight out in front of you, keeping your foot flexed.","Place the ball of your right foot on an elevated surface, such as a step or weight plate.","Using your calf muscles, raise your right heel as high as possible.","Pause for a moment at the top, then slowly lower your heel back down to the starting position.","Repeat for the desired number of repetitions, then switch legs."]],["Dumbbell Seated One Leg Calf Raise - Hammer Grip","1380-FxhcxUW","calves","hamstrings",["hamstrings","glutes"],["Sit on a bench or chair with your feet flat on the ground and a dumbbell resting on your thighs.","Place one foot on a raised surface, such as a step or block, with your heel hanging off the edge.","Hold the dumbbell with a hammer grip, meaning your palms are facing each other and your fingers are wrapped around the handle.","Keeping your core engaged and your back straight, slowly raise your heel as high as possible by pushing through the ball of your foot.","Pause for a moment at the top, then slowly lower your heel back down to the starting position.","Repeat for the desired number of repetitions, then switch to the other leg."]],["Dumbbell Seated One Leg Calf Raise - Palm Up","1381-VW88JNd","calves","hamstrings",["hamstrings","glutes"],["Sit on a bench or chair with your back straight and your feet flat on the ground.","Hold a dumbbell in one hand and place it on top of your thigh, palm facing up.","Lift one leg off the ground and extend it in front of you, keeping your knee slightly bent.","Raise your heel as high as possible by pushing through the ball of your foot.","Pause for a moment at the top, then slowly lower your heel back down.","Repeat for the desired number of repetitions, then switch legs and repeat."]],["Dumbbell Seated Palms Up Wrist Curl","0401-2dImyQ8","forearms","biceps",["biceps","shoulders"],["Sit on a bench with your feet flat on the ground and hold a dumbbell in each hand, palms facing up.","Rest your forearms on your thighs, allowing your wrists to hang off the edge.","Slowly curl your wrists upward, squeezing your forearms at the top of the movement.","Pause for a moment, then lower your wrists back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Seated Preacher Curl","0402-7D5bgLT","biceps","forearms",["forearms"],["Sit on a preacher curl bench with your feet flat on the floor.","Hold a dumbbell in one hand with an underhand grip, resting your upper arm against the preacher pad.","Keeping your upper arm stationary, exhale and curl the dumbbell up towards your shoulder.","Pause for a moment at the top, then inhale and slowly lower the dumbbell back down to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell Seated Revers Grip Concentration Curl","0403-lyKCLmK","biceps","forearms",["forearms"],["Sit on a bench with your feet flat on the ground and hold a dumbbell in one hand, palm facing up.","Rest your elbow on the inside of your thigh, just above the knee.","Keeping your upper arm stationary, exhale and curl the dumbbell towards your shoulder.","Pause for a moment at the top, squeezing your biceps.","Inhale and slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell Seated Reverse Grip One Arm Overhead Tricep Extension","1738-5fKX7wi","triceps","shoulders",["shoulders"],["Sit on a bench with your back straight and feet flat on the ground.","Hold a dumbbell with an underhand grip and extend your arm straight up overhead.","Lower the dumbbell behind your head by bending your elbow, keeping your upper arm stationary.","Pause for a moment, then extend your arm back up to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell Seated Shoulder Press","0405-znQUdHY","delts","triceps",["triceps","upper back"],["Sit on a bench with a dumbbell in each hand, resting on your thighs.","Raise the dumbbells to shoulder height, palms facing forward.","Press the dumbbells upward until your arms are fully extended overhead.","Pause for a moment at the top, then slowly lower the dumbbells back to shoulder height.","Repeat for the desired number of repetitions."]],["Dumbbell Seated Shoulder Press (Parallel Grip)","0404-f1jf47L","delts","triceps",["triceps","upper back"],["Sit on a bench with a dumbbell in each hand, palms facing inward.","Raise the dumbbells to shoulder height, elbows bent and palms facing forward.","Press the dumbbells upward until your arms are fully extended overhead.","Pause for a moment at the top, then slowly lower the dumbbells back to shoulder height.","Repeat for the desired number of repetitions."]],["Dumbbell Seated Triceps Extension","2188-kont8Ut","triceps","shoulders",["shoulders"],["Sit on a bench with your back straight and feet flat on the ground.","Hold a dumbbell with both hands and extend your arms straight up overhead.","Bend your elbows and lower the dumbbell behind your head, keeping your upper arms close to your ears.","Pause for a moment, then straighten your arms and return to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Shrug","0406-NJzBsGJ","traps","shoulders",["shoulders"],["Stand with your feet shoulder-width apart and hold a dumbbell in each hand with your palms facing your body.","Keep your arms straight and let the dumbbells hang by your sides.","Raise your shoulders as high as possible, as if you are trying to touch your ears with your shoulders.","Hold the contraction for a second, then slowly lower your shoulders back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Side Bend","0407-IpONWYv","abs","obliques",["obliques"],["Stand up straight with your feet shoulder-width apart and hold a dumbbell in one hand, letting it hang down by your side.","Keeping your back straight and your core engaged, slowly bend sideways at the waist towards the opposite side of the dumbbell, lowering the weight as far as you comfortably can.","Pause for a moment, then slowly return to the starting position.","Repeat for the desired number of repetitions, then switch sides and repeat."]],["Dumbbell Side Lying One Hand Raise","0408-fTlkJop","delts","trapezius",["trapezius","rhomboids"],["Lie on your side with your legs extended and your head supported by your arm.","Hold a dumbbell in your top hand with your palm facing down.","Keeping your arm straight, raise the dumbbell up to shoulder height.","Pause for a moment at the top, then slowly lower the dumbbell back down to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Dumbbell Side Plank With Rear Fly","3664-X6ytgYZ","upper back","shoulders",["shoulders","core"],["Start by lying on your side with your legs extended and stacked on top of each other.","Place your forearm on the ground directly below your shoulder, keeping your elbow bent at a 90-degree angle.","Hold a dumbbell in your top hand, with your arm extended straight down towards the ground.","Engage your core and lift your hips off the ground, creating a straight line from your head to your heels.","While maintaining the side plank position, lift the dumbbell up towards the ceiling, squeezing your shoulder blades together.","Lower the dumbbell back down to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Dumbbell Single Arm Overhead Carry","3548-mWBtgmb","delts","traps",["traps","core"],["Stand tall with your feet shoulder-width apart, holding a dumbbell in one hand.","Raise the dumbbell overhead, fully extending your arm.","Engage your core and keep your back straight as you walk forward, maintaining the dumbbell overhead.","Continue walking for the desired distance or time.","Switch hands and repeat the exercise."]],["Dumbbell Single Leg Calf Raise","0409-1kB3Wmk","calves","ankles",["ankles"],["Stand on the edge of a step or platform with your heels hanging off and your toes on the step.","Hold a dumbbell in one hand and place your other hand on a wall or railing for support.","Raise your heel as high as possible, lifting your body up onto your toes.","Pause for a moment at the top, then slowly lower your heel back down below the step.","Repeat for the desired number of repetitions, then switch to the other leg."]],["Dumbbell Single Leg Deadlift","1757-gKozT8X","glutes","hamstrings",["hamstrings","lower back"],["Stand with your feet hip-width apart, holding a dumbbell in your right hand.","Shift your weight onto your left leg and lift your right foot slightly off the ground.","Keeping your back straight, hinge forward at the hips and lower the dumbbell towards the ground.","At the same time, extend your right leg straight behind you, maintaining a slight bend in your left knee.","Lower the dumbbell until your torso and right leg are parallel to the ground.","Pause for a moment, then engage your glutes and hamstrings to return to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Dumbbell Single Leg Deadlift With Stepbox Support","2805-daBmy1Y","glutes","hamstrings",["hamstrings","lower back"],["Stand with your feet hip-width apart, holding a dumbbell in your right hand.","Place your left foot on a stepbox or elevated surface behind you.","Keeping your back straight and core engaged, hinge forward at the hips, lowering the dumbbell towards the ground.","As you lower the dumbbell, simultaneously lift your left leg behind you, maintaining a straight line from head to heel.","Lower the dumbbell until you feel a stretch in your right hamstring, then return to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Dumbbell Single Leg Split Squat","0410-qx4fgX7","quads","glutes",["glutes","hamstrings","calves"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand.","Take a step forward with one foot and position your feet so that your front foot is flat on the ground and your back foot is elevated on a bench or step.","Lower your body by bending your front knee and hip, keeping your back knee slightly bent and your back heel off the ground.","Continue lowering until your front thigh is parallel to the ground, then push through your front heel to return to the starting position.","Repeat for the desired number of repetitions, then switch legs and repeat."]],["Dumbbell Single Leg Squat","0411-H6ybluc","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand.","Extend one leg forward and keep it off the ground throughout the exercise.","Bend your standing leg and lower your body down as if sitting back into a chair.","Keep your chest up and your back straight.","Pause for a moment at the bottom, then push through your heel to return to the starting position.","Repeat for the desired number of repetitions, then switch legs."]],["Dumbbell Squat","0413-HsvHqgf","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand at your sides.","Keeping your chest up and core engaged, lower your body down by bending at the knees and hips, as if sitting back into a chair.","Continue lowering until your thighs are parallel to the ground, or as low as you can comfortably go.","Pause for a moment at the bottom, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Standing Alternate Hammer Curl And Press","3560-LeaZOIz","biceps","forearms",["forearms","shoulders"],["Stand up straight with a dumbbell in each hand, palms facing your body.","Keep your elbows close to your torso and your back straight.","Exhale and curl the dumbbell in your right hand towards your shoulder, keeping your upper arm stationary.","Continue to raise the dumbbell until your biceps are fully contracted and the dumbbell is at shoulder level.","Inhale and slowly lower the dumbbell back to the starting position.","Repeat the curl with your left hand.","After completing the curl with your left hand, exhale and press the dumbbell in your right hand overhead.","Extend your arm fully and hold for a moment at the top.","Inhale and slowly lower the dumbbell back to the starting position.","Repeat the press with your left hand.","Continue alternating between curls and presses for the desired number of repetitions."]],["Dumbbell Standing Alternate Overhead Press","0414-bBi35y3","delts","triceps",["triceps","core"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand at shoulder level with your palms facing forward.","Press one dumbbell overhead, fully extending your arm.","Lower the dumbbell back to shoulder level.","Repeat with the other arm.","Continue alternating arms for the desired number of repetitions."]],["Dumbbell Standing Alternate Raise","0415-SxHteRW","delts","traps",["traps","forearms"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand with your palms facing your body.","Keep your back straight and your core engaged.","Raise one dumbbell to the side, keeping your arm straight and your palm facing down.","Continue lifting until your arm is parallel to the ground.","Pause for a moment at the top, then slowly lower the dumbbell back to the starting position.","Repeat with the other arm.","Alternate between arms for the desired number of repetitions."]],["Dumbbell Standing Alternating Tricep Kickback","1739-Gi2BXfK","triceps","shoulders",["shoulders"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Extend your arms straight back, keeping your elbows close to your body.","Pause for a moment at the top, then slowly lower the dumbbells back to the starting position.","Repeat with the other arm, alternating sides with each repetition."]],["Dumbbell Standing Around World","2143-RSOsp5d","delts","triceps",["triceps","forearms"],["Stand with your feet shoulder-width apart and hold a dumbbell in each hand.","Extend your arms straight out to the sides at shoulder height, palms facing down.","Keeping your arms straight, slowly rotate your arms in a circular motion, bringing the dumbbells in front of your body and then overhead.","Continue the circular motion, bringing the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Standing Bent Over One Arm Triceps Extension","1740-CJwa0vD","triceps","shoulders",["shoulders","back"],["Stand with your feet shoulder-width apart and hold a dumbbell in one hand.","Bend forward at the waist, keeping your back straight and parallel to the ground.","Extend your arm straight back, keeping your elbow close to your body.","Slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell Standing Bent Over Two Arm Triceps Extension","1741-3T12T87","triceps","shoulders",["shoulders","back"],["Stand with your feet shoulder-width apart and hold a dumbbell in each hand.","Bend forward at the waist, keeping your back straight and your knees slightly bent.","Extend your arms straight back, keeping your elbows close to your body.","Slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Standing Biceps Curl","0416-3s4NnTh","biceps","forearms",["forearms"],["Stand up straight with a dumbbell in each hand, palms facing forward and arms fully extended.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Standing Calf Raise","0417-dPmaUaU","calves","ankles",["ankles"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand.","Raise your heels off the ground as high as possible, using your calves.","Pause for a moment at the top, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Standing Concentration Curl","0418-7inpWch","biceps","forearms",["forearms"],["Stand with your feet shoulder-width apart and hold a dumbbell in one hand, with your arm fully extended and palm facing inwards.","Place your opposite hand on your thigh for support.","Keeping your upper arm stationary, exhale and curl the dumbbell towards your shoulder by contracting your biceps.","Continue to raise the dumbbell until your biceps are fully contracted and the dumbbell is at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell Standing Front Raise Above Head","0419-laVRfDf","delts","trapezius",["trapezius","biceps"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand with an overhand grip.","Keep your arms straight and lift the dumbbells in front of you, raising them above your head.","Pause for a moment at the top, then slowly lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Standing Inner Biceps Curl V. 2","2321-vKilzz3","biceps","forearms",["forearms"],["Stand up straight with a dumbbell in each hand, palms facing your torso.","Keep your elbows close to your torso and rotate the palms of your hands until they are facing forward.","While holding your upper arms stationary, curl the weights while contracting your biceps.","Continue to raise the weights until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Slowly begin to bring the dumbbells back to the starting position as your breathe in.","Repeat for the recommended amount of repetitions."]],["Dumbbell Standing Kickback","0420-UmpPAAe","triceps","shoulders",["shoulders"],["Stand with your feet shoulder-width apart and hold a dumbbell in each hand.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Extend your arms straight back, squeezing your triceps at the top of the movement.","Pause for a moment, then slowly lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Standing One Arm Concentration Curl","0421-8fgqP5a","biceps","forearms",["forearms"],["Stand up straight with your feet shoulder-width apart and hold a dumbbell in one hand, palm facing up.","Place your free hand on your thigh for support.","Keeping your upper arm stationary, exhale and curl the dumbbell towards your shoulder by contracting your biceps.","Continue to raise the dumbbell until your biceps are fully contracted and the dumbbell is at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell Standing One Arm Curl (Over Incline Bench)","0422-BIb1tGo","biceps","forearms",["forearms"],["Stand with your feet shoulder-width apart, holding a dumbbell in one hand with your palm facing forward.","Place your other hand on an incline bench for support.","Keeping your upper arm stationary, exhale and curl the dumbbell towards your shoulder by contracting your biceps.","Pause for a moment at the top, then inhale and slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell Standing One Arm Curl Over Incline Bench","1680-EmlJR2y","biceps","forearms",["forearms"],["Stand with your feet shoulder-width apart, holding a dumbbell in one hand.","Place your other hand on an incline bench for support.","Keeping your upper arm stationary, curl the dumbbell towards your shoulder by contracting your biceps.","Pause for a moment at the top, then slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell Standing One Arm Extension","0423-BCUR88E","triceps","shoulders",["shoulders"],["Stand with your feet shoulder-width apart, holding a dumbbell in one hand.","Raise the dumbbell overhead, fully extending your arm.","Keep your upper arm close to your head and perpendicular to the ground.","Slowly lower the dumbbell behind your head, bending your elbow.","Pause for a moment, then raise the dumbbell back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Standing One Arm Palm In Press","0424-ocYc6Db","delts","triceps",["triceps","core"],["Stand with your feet shoulder-width apart, holding a dumbbell in one hand at shoulder height with your palm facing inwards.","Engage your core and keep your back straight.","Press the dumbbell upwards until your arm is fully extended.","Pause for a moment at the top, then slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Dumbbell Standing One Arm Reverse Curl","0425-DU5Kkj2","biceps","forearms",["forearms"],["Stand up straight with your feet shoulder-width apart and hold a dumbbell in one hand with an overhand grip.","Keep your arm fully extended and close to your body, with your palm facing down.","Slowly curl the dumbbell up towards your shoulder, keeping your upper arm stationary.","Pause for a moment at the top, then slowly lower the dumbbell back down to the starting position.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Dumbbell Standing Overhead Press","0426-A6wtbuL","delts","triceps",["triceps","upper back"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand at shoulder level with your palms facing forward.","Press the dumbbells upward until your arms are fully extended overhead.","Pause for a moment at the top, then slowly lower the dumbbells back down to shoulder level.","Repeat for the desired number of repetitions."]],["Dumbbell Standing Palms In Press","0427-UilDHSs","delts","triceps",["triceps","chest"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand at shoulder level with your palms facing inwards.","Keeping your core engaged and your back straight, press the dumbbells upwards until your arms are fully extended overhead.","Pause for a moment at the top, then slowly lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Standing Preacher Curl","0428-hq2hyDH","biceps","forearms",["forearms"],["Stand upright with your feet shoulder-width apart and hold a dumbbell in each hand, palms facing forward.","Rest the back of your upper arms against the preacher bench or an incline bench, with your elbows slightly bent.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Standing Reverse Curl","0429-0IgNjSM","biceps","forearms",["forearms"],["Stand up straight with your feet shoulder-width apart and hold a dumbbell in each hand, palms facing your body.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps. Continue to raise the weights until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Standing Triceps Extension","0430-PdmaD0N","triceps","shoulders",["shoulders"],["Stand with your feet shoulder-width apart and hold a dumbbell in one hand.","Raise the dumbbell overhead, keeping your arm straight.","Bend your elbow and lower the dumbbell behind your head, keeping your upper arm stationary.","Extend your arm back up to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Standing Zottman Preacher Curl","2293-P2nRiUa","biceps","forearms",["forearms"],["Stand up straight with a dumbbell in each hand, palms facing forward.","Place your upper arms against the preacher bench and keep your elbows slightly bent.","Curl the dumbbells up towards your shoulders while keeping your upper arms stationary.","At the top of the movement, rotate your wrists so that your palms are facing downward.","Slowly lower the dumbbells back to the starting position, rotating your wrists back to the starting position as well.","Repeat for the desired number of repetitions."]],["Dumbbell Step Up Single Leg Balance With Bicep Curl","1684-76vfTdU","biceps","quadriceps",["quadriceps","glutes","hamstrings"],["Stand in front of a step or platform with a dumbbell in each hand, palms facing your body.","Place your right foot on the step, ensuring your entire foot is in contact with the surface.","Engage your core and push through your right heel to lift your body up onto the step, bringing your left knee up towards your chest.","At the top of the movement, perform a bicep curl by bending your elbows and bringing the dumbbells towards your shoulders.","Lower the dumbbells back down and simultaneously lower your left foot back to the ground.","Repeat the movement on the opposite side, stepping up with your left foot and curling the dumbbells.","Continue alternating sides for the desired number of repetitions."]],["Dumbbell Step-up","0431-aXtJhlg","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand in front of a bench or step with a dumbbell in each hand, palms facing your body.","Place your right foot on the bench or step, ensuring your entire foot is in contact with the surface.","Push through your right heel and lift your body up onto the bench or step, straightening your right leg.","Bring your left foot up onto the bench or step, standing fully upright.","Step back down with your left foot, followed by your right foot, returning to the starting position.","Repeat for the desired number of repetitions, then switch legs."]],["Dumbbell Step-up Lunge","2796-gFyFj9z","quads","glutes",["glutes","hamstrings","calves"],["Stand in front of a step or platform with a dumbbell in each hand, palms facing your sides.","Place your right foot on the step, ensuring your entire foot is on the surface.","Push through your right heel and lift your body up onto the step, bringing your left foot up as well.","Once both feet are on the step, lower your left foot back down to the starting position, keeping your right foot on the step.","Repeat the movement, alternating which foot you step up with each time.","Continue for the desired number of repetitions."]],["Dumbbell Step-up Split Squat","2812-QjE2DcA","quads","glutes",["glutes","hamstrings","calves"],["Stand in front of a bench or step with a dumbbell in each hand, palms facing your body.","Place your right foot on the bench or step, ensuring your entire foot is in contact with the surface.","Step up onto the bench or step with your right foot, pushing through your heel to lift your body up.","As you step up, simultaneously lift your left knee towards your chest.","Pause at the top of the movement, then slowly lower your left foot back to the ground while keeping your right foot on the bench or step.","Repeat the movement with your left foot on the bench or step.","Continue alternating between your right and left foot for the desired number of repetitions."]],["Dumbbell Stiff Leg Deadlift","0432-5eLRITT","glutes","hamstrings",["hamstrings","lower back"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand with an overhand grip.","Keeping your back straight and your core engaged, hinge at the hips and lower the dumbbells towards the ground, allowing a slight bend in your knees.","Lower the dumbbells until you feel a stretch in your hamstrings, then squeeze your glutes and push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Straight Arm Pullover","0433-i8BdLTK","pectorals","latissimus dorsi",["latissimus dorsi","triceps"],["Lie flat on a bench with your head at one end and your feet planted firmly on the ground.","Hold a dumbbell with both hands and extend your arms straight above your chest.","Keeping your arms straight, slowly lower the dumbbell behind your head in an arc-like motion.","Pause for a moment, then raise the dumbbell back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Straight Leg Deadlift","0434-oom75KC","glutes","hamstrings",["hamstrings","lower back"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand with an overhand grip.","Keeping your back straight and your core engaged, hinge at the hips and lower the dumbbells towards the ground, allowing your torso to lean forward.","Continue lowering the dumbbells until you feel a stretch in your hamstrings, keeping your knees slightly bent.","Pause for a moment at the bottom, then engage your glutes and hamstrings to lift your torso back up to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Sumo Pull Through","2808-BmrwWzo","glutes","hamstrings",["hamstrings","quadriceps","core"],["Stand with your feet wider than shoulder-width apart, toes pointed outwards.","Hold a dumbbell with both hands in front of your body, arms extended.","Bend your knees and lower your hips down into a squat position, keeping your back straight.","Lower the dumbbell down between your legs, keeping your arms straight.","Drive through your heels and extend your hips forward, pulling the dumbbell up and in front of your body.","Squeeze your glutes at the top of the movement, then lower the dumbbell back down between your legs.","Repeat for the desired number of repetitions."]],["Dumbbell Supported Squat","2803-r5DgrW9","quads","glutes",["glutes","hamstrings","calves"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand at your sides.","Keeping your chest up and core engaged, slowly lower your body down by bending your knees and pushing your hips back.","Continue lowering until your thighs are parallel to the ground, or as low as you can comfortably go.","Pause for a moment at the bottom, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Tate Press","0436-s5PdDyY","triceps","shoulders",["shoulders"],["Sit on a flat bench with a dumbbell in each hand, palms facing each other.","Raise the dumbbells to shoulder height, then rotate your wrists so that your palms are facing away from you.","Press the dumbbells up until your arms are fully extended, then lower them back down to shoulder height.","Rotate your wrists back to the starting position and repeat for the desired number of repetitions."]],["Dumbbell Tricep Kickback With Stork Stance","1742-wOLmCXc","triceps","shoulders",["shoulders"],["Stand with your feet shoulder-width apart and hold a dumbbell in your right hand.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Bring your right elbow up to your side, keeping it bent at a 90-degree angle.","Extend your right arm straight back, squeezing your triceps.","Pause for a moment, then slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Dumbbell Twisting Bench Press","1743-z6TAHoT","triceps","chest",["chest","shoulders"],["Lie flat on a bench with your feet flat on the ground and your back pressed against the bench.","Hold a dumbbell in each hand with an overhand grip, palms facing away from you.","Extend your arms straight up over your chest, keeping a slight bend in your elbows.","Lower the dumbbells down towards your chest, keeping your elbows close to your body.","As you lower the dumbbells, twist your wrists so that your palms face towards you at the bottom of the movement.","Pause for a moment at the bottom, then reverse the movement by pressing the dumbbells back up to the starting position.","As you press the dumbbells up, twist your wrists back to the starting position with palms facing away from you.","Repeat for the desired number of repetitions."]],["Dumbbell Upright Row","0437-ainizkb","delts","traps",["traps","biceps"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand with an overhand grip.","Let the dumbbells hang in front of your thighs, with your arms fully extended.","Keeping your back straight and your core engaged, exhale and lift the dumbbells straight up towards your chin, leading with your elbows.","Pause for a moment at the top, then inhale and slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Upright Row (Back Pov)","1765-Iptlv6x","delts","traps",["traps","biceps"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand with an overhand grip.","Let the dumbbells hang in front of your thighs, with your arms fully extended and your palms facing your body.","Keeping your back straight and your core engaged, exhale and lift the dumbbells straight up towards your chin, leading with your elbows.","Continue lifting until the dumbbells are at shoulder height, with your elbows pointing out to the sides.","Pause for a moment at the top, then inhale and slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Upright Shoulder External Rotation","0864-x306lCW","delts","rotator cuff",["rotator cuff","trapezius"],["Stand with your feet shoulder-width apart and hold a dumbbell in each hand with your palms facing your body.","Raise your arms out to the sides until they are parallel to the ground, keeping your elbows slightly bent.","Rotate your arms externally, bringing the dumbbells up towards your head while keeping your elbows in the same position.","Pause for a moment at the top, then slowly lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Waiter Biceps Curl","5201-KOpzGBL","biceps","forearms",["forearms","shoulders"],["Stand up straight with a dumbbell in each hand, palms facing forward.","Keep your upper arms close to your body and your elbows tucked in.","Slowly curl the dumbbells up towards your shoulders, keeping your wrists straight.","Pause for a moment at the top, then slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell W-press","0438-vmwLyCg","delts","triceps",["triceps","chest"],["Sit on a bench with a dumbbell in each hand, palms facing forward.","Raise the dumbbells to shoulder height, elbows bent and palms facing forward.","Press the dumbbells upward until your arms are fully extended overhead.","Lower the dumbbells back to shoulder height.","Repeat for the desired number of repetitions."]],["Dumbbell Zottman Curl","0439-kXaIn5A","biceps","forearms",["forearms"],["Stand up straight with a dumbbell in each hand, palms facing your body.","Keep your elbows close to your torso and rotate your palms to face forward.","Curl the dumbbells up to your shoulders while keeping your upper arms stationary.","At the top of the movement, rotate your wrists so that your palms are facing away from your body.","Slowly lower the dumbbells back to the starting position, rotating your palms back to facing your body.","Repeat for the desired number of repetitions."]],["Dumbbell Zottman Preacher Curl","2294-y5U5B9Y","biceps","forearms",["forearms"],["Sit on a preacher bench with a dumbbell in each hand, palms facing up and elbows resting on the pad.","Curl the dumbbells up towards your shoulders, keeping your upper arms stationary and your palms facing up.","At the top of the curl, rotate your wrists so that your palms are facing down.","Slowly lower the dumbbells back down to the starting position, rotating your wrists back to the starting position as you do so.","Repeat for the desired number of repetitions."]],["Dumbbells Seated Triceps Extension","2189-FQXdXzY","triceps","shoulders",["shoulders"],["Sit on a bench with your back straight and feet flat on the ground.","Hold a dumbbell in both hands with an overhand grip, and raise it above your head.","Bend your elbows and lower the dumbbell behind your head, keeping your upper arms close to your ears.","Extend your arms and raise the dumbbell back to the starting position.","Repeat for the desired number of repetitions."]],["Dynamic Chest Stretch (Male)","1167-3uj0Ozg","pectorals","shoulders",["shoulders","triceps"],["Stand tall with your feet shoulder-width apart.","Extend your arms straight out to the sides, parallel to the ground.","Slowly bring your arms forward, crossing them in front of your body.","Feel the stretch in your chest muscles.","Hold the stretch for 10-30 seconds.","Return to the starting position and repeat for the desired number of repetitions."]],["Elbow Dips","3287-LkoAWAE","triceps","chest",["chest","shoulders"],["Sit on the edge of a bench or chair with your hands gripping the edge next to your hips.","Slide your hips forward off the bench and straighten your legs, keeping your heels on the ground.","Bend your elbows and lower your body towards the ground, keeping your back close to the bench.","Pause for a moment at the bottom, then push through your hands to straighten your arms and lift your body back up to the starting position.","Repeat for the desired number of repetitions."]],["Elbow Lift - Reverse Push-up","1772-wbUYILZ","upper back","triceps",["triceps","shoulders"],["Start by lying face down on the ground with your legs extended and your hands placed directly under your shoulders.","Engage your core and press through your palms to lift your upper body off the ground, keeping your elbows close to your sides.","Pause at the top for a moment, squeezing your upper back muscles.","Slowly lower your body back down to the starting position.","Repeat for the desired number of repetitions."]],["Elbow-to-knee","0443-jvp6DiD","abs","obliques",["obliques"],["Start by lying flat on your back with your knees bent and feet flat on the ground.","Place your hands behind your head with your elbows pointing outwards.","Engage your abs and lift your upper body off the ground, bringing your right elbow towards your left knee.","At the same time, bring your left knee towards your right elbow, creating a twisting motion.","Pause for a moment at the top, then slowly lower your upper body and extend your legs back to the starting position.","Repeat the movement, this time bringing your left elbow towards your right knee and your right knee towards your left elbow.","Continue alternating sides for the desired number of repetitions."]],["Elevator","3292-zYmNaoY","upper back","shoulders",["shoulders","trapezius"],["Stand with your feet shoulder-width apart and your knees slightly bent.","Place your hands on your hips or cross them in front of your chest.","Keeping your back straight, slowly bend forward at the waist, lowering your upper body towards the ground.","Pause for a moment at the bottom, then slowly raise your upper body back up to the starting position.","Repeat for the desired number of repetitions."]],["Exercise Ball Alternating Arm Ups","1332-EyLrNC2","lats","shoulders",["shoulders","core"],["Sit on the stability ball with your feet flat on the ground and your back straight.","Hold a dumbbell in each hand with your palms facing inwards and your arms extended down by your sides.","Engage your core and slowly lift one arm up towards your shoulder, keeping your elbow slightly bent.","Pause for a moment at the top, then slowly lower your arm back down to the starting position.","Repeat the movement with the other arm.","Continue alternating arms for the desired number of repetitions."]],["Exercise Ball Back Extension With Arms Extended","1333-PERjVm8","spine","glutes",["glutes","hamstrings"],["Place the stability ball on the ground and lie face down on top of it, with your hips resting on the ball and your feet against a wall for stability.","Extend your arms straight out in front of you, with your palms facing down.","Engage your core and slowly lift your upper body off the ball, keeping your back straight and your neck in line with your spine.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Exercise Ball Back Extension With Hands Behind Head","1334-o1HGDSq","spine","glutes",["glutes","hamstrings"],["Place the stability ball on the ground and lie face down on top of it with your hips resting on the ball.","Position your feet against a wall or other stable surface for support.","Cross your arms behind your head, with your hands touching the back of your head.","Engage your core and slowly lift your upper body off the ball, extending your back until your body forms a straight line from your head to your hips.","Pause for a moment at the top of the movement, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Exercise Ball Back Extension With Knees Off Ground","1335-WME869U","spine","glutes",["glutes","hamstrings"],["Place the stability ball on the ground and lie face down on top of it, with your hips resting on the ball and your feet against a wall for stability.","Position your hands behind your head or crossed over your chest.","Engage your core and slowly lift your upper body off the ball, extending your back until your body forms a straight line from your head to your heels.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Exercise Ball Back Extension With Rotation","1336-WVD66ff","spine","glutes",["glutes","hamstrings"],["Start by lying face down on the stability ball with your hips resting on the ball and your feet firmly planted on the ground.","Place your hands behind your head or cross them over your chest.","Engage your core and slowly lift your upper body off the ball, extending your back until your body forms a straight line from your head to your heels.","Pause for a moment at the top, then slowly rotate your torso to one side, keeping your hips and legs stable.","Return to the center and repeat the rotation to the other side.","Lower your upper body back down to the starting position and repeat for the desired number of repetitions."]],["Exercise Ball Dip","1744-kprile3","triceps","chest",["chest","shoulders"],["Sit on the stability ball with your feet flat on the ground and your knees bent at a 90-degree angle.","Place your hands on the ball beside your hips, fingers pointing forward.","Engage your triceps and push through your hands to lift your body off the ball, straightening your arms.","Lower your body back down by bending your elbows, keeping them close to your sides.","Repeat for the desired number of repetitions."]],["Exercise Ball Hip Flexor Stretch","1559-2LQkNPW","glutes","quadriceps",["quadriceps","hamstrings"],["Place the stability ball on the ground and kneel in front of it.","Place your right foot on top of the stability ball, with your knee bent at a 90-degree angle.","Extend your left leg behind you, keeping it straight.","Lean forward, pushing your hips towards the stability ball, until you feel a stretch in your right hip flexor.","Hold the stretch for 20-30 seconds, then switch sides and repeat."]],["Exercise Ball Hug","1338-d7z1Y7V","spine","shoulders",["shoulders","chest"],["Sit on the stability ball with your feet flat on the ground and your back straight.","Hold the stability ball with both hands, hugging it close to your chest.","Engage your core muscles and slowly lean back, keeping your back straight and your feet planted on the ground.","Continue leaning back until you feel a stretch in your back muscles.","Hold the position for a few seconds, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Exercise Ball Lat Stretch","1339-sM84pE4","lats","shoulders",["shoulders","triceps"],["Sit on a stability ball with your feet flat on the ground and your back straight.","Hold a dumbbell in one hand and extend your arm straight up overhead.","Slowly lean to the opposite side, feeling a stretch in your lat muscle.","Hold the stretch for 20-30 seconds, then return to the starting position.","Repeat on the other side."]],["Exercise Ball Lower Back Stretch (Pyramid)","1341-yU7w7CA","lats","glutes",["glutes","hamstrings"],["Sit on the stability ball with your feet flat on the ground and your knees bent at a 90-degree angle.","Slowly walk your feet forward, rolling the ball down your back until your lower back is resting on the ball.","Place your hands behind your head or cross them over your chest.","Engage your core and slowly lower your upper body towards the ground, allowing your lower back to stretch over the ball.","Hold the stretch for a few seconds, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Exercise Ball Lying Side Lat Stretch","1342-rTbyBYV","lats","shoulders",["shoulders","triceps"],["Lie on your side with your legs extended and your head supported by the stability ball.","Place your top arm on the ball for stability.","Reach your top arm overhead and allow your torso to rotate slightly.","Feel the stretch in your lat muscles on the side of your body.","Hold the stretch for 20-30 seconds, then switch sides and repeat."]],["Exercise Ball On The Wall Calf Raise","1382-xo6sENf","calves","hamstrings",["hamstrings","quadriceps"],["Stand with your back against a wall and place an exercise ball between your lower back and the wall.","Position your feet shoulder-width apart, with your toes pointing forward.","Hold a dumbbell in each hand, with your arms extended by your sides.","Raise your heels off the ground, lifting your body weight onto the balls of your feet.","Pause for a moment at the top, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Exercise Ball On The Wall Calf Raise (Tennis Ball Between Ankles)","3241-FY3UdNT","calves","hamstrings",["hamstrings","quadriceps"],["Stand facing a wall with your feet shoulder-width apart.","Place an exercise ball between the wall and your lower back.","Hold a dumbbell in each hand, with your arms extended by your sides.","Place a tennis ball between your ankles.","Raise your heels off the ground, lifting your body up onto your toes.","Pause for a moment at the top, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Exercise Ball On The Wall Calf Raise (Tennis Ball Between Knees)","3240-j74M6Zn","calves","quadriceps",["quadriceps","hamstrings"],["Stand with your back against a wall and place an exercise ball between your lower back and the wall.","Position your feet shoulder-width apart and slightly in front of you.","Hold a dumbbell in each hand, with your arms extended by your sides.","Place a tennis ball between your knees.","Raise your heels off the ground, lifting your body up onto your toes.","Pause for a moment at the top, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Exercise Ball One Leg Prone Lower Body Rotation","1416-M72BExt","glutes","hamstrings",["hamstrings","quadriceps","core"],["Lie face down on the stability ball with your hips resting on the ball and your legs extended straight behind you.","Place your hands on the ground in front of you for support.","Engage your glutes and core muscles to stabilize your body.","Slowly lift one leg off the ground, keeping it straight and parallel to the floor.","Rotate your leg outward, away from your body, while keeping your hips and upper body stable.","Pause for a moment at the end of the rotation, then slowly return your leg to the starting position.","Repeat the rotation with the other leg.","Continue alternating legs for the desired number of repetitions."]],["Exercise Ball One Legged Diagonal Kick Hamstring Curl","1417-GOJKFfO","glutes","hamstrings",["hamstrings","calves"],["Start by lying on your back with your legs extended and your heels resting on top of the stability ball.","Place your arms by your sides for stability.","Engage your glutes and core muscles to lift your hips off the ground, creating a straight line from your shoulders to your heels.","Bend your right knee and bring it towards your chest, keeping your left leg extended and your foot flexed.","Kick your right leg diagonally across your body, extending it fully and engaging your hamstrings.","Slowly return your right leg to the starting position, maintaining control and stability.","Repeat the movement with your left leg, alternating sides for the desired number of repetitions."]],["Exercise Ball Pike Push Up","1296-sVvXT5J","pectorals","shoulders",["shoulders","triceps","core"],["Start in a push-up position with your hands on the floor and your shins resting on the stability ball.","Engage your core and lift your hips up towards the ceiling, rolling the ball towards your hands.","Keep your legs straight and your body in a pike position, forming an inverted V shape.","Bend your elbows and lower your upper body towards the floor, keeping your head in line with your hands.","Push through your hands and extend your arms to return to the starting position.","Repeat for the desired number of repetitions."]],["Exercise Ball Prone Leg Raise","1343-lCKm4Rs","spine","abdominals",["abdominals","glutes"],["Lie face down on a mat with your legs extended and your toes resting on top of the stability ball.","Place your hands on the ground, shoulder-width apart, and engage your core muscles.","Keeping your legs straight, slowly lift them off the ground, using your lower back and glutes to raise them as high as possible.","Pause for a moment at the top, then slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Exercise Ball Seated Hamstring Stretch","1560-yRYyfdA","hamstrings","glutes",["glutes","lower back"],["Sit on the stability ball with your feet flat on the ground and your knees bent at a 90-degree angle.","Slowly roll the ball forward, walking your feet out until your upper back is resting on the ball and your legs are extended straight in front of you.","Place your hands on your hips for support.","Engage your core and slowly lower your upper body towards the ground, keeping your back straight and your chest lifted.","Stop when you feel a stretch in your hamstrings, and hold the position for 20-30 seconds.","Slowly return to the starting position by pushing through your heels and using your hamstrings to pull yourself back up.","Repeat for the desired number of repetitions."]],["Exercise Ball Seated Triceps Stretch","1745-7ePTw4B","triceps","shoulders",["shoulders"],["Sit on a stability ball with your feet flat on the ground and your back straight.","Hold a dumbbell in one hand and extend your arm straight up above your head.","Bend your elbow and lower the dumbbell behind your head, keeping your upper arm close to your ear.","Hold the stretch for a few seconds, then return to the starting position.","Repeat with the other arm."]],["Exercise Ball Supine Triceps Extension","1746-Gm2Uv1z","triceps","shoulders",["shoulders"],["Sit on an exercise ball with your feet flat on the ground and your knees bent at a 90-degree angle.","Hold a dumbbell with both hands and extend your arms straight up towards the ceiling.","Slowly lower the dumbbell behind your head, keeping your elbows close to your ears.","Pause for a moment, then raise the dumbbell back up to the starting position.","Repeat for the desired number of repetitions."]],["Ez Bar French Press On Exercise Ball","1747-CFN9P8G","triceps","shoulders",["shoulders"],["Sit on an exercise ball and hold an EZ barbell with an overhand grip.","Extend your arms straight up, keeping your elbows close to your head.","Slowly lower the barbell behind your head by bending your elbows.","Pause for a moment, then extend your arms back up to the starting position.","Repeat for the desired number of repetitions."]],["Ez Bar Lying Bent Arms Pullover","3010-nDK1HJ0","lats","triceps",["triceps","chest"],["Lie flat on a bench with your head at one end and your feet on the floor.","Hold the EZ barbell with a pronated grip (palms facing away from you) and your hands shoulder-width apart.","Extend your arms straight above your chest, keeping a slight bend in your elbows.","Lower the barbell in an arc motion behind your head, maintaining the slight bend in your elbows.","Pause for a moment, then return the barbell to the starting position by reversing the arc motion.","Repeat for the desired number of repetitions."]],["Ez Bar Lying Close Grip Triceps Extension Behind Head","1748-6CKUx7o","triceps","shoulders",["shoulders"],["Lie flat on a bench with your feet flat on the ground and your head at the end of the bench.","Hold the ez barbell with a close grip, palms facing up, and extend your arms straight up over your chest.","Keeping your upper arms stationary, slowly lower the barbell behind your head by bending your elbows.","Pause for a moment, then extend your arms back up to the starting position.","Repeat for the desired number of repetitions."]],["Ez Bar Reverse Grip Bent Over Row","1344-G8dXpNG","upper back","biceps",["biceps","forearms"],["Stand with your feet shoulder-width apart and knees slightly bent.","Hold the ez barbell with an underhand grip, palms facing up, and hands shoulder-width apart.","Bend forward at the hips, keeping your back straight and chest up, until your torso is almost parallel to the floor.","Pull the ez barbell towards your lower chest, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower the ez barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Ez Bar Seated Close Grip Concentration Curl","1682-Dsfz0Id","biceps","forearms",["forearms"],["Sit on a bench with your feet flat on the ground and hold an EZ barbell with an underhand grip.","Rest your elbow on the inside of your thigh, just above the knee.","Curl the barbell up towards your shoulder while keeping your upper arm stationary.","Squeeze your biceps at the top of the movement, then slowly lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Ez Bar Standing French Press","1749-1cTf2Ux","triceps","shoulders",["shoulders"],["Stand with your feet shoulder-width apart and hold the ez barbell with an overhand grip.","Raise the barbell above your head, fully extending your arms.","Keeping your upper arms close to your head, slowly lower the barbell behind your head by bending your elbows.","Pause for a moment, then extend your arms back to the starting position.","Repeat for the desired number of repetitions."]],["Ez Barbell Anti Gravity Press","0445-fprd84i","delts","triceps",["triceps","chest"],["Start by standing with your feet shoulder-width apart and holding the ez barbell with an overhand grip.","Raise the barbell to shoulder height, keeping your elbows slightly bent and your palms facing forward.","Press the barbell overhead, extending your arms fully.","Lower the barbell back to shoulder height and repeat for the desired number of repetitions."]],["Ez Barbell Close Grip Preacher Curl","1627-hacCyUv","biceps","forearms",["forearms"],["Sit on a preacher curl bench and place your upper arms on the pad, gripping the ez barbell with an underhand grip.","Rest your triceps on the pad and fully extend your arms, keeping your back straight.","Slowly curl the barbell towards your shoulders, contracting your biceps.","Pause for a moment at the top, squeezing your biceps.","Lower the barbell back to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Ez Barbell Close-grip Curl","0446-V4ryaZa","biceps","forearms",["forearms"],["Stand up straight with your feet shoulder-width apart and hold the ez barbell with an underhand grip, hands shoulder-width apart.","Keep your elbows close to your torso and your upper arms stationary throughout the movement.","Curl the barbell up towards your shoulders, contracting your biceps.","Pause for a moment at the top, then slowly lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Ez Barbell Curl","0447-6TG6x2w","biceps","forearms",["forearms"],["Stand up straight with your feet shoulder-width apart and hold the ez barbell with an underhand grip, palms facing up.","Keep your elbows close to your torso and your upper arms stationary throughout the movement.","Exhale as you curl the barbell up towards your shoulders, contracting your biceps.","Pause for a moment at the top, then inhale as you slowly lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Ez Barbell Decline Close Grip Face Press","0448-DgZQ11d","triceps","chest",["chest","shoulders"],["Lie on a decline bench with your head lower than your feet.","Grasp the ez barbell with a close grip, palms facing each other.","Extend your arms straight up above your chest, keeping your elbows close to your body.","Lower the barbell towards your forehead by bending your elbows.","Pause for a moment, then press the barbell back up to the starting position.","Repeat for the desired number of repetitions."]],["Ez Barbell Decline Triceps Extension","2186-CQHoDm0","triceps","shoulders",["shoulders"],["Lie on a decline bench with your head lower than your feet and your feet secured.","Hold the ez barbell with an overhand grip, hands shoulder-width apart.","Extend your arms fully, keeping your elbows close to your head.","Lower the barbell slowly towards your forehead, bending your elbows.","Pause for a moment, then extend your arms back to the starting position.","Repeat for the desired number of repetitions."]],["Ez Barbell Incline Triceps Extension","0449-KyLtiLT","triceps","shoulders",["shoulders"],["Set up an incline bench at a 45-degree angle.","Sit on the bench with your back against the pad and hold the ez barbell with an overhand grip.","Extend your arms fully overhead, keeping your elbows close to your head.","Lower the barbell behind your head by bending your elbows, keeping your upper arms stationary.","Pause for a moment, then extend your arms back to the starting position.","Repeat for the desired number of repetitions."]],["Ez Barbell Jm Bench Press","0450-hnOYgH3","triceps","chest",["chest","shoulders"],["Lie flat on a bench with your feet flat on the ground and your back pressed against the bench.","Grasp the ez barbell with an overhand grip, slightly wider than shoulder-width apart.","Lower the barbell to your chest, keeping your elbows tucked in close to your body.","Push the barbell back up to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Ez Barbell Reverse Grip Curl","0451-Y5X65IB","biceps","forearms",["forearms"],["Stand up straight with your feet shoulder-width apart and hold the ez barbell with an underhand grip.","Keep your elbows close to your torso and your upper arms stationary throughout the exercise.","Curl the barbell upwards by contracting your biceps, while exhaling.","Continue to raise the barbell until your biceps are fully contracted and the barbell is at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Slowly begin to bring the barbell back to the starting position as you inhale.","Repeat for the desired number of repetitions."]],["Ez Barbell Reverse Grip Preacher Curl","0452-vBNyir7","biceps","forearms",["forearms"],["Sit on a preacher bench with your chest against the pad and your feet flat on the floor.","Grasp the ez barbell with an underhand grip, hands shoulder-width apart.","Rest your upper arms on the pad, allowing your forearms to hang down.","Keeping your upper arms stationary, exhale and curl the barbell up towards your shoulders.","Pause for a moment at the top, then inhale and slowly lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Ez Barbell Seated Curls","1458-jtFKbt5","biceps","forearms",["forearms"],["Sit on a bench with your feet flat on the ground and your back straight.","Hold the ez barbell with an underhand grip, palms facing up, and your hands shoulder-width apart.","Rest your upper arms on your thighs, allowing the ez barbell to hang down in front of you.","Keeping your upper arms stationary, exhale and curl the ez barbell upwards towards your shoulders.","Pause for a moment at the top, squeezing your biceps.","Inhale and slowly lower the ez barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Ez Barbell Seated Triceps Extension","0453-iaapw0g","triceps","shoulders",["shoulders"],["Sit on a bench with your back straight and feet flat on the ground.","Hold the ez barbell with an overhand grip, hands shoulder-width apart.","Raise the barbell overhead, fully extending your arms.","Keeping your upper arms stationary, lower the barbell behind your head by bending your elbows.","Pause for a moment, then raise the barbell back to the starting position by extending your arms.","Repeat for the desired number of repetitions."]],["Ez Barbell Spider Curl","0454-Ye5Qxb0","biceps","forearms",["forearms"],["Stand with your feet shoulder-width apart and hold the ez barbell with an underhand grip, palms facing up.","Rest your upper arms on a preacher bench or stability ball, allowing your elbows to hang down.","Keeping your upper arms stationary, exhale and curl the barbell up towards your shoulders.","Pause for a moment at the top, squeezing your biceps.","Inhale and slowly lower the barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Ez-bar Biceps Curl (With Arm Blaster)","2404-tJ5nYqo","biceps","forearms",["forearms"],["Stand up straight with your feet shoulder-width apart and hold the ez barbell with an underhand grip, palms facing up.","Place your upper arms against the arm blaster, keeping them stationary throughout the exercise.","Keeping your elbows close to your body, exhale and curl the barbell up towards your shoulders.","Pause for a moment at the top, squeezing your biceps.","Inhale and slowly lower the barbell back to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Ez-bar Close-grip Bench Press","2432-da4cXST","triceps","chest",["chest","shoulders"],["Lie flat on a bench with your feet flat on the ground and your back pressed against the bench.","Grasp the ez barbell with a close grip, hands shoulder-width apart, palms facing forward.","Lift the barbell off the rack and hold it directly above your chest with your arms fully extended.","Slowly lower the barbell towards your chest, keeping your elbows close to your body.","Pause for a moment when the barbell touches your chest.","Push the barbell back up to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Ez-barbell Standing Wide Grip Biceps Curl","2741-OVTZ65k","biceps","forearms",["forearms"],["Stand up straight with your feet shoulder-width apart and hold the ez barbell with an underhand grip, hands wider than shoulder-width apart.","Keep your elbows close to your torso and your upper arms stationary throughout the movement.","Curl the barbell up towards your shoulders by contra
