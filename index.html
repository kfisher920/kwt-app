up.","Repeat for the desired number of repetitions."]],["Lever Chest Press","0577-T0yTjgW","pectorals","triceps",["triceps","shoulders"],["Adjust the seat height and position yourself on the machine with your back flat against the pad.","Grasp the handles with an overhand grip and position your elbows at a 90-degree angle.","Push the handles forward until your arms are fully extended, exhaling during the movement.","Pause briefly at the end of the movement, then slowly return to the starting position, inhaling as you do so.","Repeat for the desired number of repetitions."]],["Lever Deadlift","0578-GUT8I22","glutes","hamstrings",["hamstrings","quadriceps"],["Adjust the seat height and foot platform to your desired position.","Sit on the machine with your back against the pad and your feet flat on the foot platform.","Grasp the handles or the sides of the seat for stability.","Engage your glutes and hamstrings, and push through your heels to lift the weight up.","Keep your back straight and avoid rounding your shoulders.","Extend your hips fully at the top of the movement, squeezing your glutes.","Lower the weight back down in a controlled manner, keeping tension on your glutes and hamstrings.","Repeat for the desired number of repetitions."]],["Lever Decline Chest Press","1300-vsVoPHt","pectorals","triceps",["triceps","shoulders"],["Adjust the seat height and backrest of the leverage machine to a comfortable position.","Sit on the machine with your back against the backrest and your feet flat on the floor.","Grasp the handles with an overhand grip and position your hands slightly wider than shoulder-width apart.","Push the handles forward and away from your body until your arms are fully extended.","Slowly lower the handles back towards your chest, keeping your elbows slightly bent.","Pause for a moment at the bottom, then push the handles back to the starting position.","Repeat for the desired number of repetitions."]],["Lever Donkey Calf Raise","1253-C9LuR4A","calves","hamstrings",["hamstrings","glutes"],["Adjust the leverage machine to the appropriate height for your body.","Position yourself facing the machine, with your toes on the foot platform and your heels hanging off the edge.","Place your hands on the handles or the support bars for stability.","Engage your calves and lift your heels as high as possible, using the balls of your feet.","Pause for a moment at the top, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Lever Front Pulldown","0579-7F1DVzn","lats","biceps",["biceps","rhomboids","rear deltoids"],["Adjust the seat height and position yourself on the machine with your knees under the pads and your feet flat on the ground.","Grasp the handles with an overhand grip, slightly wider than shoulder-width apart.","Sit upright with your chest lifted and your shoulders back, maintaining a slight arch in your lower back.","Engage your lats and pull the handles down towards your chest, squeezing your shoulder blades together.","Pause for a moment at the bottom of the movement, then slowly release the handles back to the starting position.","Repeat for the desired number of repetitions."]],["Lever Gripless Shrug","0580-f91FwXG","traps","shoulders",["shoulders","forearms"],["Adjust the seat height and position yourself on the leverage machine.","Grasp the handles with your palms facing inwards and your arms fully extended.","Keeping your back straight, exhale and elevate your shoulders as high as possible.","Hold the contraction for a brief moment, then inhale and slowly lower your shoulders back down to the starting position.","Repeat for the desired number of repetitions."]],["Lever Gripless Shrug V. 2","1439-cbuFJrn","traps","shoulders",["shoulders","forearms"],["Adjust the seat height and position yourself on the machine with your back against the pad.","Grasp the handles or bars with an overhand grip, keeping your arms straight.","Keeping your back straight, lift your shoulders up towards your ears as high as possible.","Hold the contraction for a moment, then slowly lower your shoulders back down to the starting position.","Repeat for the desired number of repetitions."]],["Lever Gripper Hands","2288-mKwcrHn","forearms","biceps",["biceps","triceps"],["Adjust the seat height and grip the handles of the leverage machine.","Keep your back straight and your feet flat on the ground.","Exhale and squeeze the handles, contracting your forearms.","Hold the contraction for a second, then slowly release and return to the starting position.","Repeat for the desired number of repetitions."]],["Lever Hammer Grip Preacher Curl","1615-OAguZoG","biceps","forearms",["forearms"],["Adjust the seat height and position yourself on the leverage machine.","Place your upper arms on the preacher pad, ensuring your chest is pressed against it.","Grasp the handles with a hammer grip (palms facing each other).","Keeping your upper arms stationary, exhale and curl the handles towards your shoulders.","Pause for a moment at the top, squeezing your biceps.","Inhale and slowly lower the handles back to the starting position.","Repeat for the desired number of repetitions."]],["Lever High Row","0581-nZZZy9m","upper back","biceps",["biceps","rear deltoids"],["Adjust the seat height and foot platform to a comfortable position.","Sit on the machine with your chest against the pad and your feet flat on the foot platform.","Grasp the handles with an overhand grip, slightly wider than shoulder-width apart.","Keep your back straight and engage your core.","Pull the handles towards your body, squeezing your shoulder blades together.","Pause for a moment at the peak of the movement, then slowly release the handles back to the starting position.","Repeat for the desired number of repetitions."]],["Lever Hip Extension V. 2","2286-OPqShYN","glutes","hamstrings",["hamstrings"],["Adjust the machine to fit your body and sit on it with your back against the backrest.","Place your feet on the footrests and grip the handles for stability.","Engage your glutes and hamstrings, then push against the footrests to extend your hips and raise your legs backward.","Pause for a moment at the top, then slowly lower your legs back to the starting position.","Repeat for the desired number of repetitions."]],["Lever Horizontal One Leg Press","2611-9KU9TYF","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Adjust the seat of the machine so that your knees are at a 90-degree angle when your feet are on the footplate.","Sit on the machine with your back against the backrest and your feet shoulder-width apart on the footplate.","Place your hands on the handles or sides of the machine for stability.","Push the footplate away from your body by extending your leg, keeping your back against the backrest.","Pause for a moment at the fully extended position, then slowly bend your leg to return to the starting position.","Repeat for the desired number of repetitions, then switch legs."]],["Lever Incline Chest Press","1299-jHAnWmT","pectorals","shoulders",["shoulders","triceps"],["Adjust the seat and backrest of the leverage machine to a comfortable position.","Sit on the machine with your back against the backrest and your feet flat on the floor.","Grasp the handles with an overhand grip and position your hands slightly wider than shoulder-width apart.","Push the handles forward and away from your body until your arms are fully extended.","Pause for a moment, then slowly bend your elbows and lower the handles back towards your chest.","Repeat for the desired number of repetitions."]],["Lever Incline Chest Press V. 2","1479-o17Jfkt","pectorals","triceps",["triceps","shoulders"],["Adjust the seat height and backrest angle on the leverage machine to a comfortable position.","Sit on the machine with your back against the backrest and your feet flat on the floor.","Grasp the handles with an overhand grip and position your hands slightly wider than shoulder-width apart.","Push the handles forward and away from your body until your arms are fully extended, but without locking your elbows.","Pause for a moment at the fully extended position, then slowly bend your elbows and lower the handles back towards your chest.","Repeat for the desired number of repetitions."]],["Lever Kneeling Leg Curl","0582-nnmCTLN","hamstrings","glutes",["glutes"],["Adjust the machine to fit your body and select the desired weight.","Kneel on the machine facing downwards, with your knees resting on the pad and your feet secured under the footpads.","Grasp the handles or the sides of the machine for stability.","Keeping your upper body stationary, exhale and curl your legs up towards your glutes by flexing your knees.","Pause for a moment at the top of the movement, squeezing your hamstrings.","Inhale and slowly lower your legs back to the starting position, fully extending your knees.","Repeat for the desired number of repetitions."]],["Lever Kneeling Twist","0583-sZOR9EV","abs","obliques",["obliques","lower back"],["Adjust the seat height and position yourself on the machine with your knees resting on the pads and your upper body facing forward.","Grasp the handles or the sides of the machine for stability.","Keeping your core engaged, twist your torso to one side as far as comfortably possible.","Pause for a moment, then slowly return to the starting position.","Repeat the twist to the opposite side.","Continue alternating sides for the desired number of repetitions."]],["Lever Lateral Raise","0584-dRTfGZT","delts","traps",["traps","upper back"],["Adjust the seat height and position yourself on the machine with your back against the pad.","Grasp the handles with an overhand grip and keep your arms straight.","Exhale and raise your arms out to the sides until they are parallel to the floor.","Pause for a moment at the top, then inhale and slowly lower your arms back to the starting position.","Repeat for the desired number of repetitions."]],["Lever Leg Extension","0585-my33uHU","quads","hamstrings",["hamstrings"],["Adjust the seat height and backrest of the machine to fit your body.","Sit on the machine with your back against the backrest and your feet on the footpad.","Grasp the handles or sidebars for stability.","Extend your legs forward by straightening your knees, lifting the weight.","Pause for a moment at the top, then slowly lower the weight back to the starting position.","Repeat for the desired number of repetitions."]],["Lever Lying Leg Curl","0586-17lJ1kr","hamstrings","calves",["calves"],["Adjust the machine to fit your body and select the desired weight.","Lie face down on the machine with your legs straight and your heels against the padded lever.","Grasp the handles or the sides of the machine for stability.","Keeping your upper body stationary, exhale and curl your legs up as far as possible without lifting your hips off the pad.","Hold the contracted position for a brief pause as you squeeze your hamstrings.","Inhale and slowly lower the lever back to the starting position.","Repeat for the desired number of repetitions."]],["Lever Lying Two-one Leg Curl","3195-UXpKJoq","hamstrings","glutes",["glutes"],["Adjust the machine to fit your body and sit on it with your back against the backrest.","Place your legs on the lever pad, just above your ankles.","Grasp the handles on the sides of the machine for support.","Keeping your upper body still, exhale and curl your legs up towards your glutes.","Pause for a moment at the top, then inhale and slowly lower your legs back to the starting position.","Repeat for the desired number of repetitions."]],["Lever Military Press","0587-CggQhII","delts","triceps",["triceps","upper chest"],["Adjust the seat height and position yourself on the machine with your back against the backrest.","Grasp the handles with an overhand grip and position your hands slightly wider than shoulder-width apart.","Push the handles upward until your arms are fully extended, but do not lock your elbows.","Pause for a moment at the top, then slowly lower the handles back down to the starting position.","Repeat for the desired number of repetitions."]],["Lever Narrow Grip Seated Row","0588-IGjKj1v","upper back","biceps",["biceps","forearms"],["Adjust the seat height and footrests to ensure proper form.","Sit on the machine with your feet flat on the footrests and your knees slightly bent.","Grasp the handles with a narrow grip, palms facing each other.","Keep your back straight and lean slightly forward.","Pull the handles towards your torso, squeezing your shoulder blades together.","Pause for a moment at the peak of the movement.","Slowly release the handles and return to the starting position.","Repeat for the desired number of repetitions."]],["Lever One Arm Bent Over Row","0589-Fhdtwf3","upper back","biceps",["biceps","forearms"],["Stand with your feet shoulder-width apart, knees slightly bent, and hold a barbell with an overhand grip.","Bend forward at the hips, keeping your back straight and your head up.","Let the barbell hang in front of you with your arms fully extended.","Pull the barbell up towards your chest, keeping your elbows close to your body.","Squeeze your shoulder blades together at the top of the movement.","Lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Lever One Arm Lateral High Row","1356-OIFMAp1","upper back","biceps",["biceps","shoulders"],["Adjust the seat height and position yourself facing the machine.","Grasp the handle with one hand and keep your back straight.","Pull the handle towards your body, keeping your elbow close to your side.","Squeeze your back muscles at the top of the movement.","Slowly release the handle back to the starting position.","Repeat for the desired number of repetitions."]],["Lever One Arm Lateral Wide Pulldown","1347-tTuZSDT","lats","biceps",["biceps","rhomboids","rear deltoids"],["Adjust the seat height zing your biceps.","Inhale and slowly lower the handles back to the starting position.","Repeat for the desired number of repetitions."]],["Lever Preacher Curl V. 2","1614-ye84CTU","biceps","forearms",["forearms"],["Adjust the seat height and position yourself on the machine with your upper arms resting on the pad and your chest against the support.","Grasp the handles with an underhand grip, slightly wider than shoulder-width apart.","Keep your upper arms stationary and exhale as you curl the handles towards your shoulders, contracting your biceps.","Pause for a moment at the top of the movement, squeezing your biceps.","Inhale as you slowly lower the handles back to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Lever Pullover","2285-4U7iLb5","lats","triceps",["triceps","shoulders"],["Adjust the seat and handles of the leverage machine to a comfortable position.","Sit on the machine with your back against the pad and grasp the handles with an overhand grip.","Keep your arms slightly bent and your core engaged.","Slowly pull the handles towards your chest, squeezing your lats.","Pause for a moment at the peak contraction, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Lever Reverse Grip Lateral Pulldown","2736-ky8FLU8","lats","biceps",["biceps","rhomboids","rear deltoids"],["Adjust the seat height and position yourself on the machine with your knees under the pads and your feet flat on the ground.","Grasp the handles with an overhand grip, slightly wider than shoulder-width apart.","Sit upright with your chest out and shoulders back, maintaining a slight arch in your lower back.","Pull the handles down towards your chest, leading with your elbows and squeezing your shoulder blades together.","Pause for a moment at the bottom of the movement, then slowly release the handles back to the starting position.","Repeat for the desired number of repetitions."]],["Lever Reverse Grip Preacher Curl","1616-kj3hy6W","biceps","forearms",["forearms"],["Adjust the seat height and position yourself on the leverage machine.","Grasp the handles with an underhand grip, palms facing up.","Rest your upper arms on the preacher pad, ensuring your elbows are fully extended.","Keeping your upper arms stationary, exhale and curl the handles towards your shoulders.","Pause for a moment at the top of the movement, squeezing your biceps.","Inhale and slowly lower the handles back to the starting position, fully extending your elbows.","Repeat for the desired number of repetitions."]],["Lever Reverse Grip Vertical Row","1348-ZqNOWQ6","upper back","biceps",["biceps","forearms"],["Adjust the seat height and footplate position to ensure proper alignment.","Sit on the machine with your chest against the pad and your feet flat on the footplate.","Grasp the handles with an underhand grip, palms facing up.","Keep your back straight and engage your core.","Pull the handles towards your chest, squeezing your shoulder blades together.","Pause for a moment at the top of the movement, then slowly release and extend your arms back to the starting position.","Repeat for the desired number of repetitions."]],["Lever Reverse Hyperextension","0593-Krmb3cB","glutes","hamstrings",["hamstrings","lower back"],["Adjust the leverage machine to fit your body and secure your feet in the foot pads.","Lie face down on the machine with your upper body hanging off the edge and your hips resting on the pad.","Cross your arms over your chest or place them behind your head.","Engage your glutes and hamstrings to lift your legs upward until they are parallel to the ground.","Pause for a moment at the top, then slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Lever Reverse T-bar Row","1349-BgljGjd","upper back","biceps",["biceps","forearms"],["Adjust the seat height and footplate position on the leverage machine.","Sit on h as possible.","Pause for a moment at the top, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Lever Seated Crunch","1452-Wgaz7pm","abs","obliques",["obliques"],["Sit on the leverage machine with your back against the pad and your feet flat on the floor.","Grasp the handles or place your hands on the side pads for support.","Engage your abs and slowly lean back, allowing the pad to move with you.","Once your upper body is at a 45-degree angle, contract your abs and crunch forward, bringing your chest towards your knees.","Pause for a moment at the top, then slowly release and return to the starting position.","Repeat for the desired number of repetitions."]],["Lever Seated Crunch (Chest Pad)","0595-ZnJHhMk","abs","obliques",["obliques"],["Adjust the seat height and chest pad position according to your comfort.","Sit on the machine with your back against the chest pad and your feet flat on the floor.","Grasp the handles or side bars for stability.","Engage your abs and slowly lean back, allowing the chest pad to move with you.","Pause for a moment at the maximum contraction, feeling the tension in your abs.","Slowly return to the starting position by contracting your abs and pulling yourself back up.","Repeat for the desired number of repetitions."]],["Lever Seated Crunch V. 2","3760-eXFXCY0","abs","obliques",["obliques","hip flexors"],["Sit on the leverage machine with your back against the pad and your feet secured under the footpads.","Place your hands on the handles or the sides of the seat for support.","Engage your abs and slowly crunch forward, bringing your chest towards your knees.","Pause for a moment at the top of the movement, squeezing your abs.","Slowly return to the starting position, allowing your back to round slightly.","Repeat for the desired number of repetitions."]],["Lever Seated Dip","1451-BRImeP8","triceps","chest",["chest","shoulders"],["Adjust the seat height so that your feet are flat on the ground and your knees are at a 90-degree angle.","Grasp the handles of the leverage machine with your palms facing down and your arms fully extended.","Slowly lower your body by bending your elbows until your upper arms are parallel to the ground.","Pause for a moment, then push yourself back up to the starting position by straightening your arms.","Repeat for the desired number of repetitions."]],["Lever Seated Fly","0596-v3xmPAR","pectorals","deltoids",["deltoids","trapezius"],["Adjust the seat height and position yourself on the machine with your back against the pad.","Grasp the handles with a pronated grip and keep your elbows slightly bent.","Exhale and push the handles forward, bringing them together in front of your chest.","Pause for a moment, squeezing your chest muscles.","Inhale and slowly return to the starting position, allowing your chest muscles to stretch.","Repeat for the desired number of repetitions."]],["Lever Seated Good Morning","3759-XsCcxCC","glutes","hamstrings",["hamstrings","lower back"],["Adjust the seat height so that your hips are slightly higher than your knees.","Sit on the machine with your back against the pad and your feet flat on the footrests.","Grasp the handles or the sides of the seat for stability.","Keeping your back straight, slowly lean forward from your hips until your upper body is parallel to the ground.","Pause for a moment, then slowly return to the starting position by pushing through your glutes and hamstrings.","Repeat for the desired number of repetitions."]],["Lever Seated Hip Abduction","0597-CHpahtl","abductors","glutes",["glutes","hamstrings"],["Adjust the seat height so that your knees are at a 90-degree angle.","Sit on the machine with your back against the backrest and your feet on the footrests.","Place your hands on the side handles for stability.","Engage your abductors and slowly push your legs apart, away from the midline of your body.","Pause for a moment at the end of the movement, then slowly bring your legs back together to the starting position.","Repeat for the desired number of repetitions."]],["Lever Seated Hip Adduction","0598-oHsrypV","adductors","hamstrings",["hamstrings","glutes"],["Adjust the seat height and position yourself on the machine with your back against the backrest.","Place your feet on the footrests and grasp the handles for stability.","Engage your adductor muscles and slowly bring your legs together, squeezing your inner thighs.","Pause for a moment at the peak contraction, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Lever Seated Leg Curl","0599-Zg3XY7P","hamstrings","calves",["calves"],["Adjust the machine to fit your body and sit on it with your back against the backrest.","Place your lower legs under the padded lever, just above your ankles.","Grasp the handles on the sides of the machine for support.","Keeping your upper legs stationary, exhale and curl your legs up as far as possible.","Hold the contracted position for a brief pause as you squeeze your hamstrings.","Inhale and slowly lower the lever back to the starting position.","Repeat for the desired number of repetitions."]],["Lever Seated Leg Raise Crunch","0600-PQ2AtC3","abs","hip flexors",["hip flexors"],["Sit on the leverage machine with your back against the backrest and your feet on the footrests.","Grasp the handles or sidebars for stability.","Engage your abs and slowly raise your legs up towards your chest, curling your torso forward at the same time.","Pause for a moment at the top, then slowly lower your legs and torso back to the starting position.","Repeat for the desired number of repetitions."]],["Lever Seated Reverse Fly","0602-myfUsKf","delts","trapezius",["trapezius","rhomboids"],["Adjust the seat height and position yourself on the machine with your chest against the pad and your feet flat on the floor.","Grasp the handles with an overhand grip and keep your arms slightly bent.","Exhale and squeeze your shoulder blades together as you pull the handles back and outward, away from your body.","Pause for a moment at the peak contraction, then inhale and slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Lever Seated Reverse Fly (Parallel Grip)","0601-xiHiJcA","delts","trapezius",["trapezius","rhomboids"],["Adjust the seat height and position yourself on the machine with your chest against the pad and your feet flat on the floor.","Grasp the handles with a parallel grip, palms facing each other, and keep your arms slightly bent.","Exhale and squeeze your shoulder blades together as you pull the handles back and outward, away from your body.","Pause for a moment at the peak contraction, then inhale and slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Lever Seated Row","1350-7I6LNUG","upper back","biceps",["biceps","forearms"],["Adjust the seat height and footrests to a comfortable position.","Sit on the machine with your chest against the pad and your feet on the footrests.","Grasp the handles with an overhand grip, shoulder-width apart.","Keep your back straight and your core engaged.","Pull the handles towards your body, squeezing your shoulder blades together.","Pause for a moment at the peak of the movement.","Slowly release the handles and return to the starting position.","Repeat for the desired number of repetitions."]],["Lever Seated Squat Calf Raise On Leg Press Machine","1385-IeDEXTe","calves","quadriceps",["quadriceps","hamstrings","glutes"],["Adjust the seat of the leg press machine so that your knees are slightly bent when your feet are on the footplate.","Sit on the machine with your back against the backrest and your feet flat on the footplate, shoulder-width apart.","Place your toes and the balls of your feet on the footplate, keeping your heels off the edge.","Release the safety handles and push the footplate away from you by extending your knees.","Once your knees are fully extended, slowly lower your heels by flexing your calves.","Pause for a moment at the bottom, then push the footplate back up by extending your calves.","Repeat for the desired number of repetitions."]],["Lever Shoulder Press","0603-67n3r98","delts","triceps",["triceps","chest"],["Adjust the seat height and position yourself on the machine with your back against the backrest.","Grasp the handles with an overhand grip and position your hands at shoulder level.","Push the handles upward until your arms are fully extended, but do not lock your elbows.","Pause for a moment at the top, then slowly lower the handles back down to the starting position.","Repeat for the desired number of repetitions."]],["Lever Shoulder Press V. 2","0869-vqsbmL0","delts","triceps",["triceps","chest"],["Adjust the seat height and backrest of the leverage machine to a comfortable position.","Sit on the machine with your back against the backrest and your feet flat on the floor.","Grasp the handles of the machine with an overhand grip, slightly wider than shoulder-width apart.","Push the handles upward and forward until your arms are fully extended, but not locked.","Pause for a moment at the top, then slowly lower the handles back down to the starting position.","Repeat for the desired number of repetitions."]],["Lever Shoulder Press V. 3","2318-dNFYIU1","delts","triceps",["triceps","chest"],["Adjust the seat height and backrest of the leverage machine to a comfortable position.","Sit on the machine with your back against the backrest and your feet flat on the floor.","Grasp the handles of the machine with an overhand grip, slightly wider than shoulder-width apart.","Push the handles upward and forward until your arms are fully extended, but not locked.","Pause for a moment at the top, then slowly lower the handles back down to the starting position.","Repeat for the desired number of repetitions."]],["Lever Shrug","0604-ZZKbeMw","traps","shoulders",["shoulders"],["Adjust the seat height and position yourself on the leverage machine with your back against the pad.","Grasp the handles with an overhand grip and keep your arms straight.","Keeping your back straight, lift your shoulders up towards your ears as high as possible.","Hold the contraction for a moment, then slowly lower your shoulders back down to the starting position.","Repeat for the desired number of repetitions."]],["Lever Standing Calf Raise","0605-ykUOVze","calves","soleus",["soleus","ankle stabilizers"],["Adjust the machine to your height and stand with your feet shoulder-width apart.","Place your shoulders under the pads and hold onto the handles for stability.","Raise your heels as high as possible by extending your ankles.","Pause for a moment at the top, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Lever Standing Chest Press","3758-WbNq5Xu","pectorals","shoulders",["shoulders","triceps"],["Adjust the seat height and position yourself on the machine with your feet flat on the ground.","Grasp the handles with an overhand grip and position your hands at chest level.","Push the handles forward until your arms are fully extended, keeping your elbows slightly bent.","Pause for a moment, then slowly bring the handles back towards your chest, maintaining control throughout the movement.","Repeat for the desired number of repetitions."]],["Lever T Bar Row","0606-aaXr7ld","upper back","biceps",["biceps","forearms"],["Adjust the seat height and footplate position to ensure proper alignment.","Sit on the machine with your chest against the pad and your feet flat on the footplate.","Grasp the handles with an overhand grip, slightly wider than shoulder-width apart.","Keep your back straight and engage your core.","Pull the handles towards your torso, squeezing your shoulder blades together.","Pause for a moment at the peak contraction, then slowly release the handles back to the starting position.","Repeat for the desired number of repetitions."]],["Lever T-bar Reverse Grip Row","1351-FVM1AUZ","upper back","biceps",["biceps","forearms"],["Adjust the seat height and position yourself on the machine with your chest against the pad and your feet flat on the floor.","Grasp the handles with an overhand grip, slightly wider than shoulder-width apart.","Keep your back straight and engage your core.","Pull the handles towards your chest, squeezing your shoulder blades together.","Pause for a moment at the top of the movement, then slowly release and extend your arms back to the starting position.","Repeat for the desired number of repetitions."]],["Lever Triceps Extension","0607-Ser9eQp","triceps","shoulders",["shoulders"],["Adjust the seat height and position yourself on the machine with your back against the pad.","Grasp the handles with an overhand grip and fully extend your arms in front of you.","Keeping your upper arms stationary, slowly lower the handles towards your forehead by bending your elbows.","Pause for a moment at the bottom, then push the handles back up to the starting position by extending your arms.","Repeat for the desired number of repetitions."]],["Lever Unilateral Row","1313-oROuvrX","upper back","biceps",["biceps","forearms"],["Adjust the seat height and position yourself facing the machine.","Grasp the handles with an overhand grip and keep your back straight.","Pull the handles towards your body, squeezing your shoulder blades together.","Pause for a moment at the peak of the movement, then slowly release and extend your arms back to the starting position.","Repeat for the desired number of repetitions."]],["London Bridge","0609-bLyQokI","upper back","shoulders",["shoulders","biceps","forearms"],["Attach the rope to a high anchor point.","Stand facing away from the anchor point with your feet shoulder-width apart.","Grasp the rope with an overhand grip, palms facing down.","Lean forward slightly, keeping your back straight and core engaged.","Pull the rope towards your body, squeezing your shoulder blades together.","Pause for a moment at the peak of the movement, then slowly release the tension and return to the starting position.","Repeat for the desired number of repetitions."]],["Low Glute Bridge On Floor","3013-u0cNiij","glutes","hamstrings",["hamstrings","core"],["Lie flat on your back with your knees bent and feet flat on the ground.","Place your arms by your sides, palms facing down.","Engage your glutes and core, then lift your hips off the ground until your body forms a straight line from your knees to your shoulders.","Pause for a moment at the top, squeezing your glutes.","Slowly lower your hips back down to the starting position.","Repeat for the desired number of repetitions."]],["Lower Back Curl","1352-ANbbry2","spine","glutes",["glutes","hamstrings"],["Lie flat on your stomach with your legs extended and your arms by your sides.","Engage your glutes and hamstrings, and slowly lift your upper body off the ground, curling your back upwards.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Lunge With Jump","3582-PM1PZjg","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Start by standing with your feet shoulder-width apart.","Take a step forward with your right foot, lowering your body into a lunge position.","Push off with your right foot and jump into the air, switching the position of your feet mid-air.","Land softly with your left foot forward and immediately lower your body into a lunge position.","Continue alternating between lunges and jumps for the desired number of repetitions."]],["Lunge With Twist","1688-K9VL0Jq","abs","quadriceps",["quadriceps","glutes","hamstrings"],["Start by standing with your feet shoulder-width apart.","Take a step forward with your right foot, lowering your body into a lunge position.","As you lunge, twist your torso to the right, bringing your left elbow towards your right knee.","Pause for a moment, then return to the starting position.","Repeat on the other side, stepping forward with your left foot and twisting your torso to the left.","Continue alternating sides for the desired number of repetitions."]],["Lying (Side) Quads Stretch","0613-BWnJR72","quads","hamstrings",["hamstrings"],["Lie on your side with your legs straight.","Bend your top leg and grab your ankle or foot with your hand.","Gently pull your ankle or foot towards your glutes until you feel a stretch in your quads.","Hold the stretch for 20-30 seconds.","Release the stretch and repeat on the other side."]],["Lying Elbow To Knee","2312-AQIhRjM","abs","hip flexors",["hip flexors","lower back"],["Lie flat on your back with your knees bent and feet flat on the ground.","Place your hands behind your head with your elbows pointing outwards.","Engage your abs and lift your upper body off the ground, bringing your right elbow towards your left knee.","At the same time, extend your right leg straight out and lift it off the ground.","Pause for a moment, then return to the starting position.","Repeat the movement, this time bringing your left elbow towards your right knee and extending your left leg.","Continue alternating sides for the desired number of repetitions."]],["Lying Leg Raise Flat Bench","0620-WhuFnR7","abs","hip flexors",["hip flexors"],["Lie flat on a flat bench with your back pressed against it.","Place your hands under your glutes for support.","Keep your legs straight and together, and lift them up towards the ceiling.","Pause for a moment at the top, then slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Lying Leg-hip Raise","0865-9IxJdtC","abs","hip flexors",["hip flexors"],["Lie flat on your back with your legs extended and your arms by your sides.","Place your hands under your glutes for support.","Engage your core and lift your legs off the ground, raising them towards the ceiling.","Pause for a moment at the top, then slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Machine Inner Chest Press","1301-wDN97Ca","pectorals","triceps",["triceps","shoulders"],["Adjust the seat height and position yourself on the machine with your back flat against the pad.","Grasp the handles with an overhand grip and position your elbows at a 90-degree angle.","Push the handles forward until your arms are fully extended, exhaling during the movement.","Pause for a moment at the end of the movement, then slowly return to the starting position, inhaling as you do so.","Repeat for the desired number of repetitions."]],["March Sit (Wall)","0624-sVQCCeG","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your back against a wall and your feet hip-width apart.","Slowly slide your back down the wall until your knees are bent at a 90-degree angle.","Lift your right foot off the ground and bring your knee towards your chest.","Lower your right foot back down and lift your left foot off the ground, bringing your knee towards your chest.","Continue alternating between lifting your right and left foot for the desired number of repetitions."]],["Medicine Ball Catch And Overhead Throw","1353-PsVS1QP","lats","shoulders",["shoulders","core"],["Stand with your feet shoulder-width apart, holding a medicine ball in both hands at chest level.","Bend your knees slightly and engage your core.","Lower your body into a squat position, keeping your back straight and chest up.","Explosively extend your hips and legs, while simultaneously throwing the medicine ball overhead.","Release the ball at the top of the movement and catch it on the way down.","Lower your body back into the squat position and repeat for the desired number of repetitions."]],["Medicine Ball Chest Pass","1302-aDoFKrE","pectorals","shoulders",["shoulders","triceps"],["Stand with your feet shoulder-width apart, holding the medicine ball at chest level.","Extend your arms forward, pushing the medicine ball away from your chest with force.","As you release the ball, follow through with your arms and torso, transferring your weight from your back foot to your front foot.","Catch the ball as it rebounds off the wall or partner, and immediately repeat the movement.","Continue for the desired number of repetitions."]],["Medicine Ball Chest Push From 3 Point Stance","1303-dCJnuVq","pectorals","shoulders",["shoulders","triceps"],["Start in a 3 point stance with one hand on the medicine ball and the other hand on the ground.","Extend your legs and position your body in a straight line.","Lower your chest towards the ground while keeping your back straight.","Push the medicine ball away from your body, extending your arm fully.","Return to the starting position and repeat for the desired number of repetitions."]],["Medicine Ball Chest Push Multiple Response","1304-7aolH9D","pectorals","triceps",["triceps","shoulders"],["Stand with your feet shoulder-width apart, holding a medicine ball at chest level.","Extend your arms forward, pushing the medicine ball away from your chest.","Pause for a moment, then slowly bring the medicine ball back to your chest.","Repeat for the desired number of repetitions."]],["Medicine Ball Chest Push Single Response","1305-jeHtrlO","pectorals","triceps",["triceps","shoulders"],["Stand with your feet shoulder-width apart, holding the medicine ball at chest level.","Extend your arms forward, pushing the medicine ball away from your chest.","Pause for a moment, then slowly bring the medicine ball back to your chest.","Repeat for the desired number of repetitions."]],["Medicine Ball Chest Push With Run Release","1312-pX9Elbe","pectorals","triceps",["triceps","shoulders","core"],["Stand with your feet shoulder-width apart, holding a medicine ball at chest level.","Step forward with your right foot and simultaneously push the medicine ball forward, extending your arms fully.","As you push the ball forward, release it and let it roll forward.","Quickly run forward and catch the ball before it hits the ground.","Once you catch the ball, bring it back to your chest and repeat the movement with your left foot forward.","Continue alternating legs and repeating the exercise for the desired number of repetitions."]],["Medicine Ball Close Grip Push Up","1701-8K7m2SS","triceps","chest",["chest","shoulders"],["Start in a high plank position with your hands on the medicine ball, shoulder-width apart.","Lower your body towards the ground by bending your elbows, keeping them close to your sides.","Push back up to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Medicine Ball Overhead Slam","1354-oHg8eop","upper back","shoulders",["shoulders","core"],["Stand with your feet shoulder-width apart, holding a medicine ball with both hands above your head.","Engage your core and keep your back straight.","Bend your knees slightly and forcefully slam the medicine ball down to the ground in front of you.","As you slam the ball down, use your entire body to generate power, including your shoulders and core.","Catch the ball on the bounce and repeat for the desired number of repetitions."]],["Medicine Ball Supine Chest Throw","1750-Al3tP0D","triceps","chest",["chest","shoulders"],["Lie flat on your back on a bench with your knees bent and feet flat on the ground.","Hold the medicine ball with both hands, extending your arms straight up above your chest.","Lower the medicine ball towards your chest, keeping your elbows close to your body.","Explosively push the medicine ball upwards, extending your arms fully and throwing the ball as high as possible.","Catch the medicine ball and repeat for the desired number of repetitions."]],["Mixed Grip Chin-up","0627-T8UpLkb","lats","biceps",["biceps","forearms"],["Grab the pull-up bar with an underhand grip (palms facing towards you) and your hands slightly wider than shoulder-width apart.","Hang from the bar with your arms fully extended and your feet off the ground.","Engage your back muscles and pull your body up towards the bar, leading with your chest.","Continue pulling until your chin is above the bar.","Pause for a moment at the top, then slowly lower your body back down to the starting position with control.","Repeat for the desired number of repetitions."]],["Modified Hindu Push-up (Male)","3217-epOSYUZ","pectorals","triceps",["triceps","shoulders","core"],["Start in a push-up position with your hands slightly wider than shoulder-width apart and your feet hip-width apart.","Lower your body towards the ground, bending your elbows and keeping your core engaged.","As you lower your body, shift your weight back and lift your hips up towards the ceiling, creating an inverted V shape with your body.","Continue to lower your body until your chest is just above the ground, then reverse the movement, pushing your hips back down and extending your arms to return to the starting position.","Repeat for the desired number of repetitions."]],["Modified Push Up To Lower Arms","1421-arvaszz","forearms","triceps",["triceps","chest","shoulders"],["Start in a push-up position with your hands directly under your shoulders and your body in a straight line.","Lower your body down towards the ground by bending your elbows, keeping them close to your sides.","Once your elbows are at a 90-degree angle, lower your forearms to the ground, keeping your elbows directly under your shoulders.","Pause for a moment, then push through your palms to lift your forearms back up to the starting position.","Repeat for the desired number of repetitions."]],["Monster Walk","0628-O95afRA","glutes","hamstrings",["hamstrings","quadriceps"],["Place a resistance band around your ankles.","Stand with your feet shoulder-width apart and slightly bend your knees.","Take a step to the side with your right foot, maintaining tension on the resistance band.","Follow with your left foot, stepping to the side to return to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Mountain Climber","0630-RJgzwny","cardiovascular system","core",["core","shoulders","triceps"],["Start in a high plank position with your hands directly under your shoulders and your body in a straight line.","Engage your core and bring your right knee towards your chest, then quickly switch and bring your left knee towards your chest.","Continue alternating legs in a running motion, keeping your hips low and your core engaged.","Maintain a steady pace and breathe evenly throughout the exercise.","Repeat for the desired number of repetitions."]],["Muscle Up","0631-yJUHKTn","lats","biceps",["biceps","triceps","shoulders","chest"],["Start by hanging from a pull-up bar with your palms facing away from you and your arms fully extended.","Engage your core and pull your body up towards the bar, leading with your chest.","As you reach the top of the movement, transition your grip so that your palms are facing towards you.","Continue pulling yourself up until your chest is above the bar and your arms are fully flexed.","Reverse the movement by slowly lowering yourself back down to the starting position.","Repeat for the desired number of repetitions."]],["Muscle-up (On Vertical Bar)","1401-Af0EW2I","lats","biceps",["biceps","triceps","forearms"],["Start by hanging from a vertical bar with your palms facing away from you and your arms fully extended.","Engage your core and pull your body up towards the bar, leading with your chest.","As you pull yourself up, lean back slightly and bring your elbows towards your sides.","Continue pulling until your chest reaches the bar and your elbows are fully bent.","Pause for a moment at the top, then slowly lower yourself back down to the starting position.","Repeat for the desired number of repetitions."]],["Narrow Push-up On Exercise Ball","2328-4cWjYEN","triceps","chest",["chest","shoulders"],["Place the stability ball on the ground and position yourself in a push-up position with your hands on the ball, slightly narrower than shoulder-width apart.","Engage your core and keep your body in a straight line from head to toe.","Lower your chest towards the ball by bending your elbows, keeping them close to your body.","Pause for a moment at the bottom, then push yourself back up to the starting position by straightening your arms.","Repeat for the desired number of repetitions."]],["Neck Side Stretch","1403-x2chWLO","levator scapulae","trapezius",["trapezius","sternocleidomastoid"],["Stand or sit up straight with your shoulders relaxed.","Tilt your head to one side, bringing your ear towards your shoulder.","Hold the stretch for 15-30 seconds.","Repeat on the other side.","Perform 2-4 sets on each side."]],["Negative Crunch","0634-szIn2UK","abs","hip flexors",["hip flexors"],["Lie flat on your back with your knees bent and feet flat on the ground.","Place your hands behind your head with your elbows pointing outwards.","Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Oblique Crunch V. 2","1495-cJgSTmh","abs","obliques",["obliques"],["Lie on your back with your knees bent and feet flat on the ground.","Place your hands behind your head or cross them over your chest.","Engage your abs and lift your shoulder blades off the ground, rotating your torso to one side.","Pause for a moment, then lower your shoulder blades back down to the starting position.","Repeat on the other side.","Continue alternating sides for the desired number of repetitions."]],["Oblique Crunches Floor","0635-QUDd8WS","abs","obliques",["obliques"],["Lie on your back with your knees bent and feet flat on the floor.","Place your hands behind your head or cross them over your chest.","Engage your abs and lift your shoulder blades off the floor, rotating your torso to one side.","Pause for a moment, then lower your shoulder blades back down to the floor.","Repeat on the other side, alternating sides with each repetition."]],["Olympic Barbell Hammer Curl","0636-o1ntciW","biceps","forearms",["forearms"],["Stand up straight with your feet shoulder-width apart and hold an Olympic barbell with an overhand grip.","Let the barbell hang at arm's length in front of your thighs, with your palms facing your body.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the barbell until your biceps are fully contracted and the barbell is at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Olympic Barbell Triceps Extension","0637-wu5LXwz","triceps","shoulders",["shoulders"],["Start by standing with your feet shoulder-width apart and holding the barbell with an overhand grip.","Raise the barbell above your head, fully extending your arms.","Keeping your upper arms close to your head, slowly lower the barbell behind your head by bending your elbows.","Pause for a moment, then extend your arms back to the starting position.","Repeat for the desired number of repetitions."]],["One Arm Against Wall","1355-ZZTGMKh","lats","shoulders",["shoulders","triceps"],["Stand facing a wall with your feet shoulder-width apart.","Extend one arm straight out in front of you and place your palm against the wall.","Engage your core and lean your body forward, keeping your arm straight and your back flat.","Slowly push against the wall with your palm, activating your lat muscles.","Hold the position for a few seconds, then release and repeat with the other arm."]],["One Arm Chin-up","0638-HjdqmZa","lats","biceps",["biceps","forearms"],["Stand facing a pull-up bar with your feet shoulder-width apart.","Reach up and grab the bar with an underhand grip, with one hand gripping the bar and the other hand holding your wrist for support.","Hang from the bar with your arm fully extended, keeping your body straight and your core engaged.","Pull yourself up towards the bar by bending your elbow and squeezing your back muscles.","Continue pulling until your chin is above the bar, then slowly lower yourself back down to the starting position.","Repeat for the desired number of repetitions, then switch arms and repeat."]],["One Arm Dip","0639-FAoIFMw","triceps","chest",["chest","shoulders"],["Stand facing away from a bench or chair, with your feet shoulder-width apart.","Place one hand on the bench or chair behind you, fingers pointing towards your body.","Extend your legs out in front of you, keeping your heels on the ground.","Bend your elbows and lower your body towards the ground, keeping your back close to the bench or chair.","Pause for a moment at the bottom, then push through your palms to straighten your arms and return to the starting position.","Repeat for the desired number of repetitions, then switch sides and repeat with the other arm."]],["One Arm Slam (With Medicine Ball)","0640-jCrtE9b","abs","shoulders",["shoulders","back"],["Stand with your feet shoulder-width apart, holding the medicine ball with one hand in front of your waist.","Bend your knees slightly and engage your core.","Raise the medicine ball above your head, fully extending your arm.","Forcefully slam the medicine ball down to the ground, using your core and shoulders to generate power.","Catch the medicine ball on the bounce and repeat for the desired number of repetitions."]],["One Arm Towel Row","1773-bKWbrTA","upper back","biceps",["biceps","forearms"],["Stand with your feet shoulder-width apart, knees slightly bent, and hold a towel with one hand.","Bend forward at the waist, keeping your back straight and your core engaged.","Extend your arm fully, allowing the towel to hang in front of you.","Pull the towel towards your chest, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower the towel back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["One Leg Donkey Calf Raise","1386-A2upspL","calves","hamstrings",["hamstrings","glutes"],["Stand with your feet shoulder-width apart, toes pointing forward.","Place your hands on a stable surface for support, such as a wall or a bar.","Lift one leg off the ground, keeping your knee slightly bent.","Raise your heel as high as possible, using your calf muscles.","Pause for a moment at the top, then slowly lower your heel back down.","Repeat for the desired number of repetitions, then switch legs."]],["One Leg Floor Calf Raise","1387-0jp9Rlz","calves","ankles",["ankles","feet"],["Stand with your feet hip-width apart and place your hands on a wall or sturdy object for balance.","Lift one foot off the ground and balance on the other foot.","Slowly raise your heel off the ground, lifting your body up onto the ball of your foot.","Pause for a moment at the top, then slowly lower your heel back down to the starting position.","Repeat for the desired number of repetitions, then switch legs and repeat."]],["One Leg Squat","1476-C31LMnP","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart.","Extend one leg forward, keeping it off the ground.","Bend your standing leg and lower your body down as if sitting back into a chair.","Keep your chest up and your back straight.","Push through your heel to return to the starting position.","Repeat with the other leg."]],["Otis Up","0641-UVL20oz","abs","hip flexors",["hip flexors","lower back"],["Lie flat on your back with your knees bent and feet flat on the ground.","Place your hands behind your head with your elbows pointing outwards.","Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Outside Leg Kick Push-up","0642-jNU1gFQ","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Start in a push-up position with your hands slightly wider than shoulder-width apart and your feet together.","Lower your body towards the ground by bending your elbows, keeping your back straight and core engaged.","As you push back up, kick one leg out to the side, extending it fully and engaging your glutes.","Return your leg to the starting position and repeat the push-up, alternating legs with each repetition.","Continue alternating leg kicks and push-ups for the desired number of repetitions."]],["Overhead Triceps Stretch","0643-Z5YStHW","triceps","shoulders",["shoulders"],["Stand or sit upright with your feet shoulder-width apart.","Extend one arm overhead, bending at the elbow so that your hand reaches towards the opposite shoulder blade.","With your other hand, gently pull the elbow of the extended arm towards the opposite side of your head, feeling a stretch in your triceps.","Hold the stretch for 15-30 seconds, then release.","Repeat on the other side."]],["Pelvic Tilt","3147-NKJ8o6x","abs","lower back",["lower back"],["Lie flat on your back with your knees bent and feet flat on the ground.","Place your hands by your sides.","Engage your abs and tilt your pelvis upward, pressing your lower back into the ground.","Hold this position for a few seconds, focusing on contracting your abs.","Release the tilt and return to the starting position.","Repeat for the desired number of repetitions."]],["Pelvic Tilt Into Bridge","1422-D9qe7CM","glutes","hamstrings",["hamstrings","core"],["Lie on your back with your knees bent and feet flat on the ground.","Place your arms by your sides with your palms facing down.","Engage your glutes and core muscles.","Tilt your pelvis upward, lifting your hips off the ground.","Hold the bridge position for a few seconds.","Slowly lower your hips back down to the starting position.","Repeat for the desired number of repetitions."]],["Peroneals Stretch","1388-XhfS1DZ","calves","ankles",["ankles","feet"],["Sit on the ground with your legs extended in front of you.","Loop the rope around the ball of your foot and hold the ends of the rope with your hands.","Gently pull the rope towards you, flexing your foot and stretching your calf muscles.","Hold the stretch for 15-30 seconds.","Release the tension on the rope and repeat the stretch on the other leg.","Repeat for the desired number of repetitions."]],["Pike-to-cobra Push-up","3662-XPUDTt7","glutes","core",["core","shoulders","triceps"],["Start in a push-up position with your hands slightly wider than shoulder-width apart and your feet together.","Engage your core and lift your hips up towards the ceiling, forming an inverted V shape with your body.","Lower your upper body towards the ground by bending your elbows, keeping them close to your body.","As you lower down, shift your weight forward and transition into a cobra pose by straightening your arms and lifting your chest up.","Reverse the movement by bending your elbows and lowering your chest back down towards the ground.","Push through your hands to return to the inverted V position.","Continue the movement by lowering your hips back down towards the ground, returning to the starting push-up position.","Repeat for the desired number of repetitions."]],["Plyo Push Up","1306-Snj1wSv","pectorals","triceps",["triceps","shoulders","core"],["Start in a high plank position with your hands slightly wider than shoulder-width apart.","Lower your chest towards the ground by bending your elbows, keeping your body in a straight line.","Push explosively off the ground, using your chest muscles to propel your upper body off the ground.","Land softly with your hands back in the starting position.","Repeat for the desired number of repetitions."]],["Posterior Step To Overhead Reach","1687-ErqK3UL","abs","glutes",["glutes","hamstrings","quadriceps","shoulders"],["Stand with your feet hip-width apart and your arms by your sides.","Take a step back with your right foot, landing on the ball of your foot.","Bend your left knee and lower your body into a lunge position.","As you lower into the lunge, simultaneously reach your arms overhead.","Pause for a moment at the bottom of the lunge, then return to the starting position by pushing through your left heel and bringing your right foot forward.","Repeat the movement on the other side, stepping back with your left foot and bending your right knee.","Continue alternating sides for the desired number of repetitions."]],["Posterior Tibialis Stretch","1389-DEEqoI2","calves","hamstrings",["hamstrings","quadriceps"],["Sit on the ground with your legs extended in front of you.","Loop the rope around the ball of your foot and hold the ends of the rope with your hands.","Gently pull the rope towards you, flexing your foot and stretching your calf muscles.","Hold the stretch for 20-30 seconds.","Release the tension on the rope and relax your foot.","Repeat the stretch on the other leg."]],["Potty Squat","3119-75Bgtjy","abs","quadriceps",["quadriceps","glutes"],["Stand with your feet shoulder-width apart, toes pointing slightly outward.","Lower your body down by bending your knees and pushing your hips back as if you were sitting on a chair.","Keep your chest up and your back straight throughout the movement.","Lower yourself until your thighs are parallel to the ground or as low as you can comfortably go.","Pause for a moment at the bottom, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Potty Squat With Support","3132-b63ZzGe","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart, toes pointing slightly outward.","Hold onto a stable support, such as a chair or wall, for balance.","Lower your body down into a squat position by bending your knees and pushing your hips back.","Keep your chest up and your back straight throughout the movement.","Pause for a moment at the bottom, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Power Clean","0648-SiWCcTN","hamstrings","glutes",["glutes","quadriceps","calves"],["Start with the barbell on the ground in front of you, with your feet shoulder-width apart.","Bend down and grip the barbell with an overhand grip, slightly wider than shoulder-width apart.","Keep your back straight and chest up as you lift the barbell off the ground, extending your hips and knees.","As the barbell reaches your mid-thigh, explosively pull it upwards, shrugging your shoulders and pulling your elbows high and to the sides.","As the barbell reaches its highest point, quickly drop underneath it, rotating your elbows around and catching the barbell on your shoulders in a front squat position.","Stand up with the barbell, fully extending your hips and knees.","Lower the barbell back down to the starting position, keeping control of the weight throughout the movement.","Repeat for the desired number of repetitions."]],["Power Point Plank","3665-hCjGsRQ","abs","shoulders",["shoulders","triceps","glutes"],["Start in a high plank position with your hands directly under your shoulders and your body in a straight line from head to toe.","Engage your core and squeeze your glutes to maintain a stable position.","Lower your body down onto your forearms, one arm at a time, maintaining a straight line from head to toe.","Hold this position for the desired amount of time, keeping your core and glutes engaged.","To return to the starting position, push through your forearms and lift your body back up into a high plank position.","Repeat for the desired number of repetitions."]],["Prisoner Half Sit-up (Male)","3203-mgejmGP","abs","hip flexors",["hip flexors"],["Lie flat on your back with your knees bent and feet flat on the ground.","Place your hands behind your head with your elbows pointing outwards.","Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Prone Twist On Stability Ball","1707-1IG6gVF","abs","obliques",["obliques","lower back"],["Start by lying face down on a stability ball with your feet shoulder-width apart and your toes touching the ground.","Place your hands behind your head or cross them over your chest.","Engage your core muscles and slowly lift your upper body off the ball, keeping your back straight.","Rotate your torso to one side, bringing your shoulder towards your hip. Keep your hips and legs stable throughout the movement.","Pause for a moment, then return to the starting position.","Repeat the rotation to the other side.","Continue alternating sides for the desired number of repetitions."]],["Pull Up (Neutral Grip)","0651-0V2YQjW","lats","biceps",["biceps","forearms"],["Hang from a pull-up bar with a neutral grip (palms facing each other) and your arms fully extended.","Engage your core and squeeze your shoulder blades together.","Pull your body up towards the bar by bending your elbows and driving your elbows down towards your hips.","Continue pulling until your chin is above the bar.","Pause for a moment at the top, then slowly lower your body back down to the starting position with control.","Repeat for the desired number of repetitions."]],["Pull-in (On Stability Ball)","0650-UQr48Oi","abs","hip flexors",["hip flexors"],["Start by sitting on the stability ball with your feet flat on the ground and your knees bent at a 90-degree angle.","Place your hands on the sides of the stability ball for support.","Engage your abs and slowly roll your hips forward, bringing your knees towards your chest.","Pause for a moment at the top of the movement, then slowly extend your legs back to the starting position.","Repeat for the desired number of repetitions."]],["Pull-up","0652-lBDjFxJ","lats","biceps",["biceps","forearms"],["Hang from a pull-up bar with your palms facing away from you and your arms fully extended.","Engage your core and squeeze your shoulder blades together.","Pull your body up towards the bar by bending your elbows and bringing your chest towards the bar.","Pause at the top of the movement, then slowly lower your body back down to the starting position.","Repeat for the desired number of repetitions."]],["Push And Pull Bodyweight","1689-wXvUZC8","pectorals","triceps",["triceps","deltoids"],["Start in a push-up position with your hands slightly wider than shoulder-width apart and your body in a straight line.","Lower your chest towards the ground by bending your elbows, keeping your body straight.","Push through your palms to extend your arms and return to the starting position.","From the push-up position, pull your chest towards the ground by bending your elbows, keeping your body straight.","Push through your palms to extend your arms and return to the starting position.","Repeat for the desired number of repetitions."]],["Push To Run","3638-PrQbjvB","cardiovascular system","quadriceps",["quadriceps","hamstrings","calves"],["Start in a push-up position with your hands shoulder-width apart and your body in a straight line.","Lower your chest towards the ground by bending your elbows, keeping your body straight.","Push through your hands to extend your arms and return to the starting position.","Quickly bring one knee towards your chest, then quickly switch and bring the other knee towards your chest.","Continue alternating knees as fast as you can while maintaining good form.","Continue for the desired duration or number of repetitions."]],["Push Up On Bosu Ball","1307-wVompEp","pectorals","triceps",["triceps","shoulders","core"],["Place the bosu ball on the ground with the flat side facing up.","Position yourself in a push-up position with your hands on the outer edges of the bosu ball.","Engage your core and lower your body down towards the bosu ball by bending your elbows.","Push yourself back up to the starting position by extending your arms.","Repeat for the desired number of repetitions."]],["Push-up","0662-I4hDWkc","pectorals","triceps",["triceps","deltoids","core"],["Start in a high plank position with your hands slightly wider than shoulder-width apart and your feet together.","Engage your core and lower your body towards the ground by bending your elbows, keeping your body in a straight line.","Pause for a moment when your chest is just above the ground, then push yourself back up to the starting position by straightening your arms.","Repeat for the desired number of repetitions."]],["Push-up (Bosu Ball)","0653-2kr2lWy","pectorals","triceps",["triceps","shoulders","core"],["Place the bosu ball on the ground with the flat side facing up.","Position yourself in a push-up position with your hands on the outer edges of the bosu ball.","Engage your core and lower your body down towards the bosu ball by bending your elbows.","Push yourself back up to the starting position by extending your arms.","Repeat for the desired number of repetitions."]],["Push-up (On Stability Ball)","0655-Y4BRNQF","pectorals","triceps",["triceps","shoulders","core"],["Place the stability ball on the ground and position yourself facing down with your hands on the ball, shoulder-width apart.","Extend your legs straight out behind you, balancing on your toes.","Engage your core and lower your chest towards the ball by bending your elbows, keeping your body in a straight line.","Pause for a moment at the bottom, then push yourself back up to the starting position by straightening your arms.","Repeat for the desired number of repetitions."]],["Push-up (Wall)","0659-LEH9jxP","pectorals","triceps",["triceps","deltoids"],["Stand facing a wall, about arm's length away.","Place your hands on the wall at shoulder height, slightly wider than shoulder-width apart.","Step back a few feet, keeping your body straight and your feet hip-width apart.","Bend your elbows and lower your chest towards the wall, keeping your body in a straight line.","Push back up to the starting position, straightening your arms.","Repeat for the desired number of repetitions."]],["Push-up (Wall) V. 2","0658-NCmbLCw","pectorals","triceps",["triceps","shoulders"],["Stand facing a wall, about arm's length away.","Place your hands on the wall at shoulder height, slightly wider than shoulder-width apart.","Step back with your feet, keeping them hip-width apart.","Engage your core and keep your body in a straight line from head to heels.","Bend your elbows and lower your chest towards the wall, keeping your body straight.","Pause for a moment, then push yourself back to the starting position.","Repeat for the desired number of repetitions."]],["Push-up Close-grip Off Dumbbell","0660-KZXAtKQ","triceps","chest",["chest","shoulders"],["Start in a push-up position with your hands placed close together, directly under your shoulders.","Hold a dumbbell in each hand, resting them on the ground.","Lower your body towards the ground by bending your elbows, keeping them close to your sides.","Push through your palms to extend your arms and return to the starting position.","Repeat for the desired number of repetitions."]],["Push-up Inside Leg Kick","0661-0br45wL","glutes","quadriceps",["quadriceps","hamstrings","calves","core"],["Start in a push-up position with your hands slightly wider than shoulder-width apart and your feet together.","Lower your body towards the ground by bending your elbows, keeping your back straight and your core engaged.","As you push back up, lift one leg off the ground and kick it out to the side, keeping it straight.","Lower your leg back down and repeat the push-up, then switch to the other leg.","Continue alternating leg kicks with each push-up repetition."]],["Push-up Medicine Ball","0663-W8KAlkI","pectorals","triceps",["triceps","shoulders","core"],["Start in a high plank position with your hands on the medicine ball, shoulder-width apart.","Engage your core and lower your body towards the ground by bending your elbows, keeping your back straight.","Push through your palms to extend your arms and return to the starting position.","Repeat for the desired number of repetitions."]],["Push-up On Lower Arms","1467-4Jt8QsQ","triceps","chest",["chest","shoulders"],["Start in a plank position with your forearms on the ground and elbows directly below your shoulders.","Engage your core and keep your body in a straight line from head to toe.","Lower your chest towards the ground by bending your elbows, keeping them close to your body.","Pause for a moment at the bottom, then push yourself back up to the starting position.","Repeat for the desired number of repetitions."]],["Push-up Plus","3145-pvBMLHA","pectorals","triceps",["triceps","shoulders"],["Start in a high plank position with your hands slightly wider than shoulder-width apart and your body in a straight line from head to heels.","Lower your body towards the ground by bending your elbows, keeping them close to your sides.","Once your chest is just above the ground, push through your hands to extend your arms and lift your upper body up.","At the top of the movement, protract your shoulder blades by pushing your upper back towards the ceiling.","Pause for a moment, then reverse the movement by retracting your shoulder blades and lowering your body back down to the starting position.","Repeat for the desired number of repetitions."]],["Push-up To Side Plank","0664-KhHJ338","abs","shoulders",["shoulders","chest","triceps"],["Start in a push-up position with your hands shoulder-width apart and your body in a straight line.","Lower your body towards the ground by bending your elbows, keeping your core engaged.","Push back up to the starting position.","Shift your weight onto your left hand and rotate your body to the right, lifting your right arm towards the ceiling.","Hold the side plank position for a few seconds, then return to the starting position.","Repeat the push-up and side plank on the opposite side.","Continue alternating sides for the desired number of repetitions."]],["Quads","3533-6YUfHPL","quads","hamstrings",["hamstrings","glutes"],["Stand with your feet shoulder-width apart.","Lower your body by bending your knees and pushing your hips back as if sitting on a chair.","Keep your chest up and your back straight.","Lower yourself until your thighs are parallel to the ground.","Push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Quarter Sit-up","3201-enxnJcM","abs","hip flexors",["hip flexors"],["Lie flat on your back with your knees bent and feet flat on the ground.","Place your hands behind your head with your elbows pointing outwards.","Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Quick Feet V. 2","3552-mweqJin","quads","calves",["calves","hamstrings"],["Stand with your feet shoulder-width apart and your arms by your sides.","Begin by rapidly moving your feet up and down, as if you were running in place.","Keep your movements quick and light, focusing on staying on the balls of your feet.","Continue for the desired duration or number of repetitions."]],["Raise Single Arm Push-up","0666-13TpY4H","pectorals","triceps",["triceps","shoulders","core"],["Start in a push-up position with your hands slightly wider than shoulder-width apart and your feet together.","Extend one arm straight out to the side, parallel to the ground.","Lower your body towards the ground by bending your elbows, keeping your back straight and core engaged.","Push back up to the starting position, using your chest muscles to lift your body.","Repeat with the other arm extended."]],["Rear Decline Bridge","0668-UpAlold","glutes","hamstrings",["hamstrings","lower back"],["Lie on your back with your feet flat on the ground and your knees bent.","Place your arms by your sides with your palms facing down.","Engage your glutes and hamstrings, and lift your hips off the ground until your body forms a straight line from your knees to your shoulders.","Hold this position for a few seconds, then slowly lower your hips back down to the starting position.","Repeat for the desired number of repetitions."]],["Rear Deltoid Stretch","0669-xifhB5W","delts","trapezius",["trapezius","rhomboids"],["Stand tall with your feet shoulder-width apart.","Extend your right arm across your chest, placing your left hand on your right elbow.","Gently pull your right arm towards your left shoulder, feeling a stretch in your right shoulder.","Hold the stretch for 15-30 seconds, then release.","Repeat on the other side."]],["Rear Pull-up","0670-CbFSYC1","lats","biceps",["biceps","forearms"],["Grab the pull-up bar with an overhand grip, slightly wider than shoulder-width apart.","Hang from the bar with your arms fully extended and your body straight.","Engage your back muscles and pull your body up towards the bar, keeping your elbows close to your body.","Continue pulling until your chin is above the bar.","Pause for a moment at the top, then slowly lower your body back down to the starting position.","Repeat for the desired number of repetitions."]],["Reclining Big Toe Pose With Rope","1582-K5xgdvI","hamstrings","calves",["calves","glutes"],["Lie on your back with your legs extended and your arms by your sides.","Loop the rope around the ball of your right foot and hold the ends of the rope with your hands.","Slowly raise your right leg towards your chest, keeping your knee straight and your foot flexed.","Hold the stretch for a few seconds, then slowly lower your leg back down to the starting position.","Repeat with your left leg.","Continue alternating legs for the desired number of repetitions."]],["Resistance Band Hip Thrusts On Knees (Female)","3236-Pjbc0Kt","glutes","hamstrings",["hamstrings","quadriceps"],["Start by kneeling on the ground with your knees hip-width apart and your feet flexed.","Wrap the resistance band around your thighs, just above your knees.","Place your hands on your hips or extend them out in front of you for balance.","Engage your glutes and core muscles.","Push your hips forward and squeeze your glutes as you lift your knees off the ground, extending your hips until your thighs are parallel to the ground.","Hold the position for a moment, then slowly lower your knees back down to the starting position.","Repeat for the desired number of repetitions."]],["Resistance Band Leg Extension","3007-Y1MsI1l","quads","hamstrings",["hamstrings"],["Attach the resistance band to a sturdy anchor point and secure it around your ankle.","Stand facing the anchor point with your feet shoulder-width apart.","Keeping your core engaged and your upper body stable, extend your leg straight out in front of you.","Pause for a moment at the top, then slowly return your leg to the starting position.","Repeat for the desired number of repetitions, then switch legs."]],["Resistance Band Seated Biceps Curl","3123-XFc3vpY","biceps","forearms",["forearms"],["Sit on a chair or bench with your back straight and feet flat on the ground.","Hold the resistance band with an underhand grip, palms facing up, and arms extended down by your sides.","Keeping your upper arms stationary, exhale and curl the resistance band up towards your shoulders.","Pause for a moment at the top, squeezing your biceps.","Inhale and slowly lower the resistance band back to the starting position.","Repeat for the desired number of repetitions."]],["Resistance Band Seated Chest Press","3124-4x5Okof","pectorals","shoulders",["shoulders","triceps"],["Sit on a chair or bench with your back straight and feet flat on the ground.","Hold the resistance band handles in each hand, with your palms facing down and elbows bent at a 90-degree angle.","Extend your arms forward, pushing the resistance band away from your chest.","Pause for a moment at the end of the movement, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Resistance Band Seated Hip Abduction","3006-0xDpB4L","abductors","glutes",["glutes","hamstrings"],["Sit on a chair or bench with your back straight and feet flat on the ground.","Wrap the resistance band around your thighs, just above your knees.","Place your hands on the sides of the chair or bench for support.","Engage your abductors (outer thigh muscles) and slowly push your knees apart, against the resistance of the band.","Pause for a moment at the end of the movement, then slowly bring your knees back together.","Repeat for the desired number of repetitions."]],["Resistance Band Seated Shoulder Press","3122-S93zLTG","delts","triceps",["triceps","upper back"],["Sit on a chair or bench with your back straight and feet flat on the ground.","Hold the resistance band with both hands, palms facing forward, and bring it up to shoulder level.","Press the band overhead, extending your arms fully.","Pause for a moment at the top, then slowly lower the band back down to shoulder level.","Repeat for the desired number of repetitions."]],["Resistance Band Seated Straight Back Row","3144-Nu7jqFE","upper back","biceps",["biceps","shoulders"],["Sit on the floor with your legs extended and loop the resistance band around your feet.","Hold the ends of the resistance band with your hands, palms facing each other.","Keep your back straight and lean slightly back, engaging your core.","Pull the resistance ba
