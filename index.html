    <div style="border-radius:var(--r-md);overflow:hidden;background:#141416;margin-bottom:14px">
      <img src="${exd.gif}" alt="${name}" onerror="this.onerror=null;this.src='${exd.img}'" style="width:100%;height:260px;object-fit:cover;display:block" loading="lazy"/>
    </div>
    <!-- Muscle targets -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
      <span style="font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;background:${ac}22;color:${ac}">🎯 ${exd.target}</span>
      ${(exd.secondary||[]).map(m=>`<span style="font-size:11px;padding:4px 12px;border-radius:20px;background:var(--s2);color:var(--mu);font-weight:500">${m}</span>`).join('')}
    </div>
    ${prHtml}
    <!-- How to perform — numbered bullet steps -->
    <div style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:700;color:var(--mu2);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px">How to Perform</div>
      ${stepsHtml}
    </div>
    <!-- Form cues -->
    <div style="background:var(--s2);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:${ac};text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px">Form cues</div>
      <div style="font-size:13px;color:var(--mu);line-height:1.7">
        • Control the negative (lowering) phase on every rep<br>
        • Keep breathing — exhale on exertion<br>
        • Full range of motion beats heavier weight with partial reps<br>
        • If form breaks, the weight is too heavy
      </div>
    </div>
    <!-- Muscles worked — large infographic at bottom -->
    <div style="margin-bottom:6px">
      <div style="font-size:11px;font-weight:700;color:var(--mu2);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px">Muscles Worked</div>
      <div style="background:var(--s2);border-radius:var(--r-md);padding:18px 16px;display:flex;justify-content:center">
        <div style="width:175px;aspect-ratio:200/420">${muscleSVG(exd.target,exd.muscle)}</div>
      </div>
    </div>
  `;
  document.getElementById('exDetailContent').innerHTML=content;
  closeModal('exSearchModal');
  openModal('exDetailModal');
  if(sess.length>1)setTimeout(()=>renderExDetailChart(name),60);
}

// ── EXERCISES TAB (full library browser) ────────────────────────────────
function renderExercises(){
  const w=document.getElementById('exercisesWrap'); if(!w)return;
  const total=Object.keys(EX_DB).length;
  w.innerHTML=`<div style="padding-top:14px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-0.5px">Exercises</div>
      <div style="font-size:11px;color:var(--mu)">${total} total</div>
    </div>
    <input type="text" id="exTabSearch" class="inp" placeholder="Search ${total} exercises..." style="font-size:14px;padding:11px 14px;margin-bottom:12px" oninput="filterExercisesTab()">
    <div id="exTabList"></div>
  </div>`;
  filterExercisesTab();
}
// Windowed render (cap 120) so the full library never builds thousands of rows.
function exTabRowsFor(q){
  q=(q||'').toLowerCase().trim();
  const CAP=120; let html='',shown=0;
  for(const [name,exd] of Object.entries(EX_DB)){
    if(q && !name.toLowerCase().includes(q)) continue;
    const ac=MC[exd.target]||'#5F65D9';
    html+=`<div onclick="openExDetail('${name.replace(/'/g,"\\'")}','${exd.target}')" style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--bd);cursor:pointer">
      <div style="width:52px;height:52px;border-radius:var(--r-xs);overflow:hidden;background:#141416;flex-shrink:0"><img src="${exd.gif}" onerror="this.onerror=null;this.src='${exd.img}'" style="width:100%;height:100%;object-fit:cover" loading="lazy"/></div>
      <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;line-height:1.3">${name}</div>
        <div style="margin-top:4px;display:flex;gap:5px;flex-wrap:wrap">
          <span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:${ac}22;color:${ac}">${exd.target}</span>
          ${exd.secondary&&exd.secondary[0]?`<span style="font-size:10px;padding:2px 8px;border-radius:20px;background:var(--s3);color:var(--mu)">${exd.secondary[0]}</span>`:''}
        </div></div>
      <div style="color:var(--mu2);font-size:16px;padding-left:4px">›</div>
    </div>`;
    if(++shown>=CAP)break;
  }
  if(!shown)return '<div style="padding:20px 0;text-align:center;color:var(--mu)">No exercises found</div>';
  if(shown>=CAP)html+=`<div style="padding:14px;text-align:center;color:var(--mu);font-size:12px">Showing first ${CAP} — type to narrow.</div>`;
  return html;
}
function filterExercisesTab(){
  const q=document.getElementById('exTabSearch')?.value||'';
  const l=document.getElementById('exTabList'); if(l)l.innerHTML=exTabRowsFor(q);
}

// ── INIT (FIX 6: cloud-first) ────────────────────────────────────────────
// Delegated handler for remove exercise buttons (works even after re-render)
document.getElementById('page-today').addEventListener('click', e=>{
  const btn=e.target.closest('.rm-ex-btn');
  if(!btn)return;
  e.stopPropagation();
  const d=parseInt(btn.dataset.d);
  const tk=btn.dataset.tk;
  const uid=btn.dataset.uid;
  removeTodayEx(d,tk,uid);
});

// STEP 1: Render immediately from localStorage cache (instant, works offline)
// Home is the landing page; render it first.
deriveSessionsFromSets();
updateTopbar();buildCarousel();renderHome();renderDayDetail(dow());

// Recover in-progress workout timer if app was killed mid-session
(()=>{
  const stored=localStorage.getItem('_woStart');
  if(stored&&workoutActive){
    workoutStart=parseInt(stored);
    document.getElementById('wtb')?.classList.add('active');
    startWoTimer();
  } else if(stored&&!workoutActive){
    // Stale start key with no active workout — clean up
    localStorage.removeItem('_woStart');
  }
})();

// STEP 2: Load from Supabase cloud in background, refresh UI when done
setSyncDot('syncing');
(async()=>{
  try{
    console.log('[KWT] Starting cloud sync...');
    await flushQ();
    console.log('[KWT] Queue flushed, loading cloud data...');
    const ok=await loadCloud();
    console.log('[KWT] Cloud load result:', ok, '| workouts:', workoutLog.length, '| weights:', weightLog.length);
    setSyncDot(ok?'synced':'offline');
    if(ok){
      updateTopbar();
      buildCarousel();
      renderHome();
      renderDayDetail(carDay!==null?carDay:dow());
      const hp=document.getElementById('page-history');
      const np=document.getElementById('page-nutrition');
      if(hp&&hp.classList.contains('active'))renderHistory();
      if(np&&np.classList.contains('active'))renderNutrition();
    }
  }catch(e){
    console.warn('[KWT] Cloud sync failed, using local cache:',e.message);
    setSyncDot('offline');
  }
})();

// STEP 3: Re-sync when app becomes visible again (handles iOS PWA resume)
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'){
    setSyncDot('syncing');
    (async()=>{
      try{
        // If workout was active before suspension, restart the timer from stored timestamp
        if(workoutActive){
          const stored=localStorage.getItem('_woStart');
          if(stored){workoutStart=parseInt(stored);}
          startWoTimer();
        }
        await flushQ();
        const ok=await loadCloud();
        setSyncDot(ok?'synced':'offline');
        if(ok){
          updateTopbar();buildCarousel();renderHome();
          // Don't re-render today's exercises mid-workout — preserves set logging across midnight
          if(!workoutActive) renderDayDetail(carDay!==null?carDay:dow());
          const hp=document.getElementById('page-history');
          const np=document.getElementById('page-nutrition');
          if(hp&&hp.classList.contains('active'))renderHistory();
          if(np&&np.classList.contains('active'))renderNutrition();
        }
      }catch(e){setSyncDot('offline');}
    })();
  }
});
</script>
</body>
