s",["quadriceps","hamstrings","calves","core"],["Stand with your feet shoulder-width apart and toes slightly turned out.","Hold the barbell in the crooks of your elbows, with your hands gripping the bar for stability.","Engage your core and keep your chest lifted as you lower your hips back and down into a squat position.","Keep your knees in line with your toes and your weight in your heels.","Pause for a moment at the bottom of the squat, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Basic Toe Touch (Male)","3212-BbfB8Gb","glutes","hamstrings",["hamstrings","calves"],["Stand with your feet shoulder-width apart and your arms by your sides.","Bend forward at the waist, keeping your back straight and your knees slightly bent.","Reach down towards your toes with your hands, keeping your legs as straight as possible.","Pause for a moment at the bottom, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Battling Ropes","0128-RJa4tCo","delts","forearms",["forearms","core"],["Stand with your feet shoulder-width apart and knees slightly bent.","Hold one end of the rope in each hand, with your palms facing each other.","Raise your arms to shoulder height, keeping your elbows slightly bent.","Begin making alternating waves with the ropes by rapidly raising and lowering each arm.","Continue for the desired duration or number of repetitions."]],["Bear Crawl","3360-0Yz8WdV","cardiovascular system","core",["core","shoulders","triceps"],["Start on all fours with your hands directly under your shoulders and your knees directly under your hips.","Lift your knees slightly off the ground, keeping your back flat and your core engaged.","Move your right hand and left foot forward simultaneously, followed by your left hand and right foot.","Continue crawling forward, alternating your hand and foot movements.","Maintain a steady pace and keep your core tight throughout the exercise.","Continue for the desired distance or time."]],["Behind Head Chest Stretch","1259-QoHIhPl","pectorals","shoulders",["shoulders","triceps"],["Stand tall with your feet shoulder-width apart.","Interlace your fingers behind your head with your elbows pointing outwards.","Slowly squeeze your shoulder blades together and push your chest forward.","Hold the stretch for 15-30 seconds.","Release the stretch and repeat as desired."]],["Bench Dip (Knees Bent)","0129-RrLske5","triceps","chest",["chest","shoulders"],["Sit on the edge of a bench or chair with your hands gripping the edge next to your hips.","Slide your butt off the bench and straighten your legs in front of you, keeping your heels on the ground.","Bend your elbows and lower your body towards the ground, keeping your back close to the bench.","Pause for a moment at the bottom, then push yourself back up to the starting position.","Repeat for the desired number of repetitions."]],["Bench Dip On Floor","1399-9RT8oQW","triceps","chest",["chest","shoulders"],["Sit on the edge of a bench or chair with your hands gripping the edge, fingers pointing forward.","Slide your butt off the bench, supporting your weight with your hands.","Lower your body by bending your elbows until your upper arms are parallel to the floor.","Push yourself back up to the starting position by straightening your arms.","Repeat for the desired number of repetitions."]],["Bench Hip Extension","0130-u27Kcdz","glutes","hamstrings",["hamstrings"],["Sit on a bench with your back against the bench and your feet flat on the ground.","Place your hands on the bench for support.","Engage your glutes and hamstrings, then lift your hips off the bench until your body forms a straight line from your knees to your shoulders.","Pause for a moment at the top, then slowly lower your hips back down to the starting position.","Repeat for the desired number of repetitions."]],["Bench Pull-ups","3019-mExgrF9","lats","biceps",["biceps","forearms"],["Position yourself under a bar or a sturdy horizontal surface that is at chest height.","Grab the bar or surface with an overhand grip, slightly wider than shoulder-width apart.","Hang with your arms fully extended and your body straight.","Pull your chest towards the bar or surface by squeezing your shoulder blades together and bending your elbows.","Continue pulling until your chin is above the bar or surface.","Lower yourself back down to the starting position with control.","Repeat for the desired number of repetitions."]],["Bent Knee Lying Twist (Male)","3639-6sYyrRX","glutes","obliques",["obliques","hip flexors"],["Lie flat on your back with your knees bent and feet flat on the ground.","Extend your arms out to the sides, perpendicular to your body.","Keeping your knees together, slowly lower them to one side, aiming to touch the ground with your knees.","Pause for a moment, then engage your core and slowly lift your knees back to the starting position.","Repeat the movement to the other side.","Continue alternating sides for the desired number of repetitions."]],["Biceps Leg Concentration Curl","1770-sJFIDIp","biceps","forearms",["forearms"],["Sit on a bench with your legs spread apart and your feet flat on the ground.","Hold a dumbbell in one hand and place your elbow on the inside of your thigh, just above the knee.","With your palm facing up, curl the dumbbell towards your shoulder while keeping your upper arm stationary.","Squeeze your biceps at the top of the movement, then slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Biceps Narrow Pull-ups","0139-50BETrz","biceps","forearms",["forearms","shoulders"],["Hang from a pull-up bar with your palms facing towards you and your hands shoulder-width apart.","Engage your core and pull yourself up towards the bar, focusing on using your biceps to lift your body.","Pause for a moment at the top, then slowly lower yourself back down to the starting position.","Repeat for the desired number of repetitions."]],["Biceps Pull-up","0140-guT8YnS","biceps","forearms",["forearms","shoulders"],["Hang from a pull-up bar with your palms facing away from you and your hands shoulder-width apart.","Engage your core and pull yourself up by bending your elbows, bringing your chest towards the bar.","Pause at the top of the movement, then slowly lower yourself back down to the starting position.","Repeat for the desired number of repetitions."]],["Body-up","0137-U6G2gk9","triceps","chest",["chest","shoulders"],["Start by placing your hands on a raised surface, such as a bench or parallel bars, with your palms facing down and fingers pointing forward.","Extend your legs out in front of you, keeping your heels on the ground and your body straight.","Lower your body by bending your elbows, keeping them close to your sides, until your upper arms are parallel to the ground.","Pause for a moment, then push through your palms to straighten your arms and lift your body back up to the starting position.","Repeat for the desired number of repetitions."]],["Bodyweight Drop Jump Squat","3543-wfotm7S","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart.","Lower your body into a squat position by bending your knees and pushing your hips back.","Jump up explosively, extending your hips, knees, and ankles.","While in mid-air, quickly bring your feet together.","Land softly on the balls of your feet and immediately drop back into a squat position.","Repeat for the desired number of repetitions."]],["Bodyweight Incline Side Plank","3544-5VXmnV5","abs","obliques",["obliques","shoulders"],["Start by lying on your side with your legs extended and stacked on top of each other.","Place your forearm on the ground directly below your shoulder, with your elbow bent at a 90-degree angle.","Engage your core and lift your hips off the ground, creating a straight line from your head to your feet.","Hold this position for the desired amount of time.","Lower your hips back down to the ground and repeat on the other side."]],["Bodyweight Kneeling Triceps Extension","1771-s0HKO2I","triceps","shoulders",["shoulders","chest"],["Kneel down on the ground with your knees hip-width apart.","Place your hands on the ground in front of you, shoulder-width apart, fingers pointing forward.","Extend your legs straight behind you, balancing on your toes and hands, forming a straight line from head to heels.","Bend your elbows and lower your upper body towards the ground, keeping your elbows close to your sides.","Pause for a moment at the bottom, then push through your hands to straighten your arms and return to the starting position.","Repeat for the desired number of repetitions."]],["Bodyweight Side Lying Biceps Curl","1769-gscGLOU","biceps","forearms",["forearms"],["Lie on your side with your legs extended and your head supported by your arm.","Hold your upper arm against your side and bend your elbow to curl your forearm towards your shoulder.","Pause for a moment at the top, then slowly lower your forearm back down to the starting position.","Repeat for the desired number of repetitions."]],["Bodyweight Squatting Row","3168-3xK09Sk","upper back","biceps",["biceps","shoulders"],["Stand with your feet shoulder-width apart, holding onto a sturdy object or suspension trainer with your arms extended.","Lower your body into a squat position, keeping your back straight and your knees behind your toes.","From the squat position, pull your body up towards the object or suspension trainer, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower your body back down to the starting position.","Repeat for the desired number of repetitions."]],["Bodyweight Squatting Row (With Towel)","3167-BReCuOn","upper back","biceps",["biceps","shoulders"],["Stand with your feet shoulder-width apart, holding a towel in front of you with your palms facing down.","Bend your knees and lower your body into a squat position, keeping your back straight and your chest up.","As you lower into the squat, simultaneously pull the towel towards your chest, squeezing your shoulder blades together.","Pause for a moment at the bottom of the squat, then slowly return to the starting position while extending your arms.","Repeat for the desired number of repetitions."]],["Bodyweight Standing Calf Raise","1373-bJYHBIN","calves","ankles",["ankles","feet"],["Stand with your feet shoulder-width apart, toes pointing forward.","Place your hands on a wall or stable surface for balance.","Slowly raise your heels off the ground, lifting your body weight onto the balls of your feet.","Pause for a moment at the top, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Bodyweight Standing Close-grip One Arm Row","3156-v2DfH14","upper back","biceps",["biceps","forearms"],["Stand with your feet shoulder-width apart, knees slightly bent, and hold a dumbbell in one hand with a neutral grip.","Bend forward at the hips, keeping your back straight and your core engaged.","Pull the dumbbell up towards your chest, keeping your elbow close to your body and squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower the dumbbell back down to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Bodyweight Standing Close-grip Row","3158-tig3PXb","upper back","biceps",["biceps","forearms"],["Stand with your feet shoulder-width apart and knees slightly bent.","Bend forward at the waist, keeping your back straight and your core engaged.","Extend your arms straight in front of you, gripping the bar or handles with a close grip.","Pull the bar or handles towards your body, squeezing your shoulder blades together.","Pause for a moment at the top of the movement, then slowly release and return to the starting position.","Repeat for the desired number of repetitions."]],["Bodyweight Standing One Arm Row","3162-xbkPfaw","upper back","biceps",["biceps","forearms"],["Stand with your feet shoulder-width apart, knees slightly bent, and hold a dumbbell in one hand.","Bend forward at the hips, keeping your back straight and your core engaged.","Let the dumbbell hang straight down in front of you, with your arm fully extended.","Pull the dumbbell up towards your chest, keeping your elbow close to your body.","Squeeze your shoulder blades together at the top of the movement.","Lower the dumbbell back down to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Bodyweight Standing One Arm Row (With Towel)","3161-O4oIqQD","upper back","biceps",["biceps","forearms"],["Stand with your feet shoulder-width apart, knees slightly bent, and hold a towel with one hand.","Bend forward at the hips, keeping your back straight and your core engaged.","Pull the towel towards your chest, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower the towel back to the starting position.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Bodyweight Standing Row","3166-wd4ds3s","upper back","biceps",["biceps","shoulders"],["Stand with your feet shoulder-width apart and knees slightly bent.","Grasp a bar or handles with an overhand grip, palms facing down.","Keep your back straight and core engaged.","Pull the bar or handles towards your body, squeezing your shoulder blades together.","Pause for a moment at the top of the movement.","Slowly release and extend your arms back to the starting position.","Repeat for the desired number of repetitions."]],["Bodyweight Standing Row (With Towel)","3165-uTv34oq","upper back","biceps",["biceps","shoulders"],["Stand with your feet shoulder-width apart and hold a towel in front of you with both hands.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Pull the towel towards your chest, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly release the tension and return to the starting position.","Repeat for the desired number of repetitions."]],["Bottoms-up","0138-CI6baTY","abs","obliques",["obliques","hip flexors"],["Lie flat on your back with your legs extended and your arms by your sides.","Bend your knees and bring them towards your chest, keeping your feet off the ground.","Engaging your abs, lift your hips off the ground, bringing your knees towards your head.","Pause for a moment at the top, then slowly lower your hips back down to the starting position.","Repeat for the desired number of repetitions."]],["Box Jump Down With One Leg Stabilization","1374-iPm26QU","calves","quadriceps",["quadriceps","hamstrings","glutes"],["Stand in front of a box or platform with your feet shoulder-width apart.","Bend your knees and jump onto the box, landing softly with one foot on the box and the other foot hanging off the edge.","Stabilize yourself on the box with the foot that is on it, while keeping the other foot off the ground.","Hold this position for a few seconds, engaging your calf muscles to maintain balance.","Slowly step down with the foot that is on the box, returning to the starting position.","Repeat the exercise with the other leg."]],["Bridge - Mountain Climber (Cross Body)","2466-9c6T1YX","abs","glutes",["glutes","quadriceps","hamstrings","shoulders","triceps"],["Start in a high plank position with your hands directly under your shoulders and your body in a straight line.","Engage your core and lift your right foot off the ground, bringing your right knee towards your left elbow.","Return your right foot to the starting position and repeat the movement with your left foot towards your right elbow.","Continue alternating sides, moving at a controlled pace.","Keep your hips level and avoid lifting your hips too high or sagging them too low.","Maintain a steady breathing pattern throughout the exercise.","Repeat for the desired number of repetitions."]],["Burpee","1160-dK9394r","cardiovascular system","quadriceps",["quadriceps","hamstrings","calves","shoulders","chest"],["Start in a standing position with your feet shoulder-width apart.","Lower your body into a squat position by bending your knees and placing your hands on the floor in front of you.","Kick your feet back into a push-up position.","Perform a push-up, keeping your body in a straight line.","Jump your feet back into the squat position.","Jump up explosively, reaching your arms overhead.","Land softly and immediately lower back into a squat position to begin the next repetition."]],["Butt-ups","0870-qcNN2FN","abs","hip flexors",["hip flexors","lower back"],["Lie flat on your back with your knees bent and feet flat on the ground.","Place your hands by your sides, palms facing down.","Engaging your abs, lift your legs off the ground, bringing your knees towards your chest.","At the top of the movement, squeeze your abs and pause for a moment.","Slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Butterfly Yoga Pose","1494-bWlZvXh","adductors","hamstrings",["hamstrings","groin"],["Sit on the floor with your legs extended in front of you.","Bend your knees and bring the soles of your feet together, allowing your knees to fall out to the sides.","Hold onto your ankles or feet with your hands.","Sit up tall and lengthen your spine.","Gently press your knees down towards the floor, feeling a stretch in your inner thighs.","Hold this position for a few breaths.","To release, slowly bring your knees back up and extend your legs."]],["Cable Alternate Shoulder Press","0148-KHPZL0b","delts","triceps",["triceps","upper back"],["Stand with your feet shoulder-width apart and grasp the handles of the cable machine with an overhand grip.","Position your hands at shoulder height, with your palms facing forward.","Keep your core engaged and your back straight.","Press one handle up and forward until your arm is fully extended.","Pause for a moment at the top, then slowly lower the handle back to the starting position.","Repeat with the other arm.","Alternate between arms for the desired number of repetitions."]],["Cable Alternate Triceps Extension","0149-Gchi5Tr","triceps","shoulders",["shoulders"],["Stand facing the cable machine with your feet shoulder-width apart.","Hold the cable handle with your right hand and bring your arm up so that your upper arm is parallel to the ground and your elbow is bent at a 90-degree angle.","Keep your upper arm stationary and extend your forearm backward, fully straightening your arm.","Pause for a moment, then slowly return to the starting position.","Repeat with your left arm.","Continue alternating arms for the desired number of repetitions."]],["Cable Assisted Inverse Leg Curl","3235-zHEpuuc","hamstrings","glutes",["glutes","calves"],["Adjust the cable machine so that the ankle attachment is at the lowest setting.","Lie face down on the bench with your legs straight and the ankle attachment secured to your ankles.","Hold onto the handles of the bench for stability.","Keeping your upper body stationary, exhale and curl your legs up towards your glutes by flexing your knees.","Pause for a moment at the top of the movement, squeezing your hamstrings.","Inhale and slowly lower your legs back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Bar Lateral Pulldown","0150-eYnzaCm","lats","biceps",["biceps","rhomboids","rear deltoids"],["Adjust the cable pulley to a high position and attach a straight bar.","Sit facing the cable machine with your feet flat on the ground and your knees slightly bent.","Grasp the bar with an overhand grip, slightly wider than shoulder-width apart.","Lean back slightly and keep your chest up, maintaining a slight arch in your lower back.","Pull the bar down towards your chest, leading with your elbows and squeezing your shoulder blades together.","Pause for a moment at the bottom of the movement, then slowly return the bar to the starting position.","Repeat for the desired number of repetitions."]],["Cable Bench Press","0151-7xI5MXA","pectorals","triceps",["triceps","shoulders"],["Adjust the cable machine to chest height and attach the handles.","Stand facing away from the machine with your feet shoulder-width apart.","Grasp the handles with an overhand grip and step forward to create tension in the cables.","Position your feet firmly on the ground and engage your core.","Bend your elbows and bring your hands to shoulder level, keeping your elbows at a 90-degree angle.","Push the handles forward, extending your arms fully in front of you.","Pause for a moment, then slowly reverse the movement, bringing your hands back to shoulder level.","Repeat for the desired number of repetitions."]],["Cable Close Grip Curl","1630-BCGQ6J5","biceps","forearms",["forearms"],["Attach a straight bar to a low pulley cable machine.","Stand facing the machine with your feet shoulder-width apart and your knees slightly bent.","Grasp the bar with an underhand grip, hands shoulder-width apart.","Keep your elbows close to your sides and your upper arms stationary throughout the exercise.","Exhale and curl the bar up towards your shoulders, contracting your biceps.","Pause for a moment at the top of the movement, squeezing your biceps.","Inhale and slowly lower the bar back to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Cable Concentration Curl","1631-NvfE43H","biceps","forearms",["forearms"],["Sit on a bench or chair with your feet flat on the floor and your knees slightly bent.","Hold the cable handle with an underhand grip and rest your elbow against the inside of your thigh.","Keeping your upper arm stationary, exhale and curl the cable handle towards your shoulder while contracting your biceps.","Pause for a moment at the top of the movement, then inhale and slowly lower the cable handle back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Cable Concentration Extension (On Knee)","0152-Db7eEgw","triceps","forearms",["forearms"],["Sit on a bench or chair with your knees bent and feet flat on the ground.","Hold the cable handle with your right hand and place your elbow on the inside of your right knee.","Extend your arm fully, keeping your elbow stationary and close to your knee.","Pause for a moment at the top, then slowly lower your arm back to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Cable Cross-over Lateral Pulldown","0153-OQ1otBN","lats","biceps",["biceps","rhomboids","rear deltoids"],["Attach a cable handle to each side of a cable machine at shoulder height.","Stand in the middle of the machine with your feet shoulder-width apart.","Grasp the handles with an overhand grip and step back to create tension in the cables.","Lean forward slightly from the hips, keeping your back straight and your chest up.","Pull the handles down and across your body, squeezing your shoulder blades together.","Pause for a moment at the bottom of the movement, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Cable Cross-over Revers Fly","0154-aqvSOQE","delts","rhomboids",["rhomboids","trapezius"],["Attach a D-handle to each low pulley cable and stand in the middle of the cable crossover machine.","Grasp the handles with a pronated grip (palms facing down) and take a step forward, positioning your feet shoulder-width apart.","Bend your knees slightly and lean forward at the waist, keeping your back straight and your abs engaged.","With your arms extended out to the sides and slightly bent at the elbows, exhale and squeeze your shoulder blades together as you pull the cables back and upward in a reverse fly motion.","Pause for a moment at the peak contraction, then inhale and slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Cable Cross-over Variation","0155-0CXGHya","pectorals","deltoids",["deltoids","triceps"],["Adjust the cable pulleys to chest height.","Stand in the center of the cable machine with one foot in front of the other.","Grasp the handles with your palms facing down and your arms extended out to the sides.","Take a step forward, keeping your arms slightly bent.","With a slight bend in your elbows, bring your hands together in front of your chest.","Pause for a moment, then slowly return your arms back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Curl","0868-G08RZcQ","biceps","forearms",["forearms"],["Stand facing the cable machine with your feet shoulder-width apart.","Grasp the cable attachment with an underhand grip, palms facing up.","Keep your elbows close to your sides and your upper arms stationary.","Exhale and curl the cable attachment towards your shoulders, contracting your biceps.","Pause for a moment at the top of the movement, squeezing your biceps.","Inhale and slowly lower the cable attachment back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Deadlift","0157-eGDudUV","glutes","hamstrings",["hamstrings","quadriceps","lower back"],["Stand facing the cable machine with your feet shoulder-width apart.","Bend at the hips and knees, lowering your torso until your back is parallel to the ground.","Grasp the cable handles with an overhand grip, keeping your arms straight and your shoulders back.","Engage your glutes and hamstrings to lift the cable handles, extending your hips and standing up straight.","Pause for a moment at the top, then slowly lower the cable handles back down to the starting position.","Repeat for the desired number of repetitions."]],["Cable Decline Fly","0158-7saC5zz","pectorals","shoulders",["shoulders","triceps"],["Adjust the cable machine to a decline position.","Stand facing away from the machine with your feet shoulder-width apart.","Hold the handles with your palms facing forward and your arms extended straight out in front of you.","Keeping a slight bend in your elbows, open your arms out to the sides in a controlled motion.","Pause for a moment at the fully extended position, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Cable Decline One Arm Press","1260-KHGNa16","pectorals","triceps",["triceps","shoulders"],["Adjust the cable machine to a decline position.","Stand facing away from the machine and grab the handle with one hand.","Position yourself with your back against the decline bench and your arm extended straight in front of you.","Bend your elbow and lower the handle towards your chest while keeping your upper arm stationary.","Pause for a moment at the bottom, then push the handle back up to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Cable Decline Press","1261-2Pya1cP","pectorals","triceps",["triceps","shoulders"],["Adjust the cable machine to a decline position.","Sit on the decline bench facing the cable machine.","Grasp the handles with an overhand grip and position them at chest level.","Keep your feet flat on the ground and your back firmly against the bench.","Exhale and push the handles away from your body, extending your arms fully.","Pause for a moment at the end of the movement, squeezing your chest muscles.","Inhale and slowly return the handles back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Decline Seated Wide-grip Row","0159-kesXOpB","upper back","biceps",["biceps","forearms"],["Sit on the decline bench facing the cable machine with your feet securely placed on the footrests.","Grasp the cable attachment with a wide overhand grip, palms facing down.","Lean back slightly, keeping your back straight and your core engaged.","Pull the cable towards your lower chest, squeezing your shoulder blades together.","Pause for a moment at the peak of the contraction, then slowly release the cable back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Drag Curl","1632-dXz8zjF","biceps","forearms",["forearms"],["Stand facing a cable machine with your feet shoulder-width apart.","Grasp the cable attachment with an underhand grip, palms facing up, and arms fully extended.","Keeping your upper arms stationary, exhale and curl the cable attachment towards your shoulders by contracting your biceps.","Pause for a moment at the top of the movement, squeezing your biceps.","Inhale and slowly lower the cable attachment back to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Cable Floor Seated Wide-grip Row","0160-veXwo0D","upper back","biceps",["biceps","forearms"],["Sit on the floor with your legs extended and your back straight.","Attach a cable handle to a low pulley and position the cable machine behind you.","Grasp the handle with a wide overhand grip, palms facing down.","Lean back slightly, keeping your back straight and your chest lifted.","Pull the handle towards your waist, squeezing your shoulder blades together.","Pause for a moment at the top of the movement, then slowly release the handle back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Forward Raise","0161-hvHhCv8","delts","triceps",["triceps","forearms"],["Stand with your feet shoulder-width apart and your knees slightly bent.","Hold the cable handle with an overhand grip, palms facing down, and your arms fully extended in front of you.","Keeping your arms straight, raise the cable handle up to shoulder level.","Pause for a moment at the top, then slowly lower the cable handle back down to the starting position.","Repeat for the desired number of repetitions."]],["Cable Front Raise","0162-u2X71Np","delts","triceps",["triceps","forearms"],["Stand with your feet shoulder-width apart and grasp the cable handle with an overhand grip.","Keep your back straight and your core engaged.","Raise the cable handle in front of you, keeping your arms straight and your palms facing down.","Continue lifting until your arms are parallel to the floor.","Pause for a moment at the top, then slowly lower the cable handle back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Front Shoulder Raise","0164-mTT3KLn","delts","trapezius",["trapezius","biceps"],["Stand with your feet shoulder-width apart and grasp the cable handle with an overhand grip.","Keep your back straight and your core engaged.","Raise the cable handle in front of you, keeping your arms straight and your palms facing down.","Continue lifting until your arms are parallel to the floor.","Pause for a moment at the top, then slowly lower the cable handle back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Hammer Curl (With Rope)","0165-HPlPoQA","biceps","forearms",["forearms"],["Stand upright with your feet shoulder-width apart and a slight bend in your knees.","Hold the cable rope attachment with an underhand grip, palms facing each other, and your arms fully extended.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the cable rope attachment until your biceps are fully contracted and the rope is at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the cable rope attachment back to the starting position.","Repeat for the desired number of repetitions."]],["Cable High Pulley Overhead Tricep Extension","1722-1xHyxys","triceps","shoulders",["shoulders"],["Attach a rope to a high pulley and stand facing away from the machine.","Grasp the rope with both hands and extend your arms overhead.","Keep your elbows close to your head and your upper arms stationary.","Slowly lower the rope behind your head by bending your elbows.","Pause for a moment, then extend your arms back to the starting position.","Repeat for the desired number of repetitions."]],["Cable High Row (Kneeling)","0167-ZSJNetl","upper back","biceps",["biceps","shoulders"],["Attach a straight bar to a cable machine at chest height.","Kneel down in front of the cable machine and grab the bar with an overhand grip, hands shoulder-width apart.","Sit back on your heels, keeping your back straight and your core engaged.","Pull the bar towards your upper abdomen, squeezing your shoulder blades together.","Pause for a moment at the top of the movement, then slowly release the bar back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Hip Adduction","0168-hBGWILP","adductors","glutes",["glutes","quadriceps"],["Attach the ankle cuff to your ankle and stand facing the cable machine.","Position yourself far enough away from the machine so that there is tension on the cable.","Place your hands on the machine for support.","Keeping your leg straight, slowly move your leg across your body towards the midline.","Pause for a moment at the end of the movement, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Cable Incline Bench Press","0169-Vh0GsK4","pectorals","deltoids",["deltoids","triceps"],["Adjust the bench to a 45-degree incline.","Attach the cable handles to the high pulleys.","Sit on the bench facing the cable machine with your feet flat on the ground.","Grasp the handles with an overhand grip and bring them to shoulder height.","Push the handles forward and upward until your arms are fully extended.","Pause for a moment, then slowly lower the handles back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Incline Bench Row","1318-yaMIo4D","upper back","biceps",["biceps","rear deltoids"],["Set up an incline bench at a 45-degree angle and attach a cable handle to the low pulley.","Sit on the bench facing the cable machine with your feet flat on the floor and your knees slightly bent.","Grasp the cable handle with an overhand grip and extend your arms fully in front of you.","Lean forward from your hips while keeping your back straight and your core engaged.","Pull the cable handle towards your chest by retracting your shoulder blades and bending your elbows.","Squeeze your back muscles at the top of the movement, then slowly extend your arms back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Incline Fly","0171-tBWXbIT","pectorals","deltoids",["deltoids","triceps"],["Adjust the cable machine to a low position and attach the handles.","Sit on an incline bench with your back against the pad and feet flat on the floor.","Grasp the handles with an overhand grip and extend your arms straight out in front of you.","Keeping a slight bend in your elbows, open your arms out to the sides in a controlled motion.","Pause for a moment at the fully extended position, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Cable Incline Fly (On Stability Ball)","0170-27NNGFr","pectorals","deltoids",["deltoids","triceps"],["Set up a stability ball at an incline angle.","Attach the cable handles to the high pulleys of a cable machine.","Sit on the stability ball facing away from the machine, with your feet firmly planted on the ground.","Grasp the cable handles with an overhand grip, palms facing forward.","Lean forward slightly, keeping your back straight and core engaged.","With a controlled motion, bring your arms out to the sides, keeping a slight bend in your elbows.","Continue the motion until your arms are parallel to the ground.","Pause for a moment, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Cable Incline Pushdown","0172-1PK5Uo3","lats","triceps",["triceps","shoulders"],["Attach a straight bar to a high pulley cable machine.","Stand facing away from the machine with your feet shoulder-width apart.","Grasp the bar with an overhand grip, hands slightly wider than shoulder-width apart.","Lean forward slightly and keep your back straight.","Pull the bar down towards your thighs by extending your elbows.","Pause for a moment at the bottom, then slowly return the bar to the starting position.","Repeat for the desired number of repetitions."]],["Cable Incline Triceps Extension","0173-Hx1WC8I","triceps","shoulders",["shoulders"],["Adjust the cable machine to a low pulley position.","Attach a straight bar to the cable.","Stand facing away from the machine with your feet shoulder-width apart.","Grasp the bar with an overhand grip and extend your arms straight overhead.","Lean forward slightly, keeping your back straight and core engaged.","Bend your elbows and lower the bar behind your head, keeping your upper arms close to your ears.","Pause for a moment, then extend your arms back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Judo Flip","0174-MvQPqVW","abs","obliques",["obliques","shoulders"],["Stand facing the cable machine with your feet shoulder-width apart.","Hold the cable handle with both hands at chest level, palms facing down.","Engage your core and rotate your torso to the right, pulling the cable across your body.","As you rotate, pivot your back foot and allow your hips to rotate naturally.","Extend your arms fully and finish the movement by flipping the cable handle over your shoulder.","Return to the starting position by reversing the movement, rotating your torso back to the center.","Repeat the movement on the opposite side.","Continue alternating sides for the desired number of repetitions."]],["Cable Kickback","0860-HEJ6DIX","triceps","shoulders",["shoulders"],["Stand facing a cable machine with your feet shoulder-width apart.","Hold the cable handle with your right hand and step back to create tension in the cable.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Keep your upper arm close to your body and your elbow bent at a 90-degree angle.","Extend your forearm backward, straightening your arm fully.","Pause for a moment, then slowly return to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Cable Kneeling Crunch","0175-WW95auq","abs","obliques",["obliques"],["Attach a rope handle to a high pulley and kneel down facing away from the machine.","Hold the rope handle with both hands and place it behind your head, keeping your elbows out to the sides.","Keeping your hips stationary, flex your waist and crunch your torso down towards your thighs.","Pause for a moment at the bottom, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Cable Kneeling Rear Delt Row (With Rope) (Male)","3697-G61cXLk","delts","trapezius",["trapezius","rhomboids","biceps"],["Attach a rope handle to a low cable pulley and kneel down facing the machine.","Grasp the rope with a neutral grip (palms facing each other) and extend your arms fully in front of you.","Keeping your back straight and core engaged, pull the rope towards your body by retracting your shoulder blades.","Squeeze your shoulder blades together at the end of the movement and hold for a brief pause.","Slowly release the tension and return to the starting position.","Repeat for the desired number of repetitions."]],["Cable Kneeling Triceps Extension","0176-KWdF2JI","triceps","shoulders",["shoulders"],["Attach a rope handle to a high pulley and kneel down facing the cable machine.","Grasp the rope with a neutral grip (palms facing each other) and bring your hands to the sides of your head.","Keep your elbows close to your head and your upper arms stationary throughout the exercise.","Extend your forearms by contracting your triceps until your arms are fully extended.","Pause for a moment, then slowly return to the starting position by bending your elbows.","Repeat for the desired number of repetitions."]],["Cable Lat Pulldown Full Range Of Motion","2330-LEprlgG","lats","biceps",["biceps","rhomboids","rear deltoids"],["Sit on the lat pulldown machine with your knees positioned under the pads.","Grasp the cable bar with an overhand grip, slightly wider than shoulder-width apart.","Lean back slightly and keep your chest up, maintaining a slight arch in your lower back.","Pull the bar down towards your upper chest, squeezing your shoulder blades together.","Pause for a moment at the bottom of the movement, then slowly release the bar back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Lateral Pulldown (With Rope Attachment)","0177-CuaWCmC","lats","biceps",["biceps","forearms"],["Attach a rope attachment to the cable machine at a high position.","Stand facing the machine with your feet shoulder-width apart.","Grasp the rope with an overhand grip, palms facing each other.","Keep your back straight and lean slightly back.","Pull the rope down towards your sides, squeezing your shoulder blades together.","Pause for a moment at the bottom of the movement.","Slowly release the tension and allow the rope to return to the starting position.","Repeat for the desired number of repetitions."]],["Cable Lateral Pulldown With V-bar","2616-4c9BhzB","lats","biceps",["biceps","forearms"],["Sit down on the cable pulldown machine and grab the v-bar attachment with an overhand grip.","Adjust the knee pad so that your thighs are secured under it.","Keep your back straight and lean back slightly.","Pull the v-bar down towards your upper chest while keeping your elbows close to your body.","Squeeze your back muscles at the bottom of the movement.","Slowly return the v-bar to the starting position and repeat for the desired number of repetitions."]],["Cable Lateral Raise","0178-goJ6ezq","delts","traps",["traps","triceps"],["Stand with your feet shoulder-width apart and grasp the cable handles with an overhand grip.","Keep your arms straight and your core engaged.","Raise your arms out to the sides until they are parallel to the floor.","Pause for a moment at the top, then slowly lower your arms back down to the starting position.","Repeat for the desired number of repetitions."]],["Cable Low Fly","0179-FVmZVhk","pectorals","deltoids",["deltoids","triceps"],["Attach the handles to the low pulleys of a cable machine and select an appropriate weight.","Stand in the middle of the machine with your feet shoulder-width apart and a slight bend in your knees.","Grasp the handles with an overhand grip and extend your arms out to the sides, keeping a slight bend in your elbows.","Maintaining control, slowly bring your arms forward in a sweeping motion, crossing them in front of your body.","Pause for a moment at the peak of the movement, feeling the stretch in your chest muscles.","Reverse the motion and slowly return your arms to the starting position, keeping tension on your chest muscles throughout.","Repeat for the desired number of repetitions."]],["Cable Low Seated Row","0180-hvV79Si","upper back","biceps",["biceps","forearms"],["Sit on the machine with your feet flat on the footrests and your knees slightly bent.","Grasp the handles with an overhand grip, palms facing down.","Keep your back straight and lean slightly forward, maintaining a slight bend in your elbows.","Pull the handles towards your body, squeezing your shoulder blades together.","Pause for a moment at the peak of the movement, then slowly release the handles back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Lying Bicep Curl","1634-otqIxU4","biceps","forearms",["forearms"],["Attach a straight bar to a low pulley cable machine.","Lie face up on a flat bench with your feet flat on the ground.","Grasp the bar with an underhand grip, hands shoulder-width apart.","Extend your arms fully, keeping your elbows close to your sides.","Keeping your upper arms stationary, exhale and curl the bar up towards your shoulders.","Pause for a moment at the top, squeezing your biceps.","Inhale and slowly lower the bar back to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Cable Lying Close-grip Curl","0182-61GrD55","biceps","forearms",["forearms"],["Attach a straight bar to a low pulley cable machine.","Lie face up on a flat bench with your feet flat on the ground.","Grasp the bar with an underhand grip, hands shoulder-width apart.","Extend your arms fully, keeping your elbows close to your sides.","Keeping your upper arms stationary, curl the bar towards your chest by contracting your biceps.","Pause for a moment at the top, squeezing your biceps.","Slowly lower the bar back to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Cable Lying Extension Pullover (With Rope Attachment)","0184-Q2Eu1Ax","lats","triceps",["triceps","shoulders"],["Attach a rope to a cable machine and set the pulley at the highest position.","Lie down on a bench with your head towards the cable machine.","Hold the rope with both hands and extend your arms straight up above your chest.","Keeping your arms straight, slowly lower the rope behind your head while maintaining control.","Pause for a moment at the bottom, then slowly raise the rope back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Lying Fly","0185-lJJ7Yq8","pectorals","deltoids",["deltoids","triceps"],["Attach the handles to the cables and lie flat on a bench with your feet flat on the ground.","Hold the handles with your palms facing each other and your arms extended straight above your chest.","Keeping a slight bend in your elbows, lower your arms out to the sides in a wide arc until you feel a stretch in your chest.","Pause for a moment, then squeeze your chest muscles to bring your arms back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Lying Triceps Extension V. 2","0186-uxJcFUU","triceps","shoulders",["shoulders"],["Attach a rope handle to a low pulley cable machine.","Lie down on a flat bench facing up, with your head towards the cable machine.","Grasp the rope handle with both hands, palms facing each other, and extend your arms straight up over your chest.","Keeping your upper arms stationary, slowly lower the rope handle towards your forehead by bending your elbows.","Pause for a moment at the bottom, then extend your arms back up to the starting position.","Repeat for the desired number of repetitions."]],["Cable Middle Fly","0188-xLYSdtg","pectorals","deltoids",["deltoids","triceps"],["Attach cables to both sides of a cable machine at chest height.","Stand in the center of the machine with one foot slightly in front of the other.","Grasp the handles with an overhand grip and extend your arms out to the sides.","Keep a slight bend in your elbows and maintain a slight forward lean.","Engage your chest muscles and bring your arms forward in a sweeping motion.","Pause for a moment at the center, then slowly return your arms back to the starting position.","Repeat for the desired number of repetitions."]],["Cable One Arm Bent Over Row","0189-EIsE3u8","upper back","biceps",["biceps","forearms"],["Stand facing a cable machine with your feet shoulder-width apart.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Grasp the cable handle with one hand, palm facing inward, and extend your arm fully.","Pull the cable handle towards your body, keeping your elbow close to your side, until your hand reaches your lower chest.","Pause for a moment, then slowly extend your arm back to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Cable One Arm Curl","0190-YTur5nR","biceps","forearms",["forearms"],["Stand facing the cable machine with your feet shoulder-width apart.","Grasp the cable handle with an underhand grip, palm facing up.","Keep your elbow close to your side and slowly curl your forearm up towards your shoulder.","Pause for a moment at the top, then slowly lower your forearm back down to the starting position.","Repeat for the desired number of repetitions."]],["Cable One Arm Decline Chest Fly","1262-w4dLzSx","pectorals","shoulders",["shoulders","triceps"],["Attach a D-handle to a low pulley cable machine and set the bench to a decline angle.","Lie down on the bench with your head towards the machine and grab the handle with your right hand.","Extend your arm straight up above your chest, keeping a slight bend in your elbow.","With a controlled motion, lower your arm out to the side until your hand is in line with your shoulder.","Pause for a moment, then reverse the motion and bring your arm back to the starting position.","Repeat for the desired number of repetitions, then switch to your left arm and repeat the exercise."]],["Cable One Arm Fly On Exercise Ball","1263-hHy8tQG","pectorals","deltoids",["deltoids","triceps"],["Sit on an exercise ball with your feet flat on the ground and your back straight.","Hold a cable handle in one hand and extend your arm out to the side, parallel to the ground.","Keep your elbow slightly bent and your palm facing forward.","Slowly bring your arm across your body, squeezing your chest muscles.","Pause for a moment at the end of the movement, then slowly return to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Cable One Arm Incline Fly On Exercise Ball","1264-P14Dz9D","pectorals","deltoids",["deltoids","triceps"],["Sit on an exercise ball with your feet flat on the ground and your back against an incline bench.","Hold a cable handle in one hand with your arm extended and palm facing inward.","Keeping a slight bend in your elbow, slowly lower your arm out to the side until your hand is in line with your shoulder.","Pause for a moment, then squeeze your chest muscles to bring your arm back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Cable One Arm Incline Press","1265-GKEH6jj","pectorals","deltoids",["deltoids","triceps"],["Adjust the cable machine to a low pulley position.","Sit on an incline bench facing away from the cable machine.","Grasp the handle with one hand and bring it up to shoulder height.","Position your feet firmly on the ground and maintain a stable position.","Press the handle forward and upward, extending your arm fully.","Pause for a moment at the top, then slowly lower the handle back to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Cable One Arm Incline Press On Exercise Ball","1266-6t00BsF","pectorals","shoulders",["shoulders","triceps"],["Sit on an exercise ball with your feet flat on the ground and your back resting against an incline bench.","Hold a cable handle in one hand and position your arm at a 90-degree angle with your elbow bent.","Press the cable handle forward and upward, extending your arm fully.","Pause for a moment at the top, then slowly lower the cable handle back to the starting position.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Cable One Arm Lateral Bent-over","0191-dB07vDu","pectorals","deltoids",["deltoids","trapezius"],["Stand with your feet shoulder-width apart, facing a cable machine.","Grasp the handle with one hand and step back to create tension on the cable.","Bend forward at the waist, keeping your back straight and your core engaged.","Extend your arm out to the side, parallel to the ground, with a slight bend in your elbow.","Slowly bring your arm back to the starting position, maintaining control throughout the movement.","Repeat for the desired number of repetitions, then switch sides."]],["Cable One Arm Lateral Raise","0192-wEulIzp","delts","traps",["traps","triceps"],["Stand with your feet shoulder-width apart, facing the cable machine.","Hold the cable handle with one hand, palm facing down, and stand far enough away from the machine so that there is tension on the cable.","Keep your arm straight and slowly raise it out to the side until it is parallel to the ground.","Pause for a moment at the top, then slowly lower your arm back down to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Cable One Arm Preacher Curl","1633-eHBlPsa","biceps","forearms",["forearms"],["Adjust the cable machine so that the preacher curl pad is at chest height.","Stand facing the cable machine with your feet shoulder-width apart.","Grasp the cable handle with an underhand grip and position your upper arm against the preacher curl pad.","Keep your back straight and your core engaged.","Slowly curl the cable handle towards your shoulder, keeping your upper arm against the pad.","Pause for a moment at the top of the movement, squeezing your biceps.","Slowly lower the cable handle back to the starting position.","Repeat for the desired number of repetitions.","Switch arms and repeat the exercise."]],["Cable One Arm Press On Exercise Ball","1267-MKIelrR","pectorals","shoulders",["shoulders","triceps"],["Sit on an exercise ball with your feet flat on the ground and your back straight.","Hold a cable handle in one hand and position your arm at chest height, elbow bent.","Place your other hand on your hip for stability.","Press the cable handle forward, extending your arm fully.","Pause for a moment, then slowly return to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Cable One Arm Pulldown","3563-U5INZY6","lats","biceps",["biceps","forearms"],["Attach a single handle to a high pulley cable machine.","Stand facing the machine with your feet shoulder-width apart.","Grasp the handle with an overhand grip and extend your arm fully.","Keep your back straight and your core engaged.","Pull the handle down towards your side while keeping your elbow close to your body.","Pause for a moment at the bottom of the movement, squeezing your lat muscle.","Slowly release the handle back to the starting position.","Repeat for the desired number of repetitions.","Switch sides and repeat the exercise with the other arm."]],["Cable One Arm Reverse Preacher Curl","1635-ZXnjcOQ","biceps","forearms",["forearms"],["Adjust the cable machine so that the pulley is at the lowest position.","Stand facing the cable machine with your feet shoulder-width apart.","Grasp the cable handle with an underhand grip and position your upper arm against the preacher bench pad.","Keep your back straight and your core engaged throughout the exercise.","Slowly curl your forearm towards your bicep, keeping your upper arm stationary against the pad.","Pause for a moment at the top of the movement, squeezing your bicep.","Slowly lower the cable handle back to the starting position.","Repeat for the desired number of repetitions.","Switch arms and repeat the exercise."]],["Cable One Arm Straight Back High Row (Kneeling)","0193-WrYPP2g","upper back","biceps",["biceps","shoulders"],["Attach a handle to a cable machine at waist height.","Kneel down facing the cable machine and grab the handle with one hand.","Keep your back straight and your core engaged.","Pull the handle towards your chest, squeezing your shoulder blades together.","Pause for a moment at the top of the movement.","Slowly release the handle back to the starting position.","Repeat for the desired number of repetitions.","Switch sides and repeat the exercise with the other arm."]],["Cable One Arm Tricep Pushdown","1723-qRZ5S1N","triceps","forearms",["forearms"],["Stand facing a cable machine with a straight bar attachment at chest height.","Grasp the bar with an overhand grip and step back to create tension in the cable.","Position your feet shoulder-width apart and slightly bend your knees.","Keep your back straight and core engaged throughout the exercise.","Start with your arm fully extended and perpendicular to the floor.","Keeping your upper arm stationary, exhale and push the bar down until your arm is fully extended.","Pause for a moment, then inhale and slowly return to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Cable Overhead Curl","1636-wDUqY2u","biceps","forearms",["forearms","shoulders"],["Attach a straight bar to a high pulley cable machine.","Stand facing the machine with your feet shoulder-width apart.","Grasp the bar with an underhand grip, hands shoulder-width apart.","Keep your elbows close to your sides and your upper arms stationary.","Exhale and curl the bar down towards your forehead, keeping your upper arms stationary.","Pause for a moment at the bottom of the movement, squeezing your biceps.","Inhale and slowly return the bar to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Cable Overhead Curl On Exercise Ball","1637-ioTf098","biceps","forearms",["forearms","shoulders"],["Sit on an exercise ball and hold the cable handle with an underhand grip.","Extend your arms fully overhead, keeping your elbows close to your ears.","Slowly curl the cable down towards your forehead, keeping your upper arms stationary.","Pause for a moment at the bottom of the movement, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Cable Overhead Triceps Extension (Rope Attachment)","0194-2IxROQ1","triceps","shoulders",["shoulders"],["Attach a rope to a cable machine at a high position.","Stand facing away from the machine with your feet shoulder-width apart.","Grasp the rope with both hands, palms facing each other, and bring your hands above your head.","Keep your upper arms close to your head and your elbows pointing forward.","Slowly lower the rope behind your head by bending your elbows.","Pause for a moment, then extend your arms back up to the starting position.","Repeat for the desired number of repetitions."]],["Cable Palm Rotational Row","1319-OmQ8w0p","upper back","biceps",["biceps","forearms"],["Attach a handle to a cable machine at waist height.","Stand facing the machine with your feet shoulder-width apart.","Grasp the handle with an overhand grip, palms facing down.","Step back to create tension on the cable, keeping your back straight and knees slightly bent.","Pull the handle towards your body, rotating your palms to face upwards as you do so.","Squeeze your shoulder blades together at the end of the movement.","Slowly release the handle back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Preacher Curl","0195-P2lNrGL","biceps","forearms",["forearms"],["Adjust the cable machine so that the preacher curl pad is at chest height.","Sit on the preacher curl bench and place your upper arms on the pad, gripping the cable attachment with an underhand grip.","Keep your back straight and your elbows tucked in at your sides.","Slowly curl the cable attachment up towards your shoulders, squeezing your biceps at the top of the movement.","Pause for a moment, then slowly lower the cable attachment back down to the starting position.","Repeat for the desired number of repetitions."]],["Cable Press On Exercise Ball","1268-vAwm6rK","pectorals","shoulders",["shoulders","triceps"],["Sit on an exercise ball with your feet flat on the ground and your knees at a 90-degree angle.","Hold the cable handles at chest height with your palms facing down and your elbows bent.","Engage your core and press the cable handles forward until your arms are fully extended.","Pause for a moment, then slowly release the tension and bring the cable handles back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Pull Through (With Rope)","0196-OM46QHm","glutes","hamstrings",["hamstrings","lower back"],["Stand facing away from the cable machine with your feet shoulder-width apart.","Grab the rope attachment with both hands and step forward, creating tension in the cable.","Bend at the hips and lower your upper body until it is parallel to the ground, keeping your back straight.","Engage your glutes and hamstrings to pull your body back up to the starting position.","Repeat for the desired number of repetitions."]],["Cable Pulldown","0198-RVwzP10","lats","biceps",["biceps","forearms"],["Adjust the cable pulldown machine so that the seat is at a comfortable height and the knee pad is secured.","Sit on the seat with your back straight and your feet flat on the ground.","Grasp the cable bar with an overhand grip, slightly wider than shoulder-width apart.","Lean back slightly and engage your core.","Pull the cable bar down towards your chest, squeezing your shoulder blades together.","Pause for a moment at the bottom of the movement, then slowly release the bar back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Pulldown (Pro Lat Bar)","0197-qdRxqCj","lats","biceps",["biceps","forearms"],["Adjust the seat height so that your thighs are parallel to the ground and your feet are flat on the floor.","Grasp the lat bar with an overhand grip, slightly wider than shoulder-width apart.","Sit down and lean back slightly, keeping your chest up and your back straight.","Pull the bar down towards your chest, squeezing your shoulder blades together.","Pause for a moment at the bottom of the movement, then slowly release the bar back up to the starting position.","Repeat for the desired number of repetitions."]],["Cable Pulldown Bicep Curl","1638-QTXKWPh","biceps","forearms",["forearms"],["Attach a straight bar to the cable machine at the highest setting.","Stand facing the machine with your feet shoulder-width apart.","Grasp the bar with an underhand grip, hands shoulder-width apart.","Keep your elbows close to your sides and your upper arms stationary.","Exhale and slowly curl the bar down towards your thighs, keeping your wrists straight.","Pause for a moment at the bottom of the movement, squeezing your biceps.","Inhale and slowly return the bar to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Cable Pushdown","0201-3ZflifB","triceps","forearms",["forearms"],["Attach a straight bar to a high pulley cable machine.","Stand facing the machine with your feet shoulder-width apart and a slight bend in your knees.","Grasp the bar with an overhand grip, hands shoulder-width apart.","Keep your elbows close to your sides and your upper arms stationary.","Exhale and push the bar down until your elbows are fully extended.","Pause for a moment, then inhale and slowly return the bar to the starting position.","Repeat for the desired number of repetitions."]],["Cable Pushdown (Straight Arm) V. 2","0199-PskORrA","lats","triceps",["triceps","shoulders"],["Attach a straight bar to a high pulley cable machine.","Stand facing the machine with your feet shoulder-width apart and a slight bend in your knees.","Grasp the bar with an overhand grip, keeping your arms straight and your palms facing down.","Engage your core and keep your back straight as you exhale and push the bar down towards your thighs.","Pause for a moment at the bottom, then slowly return the bar to the starting position while inhaling.","Repeat for the desired number of repetitions."]],["Cable Pushdown (With Rope Attachment)","0200-dU605di","triceps","forearms",["forearms"],["Attach a rope attachment to a high pulley on a cable machine.","Stand facing the machine with your feet shoulder-width apart and a slight bend in your knees.","Grasp the rope with an overhand grip, palms facing each other.","Keep your elbows close to your sides and your upper arms stationary throughout the exercise.","Exhale and push the rope downward by extending your elbows until your arms are fully extended.","Pause for a moment, then inhale and slowly return to the starting position by allowing your elbows to flex.","Repeat for the desired number of repetitions."]],["Cable Rear Delt Row (Stirrups)","0202-yUdIGNs","delts","trapezius",["trapezius","rhomboids","biceps"],["Attach a stirrup handle to a low cable pulley and stand facing the machine.","Grasp the handle with your left hand and take a step back with your right foot, positioning your body at a slight angle.","Bend your knees slightly and hinge forward at the hips, keeping your back straight and your core engaged.","With your left arm extended and your palm facing down, pull the handle towards your chest by retracting your shoulder blade.","Pause for a moment at the top of the movement, squeezing your shoulder blade.","Slowly release the handle back to the starting position and repeat for the desired number of repetitions.","Switch sides and repeat the exercise with your right arm."]],["Cable Rear Delt Row (With Rope)","0203-wqNPGCg","delts","trapezius",["trapezius","rhomboids","biceps"],["Attach a rope handle to a low pulley cable machine.","Stand facing the machine with your feet shoulder-width apart.","Grasp the rope handle with an overhand grip, palms facing each other.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Keep your elbows slightly bent and pull the rope towards your chest, squeezing your shoulder blades together.","Pause for a moment at the top of the movement, then slowly release the tension and return to the starting position.","Repeat for the desired number of repetitions."]],["Cable Rear Drive","0204-c3QQLPi","triceps","shoulders",["shoulders","back"],["Attach a handle to a low pulley cable machine and stand facing away from the machine.","Grasp the handle with an overhand grip and extend your arms straight out in front of you.","Keeping your elbows stationary, pull the handle back towards your body, squeezing your triceps at the end of the movement.","Slowly return the handle to the starting position and repeat for the desired number of repetitions."]],["Cable Rear Pulldown","0205-SpsOSXk","lats","biceps",["biceps","rhomboids","rear deltoids"],["Adjust the cable machine so that the pulley is at the highest position.","Sit facing the machine with your feet flat on the ground and your knees slightly bent.","Grasp the cable attachment with an overhand grip, hands slightly wider than shoulder-width apart.","Lean back slightly, keeping your back straight and your chest up.","Pull the cable attachment down towards your chest, squeezing your shoulder blades together.","Pause for a moment at the bottom of the movement, then slowly release the cable back up to the starting position.","Repeat for the desired number of repetitions."]],["Cable Reverse Crunch","0873-RqOtqD7","abs","hip flexors",["hip flexors"],["Attach a cable to a low pulley and lie down facing up on a mat.","Hold the cable with both hands and extend your arms straight up towards the ceiling.","Bend your knees and lift your legs up, bringing your thighs towards your chest.","While keeping your upper body stable, curl your pelvis up towards your chest, lifting your hips off the mat.","Pause for a moment at the top, then slowly lower your hips back down to the starting position.","Repeat for the desired number of repetitions."]],["Cable Reverse Curl","0206-eOG0r6v","biceps","forearms",["forearms"],["Attach a straight bar to a low pulley cable machine.","Stand facing the machine with your feet shoulder-width apart and your knees slightly bent.","Grasp the bar with an underhand grip, hands shoulder-width apart.","Keep your elbows close to your sides and your upper arms stationary throughout the exercise.","Exhale and curl the bar up towards your shoulders, contracting your biceps.","Pause for a moment at the top, squeezing your biceps.","Inhale and slowly lower the bar back to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Cable Reverse Grip Triceps Pushdown (Sz-bar) (With Arm Blaster)","2406-ThKP69G","triceps","forearms",["forearms"],["Attach a straight bar to the cable machine at the highest setting.","Stand facing the cable machine with your feet shoulder-width apart.","Grasp the bar with an underhand grip, palms facing up, and your hands shoulder-width apart.","Keep your elbows close to your sides and your upper arms stationary throughout the exercise.","Engage your triceps and slowly push the bar down until your arms are fully extended.","Pause for a moment at the bottom, then slowly return the bar to the starting position.","Repeat for the desired number of repetitions."]],["Cable Reverse One Arm Curl","1413-gVlnLIJ","biceps","forearms",["forearms"],["Stand facing a cable machine with your feet shoulder-width apart.","Grasp the cable handle with an underhand grip, palm facing down.","Keep your elbow close to your side and slowly curl your forearm up towards your shoulder.","Pause for a moment at the top, then slowly lower your forearm back down to the starting position.","Repeat for the desired number of repetitions."]],["Cable Reverse Preacher Curl","0209-IwX5NqK","biceps","forearms",["forearms"],["Adjust the cable machine so that the preacher curl pad is at chest height.","Sit on the preacher curl bench and place your upper arms on the pad, with your palms facing down and your elbows fully extended.","Grab the cable handles with an underhand grip, shoulder-width apart.","Keeping your upper arms stationary, exhale and curl the handles towards your shoulders, contracting your biceps.","Pause for a moment at the top of the movement, squeezing your biceps.","Inhale and slowly lower the handles back to the starting position, fully extending your elbows.","Repeat for the desired number of repetitions."]],["Cable Reverse Wrist Curl","0210-eYmsEPR","forearms","forearms",["forearms","wrists"],["Attach a cable to a low pulley and sit on a bench facing the cable machine.","Grasp the cable handle with an overhand grip, palms facing down.","Rest your forearms on your thighs, with your wrists hanging off the edge.","Keeping your forearms stationary, exhale and curl your wrists upward as far as possible.","Pause for a moment at the top, then inhale and slowly lower your wrists back down to the starting position.","Repeat for the desired number of repetitions."]],["Cable Reverse-grip Pushdown","0207-VjYliFZ","triceps","forearms",["forearms"],["Attach a straight bar to a high pulley cable machine.","Stand facing the machine with your feet shoulder-width apart.","Grasp the bar with an underhand grip, palms facing up, and your hands shoulder-width apart.","Keep your elbows close to your sides and your upper arms stationary throughout the exercise.","Using your triceps, push the bar down until your arms are fully extended and your triceps are contracted.","Pause for a moment, then slowly return the bar to the starting position.","Repeat for the desired number of repetitions."]],["Cable Reverse-grip Straight Back Seated High Row","0208-PNtsX17","upper back","biceps",["biceps","forearms"],["Sit on the seat facing the cable machine with your feet flat on the floor.","Grasp the cable attachment with an underhand grip, palms facing up, and your hands shoulder-width apart.","Keep your back straight and lean slightly forward from your hips.","Pull the cable towards your torso by retracting your shoulder blades and squeezing your back muscles.","Pause for a moment at the peak of the contraction, then slowly release the cable back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Rope Crossover Seated Row","1320-UFGF6gk","upper back","biceps",["biceps","forearms"],["Sit on the rowing machine with your feet flat on the footrests and your knees slightly bent.","Grasp the cable ropes with an overhand grip, palms facing each other.","Lean back slightly, keeping your back straight and your core engaged.","Pull the cable ropes towards your chest, squeezing your shoulder blades together.","Pause for a moment at the peak of the movement, then slowly release the tension and return to the starting position.","Repeat for the desired number of repetitions."]],["Cable Rope Elevated Seated Row","1321-c8oybX6","upper back","biceps",["biceps","forearms"],["Sit on the elevated seat facing the cable machine.","Grab the cable rope handles with an overhand grip, palms facing each other.","Keep your back straight and lean slightly back, maintaining a slight bend in your knees.","Pull the cable towards your body by retracting your shoulder blades and squeezing your back muscles.","Pause for a moment at the fully contracted position.","Slowly release the tension and extend your arms back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Rope Extension Incline Bench Row","1322-MgKwAAo","upper back","biceps",["biceps","shoulders"],["Set up an incline bench at a 45-degree angle and attach a cable machine to the low pulley.","Attach a rope handle to the cable machine and sit on the incline bench facing the machine.","Grab the rope handle with an overhand grip and lean forward, keeping your back straight.","Extend your arms fully, pulling the rope towards your upper chest while keeping your elbows close to your body.","Squeeze your shoulder blades together at the end of the movement.","Slowly release the tension and return to the starting position.","Repeat for the desired number of repetitions."]],["Cable Rope Hammer Preacher Curl","1639-PcPe0P5","biceps","forearms",["forearms"],["Attach a rope attachment to a low pulley cable machine.","Stand facing the machine with your feet shoulder-width apart.","Grasp the rope with a neutral grip (palms facing each other).","Position your upper arms against the preacher bench pad, keeping your elbows slightly bent.","Keeping your upper arms stationary, exhale and curl the rope towards your shoulders by contracting your biceps.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly lower the rope back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Rope High Pulley Overhead Tricep Extension","1724-NN8nSNT","triceps","shoulders",["shoulders"],["Attach a rope to a high pulley and adjust the weight accordingly.","Stand facing away from the pulley machine with your feet shoulder-width apart.","Grasp the rope with both hands, palms facing down, and bring your hands above your head.","Keep your upper arms close to your head and perpendicular to the floor.","Slowly lower the rope behind your head by bending your elbows.","Pause for a moment, then extend your arms back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Rope Incline Tricep Extension","1725-ZujAdR9","triceps","shoulders",["shoulders"],["Attach a rope to a high pulley and adjust the incline bench to a comfortable angle.","Stand facing away from the pulley with your feet shoulder-width apart.","Grasp the rope with an overhand grip and extend your arms straight overhead.","Keep your elbows close to your head and your upper arms stationary throughout the exercise.","Lower the rope behind your head by bending your elbows until your forearms touch your biceps.","Pause for a moment, then extend your arms back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Rope Lying On Floor Tricep Extension","1726-U3ffHlY","triceps","shoulders",["shoulders"],["Attach a rope to a cable machine and set it to the lowest position.","Lie on the floor facing up, with your head towards the cable machine.","Hold the rope with both hands, palms facing each other, and extend your arms straight up towards the ceiling.","Keep your upper arms stationary and slowly lower the rope towards your forehead, bending your elbows.","Pause for a moment, then extend your arms back up to the starting position.","Repeat for the desired number of repetitions."]],["Cable Rope One Arm Hammer Preacher Curl","1640-4hATdoB","biceps","forearms",["forearms"],["Attach a rope handle to a low pulley cable machine.","Stand facing the machine with your feet shoulder-width apart.","Grasp the rope handle with an underhand grip, palms facing up.","Position your upper arm against the preacher bench pad, keeping your elbow slightly bent.","Keep your back straight and your core engaged throughout the exercise.","Slowly curl the rope handle towards your shoulder, keeping your upper arm stationary.","Squeeze your biceps at the top of the movement, then slowly lower the rope handle back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Cable Rope Seated Row","1323-SJqRxOt","upper back","biceps",["biceps","forearms"],["Sit on the rowing machine with your feet flat on the footrests and knees slightly bent.","Grasp the cable ropes with an overhand grip, palms facing each other.","Keep your back straight and lean slightly forward, maintaining a slight bend in your elbows.","Pull the cable ropes towards your body, squeezing your shoulder blades together.","Pause for a moment at the peak of the movement, then slowly release the tension and return to the starting position.","Repeat for the desired number of repetitions."]],["Cable Russian Twists (On Stability Ball)","0211-d9Xaxq6","abs","obliques",["obliques","lower back"],["Sit on a stability ball with your feet flat on the ground and your knees bent at a 90-degree angle.","Hold the cable handle with both hands and extend your arms straight out in front of you.","Lean back slightly while keeping your back straight and your core engaged.","Twist your torso to the right, bringing the cable handle towards your right hip.","Pause for a moment, then twist your torso to the left, bringing the cable handle towards your left hip.","Continue alternating twists for the desired number of repetitions."]],["Cable Seated Chest Press","2144-nIR4Rwl","pectorals","shoulders",["shoulders","triceps"],["Adjust the seat height and cable handles to a comfortable position.","Sit on the bench with your back straight and feet flat on the floor.","Grasp the cable handles with an overhand grip at shoulder height.","Push the handles forward and away from your body, extending your arms fully.","Pause for a moment, then slowly bring the handles back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Seated Crunch","0212-8xUv4J7","abs","obliques",["obliques"],["Sit on a cable machine with your feet flat on the ground and your knees bent.","Hold the cable handle with both hands and position it behind your head.","Engage your abs and slowly curl your upper body forward, bringing your chest towards your knees.","Pause for a moment at the top, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Cable Seated Curl","1641-8oYqOt9","biceps","forearms",["forearms"],["Sit on a cable machine with your feet flat on the ground and your back straight.","Grasp the cable attachment with an underhand grip, palms facing up, and your arms fully extended.","Keeping your upper arms stationary, exhale and curl the cable attachment towards your shoulders, contracting your biceps.","Pause for a moment at the top of the movement, squeezing your biceps.","Inhale and slowly lower the cable attachment back to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Cable Seated High Row (V-bar)","0213-pwt0pnM","lats","biceps",["biceps","rhomboids","rear deltoids"],["Sit on the cable machine with your feet flat on the floor and your knees slightly bent.","Grasp the v-bar attachment with an overhand grip, palms facing each other, and your hands shoulder-width apart.","Keep your back straight and lean slightly forward from the hips.","Pull the v-bar towards your torso by retracting your shoulder blades and squeezing your back muscles.","Pause for a moment at the peak of the contra
