 or so while creating a curvature on your lower back and sticking your chest out. This is your starting position.","As you breathe out, bring the bar down until it touches your upper chest by drawing the shoulders and the upper arms down and back. Tip: Concentrate on squeezing the back muscles once you reach the full contracted position. The upper torso should remain stationary (only the arms should move). The forearms should do no other work except for holding the bar; therefore do not try to pull the bar down using the forearms.","After a second in the contracted position, while squeezing your shoulder blades together, slowly raise the bar back to the starting position when your arms are fully extended and the lats are fully stretched. Inhale during this portion of the movement.","6. Repeat this motion for the prescribed amount of repetitions."]],["Close-Grip Push-Up off of a Dumbbell","Close-Grip_Push-Up_off_of_a_Dumbbell/0.jpg","triceps",["abs","pectorals","delts"],["Lie on the floor and place your hands on an upright dumbbell. Supporting your weight on your toes and hands, keep your torso rigid and your elbows in with your arms straight. This will be your starting position.","Lower your body, allowing the elbows to flex while you inhale. Keep your body straight, not allowing your hips to rise or sag.","Press yourself back up to the starting position by extending the elbows. Breathe out as you perform this step.","After a pause at the contracted position, repeat the movement for the prescribed amount of repetitions."]],["Close-Grip Standing Barbell Curl","Close-Grip_Standing_Barbell_Curl/0.jpg","biceps",["forearms"],["Hold a barbell with both hands, palms up and a few inches apart.","Stand with your torso straight and your head up. Your feet should be about shoulder width and your elbows close to your torso. This will be your starting position. Tip: You will keep your upper arms and elbows stationary throughout the movement.","Curl the bar up in a semicircular motion until the forearms touch your biceps. Exhale as you perform this portion of the movement and contract your biceps hard for a second at the top. Tip: Avoid bending the back or using swinging motions as you lift the weight. Only the forearms should move.","Slowly go back down to the starting position as you inhale.","Repeat for the recommended amount of repetitions."]],["Cocoons","Cocoons/0.jpg","abs",[],["Begin by lying on your back on the ground. Your legs should be straight and your arms extended behind your head. This will be your starting position.","To perform the movement, tuck the knees toward your chest, rotating your pelvis to lift your glutes from the floor. As you do so, flex the spine, bringing your arms back over your head to perform a simultaneous crunch motion.","After a brief pause, return to the starting position."]],["Conan's Wheel","Conans_Wheel/0.jpg","quadriceps",["abs","biceps","calves","forearms","lower back","delts","traps"],["With the weight loaded, take a zurcher hold on the end of the implement. Place the bar in the crook of the elbow and hold onto your wrist. Try to keep the weight off of the forearms.","Begin by lifting the weight from the ground. Keep a tight, upright posture as you being to walk, taking short, fast steps. Look up and away as you turn in a circle. Do not hold your breath during the event. Continue walking until you complete one or more complete turns."]],["Concentration Curls","Concentration_Curls/0.jpg","biceps",["forearms"],["Sit down on a flat bench with one dumbbell in front of you between your legs. Your legs should be spread with your knees bent and feet on the floor.","Use your right arm to pick the dumbbell up. Place the back of your right upper arm on the top of your inner right thigh. Rotate the palm of your hand until it is facing forward away from your thigh. Tip: Your arm should be extended and the dumbbell should be above the floor. This will be your starting position.","While holding the upper arm stationary, curl the weights forward while contracting the biceps as you breathe out. Only the forearms should move. Continue the movement until your biceps are fully contracted and the dumbbells are at shoulder level. Tip: At the top of the movement make sure that the little finger of your arm is higher than your thumb. This guarantees a good contraction. Hold the contracted position for a second as you squeeze the biceps.","Slowly begin to bring the dumbbells back to starting position as your breathe in. Caution: Avoid swinging motions at any time.","Repeat for the recommended amount of repetitions. Then repeat the movement with the left arm."]],["Cross-Body Crunch","Cross-Body_Crunch/0.jpg","abs",[],["Lie flat on your back and bend your knees about 60 degrees.","Keep your feet flat on the floor and place your hands loosely behind your head. This will be your starting position.","Now curl up and bring your right elbow and shoulder across your body while bring your left knee in toward your left shoulder at the same time. Reach with your elbow and try to touch your knee. Exhale as you perform this movement. Tip: Try to bring your shoulder up towards your knee rather than just your elbow and remember that the key is to contract the abs as you perform the movement; not just to move the elbow.","Now go back down to the starting position as you inhale and repeat with the left elbow and the right knee.","Continue alternating in this manner until all prescribed repetitions are done."]],["Cross Body Hammer Curl","Cross_Body_Hammer_Curl/0.jpg","biceps",["forearms"],["Stand up straight with a dumbbell in each hand. Your hands should be down at your side with your palms facing in.","While keeping your palms facing in and without twisting your arm, curl the dumbbell of the right arm up towards your left shoulder as you exhale. Touch the top of the dumbbell to your shoulder and hold the contraction for a second.","Slowly lower the dumbbell along the same path as you inhale and then repeat the same movement for the left arm.","Continue alternating in this fashion until the recommended amount of repetitions is performed for each arm."]],["Cross Over - With Bands","Cross_Over_-_With_Bands/0.jpg","pectorals",["biceps","delts"],["Secure an exercise band around a stationary post.","While facing away from the post, grab the handles on both ends of the band and step forward enough to create tension on the band.","Raise your arms to the sides, parallel to the floor, perpendicular to your torso (your torso and the arms should resemble the letter \"T\") and with the palms facing forward. Have them extended with a slight bend at the elbows. This will be your starting position.","While keeping your arms straight, bring them across your chest in a semicircular motion to the front as you exhale and flex your pecs. Hold the contraction for a second.","Slowly return to the starting position as you inhale.","Perform for the recommended amount of repetitions."]],["Crossover Reverse Lunge","Crossover_Reverse_Lunge/0.jpg","lower back",["abs","abductors","glutes","hamstrings","quadriceps"],["Stand with your feet shoulder width apart. This will be your starting position.","Perform a rear lunge by stepping back with one foot and flexing the hips and front knee. As you do so, rotate your torso across the front leg.","After a brief pause, return to the starting position and repeat on the other side, continuing in an alternating fashion."]],["Crucifix","Crucifix/0.jpg","delts",["forearms"],["In the crucifix, you statically hold weights out to the side for time. While the event can be practiced using dumbbells, it is best to practice with one of the various implements used, such as axes and hammers, as it feels different.","Begin standing, and raise your arms out to the side holding the implements. Your arms should be parallel to the ground. In competition, judges or sensors are used to let you know when you break parallel. Hold for as long as you can. Typically, the weights should be heavy enough that you fail in 30-60 seconds."]],["Crunch - Hands Overhead","Crunch_-_Hands_Overhead/0.jpg","abs",[],["Lie on the floor with your back flat and knees bent with around a 60-degree angle between the hamstrings and the calves.","Keep your feet flat on the floor and stretch your arms overhead with your palms crossed. This will be your starting position.","Curl your upper body forward and bring your shoulder blades just off the floor. At all times, keep your arms aligned with your head, neck and shoulder. Don't move them forward from that position. Exhale as you perform this portion of the movement and hold the contraction for a second.","Slowly lower down to the starting position as you inhale.","Repeat for the recommended amount of repetitions."]],["Crunch - Legs On Exercise Ball","Crunch_-_Legs_On_Exercise_Ball/0.jpg","abs",[],["Lie flat on your back with your feet resting on an exercise ball and your knees bent at a 90 degree angle.","Place your feet three to four inches apart and point your toes inward so they touch.","Place your hands lightly on either side of your head keeping your elbows in. Tip: Don't lock your fingers behind your head.","Push the small of your back down in the floor in order to better isolate your abdominal muscles. This will be your starting position.","Begin to roll your shoulders off the floor and continue to push down as hard as you can with your lower back. Your shoulders should come up off the floor only about four inches, and your lower back should remain on the floor. Breathe out as you execute this portion of the movement. Squeeze your abdominals hard at the top of the contraction and hold for a second. Tip: Focus on a slow, controlled movement. Refrain from using momentum at any time.","Slowly go back down to the starting position as you inhale.","Repeat for the recommended amount of repetitions."]],["Crunches","Crunches/0.jpg","abs",[],["Lie flat on your back with your feet flat on the ground, or resting on a bench with your knees bent at a 90 degree angle. If you are resting your feet on a bench, place them three to four inches apart and point your toes inward so they touch.","Now place your hands lightly on either side of your head keeping your elbows in. Tip: Don't lock your fingers behind your head.","While pushing the small of your back down in the floor to better isolate your abdominal muscles, begin to roll your shoulders off the floor.","Continue to push down as hard as you can with your lower back as you contract your abdominals and exhale. Your shoulders should come up off the floor only about four inches, and your lower back should remain on the floor. At the top of the movement, contract your abdominals hard and keep the contraction for a second. Tip: Focus on slow, controlled movement - don't cheat yourself by using momentum.","After the one second contraction, begin to come down slowly again to the starting position as you inhale.","Repeat for the recommended amount of repetitions."]],["Cuban Press","Cuban_Press/0.jpg","delts",["traps"],["Take a dumbbell in each hand with a pronated grip in a standing position. Raise your upper arms so that they are parallel to the floor, allowing your lower arms to hang in the \"scarecrow\" position. This will be your starting position.","To initiate the movement, externally rotate the shoulders to move the upper arm 180 degrees. Keep the upper arms in place, rotating the upper arms until the wrists are directly above the elbows, the forearms perpendicular to the floor.","Now press the dumbbells by extending at the elbows, straightening your arms overhead.","Return to the starting position as you breathe in by reversing the steps.","Repeat for the recommended amount of repetitions."]],["Dancer's Stretch","Dancers_Stretch/0.jpg","lower back",["abductors","glutes"],["Sit up on the floor.","Cross your right leg over your left, keeping the knee bent. Your left leg is straight and down on the floor.","Place your left arm on your right leg and your right hand on the floor.","Rotate your upper body to the right, and hold for 10-20 seconds. Switch sides."]],["Dead Bug","Dead_Bug/0.jpg","abs",[],["Begin lying on your back with your hands extended above you toward the ceiling.","Bring your feet, knees, and hips up to 90 degrees.","Exhale hard to bring your ribcage down and flatten your back onto the floor, rotating your pelvis up and squeezing your glutes. Hold this position throughout the movement. This will be your starting position.","Initiate the exercise by extending one leg, straightening the knee and hip to bring the leg just above the ground.","Maintain the position of your lumbar and pelvis as you perform the movement, as your back is going to want to arch.","Stay tight and return the working leg to the starting position.","Repeat on the opposite side, alternating until the set is complete."]],["Deadlift with Bands","Deadlift_with_Bands/0.jpg","lower back",["forearms","glutes","hamstrings","upper back","quadriceps","traps"],["To deadlift with short bands, simply loop them over the bar before you start, and step into them to set up. For long bands, they will need to be anchored to a secure base, such as heavy dumbbells or a rack.","With your feet, and your grip set, take a big breath and then lower your hips and bend the knees until your shins contact the bar. Look forward with your head, keep your chest up and your back arched, and begin driving through the heels to move the weight upward. After the bar passes the knees, aggressively pull the bar back, pulling your shoulder blades together as you drive your hips forward into the bar.","Lower the bar by bending at the hips and guiding it to the floor."]],["Deadlift with Chains","Deadlift_with_Chains/0.jpg","lower back",["forearms","glutes","hamstrings","upper back","quadriceps","traps"],["You can attach the chains to the sleeves of the bar, or just drape the middle over the bar so there is a greater weight increase as you lift.","Approach the bar so that it is centered over your feet. You feet should be about hip width apart. Bend at the hip to grip the bar at shoulder width, allowing your shoulder blades to protract. Typically, you would use an overhand grip or an over/under grip on heavier sets. With your feet, and your grip set, take a big breath and then lower your hips and bend the knees until your shins contact the bar.","Look forward with your head, keep your chest up and your back arched, and begin driving through the heels to move the weight upward. After the bar passes the knees, aggressively pull the bar back, pulling your shoulder blades together as you drive your hips forward into the bar.","Lower the bar by bending at the hips and guiding it to the floor."]],["Decline Barbell Bench Press","Decline_Barbell_Bench_Press/0.jpg","pectorals",["delts","triceps"],["Secure your legs at the end of the decline bench and slowly lay down on the bench.","Using a medium width grip (a grip that creates a 90-degree angle in the middle of the movement between the forearms and the upper arms), lift the bar from the rack and hold it straight over you with your arms locked. The arms should be perpendicular to the floor. This will be your starting position. Tip: In order to protect your rotator cuff, it is best if you have a spotter help you lift the barbell off the rack.","As you breathe in, come down slowly until you feel the bar on your lower chest.","After a second pause, bring the bar back to the starting position as you breathe out and push the bar using your chest muscles. Lock your arms and squeeze your chest in the contracted position, hold for a second and then start coming down slowly again. Tip: It should take at least twice as long to go down than to come up).","Repeat the movement for the prescribed amount of repetitions.","When you are done, place the bar back in the rack."]],["Decline Close-Grip Bench To Skull Crusher","Decline_Close-Grip_Bench_To_Skull_Crusher/0.jpg","triceps",["pectorals","delts"],["Secure your legs at the end of the decline bench and slowly lay down on the bench.","Using a close grip (a grip that is slightly less than shoulder width), lift the bar from the rack and hold it straight over you with your arms locked and elbows in. The arms should be perpendicular to the floor. This will be your starting position. Tip: In order to protect your rotator cuff, it is best if you have a spotter help you lift the barbell off the rack.","Now lower the bar down to your lower chest as you breathe in. Keep the elbows in as you perform this movement.","Using the triceps to push the bar back up, press it back to the starting position as you exhale.","As you breathe in and you keep the upper arms stationary, bring the bar down slowly by moving your forearms in a semicircular motion towards you until you feel the bar slightly touch your forehead. Breathe in as you perform this portion of the movement.","Lift the bar back to the starting position by contracting the triceps and exhaling.","Repeat steps 3-6 until the recommended amount of repetitions is performed."]],["Decline Crunch","Decline_Crunch/0.jpg","abs",[],["Secure your legs at the end of the decline bench and lie down.","Now place your hands lightly on either side of your head keeping your elbows in. Tip: Don't lock your fingers behind your head.","While pushing the small of your back down in the bench to better isolate your abdominal muscles, begin to roll your shoulders off it.","Continue to push down as hard as you can with your lower back as you contract your abdominals and exhale. Your shoulders should come up off the bench only about four inches, and your lower back should remain on the bench. At the top of the movement, contract your abdominals hard and keep the contraction for a second. Tip: Focus on slow, controlled movement - don't cheat yourself by using momentum.","After the one second contraction, begin to come down slowly again to the starting position as you inhale.","Repeat for the recommended amount of repetitions."]],["Decline Dumbbell Bench Press","Decline_Dumbbell_Bench_Press/0.jpg","pectorals",["delts","triceps"],["Secure your legs at the end of the decline bench and lie down with a dumbbell on each hand on top of your thighs. The palms of your hand will be facing each other.","Once you are laying down, move the dumbbells in front of you at shoulder width.","Once at shoulder width, rotate your wrists forward so that the palms of your hands are facing away from you. This will be your starting position.","Bring down the weights slowly to your side as you breathe out. Keep full control of the dumbbells at all times. Tip: Throughout the motion, the forearms should always be perpendicular to the floor.","As you breathe out, push the dumbbells up using your pectoral muscles. Lock your arms in the contracted position, squeeze your chest, hold for a second and then start coming down slowly. Tip: It should take at least twice as long to go down than to come up..","Repeat the movement for the prescribed amount of repetitions of your training program."]],["Decline Dumbbell Flyes","Decline_Dumbbell_Flyes/0.jpg","pectorals",[],["Secure your legs at the end of the decline bench and lie down with a dumbbell on each hand on top of your thighs. The palms of your hand will be facing each other.","Once you are laying down, move the dumbbells in front of you at shoulder width. The palms of the hands should be facing each other and the arms should be perpendicular to the floor and fully extended. This will be your starting position.","With a slight bend on your elbows in order to prevent stress at the biceps tendon, lower your arms out at both sides in a wide arc until you feel a stretch on your chest. Breathe in as you perform this portion of the movement. Tip: Keep in mind that throughout the movement, the arms should remain stationary; the movement should only occur at the shoulder joint.","Return your arms back to the starting position as you squeeze your chest muscles and breathe out. Tip: Make sure to use the same arc of motion used to lower the weights.","Hold for a second at the contracted position and repeat the movement for the prescribed amount of repetitions."]],["Decline Dumbbell Triceps Extension","Decline_Dumbbell_Triceps_Extension/0.jpg","triceps",[],["Secure your legs at the end of the decline bench and lie down with a dumbbell on each hand on top of your thighs. The palms of your hand will be facing each other.","Once you are laying down, move the dumbbells in front of you at shoulder width. The palms of the hands should be facing each other and the arms should be perpendicular to the floor and fully extended. This will be your starting position.","As you breathe in and you keep the upper arms stationary (and elbows in), bring the dumbbells down slowly by moving your forearms in a semicircular motion towards you until your thumbs are next to your ears. Breathe in as you perform this portion of the movement.","Lift the dumbbells back to the starting position by contracting the triceps and exhaling.","Repeat for the recommended amount of repetitions."]],["Decline EZ Bar Triceps Extension","Decline_EZ_Bar_Triceps_Extension/0.jpg","triceps",[],["Secure your legs at the end of the decline bench and slowly lay down on the bench.","Using a close grip (a grip that is slightly less than shoulder width), lift the EZ bar from the rack and hold it straight over you with your arms locked and elbows in. The arms should be perpendicular to the floor. This will be your starting position. Tip: In order to protect your rotator cuff, it is best if you have a spotter help you lift the barbell off the rack.","As you breathe in and you keep the upper arms stationary, bring the bar down slowly by moving your forearms in a semicircular motion towards you until you feel the bar slightly touch your forehead. Breathe in as you perform this portion of the movement.","Lift the bar back to the starting position by contracting the triceps and exhaling.","Repeat until the recommended amount of repetitions is performed."]],["Decline Oblique Crunch","Decline_Oblique_Crunch/0.jpg","abs",[],["Secure your legs at the end of the decline bench and slowly lay down on the bench.","Raise your upper body off the bench until your torso is about 35-45 degrees if measured from the floor.","Put one hand beside your head and the other on your thigh. This will be your starting position.","Raise your upper body slowly from the starting position while turning your torso to the left. Continue crunching up as you exhale until your right elbow touches your left knee. Hold this contracted position for a second. Tip: Focus on keeping your abs tight and keeping the movement slow and controlled.","Lower your body back down slowly to the starting position as you inhale.","After completing one set on the right for the recommended amount of repetitions, switch to your left side. Tip: Focus on really twisting your torso and feeling the contraction when you are in the up position."]],["Decline Push-Up","Decline_Push-Up/0.jpg","pectorals",["delts","triceps"],["Lie on the floor face down and place your hands about 36 inches apart while holding your torso up at arms length. Move your feet up to a box or bench. This will be your starting position.","Next, lower yourself downward until your chest almost touches the floor as you inhale.","Now breathe out and press your upper body back up to the starting position while squeezing your chest.","After a brief pause at the top contracted position, you can begin to lower yourself downward again for as many repetitions as needed."]],["Decline Reverse Crunch","Decline_Reverse_Crunch/0.jpg","abs",[],["Lie on your back on a decline bench and hold on to the top of the bench with both hands. Don't let your body slip down from this position.","Hold your legs parallel to the floor using your abs to hold them there while keeping your knees and feet together. Tip: Your legs should be fully extended with a slight bend on the knee. This will be your starting position.","While exhaling, move your legs towards the torso as you roll your pelvis backwards and you raise your hips off the bench. At the end of this movement your knees will be touching your chest.","Hold the contraction for a second and move your legs back to the starting position while inhaling.","Repeat for the recommended amount of repetitions."]],["Decline Smith Press","Decline_Smith_Press/0.jpg","pectorals",["delts","triceps"],["Place a decline bench underneath the Smith machine. Now place the barbell at a height that you can reach when lying down and your arms are almost fully extended. Using a pronated grip that is wider than shoulder width, unlock the bar from the rack and hold it straight over you with your arms extended. This will be your starting position.","As you inhale, lower the bar under control by allowing the elbows to flex, lightly contacting the torso.","After a brief pause, bring the bar back to the starting position by extending the elbows, exhaling as you do so.","Repeat the movement for the prescribed amount of repetitions.","When the set is complete, lock the bar back in the rack."]],["Deficit Deadlift","Deficit_Deadlift/0.jpg","lower back",["forearms","glutes","hamstrings","upper back","quadriceps","traps"],["Begin by having a platform or weight plates that you can stand on, usually 1-3 inches in height. Approach the bar so that it is centered over your feet. You feet should be about hip width apart. Bend at the hip to grip the bar at shoulder width, allowing your shoulder blades to protract. Typically, you would use an overhand grip or an over/under grip on heavier sets.","With your feet, and your grip set, take a big breath and then lower your hips and bend the knees until your shins contact the bar. Look forward with your head, keep your chest up and your back arched, and begin driving through the heels to move the weight upward. After the bar passes the knees, aggressively pull the bar back, pulling your shoulder blades together as you drive your hips forward into the bar.","Lower the bar by bending at the hips and guiding it to the floor."]],["Depth Jump Leap","Depth_Jump_Leap/0.jpg","quadriceps",["abductors","adductors","calves","glutes","hamstrings"],["For this drill you will need two boxes or benches, one 12 to 16 inches high and the other 22 to 26 inches high.","Stand on one of the two boxes with arms at the sides; feet should be together and slightly off the edge as in the depth jump. Place the other box approximately two or three feet in front of and facing the performer.","Begin by dropping off the initial box, landing and simultaneously taking off with both feet.","Rebound by driving upward and outward as intensely as possible, using the arms and full extension of the body to jump onto the higher box. Again, allow the legs to absorb the impact."]],["Dip Machine","Dip_Machine/0.jpg","triceps",["pectorals","delts"],["Sit securely in a dip machine, select the weight and firmly grasp the handles.","Now keep your elbows in at your sides in order to place emphasis on the triceps. The elbows should be bent at a 90 degree angle.","As you contract the triceps, extend your arms downwards as you exhale. Tip: At the bottom of the movement, focus on keeping a little bend in your arms to keep tension on the triceps muscle.","Now slowly let your arms come back up to the starting position as you inhale.","Repeat for the recommended amount of repetitions."]],["Dips - Chest Version","Dips_-_Chest_Version/0.jpg","pectorals",["delts","triceps"],["For this exercise you will need access to parallel bars. To get yourself into the starting position, hold your body at arms length (arms locked) above the bars.","While breathing in, lower yourself slowly with your torso leaning forward around 30 degrees or so and your elbows flared out slightly until you feel a slight stretch in the chest.","Once you feel the stretch, use your chest to bring your body back to the starting position as you breathe out. Tip: Remember to squeeze the chest at the top of the movement for a second.","Repeat the movement for the prescribed amount of repetitions."]],["Dips - Triceps Version","Dips_-_Triceps_Version/0.jpg","triceps",["pectorals","delts"],["To get into the starting position, hold your body at arm's length with your arms nearly locked above the bars.","Now, inhale and slowly lower yourself downward. Your torso should remain upright and your elbows should stay close to your body. This helps to better focus on tricep involvement. Lower yourself until there is a 90 degree angle formed between the upper arm and forearm.","Then, exhale and push your torso back up using your triceps to bring your body back to the starting position.","Repeat the movement for the prescribed amount of repetitions."]],["Donkey Calf Raises","Donkey_Calf_Raises/0.jpg","calves",[],["For this exercise you will need access to a donkey calf raise machine. Start by positioning your lower back and hips under the padded lever provided. The tailbone area should be the one making contact with the pad.","Place both of your arms on the side handles and place the balls of your feet on the calf block with the heels extending off. Align the toes forward, inward or outward, depending on the area you wish to target, and straighten the knees without locking them. This will be your starting position.","Raise your heels as you breathe out by extending your ankles as high as possible and flexing your calf. Ensure that the knee is kept stationary at all times. There should be no bending at any time. Hold the contracted position by a second before you start to go back down.","Go back slowly to the starting position as you breathe in by lowering your heels as you bend the ankles until calves are stretched.","Repeat for the recommended amount of repetitions."]],["Double Kettlebell Alternating Hang Clean","Double_Kettlebell_Alternating_Hang_Clean/0.jpg","hamstrings",["biceps","calves","forearms","glutes","lower back","quadriceps","traps"],["Place two kettlebells between your feet. To get in the starting position, push your butt back and look straight ahead.","Clean one kettlebell to your shoulder and hold on to the other kettlebell.","With a fluid motion, lower the top kettlebell while driving the bottom kettlebell up."]],["Double Kettlebell Jerk","Double_Kettlebell_Jerk/0.jpg","delts",["calves","quadriceps","triceps"],["Hold a kettlebell by the handle in each hand.","Clean the kettlebells to your shoulders by extending through the legs and hips as you pull the kettlebells towards your shoulders. Rotate your wrists as you do so, so that the palms face forward. This will be your starting position.","Dip your body by bending the knees, keeping your torso upright.","Immediately reverse direction, driving through the heels, in essence jumping to create momentum.","As you do so, press the kettlebells overhead to lockout by extending the arms, using your body's momentum to move the weights.","Return your feet to the ground in a split fashion, with one foot forward and one foot back.","Keeping the weights overhead, return to a standing position, bringing your feet together. Lower the weights to perform the next repetition."]],["Double Kettlebell Push Press","Double_Kettlebell_Push_Press/0.jpg","delts",["calves","quadriceps","triceps"],["Clean two kettlebells to your shoulders.","Squat down a few inches and reverse the motion rapidly. Use the momentum from the legs to drive the kettlebells overhead.","Once the kettlebells are locked out, lower the kettlebells to your shoulders and repeat."]],["Double Kettlebell Snatch","Double_Kettlebell_Snatch/0.jpg","delts",["glutes","hamstrings","quadriceps"],["Place two kettlebells behind your feet. Bend your knees and sit back to pick up the kettlebells.","Swing the kettlebells between your legs forcefully and reverse the direction.","Drive through with your hips and lock the ketttlebells overhead in one uninterrupted motion."]],["Double Kettlebell Windmill","Double_Kettlebell_Windmill/0.jpg","abs",["glutes","hamstrings","delts","triceps"],["Place a kettlebell in front of your front foot and clean and press a kettlebell overhead with your opposite arm. Clean the kettlebell to your shoulder by extending through the legs and hips as you pull the kettlebell towards your shoulders. Rotate your wrist as you do so, so that the palm faces forward.","Keeping the kettlebell locked out at all times, push your butt out in the direction of the locked out kettlebell. Turn your feet out at a forty-five degree angle from the arm with the locked out kettlebell.","Bending at the hip to one side, sticking your butt out, slowly lean until you can retrieve the kettlebell from the floor. Keep your eyes on the kettlebell that you hold over your head at all times.","Pause for a second after retrieving the kettlebell from the ground and reverse the motion back to the starting position."]],["Double Leg Butt Kick","Double_Leg_Butt_Kick/0.jpg","quadriceps",["abductors","adductors","calves","glutes","hamstrings"],["Begin standing with your knees slightly bent.","Quickly squat a short distance, flexing the hips and knees, and immediately extend to jump for maximum vertical height.","As you go up, tuck your heels by flexing the knees, attempting to touch the buttocks.","Finish the motion by landing with the knees only partially bent, using your legs to absorb the impact."]],["Downward Facing Balance","Downward_Facing_Balance/0.jpg","glutes",["abs","hamstrings"],["Lie facedown on top of an exercise ball.","While resting on your stomach on the ball, walk your hands forward along the floor and lift your legs, extending your elbows and knees."]],["Drag Curl","Drag_Curl/0.jpg","biceps",["forearms"],["Grab a barbell with a supinated grip (palms facing forward) and get your elbows close to your torso and back. This will be your starting position.","As you exhale, curl the bar up while keeping the elbows to the back as you \"Drag\" the bar up by keeping it in contact with your torso. Tip: As you can see, you will not be keeping the elbows pinned to your sides, but instead you will be bringing them back. Also, do not lift your shoulders.","Slowly go back to the starting position as you keep the bar in contact with the torso at all times.","Repeat for the recommended amount of repetitions."]],["Drop Push","Drop_Push/0.jpg","pectorals",["delts","triceps"],["Position low boxes or other platforms 2-3 feet apart.","Move to a pushup position between them, supporting yourself by placing your hands on the boxes.","With good posture, drop from the platforms by pressing up and moving your hands to shoulder width, cushioning your landing by absorbing the impact through the arm."]],["Dumbbell Alternate Bicep Curl","Dumbbell_Alternate_Bicep_Curl/0.jpg","biceps",["forearms"],["Stand (torso upright) with a dumbbell in each hand held at arms length. The elbows should be close to the torso and the palms of your hand should be facing your thighs.","While holding the upper arm stationary, curl the right weight as you rotate the palm of the hands until they are facing forward. At this point continue contracting the biceps as you breathe out until your biceps is fully contracted and the dumbbells are at shoulder level. Hold the contracted position for a second as you squeeze the biceps. Tip: Only the forearms should move.","Slowly begin to bring the dumbbell back to the starting position as your breathe in. Tip: Remember to twist the palms back to the starting position (facing your thighs) as you come down.","Repeat the movement with the left hand. This equals one repetition.","Continue alternating in this manner for the recommended amount of repetitions."]],["Dumbbell Bench Press","Dumbbell_Bench_Press/0.jpg","pectorals",["delts","triceps"],["Lie down on a flat bench with a dumbbell in each hand resting on top of your thighs. The palms of your hands will be facing each other.","Then, using your thighs to help raise the dumbbells up, lift the dumbbells one at a time so that you can hold them in front of you at shoulder width.","Once at shoulder width, rotate your wrists forward so that the palms of your hands are facing away from you. The dumbbells should be just to the sides of your chest, with your upper arm and forearm creating a 90 degree angle. Be sure to maintain full control of the dumbbells at all times. This will be your starting position.","Then, as you breathe out, use your chest to push the dumbbells up. Lock your arms at the top of the lift and squeeze your chest, hold for a second and then begin coming down slowly. Tip: Ideally, lowering the weight should take about twice as long as raising it.","Repeat the movement for the prescribed amount of repetitions of your training program."]],["Dumbbell Bench Press with Neutral Grip","Dumbbell_Bench_Press_with_Neutral_Grip/0.jpg","pectorals",["delts","triceps"],["Take a dumbbell in each hand and lay back onto a flat bench. Your feet should be flat on the floor and your shoulder blades retracted.","Maintaining a neutral grip, palms facing each other, begin with your arms extended directly above you, perpendicular to the floor. This will be your starting position.","Begin the movement by flexing the elbow, lowering the upper arms to the side. Descend until the dumbbells are to your torso.","Pause, then extend the elbow and return to the starting position."]],["Dumbbell Bicep Curl","Dumbbell_Bicep_Curl/0.jpg","biceps",["forearms"],["Stand up straight with a dumbbell in each hand at arm's length. Keep your elbows close to your torso and rotate the palms of your hands until they are facing forward. This will be your starting position.","Now, keeping the upper arms stationary, exhale and curl the weights while contracting your biceps. Continue to raise the weights until your biceps are fully contracted and the dumbbells are at shoulder level. Hold the contracted position for a brief pause as you squeeze your biceps.","Then, inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the recommended amount of repetitions."]],["Dumbbell Clean","Dumbbell_Clean/0.jpg","hamstrings",["calves","forearms","glutes","lower back","quadriceps","delts","traps"],["Begin standing with a dumbbell in each hand with your feet shoulder width apart.","Lower the weights to the floor by flexing at the hips and knees, pushing your hips back until the dumbbells reach the floor. This will be your starting position.","To initiate the movement, violently jump upward by extending the hips, knees, and ankles to acclerate the weights upward. Maintaining a neutral grip on the dumbbells, keep the arms straight until full extension is reached.","After full extension, rebend the hips and knees to receive the weight in a squat position. Allow the arms to bend, guiding the dumbbells to your shoulders.","Upon receiving the weight in the squat position, extend the hips and knees to finish in a standing position with the weights on your shoulders."]],["Dumbbell Floor Press","Dumbbell_Floor_Press/0.jpg","triceps",["pectorals","delts"],["Lay on the floor holding dumbbells in your hands. Your knees can be bent. Begin with the weights fully extended above you.","Lower the weights until your upper arm comes in contact with the floor. You can tuck your elbows to emphasize triceps size and strength, or to focus on your chest angle your arms to the side.","Pause at the bottom, and then bring the weight together at the top by extending through the elbows."]],["Dumbbell Flyes","Dumbbell_Flyes/0.jpg","pectorals",[],["Lie down on a flat bench with a dumbbell on each hand resting on top of your thighs. The palms of your hand will be facing each other.","Then using your thighs to help raise the dumbbells, lift the dumbbells one at a time so you can hold them in front of you at shoulder width with the palms of your hands facing each other. Raise the dumbbells up like you're pressing them, but stop and hold just before you lock out. This will be your starting position.","With a slight bend on your elbows in order to prevent stress at the biceps tendon, lower your arms out at both sides in a wide arc until you feel a stretch on your chest. Breathe in as you perform this portion of the movement. Tip: Keep in mind that throughout the movement, the arms should remain stationary; the movement should only occur at the shoulder joint.","Return your arms back to the starting position as you squeeze your chest muscles and breathe out. Tip: Make sure to use the same arc of motion used to lower the weights.","Hold for a second at the contracted position and repeat the movement for the prescribed amount of repetitions."]],["Dumbbell Incline Row","Dumbbell_Incline_Row/0.jpg","upper back",["biceps","forearms","lats","delts"],["Using a neutral grip, lean into an incline bench.","Take a dumbbell in each hand with a neutral grip, beginning with the arms straight. This will be your starting position.","Retract the shoulder blades and flex the elbows to row the dumbbells to your side.","Pause at the top of the motion, and then return to the starting position."]],["Dumbbell Incline Shoulder Raise","Dumbbell_Incline_Shoulder_Raise/0.jpg","delts",["triceps"],["Sit on an Incline Bench while holding a dumbbell on each hand on top of your thighs.","Lift your legs up to kick the weights to your shoulders and lean back. Position the dumbbells above your shoulders with your arms extended. The arms should be perpendicular to the floor with your palms facing forward and knuckles pointing towards the ceiling. This will be your starting position.","While keeping the arms straight and locked, lift the dumbbells by raising the shoulders from the bench as you breathe out.","Bring back the dumbbells to the starting position as you breathe in.","Repeat for the recommended amount of repetitions."]],["Dumbbell Lunges","Dumbbell_Lunges/0.jpg","quadriceps",["calves","glutes","hamstrings"],["Stand with your torso upright holding two dumbbells in your hands by your sides. This will be your starting position.","Step forward with your right leg around 2 feet or so from the foot being left stationary behind and lower your upper body down, while keeping the torso upright and maintaining balance. Inhale as you go down. Note: As in the other exercises, do not allow your knee to go forward beyond your toes as you come down, as this will put undue stress on the knee joint. Make sure that you keep your front shin perpendicular to the ground.","Using mainly the heel of your foot, push up and go back to the starting position as you exhale.","Repeat the movement for the recommended amount of repetitions and then perform with the left leg."]],["Dumbbell Lying One-Arm Rear Lateral Raise","Dumbbell_Lying_One-Arm_Rear_Lateral_Raise/0.jpg","delts",["upper back"],["While holding a dumbbell in one hand, lay with your chest down on a slightly inclined (around 15 degrees when measured from the floor) adjustable bench. The other hand can be used to hold to the leg of the bench for stability.","Position the palm of the hand that is holding the dumbbell in a neutral manner (palms facing your torso) as you keep the arm extended with the elbow slightly bent. This will be your starting position.","Now raise the arm with the dumbbell to the side until your elbow is at shoulder height and your arm is roughly parallel to the floor as you exhale. Tip: Maintain your arm perpendicular to the torso while keeping your arm extended throughout the movement. Also, keep the contraction at the top for a second.","Slowly lower the dumbbell to the starting position as you inhale.","Repeat for the recommended amount of repetitions."]],["Dumbbell Lying Pronation","Dumbbell_Lying_Pronation/0.jpg","forearms",[],["Lie on a flat bench face down with one arm holding a dumbbell and the other hand on top of the bench folded so that you can rest your head on it.","Bend the elbows of the arm holding the dumbbell so that it creates a 90-degree angle between the upper arm and the forearm.","Now raise the upper arm so that the forearm is perpendicular to the floor and the upper arm is perpendicular to your torso. Tip: The upper arm should be parallel to the floor and also creating a 90-degree angle with your torso. This will be your starting position.","As you breathe out, externally rotate your forearm so that the dumbbell is lifted forward as you maintain the 90 degree angle bend between the upper arms and the forearm. You will continue this external rotation until the forearm is parallel to the floor. At this point you will hold the contraction for a second.","As you breathe in, slowly go back to the starting position.","Repeat for the recommended amount of repetitions."]],["Dumbbell Lying Rear Lateral Raise","Dumbbell_Lying_Rear_Lateral_Raise/0.jpg","delts",[],["While holding a dumbbell in each hand, lay with your chest down on a slightly inclined (around 15 degrees when measured from the floor) adjustable bench.","Position the palms of the hands in a neutral manner (palms facing your torso) as you keep the arms extended with the elbows slightly bent. This will be your starting position.","Now raise the arms to the side until your elbows are at shoulder height and your arms are roughly parallel to the floor as you exhale. Tip: Maintain your arms perpendicular to the torso while keeping them extended throughout the movement. Also, keep the contraction at the top for a second.","Slowly lower the dumbbells to the starting position as you inhale.","Repeat for the recommended amount of repetitions and then switch to the other arm."]],["Dumbbell Lying Supination","Dumbbell_Lying_Supination/0.jpg","forearms",[],["Lie sideways on a flat bench with one arm holding a dumbbell and the other hand on top of the bench folded so that you can rest your head on it.","Bend the elbows of the arm holding the dumbbell so that it creates a 90-degree angle between the upper arm and the forearm.","Now raise the upper arm so that the forearm is parallel to the floor and perpendicular to your torso (Tip: So the forearm will be directly in front of you). The upper arm will be stationary by your torso and should be parallel to the floor (aligned with your torso at all times). This will be your starting position.","As you breathe out, externally rotate your forearm so that the dumbbell is lifted up in a semicircle motion as you maintain the 90 degree angle bend between the upper arms and the forearm. You will continue this external rotation until the forearm is perpendicular to the floor and the torso pointing towards the ceiling. At this point you will hold the contraction for a second.","As you breathe in, slowly go back to the starting position.","Repeat for the recommended amount of repetitions and then switch to the other arm."]],["Dumbbell One-Arm Shoulder Press","Dumbbell_One-Arm_Shoulder_Press/0.jpg","delts",["triceps"],["Grab a dumbbell and either sit on a military press bench or a utility bench that has a back support on it as you place the dumbbells upright on top of your thighs or stand up straight.","Clean the dumbbell up to bring it to shoulder height. The other hand can be kept fully extended to the side, by the waist or grabbing a fixed surface.","Rotate the wrist so that the palm of your hand is facing forward. This is your starting position.","As you exhale, push the dumbbell up until your arm is fully extended.","After a second pause, slowly come down back to the starting position as you inhale.","Repeat for the recommended amount of repetitions and then switch arms."]],["Dumbbell One-Arm Triceps Extension","Dumbbell_One-Arm_Triceps_Extension/0.jpg","triceps",[],["Grab a dumbbell and either sit on a military press bench or a utility bench that has a back support on it as you place the dumbbells upright on top of your thighs or stand up straight.","Clean the dumbbell up to bring it to shoulder height and then extend the arm over your head so that the whole arm is perpendicular to the floor and next to your head. The dumbbell should be on top of you. The other hand can be kept fully extended to the side, by the waist, supporting the upper arm that has the dumbbell or grabbing a fixed surface.","Rotate the wrist so that the palm of your hand is facing forward and the pinkie is facing the ceiling. This will be your starting position.","Slowly lower the dumbbell behind your head as you hold the upper arm stationary. Inhale as you perform this movement and pause when your triceps are fully stretched.","Return to the starting position by flexing your triceps as you breathe out. Tip: It is imperative that only the forearm moves. The upper arm should remain at all times stationary next to your head.","Repeat for the recommended amount of repetitions and switch arms."]],["Dumbbell One-Arm Upright Row","Dumbbell_One-Arm_Upright_Row/0.jpg","delts",["biceps","traps"],["Grab a dumbbell and stand up straight with your arm extended in front of you with a slight bend at the elbows and your back straight. This will be your starting position. Tip: The dumbbell should be resting on top of your thigh with the palm of your hands facing your thighs.","Keep the other hand can be kept fully extended to the side, by the waist or grabbing a fixed surface. This will be your starting position.","Use your side shoulders to lift the dumbbell as you exhale. The dumbbell should be close to the body as you move it up. Continue to lift it until the dumbbell is nearly in line with your chin. Tip: Your elbows should drive the motion. As you lift the dumbbell, your elbow should always be higher than your forearm. Also, keep your torso stationary and pause for a second at the top of the movement.","Lower the dumbbell back down slowly to the starting position. Inhale as you perform this portion of the movement.","Repeat for the recommended amount of repetitions and switch arms."]],["Dumbbell Prone Incline Curl","Dumbbell_Prone_Incline_Curl/0.jpg","biceps",[],["Grab a dumbbell on each hand and lie face down on an incline bench with your shoulders near top of the incline. Your knees can rest on the seat or your legs can be straddled to the sides (my preferred way).","Let your arms extend and hang naturally in front of you so that they are perpendicular to the floor.","Now keep your elbows in by your side and face the palms forward. This will be your starting position.","Raise the dumbbells by contracting the biceps until your arms are fully flexed. Exhale as you perform this portion of the movement and ensure that only the forearms move. The upper arms should remain stationary at all times.","Lower the dumbbells until your arms are fully extended.","Repeat for the recommended amount of times."]],["Dumbbell Raise","Dumbbell_Raise/0.jpg","delts",["biceps"],["Grab a dumbbell in each arm and stand up straight with your arms extended by your sides with a slight bend at the elbows and your back straight. This will be your starting position. Tip: The dumbbell should be next to your thighs with the palm of your hands facing back.","Use your side shoulders to lift the dumbbells as you exhale. The dumbbells should be to the side of the body as you move them up. Continue to lift it until the dumbbells are nearly in line with your chin. Tip: Your elbows should drive the motion. As you lift the dumbbell, your elbow should always be higher than your forearm. Also, keep your torso stationary and pause for a second at the top of the movement.","Lower the dumbbells back down slowly to the starting position. Inhale as you perform this portion of the movement.","Repeat for the recommended amount of repetitions."]],["Dumbbell Rear Lunge","Dumbbell_Rear_Lunge/0.jpg","quadriceps",["calves","glutes","hamstrings"],["Stand with your torso upright holding two dumbbells in your hands by your sides. This will be your starting position.","Step backward with your right leg around two feet or so from the left foot and lower your upper body down, while keeping the torso upright and maintaining balance. Inhale as you go down. Tip: As in the other exercises, do not allow your knee to go forward beyond your toes as you come down, as this will put undue stress on the knee joint. Make sure that you keep your front shin perpendicular to the ground. Keep the torso upright during the lunge; flexible hip flexors are important. A long lunge emphasizes the Gluteus Maximus; a short lunge emphasizes Quadriceps.","Push up and go back to the starting position as you exhale. Tip: Use the ball of your feet to push in order to accentuate the quadriceps. To focus on the glutes, press with your heels.","Now repeat with the opposite leg."]],["Dumbbell Scaption","Dumbbell_Scaption/0.jpg","delts",["traps"],["This corrective exercise strengthens the muscles that stabilize your shoulder blade. Hold a light weight in each hand, hanging at your sides. Your thumbs should pointing up.","Begin the movement raising your arms out in front of you, about 30 degrees off center. Your arms should be fully extended as you perform the movement.","Continue until your arms are parallel to the ground, and then return to the starting position."]],["Dumbbell Seated Box Jump","Dumbbell_Seated_Box_Jump/0.jpg","quadriceps",["calves","glutes","hamstrings"],["Position a box a couple feet to the side of a bench. Hold a dumbbell to your chest with both hands and seat yourself on the bench facing the box. This will be your starting position.","Plant your feet firmly on the ground as you lean forward, extending through the hips and knees to jump up and forward.","Land on the box with both feet, absorbing the impact by allowing the hips and knees to bend.","Step down and return to the starting position."]],["Dumbbell Seated One-Leg Calf Raise","Dumbbell_Seated_One-Leg_Calf_Raise/0.jpg","calves",[],["Place a block on the floor about 12 inches from a flat bench.","Sit on a flat bench and place a dumbbell on your upper left thigh about 3 inches above your knee.","Now place the ball of your left foot on the block. This will be your starting position.","Raise your toes up as high as possible as you exhale and you contract your calf muscle. Hold the contraction for a second.","Slowly return to the starting position, stretching as far down as possible.","Repeat for your prescribed number of repetitions and then repeat with the right leg."]],["Dumbbell Shoulder Press","Dumbbell_Shoulder_Press/0.jpg","delts",["triceps"],["While holding a dumbbell in each hand, sit on a military press bench or utility bench that has back support. Place the dumbbells upright on top of your thighs.","Now raise the dumbbells to shoulder height one at a time using your thighs to help propel them up into position.","Make sure to rotate your wrists so that the palms of your hands are facing forward. This is your starting position.","Now, exhale and push the dumbbells upward until they touch at the top.","Then, after a brief pause at the top contracted position, slowly lower the weights back down to the starting position while inhaling.","Repeat for the recommended amount of repetitions."]],["Dumbbell Shrug","Dumbbell_Shrug/0.jpg","traps",[],["Stand erect with a dumbbell on each hand (palms facing your torso), arms extended on the sides.","Lift the dumbbells by elevating the shoulders as high as possible while you exhale. Hold the contraction at the top for a second. Tip: The arms should remain extended at all times. Refrain from using the biceps to help lift the dumbbells. Only the shoulders should be moving up and down.","Lower the dumbbells back to the original position.","Repeat for the recommended amount of repetitions."]],["Dumbbell Side Bend","Dumbbell_Side_Bend/0.jpg","abs",[],["Stand up straight while holding a dumbbell on the left hand (palms facing the torso) as you have the right hand holding your waist. Your feet should be placed at shoulder width. This will be your starting position.","While keeping your back straight and your head up, bend only at the waist to the right as far as possible. Breathe in as you bend to the side. Then hold for a second and come back up to the starting position as you exhale. Tip: Keep the rest of the body stationary.","Now repeat the movement but bending to the left instead. Hold for a second and come back to the starting position.","Repeat for the recommended amount of repetitions and then change hands."]],["Dumbbell Squat","Dumbbell_Squat/0.jpg","quadriceps",["calves","glutes","hamstrings","lower back"],["Stand up straight while holding a dumbbell on each hand (palms facing the side of your legs).","Position your legs using a shoulder width medium stance with the toes slightly pointed out. Keep your head up at all times as looking down will get you off balance and also maintain a straight back. This will be your starting position. Note: For the purposes of this discussion we will use the medium stance described above which targets overall development; however you can choose any of the three stances discussed in the foot stances section.","Begin to slowly lower your torso by bending the knees as you maintain a straight posture with the head up. Continue down until your thighs are parallel to the floor. Tip: If you performed the exercise correctly, the front of the knees should make an imaginary straight line with the toes that is perpendicular to the front. If your knees are past that imaginary line (if they are past your toes) then you are placing undue stress on the knee and the exercise has been performed incorrectly.","Begin to raise your torso as you exhale by pushing the floor with the heel of your foot mainly as you straighten the legs again and go back to the starting position.","Repeat for the recommended amount of repetitions."]],["Dumbbell Squat To A Bench","Dumbbell_Squat_To_A_Bench/0.jpg","quadriceps",["calves","glutes","hamstrings","lower back"],["Stand up straight with a flat bench behind you while holding a dumbbell on each hand (palms facing the side of your legs).","Position your legs using a shoulder width medium stance with the toes slightly pointed out. Keep your head up at all times as looking down will get you off balance and also maintain a straight back. This will be your starting position. Note: For the purposes of this discussion we will use the medium stance described above which targets overall development; however you can choose any of the three stances discussed in the foot stances section.","Begin to slowly lower your torso by bending the knees as you maintain a straight posture with the head up. Continue down until you slightly touch the bench behind you. Inhale as you perform this portion of the movement. Tip: If you performed the exercise correctly, the front of the knees should make an imaginary straight line with the toes that is perpendicular to the front. If your knees are past that imaginary line (if they are past your toes) then you are placing undue stress on the knee and the exercise has been performed incorrectly.","Begin to raise the bar as you exhale by pushing the floor with the heel of your foot mainly as you straighten the legs again and go back to the starting position.","Repeat for the recommended amount of repetitions."]],["Dumbbell Step Ups","Dumbbell_Step_Ups/0.jpg","quadriceps",["calves","glutes","hamstrings"],["Stand up straight while holding a dumbbell on each hand (palms facing the side of your legs).","Place the right foot on the elevated platform. Step on the platform by extending the hip and the knee of your right leg. Use the heel mainly to lift the rest of your body up and place the foot of the left leg on the platform as well. Breathe out as you execute the force required to come up.","Step down with the left leg by flexing the hip and knee of the right leg as you inhale. Return to the original standing position by placing the right foot of to next to the left foot on the initial position.","Repeat with the right leg for the recommended amount of repetitions and then perform with the left leg."]],["Dumbbell Tricep Extension -Pronated Grip","Dumbbell_Tricep_Extension_-Pronated_Grip/0.jpg","triceps",[],["Lie down on a flat bench holding two dumbbells directly above your shoulders. Your arms should be fully extended and form a 90 degree angle from your torso and the floor.","The palms of your hands should be facing forward, and your elbows should be tucked in. This will be your starting position.","Now, inhale and slowly lower the dumbbells until they are near your ears. Be sure to keep your upper arms stationary and your elbows tucked in.","Then, exhale and use your triceps to return the weight to the starting position."]],["Dynamic Back Stretch","Dynamic_Back_Stretch/0.jpg","lats",[],["Stand with your feet shoulder width apart. This will be your starting position.","Keeping your arms straight, swing them straight up in front of you 5-10 times, increasing the range of motion each time until your arms are above your head."]],["Dynamic Chest Stretch","Dynamic_Chest_Stretch/0.jpg","pectorals",["upper back"],["Stand with your hands together, arms extended directly in front of you. This will be your starting position.","Keeping your arms straight, quickly move your arms back as far as possible and back in again, similar to an exaggerated clapping motion. Repeat 5-10 times, increasing speed as you do so."]],["EZ-Bar Curl","EZ-Bar_Curl/0.jpg","biceps",[],["Stand up straight while holding an EZ curl bar at the wide outer handle. The palms of your hands should be facing forward and slightly tilted inward due to the shape of the bar. Keep your elbows close to your torso. This will be your starting position.","Now, while keeping your upper arms stationary, exhale and curl the weights forward while contracting the biceps. Focus on only moving your forearms.","Continue to raise the weight until your biceps are fully contracted and the bar is at shoulder level. Hold the top contracted position for a moment and squeeze the biceps.","Then inhale and slowly lower the bar back to the starting position.","Repeat for the recommended amount of repetitions."]],["EZ-Bar Skullcrusher","EZ-Bar_Skullcrusher/0.jpg","triceps",["forearms"],["Using a close grip, lift the EZ bar and hold it with your elbows in as you lie on the bench. Your arms should be perpendicular to the floor. This will be your starting position.","Keeping the upper arms stationary, lower the bar by allowing the elbows to flex. Inhale as you perform this portion of the movement. Pause once the bar is directly above the forehead.","Lift the bar back to the starting position by extending the elbow and exhaling.","Repeat."]],["Elbow Circles","Elbow_Circles/0.jpg","delts",["traps"],["Sit or stand with your feet slightly apart.","Place your hands on your shoulders with your elbows at shoulder level and pointing out.","Slowly make a circle with your elbows. Breathe out as you start the circle and breathe in as you complete the circle."]],["Elbow to Knee","Elbow_to_Knee/0.jpg","abs",[],["Lie on the floor, crossing your right leg across your bent left knee. Clasp your hands behind your head, beginning with your shoulder blades on the ground. This will be your starting position.","Perform the motion by flexing the spine and rotating your torso to bring the left elbow to the right knee.","Return to the starting position and repeat the movement for the desired number of repetitions before switching sides."]],["Elbows Back","Elbows_Back/0.jpg","pectorals",["delts"],["Stand up straight.","Place both hands on your lower back, fingers pointing downward and elbows out.","Then gently pull your elbows back aiming to touch them together."]],["Elevated Back Lunge","Elevated_Back_Lunge/0.jpg","quadriceps",["glutes","hamstrings"],["Position a bar onto a rack at shoulder height loaded to an appropriate weight. Place a short, raised platform behind you.","Rack the bar onto your upper back, keeping your back arched and tight. Step onto your raised platform with both feet. This will be your starting position.","Begin by stepping backwards with one leg. Descend by flexing your hips and knees until your knee touches the floor.","Pause, and extend through the hips and knees to rise up, returning all the way to the starting position before alternating."]],["Elevated Cable Rows","Elevated_Cable_Rows/0.jpg","lats",["upper back","traps"],["Get a platform of some sort (it can be an aerobics or calf raise platform) that is around 4-6 inches in height.","Place it on the seat of the cable row machine.","Sit down on the machine and place your feet on the front platform or crossbar provided making sure that your knees are slightly bent and not locked.","Lean over as you keep the natural alignment of your back and grab the V-bar handles.","With your arms extended pull back until your torso is at a 90-degree angle from your legs. Your back should be slightly arched and your chest should be sticking out. You should be feeling a nice stretch on your lats as you hold the bar in front of you. This is the starting position of the exercise.","Keeping the torso stationary, pull the handles back towards your torso while keeping the arms close to it until you touch the abdominals. Breathe out as you perform that movement. At that point you should be squeezing your back muscles hard. Hold that contraction for a second and slowly go back to the original position while breathing in.","Repeat for the recommended amount of repetitions."]],["Elliptical Trainer","Elliptical_Trainer/0.jpg","quadriceps",["calves","glutes","hamstrings"],["To begin, step onto the elliptical and select the desired option from the menu. Most ellipticals have a manual setting, or you can select a program to run. Typically, you can enter your age and weight to estimate the amount of calories burned during exercise. Elevation can be adjusted to change the intensity of the workout.","The handles can be used to monitor your heart rate to help you stay at an appropriate intensity."]],["Exercise Ball Crunch","Exercise_Ball_Crunch/0.jpg","abs",[],["Lie on an exercise ball with your lower back curvature pressed against the spherical surface of the ball. Your feet should be bent at the knee and pressed firmly against the floor. The upper torso should be hanging off the top of the ball. The arms should either be kept alongside the body or crossed on top of your chest as these positions avoid neck strains (as opposed to the hands behind the back of the head position).","Lower your torso into a stretch position keeping the neck stationary at all times. This will be your starting position.","With the hips stationary, flex the waist by contracting the abdominals and curl the shoulders and trunk upward until you feel a nice contraction on your abdominals. The arms should simply slide up the side of your legs if you have them at the side or just stay on top of your chest if you have them crossed. The lower back should always stay in contact with the ball. Exhale as you perform this movement and hold the contraction for a second.","As you inhale, go back to the starting position.","Repeat for the recommended amount of repetitions."]],["Exercise Ball Pull-In","Exercise_Ball_Pull-In/0.jpg","abs",[],["Place an exercise ball nearby and lay on the floor in front of it with your hands on the floor shoulder width apart in a push-up position.","Now place your lower shins on top of an exercise ball. Tip: At this point your legs should be fully extended with the shins on top of the ball and the upper body should be in a push-up type of position being supported by your two extended arms in front of you. This will be your starting position.","While keeping your back completely straight and the upper body stationary, pull your knees in towards your chest as you exhale, allowing the ball to roll forward under your ankles. Squeeze your abs and hold that position for a second.","Now slowly straighten your legs, rolling the ball back to the starting position as you inhale.","Repeat for the recommended amount of repetitions."]],["Extended Range One-Arm Kettlebell Floor Press","Extended_Range_One-Arm_Kettlebell_Floor_Press/0.jpg","pectorals",["delts","triceps"],["Lie on the floor and position a kettlebell for one arm to press. The kettlebell should be held by the handle. The leg on the same side that you are pressing should be bent, with the knee crossing over the midline of the body.","Press the kettlebell by extending the elbow and adducting the arm, pressing it above your body. Return to the starting position."]],["External Rotation","External_Rotation/0.jpg","delts",[],["Lie sideways on a flat bench with one arm holding a dumbbell and the other hand on top of the bench folded so that you can rest your head on it.","Bend the elbows of the arm holding the dumbbell so that it creates a 90-degree angle between the upper arm and the forearm. Tip: Keep the arm parallel to your torso.","Now bend the elbow while keeping the upper arm stationary. In this manner, the forearm will be parallel to the floor and perpendicular to your torso (Tip: So the forearm will be directly in front of you). The upper arm will be stationary by your torso and should be parallel to the floor (aligned with your torso at all times). This will be your starting position.","As you breathe out, externally rotate your forearm so that the dumbbell is lifted up in a semicircle motion as you maintain the 90 degree angle bend between the upper arms and the forearm. You will continue this external rotation until the forearm is perpendicular to the floor and the torso pointing towards the ceiling. At this point you will hold the contraction for a second.","As you breathe in, slowly go back to the starting position.","Repeat for the recommended amount of repetitions and then switch to the other arm."]],["External Rotation with Band","External_Rotation_with_Band/0.jpg","delts",[],["Choke the band around a post. The band should be at the same height as your elbow. Stand with your left side to the band a couple of feet away.","Grasp the end of the band with your right hand, and keep your elbow pressed firmly to your side. We recommend you hold a pad or foam roll in place with your elbow to keep it firmly in position.","With your upper arm in position, your elbow should be flexed to 90 degrees with your hand reaching across the front of your torso. This will be your starting position.","Execute the movement by rotating your arm in a backhand motion, keeping your elbow in place.","Continue as far as you are able, pause, and then return to the starting position."]],["External Rotation with Cable","External_Rotation_with_Cable/0.jpg","delts",[],["Adjust the cable to the same height as your elbow. Stand with your left side to the band a couple of feet away.","Grasp the handle with your right hand, and keep your elbow pressed firmly to your side. We recommend you hold a pad or foam roll in place with your elbow to keep it firmly in position.","With your upper arm in position, your elbow should be flexed to 90 degrees with your hand reaching across the front of your torso. This will be your starting position.","Execute the movement by rotating your arm in a backhand motion, keeping your elbow in place."]],["Face Pull","Face_Pull/0.jpg","delts",["upper back"],["Facing a high pulley with a rope or dual handles attached, pull the weight directly towards your face, separating your hands as you do so. Keep your upper arms parallel to the ground."]],["Farmer's Walk","Farmers_Walk/0.jpg","forearms",["abs","glutes","hamstrings","lower back","quadriceps","traps"],["There are various implements that can be used for the farmers walk. These can also be performed with heavy dumbbells or short bars if these implements aren't available. Begin by standing between the implements.","After gripping the handles, lift them up by driving through your heels, keeping your back straight and your head up.","Walk taking short, quick steps, and don't forget to breathe. Move for a given distance, typically 50-100 feet, as fast as possible."]],["Fast Skipping","Fast_Skipping/0.jpg","quadriceps",["abductors","adductors","calves","glutes","hamstrings"],["Start in a relaxed position with one leg slightly forward. This will be your starting position.","Skip by executing a step-hop pattern of right-right-step to left-left-step, and so on, alternating back and forth.","Perform fast skips by maintaining close contact with the ground and reduce air time, moving as quickly as possible."]],["Finger Curls","Finger_Curls/0.jpg","forearms",[],["Hold a barbell with both hands and your palms facing up; hands spaced about shoulder width.","Place your feet flat on the floor, at a distance that is slightly wider than shoulder width apart. This will be your starting position.","Lower the bar as far as possible by extending the fingers. Allowing the bar to roll down the hands, catch the bar with the final joint in the fingers.","Now curl bar up as high as possible by closing your hands while exhaling. Hold the contraction at the top."]],["Flat Bench Cable Flyes","Flat_Bench_Cable_Flyes/0.jpg","pectorals",[],["Position a flat bench between two low pulleys so that when you are laying on it, your chest will be lined up with the cable pulleys.","Lay flat on the bench and keep your feet on the ground.","Have someone hand you the handles on each hand. You will grab each single handle attachment with a palms up grip.","Extend your arms by your side with a slight bend on your elbows. Tip: You will keep this bend constant through the whole movement. Your arms should be parallel to the floor. This is your starting position.","Now start lifting the arms in a semi-circle motion directly in front of you by pulling the cables together until both hands meet at the top of the movement. Squeeze your chest as you perform this motion and breathe out during this movement. Also, hold the contraction for a second at the top. Tip: When performed correctly, at the top position of this movement, your arms should be perpendicular to your torso and the floor touching above your chest.","Slowly come back to the starting position.","Repeat for the recommended amount of repetitions."]],["Flat Bench Leg Pull-In","Flat_Bench_Leg_Pull-In/0.jpg","abs",[],["Lie on an exercise mat or a flat bench with your legs off the end.","Place your hands either under your glutes with your palms down or by the sides holding on to the bench (or with palms down by the side on an exercise mat). Also extend your legs straight out. This will be your starting position.","Bend your knees and pull your upper thighs into your midsection as you breathe out. Continue this movement until your knees are near your chest. Hold the contracted position for a second.","As you breathe in, slowly return to the starting position.","Repeat for the recommended amount of repetitions."]],["Flat Bench Lying Leg Raise","Flat_Bench_Lying_Leg_Raise/0.jpg","abs",[],["Lie with your back flat on a bench and your legs extended in front of you off the end.","Place your hands either under your glutes with your palms down or by the sides holding on to the bench. This will be your starting position.","As you keep your legs extended, straight as possible with your knees slightly bent but locked raise your legs until they make a 90-degree angle with the floor. Exhale as you perform this portion of the movement and hold the contraction at the top for a second.","Now, as you inhale, slowly lower your legs back down to the starting position."]],["Flexor Incline Dumbbell Curls","Flexor_Incline_Dumbbell_Curls/0.jpg","biceps",[],["Hold the dumbbell towards the side farther from you so that you have more weight on the side closest to you. (This can be done for a good effect on all bicep dumbbell exercises). Now do a normal incline dumbbell curl, but keep your wrists as far back as possible so as to neutralize any stress that is placed on them.","Sit on an incline bench that is angled at 45-degrees while holding a dumbbell on each hand.","Let your arms hang down on your sides, with the elbows in, and turn the palms of your hands forward with the thumbs pointing away from the body. Tip: You will keep this hand position throughout the movement as there should not be any twisting of the hands as they come up. This will be your starting position.","Curl up the two dumbbells at the same time until your biceps are fully contracted and exhale. Tip: Do not swing the arms or use momentum. Keep a controlled motion at all times. Hold the contracted position for a second at the top.","As you inhale, slowly go back to the starting position.","Repeat for the recommended amount of repetitions."]],["Floor Glute-Ham Raise","Floor_Glute-Ham_Raise/0.jpg","hamstrings",["calves","glutes"],["You can use a partner for this exercise or brace your feet under something stable.","Begin on your knees with your upper legs and torso upright. If using a partner, they will firmly hold your feet to keep you in position. This will be your starting position.","Lower yourself by extending at the knee, taking care to NOT flex the hips as you go forward.","Place your hands in front of you as you reach the floor. This movement is very difficult and you may be unable to do it unaided. Use your arms to lightly push off the floor to aid your return to the starting position."]],["Floor Press","Floor_Press/0.jpg","triceps",["pectorals","delts"],["Adjust the j-hooks so they are at the appropriate height to rack the bar. Begin lying on the floor with your head near the end of a power rack. Keeping your shoulder blades pulled together; pull the bar off of the hooks.","Lower the bar towards the bottom of your chest or upper stomach, squeezing the bar and attempting to pull it apart as you do so. Ensure that you tuck your elbows throughout the movement. Lower the bar until your upper arm contacts the ground and pause, preventing any slamming or bouncing of the weight.","Press the bar back up as fast as you can, keeping the bar, your wrists, and elbows in line as you do so."]],["Floor Press with Chains","Floor_Press_with_Chains/0.jpg","triceps",["pectorals","delts"],["Adjust the j-hooks so they are at the appropriate height to rack the bar. For this exercise, drape the chains directly over the end of the bar, trying to keep the ends away from the plates.","Begin lying on the floor with your head near the end of a power rack. Keeping your shoulder blades pulled together, pull the bar off of the hooks.","Lower the bar towards the bottom of your chest or upper stomach, squeezing the bar and attempting to pull it apart as you do so. Ensure that you tuck your elbows throughout the movement. Lower the bar until your upper arm contacts the ground and pause, preventing any slamming or bouncing of the weight.","Press the bar back up as fast as you can, keeping the bar, your wrists, and elbows in line as you do so."]],["Flutter Kicks","Flutter_Kicks/0.jpg","glutes",["hamstrings"],["On a flat bench lie facedown with the hips on the edge of the bench, the legs straight with toes high off the floor and with the arms on top of the bench holding on to the front edge.","Squeeze your glutes and hamstrings and straighten the legs until they are level with the hips. This will be your starting position.","Start the movement by lifting the left leg higher than the right leg.","Then lower the left leg as you lift the right leg.","Continue alternating in this manner (as though you are doing a flutter kick in water) until you have done the recommended amount of repetitions for each leg. Make sure that you keep a controlled movement at all times. Tip: You will breathe normally as you perform this movement."]],["Foot-SMR","Foot-SMR/0.jpg","calves",[],["This exercise stretches the fascia of the muscles in the feet. Start off seated with your shoes removed. Using a foot roller or a similar object, such as a small section of pvc pipe, place your foot against the roller across the
