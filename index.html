 arch of your foot. This will be your starting position.","Press down firmly, rolling across the arch of your foot. Hold for 10-30 seconds, and then switch feet."]],["Forward Drag with Press","Forward_Drag_with_Press/0.jpg","pectorals",["calves","glutes","hamstrings","quadriceps","delts","triceps"],["Attach a dual handled chain or rope attachment to the sled. You should be facing away from the sled, holding a handle in each hand.","Begin the movement by moving forward for one step. Leaning forward, extend through the legs and hips to move, pausing with each step to extend through the elbows, pressing your hands forward. Step forward until you return to the start position prepared to press."]],["Frankenstein Squat","Frankenstein_Squat/0.jpg","quadriceps",["abs","calves","glutes","hamstrings"],["This drill teaches you the proper positioning of both the bar and your body during the clean and front squat.","Place the barbell on the front of the shoulders, releasing your grip and extending your arms out in front of you. The shoulders should be pushed forward to create a shelf, and the bar should be in contact with the throat. Ensure that you only move your shoulder blades forward; don't round the thoracic spine.","Squat by flexing the knees and hips, sitting in between your legs. Keep the torso upright, the arms up, and the shoulders forward, and the bar should stay in place. Go to the bottom of the squat, until your hamstrings contact your calves.","Return to the upright position by driving through the front of the heel and extending the knees and hips."]],["Freehand Jump Squat","Freehand_Jump_Squat/0.jpg","quadriceps",["calves","glutes","hamstrings"],["Cross your arms over your chest.","With your head up and your back straight, position your feet at shoulder width.","Keeping your back straight and chest up, squat down as you inhale until your upper thighs are parallel, or lower, to the floor.","Now pressing mainly with the ball of your feet, jump straight up in the air as high as possible, using the thighs like springs. Exhale during this portion of the movement.","When you touch the floor again, immediately squat down and jump again.","Repeat for the recommended amount of repetitions."]],["Frog Hops","Frog_Hops/0.jpg","quadriceps",["calves","glutes","hamstrings"],["Stand with your hands behind your head, and squat down keeping your torso upright and your head up. This will be your starting position.","Jump forward several feet, avoiding jumping unnecessarily high. As your feet contact the ground, absorb the impact through your legs, and jump again. Repeat this action 5-10 times."]],["Frog Sit-Ups","Frog_Sit-Ups/0.jpg","abs",[],["Lie with your back flat on the floor (or exercise mat) and your legs extended in front of you.","Now bend at the knees and place your outer thighs by the floor (or mat) as you make the soles of your feet touch each other.","Now try pushing both soles and bringing them up as near you as possible while you keep the outer thighs on the floor (or at least almost touching it). Tip: In this position your legs should create a diamond shape.","Now, cross your arms in front of you by touching the opposite shoulders. This will be your starting position.","As you exhale flatten your lower back to the floor while curling the torso upwards. Tip: This will be like performing the first 1/4 movement of a sit up. Hold at the top position for a second.","As you inhale, slowly lower back to the starting position.","Repeat for the recommended amount of repetitions."]],["Front Barbell Squat","Front_Barbell_Squat/0.jpg","quadriceps",["calves","glutes","hamstrings"],["This exercise is best performed inside a squat rack for safety purposes. To begin, first set the bar on a rack that best matches your height. Once the correct height is chosen and the bar is loaded, bring your arms up under the bar while keeping the elbows high and the upper arm slightly above parallel to the floor. Rest the bar on top of the deltoids and cross your arms while grasping the bar for total control.","Lift the bar off the rack by first pushing with your legs and at the same time straightening your torso.","Step away from the rack and position your legs using a shoulder width medium stance with the toes slightly pointed out. Keep your head up at all times as looking down will get you off balance and also maintain a straight back. This will be your starting position. (Note: For the purposes of this discussion we will use the medium stance described above which targets overall development; however you can choose any of the three stances described in the foot positioning section).","Begin to slowly lower the bar by bending the knees as you maintain a straight posture with the head up. Continue down until the angle between the upper leg and the calves becomes slightly less than 90-degrees (which is the point in which the upper legs are below parallel to the floor). Inhale as you perform this portion of the movement. Tip: If you performed the exercise correctly, the front of the knees should make an imaginary straight line with the toes that is perpendicular to the front. If your knees are past that imaginary line (if they are past your toes) then you are placing undue stress on the knee and the exercise has been performed incorrectly.","Begin to raise the bar as you exhale by pushing the floor mainly with the middle of your foot as you straighten the legs again and go back to the starting position.","Repeat for the recommended amount of repetitions."]],["Front Barbell Squat To A Bench","Front_Barbell_Squat_To_A_Bench/0.jpg","quadriceps",["calves","glutes","hamstrings"],["This exercise is best performed inside a squat rack for safety purposes. To begin, first set a flat bench behind you and set the bar on a rack that best matches your height. Once the correct height is chosen and the bar is loaded, bring your arms up under the bar while keeping the elbows high and the upper arm slightly above parallel to the floor. Rest the bar on top of the deltoids and cross your arms while grasping the bar for total control.","Lift the bar off the rack by first pushing with your legs and at the same time straightening your torso.","Step away from the rack and position your legs using a shoulder width medium stance with the toes slightly pointed out. Keep your head up at all times as looking down will get you off balance and also maintain a straight back. This will be your starting position. (Note: For the purposes of this discussion we will use the medium stance described above which targets overall development; however you can choose any of the three stances described in the foot positioning section).","Begin to slowly lower the bar by bending the knees as you maintain a straight posture with the head up. Continue down until you touch the bench with your glutes. Inhale as you perform this portion of the movement. Tip: If you performed the exercise correctly, the front of the knees should make an imaginary straight line with the toes that is perpendicular to the front. If your knees are past that imaginary line (if they are past your toes) then you are placing undue stress on the knee and the exercise has been performed incorrectly.","Begin to raise the bar as you exhale by pushing the floor mainly with the heel of your foot as you straighten the legs again and go back to the starting position.","Repeat for the recommended amount of repetitions."]],["Front Box Jump","Front_Box_Jump/0.jpg","hamstrings",["abductors","adductors","calves","glutes","quadriceps"],["Begin with a box of an appropriate height 1-2 feet in front of you. Stand with your feet should width apart. This will be your starting position.","Perform a short squat in preparation for jumping, swinging your arms behind you.","Rebound out of this position, extending through the hips, knees, and ankles to jump as high as possible. Swing your arms forward and up.","Land on the box with the knees bent, absorbing the impact through the legs. You can jump from the box back to the ground, or preferably step down one leg at a time."]],["Front Cable Raise","Front_Cable_Raise/0.jpg","delts",[],["Select the weight on a low pulley machine and grasp the single hand cable attachment that is attached to the low pulley with your left hand.","Face away from the pulley and put your arm straight down with the hand cable attachment in front of your thighs at arms' length with the palms of the hand facing your thighs. This will be your starting position.","While maintaining the torso stationary (no swinging), lift the left arm to the front with a slight bend on the elbow and the palms of the hand always faces down. Continue to go up until you arm is slightly above parallel to the floor. Exhale as you execute this portion of the movement and pause for a second at the top.","Now as you inhale lower the arm back down slowly to the starting position.","Once all of the recommended amount of repetitions have been performed for this arm, switch arms and perform the exercise with the right one."]],["Front Cone Hops (or hurdle hops)","Front_Cone_Hops_or_hurdle_hops/0.jpg","quadriceps",["abductors","adductors","calves","glutes","hamstrings"],["Set up a row of cones or other small barriers, placing them a few feet apart.","Stand in front of the first cone with your feet shoulder width apart. This will be your starting position.","Begin by jumping with both feet over the first cone, swinging both arms as you jump.","Absorb the impact of landing by bending the knees, rebounding out of the first leap by jumping over the next cone.","Continue until you have jumped over all of the cones."]],["Front Dumbbell Raise","Front_Dumbbell_Raise/0.jpg","delts",[],["Pick a couple of dumbbells and stand with a straight torso and the dumbbells on front of your thighs at arms length with the palms of the hand facing your thighs. This will be your starting position.","While maintaining the torso stationary (no swinging), lift the left dumbbell to the front with a slight bend on the elbow and the palms of the hands always facing down. Continue to go up until you arm is slightly above parallel to the floor. Exhale as you execute this portion of the movement and pause for a second at the top. Inhale after the second pause.","Now lower the dumbbell back down slowly to the starting position as you simultaneously lift the right dumbbell.","Continue alternating in this fashion until all of the recommended amount of repetitions have been performed for each arm."]],["Front Incline Dumbbell Raise","Front_Incline_Dumbbell_Raise/0.jpg","delts",[],["Sit down on an incline bench with the incline set anywhere between 30 to 60 degrees while holding a dumbbell on each hand. Tip: You can change the angle to hit the muscle a little differently each time.","Extend your arms straight in front of you and have your palms facing down with the dumbbells raised about 1 inch above your thighs. This will be your starting position.","Slowly raise the dumbbells straight up until they are slightly above your shoulders, while keeping your elbows locked. Squeeze at the top for a second and make sure you breathe out during this portion of the movement. Tip: Keep your head resting down against the bench and your legs on the floor at all times.","Lower the arms back to the starting position as you inhale.","Repeat for the recommended amount of repetitions."]],["Front Leg Raises","Front_Leg_Raises/0.jpg","hamstrings",[],["Stand next to a chair or other support, holding on with one hand.","Swing your leg forward, keeping the leg straight. Continue with a downward swing, bringing the leg as far back as your flexibility allows. Repeat 5-10 times, and then switch legs."]],["Front Plate Raise","Front_Plate_Raise/0.jpg","delts",[],["While standing straight, hold a barbell plate in both hands at the 3 and 9 o'clock positions. Your palms should be facing each other and your arms should be extended and locked with a slight bend at the elbows and the plate should be down near your waist in front of you as far as you can go. Tip: The arms will remain in this position throughout the exercise. This will be your starting position.","Slowly raise the plate as you exhale until it is a little above shoulder level. Hold the contraction for a second. Tip: make sure that you do not swing the weight or bend at the elbows. Your torso should remain stationary throughout the movement as well.","As you inhale, slowly lower the plate back down to the starting position.","Repeat for the recommended amount of repetitions."]],["Front Raise And Pullover","Front_Raise_And_Pullover/0.jpg","pectorals",["lats","delts","triceps"],["Lie on a flat bench while holding a barbell using a palms down grip that is about 15 inches apart.","Place the bar on your upper thighs, extend your arms and lock them while keeping a slight bend on the elbows. This will be your starting position.","Now raise the weight using a semicircular motion and keeping your arms straight as you inhale. Continue the same movement until the bar is on the other side above your head . (Tip: the bar will travel approximately 180-degrees). At this point your arms should be parallel to the floor with the palms of your hands facing the ceiling.","Now return the barbell to the starting position by reversing the motion as you exhale.","Repeat for the recommended amount of repetitions."]],["Front Squat (Clean Grip)","Front_Squat_Clean_Grip/0.jpg","quadriceps",["abs","glutes","hamstrings"],["To begin, first set the bar in a rack slightly below shoulder level. Rest the bar on top of the deltoids, pushing into the clavicles, and lightly touching the throat. Your hands should be in a clean grip, touching the bar only with your fingers to help keep it in position.","Lift the bar off the rack by first pushing with your legs and at the same time straightening your torso. Step away from the rack and position your legs using a shoulder width medium stance with the toes slightly pointed out. Keep your head and elbows up at all times. This will be your starting position.","Bend at the knees, sitting down between your legs. Continue down until your hamstrings are on your calves. Keep your knees aligned with your feet by consciously using your abductors to push your knees out as you squat.","Begin to raise the bar as you exhale by pushing the floor mainly with the heel or middle of your foot as you straighten the legs again and return to the starting position."]],["Front Squats With Two Kettlebells","Front_Squats_With_Two_Kettlebells/0.jpg","quadriceps",["calves","glutes"],["Clean two kettlebells to your shoulders. Clean the kettlebells to your shoulders by extending through the legs and hips as you pull the kettlebells towards your shoulders. Rotate your wrists as you do so.","Looking straight ahead at all times, squat as low as you can and pause at the bottom. As you squat down, push your knees out. You should squat between your legs, keeping an upright torso, with your head and chest up.","Rise back up by driving through your heels and repeat."]],["Front Two-Dumbbell Raise","Front_Two-Dumbbell_Raise/0.jpg","delts",[],["Pick a couple of dumbbells and stand with a straight torso and the dumbbells on front of your thighs at arms length with the palms of the hand facing your thighs. This will be your starting position.","While maintaining the torso stationary (no swinging), lift the dumbbells to the front with a slight bend on the elbow and the palms of the hands always facing down. Continue to go up until you arms are slightly above parallel to the floor. Exhale as you execute this portion of the movement and pause for a second at the top.","As you inhale, lower the dumbbells back down slowly to the starting position.","Repeat for the recommended amount of repetitions."]],["Full Range-Of-Motion Lat Pulldown","Full_Range-Of-Motion_Lat_Pulldown/0.jpg","lats",["biceps","upper back","delts"],["Either standing or seated on a high bench, grasp two stirrup cables that are attached to the high pulleys. Grab with the opposing hand so your arms are crisscrossed about you and your palms are facing forward.","Keeping your chest up and maintaining a slight arch in your lower back, pull the handles down as if you were doing a regular pulldown. The range of motion will be more of an arc. During the movement, rotate your hands so that in the bottom position your palms face each other rather than forward. Return slowly to the starting position and repeat."]],["Gironda Sternum Chins","Gironda_Sternum_Chins/0.jpg","lats",["biceps","upper back"],["Grasp the pull-up bar with a shoulder width underhand grip.","Now hang with your arms fully extended and stick your chest out and lean back. Tip: You will be leaning back throughout the entire movement. This will be your starting position.","Start pulling yourself towards the bar with your spine arched throughout the movement and your head leaning back as far away from the bar as possible. Exhale as you perform this portion of the movement. Tip: At the upper end of the movement, your hips and legs will be at about a 45-degree angle to the floor.","Keep pulling until your collarbone passes the bar and your lower chest or sternum area touches it. Hold that contraction for a second. Tip: By the time you've completed this portion of the movement; your head will be parallel to the floor.","Slowly start going back to the starting position as you inhale.","Repeat for the recommended amount of repetitions."]],["Glute Ham Raise","Glute_Ham_Raise/0.jpg","hamstrings",["calves","glutes"],["Begin by adjusting the equipment to fit your body. Place your feet against the footplate in between the rollers as you lie facedown. Your knees should be just behind the pad.","Start from the bottom of the movement. Keep your back arched as you begin the movement by flexing the knees. Drive your toes into the foot plate as you do so. Keep your upper body straight, and continue until your body is upright.","Return to the starting position, keeping your descent under control."]],["Glute Kickback","Glute_Kickback/0.jpg","glutes",["hamstrings"],["Kneel on the floor or an exercise mat and bend at the waist with your arms extended in front of you (perpendicular to the torso) in order to get into a kneeling push-up position but with the arms spaced at shoulder width. Your head should be looking forward and the bend of the knees should create a 90-degree angle between the hamstrings and the calves. This will be your starting position.","As you exhale, lift up your right leg until the hamstrings are in line with the back while maintaining the 90-degree angle bend. Contract the glutes throughout this movement and hold the contraction at the top for a second. Tip: At the end of the movement the upper leg should be parallel to the floor while the calf should be perpendicular to it.","Go back to the initial position as you inhale and now repeat with the left leg.","Continue to alternate legs until all of the recommended repetitions have been performed."]],["Goblet Squat","Goblet_Squat/0.jpg","quadriceps",["calves","glutes","hamstrings","delts"],["Stand holding a light kettlebell by the horns close to your chest. This will be your starting position.","Squat down between your legs until your hamstrings are on your calves. Keep your chest and head up and your back straight.","At the bottom position, pause and use your elbows to push your knees out. Return to the starting position, and repeat for 10-20 repetitions."]],["Good Morning","Good_Morning/0.jpg","hamstrings",["abs","glutes","lower back"],["Begin with a bar on a rack at shoulder height. Rack the bar across the rear of your shoulders as you would a power squat, not on top of your shoulders. Keep your back tight, shoulder blades pinched together, and your knees slightly bent. Step back from the rack.","Begin by bending at the hips, moving them back as you bend over to near parallel. Keep your back arched and your cervical spine in proper alignment.","Reverse the motion by extending through the hips with your glutes and hamstrings. Continue until you have returned to the starting position."]],["Good Morning off Pins","Good_Morning_off_Pins/0.jpg","hamstrings",["abs","glutes","lower back"],["Begin with a bar on a rack at about the same height as your stomach. Bend over underneath the bar and rack the bar across the rear of your shoulders as you would a power squat, not on top of your shoulders. At the proper height, you should be near parallel to the floor when bent over. Keep your back tight, shoulder blades pinched together, and your knees slightly bent. Keep your back arched and your cervical spine in proper alignment.","Begin the motion by extending through the hips with your glutes and hamstrings, and you are standing with the weight. Slowly lower the weight back to the pins returning to the starting position."]],["Gorilla Chin/Crunch","Gorilla_Chin_Crunch/0.jpg","abs",["biceps","lats"],["Hang from a chin-up bar using an underhand grip (palms facing you) that is slightly wider than shoulder width.","Now bend your knees at a 90 degree angle so that the calves are parallel to the floor while the thighs remain perpendicular to it. This will be your starting position.","As you exhale, pull yourself up while crunching your knees up at the same time until your knees are at chest level. You will stop going up as soon as your nose is at the same level as the bar. Tip: When you get to this point you should also be finishing the crunch at the same time.","Slowly start to inhale as you return to the starting position.","Repeat for the recommended amount of repetitions."]],["Groin and Back Stretch","Groin_and_Back_Stretch/0.jpg","adductors",[],["Sit on the floor with your knees bent and feet together.","Interlock your fingers behind your head. This will be your starting position.","Curl downwards, bringing your elbows to the inside of your thighs. After a brief pause, return to the starting position with your head up and your back straight. Repeat for 10-20 repetitions."]],["Groiners","Groiners/0.jpg","adductors",[],["Begin in a pushup position on the floor. This will be your starting position.","Using both legs, jump forward landing with your feet next to your hands. Keep your head up as you do so.","Return to the starting position and immediately repeat the movement, continuing for 10-20 repetitions."]],["Hack Squat","Hack_Squat/0.jpg","quadriceps",["calves","glutes","hamstrings"],["Place the back of your torso against the back pad of the machine and hook your shoulders under the shoulder pads provided.","Position your legs in the platform using a shoulder width medium stance with the toes slightly pointed out. Tip: Keep your head up at all times and also maintain the back on the pad at all times.","Place your arms on the side handles of the machine and disengage the safety bars (which on most designs is done by moving the side handles from a facing front position to a diagonal position).","Now straighten your legs without locking the knees. This will be your starting position. (Note: For the purposes of this discussion we will use the medium stance described above which targets overall development; however you can choose any of the three stances described in the foot positioning section).","Begin to slowly lower the unit by bending the knees as you maintain a straight posture with the head up (back on the pad at all times). Continue down until the angle between the upper leg and the calves becomes slightly less than 90-degrees (which is the point in which the upper legs are below parallel to the floor). Inhale as you perform this portion of the movement. Tip: If you performed the exercise correctly, the front of the knees should make an imaginary straight line with the toes that is perpendicular to the front. If your knees are past that imaginary line (if they are past your toes) then you are placing undue stress on the knee and the exercise has been performed incorrectly.","Begin to raise the unit as you exhale by pushing the floor with mainly with the heel of your foot as you straighten the legs again and go back to the starting position.","Repeat for the recommended amount of repetitions."]],["Hammer Curls","Hammer_Curls/0.jpg","biceps",[],["Stand up with your torso upright and a dumbbell on each hand being held at arms length. The elbows should be close to the torso.","The palms of the hands should be facing your torso. This will be your starting position.","Now, while holding your upper arm stationary, exhale and curl the weight forward while contracting the biceps. Continue to raise the weight until the biceps are fully contracted and the dumbbell is at shoulder level. Hold the contracted position for a brief moment as you squeeze the biceps. Tip: Focus on keeping the elbow stationary and only moving your forearm.","After the brief pause, inhale and slowly begin the lower the dumbbells back down to the starting position.","Repeat for the recommended amount of repetitions."]],["Hammer Grip Incline DB Bench Press","Hammer_Grip_Incline_DB_Bench_Press/0.jpg","pectorals",["delts","triceps"],["Lie back on an incline bench with a dumbbell on each hand on top of your thighs. The palms of your hand will be facing each other.","By using your thighs to help you get the dumbbells up, clean the dumbbells one arm at a time so that you can hold them at shoulder width.","Once at shoulder width, keep the palms of your hands with a neutral grip (palms facing each other). Keep your elbows flared out with the upper arms in line with the shoulders (perpendicular to the torso) and the elbows bent creating a 90-degree angle between the upper arm and the forearm. This will be your starting position.","Now bring down the weights slowly to your side as you breathe in. Keep full control of the dumbbells at all times.","As you breathe out, push the dumbbells up using your pectoral muscles. Lock your arms in the contracted position, hold for a second and then start coming down slowly. Tip: It should take at least twice as long to go down than to come up.","Repeat the movement for the prescribed amount of repetitions.","When you are done, place the dumbbells back in your thighs and then on the floor. This is the safest manner to dispose of the dumbbells."]],["Hamstring-SMR","Hamstring-SMR/0.jpg","hamstrings",[],["In a seated position, extend your legs over a foam roll so that it is position on the back of the upper legs. Place your hands to the side or behind you to help support your weight. This will be your starting position.","Using your hands, lift your hips off of the floor and shift your weight on the foam roll to one leg. Relax the hamstrings of the leg you are stretching.","Roll over the foam from below the hip to above the back of the knee, pausing at points of tension for 10-30 seconds. Repeat for the other leg."]],["Hamstring Stretch","Hamstring_Stretch/0.jpg","hamstrings",[],["Lie on your back with one leg extended above you, with the hip at ninety degrees. Keep the other leg flat on the floor.","Loop a belt, band, or rope over the ball of your foot. This will be your starting position.","Pull on the belt to create tension in the calves and hamstrings. Hold this stretch for 10-30 seconds, and repeat with the other leg."]],["Handstand Push-Ups","Handstand_Push-Ups/0.jpg","delts",["triceps"],["With your back to the wall bend at the waist and place both hands on the floor at shoulder width.","Kick yourself up against the wall with your arms straight. Your body should be upside down with the arms and legs fully extended. Keep your whole body as straight as possible. Tip: If doing this for the first time, have a spotter help you. Also, make sure that you keep facing the wall with your head, rather than looking down.","Slowly lower yourself to the ground as you inhale until your head almost touches the floor. Tip: It is of utmost importance that you come down slow in order to avoid head injury.","Push yourself back up slowly as you exhale until your elbows are nearly locked.","Repeat for the recommended amount of repetitions."]],["Hang Clean","Hang_Clean/0.jpg","quadriceps",["calves","forearms","glutes","hamstrings","lower back","delts","traps"],["Begin with a shoulder width, double overhand or hook grip, with the bar hanging at the mid thigh position. Your back should be straight and inclined slightly forward.","Begin by aggressively extending through the hips, knees and ankles, driving the weight upward. As you do so, shrug your shoulders towards your ears.","Immediately recover by driving through the heels, keeping the torso upright and elbows up. Continue until you have risen to a standing position."]],["Hang Clean - Below the Knees","Hang_Clean_-_Below_the_Knees/0.jpg","quadriceps",["calves","forearms","glutes","hamstrings","lower back","delts","traps"],["Begin with a shoulder width, double overhand or hook grip, with the bar hanging just below the knees. Your back should be straight and inclined slightly forward.","Begin by aggressively extending through the hips, knees and ankles, driving the weight upward. As you do so, shrug your shoulders towards your ears. As full extension is achieved, transition into the third pull by aggressively shrugging and flexing the arms with the elbows up and out.","At peak extension, aggressively pull yourself down, rotating your elbows under the bar as you do so. Receive the bar in a front squat position, the depth of which is dependent upon the height of the bar at the end of the third pull. The bar should be racked onto the protracted shoulders, lightly touching the throat with the hands relaxed. Continue to descend to the bottom squat position, which will help in the recovery.","Immediately recover by driving through the heels, keeping the torso upright and elbows up. Continue until you have risen to a standing position."]],["Hang Snatch","Hang_Snatch/0.jpg","hamstrings",["abs","calves","forearms","glutes","lower back","quadriceps","delts","traps"],["Begin with a wide grip on the bar, with an overhand or hook grip. The feet should be directly below the hips with the feet turned out. Your knees should be slightly bent, and the torso inclined forward. The spine should be fully extended and the head facing forward. The bar should be at the hips. This will be your starting position.","Aggressively extend through the legs and hips. At peak extension, shrug the shoulders and allow the elbows to flex to the side.","As you move your feet into the receiving position, forcefully pull yourself below the bar as you elevate the bar overhead. Receive the bar with your body as low as possible and the arms fully extended overhead.","Return to a standing position with the weight overhead. Follow by returning the weight to the ground under control."]],["Hang Snatch - Below Knees","Hang_Snatch_-_Below_Knees/0.jpg","hamstrings",["abs","calves","forearms","glutes","lower back","quadriceps","delts","traps"],["Begin with a wide grip on the bar, with an overhand or hook grip. The feet should be directly below the hips with the feet turned out. Your knees should be slightly bent, and the torso inclined forward. The spine should be fully extended and the head facing forward. The bar should be just below the knees. This will be your starting position.","Aggressively extend through the legs and hips. At peak extension, shrug the shoulders and allow the elbows to flex to the side.","As you move your feet into the receiving position, forcefully pull yourself below the bar as you elevate the bar overhead. Receive the bar with your body as low as possible and the arms fully extended overhead.","Return to a standing position with the weight overhead, and then return the weight to the floor under control."]],["Hanging Bar Good Morning","Hanging_Bar_Good_Morning/0.jpg","hamstrings",["abs","glutes","lower back"],["Begin with a bar on a rack at about the same height as your stomach. Suspend the bar using chains or suspension straps.","Bend over underneath the bar and rack the bar across the rear of your shoulders as you would a power squat, not on top of your traps. At the proper height, you should be near parallel to the floor when bent over. Keep your back tight, shoulder blades pinched together, and your knees slightly bent. Keep your back arched and your cervical spine in proper alignment.","Begin the motion by extending through the hips with your glutes and hamstrings, and you are standing with the weight.","Slowly lower the weight back to the starting position, where it is supported by the chains."]],["Hanging Leg Raise","Hanging_Leg_Raise/0.jpg","abs",[],["Hang from a chin-up bar with both arms extended at arms length in top of you using either a wide grip or a medium grip. The legs should be straight down with the pelvis rolled slightly backwards. This will be your starting position.","Raise your legs until the torso makes a 90-degree angle with the legs. Exhale as you perform this movement and hold the contraction for a second or so.","Go back slowly to the starting position as you breathe in.","Repeat for the recommended amount of repetitions."]],["Hanging Pike","Hanging_Pike/0.jpg","abs",[],["Hang from a chin-up bar with your legs and feet together using an overhand grip (palms facing away from you) that is slightly wider than shoulder width. Tip: You may use wrist wraps in order to facilitate holding on to the bar.","Now bend your knees at a 90 degree angle and bring the upper legs forward so that the calves are perpendicular to the floor while the thighs remain parallel to it. This will be your starting position.","Pull your legs up as you exhale until you almost touch your shins with the bar above you. Tip: Try to straighten your legs as much as possible while at the top.","Lower your legs as slowly as possible until you reach the starting position. Tip: Avoid swinging and using momentum at all times.","Repeat for the recommended amount of repetitions."]],["Heaving Snatch Balance","Heaving_Snatch_Balance/0.jpg","quadriceps",["abs","forearms","glutes","hamstrings","delts","triceps"],["This drill helps you learn the snatch. Begin by holding a light weight across the back of the shoulders. Your feet should be slightly wider than hip width apart with the feet turned out, the same position that you would perform a squat with.","Begin by dipping with the knees slightly, and popping back up to briefly unload the bar. Drive yourself underneath the bar, elevating it overhead as you descend into a full squat.","Return to a standing position."]],["Heavy Bag Thrust","Heavy_Bag_Thrust/0.jpg","pectorals",["abs","delts","triceps"],["Utilize a heavy bag for this exercise. Assume an upright stance next to the bag, with your feet staggered, fairly wide apart. Place your hand on the bag at about chest height. This will be your starting position.","Begin by twisting at the waist, pushing the bag forward as hard as possible. Perform this move quickly, pushing the bag away from your body.","Receive the bag as it swings back by reversing these steps."]],["High Cable Curls","High_Cable_Curls/0.jpg","biceps",[],["Stand between a couple of high pulleys and grab a handle in each arm. Position your upper arms in a way that they are parallel to the floor with the palms of your hands facing you. This will be your starting position.","Curl the handles towards you until they are next to your ears. Make sure that as you do so you flex your biceps and exhale. The upper arms should remain stationary and only the forearms should move. Hold for a second in the contracted position as you squeeze the biceps.","Slowly bring back the arms to the starting position.","Repeat for the recommended amount of repetitions."]],["Hip Circles (prone)","Hip_Circles_prone/0.jpg","abductors",["adductors"],["Position yourself on your hands and knees on the ground. Maintaining good posture, raise one bent knee off of the ground. This will be your starting position.","Keeping the knee in a bent position, rotate the femur in an arc, attempting to make a big circle with your knee.","Perform this slowly for a number of repetitions, and repeat on the other side."]],["Hip Extension with Bands","Hip_Extension_with_Bands/0.jpg","glutes",["hamstrings"],["Secure one end of the band to the lower portion of a post and attach the other to one ankle.","Facing the attachment point of the band, hold on to the column to stabilize yourself.","Keeping your head and your chest up, move the resisted leg back as far as you can while keeping the knee straight.","Return the leg to the starting position."]],["Hip Flexion with Band","Hip_Flexion_with_Band/0.jpg","quadriceps",[],["Secure one end of the band to the lower portion of a post and attach the other to one ankle.","Face away from the attachment point of the band.","Keeping your head and your chest up, raise your knee up to 90 degrees and pause.","Return the leg to the starting position."]],["Hip Lift with Band","Hip_Lift_with_Band/0.jpg","glutes",["calves","hamstrings"],["After choosing a suitable band, lay down in the middle of the rack, after securing the band on either side of you. If your rack doesn't have pegs, the band can be secured using heavy dumbbells or similar objects, just ensure they won't move.","Adjust your position so that the band is directly over your hips. Bend your knees and place your feet flat on the floor. Your hands can be on the floor or holding the band in position.","Keeping your shoulders on the ground, drive through your heels to raise your hips, pushing into the band as high as you can.","Pause at the top of the motion, and return to the starting position."]],["Hug A Ball","Hug_A_Ball/0.jpg","lower back",["calves","glutes"],["Seat yourself on the floor.","Straddle an exercise ball between both legs and lower your hips down toward the floor.","Hug your arms around the ball to support your body. Adjust your legs so that your feet are flat on the floor and your knees line up over your ankles. Keep a good grip on the ball so it doesn't roll away from you and send you back onto your buttocks."]],["Hug Knees To Chest","Hug_Knees_To_Chest/0.jpg","lower back",["glutes"],["Lie down on your back and pull both knees up to your chest.","Hold your arms under the knees, not over (that would put to much pressure on your knee joints).","Slowly pull the knees toward your shoulders. This also stretches your buttocks muscles."]],["Hurdle Hops","Hurdle_Hops/0.jpg","hamstrings",["abductors","adductors","calves","glutes","hamstrings"],["Set up a row of hurdles or other small barriers, placing them a few feet apart.","Stand in front of the first hurdle with your feet shoulder width apart. This will be your starting position.","Begin by jumping with both feet over the first hurdle, swinging both arms as you jump.","Absorb the impact of landing by bending the knees, rebounding out of the first leap by jumping over the next hurdle. Continue until you have jumped over all of the hurdles."]],["Hyperextensions (Back Extensions)","Hyperextensions_Back_Extensions/0.jpg","lower back",["glutes","hamstrings"],["Lie face down on a hyperextension bench, tucking your ankles securely under the footpads.","Adjust the upper pad if possible so your upper thighs lie flat across the wide pad, leaving enough room for you to bend at the waist without any restriction.","With your body straight, cross your arms in front of you (my preference) or behind your head. This will be your starting position. Tip: You can also hold a weight plate for extra resistance in front of you under your crossed arms.","Start bending forward slowly at the waist as far as you can while keeping your back flat. Inhale as you perform this movement. Keep moving forward until you feel a nice stretch on the hamstrings and you can no longer keep going without a rounding of the back. Tip: Never round the back as you perform this exercise. Also, some people can go farther than others. The key thing is that you go as far as your body allows you to without rounding the back.","Slowly raise your torso back to the initial position as you inhale. Tip: Avoid the temptation to arch your back past a straight line. Also, do not swing the torso at any time in order to protect the back from injury.","Repeat for the recommended amount of repetitions."]],["Hyperextensions With No Hyperextension Bench","Hyperextensions_With_No_Hyperextension_Bench/0.jpg","lower back",["glutes","hamstrings"],["With someone holding down your legs, slide yourself down to the edge a flat bench until your hips hang off the end of the bench. Tip: Your entire upper body should be hanging down towards the floor. Also, you will be in the same position as if you were on a hyperextension bench but the range of motion will be shorter due to the height of the flat bench vs. that of the hyperextension bench.","With your body straight, cross your arms in front of you (my preference) or behind your head. This will be your starting position. Tip: You can also hold a weight plate for extra resistance in front of you under your crossed arms.","Start bending forward slowly at the waist as far as you can while keeping your back flat. Inhale as you perform this movement. Keep moving forward until you almost touch the floor or you feel a nice stretch on the hamstrings (whichever comes first). Tip: Never round the back as you perform this exercise.","Slowly raise your torso back to the initial position as you exhale. Tip: Avoid the temptation to arch your back past a straight line. Also, do not swing the torso at any time in order to protect the back from injury.","Repeat for the recommended amount of repetitions."]],["IT Band and Glute Stretch","IT_Band_and_Glute_Stretch/0.jpg","abductors",[],["Loop a belt, rope, or band around one of your feet, and swing that leg across your body to the opposite side, keeping the leg extended as you lay on the ground. This will be your starting position.","Keeping your foot off of the floor, pull on the belt, using the tension to pull the toes up. Hold for 10-20 seconds, and repeat on the other side."]],["Iliotibial Tract-SMR","Iliotibial_Tract-SMR/0.jpg","abductors",[],["Lay on your side, with the bottom leg placed onto a foam roller between the hip and the knee. The other leg can be crossed in front of you.","Place as much of your weight as is tolerable onto your bottom leg; there is no need to keep your bottom leg in contact with the ground. Be sure to relax the muscles of the leg you are stretching.","Roll your leg over the foam from you hip to your knee, pausing for 10-30 seconds at points of tension. Repeat with the opposite leg."]],["Inchworm","Inchworm/0.jpg","hamstrings",[],["Stand with your feet close together. Keeping your legs straight, stretch down and put your hands on the floor directly in front of you. This will be your starting position.","Begin by walking your hands forward slowly, alternating your left and your right. As you do so, bend only at the hip, keeping your legs straight.","Keep going until your body is parallel to the ground in a pushup position.","Now, keep your hands in place and slowly take short steps with your feet, moving only a few inches at a time.","Continue walking until your feet are by hour hands, keeping your legs straight as you do so."]],["Incline Barbell Triceps Extension","Incline_Barbell_Triceps_Extension/0.jpg","triceps",["forearms"],["Hold a barbell with an overhand grip (palms down) that is a little closer together than shoulder width.","Lie back on an incline bench set at any angle between 45-75-degrees.","Bring the bar overhead with your arms extended and elbows in. The arms should be in line with the torso above the head. This will be your starting position.","Now lower the bar in a semicircular motion behind your head until your forearms touch your biceps. Inhale as you perform this movement. Tip: Keep your upper arms stationary and close to your head at all times. Only the forearms should move.","Return to the starting position as you breathe out and you contract the triceps. Hold the contraction for a second.","Repeat for the recommended amount of repetitions."]],["Incline Bench Pull","Incline_Bench_Pull/0.jpg","upper back",["lats","delts"],["Grab a dumbbell in each hand and lie face down on an incline bench that is set to an incline that is approximately 30 degrees.","Let the arms hang to your sides fully extended as they point to the floor.","Turn the wrists until your hands have a pronated (palms down) grip.","Now flare the elbows out. This will be your starting position.","As you breathe out, start to pull the dumbbells up as if you are doing a reverse bench press. You will do this by bending at the elbows and bringing the upper arms up as you let the forearms hang. Continue this motion until the upper arms are at the same level as your back. Tip: The elbows will come out to the side and your upper arms and torso should make the letter \"T\" at the top of the movement. Hold the contraction at the top for a second.","Slowly go back down to the starting position as you breathe in.","Repeat for the recommended amount of repetitions."]],["Incline Cable Chest Press","Incline_Cable_Chest_Press/0.jpg","pectorals",["delts","triceps"],["Adjust the weight to an appropriate amount and be seated, grasping the handles. Your upper arms should be about 45 degrees to the body, with your head and chest up. The elbows should be bent to about 90 degrees. This will be your starting position.","Begin by extending through the elbow, pressing the handles together straight in front of you. Keep your shoulder blades retracted as you execute the movement.","After pausing at full extension, return to the starting position, keeping tension on the cables."]],["Incline Cable Flye","Incline_Cable_Flye/0.jpg","pectorals",["delts"],["To get yourself into the starting position, set the pulleys at the floor level (lowest level possible on the machine that is below your torso).","Place an incline bench (set at 45 degrees) in between the pulleys, select a weight on each one and grab a pulley on each hand.","With a handle on each hand, lie on the incline bench and bring your hands together at arms length in front of your face. This will be your starting position.","With a slight bend of your elbows (in order to prevent stress at the biceps tendon), lower your arms out at both sides in a wide arc until you feel a stretch on your chest. Breathe in as you perform this portion of the movement. Tip: Keep in mind that throughout the movement, the arms should remain stationary. The movement should only occur at the shoulder joint.","Return your arms back to the starting position as you squeeze your chest muscles and exhale. Hold the contracted position for a second. Tip: Make sure to use the same arc of motion used to lower the weights.","Repeat the movement for the prescribed amount of repetitions."]],["Incline Dumbbell Bench With Palms Facing In","Incline_Dumbbell_Bench_With_Palms_Facing_In/0.jpg","pectorals",["delts","triceps"],["Lie back on an incline bench with a dumbbell on each hand on top of your thighs. The palms of your hand will be facing each other.","By using your thighs to help you get the dumbbells up, clean the dumbbells one arm at a time so that you can hold them at shoulder width.","Once at shoulder width, keep the palms of your hands with a neutral grip (palms facing each other). Keep your elbows flared out with the upper arms in line with the shoulders (perpendicular to the torso) and the elbows bent creating a 90-degree angle between the upper arm and the forearm. This will be your starting position.","Now bring down the weights slowly to your side as you breathe in. Keep full control of the dumbbells at all times.","As you breathe out, push the dumbbells up using your pectoral muscles. Lock your arms in the contracted position, hold for a second and then start coming down slowly. Tip: It should take at least twice as long to go down than to come up.","Repeat the movement for the prescribed amount of repetitions.","When you are done, place the dumbbells back in your thighs and then on the floor. This is the safest manner to dispose of the dumbbells."]],["Incline Dumbbell Curl","Incline_Dumbbell_Curl/0.jpg","biceps",[],["Sit back on an incline bench with a dumbbell in each hand held at arms length. Keep your elbows close to your torso and rotate the palms of your hands until they are facing forward. This will be your starting position.","While holding the upper arm stationary, curl the weights forward while contracting the biceps as you breathe out. Only the forearms should move. Continue the movement until your biceps are fully contracted and the dumbbells are at shoulder level. Hold the contracted position for a second.","Slowly begin to bring the dumbbells back to starting position as your breathe in.","Repeat for the recommended amount of repetitions."]],["Incline Dumbbell Flyes","Incline_Dumbbell_Flyes/0.jpg","pectorals",["delts"],["Hold a dumbbell on each hand and lie on an incline bench that is set to an incline angle of no more than 30 degrees.","Extend your arms above you with a slight bend at the elbows.","Now rotate the wrists so that the palms of your hands are facing you. Tip: The pinky fingers should be next to each other. This will be your starting position.","As you breathe in, start to slowly lower the arms to the side while keeping the arms extended and while rotating the wrists until the palms of the hand are facing each other. Tip: At the end of the movement the arms will be by your side with the palms facing the ceiling.","As you exhale start to bring the dumbbells back up to the starting position by reversing the motion and rotating the hands so that the pinky fingers are next to each other again. Tip: Keep in mind that the movement will only happen at the shoulder joint and at the wrist. There is no motion that happens at the elbow joint.","Repeat for the recommended amount of repetitions."]],["Incline Dumbbell Flyes - With A Twist","Incline_Dumbbell_Flyes_-_With_A_Twist/0.jpg","pectorals",["delts"],["Hold a dumbbell in each hand and lie on an incline bench that is set to an incline angle of no more than 30 degrees.","Extend your arms above you with a slight bend at the elbows.","Now rotate the wrists so that the palms of your hands are facing you. Tip: The pinky fingers should be next to each other. This will be your starting position.","As you breathe in, start to slowly lower the arms to the side while keeping the arms extended and while rotating the wrists until the palms of the hand are facing each other. Tip: At the end of the movement the arms will be by your side with the palms facing the ceiling.","As you exhale start to bring the dumbbells back up to the starting position by reversing the motion and rotating the hands so that the pinky fingers are next to each other again. Tip: Keep in mind that the movement will only happen at the shoulder joint and at the wrist. There is no motion that happens at the elbow joint.","Repeat for the recommended amount of repetitions."]],["Incline Dumbbell Press","Incline_Dumbbell_Press/0.jpg","pectorals",["delts","triceps"],["Lie back on an incline bench with a dumbbell in each hand atop your thighs. The palms of your hands will be facing each other.","Then, using your thighs to help push the dumbbells up, lift the dumbbells one at a time so that you can hold them at shoulder width.","Once you have the dumbbells raised to shoulder width, rotate your wrists forward so that the palms of your hands are facing away from you. This will be your starting position.","Be sure to keep full control of the dumbbells at all times. Then breathe out and push the dumbbells up with your chest.","Lock your arms at the top, hold for a second, and then start slowly lowering the weight. Tip Ideally, lowering the weights should take about twice as long as raising them.","Repeat the movement for the prescribed amount of repetitions.","When you are done, place the dumbbells back on your thighs and then on the floor. This is the safest manner to release the dumbbells."]],["Incline Hammer Curls","Incline_Hammer_Curls/0.jpg","biceps",[],["Seat yourself on an incline bench with a dumbbell in each hand. You should pressed firmly against he back with your feet together. Allow the dumbbells to hang straight down at your side, holding them with a neutral grip. This will be your starting position.","Initiate the movement by flexing at the elbow, attempting to keep the upper arm stationary.","Continue to the top of the movement and pause, then slowly return to the start position."]],["Incline Inner Biceps Curl","Incline_Inner_Biceps_Curl/0.jpg","biceps",[],["Hold a dumbbell in each hand and lie back on an incline bench.","The dumbbells should be at arm's length hanging at your sides and your palms should be facing out. This will be your starting position.","Now as you exhale curl the weight outward and up while keeping your forearms in line with your side deltoids. Continue the curl until the dumbbells are at shoulder height and to the sides of your deltoids. Tip: The end of the movement should look similar to a double biceps pose.","After a second contraction at the top of the movement, start to inhale and slowly lower the weights back to the starting position using the same path used to bring them up.","Repeat for the recommended amount of repetitions."]],["Incline Push-Up","Incline_Push-Up/0.jpg","pectorals",["delts","triceps"],["Stand facing bench or sturdy elevated platform. Place hands on edge of bench or platform, slightly wider than shoulder width.","Position forefoot back from bench or platform with arms and body straight. Arms should be perpendicular to body. Keeping body straight, lower chest to edge of box or platform by bending arms.","Push body up until arms are extended. Repeat."]],["Incline Push-Up Close-Grip","Incline_Push-Up_Close-Grip/0.jpg","triceps",["pectorals","delts"],["Stand facing a Smith machine bar or sturdy elevated platform at an appropriate height.","Place your hands next to one another on the bar.","Position your feet back from the bar with arms and body straight. This will be your starting position.","Keeping your body straight, lower your chest to the bar by bending the arms.","Return to the starting position by extending the elbows, pressing yourself back up."]],["Incline Push-Up Depth Jump","Incline_Push-Up_Depth_Jump/0.jpg","pectorals",["delts","triceps"],["For this drill you will need a box about 12 inches high, and two thick mats or aerobics steps.","Place the steps just outside of your shoulders, and place your feet on top of the box so that you are in an incline pushup position, your hands just inside the steps. This will be your starting position.","Begin by bending at the elbows to lower your body, quickly reversing position to push your body off of the ground. As you leave the ground, move your hands onto the steps, bending your elbows to absorb the impact.","Repeat the motion to return to the starting position."]],["Incline Push-Up Medium","Incline_Push-Up_Medium/0.jpg","pectorals",["abs","delts","triceps"],["Stand facing a Smith machine bar or sturdy elevated platform at an appropriate height.","Place your hands on the bar, with your hands about shoulder width apart.","Position your feet back from the bar with arms and body straight. This will be your starting position.","Keeping your body straight, lower your chest to the bar by bending the arms.","Return to the starting position by extending the elbows, pressing yourself back up."]],["Incline Push-Up Reverse Grip","Incline_Push-Up_Reverse_Grip/0.jpg","pectorals",["abs","delts","triceps"],["Stand facing a Smith machine bar or sturdy elevated platform at an appropriate height.","Place your hands on the bar palms up, with your hands about shoulder width apart.","Position your feet back from the bar with arms and body straight. This will be your starting position.","Keeping your body straight, lower your chest to the bar by bending the arms.","Return to the starting position by extending the elbows, pressing yourself back up."]],["Incline Push-Up Wide","Incline_Push-Up_Wide/0.jpg","pectorals",["abs","delts","triceps"],["Stand facing a Smith machine bar or sturdy elevated platform at an appropriate height.","Place your hands on the bar, with your hands wider than shoulder width.","Position your feet back from the bar with arms and body straight. Your arms should be perpendicular to the body. This will be your starting position.","Keeping your body straight, lower your chest to the bar by bending the arms.","Return to the starting position by extending the elbows, pressing yourself back up."]],["Intermediate Groin Stretch","Intermediate_Groin_Stretch/0.jpg","hamstrings",[],["Lie on your back with your legs extended. Loop a belt, rope, or band around one of your feet, and swing that leg as far to the side as you can. This will be your starting position.","Pull gently on the belt to create tension in your groin and hamstring muscles. Hold for 10-20 seconds, and repeat on the other side."]],["Intermediate Hip Flexor and Quad Stretch","Intermediate_Hip_Flexor_and_Quad_Stretch/0.jpg","quadriceps",[],["Lie face down on the floor, with a rope, belt, or band looped around one foot.","Flex the knee and extend the hip of the leg to be stretched, using both hands to pull on the belt. Your knee and your hip should come off of the floor, creating tension in the hip flexors and quadriceps. Hold the stretch for 10-20 seconds, and repeat on the other leg."]],["Internal Rotation with Band","Internal_Rotation_with_Band/0.jpg","delts",[],["Choke the band around a post. The band should be at the same height as your elbow. Stand with your right side to the band a couple of feet away.","Grasp the end of the band with your right hand, and keep your elbow pressed firmly to your side. We recommend you hold a pad or foam roll in place with your elbow to keep it firmly in position.","With your upper arm in position, your elbow should be flexed to 90 degrees with your hand reaching away from your torso. This will be your starting position.","Execute the movement by rotating your arm in a forehand motion, keeping your elbow in place.","Continue as far as you are able, pause, and then return to the starting position."]],["Inverted Row","Inverted_Row/0.jpg","upper back",["lats"],["Position a bar in a rack to about waist height. You can also use a smith machine.","Take a wider than shoulder width grip on the bar and position yourself hanging underneath the bar. Your body should be straight with your heels on the ground with your arms fully extended. This will be your starting position.","Begin by flexing the elbow, pulling your chest towards the bar. Retract your shoulder blades as you perform the movement.","Pause at the top of the motion, and return yourself to the start position.","Repeat for the desired number of repetitions."]],["Inverted Row with Straps","Inverted_Row_with_Straps/0.jpg","upper back",["biceps","lats"],["Hang a rope or suspension straps from a rack or other stable object. Grasp the ends and position yourself in a supine position hanging from the ropes. Your body should be straight with your heels on the ground with your arms fully extended. This will be your starting position.","Begin by flexing the elbow, pulling your chest to your hands. Retract your shoulder blades as you perform the movement.","Pause at the top of the motion, and return yourself to the start position.","Repeat for the desired number of repetitions."]],["Iron Cross","Iron_Cross/0.jpg","delts",["pectorals","glutes","hamstrings","lower back","quadriceps","traps"],[]],["Iron Crosses (stretch)","Iron_Crosses_stretch/0.jpg","quadriceps",[],["Lie face down on the floor, with your arms extended out to your side, palms pressed to the floor. This will be your starting position.","To begin, flex one knee and bring that leg across the back of your body, attempting to touch it to the ground near the opposite hand.","Promptly return the leg to the starting postion, and quickly repeat with the other leg. Continue alternating for 10-20 repetitions."]],["Isometric Chest Squeezes","Isometric_Chest_Squeezes/0.jpg","pectorals",["delts","triceps"],["While either seating or standing, bend your arms at a 90-degree angle and place the palms of your hands together in front of your chest. Tip: Your hands should be open with the palms together and fingers facing forward (perpendicular to your torso).","Push both hands against each other as you contract your chest. Start with slow tension and increase slowly. Keep breathing normally as you execute this contraction.","Hold for the recommended number of seconds.","Now release the tension slowly.","Rest for the recommended amount of time and repeat."]],["Isometric Neck Exercise - Front And Back","Isometric_Neck_Exercise_-_Front_And_Back/0.jpg","traps",[],["With your head and neck in a neutral position (normal position with head erect facing forward), place both of your hands on the front side of your head.","Now gently push forward as you contract the neck muscles but resisting any movement of your head. Start with slow tension and increase slowly. Keep breathing normally as you execute this contraction.","Hold for the recommended number of seconds.","Now release the tension slowly.","Rest for the recommended amount of time and repeat with your hands placed on the back side of your head."]],["Isometric Neck Exercise - Sides","Isometric_Neck_Exercise_-_Sides/0.jpg","traps",[],["With your head and neck in a neutral position (normal position with head erect facing forward), place your left hand on the left side of your head.","Now gently push towards the left as you contract the left neck muscles but resisting any movement of your head. Start with slow tension and increase slowly. Keep breathing normally as you execute this contraction.","Hold for the recommended number of seconds.","Now release the tension slowly.","Rest for the recommended amount of time and repeat with your right hand placed on the right side of your head."]],["Isometric Wipers","Isometric_Wipers/0.jpg","pectorals",["abs","delts","triceps"],["Assume a push-up position, supporting your weight on your hands and toes while keeping your body straight. Your hands should be just outside of shoulder width. This will be your starting position.","Begin by shifting your body weight as far to one side as possible, allowing the elbow on that side to flex as you lower your body.","Reverse the motion by extending the flexed arm, pushing yourself up and then dropping to the other side.","Repeat for the desired number of repetitions."]],["JM Press","JM_Press/0.jpg","triceps",["pectorals","delts"],["Start the exercise the same way you would a close grip bench press. You will lie on a flat bench while holding a barbell at arms length (fully extended) with the elbows in. However, instead of having the arms perpendicular to the torso, make sure the bar is set in a direct line above the upper chest. This will be your starting position.","Now beginning from a fully extended position lower the bar down as if performing a lying triceps extension. Inhale as you perform this movement. When you reach the half way point, let the bar roll back about one inch by moving the upper arms towards your legs until they are perpendicular to the torso. Tip: Keep the bend at the elbows constant as you bring the upper arms forward.","As you exhale, press the bar back up by using the triceps to perform a close grip bench press.","Now go back to the starting position and start over.","Repeat for the recommended amount of repetitions."]],["Jackknife Sit-Up","Jackknife_Sit-Up/0.jpg","abs",[],["Lie flat on the floor (or exercise mat) on your back with your arms extended straight back behind your head and your legs extended also. This will be your starting position.","As you exhale, bend at the waist while simultaneously raising your legs and arms to meet in a jackknife position. Tip: The legs should be extended and lifted at approximately a 35-45 degree angle from the floor and the arms should be extended and parallel to your legs. The upper torso should be off the floor.","While inhaling, lower your arms and legs back to the starting position.","Repeat for the recommended amount of repetitions."]],["Janda Sit-Up","Janda_Sit-Up/0.jpg","abs",[],["Position your body on the floor in the basic sit-up position; knees to a ninety degree angle with feet flat on the floor and arms either crossed over your chest or to the sides. This will be your starting position.","As you strongly tighten your glutes and hamstrings, fill your lungs with air and in a slow (three to six second count) ascent, slowly exhale. Tip: It is important to tighten the glutes and hamstrings as this will cause the hip flexors to be inactivated in a process called reciprocal inhibition, which basically means that opposite muscles to the contracted ones will relax.","As you inhale, slowly go back in a controlled manner to the starting position.","Repeat for the recommended amount of repetitions."]],["Jefferson Squats","Jefferson_Squats/0.jpg","quadriceps",["calves","glutes","hamstrings","lower back","traps"],["Place a barbell on the floor.","Stand in the middle of the bar length wise.","Bend down by bending at the knees and keeping your back straight and grasp the front of the bar with your right hand. Your palm should be in (neutral grip) facing the left side.","Grasp the rear of the bar with your left hand. The palm of your hand should be in neutral grip alignment (palms facing the right side). Tip: Ensure that your grip is even on the bar. Your torso should be positioned right in the middle of the bar and the distance between your torso and your right hand (which should be at the front) should be the same as the distance between your torso and your left hand (which should be to your back).","Now stand straight up with the weight. Tip: Your feet should be shoulder width apart and your toes slightly pointed out.","Squat down by bending at the knees and keeping your back straight until your upper thighs are parallel with the floor. Tip: Keep your back as vertical as possible with the floor and your head up. Also remember to not let your knees go past your toes. Inhale during this portion of the movement.","Now drive yourself back up to the starting position by pushing with the feet . Tip: Keep the bar hanging at arm's length and your elbows locked with a slight bend. The arms only serve as hooks. Avoid doing any lifting with them. Do the lifting with your thighs; not your arms."]],["Jerk Balance","Jerk_Balance/0.jpg","delts",["glutes","hamstrings","quadriceps","triceps"],["This drill helps you learn to drive yourself low enough during the jerk and corrects those who move backward during the movement. Begin with the bar racked in the jerk position, with the shoulders forward, torso upright, and the feet split slightly apart.","Initiate the movement as you would a normal jerk, dipping at the knees while keeping your torso vertical, and driving back up forcefully, using momentum and not your arms to elevate the weight.","Keep the rear foot in place, using it to drive your body forward into a full split as you jerk the weight. Recover by standing up with the weight overhead."]],["Jerk Dip Squat","Jerk_Dip_Squat/0.jpg","quadriceps",["abs","calves"],["This movement strengthens the dip portion of the jerk. Begin with the bar racked in the jerk position, with the shoulders forward to create a shelf and the bar lightly contacting the throat. The feet should be directly under the hips, with the feet turned out as is comfortable.","Keeping the torso vertical, dip by flexing the knees, allowing them to travel forward and without moving the hips to the rear. The dip should not be excessive. Return the weight to the starting position by driving forcefully though the feet."]],["Jogging, Treadmill","Jogging_Treadmill/0.jpg","quadriceps",["glutes","hamstrings"],["To begin, step onto the treadmill and select the desired option from the menu. Most treadmills have a manual setting, or you can select a program to run. Typically, you can enter your age and weight to estimate the amount of calories burned during exercise. Elevation can be adjusted to change the intensity of the workout.","Treadmills offer convenience, cardiovascular benefits, and usually have less impact than jogging outside. A 150 lb person will burn almost 250 calories jogging for 30 minutes, compared to more than 450 calories running. Maintain proper posture as you jog, and only hold onto the handles when necessary, such as when dismounting or checking your heart rate."]],["Keg Load","Keg_Load/0.jpg","lower back",["abs","biceps","calves","forearms","glutes","hamstrings","upper back","quadriceps","delts","traps"],["To load kegs, place the desired number a distance from the loading platform, typically 30-50 feet.","Begin by grabbing the close handle of the first keg, tilting it onto its side to grab the opposite edge of the bottom of the keg. Lift the keg up to your chest.","The higher you can place the keg, the faster you should be able to move to the platform. Shouldering is usually not allowed. Be sure to keep a firm hold on the keg. Move as quickly as possible to the platform, and load it, extending through your hips, knees, and ankles to get it as high as possible.","Return to the starting position to retrieve the next keg, and repeat until the event is completed."]],["Kettlebell Arnold Press","Kettlebell_Arnold_Press/0.jpg","delts",["triceps"],["Clean a kettlebell to your shoulder. Clean the kettlebell to your shoulder by extending through the legs and hips as you raise the kettlebell towards your shoulder. The palm should be facing inward.","Looking straight ahead, press the kettlebell out and overhead, rotating your wrist so that your palm faces forward at the top of the motion.","Return the kettlebell to the starting position, with the palm facing in."]],["Kettlebell Dead Clean","Kettlebell_Dead_Clean/0.jpg","hamstrings",["calves","glutes","lower back","quadriceps","traps"],["Place kettlebell between your feet. To get in the starting position, push your butt back and look straight ahead.","Clean the kettlebell to your shoulder. Clean the kettlebell to your shoulders by extending through the legs and hips as you raise the kettlebell towards your shoulder. The wrist should rotate as you do so.","Lower the kettlebell, keeping the hamstrings loaded by keeping your back straight and your butt out."]],["Kettlebell Figure 8","Kettlebell_Figure_8/0.jpg","abs",["hamstrings","delts"],["Place one kettlebell between your legs and take a wider than shoulder width stance. Bend over by pushing your butt out and keeping your back flat.","Pick up a kettlebell and pass it to your other hand between your legs. The receiving hand should reach from behind the legs. Go back and forth for several repetitions."]],["Kettlebell Hang Clean","Kettlebell_Hang_Clean/0.jpg","hamstrings",["calves","glutes","lower back","delts","traps"],["Place kettlebell between your feet. To get in the starting position, push your butt back and look straight ahead.","Clean kettlebell to your shoulder. Clean the kettlebell to your shoulders by extending through the legs and hips as you raise the kettlebell towards your shoulder. The wrist should rotate as you do so.","Lower kettlebell to a hanging position between your legs while keeping the hamstrings loaded. Keep your head up at all times."]],["Kettlebell One-Legged Deadlift","Kettlebell_One-Legged_Deadlift/0.jpg","hamstrings",["glutes","lower back"],["Hold a kettlebell by the handle in one hand. Stand on one leg, on the same side that you hold the kettlebell.","Keeping that knee slightly bent, perform a stiff legged deadlift by bending at the hip, extending your free leg behind you for balance.","Continue lowering the kettlebell until you are parallel to the ground, and then return to the upright position."]],["Kettlebell Pass Between The Legs","Kettlebell_Pass_Between_The_Legs/0.jpg","abs",["glutes","hamstrings","delts"],["Place one kettlebell between your legs and take a comfortable stance. Bend over by pushing your butt out and keeping your back flat.","Pick up a kettlebell and pass it to your other hand between your legs, in the fashion of a \"W\". Go back and forth for several repetitions."]],["Kettlebell Pirate Ships","Kettlebell_Pirate_Ships/0.jpg","delts",["abs"],["With a wide stance, hold a kettlebell with both hands. Allow it to hang at waist level with your arms extended. This will be your starting position.","Initiate the movement by turning to one side, swinging the kettlebell to head height. Briefly pause at the top of the motion.","Allow the bell to drop as you rotate to the opposite side, again raising the kettlebell to head height.","Repeat for the desired amount of repetitions."]],["Kettlebell Pistol Squat","Kettlebell_Pistol_Squat/0.jpg","quadriceps",["calves","glutes","hamstrings","delts"],["Pick up a kettlebell with two hands and hold it by the horns. Hold one leg off of the floor and squat down on the other.","Squat down by flexing the knee and sitting back with the hips, holding the kettlebell up in front of you.","Hold the bottom position for a second and then reverse the motion, driving through the heel and keeping your head and chest up.","Lower yourself again and repeat."]],["Kettlebell Seated Press","Kettlebell_Seated_Press/0.jpg","delts",["triceps"],["Sit on the floor and spread your legs out comfortably.","Clean one kettlebell to your shoulder.","Press the kettlebell up and out until it is locked out overhead. Return to the starting position."]],["Kettlebell Seesaw Press","Kettlebell_Seesaw_Press/0.jpg","delts",["triceps"],["Clean two kettlebells two your shoulders.","Press one kettlebell.","Lower the kettlebell and immediately press the other kettlebell. Make sure to do the same amount of reps on both sides."]],["Kettlebell Sumo High Pull","Kettlebell_Sumo_High_Pull/0.jpg","traps",["adductors","glutes","hamstrings","quadriceps","delts"],["Place a kettlebell on the ground between your feet. Position your feet in a wide stance, and grasp the kettlebell with two hands. Set your hips back as far as possible, with your knees bent. Keep your chest and head up. This will be your starting position.","Begin by extending the hips and knees, simultaneously pulling the kettlebell to your shoulders, raising your elbows as you do so. Reverse the motion to return to the starting position."]],["Kettlebell Thruster","Kettlebell_Thruster/0.jpg","delts",["quadriceps","triceps"],["Clean two kettlebells to your shoulders. Clean the kettlebells to your shoulders by extending through the legs and hips as you pull the kettlebells towards your shoulders. Rotate your wrists as you do so. This will be your starting position.","Begin to squat by flexing your hips and knees, lowering your hips between your legs. Maintain an upright, straight back as you descend as low as you can.","At the bottom, reverse direction and squat by extending your knees and hips, driving through your heels. As you do so, press both kettlebells overhead by extending your arms straight up, using the momentum from the squat to help drive the weights upward.","As you begin the next repetition, return the weights to the shoulders."]],["Kettlebell Turkish Get-Up (Lunge style)","Kettlebell_Turkish_Get-Up_Lunge_style/0.jpg","delts",["abs","hamstrings","quadriceps","triceps"],["Lie on your back on the floor and press a kettlebell to the top position by extending the elbow. Bend the knee on the same side as the kettlebell.","Keeping the kettlebell locked out at all times, pivot to the opposite side and use your non- working arm to assist you in driving forward to the lunge position. Using your free hand, push yourself to a seated position, then progressing to one knee.","While looking up at the kettlebell, slowly stand up. Reverse the motion back to the starting position and repeat."]],["Kettlebell Turkish Get-Up (Squat style)","Kettlebell_Turkish_Get-Up_Squat_style/0.jpg","delts",["abs","calves","hamstrings","quadriceps","triceps"],["Lie on your back on the floor and press a kettlebell to the top position by extending the elbow. Bend the knee on the same side as the kettlebell.","Keeping the kettlebell locked out at all times, pivot to the opposite side and use your non- working arm to assist you in driving forward to the lunge position.","Using your free hand, push yourself to a seated position, then progressing to your feet. While looking up at the kettlebell, slowly stand up. Reverse the motion back to the starting position and repeat."]],["Kettlebell Windmill","Kettlebell_Windmill/0.jpg","abs",["glutes","hamstrings","delts","triceps"],["Place a kettlebell in front of your lead foot and clean and press it overhead with your opposite arm. Clean the kettlebell to your shoulder by extending through the legs and hips as you pull the kettlebell towards your shoulders. Rotate your wrist as you do so, so that the palm faces forward. Press it overhead by extending the elbow.","Keeping the kettlebell locked out at all times, push your butt out in the direction of the locked out kettlebell. Turn your feet out at a forty-five degree angle from the arm with the locked out kettlebell. Bending at the hip to one side, sticking your butt out, slowly lean until you can touch the floor with your free hand. Keep your eyes on the kettlebell that you hold over your head at all times.","Pause for a second after reaching the ground and reverse the motion back to the starting position."]],["Kipping Muscle Up","Kipping_Muscle_Up/0.jpg","lats",["abs","biceps","forearms","upper back","delts","traps","triceps"],["Grip the rings using a false grip, with the base of your palms on top of the rings.","Begin with a movement swinging your legs backward slightly.","Counter that movement by swinging your legs forward and up, jerking your chin and chest back, pulling yourself up with both arms as you do so. As you reach the top position of the pull-up, pull the rings to your armpits as you roll your shoulders forward, allowing your elbows to move straight back behind you. This puts you into the proper position to continue into the dip portion of the movement.","Maintaining control and stability, extend through the elbow to complete the motion.","Use care when lowering yourself to the ground."]],["Knee Across The Body","Knee_Across_The_Body/0.jpg","glutes",["abductors","lower back"],["Lie down on the floor with your right leg straight. Bend your left leg and lower it across your body, holding the knee down toward the floor with your right hand. (The knee doesn't need to touch the floor if you're tight.)","Place your left arm comfortably beside you and turn your head to the left. Imagine you have a weight tied to your tailbone. let your tailbone fall back toward the floor as your chest reaches in the opposite direction to stretch your lower back. Switch sides."]],["Knee Circles","Knee_Circles/0.jpg","calves",["hamstrings","quadriceps"],["Stand with your legs together and hands by your waist.","Now move your knees in a circular motion as you breathe normally.","Repeat for the recommended amount of repetitions."]],["Knee/Hip Raise On Parallel Bars","Knee_Hip_Raise_On_Parallel_Bars/0.jpg","abs",[],["Position your body on the vertical leg raise bench so that your forearms are resting on the pads next to the torso and holding on to the handles. Your arms will be bent at a 90 degree angle.","The torso should be straight with the lower back pressed against the pad of the machine and the legs extended pointing towards the floor. This will be your starting position.","Now as you breathe out, lift your legs up as you keep them extended. Continue this movement until your legs are roughly parallel to the floor and then hold the contraction for a second
