 handles in front of you at shoulder width.","Once at shoulder width, rotate your wrists forward so that the palms of your hands are facing away from you. This will be your starting position.","Bring down the handles slowly until your elbow forms a 90 degree angle. Keep full control at all times.","As you breathe out, bring the handles up using your pectoral muscles. Lock your arms in the contracted position, squeeze your chest, hold for a second and then start coming down slowly. Tip: It should take at least twice as long to go down than to come up.","Repeat the movement for the prescribed amount of repetitions of your training program."]],["Bench Press with Chains","Bench_Press_with_Chains/0.jpg","triceps",["pectorals","lats","delts"],["Adjust the leader chain, shortening it to the desired length.Place the chains on the sleeves of the bar.","Lying on the bench, get your head beyond the bar if possible. Tuck your feet underneath you and arch your back. Using the bar to help support your weight, lift your shoulder off the bench and retract them, squeezing the shoulder blades together. Use your feet to drive your traps into the bench. Maintain this tight body position throughout the movement. However wide your grip, it should cover the ring on the bar.","Pull the bar out of the rack without protracting your shoulders. Focus on squeezing the bar and trying to pull it apart. Lower the bar to your lower chest or upper stomach. The bar, wrist, and elbow should stay in line at all times.","Pause when the barbell touches your torso, and then drive the bar up with as much force as possible. The elbows should be tucked in until lockout."]],["Bench Sprint","Bench_Sprint/0.jpg","quadriceps",["calves","glutes","hamstrings"],["Stand on the ground with one foot resting on a bench or box with your heel close to the edge.","Push off with your foot on top of the bench, extending through the hip and knee.","Land with the opposite foot on top of the box, returning your other foot back to the start position.","Continue alternating from one foot to another to complete the set."]],["Bent-Arm Barbell Pullover","Bent-Arm_Barbell_Pullover/0.jpg","lats",["pectorals","lats","delts","triceps"],["Lie on a flat bench with a barbell using a shoulder grip width.","Hold the bar straight over your chest with a bend in your arms. This will be your starting position.","While keeping your arms in the bent arm position, lower the weight slowly in an arc behind your head while breathing in until you feel a stretch on the chest.","At that point, bring the barbell back to the starting position using the arc through which the weight was lowered and exhale as you perform this movement.","Hold the weight on the initial position for a second and repeat the motion for the prescribed number of repetitions."]],["Bent-Arm Dumbbell Pullover","Bent-Arm_Dumbbell_Pullover/0.jpg","pectorals",["lats","delts","triceps"],["Place a dumbbell standing up on a flat bench.","Ensuring that the dumbbell stays securely placed at the top of the bench, lie perpendicular to the bench (torso across it as in forming a cross) with only your shoulders lying on the surface. Hips should be below the bench and legs bent with feet firmly on the floor. The head will be off the bench as well.","Grasp the dumbbell with both hands and hold it straight over your chest with a bend in your arms. Both palms should be pressing against the underside one of the sides of the dumbbell. This will be your starting position. Caution: Always ensure that the dumbbell used for this exercise is secure. Using a dumbbell with loose plates can result in the dumbbell falling apart and falling on your face.","While keeping your arms locked in the bent arm position, lower the weight slowly in an arc behind your head while breathing in until you feel a stretch on the chest.","At that point, bring the dumbbell back to the starting position using the arc through which the weight was lowered and exhale as you perform this movement.","Hold the weight on the initial position for a second and repeat the motion for the prescribed number of repetitions."]],["Bent-Knee Hip Raise","Bent-Knee_Hip_Raise/0.jpg","abs",[],["Lay flat on the floor with your arms next to your sides.","Now bend your knees at around a 75 degree angle and lift your feet off the floor by around 2 inches.","Using your lower abs, bring your knees in towards you as you maintain the 75 degree angle bend in your legs. Continue this movement until you raise your hips off of the floor by rolling your pelvis backward. Breathe out as you perform this portion of the movement. Tip: At the end of the movement your knees will be over your chest.","Squeeze your abs at the top of the movement for a second and then return to the starting position slowly as you breathe in. Tip: Maintain a controlled motion at all times.","Repeat for the recommended amount of repetitions."]],["Bent Over Barbell Row","Bent_Over_Barbell_Row/0.jpg","upper back",["biceps","lats","delts"],["Holding a barbell with a pronated grip (palms facing down), bend your knees slightly and bring your torso forward, by bending at the waist, while keeping the back straight until it is almost parallel to the floor. Tip: Make sure that you keep the head up. The barbell should hang directly in front of you as your arms hang perpendicular to the floor and your torso. This is your starting position.","Now, while keeping the torso stationary, breathe out and lift the barbell to you. Keep the elbows close to the body and only use the forearms to hold the weight. At the top contracted position, squeeze the back muscles and hold for a brief pause.","Then inhale and slowly lower the barbell back to the starting position.","Repeat for the recommended amount of repetitions."]],["Bent Over Dumbbell Rear Delt Raise With Head On Bench","Bent_Over_Dumbbell_Rear_Delt_Raise_With_Head_On_Bench/0.jpg","delts",[],["Stand up straight while holding a dumbbell in each hand and with an incline bench in front of you.","While keeping your back straight and maintaining the natural arch of your back, lean forward until your forehead touches the bench in front of you. Let the arms hang in front of you perpendicular to the ground. The palms of your hands should be facing each other and your torso should be parallel to the floor. This will be your starting position.","Keeping your torso forward and stationary, and the arms straight with a slight bend at the elbows, lift the dumbbells straight to the side until both arms are parallel to the floor. Exhale as you lift the weights. Caution: avoid swinging the torso or bringing the arms back as opposed to the side.","After a one second contraction at the top, slowly lower the dumbbells back to the starting position.","Repeat the recommended amount of repetitions."]],["Bent Over Low-Pulley Side Lateral","Bent_Over_Low-Pulley_Side_Lateral/0.jpg","delts",["lower back","upper back","traps"],["Select a weight and hold the handle of the low pulley with your right hand.","Bend at the waist until your torso is nearly parallel to the floor. Your legs should be slightly bent with your left hand placed on your lower left thigh. Your right arm should be hanging from your shoulder in front of you and with a slight bend at the elbow. This will be your starting position.","Raise your right arm, elbow slightly bent, to the side until the arm is parallel to the floor and in line with your right ear. Breathe out as you perform this step.","Slowly lower the weight back to the starting position as you breathe in.","Repeat for the recommended amount of repetitions and repeat the movement with the other arm."]],["Bent Over One-Arm Long Bar Row","Bent_Over_One-Arm_Long_Bar_Row/0.jpg","upper back",["biceps","lats","lower back","traps"],["Put weight on one of the ends of an Olympic barbell. Make sure that you either place the other end of the barbell in the corner of two walls; or put a heavy object on the ground so the barbell cannot slide backward.","Bend forward until your torso is as close to parallel with the floor as you can and keep your knees slightly bent.","Now grab the bar with one arm just behind the plates on the side where the weight was placed and put your other hand on your knee. This will be your starting position.","Pull the bar straight up with your elbow in (to maximize back stimulation) until the plates touch your lower chest. Squeeze the back muscles as you lift the weight up and hold for a second at the top of the movement. Breathe out as you lift the weight. Tip: Do not allow for any swinging of the torso. Only the arm should move.","Slowly lower the bar to the starting position getting a nice stretch on the lats. Tip: Do not let the plates touch the floor. To ensure the best range of motion, I recommend using small plates (25-lb ones) as opposed to larger plates (like 35-45lb ones).","Repeat for the recommended amount of repetitions and switch arms."]],["Bent Over Two-Arm Long Bar Row","Bent_Over_Two-Arm_Long_Bar_Row/0.jpg","upper back",["biceps","lats"],["Put weight on one of the ends of an Olympic barbell. Make sure that you either place the other end of the barbell in the corner of two walls; or put a heavy object on the ground so the barbell cannot slide backward.","Bend forward until your torso is as close to parallel with the floor as you can and keep your knees slightly bent.","Now grab the bar with both arms just behind the plates on the side where the weight was placed and put your other hand on your knee. This will be your starting position.","Pull the bar straight up with your elbows in (to maximize back stimulation) until the plates touch your lower chest. Squeeze the back muscles as you lift the weight up and hold for a second at the top of the movement. Breathe out as you lift the weight. Tip: Use a stirrup or double handle cable attachment by hooking it under the end of the bar.","Slowly lower the bar to the starting position getting a nice stretch on the lats. Tip: Do not let the plates touch the floor. To ensure the best range of motion, I recommend using small plates (25-lb ones) as opposed to larger plates (like 35-45lb ones).","Repeat for the recommended amount of repetitions."]],["Bent Over Two-Dumbbell Row","Bent_Over_Two-Dumbbell_Row/0.jpg","upper back",["biceps","lats","delts"],["With a dumbbell in each hand (palms facing your torso), bend your knees slightly and bring your torso forward by bending at the waist; as you bend make sure to keep your back straight until it is almost parallel to the floor. Tip: Make sure that you keep the head up. The weights should hang directly in front of you as your arms hang perpendicular to the floor and your torso. This is your starting position.","While keeping the torso stationary, lift the dumbbells to your side (as you breathe out), keeping the elbows close to the body (do not exert any force with the forearm other than holding the weights). On the top contracted position, squeeze the back muscles and hold for a second.","Slowly lower the weight again to the starting position as you inhale.","Repeat for the recommended amount of repetitions."]],["Bent Over Two-Dumbbell Row With Palms In","Bent_Over_Two-Dumbbell_Row_With_Palms_In/0.jpg","upper back",["biceps","lats"],["With a dumbbell in each hand (palms facing each other), bend your knees slightly and bring your torso forward, by bending at the waist, while keeping the back straight until it is almost parallel to the floor. Tip: Make sure that you keep the head up. The weights should hang directly in front of you as your arms hang perpendicular to the floor and your torso. This is your starting position.","While keeping the torso stationary, lift the dumbbells to your side as you breathe out, squeezing your shoulder blades together. On the top contracted position, squeeze the back muscles and hold for a second.","Slowly lower the weight again to the starting position as you inhale.","Repeat for the recommended amount of repetitions."]],["Bent Press","Bent_Press/0.jpg","abs",["glutes","hamstrings","lower back","quadriceps","delts","triceps"],["Clean a kettlebell to your shoulder. Clean the kettlebell to your shoulders by extending through the legs and hips as you raise the kettlebell towards your shoulder. The wrist should rotate as you do so. This will be your starting position.","Begin my leaning to the side opposite the kettlebell, continuing until you are able to touch the ground with your free hand, keeping your eyes on the kettlebell. As you do so, press the weight vertically be extending through the elbow, keeping your arm perpendicular to the ground.","Return to an upright position, with the kettlebell above your head. Return the kettlebell to the shoulder and repeat for the desired number of repetitions."]],["Bicycling","Bicycling/0.jpg","quadriceps",["calves","glutes","hamstrings"],["To begin, seat yourself on the bike and adjust the seat to your height."]],["Bicycling, Stationary","Bicycling_Stationary/0.jpg","quadriceps",["calves","glutes","hamstrings"],["To begin, seat yourself on the bike and adjust the seat to your height.","Select the desired option from the menu. You may have to start pedaling to turn it on. You can use the manual setting, or you can select a program to use. Typically, you can enter your age and weight to estimate the amount of calories burned during exercise. The level of resistance can be changed throughout the workout. The handles can be used to monitor your heart rate to help you stay at an appropriate intensity."]],["Board Press","Board_Press/0.jpg","triceps",["pectorals","forearms","lats","delts"],["Begin by lying on the bench, getting your head beyond the bar if possible. One to five boards, made out of 2x6's, can be screwed together and held in place by a training partner, bands, or just tucked under your shirt.","Tuck your feet underneath you and arch your back. Using the bar to help support your weight, lift your shoulder off the bench and retract them, squeezing the shoulder blades together. Use your feet to drive your traps into the bench. Maintain this tight body position throughout the movement.","You can take a standard bench grip, or shoulder width to focus on the triceps. Pull the bar out of the rack without protracting your shoulders. The bar, wrist, and elbow should stay in line at all times. Focus on squeezing the bar and trying to pull it apart.","Lower the bar to the boards, and then drive the bar up with as much force as possible. The elbows should be tucked in until lockout."]],["Body-Up","Body-Up/0.jpg","triceps",["abs","forearms"],["Assume a plank position on the ground. You should be supporting your bodyweight on your toes and forearms, keeping your torso straight. Your forearms should be shoulder-width apart. This will be your starting position.","Pressing your palms firmly into the ground, extend through the elbows to raise your body from the ground. Keep your torso rigid as you perform the movement.","Slowly lower your forearms back to the ground by allowing the elbows to flex.","Repeat."]],["Body Tricep Press","Body_Tricep_Press/0.jpg","triceps",[],["Position a bar in a rack at chest height.","Standing, take a shoulder width grip on the bar and step a yard or two back, feet together and arms extended so that you are leaning on the bar. This will be your starting position.","Begin by flexing the elbow, lowering yourself towards the bar.","Pause, and then reverse the motion by extending the elbows.","Progress from bodyweight by adding chains over your shoulders."]],["Bodyweight Flyes","Bodyweight_Flyes/0.jpg","pectorals",["abs","delts","triceps"],["Position two equally loaded EZ bars on the ground next to each other. Ensure they are able to roll.","Assume a push-up position over the bars, supporting your weight on your toes and hands with your arms extended and body straight.","Place your hands on the bars. This will be your starting position.","Using a slow and controlled motion, move your hands away from the midline of your body, rolling the bars apart. Inhale during this portion of the motion.","After moving the bars as far apart as you can, return to the starting position by pulling them back together. Exhale as you perform this movement."]],["Bodyweight Mid Row","Bodyweight_Mid_Row/0.jpg","upper back",["biceps","lats"],["Begin by taking a medium to wide grip on a pull-up apparatus with your palms facing away from you. From a hanging position, tuck your knees to your chest, leaning back and getting your legs over your side of the pull-up apparatus. This will be your starting position.","Beginning with your arms straight, flex the elbows and retract the shoulder blades to raise your body up until your legs contact the pull-up apparatus.","After a brief pause, return to the starting position."]],["Bodyweight Squat","Bodyweight_Squat/0.jpg","quadriceps",["glutes","hamstrings"],["Stand with your feet shoulder width apart. You can place your hands behind your head. This will be your starting position.","Begin the movement by flexing your knees and hips, sitting back with your hips.","Continue down to full depth if you are able,and quickly reverse the motion until you return to the starting position. As you squat, keep your head and chest up and push your knees out."]],["Bodyweight Walking Lunge","Bodyweight_Walking_Lunge/0.jpg","quadriceps",["calves","glutes","hamstrings"],["Begin standing with your feet shoulder width apart and your hands on your hips.","Step forward with one leg, flexing the knees to drop your hips. Descend until your rear knee nearly touches the ground. Your posture should remain upright, and your front knee should stay above the front foot.","Drive through the heel of your lead foot and extend both knees to raise yourself back up.","Step forward with your rear foot, repeating the lunge on the opposite leg."]],["Bosu Ball Cable Crunch With Side Bends","Bosu_Ball_Cable_Crunch_With_Side_Bends/0.jpg","abs",[],["Connect a standard handle to each arm of a cable machine, and position them in the most downward position.","Grab a Bosu Ball and position it in front and center of the cable machine.","Lie down on the Bosu Ball with the small of your back arched around the ball. Your rear end should be close to the floor without touching it.","With both hands, reach back and grab the handle of each cable.","With your feet positioned in a wide stance, extend your arms straight out in front of you and in between your knees. Your hands should be at knee level.","Keep your arms straight and in-line with the upward angle of the cable. Elevate your torso in a crunching motion without dropping or bending your arms.","Maintain the rigid position with your arms. Slowly descend back to the starting position with your back arched around the Bosu Ball and your abdominals elongated.","Repeat the same series of movements to failure.","Once you reach failure, keep your abs tight and raise your torso into plank position so your back is elevated off the Bosu Ball.","Lower your arms down to your side; keep them straight. Start doing alternating side bends; reach for your heels! This finishing movement will focus on your obliques."]],["Bottoms-Up Clean From The Hang Position","Bottoms-Up_Clean_From_The_Hang_Position/0.jpg","forearms",["biceps","delts"],["Initiate the exercise by standing upright with a kettlebell in one hand.","Swing the kettlebell back forcefully and then reverse the motion forcefully. Crush the kettlebell handle as hard as possible and raise the kettlebell to your shoulder."]],["Bottoms Up","Bottoms_Up/0.jpg","abs",[],["Begin by lying on your back on the ground. Your legs should be straight and your arms at your side. This will be your starting position.","To perform the movement, tuck the knees toward your chest by flexing the hips and knees. Following this, extend your legs directly above you so that they are perpendicular to the ground. Rotate and elevate your pelvis to raise your glutes from the floor.","After a brief pause, return to the starting position."]],["Box Jump (Multiple Response)","Box_Jump_Multiple_Response/0.jpg","hamstrings",["abductors","adductors","calves","glutes","quadriceps"],["Assume a relaxed stance facing the box or platform approximately an arm's length away. Arms should be down at the sides and legs slightly bent.","Using the arms to aid in the initial burst, jump upward and forward, landing with feet simultaneously on top of the box or platform.","Immediately drop or jump back down to the original starting place; then repeat the sequence."]],["Box Skip","Box_Skip/0.jpg","hamstrings",["abductors","adductors","calves","glutes","quadriceps"],["You will need several boxes lined up about 8 feet apart.","Begin facing the first box with one leg slightly behind the other.","Drive off the back leg, attempting to gain as much height with the hips as possible.","Immediately upon landing on the box, drive the other leg forward and upward to gain height and distance, leaping from the box. Land between the first two boxes with the same leg that landed on the first box.","Then, step to the next box and repeat."]],["Box Squat","Box_Squat/0.jpg","quadriceps",["adductors","calves","glutes","hamstrings","lower back"],["The box squat allows you to squat to desired depth and develop explosive strength in the squat movement. Begin in a power rack with a box at the appropriate height behind you. Typically, you would aim for a box height that brings you to a parallel squat, but you can train higher or lower if desired.","Begin by stepping under the bar and placing it across the back of the shoulders. Squeeze your shoulder blades together and rotate your elbows forward, attempting to bend the bar across your shoulders. Remove the bar from the rack, creating a tight arch in your lower back, and step back into position. Place your feet wider for more emphasis on the back, glutes, adductors, and hamstrings, or closer together for more quad development. Keep your head facing forward.","With your back, shoulders, and core tight, push your knees and butt out and you begin your descent. Sit back with your hips until you are seated on the box. Ideally, your shins should be perpendicular to the ground. Pause when you reach the box, and relax the hip flexors. Never bounce off of a box.","Keeping the weight on your heels and pushing your feet and knees out, drive upward off of the box as you lead the movement with your head. Continue upward, maintaining tightness head to toe."]],["Box Squat with Bands","Box_Squat_with_Bands/0.jpg","quadriceps",["abductors","adductors","calves","glutes","hamstrings","lower back"],["Begin in a power rack with a box at the appropriate height behind you. Set up the bands on the sleeves, secured to either band pegs, the rack, or dumbbells so that there is appropriate tension. If dumbbells are used, secure them so that they don't move. Also, ensure that the dumbbells you are using are heavy enough for the bands that you are using. Additional plates can be used to hold the dumbbells down. If more tension is needed, you can either widen the base on the floor or choke the bands. Typically, you would aim for a box height that brings you to a parallel squat, but you can train higher or lower if desired.","Begin by stepping under the bar and placing it across the back of the shoulders. Squeeze your shoulder blades together and rotate your elbows forward, attempting to bend the bar across your shoulders. Remove the bar from the rack, creating a tight arch in your lower back, and step back into position. Place your feet wider for more emphasis on the back, glutes, adductors, and hamstrings, or closer together for more quad development. Keep your head facing forward.","With your back, shoulders, and core tight, push your knees and butt out and you begin your descent. Sit back with your hips until you are seated on the box. Ideally, your shins should be perpendicular to the ground. Pause when you reach the box, and relax the hip flexors. Never bounce off of a box.","Keeping the weight on your heels and pushing your feet and knees out, drive upward off of the box as you lead the movement with your head. Continue upward, maintaining tightness head to toe. Use care to return the barbell to the rack."]],["Box Squat with Chains","Box_Squat_with_Chains/0.jpg","quadriceps",["abductors","adductors","calves","glutes","hamstrings","lower back"],["Begin in a power rack with a box at the appropriate height behind you. Typically, you would aim for a box height that brings you to a parallel squat, but you can train higher or lower if desired.","To set up the chains, begin by looping the leader chain over the sleeves of the bar. The heavy chain should be attached using a snap hook. Adjust the length of the lead chain so that a few links are still on the floor at the top of the movement.","Begin by stepping under the bar and placing it across the back of the shoulders. Squeeze your shoulder blades together and rotate your elbows forward, attempting to bend the bar across your shoulders. Remove the bar from the rack, creating a tight arch in your lower back, and step back into position. Place your feet wider for more emphasis on the back, glutes, adductors, and hamstrings, or closer together for more quad development. Keep your head facing forward.","With your back, shoulders, and core tight, push your knees and butt out and you begin your descent. Sit back with your hips until you are seated on the box. Ideally, your shins should be perpendicular to the ground. Pause when you reach the box, and relax the hip flexors. Never bounce off of a box.","Keeping the weight on your heels and pushing your feet and knees out, drive upward off of the box as you lead the movement with your head. Continue upward, maintaining tightness head to toe."]],["Brachialis-SMR","Brachialis-SMR/0.jpg","biceps",[],["Lie on your side, with your upper arm against the foam roller. The upper arm should be more or less aligned with your body, with the outside of the bicep pressed against the foam roller.","Raise your hips off of the floor, supporting your weight on your arm and on your feet. Hold for 10-30 seconds, and then switch sides."]],["Bradford/Rocky Presses","Bradford_Rocky_Presses/0.jpg","delts",["triceps"],["Sit on a Military Press Bench with a bar at shoulder level with a pronated grip (palms facing forward). Tip: Your grip should be wider than shoulder width and it should create a 90-degree angle between the forearm and the upper arm as the barbell goes down. This is your starting position.","Once you pick up the barbell with the correct grip, lift the bar up over your head by locking your arms.","Now lower the bar down to the back of the head slowly as you inhale.","Lift the bar back up to the starting position as you exhale.","Lower the bar down to the starting position slowly as you inhale. This is one repetition.","Alternate in this manner until you complete the recommended amount of repetitions."]],["Butt-Ups","Butt-Ups/0.jpg","abs",[],["Begin a pushup position but with your elbows on the ground and resting on your forearms. Your arms should be bent at a 90 degree angle.","Arch your back slightly out rather than keeping your back completely straight.","Raise your glutes toward the ceiling, squeezing your abs tightly to close the distance between your ribcage and hips. The end result will be that you'll end up in a high bridge position. Exhale as you perform this portion of the movement.","Lower back down slowly to your starting position as you breathe in. Tip: Don't let your back sag downwards.","Repeat for the recommended amount of repetitions."]],["Butt Lift (Bridge)","Butt_Lift_Bridge/0.jpg","glutes",["hamstrings"],["Lie flat on the floor on your back with the hands by your side and your knees bent. Your feet should be placed around shoulder width. This will be your starting position.","Pushing mainly with your heels, lift your hips off the floor while keeping your back straight. Breathe out as you perform this part of the motion and hold at the top for a second.","Slowly go back to the starting position as you breathe in."]],["Butterfly","Butterfly/0.jpg","pectorals",[],["Sit on the machine with your back flat on the pad.","Take hold of the handles. Tip: Your upper arms should be positioned parallel to the floor; adjust the machine accordingly. This will be your starting position.","Push the handles together slowly as you squeeze your chest in the middle. Breathe out during this part of the motion and hold the contraction for a second.","Return back to the starting position slowly as you inhale until your chest muscles are fully stretched.","Repeat for the recommended amount of repetitions."]],["Cable Chest Press","Cable_Chest_Press/0.jpg","pectorals",["delts","triceps"],["Adjust the weight to an appropriate amount and be seated, grasping the handles. Your upper arms should be about 45 degrees to the body, with your head and chest up. The elbows should be bent to about 90 degrees. This will be your starting position.","Begin by extending through the elbow, pressing the handles together straight in front of you. Keep your shoulder blades retracted as you execute the movement.","After pausing at full extension, return to th starting position, keeping tension on the cables.","You can also execute this movement with your back off the pad, at an incline or decline, or alternate hands."]],["Cable Crossover","Cable_Crossover/0.jpg","pectorals",["delts"],["To get yourself into the starting position, place the pulleys on a high position (above your head), select the resistance to be used and hold the pulleys in each hand.","Step forward in front of an imaginary straight line between both pulleys while pulling your arms together in front of you. Your torso should have a small forward bend from the waist. This will be your starting position.","With a slight bend on your elbows in order to prevent stress at the biceps tendon, extend your arms to the side (straight out at both sides) in a wide arc until you feel a stretch on your chest. Breathe in as you perform this portion of the movement. Tip: Keep in mind that throughout the movement, the arms and torso should remain stationary; the movement should only occur at the shoulder joint.","Return your arms back to the starting position as you breathe out. Make sure to use the same arc of motion used to lower the weights.","Hold for a second at the starting position and repeat the movement for the prescribed amount of repetitions."]],["Cable Crunch","Cable_Crunch/0.jpg","abs",[],["Kneel below a high pulley that contains a rope attachment.","Grasp cable rope attachment and lower the rope until your hands are placed next to your face.","Flex your hips slightly and allow the weight to hyperextend the lower back. This will be your starting position.","With the hips stationary, flex the waist as you contract the abs so that the elbows travel towards the middle of the thighs. Exhale as you perform this portion of the movement and hold the contraction for a second.","Slowly return to the starting position as you inhale. Tip: Make sure that you keep constant tension on the abs throughout the movement. Also, do not choose a weight so heavy that the lower back handles the brunt of the work.","Repeat for the recommended amount of repetitions."]],["Cable Deadlifts","Cable_Deadlifts/0.jpg","quadriceps",["forearms","glutes","hamstrings","lower back"],["Move the cables to the bottom of the towers and select an appropriate weight. Stand directly in between the uprights.","To begin, squat down be flexing your hips and knees until you can reach the handles.","After grasping them, begin your ascent. Driving through your heels extend your hips and knees keeping your hands hanging at your side. Keep your head and chest up throughout the movement.","After reaching a full standing position, Return to the starting position and repeat."]],["Cable Hammer Curls - Rope Attachment","Cable_Hammer_Curls_-_Rope_Attachment/0.jpg","biceps",[],["Attach a rope attachment to a low pulley and stand facing the machine about 12 inches away from it.","Grasp the rope with a neutral (palms-in) grip and stand straight up keeping the natural arch of the back and your torso stationary.","Put your elbows in by your side and keep them there stationary during the entire movement. Tip: Only the forearms should move; not your upper arms. This will be your starting position.","Using your biceps, pull your arms up as you exhale until your biceps touch your forearms. Tip: Remember to keep the elbows in and your upper arms stationary.","After a 1 second contraction where you squeeze your biceps, slowly start to bring the weight back to the original position.","Repeat for the recommended amount of repetitions."]],["Cable Hip Adduction","Cable_Hip_Adduction/0.jpg","quadriceps",[],["Stand in front of a low pulley facing forward with one leg next to the pulley and the other one away.","Attach the ankle cuff to the cable and also to the ankle of the leg that is next to the pulley.","Now step out and away from the stack with a wide stance and grasp the bar of the pulley system.","Stand on the foot that does not have the ankle cuff (the far foot) and allow the leg with the cuff to be pulled towards the low pulley. This will be your starting position.","Now perform the movement by moving the leg with the ankle cuff in front of the far leg by using the inner thighs to abduct the hip. Breathe out during this portion of the movement.","Slowly return to the starting position as you breathe in.","Repeat for the recommended amount of repetitions and then repeat the same movement with the opposite leg."]],["Cable Incline Pushdown","Cable_Incline_Pushdown/0.jpg","lats",[],["Lie on incline an bench facing away from a high pulley machine that has a straight bar attachment on it.","Grasp the straight bar attachment overhead with a pronated (overhand; palms down) shoulder width grip and extend your arms in front of you. The bar should be around 2 inches away from your upper thighs. This will be your starting position.","Keeping the upper arms stationary, lift your arms back in a semi circle until the bar is straight over your head. Breathe in during this portion of the movement.","Slowly go back to the starting position using your lats and hold the contraction once you reach the starting position. Breathe out during the execution of this movement.","Repeat for the recommended amount of repetitions."]],["Cable Incline Triceps Extension","Cable_Incline_Triceps_Extension/0.jpg","triceps",[],["Lie on incline an bench facing away from a high pulley machine that has a straight bar attachment on it.","Grasp the straight bar attachment overhead with a pronated (overhand; palms down) narrow grip (less than shoulder width) and keep your elbows tucked in to your sides. Your upper arms should create around a 25 degree angle when measured from the floor.","Keeping the upper arms stationary, extend the arms as you flex the triceps. Breathe out during this portion of the movement and hold the contraction for a second.","Slowly go back to the starting position.","Repeat for the recommended amount of repetitions."]],["Cable Internal Rotation","Cable_Internal_Rotation/0.jpg","delts",[],["Sit next to a low pulley sideways (with legs stretched in front of you or crossed) and grasp the single hand cable attachment with the arm nearest to the cable. Tip: If you can adjust the pulley's height, you can use a flat bench to sit on instead.","Position the elbow against your side with the elbow bent at 90° and the arm pointing towards the pulley. This will be your starting position.","Pull the single hand cable attachment toward your body by internally rotating your shoulder until your forearm is across your abs. You will be creating an imaginary semi-circle. Tip: The forearm should be perpendicular to your torso at all times.","Slowly go back to the initial position.","Repeat for the recommended amount of repetitions and then repeat the movement with the next arm."]],["Cable Iron Cross","Cable_Iron_Cross/0.jpg","pectorals",[],["Begin by moving the pulleys to the high position, select the resistance to be used, and take a handle in each hand.","Stand directly between both pulleys with your arms extended out to your sides. Your head and chest should be up while your arms form a \"T\". This will be your starting position.","Keeping the elbows extended, pull your arms straight to your sides.","Return your arms back to the starting position after a pause at the peak contraction.","Continue the movement for the prescribed number of repetitions."]],["Cable Judo Flip","Cable_Judo_Flip/0.jpg","abs",[],["Connect a rope attachment to a tower, and move the cable to the lowest pulley position. Stand with your side to the cable with a wide stance, and grab the rope with both hands.","Twist your body away from the pulley as you bring the rope over your shoulder like you're performing a judo flip.","Shift your weight between your feet as you twist and crunch forward, pulling the cable downward.","Return to the starting position and repeat until failure.","Then, reposition and repeat the same series of movements on the opposite side."]],["Cable Lying Triceps Extension","Cable_Lying_Triceps_Extension/0.jpg","triceps",[],["Lie on a flat bench and grasp the straight bar attachment of a low pulley with a narrow overhand grip. Tip: The easiest way to do this is to have someone hand you the bar as you lay down.","With your arms extended, position the bar over your torso. Your arms and your torso should create a 90-degree angle. This will be your starting position.","Lower the bar by bending at the elbow while keeping the upper arms stationary and elbows in. Go down until the bar lightly touches your forehead. Breathe in as you perform this portion of the movement.","Flex the triceps as you lift the bar back to its starting position. Exhale as you perform this portion of the movement.","Hold for a second at the contracted position and repeat for the recommended amount of repetitions."]],["Cable One Arm Tricep Extension","Cable_One_Arm_Tricep_Extension/0.jpg","triceps",[],["With your right hand, grasp a single handle attached to the high-cable pulley using a supinated (underhand; palms facing up) grip. You should be standing directly in front of the weight stack.","Now pull the handle down so that your upper arm and elbow are locked in to the side of your body. Your upper arm and forearm should form an acute angle (less than 90-degrees). You can keep the other arm by the waist and you can have one leg in front of you and the other one back for better balance. This will be your starting position.","As you contract the triceps, move the single handle attachment down to your side until your arm is straight. Breathe out as you perform this movement. Tip: Only the forearms should move. Your upper arms should remain stationary at all times.","Squeeze the triceps and hold for a second in this contracted position.","Slowly return the handle to the starting position.","Repeat for the recommended amount of repetitions and then perform the same movement with the other arm."]],["Cable Preacher Curl","Cable_Preacher_Curl/0.jpg","biceps",["forearms"],["Place a preacher bench about 2 feet in front of a pulley machine.","Attach a straight bar to the low pulley.","Sit at the preacher bench with your elbow and upper arms firmly on top of the bench pad and have someone hand you the bar from the low pulley.","Grab the bar and fully extend your arms on top of the preacher bench pad. This will be your starting position.","Now start pilling the weight up towards your shoulders and squeeze the biceps hard at the top of the movement. Exhale as you perform this motion. Also, hold for a second at the top.","Now slowly lower the weight to the starting position.","Repeat for the recommended amount of repetitions."]],["Cable Rear Delt Fly","Cable_Rear_Delt_Fly/0.jpg","delts",[],["Adjust the pulleys to the appropriate height and adjust the weight. The pulleys should be above your head.","Grab the left pulley with your right hand and the right pulley with your left hand, crossing them in front of you. This will be your starting position.","Initiate the movement by moving your arms back and outward, keeping your arms straight as you execute the movement.","Pause at the end of the motion before returning the handles to the start position."]],["Cable Reverse Crunch","Cable_Reverse_Crunch/0.jpg","abs",[],["Connect an ankle strap attachment to a low pulley cable and position a mat on the floor in front of it.","Sit down with your feet toward the pulley and attach the cable to your ankles.","Lie down, elevate your legs and bend your knees at a 90-degree angle. Your legs and the cable should be aligned. If not, adjust the pulley up or down until they are.","With your hands behind your head, bring your knees inward to your torso and elevate your hips off the floor.","Pause for a moment and in a slow and controlled manner drop your hips and bring your legs back to the starting 90-degree angle. You should still have tension on your abs in the resting position.","Repeat the same movement to failure."]],["Cable Rope Overhead Triceps Extension","Cable_Rope_Overhead_Triceps_Extension/0.jpg","triceps",[],["Attach a rope to the bottom pulley of the pulley machine.","Grasping the rope with both hands, extend your arms with your hands directly above your head using a neutral grip (palms facing each other). Your elbows should be in close to your head and the arms should be perpendicular to the floor with the knuckles aimed at the ceiling. This will be your starting position.","Slowly lower the rope behind your head as you hold the upper arms stationary. Inhale as you perform this movement and pause when your triceps are fully stretched.","Return to the starting position by flexing your triceps as you breathe out.","Repeat for the recommended amount of repetitions."]],["Cable Rope Rear-Delt Rows","Cable_Rope_Rear-Delt_Rows/0.jpg","delts",["biceps","upper back"],["Sit in the same position on a low pulley row station as you would if you were doing seated cable rows for the back.","Attach a rope to the pulley and grasp it with an overhand grip. Your arms should be extended and parallel to the floor with the elbows flared out.","Keep your lower back upright and slide your hips back so that your knees are slightly bent. This will be your starting position.","Pull the cable attachment towards your upper chest, just below the neck, as you keep your elbows up and out to the sides. Continue this motion as you exhale until the elbows travel slightly behind the back. Tip: Keep your upper arms horizontal, perpendicular to the torso and parallel to the floor throughout the motion.","Go back to the initial position where the arms are extended and the shoulders are stretched forward. Inhale as you perform this portion of the movement.","Repeat for the recommended amount of repetitions."]],["Cable Russian Twists","Cable_Russian_Twists/0.jpg","abs",[],["Connect a standard handle attachment, and position the cable to a middle pulley position.","Lie on a stability ball perpendicular to the cable and grab the handle with one hand. You should be approximately arm's length away from the pulley, with the tension of the weight on the cable.","Grab the handle with both hands and fully extend your arms above your chest. You hands should be directly in-line with the pulley. If not, adjust the pulley up or down until they are.","Keep your hips elevated and abs engaged. Rotate your torso away from the pulley for a full-quarter rotation. Your body should be flat from head to knees.","Pause for a moment and in a slow and controlled manner reset to the starting position. You should still have side tension on the cable in the resting position.","Repeat the same movement to failure.","Then, reposition and repeat the same series of movements on the opposite side."]],["Cable Seated Crunch","Cable_Seated_Crunch/0.jpg","abs",[],["Seat on a flat bench with your back facing a high pulley.","Grasp the cable rope attachment with both hands (with the palms of the hands facing each other) and place your hands securely over both shoulders. Tip: Allow the weight to hyperextend the lower back slightly. This will be your starting position.","With the hips stationary, flex the waist so the elbows travel toward the hips. Breathe out as you perform this step.","As you inhale, go back to the initial position slowly.","Repeat for the recommended amount of repetitions."]],["Cable Seated Lateral Raise","Cable_Seated_Lateral_Raise/0.jpg","delts",["upper back","traps"],["Stand in the middle of two low pulleys that are opposite to each other and place a flat bench right behind you (in perpendicular fashion to you; the narrow edge of the bench should be the one behind you). Select the weight to be used on each pulley.","Now sit at the edge of the flat bench behind you with your feet placed in front of your knees.","Bend forward while keeping your back flat and rest your torso on the thighs.","Have someone give you the single handles attached to the pulleys. Grasp the left pulley with the right hand and the right pulley with the left after you select your weight. The pulleys should run under your knees and your arms will be extended with palms facing each other and a slight bend at the elbows. This will be the starting position.","While keeping the arms stationary, raise the upper arms to the sides until they are parallel to the floor and at shoulder height. Exhale during the execution of this movement and hold the contraction for a second.","Slowly lower your arms to the starting position as you inhale.","Repeat for the recommended amount of repetitions. Tip: Maintain upper arms perpendicular to torso and a fixed elbow position (10 degree to 30 degree angle) throughout exercise."]],["Cable Shoulder Press","Cable_Shoulder_Press/0.jpg","delts",["triceps"],["Move the cables to the bottom of the towers and select an appropriate weight.","Stand directly in between the uprights. Grasp the cables and hold them at shoulder height, palms facing forward. This will be your starting position.","Keeping your head and chest up, extend through the elbow to press the handles directly over head.","After pausing at the top, return to the starting position and repeat."]],["Cable Shrugs","Cable_Shrugs/0.jpg","traps",[],["Grasp a cable bar attachment that is attached to a low pulley with a shoulder width or slightly wider overhand (palms facing down) grip.","Stand erect close to the pulley with your arms extended in front of you holding the bar. This will be your starting position.","Lift the bar by elevating the shoulders as high as possible as you exhale. Hold the contraction at the top for a second. Tip: The arms should remain extended at all times. Refrain from using the biceps to help lift the bar. Only the shoulders should be moving up and down.","Lower the bar back to the original position.","Repeat for the recommended amount of repetitions."]],["Cable Wrist Curl","Cable_Wrist_Curl/0.jpg","forearms",[],["Start out by placing a flat bench in front of a low pulley cable that has a straight bar attachment.","Use your arms to grab the cable bar with a narrow to shoulder width supinated grip (palms up) and bring them up so that your forearms are resting against the top of your thighs. Your wrists should be hanging just beyond your knees.","Start out by curling your wrist upwards and exhaling. Keep the contraction for a second.","Slowly lower your wrists back down to the starting position while inhaling.","Your forearms should be stationary as your wrist is the only movement needed to perform this exercise.","Repeat for the recommended amount of repetitions."]],["Calf-Machine Shoulder Shrug","Calf-Machine_Shoulder_Shrug/0.jpg","traps",[],["Position yourself on the calf machine so that the shoulder pads are above your shoulders. Your torso should be straight with the arms extended normally by your side. This will be your starting position.","Raise your shoulders up towards your ears as you exhale and hold the contraction for a full second.","Slowly return to the starting position as you inhale.","Repeat for the recommended amount of repetitions."]],["Calf Press","Calf_Press/0.jpg","calves",[],["Adjust the seat so that your legs are only slightly bent in the start position. The balls of your feet should be firmly on the platform.","Select an appropriate weight, and grasp the handles. This will be your starting position.","Straighten the legs by extending the knees, just barely lifting the weight from the stack. Your ankle should be fully flexed, toes pointing up. Execute the movement by pressing downward through the balls of your feet as far as possible.","After a brief pause, reverse the motion and repeat."]],["Calf Press On The Leg Press Machine","Calf_Press_On_The_Leg_Press_Machine/0.jpg","calves",[],["Using a leg press machine, sit down on the machine and place your legs on the platform directly in front of you at a medium (shoulder width) foot stance.","Lower the safety bars holding the weighted platform in place and press the platform all the way up until your legs are fully extended in front of you without locking your knees. (Note: In some leg press units you can leave the safety bars on for increased safety. If your leg press unit allows for this, then this is the preferred method of performing the exercise.) Your torso and the legs should make perfect 90-degree angle. Now carefully place your toes and balls of your feet on the lower portion of the platform with the heels extending off. Toes should be facing forward, outwards or inwards as described at the beginning of the chapter. This will be your starting position.","Press on the platform by raising your heels as you breathe out by extending your ankles as high as possible and flexing your calf. Ensure that the knee is kept stationary at all times. There should be no bending at any time. Hold the contracted position by a second before you start to go back down.","Go back slowly to the starting position as you breathe in by lowering your heels as you bend the ankles until calves are stretched.","Repeat for the recommended amount of repetitions."]],["Calf Raise On A Dumbbell","Calf_Raise_On_A_Dumbbell/0.jpg","calves",[],["Hang on to a sturdy object for balance and stand on a dumbbell handle, preferably one with round plates so that it rolls as in this manner you have to work harder to stabilize yourself; thus increasing the effectiveness of the exercise.","Now roll your foot slightly forward so that you can get a nice stretch of the calf. This will be your starting position.","Lift the calf as you roll your foot over the top of the handle so that you get a full extension. Exhale during the execution of this movement. Contract the calf hard at the top and hold for a second. Tip: As you come up, roll the dumbbell slightly backward.","Now inhale as you roll the dumbbell slightly forward as you come down to get a better stretch.","Repeat for the recommended amount of repetitions."]],["Calf Raises - With Bands","Calf_Raises_-_With_Bands/0.jpg","calves",[],["Grab an exercise band and stand on it with your toes making sure that the length of the band between the foot and the arms is the same for both sides.","While holding the handles of the band, raise the arms to the side of your head as if you were getting ready to perform a shoulder press. The palms should be facing forward with the elbows bent and to the sides. This movement will create tension on the band. This will be your starting position.","Keeping the hands by your shoulder, stand up on your toes as you exhale and contract the calves hard at the top of the movement.","After a one second contraction, slowly go back down to the starting position.","Repeat for the recommended amount of repetitions."]],["Calf Stretch Elbows Against Wall","Calf_Stretch_Elbows_Against_Wall/0.jpg","calves",[],["Stand facing a wall from a couple feet away.","Lean against the wall, placing your weight on your forearms.","Attempt to keep your heels on the ground. Hold for 10-20 seconds. You may move further or closer the wall, making it more or less difficult, respectively."]],["Calf Stretch Hands Against Wall","Calf_Stretch_Hands_Against_Wall/0.jpg","calves",[],["Stand facing a wall from several feet away. Stagger your stance, placing one foot forward.","Lean forward and rest your hands on the wall, keeping your heel, hip and head in a straight line.","Attempt to keep your heel on the ground. Hold for 10-20 seconds and then switch sides."]],["Calves-SMR","Calves-SMR/0.jpg","calves",[],["Begin seated on the floor. Place a foam roller underneath your lower leg. Your other leg can either be crossed over the opposite or be placed on the floor, supporting some of your weight. This will be your starting position.","Place your hands to your side or just behind you, and press down to raise your hips off of the floor, placing much of your weight against your calf muscle. Roll from below the knee to above the ankle, pausing at points of tension for 10-30 seconds. Repeat for the other leg."]],["Car Deadlift","Car_Deadlift/0.jpg","quadriceps",["forearms","glutes","hamstrings","lower back","traps"],["This event apparatus typically has neutral grip handles, however some have a straight bar that you can approach like a normal deadlift. The apparatus can be loaded with a vehicle or other heavy objects such as tractor tires or kegs.","Center yourself between the handles if you are a strong squatter, or back a couple inches if you are a strong deadlifter. You feet should be about hip width apart. Bend at the hip to grip the handles. With your feet and your grip set, take a big breath and then lower your hips and flex the knees.","Look forward with your head, keep your chest up and your back arched, and begin driving through the heels to move the weight upward. As the weight comes up, pull your shoulder blades together as you drive your hips forward.","Lower the weight by bending at the hips and guiding it to the floor."]],["Car Drivers","Car_Drivers/0.jpg","delts",["forearms"],["While standing upright, hold a barbell plate in both hands at the 3 and 9 o'clock positions. Your palms should be facing each other and your arms should be extended straight out in front of you. This will be your starting position.","Initiate the movement by rotating the plate as far to one side as possible. Use the same type of movement you would use to turn a steering wheel to one side.","Reverse the motion, turning it all the way to the opposite side.","Repeat for the recommended amount of repetitions."]],["Carioca Quick Step","Carioca_Quick_Step/0.jpg","adductors",["abs","abductors","calves","glutes","hamstrings","quadriceps"],["Begin with your feet a few inches apart and your left arm up in a relaxed, athletic position.","With your right foot, quick step behind and pull the knee up.","Fire your arms back up when you pull the right knee, being sure that your knee goes straight up and down. Avoid turning your feet as you move and continue to look forward as you move to the side."]],["Cat Stretch","Cat_Stretch/0.jpg","lower back",["upper back","traps"],["Position yourself on the floor on your hands and knees.","Pull your belly in and round your spine, lower back, shoulders, and neck, letting your head drop.","Hold for 15 seconds."]],["Catch and Overhead Throw","Catch_and_Overhead_Throw/0.jpg","lats",["abs","pectorals","delts"],["Begin standing while facing a wall or a partner.","Using both hands, position the ball behind your head, stretching as much as possible, and forcefully throw the ball forward.","Ensure that you follow your throw through, being prepared to receive your rebound from your throw. If you are throwing against the wall, make sure that you stand close enough to the wall to receive the rebound, and aim a little higher than you would with a partner."]],["Chain Handle Extension","Chain_Handle_Extension/0.jpg","triceps",[],["You will need two cable handle attachments and a flat bench, as well as chains, for this exercise. Clip the middle of the chains to the handles, and position yourself on the flat bench. Your elbows should be pointing straight up.","Begin by extending through the elbow, keeping your upper arm still, with your wrists pronated.","Pause at the lockout, and reverse the motion to return to the starting position."]],["Chain Press","Chain_Press/0.jpg","pectorals",["delts","triceps"],["Begin by connecting the chains to the cable handle attachments. Position yourself on the flat bench in the same position as for a dumbbell press. Your wrists should be pronated and arms perpendicular to the floor. This will be your starting position.","Lower the chains by flexing the elbows, unloading some of the chain onto the floor.","Continue until your elbow forms a 90 degree angle, and then reverse the motion by extending through the elbow to lockout."]],["Chair Leg Extended Stretch","Chair_Leg_Extended_Stretch/0.jpg","hamstrings",["adductors"],["Sit upright in a chair and grip the seat on the sides.","Raise one leg, extending the knee, flexing the ankle as you do so.","Slowly move that leg outward as far as you can, and then back to the center and down.","Repeat for your other leg."]],["Chair Lower Back Stretch","Chair_Lower_Back_Stretch/0.jpg","lats",["lower back"],["Sit upright on a chair.","Bend to one side with your arm over your head. You can hold onto the chair with your free hand.","Hold for 10 seconds, and repeat for your other side."]],["Chair Squat","Chair_Squat/0.jpg","quadriceps",["calves","glutes","hamstrings"],["To begin, first set the bar to a position that best matches your height. Once the bar is loaded, step under it and position it across the back of your shoulders.","Take the bar with your hands facing forward, unlock it and lift it off the rack by extending your legs.","Move your feet forward about 18 inches in front of the bar. Position your legs using a shoulder width stance with the toes slightly pointed out. Look forward at all times and maintain a neutral or slightly arched spine. This will be your starting position.","Slowly lower the bar by bending the knees as you maintain a straight posture with the head up. Continue down until the angle between the upper and lower leg breaks 90 degrees.","Begin to raise the bar as you exhale by pushing the floor with the heels of your feet, extending the knees and returning to the starting position.","Repeat for the recommended amount of repetitions."]],["Chair Upper Body Stretch","Chair_Upper_Body_Stretch/0.jpg","delts",["biceps","pectorals"],["Sit on the edge of a chair, gripping the back of it.","Straighten your arms, keeping your back straight, and pull your upper body forward so you feel a stretch. Hold for 20-30 seconds."]],["Chest And Front Of Shoulder Stretch","Chest_And_Front_Of_Shoulder_Stretch/0.jpg","pectorals",["delts"],["Start off by standing with your legs together, holding a bodybar or a broomstick.","Take a slightly wider than shoulder width grip on the pole and hold it in front of you with your palms facing down.","Carefully lift the pole up and behind your head."]],["Chest Push from 3 point stance","Chest_Push_from_3_point_stance/0.jpg","pectorals",["abs","delts","triceps"],["Begin in a three point stance, squatted down with your back flat and one hand on the ground. Place the medicine ball directly in front of you.","To begin, take your first step as you pull the ball to your chest, positioning both hands to prepare for the throw.","As you execute the second step, explosively release the ball forward as hard as possible."]],["Chest Push (multiple response)","Chest_Push_multiple_response/0.jpg","pectorals",["abs","delts","triceps"],["Begin in a kneeling position facing a wall or utilize a partner. Hold the ball with both hands tight into the chest.","Execute the pass by exploding forward and outward with the hips while pushing the ball as hard as possible.","Follow through by falling forward, catching yourself with your hands.","Immediately return to an upright position. Repeat for the desired number of repetitions."]],["Chest Push (single response)","Chest_Push_single_response/0.jpg","pectorals",["abs","delts","triceps"],["Begin in a kneeling position holding the medicine ball with both hands tightly into the chest.","Execute the pass by exploding forward and outward with the hips while pushing the ball as far as possible.","Follow through by falling forward, catching yourself with your hands."]],["Chest Push with Run Release","Chest_Push_with_Run_Release/0.jpg","pectorals",["abs","delts","triceps"],["Begin in an athletic stance with the knees bent, hips back, and back flat. Hold the medicine ball near your legs. This will be your starting position.","While taking your first step draw the medicine ball into your chest.","As you take the second step, explosively push the ball forward, immediately sprinting for 10 yards after the release. If you are really fast, you can catch your own pass!"]],["Chest Stretch on Stability Ball","Chest_Stretch_on_Stability_Ball/0.jpg","pectorals",[],["Get on your hands and knees next to an exercise ball.","Place your elbows on top of the ball, keeping your arm out to your side. This will be your starting position.","Lower your torso towards the floor, keeping your elbow on top of the ball. Hold the stretch for 20-30 seconds, and repeat with the other arm."]],["Child's Pose","Childs_Pose/0.jpg","lower back",["glutes","upper back"],["Get on your hands and knees, walk your hands in front of you.","Lower your buttocks down to sit on your heels. Let your arms drag along the floor as you sit back to stretch your entire spine.","Once you settle onto your heels, bring your hands next to your feet and relax. \"breathe\" into your back. Rest your forehead on the floor. Avoid this position if you have knee problems."]],["Chin-Up","Chin-Up/0.jpg","lats",["biceps","forearms","upper back"],["Grab the pull-up bar with the palms facing your torso and a grip closer than the shoulder width.","As you have both arms extended in front of you holding the bar at the chosen grip width, keep your torso as straight as possible while creating a curvature on your lower back and sticking your chest out. This is your starting position. Tip: Keeping the torso as straight as possible maximizes biceps stimulation while minimizing back involvement.","As you breathe out, pull your torso up until your head is around the level of the pull-up bar. Concentrate on using the biceps muscles in order to perform the movement. Keep the elbows close to your body. Tip: The upper torso should remain stationary as it moves through space and only the arms should move. The forearms should do no other work other than hold the bar.","After a second of squeezing the biceps in the contracted position, slowly lower your torso back to the starting position; when your arms are fully extended. Breathe in as you perform this portion of the movement.","Repeat this motion for the prescribed amount of repetitions."]],["Chin To Chest Stretch","Chin_To_Chest_Stretch/0.jpg","traps",["traps"],["Get into a seated position on the floor.","Place both hands at the rear of your head, fingers interlocked, thumbs pointing down and elbows pointing straight ahead. Slowly pull your head down to your chest. Hold for 20-30 seconds."]],["Circus Bell","Circus_Bell/0.jpg","delts",["forearms","glutes","hamstrings","lower back","traps","triceps"],["The circus bell is an oversized dumbbell with a thick handle. Begin with the dumbbell between your feet, and grip the handle with both hands.","Clean the dumbbell by extending through your hips and knees to deliver the implement to the desired shoulder, letting go with the extra hand.","Ensure that you get one of the dumbbell heads behind the shoulder to keep from being thrown off balance. To raise it overhead, dip by flexing the knees, and the drive upwards as you extend the dumbbell overhead, leaning slightly away from it as you do so.","Carefully guide the bell back to the floor, keeping it under control as much as possible. It is best to perform this event on a thick rubber mat to prevent damage to the floor."]],["Clean","Clean/0.jpg","hamstrings",["calves","forearms","glutes","lower back","quadriceps","delts","traps"],["With a barbell on the floor close to the shins, take an overhand (or hook) grip just outside the legs. Lower your hips with the weight focused on the heels, back straight, head facing forward, chest up, with your shoulders just in front of the bar. This will be your starting position.","","Begin the first pull by driving through the heels, extending your knees. Your back angle should stay the same, and your arms should remain straight. Move the weight with control as you continue to above the knees.","Next comes the second pull, the main source of acceleration for the clean. As the bar approaches the mid-thigh position, begin extending through the hips. In a jumping motion, accelerate by extending the hips, knees, and ankles, using speed to move the bar upward. There should be no need to actively pull through the arms to accelerate the weight; at the end of the second pull, the body should be fully extended, leaning slightly back, with the arms still extended.","As full extension is achieved, transition into the third pull by aggressively shrugging and flexing the arms with the elbows up and out. At peak extension, aggressively pull yourself down, rotating your elbows under the bar as you do so. Receive the bar in a front squat position, the depth of which is dependent upon the height of the bar at the end of the third pull. The bar should be racked onto the protracted shoulders, lightly touching the throat with the hands relaxed. Continue to descend to the bottom squat position, which will help in the recovery.","Immediately recover by driving through the heels, keeping the torso upright and elbows up. Continue until you have risen to a standing position."]],["Clean Deadlift","Clean_Deadlift/0.jpg","hamstrings",["forearms","glutes","lower back","upper back","quadriceps","traps"],["Begin standing with a barbell close to your shins. Your feet should be directly under your hips with your feet turned out slightly. Grip the bar with a double overhand grip or hook grip, about shoulder width apart. Squat down to the bar. Your spine should be in full extension, with a back angle that places your shoulders in front of the bar and your back as vertical as possible.","Begin by driving through the floor through the front of your heels. As the bar travels upward, maintain a constant back angle. Flare your knees out to the side to help keep them out of the bar's path.","After the bar crosses the knees, complete the lift by driving the hips into the bar until your hips and knees are extended."]],["Clean Pull","Clean_Pull/0.jpg","quadriceps",["forearms","glutes","hamstrings","lower back","traps"],["With a barbell on the floor close to the shins, take an overhand or hook grip just outside the legs. Lower your hips with the weight focused on the heels, back straight, head facing forward, chest up, with your shoulders just in front of the bar. This will be your starting position.","Begin the first pull by driving through the heels, extending your knees. Your back angle should stay the same, and your arms should remain straight and elbows out. Move the weight with control as you continue to above the knees.","Next comes the second pull, the main source of acceleration for the clean. As the bar approaches the mid-thigh position, begin extending through the hips. In a jumping motion, accelerate by extending the hips, knees, and ankles, using speed to move the bar upward. There should be no need to actively pull through the arms to accelerate the weight; at the end of the second pull, the body should be fully extended, leaning slightly back, with the arms still extended. Full extension should be violent and abrupt, and ensure that you do not prolong the extension for longer than necessary."]],["Clean Shrug","Clean_Shrug/0.jpg","traps",["forearms","delts"],["Begin with a shoulder width, double overhand or hook grip, with the bar hanging at the mid thigh position. Your back should be straight and inclined slightly forward.","Shrug your shoulders towards your ears. While this exercise can usually by loaded with heavier weight than a clean, avoid overloading to the point that the execution slows down."]],["Clean and Jerk","Clean_and_Jerk/0.jpg","delts",["abs","glutes","hamstrings","lower back","quadriceps","traps","triceps"],["With a barbell on the floor close to the shins, take an overhand or hook grip just outside the legs. Lower your hips with the weight focused on the heels, back straight, head facing forward, chest up, with your shoulders just in front of the bar. This will be your starting position.","Begin the first pull by driving through the heels, extending your knees. Your back angle should stay the same, and your arms should remain straight. Move the weight with control as you continue to above the knees.","Next comes the second pull, the main source of acceleration for the clean. As the bar approaches the mid-thigh position, begin extending through the hips. In a jumping motion, accelerate by extending the hips, knees, and ankles, using speed to move the bar upward. There should be no need to actively pull through the arms to accelerate the weight; at the end of the second pull, the body should be fully extended, leaning slightly back, with the arms still extended.","As full extension is achieved, transition into the third pull by aggressively shrugging and flexing the arms with the elbows up and out. At peak extension, aggressively pull yourself down, rotating your elbows under the bar as you do so. Receive the bar in a front squat position, the depth of which is dependent upon the height of the bar at the end of the third pull. The bar should be racked onto the protracted shoulders, lightly touching the throat with the hands relaxed. Continue to descend to the bottom squat position, which will help in the recovery.","Immediately recover by driving through the heels, keeping the torso upright and elbows up. Continue until you have risen to a standing position.","The second phase is the jerk, which raises the weight overhead. Standing with the weight racked on the front of the shoulders, begin with the dip. With your feet directly under your hips, flex the knees without moving the hips backward. Go down only slightly, and reverse direction as powerfully as possible.","Drive through the heels create as much speed and force as possible, and be sure to move your head out of the way as the bar leaves the shoulders.","At this moment as the feet leave the floor, the feet must be placed into the receiving position as quickly as possible. In the brief moment the feet are not actively driving against the platform, the athletes effort to push the bar up will drive them down. The feet should be split, with one foot forward, and one foot back. Receive the bar with the arms locked out overhead. Return to a standing position."]],["Clean and Press","Clean_and_Press/0.jpg","delts",["abs","calves","glutes","hamstrings","lower back","upper back","quadriceps","delts","traps","triceps"],["Assume a shoulder-width stance, with knees inside the arms. Now while keeping the back flat, bend at the knees and hips so that you can grab the bar with the arms fully extended and a pronated grip that is slightly wider than shoulder width. Point the elbows out to sides. The bar should be close to the shins. Position the shoulders over or slightly ahead of the bar. Establish a flat back posture. This will be your starting position.","Begin to pull the bar by extending the knees. Move your hips forward and raise the shoulders at the same rate while keeping the angle of the back constant; continue to lift the bar straight up while keeping it close to your body.","As the bar passes the knee, extend at the ankles, knees, and hips forcefully, similar to a jumping motion. As you do so, continue to guide the bar with your hands, shrugging your shoulders and using the momentum from your movement to pull the bar as high as possible. The bar should travel close to your body, and you should keep your elbows out.","At maximum elevation, your feet should clear the floor and you should start to pull yourself under the bar. The mechanics of this could change slightly, depending on the weight used. You should descend into a squatting position as you pull yourself under the bar.","As the bar hits terminal height, rotate your elbows around and under the bar. Rack the bar across the front of the shoulders while keeping the torso erect and flexing the hips and knees to absorb the weight of the bar.","Stand to full height, holding the bar in the clean position.","Without moving your feet, press the bar overhead as you exhale. Lower the bar under control ."]],["Clean from Blocks","Clean_from_Blocks/0.jpg","quadriceps",["calves","glutes","hamstrings","delts","traps"],["With a barbell on boxes or stands of the desired height, take an overhand or hook grip just outside the legs. Lower your hips with the weight focused on the heels, back straight, head facing forward, chest up, with your shoulders just in front of the bar. This will be your starting position.","Begin the first pull by driving through the heels, extending your knees. Your back angle should stay the same, and your arms should remain straight with the elbows pointed out.","As full extension is achieved, transition into the receiving position by aggressively shrugging and flexing the arms with the elbows up and out. Aggressively pull yourself down, rotating your elbows under the bar as you do so. Receive the bar in a front squat position, the depth of which is dependent upon the height of the bar at the end of the third pull. The bar should be racked onto the protracted shoulders, lightly touching the throat with the hands relaxed. Continue to descend to the bottom squat position, which will help in the recovery.","Immediately recover by driving through the heels, keeping the torso upright and elbows up. Continue until you have risen to a standing position. Return the weight to the boxes for the next rep."]],["Clock Push-Up","Clock_Push-Up/0.jpg","pectorals",["delts","triceps"],["Move into a prone position on the floor, supporting your weight on your hands and toes.","Your arms should be fully extended with the hands around shoulder width. Keep your body straight throughout the movement. This will be your starting position.","Descend by flexing at the elbow, lowering your chest toward the ground.","At the bottom, reverse the motion by pushing yourself up through elbow extension as quickly as possible until you are air borne. Aim to \"jump\" 12-18 inches to one side.","As you accelerate up, move your outside foot away from your direction of travel. Leaving the ground, shift your body about 30 degrees for the next repetition.","Return to the starting position and repeat the exercise, working all the way around until you are back where you started."]],["Close-Grip Barbell Bench Press","Close-Grip_Barbell_Bench_Press/0.jpg","triceps",["pectorals","delts"],["Lie back on a flat bench. Using a close grip (around shoulder width), lift the bar from the rack and hold it straight over you with your arms locked. This will be your starting position.","As you breathe in, come down slowly until you feel the bar on your middle chest. Tip: Make sure that - as opposed to a regular bench press - you keep the elbows close to the torso at all times in order to maximize triceps involvement.","After a second pause, bring the bar back to the starting position as you breathe out and push the bar using your triceps muscles. Lock your arms in the contracted position, hold for a second and then start coming down slowly again. Tip: It should take at least twice as long to go down than to come up.","Repeat the movement for the prescribed amount of repetitions.","When you are done, place the bar back in the rack."]],["Close-Grip Dumbbell Press","Close-Grip_Dumbbell_Press/0.jpg","triceps",["pectorals","delts"],["Place a dumbbell standing up on a flat bench.","Ensuring that the dumbbell stays securely placed at the top of the bench, lie perpendicular to the bench with only your shoulders lying on the surface. Hips should be below the bench and your legs bent with your feet firmly on the floor.","Grasp the dumbbell with both hands and hold it straight over your chest at arm's length. Both palms should be pressing against the underside of the sides of the dumbbell. This will be your starting position.","Initiate the movement by lowering the dumbbell to your chest.","Return to the starting position by extending the elbows."]],["Close-Grip EZ-Bar Curl with Band","Close-Grip_EZ-Bar_Curl_with_Band/0.jpg","biceps",["forearms"],["Attach a band to each end of the bar. Take the bar, placing a foot on the middle of the band. Stand upright with a narrow, supinated grip on the EZ bar. The elbows should be close to the torso. This will be your starting position.","While keeping the upper arms in place, flex the elbows to execute the curl. Exhale as the weight is lifted.","Continue the movement until your biceps are fully contracted and the bar is at shoulder level. Hold the contracted position for a second and squeeze the biceps hard.","Slowly begin to bring the bar back to starting position as your breathe in.","Repeat for the recommended amount of repetitions."]],["Close-Grip EZ-Bar Press","Close-Grip_EZ-Bar_Press/0.jpg","triceps",["pectorals","delts"],["Lie on a flat bench with an EZ bar loaded to an appropriate weight.","Using a narrow grip lift the bar and hold it straight over your torso with your elbows in. The arms should be perpendicular to the floor. This will be your starting position.","Now lower the bar down to your lower chest as you breathe in. Keep the elbows in as you perform this movement.","Using the triceps to push the bar back up, press it back to the starting position by extending the elbows as you exhale.","Repeat."]],["Close-Grip EZ Bar Curl","Close-Grip_EZ_Bar_Curl/0.jpg","biceps",["forearms"],["Stand up with your torso upright while holding an E-Z Curl Bar at the closer inner handle. The palm of your hands should be facing forward and they should be slightly tilted inwards due to the shape of the bar. The elbows should be close to the torso. This will be your starting position.","While holding the upper arms stationary, curl the weights forward while contracting the biceps as you breathe out. Tip: Only the forearms should move.","Continue the movement until your biceps are fully contracted and the bar is at shoulder level. Hold the contracted position for a second and squeeze the biceps hard.","Slowly begin to bring the bar back to starting position as your breathe in.","Repeat for the recommended amount of repetitions."]],["Close-Grip Front Lat Pulldown","Close-Grip_Front_Lat_Pulldown/0.jpg","lats",["biceps","upper back","delts"],["Sit down on a pull-down machine with a wide bar attached to the top pulley. Make sure that you adjust the knee pad of the machine to fit your height. These pads will prevent your body from being raised by the resistance attached to the bar.","Grab the bar with the palms facing forward using the prescribed grip. Note on grips: For a wide grip, your hands need to be spaced out at a distance wider than your shoulder width. For a medium grip, your hands need to be spaced out at a distance equal to your shoulder width and for a close grip at a distance smaller than your shoulder width.","As you have both arms extended in front of you - while holding the bar at the chosen grip width - bring your torso back around 30 degrees
