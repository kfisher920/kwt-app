round.","Pause for a moment at the top, then slowly lower your arms back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Goblet Squat","1760-yn8yg1r","quads","glutes",["glutes","hamstrings","calves"],["Stand with your feet shoulder-width apart, holding a dumbbell vertically against your chest with both hands.","Keeping your chest up and core engaged, lower your body down into a squat position by pushing your hips back and bending your knees.","Continue lowering until your thighs are parallel to the ground, or as low as you can comfortably go.","Pause for a moment at the bottom, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Hammer Curl","0313-slDvUAU","biceps","forearms",["forearms"],["Stand up straight with a dumbbell in each hand, palms facing your torso.","Keep your elbows close to your torso and rotate the palms of your hands until they are facing forward.","This will be your starting position.","Now, keeping the upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the weights until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Then, inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the recommended amount of repetitions."]],["Dumbbell Hammer Curl On Exercise Ball","1659-fY68AyX","biceps","forearms",["forearms"],["Sit on an exercise ball with your feet flat on the ground and your back straight.","Hold a dumbbell in each hand with your palms facing your body and your arms fully extended.","Keeping your upper arms stationary, exhale and curl the dumbbells while contracting your biceps.","Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as d number of repetitions."]],["Dumbbell Incline Alternate Press","3545-TVdivgY","pectorals","shoulders",["shoulders","triceps"],["Sit on an incline bench with a dumbbell in each hand, resting on your thighs.","Lean back on the bench and use your thighs to help raise the dumbbells to shoulder height, palms facing forward.","Once at shoulder height, rotate your wrists so that the palms of your hands are facing forward.","Push the dumbbells up with your chest and shoulders, extending your arms fully.","Lower the dumbbells back down to the starting position, keeping your elbows slightly bent.","Repeat for the desired number of repetitions, alternating arms."]],["Dumbbell Incline Bench Press","0314-ns0SIbU","pectorals","shoulders",["shoulders","triceps"],["Set up an incline bench at a 45-degree angle.","Sit on the bench with your feet flat on the ground and your back pressed firmly against the bench.","Hold a dumbbell in each hand, palms facing forward, and lift them to shoulder height.","Slowly lower the dumbbells to the sides of your chest, keeping your elbows at a 90-degree angle.","Push the dumbbells back up to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Dumbbell Incline Biceps Curl","0315-F3xgbjF","biceps","forearms",["forearms"],["Sit on an incline bench with a dumbbell in each hand, palms facing forward, and arms fully extended.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Incline Breeding","0316-B3Rxp6L","pectorals","shoulders",["shoulders","triceps"],["Set up an incline bench at a 45-degree angle.","Sit on the bench with your back against the pad and feet flat on the ground.","Hold a dumbbell in each hand with an overhand grip, palms facing forward.","Start with your arms fully extended, perpendicular to the ground.","Lower the dumbbells slowly to the sides of your chest, keeping your elbows at a 90-degree angle.","Pause for a moment at the bottom, then push the dumbbells back up to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Incline Curl","0318-ae9UoXQ","biceps","forearms",["forearms"],["Set an incline bench to a 45-degree angle and sit on it with a dumbbell in each hand, palms facing forward.","Rest your upper arms on the incline bench and let your elbows hang down, fully extending your arms.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Incline Curl V. 2","0317-RaflbWD","biceps","forearms",["forearms"],["Sit on an incline bench with a dumbbell in each hand, palms facing forward and arms fully extended.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Incline Fly","0319-ESOd5Pl","pectorals","shoulders",["shoulders"],["Set an incline bench to a 45-degree angle.","Sit on the bench with a dumbbell in each hand, palms facing each other.","Lie back on the bench and press the dumbbells up to the starting position, directly above your chest.","Lower the dumbbells out to the sides in a wide arc until you feel a stretch in your chest.","Pause for a moment, then squeeze your chest muscles to bring the dumbbells back up to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Incline Fly On Exercise Ball","1278-HYe1ZqR","pectorals","shoulders",["shoulders"],["Set up an incline bench at a 45-degree angle.","Sit on an exercise ball and roll forward until your upper back is resting on the incline bench.","Hold a dumbbell in each hand with your palms facing each other and your arms extended above your chest.","Lower the dumbbells out to the sides in a wide arc until you feel a stretch in your chest.","Pause for a moment, then squeeze your chest muscles to bring the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Incline Hammer Curl","0320-ByX0WxV","biceps","forearms",["forearms"],["Sit on an incline bench with a dumbbell in each hand, palms facing your torso and arms fully extended.","Keep your back against the bench and your feet flat on the floor.","While keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the weights until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Incline Hammer Press","0321-PG1kcIb","pectorals","shoulders",["shoulders","triceps"],["Set an incline bench to a 45-degree angle and sit on it with a dumbbell in each hand, resting on your thighs.","Lie back on the bench and position the dumbbells at shoulder level with your palms facing each other.","Press the dumbbells up and away from your body until your arms are fully extended.","Pause for a moment at the top, then slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Incline Hammer Press On Exercise Ball","1618-wkgnGfb","triceps","chest",["chest","shoulders"],["Sit on an exercise ball with a dumbbell in each hand, palms facing each other.","Walk your feet forward and roll your body down the ball until your head, neck, and upper back are supported on the ball.","Hold the dumbbells at shoulder level, elbows bent and pointing out to the sides.","Press the dumbbells up and slightly inward, keeping your palms facing each other.","Extend your arms fully, squeezing your triceps at the top of the movement.","Slowly lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Incline Inner Biceps Curl","0322-LCtQPn8","biceps","forearms",["forearms"],["Sit on an incline bench with a dumbbell in each hand, palms facing each other.","Rest your upper arms on the bench, allowing your elbows to hang down and your palms to face forward.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Incline One Arm Fly","1279-Gw2HFvW","pectorals","deltoids",["deltoids","triceps"],["Adjust the incline bench to a 30-45 degree angle.","Sit on the bench with a dumbbell in one hand, resting it on your thigh.","Lie back on the bench, keeping your feet flat on the ground.","Hold the dumbbell with your arm extended straight up over your chest.","Lower the dumbbell out to the side in a wide arc, keeping a slight bend in your elbow.","Pause when your arm is parallel to the ground, then reverse the motion to bring the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell Incline One Arm Fly On Exercise Ball","1280-LLNh6q5","pectorals","shoulders",["shoulders"],["Sit on an exercise ball with a dumbbell in one hand.","Walk your feet forward and roll your body down until your head, neck, and upper back are supported on the ball.","Hold the dumbbell with your arm extended straight up over your chest, palm facing inwards.","Slowly lower the dumbbell out to the side, keeping a slight bend in your elbow.","Pause for a moment when your arm is parallel to the ground.","Engage your chest muscles to bring the dumbbell back up to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell Incline One Arm Hammer Press","1619-LL1UiTX","triceps","shoulders",["shoulders","chest"],["Sit on an incline bench with a dumbbell in one hand, resting on your thigh.","Lean back on the bench and use your thigh to help raise the dumbbell to shoulder height.","Rotate your wrist so that your palm is facing inward, towards your body.","Press the dumbbell up and away from your body, extending your arm fully.","Pause for a moment at the top, then slowly lower the dumbbell back down to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell Incline One Arm Hammer Press On Exercise Ball","1620-jDnrkar","triceps","shoulders",["shoulders","chest"],["Sit on an exercise ball with a dumbbell in one hand.","Walk your feet forward and roll your body down until your head, neck, and upper back are supported on the ball.","Hold the dumbbell with your palm facing inward and your elbow bent at a 90-degree angle.","Press the dumbbell up towards the ceiling, straightening your arm.","Lower the dumbbell back down to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell Incline One Arm Lateral Raise","0323-aTNKZiC","delts","trapezius",["trapezius","triceps"],["Sit on an incline bench with a dumbbell in one hand, resting it on your thigh.","Lean forward and position your upper arm against the inside of your thigh.","Raise the dumbbell to the side, keeping your arm slightly bent and your palm facing down.","Continue lifting until your arm is parallel to the floor.","Pause for a moment at the top, then slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Dumbbell Incline One Arm Press","1281-rDAiRf9","pectorals","shoulders",["shoulders","triceps"],["Sit on an incline bench with a dumbbell in one hand, resting on your thigh.","Lie back on the bench and position the dumbbell at shoulder level, palm facing forward.","Press the dumbbell upward and slightly inward, extending your arm fully.","Pause for a moment at the top, then slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Dumbbell Incline One Arm Press On Exercise Ball","1282-Bg5JKSH","pectorals","shoulders",["shoulders","triceps"],["Sit on an exercise ball with a dumbbell in one hand, feet flat on the ground.","Slowly walk your feet forward, rolling the ball until your head, neck, and upper back are supported on the ball.","Hold the dumbbell at shoulder height with your palm facing forward.","Press the dumbbell upward until your arm is fully extended.","Pause for a moment at the top, then slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Dumbbell Incline Palm-in Press","0324-OVLmUuL","pectorals","shoulders",["shoulders","triceps"],["Set up an incline bench at a 45-degree angle.","Sit on the bench with a dumbbell in each hand, palms facing each other.","Plant your feet firmly on the ground and keep your back straight against the bench.","Start with the dumbbells at shoulder level, elbows bent and palms facing each other.","Press the dumbbells up and away from your body, extending your arms fully.","Pause for a moment at the top, then slowly lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Incline Press On Exercise Ball","1283-bfiHMpI","pectorals","shoulders",["shoulders","triceps"],["Sit on an exercise ball with a dumbbell in each hand, palms facing forward.","Slowly walk your feet forward, rolling your body down the ball until your head, neck, and upper back are supported on the ball.","Hold the dumbbells at shoulder level, elbows bent and pointing out to the sides.","Press the dumbbells upward, extending your arms fully.","Pause for a moment at the top, then slowly lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Incline Raise","0325-nxW6BkN","delts","trapezius",["trapezius","triceps"],["Sit on an incline bench with a dumbbell in each hand, resting on your thighs.","Lean back on the bench and raise the dumbbells to shoulder height, palms facing forward.","Keeping your back against the bench, exhale and raise the dumbbells above your head, fully extending your arms.","Pause for a moment at the top, then inhale and slowly lower the dumbbells back to shoulder height.","Repeat for the desired number of repetitions."]],["Dumbbell Incline Rear Lateral Raise","0326-vYk8lqw","delts","traps",["traps","rhomboids"],["Set up an incline bench at a 45-degree angle.","Sit on the bench with your chest against the backrest and hold a dumbbell in each hand.","Extend your arms straight down with your palms facing each other.","Keeping a slight bend in your elbows, raise your arms out to the sides until they are parallel to the ground.","Pause for a moment at the top, then slowly lower your arms back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Incline Row","0327-7vG5o25","upper back","biceps",["biceps","shoulders"],["Set up an incline bench at a 45-degree angle.","Grab a dumbbell in each hand and sit on the bench with your chest against the incline.","Extend your arms fully, allowing the dumbbells to hang straight down from your shoulders.","Pull the dumbbells up towards your chest, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Incline Shoulder Raise","0328-6e2DcYX","serratus anterior","deltoids",["deltoids","trapezius"],["Set an incline bench to a 45-degree angle and sit on it with a dumbbell in each hand, palms facing down.","Rest the dumbbells on your thighs and lean back onto the bench.","Use your thighs to help raise the dumbbells to shoulder height, then rotate your wrists so that your palms are facing forward.","Exhale and slowly raise the dumbbells above your head, keeping a slight bend in your elbows.","Pause for a moment at the top, then inhale and slowly lower the dumbbells back to shoulder height.","Repeat for the desired number of repetitions."]],["Dumbbell Incline Shrug","0329-JymLInS","traps","shoulders",["shoulders"],["Set an incline bench to a 45-degree angle and sit on it with a dumbbell in each hand.","Place your feet flat on the ground and let your arms hang straight down with your palms facing your body.","Keeping your arms straight, shrug your shoulders up towards your ears as high as possible.","Hold the contraction for a moment, then slowly lower your shoulders back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Incline T-raise","3542-jgbvVJ0","delts","traps",["traps","rhomboids"],["Set an incline bench to a 45-degree angle and sit on it with a dumbbell in each hand, palms facing inwards.","Lean forward and let your arms hang straight down, perpendicular to the floor.","Keeping your arms straight, raise them out to the sides until they are parallel to the floor, forming a 'T' shape with your body.","Pause for a moment at the top, then slowly lower your arms back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Incline Triceps Extension","0330-OVIKwsd","triceps","shoulders",["shoulders"],["Sit on an incline bench with a dumbbell in each hand, palms facing inwards.","Extend your arms fully overhead, keeping your elbows close to your head.","Lower the dumbbells behind your head by bending your elbows, keeping your upper arms stationary.","Pause for a moment, then raise the dumbbells back to the starting position by extending your arms.","Repeat for the desired number of repetitions."]],["Dumbbell Incline Twisted Flyes","0331-1PLE8e9","pectorals","shoulders",["shoulders","triceps"],["Set an incline bench to a 45-degree angle and sit on it with a dumbbell in each hand, palms facing each other.","Lie back on the bench and press the dumbbells up to the starting position, directly above your chest, with your arms extended.","Lower the dumbbells out to the sides in a wide arc until you feel a stretch in your chest.","As you lower the dumbbells, rotate your wrists so that your palms face forward at the bottom of the movement.","Reverse the motion and bring the dumbbells back up to the starting position, squeezing your chest muscles together at the top.","Repeat for the desired number of repetitions."]],["Dumbbell Incline Two Arm Extension","1733-U7D9Fx3","triceps","shoulders",["shoulders"],["Sit on an incline bench with a dumbbell in each hand, resting on your thighs.","Slowly lie back on the bench, keeping the dumbbells close to your chest.","Once you are fully lying down, extend your arms straight up towards the ceiling, keeping your elbows slightly bent.","Pause for a moment at the top, then slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Incline Y-raise","3541-PbzNu7c","upper back","shoulders",["shoulders","rear deltoids"],["Set an incline bench to a 45-degree angle and sit on it with a dumbbell in each hand, palms facing inwards.","Lean forward slightly and let your arms hang straight down, keeping a slight bend in your elbows.","Raise your arms out to the sides and up in a Y shape until they are parallel to the ground.","Pause for a moment at the top, then slowly lower your arms back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Iron Cross","0332-cALkHHX","delts","triceps",["triceps","chest"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand at your sides.","Raise your arms out to the sides until they are parallel to the ground, forming a T shape with your body.","Pause for a moment, then slowly lower your arms back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Kickback","0333-W6PxUkg","triceps","shoulders",["shoulders"],["Stand with your feet shoulder-width apart and hold a dumbbell in each hand.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Bring your upper arms close to your sides, with your elbows bent at a 90-degree angle.","Extend your arms straight back, squeezing your triceps at the top of the movement.","Pause for a moment, then slowly lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Kickbacks On Exercise Ball","1734-cAvTaSg","triceps","shoulders",["shoulders","back"],["Sit on an exercise ball with your feet flat on the ground and your back straight.","Hold a dumbbell in each hand with your palms facing inwards and your arms bent at a 90-degree angle.","Extend your arms straight back, squeezing your triceps at the top of the movement.","Pause for a moment, then slowly lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Kneeling Bicep Curl Exercise Ball","1660-2JCuFTU","biceps","forearms",["forearms"],["Kneel on the floor with an exercise ball in front of you.","Place your elbows on top of the exercise ball, holding a dumbbell in each hand with your palms facing up.","Keeping your upper arms stationary, exhale and curl the dumbbells while contracting your biceps.","Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Lateral Raise","0334-DsgkuIt","delts","traps",["traps"],["Stand with your feet shoulder-width apart and hold a dumbbell in each hand, palms facing your body.","Keep your back straight and engage your core.","Raise your arms out to the sides until they are parallel to the floor, keeping a slight bend in your elbows.","Pause for a moment at the top, then slowly lower your arms back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Lateral To Front Raise","0335-xMjBKwn","delts","trapezius",["trapezius","biceps"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand with your palms facing your body.","Keep your back straight and engage your core.","Raise your arms out to the sides until they are parallel to the ground, keeping a slight bend in your elbows.","Pause for a moment at the top, then slowly lower your arms back down to the starting position.","Next, raise your arms in front of you until they are parallel to the ground, again keeping a slight bend in your elbows.","Pause for a moment at the top, then slowly lower your arms back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Lunge","0336-RRWFUcw","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand.","Take a step forward with your right foot, lowering your body into a lunge position.","Keep your back straight and your chest up as you lower your body.","Push through your right heel to return to the starting position.","Repeat with your left leg.","Alternate legs for the desired number of repetitions."]],["Dumbbell Lunge With Bicep Curl","1658-Mz6lLcW","biceps","quadriceps",["quadriceps","hamstrings"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand with your palms facing forward.","Take a step forward with your right foot, lowering your body into a lunge position. Your right knee should be bent at a 90-degree angle and your left knee should be hovering just above the ground.","As you lunge forward, simultaneously curl the dumbbells towards your shoulders, keeping your elbows close to your body.","Pause for a moment at the bottom of the lunge, then push through your right heel to return to the starting position, lowering the dumbbells back down to your sides.","Repeat the lunge and bicep curl on the opposite side, stepping forward with your left foot.","Continue alternating sides for the desired number of repetitions."]],["Dumbbell Lying Extension (Across Face)","0337-L2V5Nan","triceps","shoulders",["shoulders"],["Lie flat on a bench with your feet flat on the ground and your head at the end of the bench.","Hold a dumbbell with both hands and extend your arms straight up above your chest, palms facing each other.","Keeping your upper arms stationary, slowly lower the dumbbell in an arc behind your head until your forearms are parallel to the ground.","Pause for a moment, then contract your triceps to bring the dumbbell back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Lying Alternate Extension","1729-NfP83rA","triceps","shoulders",["shoulders"],["Lie flat on a bench with a dumbbell in each hand, palms facing each other.","Extend your arms straight up over your chest, keeping a slight bend in your elbows.","Lower one dumbbell down towards your head, bending at the elbow, while keeping the other arm extended.","Pause for a moment at the bottom, then raise the dumbbell back up to the starting position.","Repeat with the other arm, alternating sides for the desired number of repetitions."]],["Dumbbell Lying Elbow Press","0338-eOCOwIR","triceps","chest",["chest","shoulders"],["Lie flat on a bench with a dumbbell in each hand, palms facing each other and arms extended straight up over your chest.","Lower the dumbbells towards your shoulders by bending your elbows, keeping your upper arms stationary.","Pause for a moment at the bottom, then press the dumbbells back up to the starting position by extending your elbows.","Repeat for the desired number of repetitions."]],["Dumbbell Lying External Shoulder Rotation","0863-bmBf7LN","delts","rotator cuff",["rotator cuff","triceps"],["Lie on your side on a flat bench with your upper arm against your side and your elbow bent 90 degrees.","Hold a dumbbell in your hand with your palm facing down.","Keeping your upper arm against your side, slowly rotate your forearm upward as far as possible.","Pause for a moment at the top, then slowly lower your forearm back down to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Dumbbell Lying Femoral","0339-FkBIE6a","hamstrings","glutes",["glutes"],["Lie flat on your back with your legs extended and a dumbbell resting on your lower abdomen.","Bend your knees and bring the dumbbell towards your glutes, keeping your feet flat on the ground.","Pause for a moment at the top, then slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Lying Hammer Press","0340-7gdLIXa","pectorals","triceps",["triceps","shoulders"],["Lie flat on a bench with a dumbbell in each hand, palms facing each other and arms extended straight up.","Lower the dumbbells to the sides of your chest, keeping your elbows at a 90-degree angle.","Press the dumbbells back up to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Dumbbell Lying On Floor Rear Delt Raise","2470-Ion0XWz","delts","trapezius",["trapezius","rhomboids"],["Lie face down on the floor with a dumbbell in each hand, palms facing each other.","Extend your arms straight out in front of you, keeping a slight bend in your elbows.","Engaging your shoulder muscles, lift your arms up and out to the sides, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower your arms back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Lying One Arm Deltoid Rear","0341-gSw59a4","delts","trapezius",["trapezius","rhomboids"],["Lie face down on a flat bench with a dumbbell in one hand, palm facing inwards.","Extend your arm straight down towards the floor, keeping it close to your body.","Raise your arm up and back, squeezing your shoulder blade towards your spine.","Pause for a moment at the top, then slowly lower your arm back down to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell Lying One Arm Press","0343-zGSIWQi","pectorals","triceps",["triceps","shoulders"],["Lie flat on a bench with a dumbbell in one hand and your feet flat on the ground.","Hold the dumbbell at shoulder level with your palm facing forward.","Press the dumbbell upward until your arm is fully extended.","Pause for a moment at the top, then slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Dumbbell Lying One Arm Press V. 2","0342-K3dIO25","pectorals","triceps",["triceps","shoulders"],["Lie flat on a bench with your back supported and feet flat on the ground.","Hold a dumbbell in one hand with your palm facing towards your feet.","Extend your arm straight up towards the ceiling, keeping your elbow slightly bent.","Slowly lower the dumbbell down towards your chest, keeping your elbow close to your body.","Pause for a moment at the bottom, then push the dumbbell back up to the starting position.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Dumbbell Lying One Arm Pronated Triceps Extension","0344-wyaqzOS","triceps","shoulders",["shoulders"],["Lie flat on a bench with your back and head supported, and your feet flat on the ground.","Hold a dumbbell in one hand with your palm facing down, and extend your arm straight up above your shoulder.","Keeping your upper arm stationary, slowly lower the dumbbell behind your head by bending your elbow.","Pause for a moment at the bottom, then extend your arm back up to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell Lying One Arm Rear Lateral Raise","0345-KwFGiEP","delts","traps",["traps","rhomboids"],["Lie face down on a flat bench with a dumbbell in one hand, hanging towards the floor.","Keep your arm straight and lift the dumbbell out to the side, away from your body.","Pause for a moment at the top, then slowly lower the dumbbell back down to the starting position.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Dumbbell Lying One Arm Supinated Triceps Extension","0346-zZlORz6","triceps","forearms",["forearms"],["Lie flat on a bench with your back and head supported, and your feet flat on the ground.","Hold a dumbbell in one hand with an underhand grip, and extend your arm straight up above your shoulder.","Keeping your upper arm stationary, slowly lower the dumbbell behind your head by bending your elbow.","Pause for a moment at the bottom, then extend your arm back up to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell Lying Pronation","0347-mym4hJo","forearms","biceps",["biceps","shoulders"],["Lie flat on a bench with your chest facing down and your arms extended straight down, holding a dumbbell in each hand.","Rotate your palms so they are facing up.","Keeping your upper arms stationary, exhale and curl the dumbbells as you rotate your palms to face down.","Inhale and slowly lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Lying Pronation On Floor","2705-7RWNjiB","forearms","biceps",["biceps","triceps"],["Lie flat on the floor with your face down and your arms extended straight out in front of you, holding a dumbbell in each hand.","Rotate your palms so they are facing down towards the floor.","Keeping your arms straight, lift the dumbbells off the floor by contracting your forearms.","Continue lifting until your forearms are fully contracted and the dumbbells are at shoulder level.","Hold for a moment, then slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Lying Pullover On Exercise Ball","1284-iK59oEA","pectorals","triceps",["triceps","shoulders","back"],["Sit on an exercise ball and roll forward until your upper back is resting on the ball.","Hold a dumbbell with both hands and extend your arms straight up over your chest.","Slowly lower the dumbbell behind your head while keeping your arms straight.","Pause for a moment, then raise the dumbbell back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Lying Rear Delt Row","1328-XUUD0Fs","upper back","shoulders",["shoulders","biceps"],["Lie face down on a flat bench with a dumbbell in each hand, palms facing inwards.","Extend your arms straight down towards the floor, keeping a slight bend in your elbows.","Engaging your back muscles, lift the dumbbells up towards your chest, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Lying Rear Lateral Raise","0348-53Ttlck","delts","traps",["traps","rhomboids"],["Lie face down on a flat bench with a dumbbell in each hand, palms facing each other.","Extend your arms straight down towards the floor, keeping a slight bend in your elbows.","Engaging your shoulder muscles, lift your arms out to the sides until they are parallel to the floor.","Pause for a moment at the top, then slowly lower your arms back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Lying Single Extension","1735-6MfS53i","triceps","shoulders",["shoulders"],["Lie flat on a bench with a dumbbell in one hand and your arm fully extended above your chest.","Lower the dumbbell in a controlled manner towards your forehead, keeping your upper arm stationary.","Pause briefly at the bottom of the movement, then extend your arm back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell Lying Supination","0349-M2Pm3zj","forearms","biceps",["biceps","shoulders"],["Lie flat on a bench with your feet flat on the ground.","Hold a dumbbell in each hand with your palms facing up and your arms fully extended.","Keeping your upper arms stationary, curl the dumbbells towards your shoulders by contracting your forearms.","Pause for a moment at the top, then slowly lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Lying Supination On Floor","2706-rEhi2o5","forearms","biceps",["biceps","shoulders"],["Lie flat on your back on the floor with your legs extended and your arms by your sides, holding a dumbbell in each hand.","Rotate your palms to face up, keeping your elbows close to your sides.","Slowly curl the dumbbells towards your shoulders, squeezing your forearms.","Pause for a moment at the top, then slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Lying Supine Biceps Curl","1661-XVzF3iZ","biceps","forearms",["forearms"],["Lie flat on a bench with your back and head supported, and your feet flat on the ground.","Hold a dumbbell in each hand with your palms facing up and your arms fully extended.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the weights until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Lying Supine Curl","0350-KUaZst7","biceps","forearms",["forearms"],["Lie flat on a bench with a dumbbell in each hand, palms facing up and arms fully extended.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Lying Triceps Extension","0351-mpKZGWz","triceps","shoulders",["shoulders"],["Lie flat on a bench with a dumbbell in each hand, palms facing each other.","Extend your arms straight up over your chest, keeping your elbows close to your body.","Lower the dumbbells down towards your forehead, bending your elbows.","Pause for a moment, then extend your arms back up to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Lying Wide Curl","1662-qm9veZw","biceps","forearms",["forearms"],["Lie flat on a bench with a dumbbell in each hand, palms facing up and arms fully extended.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the weights until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Neutral Grip Bench Press","0352-pP8wP2P","triceps","chest",["chest","shoulders"],["Lie flat on a bench with your feet flat on the ground and your back pressed against the bench.","Hold a dumbbell in each hand with a neutral grip (palms facing each other) and your arms extended straight up over your chest.","Slowly lower the dumbbells down towards your chest, keeping your elbows close to your body.","Pause for a moment at the bottom, then push the dumbbells back up to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Dumbbell One Arm Bench Fly","1285-o5Jsk92","pectorals","shoulders",["shoulders"],["Sit on a flat bench with a dumbbell in one hand, resting it on top of your thigh.","Lie back on the bench, keeping the dumbbell pressed against your thigh.","Using your free hand, help lift the dumbbell up to the starting position.","Hold the dumbbell directly above your shoulder with your arm extended and palm facing inward.","Lower the dumbbell out to the side in a wide arc, keeping a slight bend in your elbow.","Pause when your arm is parallel to the ground, then reverse the movement and bring the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch arms and repeat."]],["Dumbbell One Arm Bent-over Row","0292-C0MA9bC","upper back","biceps",["biceps","forearms"],["Stand with your feet shoulder-width apart, holding a dumbbell in one hand with your palm facing your body.","Bend your knees slightly and hinge forward at the hips, keeping your back straight and your core engaged.","Let the dumbbell hang straight down towards the floor, with your arm fully extended.","Pull the dumbbell up towards your chest, keeping your elbow close to your body and squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower the dumbbell back down to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Dumbbell One Arm Chest Fly On Exercise Ball","1286-Bpkf41o","pectorals","shoulders",["shoulders","triceps"],["Sit on an exercise ball with a dumbbell in one hand and your feet flat on the ground.","Walk your feet forward, rolling the ball until your upper back is supported on the ball and your head, neck, and shoulders are off the ball.","Extend your arm with the dumbbell straight up above your chest, palm facing inward.","Slowly lower the dumbbell out to the side, keeping a slight bend in your elbow.","Pause for a moment when your arm is parallel to the ground.","Engage your chest muscles to bring the dumbbell back up to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell One Arm Concentration Curl (On Stability Ball)","0353-k5IpyHg","biceps","forearms",["forearms"],["Sit on a stability ball with your feet flat on the ground and your knees bent at a 90-degree angle.","Hold a dumbbell in one hand with your palm facing up and your arm extended down towards the floor.","Rest your elbow on the inside of your thigh, just above the knee.","Keeping your upper arm stationary, exhale and curl the dumbbell up towards your shoulder while contracting your biceps.","Pause for a moment at the top of the movement, then inhale and slowly lower the dumbbell back down to the starting position.","Repeat for the desired number of repetitions, then switch arms and repeat."]],["Dumbbell One Arm Decline Chest Press","1287-REGM1dE","pectorals","triceps",["triceps","shoulders"],["Lie on a decline bench with a dumbbell in one hand, resting on your chest.","Place your feet flat on the ground and keep your back pressed against the bench.","Extend your arm and push the dumbbell up towards the ceiling, fully extending your elbow.","Pause for a moment at the top, then slowly lower the dumbbell back down to the starting position.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Dumbbell One Arm Fly On Exercise Ball","1288-Am02iPd","pectorals","shoulders",["shoulders","triceps"],["Sit on an exercise ball with a dumbbell in one hand and your feet flat on the ground.","Walk your feet forward and roll your body down until your upper back is resting on the exercise ball.","Extend your arm with the dumbbell straight up above your chest, palm facing inwards.","Slowly lower the dumbbell out to the side, keeping a slight bend in your elbow.","Pause for a moment, then squeeze your chest muscles to bring the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell One Arm French Press On Exercise Ball","1736-ziFKQXP","triceps","shoulders",["shoulders"],["Sit on an exercise ball with your feet flat on the ground and your back straight.","Hold a dumbbell in one hand with your palm facing up and your elbow bent at a 90-degree angle.","Extend your arm straight up towards the ceiling, keeping your elbow stationary.","Slowly lower the dumbbell back down to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell One Arm Hammer Preacher Curl","1663-4dF3maG","biceps","forearms",["forearms"],["Sit on a preacher bench with a dumbbell in one hand and your upper arm resting on the pad.","Hold the dumbbell with a neutral grip (palms facing your body).","Keeping your upper arm stationary, exhale and curl the dumbbell up towards your shoulder.","Pause for a moment at the top, squeezing your biceps.","Inhale and slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell One Arm Hammer Press On Exercise Ball","1621-VYmYxK5","triceps","shoulders",["shoulders","chest"],["Sit on an exercise ball with your feet flat on the ground and your back straight.","Hold a dumbbell in one hand with your palm facing inwards and your elbow bent at a 90-degree angle.","Place your other hand on your hip for stability.","Press the dumbbell upwards, extending your arm fully.","Pause for a moment at the top, then slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell One Arm Incline Chest Press","1289-PDaMuyV","pectorals","shoulders",["shoulders","triceps"],["Adjust the incline bench to a 45-degree angle.","Sit on the bench with your back against the pad and feet flat on the ground.","Hold a dumbbell in one hand with an overhand grip, resting it on your shoulder.","Push the dumbbell up and away from your body, extending your arm fully.","Pause for a moment at the top, then slowly lower the dumbbell back down to the starting position.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Dumbbell One Arm Kickback","0354-bQy2Eni","triceps","shoulders",["shoulders"],["Stand with your feet shoulder-width apart and hold a dumbbell in your right hand.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Bring your right elbow up to your side, keeping it bent at a 90-degree angle.","Extend your right arm straight back, squeezing your triceps at the top of the movement.","Slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Dumbbell One Arm Lateral Raise","0355-n5cWCsI","delts","trapezius",["trapezius","triceps"],["Stand with your feet shoulder-width apart, holding a dumbbell in one hand with your palm facing your body.","Keep your back straight and your core engaged throughout the exercise.","Raise the dumbbell to the side, keeping your arm straight and your palm facing down.","Continue lifting until your arm is parallel to the ground.","Pause for a moment at the top, then slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Dumbbell One Arm Lateral Raise With Support","0356-Yg7MJAT","delts","trapezius",["trapezius","rotator cuff"],["Stand with your feet shoulder-width apart and hold a dumbbell in one hand, with your palm facing your body.","Place your other hand on a stable surface, such as a bench or wall, for support.","Keep your back straight and engage your core.","Raise the dumbbell out to the side, keeping your arm straight and your palm facing down.","Continue lifting until your arm is parallel to the ground.","Pause for a moment at the top, then slowly lower the dumbbell back down to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Dumbbell One Arm Press On Exercise Ball","1290-QZFv5ui","pectorals","shoulders",["shoulders","triceps","core"],["Sit on an exercise ball with your feet flat on the ground and your knees bent at a 90-degree angle.","Hold a dumbbell in one hand and position it at shoulder height, with your elbow bent and palm facing forward.","Slowly press the dumbbell upward until your arm is fully extended, while keeping your core engaged and maintaining balance on the exercise ball.","Pause for a moment at the top, then slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Dumbbell One Arm Prone Curl","1665-JWjujiY","biceps","forearms",["forearms"],["Lie face down on a flat bench with a dumbbell in one hand, palm facing down.","Extend your arm fully, letting it hang straight down towards the floor.","Keeping your upper arm stationary, curl the dumbbell up towards your shoulder by contracting your biceps.","Pause for a moment at the top, then slowly lower the dumbbell back down to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell One Arm Prone Hammer Curl","1666-LIGZSTA","biceps","forearms",["forearms"],["Lie face down on a flat bench with a dumbbell in one hand, palm facing your body and arm fully extended.","Keep your upper arm stationary and curl the dumbbell towards your shoulder, contracting your biceps.","Pause for a moment at the top, then slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell One Arm Pullover On Exercise Ball","1291-bQHPBU3","pectorals","triceps",["triceps","latissimus dorsi","rhomboids"],["Sit on an exercise ball with your feet flat on the ground and your knees bent at a 90-degree angle.","Hold a dumbbell with one hand and extend your arm straight up above your chest.","Slowly lower the dumbbell behind your head while keeping your arm straight.","Pause for a moment, then raise the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell One Arm Reverse Wrist Curl","0358-BwSNDGt","forearms","wrist extensors",["wrist extensors"],["Sit on a bench or chair with your feet flat on the ground.","Hold a dumbbell in one hand with an overhand grip, palm facing down.","Rest your forearm on your thigh, with your wrist hanging off the edge.","Slowly lower the dumbbell towards the ground by flexing your wrist.","Pause for a moment at the bottom, then slowly curl your wrist back up towards your body.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Dumbbell One Arm Reverse Fly (With Support)","0359-e25F58f","delts","trapezius",["trapezius","rhomboids"],["Sit on a bench with your feet flat on the ground and your back straight.","Hold a dumbbell in one hand with your palm facing inwards.","Lean forward and place your free hand on the bench for support.","Keep your arm slightly bent and raise it out to the side until it is parallel to the ground.","Pause for a moment at the top, then slowly lower your arm back down to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell One Arm Reverse Grip Press","1622-Ze7MoIb","pectorals","triceps",["triceps","shoulders"],["Sit on a flat bench with a dumbbell in one hand, palm facing towards your body.","Place your feet flat on the ground and keep your back straight.","Raise the dumbbell to shoulder height, keeping your elbow close to your body.","Press the dumbbell upwards until your arm is fully extended.","Pause for a moment at the top, then slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Dumbbell One Arm Reverse Preacher Curl","1414-bWxq4op","biceps","forearms",["forearms"],["Sit on a preacher bench with your chest against the pad and your arm extended over the edge of the bench, holding a dumbbell with an underhand grip.","Lower the dumbbell slowly until your arm is fully extended.","Curl the dumbbell back up towards your shoulder, keeping your upper arm stationary.","Squeeze your biceps at the top of the movement, then slowly lower the dumbbell back down to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell One Arm Reverse Spider Curl","1667-VdLZ3nB","biceps","forearms",["forearms"],["Stand up straight with a dumbbell in one hand, palm facing down and arm fully extended.","Keeping your upper arm stationary, curl the dumbbell towards your shoulder by flexing your elbow.","Pause for a moment at the top, then slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell One Arm Seated Bicep Curl On Exercise Ball","1668-s999Hdo","biceps","forearms",["forearms"],["Sit on an exercise ball with your feet flat on the ground and your back straight.","Hold a dumbbell in one hand with your palm facing up and your arm fully extended.","Keeping your upper arm stationary, curl the dumbbell towards your shoulder by contracting your biceps.","Pause for a moment at the top, then slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell One Arm Seated Hammer Curl","1669-jK2hZ6n","biceps","forearms",["forearms"],["Sit on a bench with your back straight and feet flat on the ground.","Hold a dumbbell in one hand with a neutral grip (palms facing each other).","Rest your elbow on the inside of your thigh, just above the knee.","Keeping your upper arm stationary, exhale and curl the dumbbell up towards your shoulder.","Pause for a moment at the top, squeezing your biceps.","Inhale and slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell One Arm Seated Neutral Wrist Curl","1415-YtaCTYl","forearms","biceps",["biceps","brachialis"],["Sit on a bench with your feet flat on the ground and hold a dumbbell in one hand, palm facing up.","Rest your forearm on your thigh, allowing your wrist to hang off the edge.","Keeping your forearm stationary, curl your wrist upward as far as possible.","Pause for a moment at the top, then slowly lower your wrist back down to the starting position.","Repeat for the desired number of repetitions, then switch to the other hand."]],["Dumbbell One Arm Shoulder Press","0361-84RyJf8","delts","triceps",["triceps","upper back"],["Stand with your feet shoulder-width apart and hold a dumbbell in one hand at shoulder level, palm facing forward.","Press the dumbbell upward until your arm is fully extended overhead.","Pause for a moment at the top, then slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Dumbbell One Arm Shoulder Press V. 2","0360-1TkiAFK","delts","triceps",["triceps","upper back"],["Stand with your feet shoulder-width apart and hold a dumbbell in one hand at shoulder level, palm facing forward.","Engage your core and press the dumbbell straight up overhead, fully extending your arm.","Pause for a moment at the top, then slowly lower the dumbbell back to shoulder level.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Dumbbell One Arm Snatch","3888-6pTkI99","glutes","hamstrings",["hamstrings","quadriceps","core"],["Stand with your feet shoulder-width apart, holding a dumbbell in one hand with an overhand grip.","Bend your knees slightly and hinge forward at the hips, keeping your back straight and chest up.","Lower the dumbbell towards the ground, keeping it close to your body.","Explosively extend your hips, knees, and ankles, driving the dumbbell upwards in a straight line.","As the dumbbell reaches shoulder height, quickly rotate your hand and punch it overhead, fully extending your arm.","Catch the dumbbell overhead with a slight bend in your knees and hips.","Lower the dumbbell back down to the starting position in a controlled manner.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Dumbbell One Arm Standing Curl","1670-ffQsyBj","biceps","forearms",["forearms"],["Stand up straight with a dumbbell in one hand, palm facing forward and arm fully extended.","Keeping your upper arm stationary, exhale and curl the weight upward while contracting your biceps.","Continue to raise the dumbbell until your biceps are fully contracted and the dumbbell is at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell One Arm Standing Hammer Curl","1671-2sQGZ5b","biceps","forearms",["forearms"],["Stand up straight with a dumbbell in each hand, palms facing your torso.","Keep your elbows close to your torso and your upper arms stationary.","Exhale and curl the weights while contracting your biceps.","Continue to raise the weights until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell One Arm Triceps Extension (On Bench)","0362-nAuHPcD","triceps","shoulders",["shoulders"],["Sit on a bench with your back straight and feet flat on the ground.","Hold a dumbbell in one hand and place your other hand on the bench for support.","Raise the dumbbell overhead, keeping your upper arm close to your head and your elbow pointing forward.","Lower the dumbbell behind your head by bending your elbow, keeping your upper arm stationary.","Extend your arm back up to the starting position, fully straightening your elbow.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell One Arm Upright Row","0363-6cKQC5E","delts","traps",["traps","biceps"],["Stand with your feet shoulder-width apart, holding a dumbbell in one hand with an overhand grip.","Let the dumbbell hang at arm's length in front of your thighs, with your palm facing your body.","Keeping your back straight and your core engaged, exhale and lift the dumbbell straight up towards your chin, leading with your elbow.","Pause for a moment at the top, then inhale and slowly lower the dumbbell back down to the starting position.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Dumbbell One Arm Wrist Curl","0364-q8aHNoF","forearms","biceps",["biceps","brachialis"],["Sit on a bench or chair with your feet flat on the ground.","Hold a dumbbell in one hand with an underhand grip, resting your forearm on your thigh.","Allow your wrist to extend, letting the dumbbell roll down towards your fingers.","Slowly curl your wrist back up, bringing the dumbbell towards your forearm.","Repeat for the desired number of repetitions, then switch to the other hand."]],["Dumbbell One Arm Zottman Preacher Curl","1672-sxY5Biu","biceps","forearms",["forearms"],["Sit on a preacher curl bench and hold a dumbbell in one hand with an underhand grip.","Rest your upper arm on the preacher bench pad, allowing your arm to fully extend.","Curl the dumbbell up towards your shoulder, keeping your upper arm stationary.","At the top of the curl, rotate your wrist so that your palm faces up.","Slowly lower the dumbbell back down to the starting position, rotating your wrist back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell One Leg Fly On Exercise Ball","1292-pH2x2jj","pectorals","shoulders",["shoulders","triceps"],["Sit on an exercise ball with a dumbbell in each hand, palms facing each other.","Place one foot on the ground and extend the other leg straight out in front of you.","Lean forward slightly and bring your arms out to the sides, keeping a slight bend in your elbows.","Slowly lower the dumbbells down and out to the sides, feeling a stretch in your chest.","Pause for a moment at the bottom, then squeeze your chest muscles to bring the dumbbells back up to the starting position.","Repeat for the desired number of repetitions, then switch legs and repeat."]],["Dumbbell Over Bench Neutral Wrist Curl","0365-BKa8dmT","biceps","forearms",["forearms"],["Sit on a bench with your feet flat on the ground and hold a dumbbell in each hand, palms facing up.","Rest your forearms on the bench, allowing your wrists to hang off the edge.","Keeping your upper arms stationary, exhale and curl the dumbbells up towards your shoulders.","Pause for a moment at the top, then inhale and slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Over Bench One Arm Neutral Wrist Curl","0366-IvV6C9M","biceps","forearms",["forearms"],["Sit on a bench with a dumbbell in one hand and your arm extended over the bench, palm facing up.","Keep your upper arm stationary and curl the dumbbell towards your shoulder, keeping your wrist in a neutral position.","Pause for a moment at the top, then slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell Over Bench One Arm Reverse Wrist Curl","1441-4Jc36XM","forearms","biceps",["biceps","brachialis"],["Sit on a bench with your feet flat on the ground and hold a dumbbell in one hand, palm facing down.","Rest your forearm on the bench with your wrist hanging off the edge.","Slowly curl your wrist upwards, bringing the dumbbell towards your forearm.","Pause for a moment at the top, then slowly lower the dumbbell back down to the starting position.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Dumbbell Over Bench One Arm Wrist Curl","0367-KI1DjNN","forearms","biceps",["biceps","shoulders"],["Sit on a bench with your feet flat on the ground and hold a dumbbell in one hand, palm facing down.","Rest your forearm on the bench with your wrist hanging off the edge.","Slowly curl your wrist upwards, bringing the dumbbell towards your forearm.","Pause for a moment at the top, then slowly lower the dumbbell back down to the starting position.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Dumbbell Over Bench Revers Wrist Curl","0368-3tAXPQ6","forearms","biceps",["biceps","brachialis"],["Sit on a bench with your feet flat on the ground and hold a dumbbell in each hand, palms facing down.","Rest your forearms on the bench, allowing your wrists to hang off the edge.","Slowly curl your wrists upward, bringing the dumbbells towards your body.","Pause for a moment at the top, then slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Over Bench Wrist Curl","0369-D1xYJAU","forearms","biceps",["biceps","brachialis"],["Sit on a bench with your forearms resting on the bench and your palms facing up, holding a dumbbell in each hand.","Allow your wrists to hang over the edge of the bench.","Slowly curl your wrists upward, squeezing your forearms at the top of the movement.","Pause for a moment, then slowly lower your wrists back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Palm Rotational Bent Over Row","1329-wt6rwjk","upper back","biceps",["biceps","forearms"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand with an overhand grip.","Bend forward at the hips, keeping your back straight and your knees slightly bent.","Let your arms hang straight down, palms facing your body.","Engage your core and pull the dumbbells up towards your chest, keeping your elbows close to your body.","As you pull the dumbbells up, rotate your palms so they face away from your body.","Squeeze your shoulder blades together at the top of the movement.","Slowly lower the dumbbells back down to the starting position, rotating your palms back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Palms In Incline Bench Press","1623-8eqjhOl","triceps","chest",["chest","shoulders"],["Set up an incline bench at a 45-degree angle.","Sit on the bench with your back against the backrest and feet flat on the ground.","Hold a dumbbell in each hand with an overhand grip, palms facing inwards.","Extend your arms straight up above your chest, keeping a slight bend in your elbows.","Lower the dumbbells slowly towards your shoulders, keeping your elbows close to your body.","Pause for a moment at the bottom, then press the dumbbells back up to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Peacher Hammer Curl","0370-F1KxjBa","biceps","forearms",["forearms"],["Stand up straight with a dumbbell in each hand, palms facing your torso.","Keep your elbows close to your torso and rotate the palms of your hands until they are facing forward.","This will be your starting position.","Now, keeping the upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the weights until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Then, inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the recommended amount of repetitions."]],["Dumbbell Plyo Squat","0371-S4pwGlc","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand at your sides.","Lower your body into a squat position by bending your knees and pushing your hips back.","As you reach the bottom of the squat, explode upward, jumping off the ground.","While in the air, quickly switch the position of your feet, landing with your opposite foot forward.","Immediately lower your body back into a squat position and repeat the jump, switching your feet again.","Continue alternating the position of your feet with each jump for the desired number of repetitions."]],["Dumbbell Preacher Curl","0372-jivWf8n","biceps","forearms",["forearms"],["Sit on a preacher curl bench with your upper arms resting on the pad and your chest against it.","Hold a dumbbell in each hand with your palms facing up and your arms fully extended.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Preacher Curl Over Exercise Ball","1673-hwygydB","biceps","forearms",["forearms"],["Sit on an exercise ball with your feet flat on the ground and your back straight.","Hold a dumbbell in one hand with an underhand grip, resting your elbow on the exercise ball.","Keeping your upper arm stationary, exhale and curl the dumbbell up towards your shoulder.","Pause for a moment at the top, then inhale and slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell Press On Exercise Ball","1293-O8o7q4d","pectorals","shoulders",["shoulders","triceps"],["Sit on an exercise ball with your feet flat on the ground and dumbbells in each hand, resting on your thighs.","Slowly walk your feet forward, rolling the exercise ball until your lower back is supported on the ball and your knees are at a 90-degree angle.","Raise the dumbbells to shoulder height, palms facing forward.","Press the dumbbells upward until your arms are fully extended.","Pause for a moment at the top, then slowly lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Pronate-grip Triceps Extension","0373-bpJL2Qs","triceps","forearms",["forearms"],["Sit on a bench or chair with your back straight and feet flat on the ground.","Hold a dumbbell with both hands, palms facing down, and extend your arms straight up overhead.","Keeping your upper arms close to your head and elbows pointing forward, slowly lower the dumbbell behind your head by bending your elbows.","Pause for a moment, then extend your arms back up to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Prone Incline Curl","0374-mwpPcr1","biceps","forearms",["forearms"],["Adjust the bench to a 45-degree incline.","Lie face down on the bench with your chest and stomach resting against it.","Hold a dumbbell in each hand with your palms facing down and your arms fully extended.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the weights until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Prone Incline Hammer Curl","1674-cWemPG8","biceps","forearms",["forearms"],["Adjust the bench to a 45-degree incline.","Lie face down on the bench with a dumbbell in each hand, palms facing each other.","Allow your arms to hang straight down towards the floor, keeping your elbows slightly bent.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Pullover","0375-9XjtHvS","pectorals","latissimus dorsi",["latissimus dorsi","triceps"],["Lie flat on a bench with your head at one end and your feet on the floor.","Hold a dumbbell with both hands and extend your arms straight above your chest.","Keeping a slight bend in your elbows, slowly lower the dumbbell behind your head until you feel a stretch in your chest and shoulders.","Pause for a moment, then raise the dumbbell back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Pullover Hip Extension On Exercise Ball","1294-lI7easp","pectorals","triceps",["triceps","shoulders","core"],["Sit on an exercise ball with your feet flat on the ground and the dumbbell resting on your thighs.","Slowly walk your feet forward, rolling the exercise ball down your back until your head, neck, and upper back are supported on the ball.","Hold the dumbbell with both hands and extend your arms straight up over your chest, keeping a slight bend in your elbows.","Lower the dumbbell behind your head, keeping your arms straight and maintaining control.","Pause for a moment, then raise the dumbbell back to the starting position.","While keeping your arms extended, lift your hips off the ground, squeezing your glutes and engaging your core.","Lower your hips back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Pullover On Exercise Ball","1295-FSD6PGL","pectorals","triceps",["triceps","latissimus dorsi"],["Sit on an exercise ball and hold a dumbbell with both hands above your chest, arms extended.","Slowly lower the dumbbell behind your head while keeping your arms straight.","Pause for a moment, then raise the dumbbell back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Push Press","1700-FS63wTN","delts","triceps",["triceps","core"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand at shoulder level.","Bend your knees slightly and dip your body down, then explosively extend your legs and press the dumbbells overhead.","Lock out your arms at the top of the movement, then lower the dumbbells back to shoulder level.","Repeat for the desired number of repetitions."]],["Dumbbell Raise","0376-c9MnDRp","delts","traps",["traps","rhomboids"],["Stand with your feet shoulder-width apart and hold a dumbbell in each hand, palms facing your body.","Keep your back straight and engage your core.","Raise your arms out to the sides until they are parallel to the floor, keeping a slight bend in your elbows.","Pause for a moment at the top, then slowly lower your arms back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Rear Delt Raise","2292-mu5Guxt","delts","trapezius",["trapezius","rhomboids"],["Stand with your feet shoulder-width apart and hold a dumbbell in each hand, palms facing your body.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Raise your arms out to the sides, keeping a slight bend in your elbows, until they are parallel to the floor.","Pause for a moment at the top, then slowly lower your arms back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Rear Delt Row_shoulder","0377-EKXOMEh","delts","trapezius",["trapezius","rhomboids"],["Stand with your feet shoulder-width apart and knees slightly bent.","Hold a dumbbell in each hand with your palms facing your body.","Bend forward at the waist, keeping your back straight and your core engaged.","Extend your arms straight down towards the floor, with a slight bend in your elbows.","Raise the dumbbells out to the sides, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Rear Fly","0378-8DiFDVA","delts","trapezius",["trapezius","rhomboids"],["Stand with your feet shoulder-width apart and hold a dumbbell in each hand.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Extend your arms straight down towards the ground, palms facing each other.","Keeping a slight bend in your elbows, lift your arms out to the sides and squeeze your shoulder blades together.","Pause for a moment at the top, then slowly lower your arms back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Rear Lateral Raise","0380-v1qBec9","delts","traps",["traps","rhomboids"],["Stand with your feet shoulder-width apart and hold a dumbbell in each hand, palms facing your body.","Bend your knees slightly and hinge forward at the hips, keeping your back straight and core engaged.","Raise your arms out to the sides, keeping a slight bend in your elbows, until they are parallel to the floor.","Pause for a moment at the top, then slowly lower your arms back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Rear Lateral Raise (Support Head)","0379-UzkLrem","delts","traps",["traps","rhomboids"],["Stand with your feet shoulder-width apart and hold a dumbbell in each hand.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Raise your arms out to the sides, keeping a slight bend in your elbows, until they are parallel to the ground.","Pause for a moment at the top, then slowly lower your arms back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Rear Lunge","0381-SSsBDwB","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand.","Take a step backward with your right foot, lowering your body into a lunge position.","Bend your left knee and lower your body until your left thigh is parallel to the ground.","Pause for a moment, then push through your left heel to return to the starting position.","Repeat on the other side, stepping back with your left foot."]],["Dumbbell Revers Grip Biceps Curl","0382-e4ojVhP","biceps","forearms",["forearms"],["Stand up straight with a dumbbell in each hand, palms facing down and arms fully extended.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the weights until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Reverse Bench Press","1624-UIbGx6H","pectorals","triceps",["triceps","shoulders"],["Lie flat on a bench with your feet flat on the ground and your knees bent.","Hold a dumbbell in each hand with an overhand grip, palms facing towards your feet.","Extend your arms straight up towards the ceiling, keeping a slight bend in your elbows.","Slowly lower the dumbbells towards your chest, allowing your elbows to flare out to the sides.","Pause for a moment at the bottom, then push the dumbbells back up to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Reverse Fly","0383-EAs3xL9","delts","trapezius",["trapezius","rhomboids"],["Stand with your feet shoulder-width apart and hold a dumbbell in each hand.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Extend your arms straight down in front of you, palms facing each other.","Keeping a slight bend in your elbows, raise your arms out to the sides until they are parallel to the ground.","Pause for a moment at the top, then slowly lower your arms back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Reverse Grip Incline Bench One Arm Row","1330-ZIViNh1","upper back","biceps",["biceps","shoulders"],["Set up an incline bench at a 45-degree angle.","Place a dumbbell on the floor next to the bench.","Stand facing the bench with your feet shoulder-width apart.","Bend at the waist and place your left knee and left hand on the bench for support.","Pick up the dumbbell with your right hand using a reverse grip (palm facing down).","Keep your back straight and your core engaged.","Pull the dumbbell up towards your chest, keeping your elbow close to your body.","Squeeze your back muscles at the top of the movement.","Lower the dumbbell back down to the starting position in a controlled manner.","Repeat for the desired number of repetitions.","Switch sides and repeat the exercise with your left arm."]],["Dumbbell Reverse Grip Incline Bench Two Arm Row","1331-9pQSkH8","upper back","biceps",["biceps","forearms"],["Set up an incline bench at a 45-degree angle.","Sit on the bench with your chest against the backrest and your feet flat on the ground.","Hold a dumbbell in each hand with an underhand grip.","Lean forward and let your arms hang straight down, fully extended.","Pull the dumbbells up towards your chest, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Reverse Grip Row (Female)","2327-Nh3mvOO","upper back","biceps",["biceps","forearms"],["Stand with your feet shoulder-width apart and knees slightly bent.","Hold a dumbbell in each hand with an overhand grip, palms facing your body.","Bend forward at the waist, keeping your back straight and your core engaged.","Let your arms hang straight down, fully extended, with a slight bend in your elbows.","Pull the dumbbells up towards your chest, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Reverse Preacher Curl","0384-O8Aq69u","biceps","forearms",["forearms"],["Sit on a preacher bench with your upper arms resting on the pad and your chest against the support.","Hold a dumbbell in each hand with an underhand grip, palms facing up.","Keeping your upper arms stationary, exhale and curl the dumbbells as you contract your biceps.","Continue to curl the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Reverse Spider Curl","1675-6sMAmNv","biceps","forearms",["forearms"],["Stand up straight with a dumbbell in each hand, palms facing your body and arms fully extended.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder leve
