d amount of repetitions."]],["Thigh Adductor","Thigh_Adductor/0.jpg","adductors",["glutes","hamstrings"],["To begin, sit down on the adductor machine and select a weight you are comfortable with. When your legs are positioned properly on the leg pads of the machine, grip the handles on each side. Your entire upper body (from the waist up) should be stationary. This is the starting position.","Slowly press against the machine with your legs to move them towards each other while exhaling.","Feel the contraction for a second and begin to move your legs back to the starting position while breathing in. Note: Remember to keep your upper body stationary and avoid fast jerking motions in order to prevent any injuries from occurring.","Repeat for the recommended amount of repetitions."]],["Tire Flip","Tire_Flip/0.jpg","quadriceps",["calves","pectorals","forearms","glutes","hamstrings","lower back","delts","traps","triceps"],["Begin by gripping the bottom of the tire on the tread, and position your feet back a bit. Your chest should be driving into the tire.","To lift the tire, extend through the hips, knees, and ankles, driving into the tire and up.","As the tire reaches a 45 degree angle, step forward and drive a knee into the tire. As you do so adjust your grip to the upper portion of the tire and push it forward as hard as possible to complete the turn. Repeat as necessary."]],["Toe Touchers","Toe_Touchers/0.jpg","abs",[],["To begin, lie down on the floor or an exercise mat with your back pressed against the floor. Your arms should be lying across your sides with the palms facing down.","Your legs should be touching each other. Slowly elevate your legs up in the air until they are almost perpendicular to the floor with a slight bend at the knees. Your feet should be parallel to the floor.","Move your arms so that they are fully extended at a 45 degree angle from the floor. This is the starting position.","While keeping your lower back pressed against the floor, slowly lift your torso and use your hands to try and touch your toes. Remember to exhale while perform this part of the exercise.","Slowly begin to lower your torso and arms back down to the starting position while inhaling. Remember to keep your arms straight out pointing towards your toes.","Repeat for the recommended amount of repetitions."]],["Torso Rotation","Torso_Rotation/0.jpg","abs",[],["Stand upright holding an exercise ball with both hands. Extend your arms so the ball is straight out in front of you. This will be your starting position.","Rotate your torso to one side, keeping your eyes on the ball as you move. Now, rotate back to the opposite direction. Repeat for 10-20 repetitions."]],["Trail Running/Walking","Trail_Running_Walking/0.jpg","quadriceps",["calves","glutes","hamstrings"],["Running or hiking on trails will get the blood pumping and heart beating almost immediately. Make sure you have good shoes. While you use the muscles in your calves and buttocks to pull yourself up a hill, the knees, joints and ankles absorb the bulk of the pounding coming back down. Take smaller steps as you walk downhill, keep your knees bent to reduce the impact and slow down to avoid falling.","A 150 lb person can burn over 200 calories for 30 minutes walking uphill, compared to 175 on a flat surface. If running the trail, a 150 lb person can burn well over 500 calories in 30 minutes."]],["Trap Bar Deadlift","Trap_Bar_Deadlift/0.jpg","quadriceps",["glutes","hamstrings"],["For this exercise load a trap bar, also known as a hex bar, to an appropriate weight resting on the ground. Stand in the center of the apparatus and grasp both handles.","Lower your hips, look forward with your head and keep your chest up.","Begin the movement by driving through the heels and extend your hips and knees. Avoid rounding your back at all times.","At the completion of the movement, lower the weight back to the ground under control."]],["Tricep Dumbbell Kickback","Tricep_Dumbbell_Kickback/0.jpg","triceps",[],["Start with a dumbbell in each hand and your palms facing your torso. Keep your back straight with a slight bend in the knees and bend forward at the waist. Your torso should be almost parallel to the floor. Make sure to keep your head up. Your upper arms should be close to your torso and parallel to the floor. Your forearms should be pointed towards the floor as you hold the weights. There should be a 90-degree angle formed between your forearm and upper arm. This is your starting position.","Now, while keeping your upper arms stationary, exhale and use your triceps to lift the weights until the arm is fully extended. Focus on moving the forearm.","After a brief pause at the top contraction, inhale and slowly lower the dumbbells back down to the starting position.","Repeat the movement for the prescribed amount of repetitions."]],["Tricep Side Stretch","Tricep_Side_Stretch/0.jpg","triceps",["delts"],["Bring right arm across your body and over your left shoulder, holding your elbow with your left hand, until you feel a stretch in your tricep. Then repeat for your other arm."]],["Triceps Overhead Extension with Rope","Triceps_Overhead_Extension_with_Rope/0.jpg","triceps",[],["Attach a rope to a low pulley. After selecting an appropriate weight, grasp the rope with both hands and face away from the cable.","Position your hands behind your head with your elbows point straight up. Your elbows should start out flexed, and you can stagger your stance and lean gently away from the machine to create greater stability. This will be your starting position.","To perform the movement, extend through the elbow while keeping the upper arm in position, raising your hands above your head.","Squeeze your triceps at the top of the movement, and slowly lower the weight back to the start position."]],["Triceps Pushdown","Triceps_Pushdown/0.jpg","triceps",[],["Attach a straight or angled bar to a high pulley and grab with an overhand grip (palms facing down) at shoulder width.","Standing upright with the torso straight and a very small inclination forward, bring the upper arms close to your body and perpendicular to the floor. The forearms should be pointing up towards the pulley as they hold the bar. This is your starting position.","Using the triceps, bring the bar down until it touches the front of your thighs and the arms are fully extended perpendicular to the floor. The upper arms should always remain stationary next to your torso and only the forearms should move. Exhale as you perform this movement.","After a second hold at the contracted position, bring the bar slowly up to the starting point. Breathe in as you perform this step.","Repeat for the recommended amount of repetitions."]],["Triceps Pushdown - Rope Attachment","Triceps_Pushdown_-_Rope_Attachment/0.jpg","triceps",[],["Attach a rope attachment to a high pulley and grab with a neutral grip (palms facing each other).","Standing upright with the torso straight and a very small inclination forward, bring the upper arms close to your body and perpendicular to the floor. The forearms should be pointing up towards the pulley as they hold the rope with the palms facing each other. This is your starting position.","Using the triceps, bring the rope down as you bring each side of the rope to the side of your thighs. At the end of the movement the arms are fully extended and perpendicular to the floor. The upper arms should always remain stationary next to your torso and only the forearms should move. Exhale as you perform this movement.","After holding for a second, at the contracted position, bring the rope slowly up to the starting point. Breathe in as you perform this step.","Repeat for the recommended amount of repetitions."]],["Triceps Pushdown - V-Bar Attachment","Triceps_Pushdown_-_V-Bar_Attachment/0.jpg","triceps",[],["Attach a V-Bar to a high pulley and grab with an overhand grip (palms facing down) at shoulder width.","Standing upright with the torso straight and a very small inclination forward, bring the upper arms close to your body and perpendicular to the floor. The forearms should be pointing up towards the pulley as they hold the bar. The thumbs should be higher than the small finger. This is your starting position.","Using the triceps, bring the bar down until it touches the front of your thighs and the arms are fully extended perpendicular to the floor. The upper arms should always remain stationary next to your torso and only the forearms should move. Exhale as you perform this movement.","After a second hold at the contracted position, bring the V-Bar slowly up to the starting point. Breathe in as you perform this step.","Repeat for the recommended amount of repetitions."]],["Triceps Stretch","Triceps_Stretch/0.jpg","triceps",["lats"],["Reach your hand behind your head, grasp your elbow and gently pull. Hold for 10 to 20 seconds, then switch sides."]],["Tuck Crunch","Tuck_Crunch/0.jpg","abs",[],["To begin, lie down on the floor or an exercise mat with your back pressed against the floor. Your arms should be lying across your sides with the palms facing down.","Your legs should be crossed by wrapping one ankle around the other. Slowly elevate your legs up in the air until your thighs are perpendicular to the floor with a slight bend at the knees. Note: Your knees and toes should be parallel to the floor as opposed to the thighs.","Move your arms from the floor and cross them so they are resting on your chest. This is the starting position.","While keeping your lower back pressed against the floor, slowly lift your torso. Remember to exhale while perform this part of the exercise.","Slowly begin to lower your torso back down to the starting position while inhaling.","Repeat for the recommended amount of repetitions."]],["Two-Arm Dumbbell Preacher Curl","Two-Arm_Dumbbell_Preacher_Curl/0.jpg","biceps",[],["Grab a dumbbell with each arm and place the upper arms on top of the preacher bench or the incline bench. The dumbbell should be held at shoulder length. This will be your starting position.","As you breathe in, slowly lower the dumbbells until your upper arm is extended and the biceps is fully stretched.","As you exhale, use the biceps to curl the weights up until your biceps is fully contracted and the dumbbells are at shoulder height.","Squeeze the biceps hard for a second at the contracted position and repeat for the recommended amount of repetitions."]],["Two-Arm Kettlebell Clean","Two-Arm_Kettlebell_Clean/0.jpg","delts",["calves","glutes","hamstrings","lower back","traps"],["Place two kettlebells between your feet. To get in the starting position, push your butt back and look straight ahead.","Clean the kettlebells to your shoulders by extending through the legs and hips as you raise the kettlebells towards your shoulders. Rotate your wrists as you do so.","Lower the kettlebells back to the starting position and repeat."]],["Two-Arm Kettlebell Jerk","Two-Arm_Kettlebell_Jerk/0.jpg","delts",["calves","quadriceps","triceps"],["Clean two kettlebells to your shoulders. Clean the kettlebells to your shoulders by extending through the legs and hips as you swing the kettlebells towards your shoulders. Rotate your wrists as you do so, so that the palms face forward. Squat down a few inches and reverse the motion rapidly driving both kettlebells overhead. Immediately after the initial push, squat down again and get under the kettlebells. Once the kettlebells are locked out, stand upright to complete the exercise."]],["Two-Arm Kettlebell Military Press","Two-Arm_Kettlebell_Military_Press/0.jpg","delts",["triceps"],["Clean two kettlebells to your shoulders. Clean the kettlebells to your shoulders by extending through the legs and hips as you swing the kettlebells towards your shoulders. Rotate your wrists as you do so, so that the palms face forward.","Press the kettlebells up and out. As the kettlebells pass your head, lean into the weights so that the kettlebells are racked behind your head. Make sure to contract your lats, butt, and stomach for added stability."]],["Two-Arm Kettlebell Row","Two-Arm_Kettlebell_Row/0.jpg","upper back",["biceps","lats"],["Place two kettlebells in front of your feet. Bend your knees slightly and then push your butt out as much as possible as you bend over to get in the starting position.","Grab both kettlebells and pull them to your stomach, retracting your shoulder blades and flexing the elbows. Keep your back straight. Lower and repeat."]],["Underhand Cable Pulldowns","Underhand_Cable_Pulldowns/0.jpg","lats",["biceps","upper back","delts"],["Sit down on a pull-down machine with a wide bar attached to the top pulley. Adjust the knee pad of the machine to fit your height. These pads will prevent your body from being raised by the resistance attached to the bar.","Grab the pull-down bar with the palms facing your torso (a supinated grip). Make sure that the hands are placed closer than the shoulder width.","As you have both arms extended in front of you holding the bar at the chosen grip width, bring your torso back around 30 degrees or so while creating a curvature on your lower back and sticking your chest out. This is your starting position.","As you breathe out, pull the bar down until it touches your upper chest by drawing the shoulders and the upper arms down and back. Tip: Concentrate on squeezing the back muscles once you reach the fully contracted position and keep the elbows close to your body. The upper torso should remain stationary as your bring the bar to you and only the arms should move. The forearms should do no other work other than hold the bar.","After a second on the contracted position, while breathing in, slowly bring the bar back to the starting position when your arms are fully extended and the lats are fully stretched.","Repeat this motion for the prescribed amount of repetitions."]],["Upper Back-Leg Grab","Upper_Back-Leg_Grab/0.jpg","hamstrings",["lower back","upper back"],["While seated, bend forward to hug your thighs from underneath with both arms.","Keep your knees together and your legs extended out as you bring your chest down to your knees. You can also stretch your middle back by pulling your back away from your knees as your hugging them."]],["Upper Back Stretch","Upper_Back_Stretch/0.jpg","upper back",["upper back"],["Clasp fingers together with your thumbs pointing down, round your shoulders as you reach your hands forward."]],["Upright Barbell Row","Upright_Barbell_Row/0.jpg","delts",["traps"],["Grasp a barbell with an overhand grip that is slightly less than shoulder width. The bar should be resting on the top of your thighs with your arms extended and a slight bend in your elbows. Your back should also be straight. This will be your starting position.","Now exhale and use the sides of your shoulders to lift the bar, raising your elbows up and to the side. Keep the bar close to your body as you raise it. Continue to lift the bar until it nearly touches your chin. Tip: Your elbows should drive the motion, and should always be higher than your forearms. Remember to keep your torso stationary and pause for a second at the top of the movement.","Lower the bar back down slowly to the starting position. Inhale as you perform this portion of the movement.","Repeat for the recommended amount of repetitions."]],["Upright Cable Row","Upright_Cable_Row/0.jpg","traps",["delts"],["Grasp a straight bar cable attachment that is attached to a low pulley with a pronated (palms facing your thighs) grip that is slightly less than shoulder width. The bar should be resting on top of your thighs. Your arms should be extended with a slight bend at the elbows and your back should be straight. This will be your starting position.","Use your side shoulders to lift the cable bar as you exhale. The bar should be close to the body as you move it up. Continue to lift it until it nearly touches your chin. Tip: Your elbows should drive the motion. As you lift the bar, your elbows should always be higher than your forearms. Also, keep your torso stationary and pause for a second at the top of the movement.","Lower the bar back down slowly to the starting position. Inhale as you perform this portion of the movement.","Repeat for the recommended amount of repetitions."]],["Upright Row - With Bands","Upright_Row_-_With_Bands/0.jpg","traps",["delts"],["To begin, stand on an exercise band so that tension begins at arm's length. Grasp the handles using a pronated (palms facing your thighs) grip that is slightly less than shoulder width. The handles should be resting on top of your thighs. Your arms should be extended with a slight bend at the elbows and your back should be straight. This will be your starting position.","Use your side shoulders to lift the handles as you exhale. The handles should be close to the body as you move them up. Continue to lift the handles until they nearly touches your chin. Tip: Your elbows should drive the motion. As you lift the handles, your elbows should always be higher than your forearms. Also, keep your torso stationary and pause for a second at the top of the movement.","Lower the handles back down slowly to the starting position. Inhale as you perform this portion of the movement.","Repeat for the recommended amount of repetitions."]],["Upward Stretch","Upward_Stretch/0.jpg","delts",["pectorals","lats"],["Extend both hands straight above your head, palms touching.","Slowly push your hands up and back, keeping your back straight."]],["V-Bar Pulldown","V-Bar_Pulldown/0.jpg","lats",["biceps","upper back","delts"],["Sit down on a pull-down machine with a V-Bar attached to the top pulley.","Adjust the knee pad of the machine to fit your height. These pads will prevent your body from being raised by the resistance attached to the bar.","Grab the V-bar with the palms facing each other (a neutral grip). Stick your chest out and lean yourself back slightly (around 30-degrees) in order to better engage the lats. This will be your starting position.","Using your lats, pull the bar down as you squeeze your shoulder blades. Continue until your chest nearly touches the V-bar. Exhale as you execute this motion. Tip: Keep the torso stationary throughout the movement.","After a second hold on the contracted position, slowly bring the bar back to the starting position as you breathe in.","Repeat for the prescribed number of repetitions."]],["V-Bar Pullup","V-Bar_Pullup/0.jpg","lats",["biceps","upper back","delts"],["Start by placing the middle of the V-bar in the middle of the pull-up bar (assuming that the pull-up station you are using does not have neutral grip handles). The V-Bar handles will be facing down so that you can hang from the pull-up bar through the use of the handles.","Once you securely place the V-bar, take a hold of the bar from each side and hang from it. Stick your chest out and lean yourself back slightly in order to better engage the lats. This will be your starting position.","Using your lats, pull your torso up while leaning your head back slightly so that you do not hit yourself with the chin-up bar. Continue until your chest nearly touches the V-bar. Exhale as you execute this motion.","After a second hold on the contracted position, slowly lower your body back to the starting position as you breathe in.","Repeat for the prescribed number of repetitions."]],["Vertical Swing","Vertical_Swing/0.jpg","hamstrings",["glutes","quadriceps","delts"],["Allow the dumbbell to hang at arms length between your legs, holding it with both hands. Keep your back straight and your head up.","Swing the dumbbell between your legs, flexing at the hips and bending the knees slightly.","Powerfully reverse the motion by extending at the hips, knees, and ankles to propel yourself upward, swinging the dumbell over your head.","As you land, absorb the impact through your legs and draw the dumbbell to your torso before the next repetition."]],["Walking, Treadmill","Walking_Treadmill/0.jpg","quadriceps",["calves","glutes","hamstrings"],["To begin, step onto the treadmill and select the desired option from the menu. Most treadmills have a manual setting, or you can select a program to run. Typically, you can enter your age and weight to estimate the amount of calories burned during exercise. Elevation can be adjusted to change the intensity of the workout.","Treadmills offer convenience, cardiovascular benefits, and usually have less impact than walking outside. When walking, you should move at a moderate to fast pace, not a leisurely one. Being an activity of lower intensity, walking doesn't burn as many calories as some other activities, but still provides great benefit. A 150 lb person will burn about 175 calories walking 4 miles per hour for 30 minutes, compared to 450 calories running twice as fast. Maintain proper posture as you walk, and only hold onto the handles when necessary, such as when dismounting or checking your heart rate."]],["Weighted Ball Hyperextension","Weighted_Ball_Hyperextension/0.jpg","lower back",["glutes","hamstrings","upper back"],["To begin, lie down on an exercise ball with your torso pressing against the ball and parallel to the floor. The ball of your feet should be pressed against the floor to help keep you balanced. Place a weighted plate under your chin or behind your neck. This is the starting position.","Slowly raise your torso up by bending at the waist and lower back. Remember to exhale during this movement.","Hold the contraction on your lower back for a second and lower your torso back down to the starting position while inhaling.","Repeat for the recommended amount of repetitions prescribed in your program."]],["Weighted Ball Side Bend","Weighted_Ball_Side_Bend/0.jpg","abs",[],["To begin, lie down on an exercise ball with your left side of the torso (waist, hips and shoulder) pressed against the ball.","Your feet should be on the floor while your legs are crossed and hanging from the ball. Hold a weighted plate with your right hand directly to the right side of your head. Tip: Make sure the smooth side of the plate is resting against your head.","Place your left arm across your torso so that your palm is on your obliques. There should be a right angle between your left forearm and upper arm. This is the starting position.","Raise the side of your torso up by laterally flexing at the waist while exhaling.","Hold the contraction for a second and slowly lower yourself back down to the starting position while inhaling.","Repeat for the recommended amount of repetitions.","Switch sides and repeat the exercise."]],["Weighted Bench Dip","Weighted_Bench_Dip/0.jpg","triceps",["pectorals","delts"],["For this exercise you will need to place a bench behind your back and another one in front of you. With the benches perpendicular to your body, hold on to one bench on its edge with the hands close to your body, separated at shoulder width. Your arms should be fully extended.","The legs will be extended forward on top of the other bench. Your legs should be parallel to the floor while your torso is to be perpendicular to the floor. Have your partner place the dumbbell on your lap. Note: This exercise is best performed with a partner as placing the weight on your lap can be challenging and cause injury without assistance. This will be your starting position.","Slowly lower your body as you inhale by bending at the elbows until you lower yourself far enough to where there is an angle slightly smaller than 90 degrees between the upper arm and the forearm. Tip: Keep the elbows as close as possible throughout the movement. Forearms should always be pointing down.","Using your triceps to bring your torso up again, lift yourself back to the starting position while exhaling.","Repeat for the recommended amount of repetitions."]],["Weighted Crunches","Weighted_Crunches/0.jpg","abs",[],["Lie flat on your back with your feet flat on the ground or resting on a bench with your knees bent at a 90 degree angle.","Hold a weight to your chest, or you may hold it extended above your torso. This will be your starting position.","Now, exhale and slowly begin to roll your shoulders off the floor. Your shoulders should come up off the floor about 4 inches while your lower back remains on the floor.","At the top of the movement, flex your abdominals and hold for a brief pause.","Then inhale and slowly lower yourself back down to the starting position."]],["Weighted Jump Squat","Weighted_Jump_Squat/0.jpg","quadriceps",["calves","glutes","hamstrings","lower back"],["Position a lightly loaded barbell across the back of your shoulders. You could also use a weighted vest, sandbag, or other type of resistance for this exercise.","The weight should be light enough that it doesn't slow you down significantly. Your feet should be just outside of shoulder width with your head and chest up. This will be your starting position.","Using a countermovement, squat partially down and immediately reverse your direction to explode off of the ground, extending through your hips, knees, and ankles. Maintain good posture throughout the jump.","As you return to the ground, absorb the impact through your legs."]],["Weighted Pull Ups","Weighted_Pull_Ups/0.jpg","lats",["biceps","upper back"],["Attach a weight to a dip belt and secure it around your waist. Grab the pull-up bar with the palms of your hands facing forward. For a medium grip, your hands should be spaced at shoulder width. Both arms should be extended in front of you holding the bar at the chosen grip.","You'll want to bring your torso back about 30 degrees while creating a curvature in your lower back and sticking your chest out. This will be your starting position.","Now, exhale and pull your torso up until your head is above your hands. Concentrate on squeezing yourshoulder blades back and down as you reach the top contracted position.","After a brief moment at the top contracted position, inhale and slowly lower your torso back to the starting position with your arms extended and your lats fully stretched."]],["Weighted Sissy Squat","Weighted_Sissy_Squat/0.jpg","quadriceps",["calves","glutes","hamstrings"],["Standing upright, with feet at shoulder width and toes raised, use one hand to hold onto the beams of a squat rack and the opposite arm to hold a plate on top of your chest. This is your starting position.","As you use one arm to hold yourself, bend at the knees and slowly lower your torso toward the ground by bringing your pelvis and knees forward. Inhale as you go down and stop when your upper and lower legs almost create a 90-degree angle. Hold the stretch position for a second.","After your one second hold, use your thigh muscles to bring your torso back up to the starting position. Exhale as you move up.","Repeat for the recommended amount of times."]],["Weighted Sit-Ups - With Bands","Weighted_Sit-Ups_-_With_Bands/0.jpg","abs",[],["Start out by strapping the bands around the base of the decline bench. Place the handles towards the inside of the decline bench so that when lying down, you can reach for both of them.","Position your legs through the decline machine until they are secured. Now reach for the exercise bands with both hands. Use a pronated (palms forward) grip to grasp the handles. Position them near your collar bone and rotate your wrist to a neutral grip (palms facing the torso). Note: Your arms should remain stationary throughout the exercise. This is the starting position.","Move your torso upward until your upper body is perpendicular to the floor while exhaling. Hold the contraction for a second and lower your upper body back down to the starting position while inhaling.","Repeat for the recommended amount of repetitions."]],["Weighted Squat","Weighted_Squat/0.jpg","quadriceps",["calves","glutes","hamstrings"],["Start by positioning two flat benches shoulder width apart from each other. Stand on top of them and wrap the weighted belt around your waist with the amount of weight you feel comfortable with. Make sure your toes are facing out.","Once you are standing straight up with the weight hanging in between your legs, position your arms so that they are fully extended to the side of your body. This is the starting position.","Begin by bending the knees as you maintain a straight posture with the head up. Continue down until the angle between the upper leg and the calves becomes slightly less than 90-degrees (which is the point in which the upper legs are below parallel to the floor). Inhale as you perform this portion of the movement. Tip: If you performed the exercise correctly, the front of the knees should make an imaginary straight line with the toes that are perpendicular to the front. If your knees are past that imaginary line (if they are past your toes) then you are placing undue stress on the knee and the exercise has been performed incorrectly.","Begin to move the body back up by pushing the floor of the flat bench with the ball of your foot mainly as you straighten the legs again and go back to the starting position. Exhale as you perform this portion of the exercise.","Repeat for the recommended amount of repetitions."]],["Wide-Grip Barbell Bench Press","Wide-Grip_Barbell_Bench_Press/0.jpg","pectorals",["delts","triceps"],["Lie back on a flat bench with feet firm on the floor. Using a wide, pronated (palms forward) grip that is around 3 inches away from shoulder width (for each hand), lift the bar from the rack and hold it straight over you with your arms locked. The bar will be perpendicular to the torso and the floor. This will be your starting position.","As you breathe in, come down slowly until you feel the bar on your middle chest.","After a second pause, bring the bar back to the starting position as you breathe out and push the bar using your chest muscles. Lock your arms and squeeze your chest in the contracted position, hold for a second and then start coming down slowly again. Tip: It should take at least twice as long to go down than to come up.","Repeat the movement for the prescribed amount of repetitions."]],["Wide-Grip Decline Barbell Bench Press","Wide-Grip_Decline_Barbell_Bench_Press/0.jpg","pectorals",["delts","triceps"],["Lie back on a decline bench with the feet securely locked at the front of the bench. Using a wide, pronated (palms forward) grip that is around 3 inches away from shoulder width (for each hand), lift the bar from the rack and hold it straight over you with your arms locked. The bar will be perpendicular to the torso and the floor. This will be your starting position.","As you breathe in, come down slowly until you feel the bar on your lower chest.","After a second pause, bring the bar back to the starting position as you breathe out and push the bar using your chest muscles. Lock your arms and squeeze your chest in the contracted position, hold for a second and then start coming down slowly again. Tip: It should take at least twice as long to go down than to come up.","Repeat the movement for the prescribed amount of repetitions."]],["Wide-Grip Decline Barbell Pullover","Wide-Grip_Decline_Barbell_Pullover/0.jpg","pectorals",["delts","triceps"],["Lie down on a decline bench with both legs securely locked in position. Reach for the barbell behind the head using a pronated grip (palms facing out). Make sure to grab the barbell wider than shoulder width apart for this exercise. Slowly lift the barbell up from the floor by using your arms.","When positioned properly, your arms should be fully extended and perpendicular to the floor. This is the starting position.","Begin by moving the barbell back down in a semicircular motion as if you were going to place it on the floor, but instead, stop when the arms are parallel to the floor. Tip: Keep the arms fully extended at all times. The movement should only happen at the shoulder joint. Inhale as you perform this portion of the movement.","Now bring the barbell up while exhaling until you are back at the starting position. Remember to keep full control of the barbell at all times.","Repeat the movement for the prescribed amount of repetitions of your training program.","When finished with your set, slowly lower the barbell back down until it is level with your head and release it."]],["Wide-Grip Lat Pulldown","Wide-Grip_Lat_Pulldown/0.jpg","lats",["biceps","upper back","delts"],["Sit down on a pull-down machine with a wide bar attached to the top pulley. Make sure that you adjust the knee pad of the machine to fit your height. These pads will prevent your body from being raised by the resistance attached to the bar.","Grab the bar with the palms facing forward using the prescribed grip. Note on grips: For a wide grip, your hands need to be spaced out at a distance wider than shoulder width. For a medium grip, your hands need to be spaced out at a distance equal to your shoulder width and for a close grip at a distance smaller than your shoulder width.","As you have both arms extended in front of you holding the bar at the chosen grip width, bring your torso back around 30 degrees or so while creating a curvature on your lower back and sticking your chest out. This is your starting position.","As you breathe out, bring the bar down until it touches your upper chest by drawing the shoulders and the upper arms down and back. Tip: Concentrate on squeezing the back muscles once you reach the full contracted position. The upper torso should remain stationary and only the arms should move. The forearms should do no other work except for holding the bar; therefore do not try to pull down the bar using the forearms.","After a second at the contracted position squeezing your shoulder blades together, slowly raise the bar back to the starting position when your arms are fully extended and the lats are fully stretched. Inhale during this portion of the movement.","Repeat this motion for the prescribed amount of repetitions."]],["Wide-Grip Pulldown Behind The Neck","Wide-Grip_Pulldown_Behind_The_Neck/0.jpg","lats",["biceps","upper back","delts"],["Sit down on a pull-down machine with a wide bar attached to the top pulley. Make sure that you adjust the knee pad of the machine to fit your height. These pads will prevent your body from being raised by the resistance attached to the bar.","Grab the bar with the palms facing forward using the prescribed grip. Note on grips: For a wide grip, your hands need to be spaced out at a distance wider than your shoulder width. For a medium grip, your hands need to be spaced out at a distance equal to your shoulder width and for a close grip at a distance smaller than your shoulder width.","As you have both arms extended in front of you holding the bar at the chosen grip width, bring your torso and head forward. Think of an imaginary line from the center of the bar down to the back of your neck. This is your starting position.","As you breathe out, bring the bar down until it touches the back of your neck by drawing the shoulders and the upper arms down and back. Tip: Concentrate on squeezing the back muscles once you reach the full contracted position. The upper torso should remain stationary and only the arms should move. The forearms should do no other work except for holding the bar; therefore do not try to pull down the bar using the forearms.","After a second on the contracted position squeezing your shoulder blades together, slowly raise the bar back to the starting position when your arms are fully extended and the lats are fully stretched. Inhale during this portion of the movement.","Repeat this motion for the prescribed amount of repetitions."]],["Wide-Grip Rear Pull-Up","Wide-Grip_Rear_Pull-Up/0.jpg","lats",["biceps","upper back","delts"],["Grab the pull-up bar with the palms facing forward using a wide grip.","As you have both arms extended in front of you holding the bar, bring your torso forward and head so that there is an imaginary line from the pull-up bar to the back of your neck. This is your starting position.","Pull your torso up until the bar is near the back of your neck. To do this, draw the shoulders and upper arms down and back while slightly leaning your head forward. Exhale as you perform this portion of the movement. Tip: Concentrate on squeezing the back muscles once you reach the full contracted position. The upper torso should remain stationary as it moves through space and only the arms should move. The forearms should do no other work other than hold the bar.","After a second on the contracted position, start to inhale and slowly lower your torso back to the starting position when your arms are fully extended and the lats are fully stretched.","Repeat this motion for the prescribed amount of repetitions."]],["Wide-Grip Standing Barbell Curl","Wide-Grip_Standing_Barbell_Curl/0.jpg","biceps",[],["Stand up with your torso upright while holding a barbell at the wide outer handle. The palm of your hands should be facing forward. The elbows should be close to the torso. This will be your starting position.","While holding the upper arms stationary, curl the weights forward while contracting the biceps as you breathe out. Tip: Only the forearms should move.","Continue the movement until your biceps are fully contracted and the bar is at shoulder level. Hold the contracted position for a second and squeeze the biceps hard.","Slowly begin to bring the bar back to starting position as your breathe in.","Repeat for the recommended amount of repetitions."]],["Wide Stance Barbell Squat","Wide_Stance_Barbell_Squat/0.jpg","quadriceps",["calves","glutes","hamstrings","lower back"],["This exercise is best performed inside a squat rack for safety purposes. To begin, first set the bar on a rack that best matches your height. Once the correct height is chosen and the bar is loaded, step under the bar and place the back of your shoulders (slightly below the neck) across it.","Hold on to the bar using both arms at each side and lift it off the rack by first pushing with your legs and at the same time straightening your torso.","Step away from the rack and position your legs using a wider-than-shoulder-width stance with the toes slightly pointed out. Keep your head up at all times as looking down will get you off balance, and also maintain a straight back. This will be your starting position.","Begin to slowly lower the bar by bending the knees as you maintain a straight posture with the head up. Continue down until the angle between the upper leg and the calves becomes slightly less than 90-degrees (which is the point in which the upper legs are below parallel to the floor). Inhale as you perform this portion of the movement. Tip: If you performed the exercise correctly, the front of the knees should make an imaginary straight line with the toes that is perpendicular to the front. If your knees are past that imaginary line (if they are past your toes) then you are placing undue stress on the knee and the exercise has been performed incorrectly.","Begin to raise the bar as you exhale by pushing the floor with the heel of your foot as you straighten the legs again and go back to the starting position.","Repeat for the recommended amount of repetitions."]],["Wide Stance Stiff Legs","Wide_Stance_Stiff_Legs/0.jpg","hamstrings",["adductors","glutes","lower back"],["Begin with a barbell loaded on the floor. Adopt a wide stance, and then bend at the hips to grab the bar. Your hips should be as far back as possible, and your legs nearly straight. Keep your back straight, and your head and chest up. This will be your starting position.","Begin the movement be engaging the hips, driving them forward as you allow the arms to hang straight. Continue until you are standing straight up, and then slowly return the weight to the starting position. For successive reps, the weight need not touch the floor."]],["Wind Sprints","Wind_Sprints/0.jpg","abs",[],["Hang from a pull-up bar using a pronated grip. Your arms and legs should be extended. This will be your starting position.","Begin by quickly raising one knee as high as you can. Do not swing your body or your legs. 3","Immediately reverse the motion, returning that leg to the starting position. Simultaneously raise the opposite knee as high as possible.","Continue alternating between legs until the set is complete."]],["Windmills","Windmills/0.jpg","abductors",["glutes","hamstrings","lower back"],["Lie on your back with your arms extended out to the sides and your legs straight. This will be your starting position.","Lift one leg and quickly cross it over your body, attempting to touch the ground near the opposite hand.","Return to the starting position, and repeat with the opposite leg. Continue to alternate for 10-20 repetitions."]],["World's Greatest Stretch","Worlds_Greatest_Stretch/0.jpg","hamstrings",["calves","glutes","quadriceps"],["This is a three-part stretch. Begin by lunging forward, with your front foot flat on the ground and on the toes of your back foot. With your knees bent, squat down until your knee is almost touching the ground. Keep your torso erect, and hold this position for 10-20 seconds.","Now, place the arm on the same side as your front leg on the ground, with the elbow next to the foot. Your other hand should be placed on the ground, parallel to your lead leg, to help support you during this portion of the stretch.","After 10-20 seconds, place your hands on either side of your front foot. Raise the toes of the front foot off of the ground, and straighten your leg. You may need to reposition your rear leg to do so. Hold for 10-20 seconds, and then repeat the entire sequence for the other side."]],["Wrist Circles","Wrist_Circles/0.jpg","forearms",[],["Start by standing straight with your feet being shoulder width apart from each other. Elevate your arms to the side of you until they are fully extended and parallel to the floor at a height that is evenly aligned with your shoulders. Tip: Your torso and arms should form the letter \"T: Your palms should be facing down. This is the starting position.","Keeping your entire body stationary except for the wrists, begin to rotate both wrists forward in a circular motion. Tip: Pretend that you are trying to draw circles by using your hands as the brush. Breathe normally as you perform this exercise.","Repeat for the recommended amount of repetitions."]],["Wrist Roller","Wrist_Roller/0.jpg","forearms",["delts"],["To begin, stand straight up grabbing a wrist roller using a pronated grip (palms facing down). Your feet should be shoulder width apart.","Slowly lift both arms until they are fully extended and parallel to the floor in front of you. Note: Make sure the rope is not wrapped around the roller. Your entire body should be stationary except for the forearms. This is the starting position.","Rotate one wrist at a time in an upward motion to bring the weight up to the bar by rolling the rope around the roller.","Once the weight has reached the bar, slowly begin to lower the weight back down by rotating the wrist in a downward motion until the weight reaches the starting position.","Repeat for the prescribed amount of repetitions in your program."]],["Wrist Rotations with Straight Bar","Wrist_Rotations_with_Straight_Bar/0.jpg","forearms",[],["Hold a barbell with both hands and your palms facing down; hands spaced about shoulder width. This will be your starting position.","Alternating between each of your hands, perform the movement by extending the wrist as though you were rolling up a newspaper. Continue alternating back and forth until failure.","Reverse the motion by flexing the wrist, rolling the opposite direction. Continue the alternating motion until failure."]],["Yoke Walk","Yoke_Walk/0.jpg","quadriceps",["abs","abductors","adductors","calves","glutes","hamstrings","lower back"],["The yoke is usually done with a yoke apparatus, but is sometimes seen with refrigerators or other heavy objects.","Begin by racking the apparatus across the back of the shoulders. With your head looking forward and back arched, lift the yoke by driving through the heels.","Begin walking as quickly as possible using short, quick steps. You may hold the side posts of the yoke to help steady it and hold it in position. Continue for the given distance as fast as possible, usually 75-100 feet."]],["Zercher Squats","Zercher_Squats/0.jpg","quadriceps",["calves","glutes","hamstrings"],["This exercise is best performed inside a squat rack for safety purposes. To begin, first set the bar on a rack that best matches your height. The correct height should be anywhere above the waist but below the chest. Once the correct height is chosen and the bar is loaded, lock your hands together and place the bar on top of your arms in between the forearm and upper arm.","Lift the bar up so that it is resting on top of your forearms. If you are holding the bar properly, it should look as if you have your arms crossed but with a bar running across them.","Step away from the rack and position your legs using a shoulder width medium stance with the toes slightly pointed out. Keep your head up at all times as looking down will get you off balance and also maintain a straight back. This will be your starting position. (Note: For the purposes of this discussion we will use the medium stance described above which targets overall development; however you can choose any of the three stances discussed in the foot stances section).","Begin to lower the bar by bending the knees as you maintain a straight posture with the head up. Continue down until the angle between the upper leg and the calves becomes slightly less than 90-degrees (which is the point in which the upper legs are below parallel to the floor). Inhale as you perform this portion of the movement. Tip: If you performed the exercise correctly, the front of the knees should make an imaginary straight line with the toes that is perpendicular to the front. If your knees are past that imaginary line (if they are past your toes) then you are placing undue stress on the knee and the exercise has been performed incorrectly.","Begin to raise the bar as you exhale by pushing the floor with the ball of your foot mainly as you straighten the legs again and go back to the starting position.","Repeat for the recommended amount of repetitions."]],["Zottman Curl","Zottman_Curl/0.jpg","biceps",["forearms"],["Stand up with your torso upright and a dumbbell in each hand being held at arms length. The elbows should be close to the torso.","Make sure the palms of the hands are facing each other. This will be your starting position.","While holding the upper arm stationary, curl the weights while contracting the biceps as you breathe out. Only the forearms should move. Your wrist should rotate so that you have a supinated (palms up) grip. Continue the movement until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a second as you squeeze the biceps.","Now during the contracted position, rotate your wrist until you now have a pronated (palms facing down) grip with the thumb at a higher position than the pinky.","Slowly begin to bring the dumbbells back down using the pronated grip.","As the dumbbells close your thighs, start rotating the wrist so that you go back to a neutral (palms facing your body) grip.","Repeat for the recommended amount of repetitions."]],["Zottman Preacher Curl","Zottman_Preacher_Curl/0.jpg","biceps",["forearms"],["Grab a dumbbell in each hand and place your upper arms on top of the preacher bench or the incline bench. The dumbbells should be held at shoulder height and the elbows should be flexed. Hold the dumbbells with the palms of your hands facing down. This will be your starting position.","As you breathe in, slowly lower the dumbbells keeping the palms down until your upper arm is extended and your biceps are fully stretched.","Now rotate your wrists once you are at the bottom of the movement so that the palms of the hands are facing up.","As you exhale, use your biceps to curl the weights up until they are fully contracted and the dumbbells are at shoulder height. Again, remember that to ensure full contraction you need to bring that small finger higher than the thumb.","Squeeze the biceps hard for a second at the contracted position and rotate your wrists so that the palms are facing down again.","Repeat for the recommended amount of repetitions."]]];

async function loadCloud(){
  if(!syncOnline)return false;
  // Each table loads independently. One table failing must NOT blank the others.
  const [wsR,wtsR,sdsR,mlsR,flsR]=await Promise.allSettled([
    sbF('workouts?order=date.desc&limit=200'),
    sbF('weight_log?order=date.asc'),
    sbF('set_data?limit=5000'),
    sbF('mini_log?limit=2000'),
    sbF('food_log?order=date.desc&limit=1000')
  ]);
  const okVal=(res,label)=>{
    if(res.status==='fulfilled')return res.value;
    console.warn('[KWT] Cloud table failed:',label,res.reason&&res.reason.message);
    return null;
  };
  const ws=okVal(wsR,'workouts'),wts=okVal(wtsR,'weight_log'),
        sds=okVal(sdsR,'set_data'),mls=okVal(mlsR,'mini_log'),fls=okVal(flsR,'food_log');
  if(ws){workoutLog=ws.map(r=>({date:r.date,dayLabel:r.day_label,startTs:r.start_ts,endTs:r.end_ts,durationSec:r.duration_sec,exercises:r.exercises||[],isPast:r.is_past||false,_dbid:r.id}));ls('wlog9',workoutLog);}
  if(wts){weightLog=wts.map(r=>({date:r.date,w:parseFloat(r.weight)}));ls('wt9',weightLog);}
  if(sds){setData={};sds.forEach(r=>{setData[r.key]=r.data;});ls('sd9',setData);}
  if(mls){miniLog={};mls.forEach(r=>{miniLog[r.key]={done:r.done||false,sets:safeJ(r.sets)||[]};}); ls('ml9',miniLog);}
  if(fls){foodLog={};fls.forEach(r=>{if(!foodLog[r.date])foodLog[r.date]=[];foodLog[r.date].push({name:r.name,serving:r.serving||'',cal:r.cal||0,pro:r.pro||0,carb:r.carb||0,fat:r.fat||0,_id:r.id});});ls('fl9',foodLog);}
  // Load water from set_data
  if(sds)loadWaterFromSD();
  // Load exercise customizations (add/remove/order) from set_data
  if(sds)loadExCustomizationsFromSD();
  // Recover sessions from logged sets that never got a Finish-ed workout record
  deriveSessionsFromSets();
  const anyOk=[ws,wts,sds,mls,fls].some(v=>v!==null);
  if(anyOk)console.log('[KWT] Cloud loaded | workouts:',workoutLog.length,'| weights:',weightLog.length,'| foods:',Object.keys(foodLog).length);
  else console.warn('[KWT] Cloud load failed: all tables errored');
  return anyOk;
}

// Vertical gradient fill (color → transparent) for Chart.js area fills.
function chartGrad(color, topAlpha){
  return (c)=>{
    const ch=c.chart, area=ch.chartArea; if(!area)return color+'00';
    const g=ch.ctx.createLinearGradient(0, area.top, 0, area.bottom);
    g.addColorStop(0, color+topAlpha);
    g.addColorStop(1, color+'00');
    return g;
  };
}

function startWorkout(){
  workoutActive=true;

}

function startWoTimer(){
  // Clear any existing interval
  if(workoutInterval)clearInterval(workoutInterval);
  // Use 1s interval — on resume, updateWoTimer recalculates from stored start time
  workoutInterval=setInterval(updateWoTimer, 1000);
  updateWoTimer(); // immediate first tick
}

function updateWoTimer(){
  if(!workoutActive)return;
  // Always calculate from stored start — survives iOS suspension
  const stored=localStorage.getItem('_woStart');
  const start=stored?parseInt(stored):workoutStart;
  const elapsed=Math.floor((Date.now()-start)/1000);
  const el=document.getElementById('wtbTime');
  if(el)el.textContent=fmtDur(elapsed);
  // Also update workoutStart in memory to match persisted value
  if(stored)workoutStart=parseInt(stored);
}
function endWorkout(){
  if(!workoutActive)return;

  const dur=Math.floor((Date.now()-workoutStart)/1000);
  if(currentWorkout){
    currentWorkout.endTs=Date.now();currentWorkout.durationSec=dur;currentWorkout._cid=workoutStart.toString(36);
    const d=carDay!==null?carDay:dow();const tk=todayKey();
    currentWorkout.exercises=getExOrder(d,tk).map(ex=>{
      const sets=[];const p=parseInt(ex.sets)||3;
      for(let j=0;j<p+10;j++){const k=sk(tk,ex._uid,j);if(setData[k]&&setData[k].done)sets.push({reps:setData[k].reps||0,weight:setData[k].weight||0});}
      return{name:ex.name,sets};
    }).filter(e=>e.sets.length>0);
    workoutLog.unshift(currentWorkout);
    if(workoutLog.length>200)workoutLog=workoutLog.slice(0,200);
    ls('wlog9',workoutLog);sbSaveWo(currentWorkout);
    _lastWoDate=currentWorkout.date;_lastWoDur=dur;
  }
  workoutActive=false;workoutStart=null;currentWorkout=null;workoutSessionDate=null;
  localStorage.removeItem('_woStart');

}

function exportData(){

  const blob=new Blob([JSON.stringify({_kwt:1,exported:new Date().toISOString(),data},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='kwt-backup-'+todayKey()+'.json';

function importData(e){
  const f=e.target.files&&e.target.files[0];e.target.value='';if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    let d;try{const j=JSON.parse(r.result);d=j.data||j;}catch(err){return alert('Invalid backup file.');}
    if(!d||typeof d!=='object')return alert('Invalid backup file.');
    if(!confirm('Restore this backup? Overwrites current local data, then reloads.'))return;
    try{Object.keys(d).forEach(k=>localStorage.setItem(k,d[k]));}catch(err){return alert('Restore failed: '+err.message);}
    alert('Backup restored. Reloading.');location.reload();
  };
  r.readAsText(f);
}

// Save (or update) a real workout record for a past date from the day view.
// Pulls in every set marked done for that date, plus a manual duration.
function saveDaySession(tk,d){
  const minEl=document.getElementById('daySessMin');
  const min=parseInt(minEl&&minEl.value)||0;
  const s=SCH[d];
  const order=getExOrder(d,tk);
  const exercises=order.map(ex=>{
    const sets=[];const p=parseInt(ex.sets)||3;
    for(let j=0;j<p+10;j++){const k=sk(tk,ex._uid,j);if(setData[k]&&setData[k].done)sets.push({reps:setData[k].reps||0,weight:setData[k].weight||0});}
    return{name:ex.name,sets};
  }).filter(e=>e.sets.length>0);
  if(!exercises.length&&!min){alert('Check off at least one set (✓) or enter a duration first.');return;}
  // Replace any existing entry for this date (real OR derived); reuse its ids so
  // we PATCH the same cloud row instead of inserting duplicates.
  let dbid=null,cid=null;
  for(let i=workoutLog.length-1;i>=0;i--){
    if(workoutLog[i].date===tk){
      if(workoutLog[i]._dbid&&!dbid)dbid=workoutLog[i]._dbid;
      if(workoutLog[i]._cid&&!cid)cid=workoutLog[i]._cid;
      workoutLog.splice(i,1);
    }
  }
  const wo={date:tk,dayLabel:s.label,startTs:0,endTs:0,durationSec:min*60,exercises,isPast:true,_cid:cid||Date.now().toString(36)};
  if(dbid)wo._dbid=dbid;
  workoutLog.unshift(wo);workoutLog.sort((a,b)=>b.date.localeCompare(a.date));
  ls('wlog9',workoutLog);
  if(dbid)sbUpdateWo(dbid,wo);else sbSaveWo(wo);
  alert('Session saved for '+fmtDate(tk)+(min?' · '+min+' min':'')+'.');
  renderDayDetail(d);
}

// Save all three exercise customization keys for a day to Supabase
function saveExCustomizations(tk, d){
  const addedKey   = `added-exs-${tk}-${d}`;
  const removedKey = `removed-exs-${tk}-${d}`;
  const orderKey   = `order-exs-${tk}-${d}`;
  // Use sbSaveSD which upserts into set_data table
  const added   = localStorage.getItem(addedKey);
  const removed = localStorage.getItem(removedKey);
  const order   = localStorage.getItem(orderKey);
  if(added)   sbSaveSD(addedKey,   JSON.parse(added));
  if(removed) sbSaveSD(removedKey, JSON.parse(removed));
  if(order)   sbSaveSD(orderKey,   JSON.parse(order));
}

// Load exercise customizations from Supabase setData into localStorage
// Called after cloud load completes
function loadExCustomizationsFromSD(){
  Object.keys(setData).forEach(key=>{
    if(key.startsWith('added-exs-') || 
       key.startsWith('removed-exs-') || 
       key.startsWith('order-exs-')){
      // setData[key] is already the parsed value — re-stringify for localStorage
      localStorage.setItem(key, JSON.stringify(setData[key]));
    }
  });
}

// Synthesize workout sessions from logged sets for any day that has done sets
// but no real `workouts` record. Recovers days where the user logged sets but
// never pressed Finish. Idempotent: skips dates already present in workoutLog
// (real records and previously-derived ones), so it can be called repeatedly.
// Derived entries are in-memory only (marked _derived) — never pushed to cloud.
// Stable set-data key: date:exerciseUid:setIndex (uid survives add/remove/reorder).
function sk(tk,uid,j){return `${tk}:${uid}:${j}`;}
// Migrate legacy index-based keys (YYYY-MM-DD-EI-J) → uid keys (assumes plan-EI).
// In-memory + idempotent; runs on every load. Old cloud rows orphan harmlessly.
function migrateSetKeys(){
  let changed=false;
  Object.keys(setData).forEach(k=>{
    const m=k.match(/^(\d{4}-\d{2}-\d{2})-(\d+)-(\d+)$/);
    if(!m)return;
    const nk=`${m[1]}:plan-${m[2]}:${m[3]}`;
    if(setData[nk]===undefined)setData[nk]=setData[k];
    delete setData[k];changed=true;
  });
  if(changed)ls('sd9',setData);
}
function deriveSessionsFromSets(){
  migrateSetKeys();
  const have=new Set(workoutLog.map(w=>w.date));
  const byDate={};
  Object.keys(setData).forEach(k=>{
    const m=k.match(/^(\d{4}-\d{2}-\d{2}):([^:]+):(\d+)$/);   // date:uid:setIndex
    if(!m)return;
    const sd=setData[k];
    if(!sd||!sd.done)return;                 // only count completed sets
    const date=m[1],uid=m[2];
    (byDate[date]=byDate[date]||{});
    (byDate[date][uid]=byDate[date][uid]||[]).push({reps:sd.reps||0,weight:sd.weight||0});
  });
  Object.keys(byDate).forEach(date=>{
    if(have.has(date))return;                // real record wins, and prevents dupes
    const d=new Date(date+'T12:00:00').getDay();
    const order=getExOrder(d,date);          // effective exercise list (add/remove/reorder)
    const exMap=byDate[date];
    const exercises=Object.keys(exMap).map(uid=>{
      const ex=order.find(e=>e._uid===uid);
      return {name:ex?ex.name:'Exercise',sets:exMap[uid]};
    }).filter(e=>e.sets.length);
    if(!exercises.length)return;
    const label=(SCH[d]&&SCH[d].label)||'Logged Session';
    workoutLog.push({date,dayLabel:label,startTs:0,endTs:0,durationSec:0,exercises,isPast:false,_derived:true});
    have.add(date);
  });
  workoutLog.sort((a,b)=>b.date.localeCompare(a.date));
}

function removeTodayEx(d, tk, uid){
  // uid is the stable _uid of the exercise to remove
  const removedKey=`removed-exs-${tk}-${d}`;

  if(uid.startsWith('plan-')){
    // Plan exercise: store its original index in the removed set

    // Added exercise: remove by _uid
    const addedExs=JSON.parse(localStorage.getItem(addedKey)||'[]');
    const filtered=addedExs.filter(e=>e._uid!==uid);
    localStorage.setItem(addedKey,JSON.stringify(filtered));
  }
  renderDayDetail(d);
}

// Build rows for the Add-Exercise list. Filters by query, caps at 80 so the
// full 1,360-entry library never renders thousands of DOM nodes at once.
// onclick uses the GLOBAL index into _aeNames so doAddEx stays correct.
function aeRowsFor(q){
  q = (q||'').toLowerCase().trim();
  const names = window._aeNames || [];
  const CAP = 80;
  let html = '', shown = 0;
  for(let idx=0; idx<names.length; idx++){
    const name = names[idx];
    if(q && !name.toLowerCase().includes(q)) continue;
    const exd = EX_DB[name]; if(!exd) continue;
    const ac = MC[exd.target] || '#5F65D9';
    html += `<div onclick="doAddEx(${idx})" style="display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:0.5px solid var(--bd);cursor:pointer;-webkit-tap-highlight-color:rgba(189,242,75,0.15);user-select:none;-webkit-user-select:none">
      <div style="width:48px;height:48px;border-radius:10px;overflow:hidden;background:#141416;flex-shrink:0"><img src="${exd.gif}" onerror="this.onerror=null;this.src='${exd.img}'" style="width:100%;height:100%;object-fit:cover" loading="lazy"/></div>
      <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">${name}</div>
        <div style="margin-top:4px"><span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:${ac}22;color:${ac}">${exd.target}</span></div></div>
      <div style="color:var(--grn);font-size:22px;font-weight:300;padding-right:4px">+</div>
    </div>`;
    if(++shown >= CAP) break;
  }
  if(!shown) return '<div style="padding:18px;color:var(--mu);font-size:13px;text-align:center">No matches.</div>';
  if(!q && names.length>CAP) html += `<div style="padding:12px;color:var(--mu);font-size:12px;text-align:center">Showing first ${CAP}. Type to search all ${names.length}.</div>`;
  else if(shown>=CAP) html += `<div style="padding:12px;color:var(--mu);font-size:12px;text-align:center">Showing first ${CAP} matches — refine search.</div>`;
  return html;
}

// ── DRAG TO REORDER EXERCISES ─────────────────────────────────────────────
let dragSrcIdx=null,touchDragIdx=null,touchClone=null;

function getExOrder(d,tk){
  const s=SCH[d];
  // Plan exercises: identified by original index, removedSet stores those indices
  const removedSet=new Set(JSON.parse(localStorage.getItem(`removed-exs-${tk}-${d}`)||'[]'));
  // Added exercises: each has a stable _uid assigned at creation
  const addedExs=JSON.parse(localStorage.getItem(`added-exs-${tk}-${d}`)||'[]');
  // Build combined list with stable _uid on every item
  const baseExs=s.exercises
    .map((e,i)=>({...e,_src:'plan',_planIdx:i,_uid:`plan-${i}`}))
    .filter(e=>!removedSet.has(e._planIdx));
  const addedWithSrc=addedExs.map((e,i)=>({...e,_src:'added',_uid:e._uid||`added-${i}`}));
  const allExs=[...baseExs,...addedWithSrc];
  // Apply saved display order (stored as _uid array)
  const orderKey=`order-exs-${tk}-${d}`;
  const savedOrder=JSON.parse(localStorage.getItem(orderKey)||'null');
  if(!savedOrder)return allExs;
  const reordered=[];
  savedOrder.forEach(uid=>{const ex=allExs.find(e=>e._uid===uid);if(ex)reordered.push(ex);});
  // Append any new items not yet in saved order
  allExs.forEach(e=>{if(!reordered.find(r=>r._uid===e._uid))reordered.push(e);});
  return reordered;
}

function saveExOrder(d,tk,exs){
  // Save order as array of _uids (stable identifiers)
  localStorage.setItem(`order-exs-${tk}-${d}`,JSON.stringify(exs.map(e=>e._uid)));
}

function dragStart(e,d,ei,tk){
  dragSrcIdx=ei;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',ei);
}
function dragOver(e,d,ei){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.ex-card').forEach(c=>c.classList.remove('drag-over'));
  e.currentTarget.closest('.ex-card')?.classList.add('drag-over');
}
function dragDrop(e,d,ei,tk){
  e.preventDefault();
  if(dragSrcIdx===null||dragSrcIdx===ei)return;
  const exs=getExOrder(d,tk);
  const [moved]=exs.splice(dragSrcIdx,1);
  exs.splice(ei,0,moved);
  saveExOrder(d,tk,exs); // saveExOrder now uses _uid internally
  dragSrcIdx=null;
  renderDayDetail(d);
}
function dragEnd(e,d,ei){
  dragSrcIdx=null;
  document.querySelectorAll('.ex-card').forEach(c=>{
    c.classList.remove('dragging');c.classList.remove('drag-over');
  });
}

// Touch drag support for iOS
function touchDragStart(e,d,ei,tk){
  e.stopPropagation();
  touchDragIdx=ei;
  const card=e.currentTarget.closest('.ex-card');
  if(card){
    touchClone=card.cloneNode(true);
    touchClone.style.cssText=`position:fixed;opacity:0.8;pointer-events:none;width:${card.offsetWidth}px;z-index:999;left:${card.getBoundingClientRect().left}px;top:${card.getBoundingClientRect().top}px`;
    document.body.appendChild(touchClone);
    card.classList.add('dragging');
  }
}
function touchDragMove(e,d,ei){
  e.preventDefault();
  if(!touchClone)return;
  const t=e.touches[0];
  touchClone.style.left=t.clientX-touchClone.offsetWidth/2+'px';
  touchClone.style.top=t.clientY-30+'px';
  // Highlight target
  document.querySelectorAll('.ex-card').forEach(c=>c.classList.remove('drag-over'));
  const el=document.elementFromPoint(t.clientX,t.clientY);
  const targetCard=el?.closest('.ex-card');
  if(targetCard&&!targetCard.classList.contains('dragging'))targetCard.classList.add('drag-over');
}
function touchDragEnd(e,d,ei,tk){
  if(touchClone){touchClone.remove();touchClone=null;}
  document.querySelectorAll('.ex-card').forEach(c=>{c.classList.remove('dragging');c.classList.remove('drag-over');});
  if(touchDragIdx===null)return;
  const t=e.changedTouches[0];
  const el=document.elementFromPoint(t.clientX,t.clientY);
  const targetCard=el?.closest('.ex-card');
  if(targetCard){
    const cards=[...document.querySelectorAll('#exList .ex-card')];
    const targetIdx=cards.indexOf(targetCard);
    if(targetIdx>=0&&targetIdx!==touchDragIdx){
      const exs=getExOrder(d,tk);
      const [moved]=exs.splice(touchDragIdx,1);
      exs.splice(targetIdx,0,moved);
      saveExOrder(d,tk,exs);
    }
  }
  touchDragIdx=null;
  renderDayDetail(d);
}

// Find the most recent time an exercise was performed BEFORE the given date.
// Scans workoutLog (real + derived sessions). Returns {reps,weight,date} of the
// last set of that session, or null if never performed before.
function lastExPerf(name,beforeDate){
  let best=null;
  for(const w of workoutLog){
    if(!w.exercises||(beforeDate&&w.date>=beforeDate))continue;
    const ex=w.exercises.find(e=>e.name===name&&e.sets&&e.sets.length);
    if(!ex)continue;
    if(!best||w.date>best.date){const ls=ex.sets[ex.sets.length-1];best={date:w.date,reps:ls.reps,weight:ls.weight};}
  }
  return best;
}
// ── ANALYTICS: 1RM, PRs, per-exercise history, set-vs-last, muscle heat ──
function est1RM(w,r){w=parseFloat(w)||0;r=parseInt(r)||0;if(!w||!r)return 0;return Math.round(w*(1+r/30));}
// Per-session summary for an exercise across all logged sessions (asc by date).
function exSessions(name){
  const out=[];
  workoutLog.forEach(w=>{
    if(!w.exercises)return;
    const ex=w.exercises.find(e=>e.name===name&&e.sets&&e.sets.length);
    if(!ex)return;
    let best=0,topW=0,topR=0,vol=0;
    ex.sets.forEach(s=>{const e=est1RM(s.weight,s.reps);if(e>best){best=e;topW=parseFloat(s.weight)||0;topR=parseInt(s.reps)||0;}vol+=(parseFloat(s.weight)||0)*(parseInt(s.reps)||0);});
    out.push({date:w.date,e1rm:best,topW,topR,vol,sets:ex.sets.length});
  });
  out.sort((a,b)=>a.date.localeCompare(b.date));
  return out;
}
function exPR(name){const s=exSessions(name);if(!s.length)return null;let pr=s[0];s.forEach(x=>{if(x.e1rm>pr.e1rm)pr=x;});return pr;}
// Full set list of the most recent prior session (for set-vs-last feedback).
function lastExSets(name,beforeDate){
  let best=null;
  for(const w of workoutLog){
    if(!w.exercises||(beforeDate&&w.date>=beforeDate))continue;
    const ex=w.exercises.find(e=>e.name===name&&e.sets&&e.sets.length);
    if(!ex)continue;
    if(!best||w.date>best.date)best={date:w.date,sets:ex.sets};
  }
  return best;
}
function deltaBadge(cur,prev){
  const a=est1RM(cur.weight,cur.reps),b=est1RM(prev.weight,prev.reps);
  if(!a||!b)return '';
  if(a>b)return '<span style="color:#BDF24B;font-weight:700">↑</span>';

// Weekly (last 7d) set volume per muscle target + per body-part, split front/back.
function weeklyPartVol(){
  const cutoff=(()=>{const d=new Date(Date.now()-7*864e5);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;})();
  const front={},back={},byTarget={};
  workoutLog.forEach(w=>{
    if(w.date<cutoff||!w.exercises)return;
    w.exercises.forEach(ex=>{
      const exd=EX_DB[ex.name];const tgt=exd&&exd.target;if(!tgt)return;
      const sets=ex.sets?ex.sets.length:0;
      byTarget[tgt]=(byTarget[tgt]||0)+sets;
      const b=bhFor(tgt);if(!b.slugs.length)return;
      const bucket=b.view==='back'?back:front;
      b.slugs.forEach(s=>{bucket[s]=(bucket[s]||0)+sets;});
    });
  });
  return {front,back,byTarget};
}
function heatCol(v,max){if(!v)return null;const t=Math.min(1,v/Math.max(max,1));return `rgba(189,242,75,${(0.3+0.6*t).toFixed(2)})`;}

function nutChangeDay(delta){
  const current=new Date((nutritionDate||todayKey())+'T12:00:00');
  current.setDate(current.getDate()+delta);
  const y2=current.getFullYear(),m2=String(current.getMonth()+1).padStart(2,'0'),d2=String(current.getDate()).padStart(2,'0');const newDate=`${y2}-${m2}-${d2}`;
  // Don't go past today
  if(newDate>todayKey())return;
  // Don't go before plan start
  if(newDate<'2026-06-01')return;
  nutritionDate=newDate;
  // Load food for this date from cloud if not already cached
  loadFoodForDate(newDate).then(()=>renderNutrition());
}
function nutGoToToday(){
  nutritionDate=todayKey();
  renderNutrition();
}
async function loadFoodForDate(date){
  // Check if we already have data for this date in cache
  // (could be empty — that's fine, just means no food logged)
  if(foodLog[date]!==undefined)return; // already loaded (even if empty array)
  if(!syncOnline)return;
  try{
    const rows=await sbF(`food_log?date=eq.${date}&order=created_at.asc`);
    foodLog[date]=rows.map(r=>({
      name:r.name,serving:r.serving||'',
      cal:r.cal||0,pro:r.pro||0,carb:r.carb||0,fat:r.fat||0,
      _id:r.id
    }));
    ls('fl9',foodLog);
  }catch(e){
    console.warn('[KWT] loadFoodForDate failed:',e.message);
    foodLog[date]=[]; // Mark as loaded but empty to avoid repeated fetches
  }
}

const PHASE_RANGES=[
  {s:'2026-06-01',e:'2026-08-31',c:'rgba(95,101,217,0.12)',tc:'#5F65D9',n:'Phase 1'},
  {s:'2026-09-01',e:'2026-11-30',c:'rgba(189,242,75,0.12)',tc:'#BDF24B',n:'Phase 2'},
  {s:'2026-12-01',e:'2027-03-31',c:'rgba(251,191,36,0.12)',tc:'#fbbf24',n:'Phase 3'},
  {s:'2027-04-01',e:'2027-06-25',c:'rgba(167,139,250,0.12)',tc:'#a78bfa',n:'Phase 4'},
];
function phaseOfDate(ds){for(let i=0;i<PHASE_RANGES.length;i++){if(ds>=PHASE_RANGES[i].s&&ds<=PHASE_RANGES[i].e)return i;}return-1;}
function sessionType(lbl){
  if(!lbl)return'';const l=lbl.toLowerCase();
  if(l.includes('push'))return'Push';if(l.includes('pull'))return'Pull';
  if(l.includes('leg'))return'Legs';if(l.includes('full'))return'Full';
  if(l.includes('core')||l.includes('recovery'))return'Core';
  if(l.includes('cardio'))return'Cardio';return lbl.split('—')[0].trim().slice(0,5);
}

function logDayFromCal(ds){

  carDay=new Date(ds+'T12:00:00').getDay();

  closeModal('calModal');

function renderCalendar(){
  const MY=['January','February','March','April','May','June','July','August','September','October','November','December'];
  let tm=5+calOffset,ty=2026+Math.floor(tm/12);tm=tm%12;
  const now=new Date();const ts=todayKey();
  const fd=new Date(ty,tm,1).getDay(),dim=new Date(ty,tm+1,0).getDate();
  const woMap={};workoutLog.forEach(w=>{woMap[w.date]={dur:w.durationSec||0,lbl:w.dayLabel||''};});
  const msStr=`${ty}-${String(tm+1).padStart(2,'0')}-01`;
  const pi=phaseOfDate(msStr);const pn=pi>=0?PHASE_RANGES[pi].n:'';const ptc=pi>=0?PHASE_RANGES[pi].tc:'var(--mu)';
  let html=`<div class="cal-wrap">
    <div class="cal-month-nav">
      <button class="cal-nav-btn" onclick="moveCalMonth(-1)" ${calOffset<=0?'disabled style="opacity:0.3"':''}>‹</button>
      <div style="text-align:center"><div class="cal-month-title">${MY[tm]} ${ty}</div>${pn?`<div style="font-size:10px;color:${ptc};font-weight:500;margin-top:1px">${pn}</div>`:''}</div>
      <button class="cal-nav-btn" onclick="moveCalMonth(1)" ${calOffset>=12?'disabled style="opacity:0.3"':''}>›</button>
    </div>
    <div class="cal-grid">`;
  ['Mo','Tu','We','Th','Fr','Sa','Su'].forEach(d=>html+=`<div class="cal-dow">${d}</div>`);
  // Monday-first offset (getDay: Sun=0 → 6, Mon=1 → 0 …)
  const lead=(new Date(ty,tm,1).getDay()+6)%7;
  for(let i=0;i<lead;i++)html+=`<div class="cal-c empty"></div>`;
  for(let day=1;day<=dim;day++){
    const ds=`${ty}-${String(tm+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dt=new Date(ds+'T12:00:00'),isT=ds===ts,isFut=dt>now;
    const isWed=ds==='2027-06-25',isSt=ds==='2026-06-01';
    const isWkd=!!woMap[ds];
    let cls='cal-c',style='';
    if(isFut)cls+=' future';
    else if(isWkd)cls+=' trained';                          // green fill
    else if(isSt){/* gold below */}
    else if(ds>='2026-06-02'&&ds<ts)cls+=' missed';         // past, not trained → orange (today excluded)
    if(isSt)style='background:#fbbf24;color:#0D0D0D';
    if(isWed)style='background:#a78bfa;color:#0D0D0D';
    if(isT)cls+=' tdy';                                      // today ring
    const loggable=ds<=ts;if(loggable)cls+=' tap';
    html+=`<div class="${cls}" style="${style}" ${loggable?`onclick="logDayFromCal('${ds}')"`:''}>${day}</div>`;
  }
  html+=`</div></div>
  <div class="cal-legend" style="margin-top:14px">
    <div class="cal-legend-item"><span class="cal-key" style="background:#BDF24B"></span>Trained</div>
    <div class="cal-legend-item"><span class="cal-key" style="background:#FF9500"></span>Missed</div>
    <div class="cal-legend-item"><span class="cal-key" style="background:#323232;outline:2px solid var(--acc);outline-offset:-2px"></span>Today</div>
    <div class="cal-legend-item"><span style="color:#fbbf24">⭐</span> Start <span style="color:#a78bfa;margin-left:4px">💍</span> Wedding</div>
  </div>`;
  document.getElementById('calContent').innerHTML=html;
}
function moveCalMonth(d){calOffset=Math.max(0,Math.min(12,calOffset+d));renderCalendar();}
