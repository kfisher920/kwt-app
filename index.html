keeping your arms extended and your back straight.","As you rotate, extend your right arm forward and your left arm back, mimicking the motion of drawing a bowstring.","Hold the position for a moment, then return to the starting position.","Repeat the motion, this time rotating your torso to the left and extending your left arm forward and your right arm back.","Continue alternating sides for the desired number of repetitions."]],["Standing Behind Neck Press","0788-xDh0lJr","delts","triceps",["triceps","upper back"],["Stand with your feet shoulder-width apart and hold the barbell behind your neck with an overhand grip.","Keep your back straight and core engaged.","Press the barbell overhead by extending your arms, fully extending your elbows.","Pause for a moment at the top, then slowly lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Standing Calf Raise (On A Staircase)","1490-6HmFgmx","calves","ankles",["ankles","feet"],["Stand on the edge of a step or a sturdy platform with your heels hanging off and your toes on the step.","Hold onto a railing or wall for balance if needed.","Slowly raise your heels as high as possible, lifting your body weight onto the balls of your feet.","Pause for a moment at the top, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Standing Calves","1397-XIHEoCG","calves","hamstrings",["hamstrings","glutes"],["Stand with your feet shoulder-width apart, toes pointing forward.","Raise your heels off the ground as high as possible, standing on your toes.","Hold the position for a moment, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Standing Calves Calf Stretch","1398-qOKcgVP","calves","hamstrings",["hamstrings","glutes"],["Stand facing a wall or sturdy object, about an arm's length away.","Place your hands on the wall or object at shoulder height.","Step back with one foot, keeping your heel flat on the ground.","Bend your front knee slightly and lean forward, keeping your back leg straight.","You should feel a stretch in your calf muscle.","Hold the stretch for 20-30 seconds.","Repeat on the other leg."]],["Standing Hamstring And Calf Stretch With Strap","1599-xTjr103","hamstrings","calves",["calves"],["Stand upright with your feet shoulder-width apart.","Hold the strap with both hands and place it around the ball of your foot.","Keep your leg straight and slowly lean forward from your hips, keeping your back straight.","Feel the stretch in your hamstring and calf muscles.","Hold the stretch for 20-30 seconds.","Release the stretch and repeat with the other leg.","Repeat for the desired number of repetitions."]],["Standing Lateral Stretch","0794-1jXLYEw","lats","shoulders",["shoulders","obliques"],["Stand with your feet shoulder-width apart and your knees slightly bent.","Extend your arms straight out to the sides, parallel to the ground.","Slowly lean your upper body to one side, feeling a stretch in your side and lats.","Hold the stretch for 15-30 seconds.","Return to the starting position and repeat on the other side.","Repeat for the desired number of repetitions."]],["Standing Pelvic Tilt","1364-cuKYxhu","spine","abdominals",["abdominals"],["Stand with your feet shoulder-width apart and your knees slightly bent.","Place your hands on your hips or let them hang by your sides.","Engage your core muscles and tilt your pelvis forward, pushing your lower back towards the wall behind you.","Hold the position for a few seconds, then release and return to the starting position.","Repeat for the desired number of repetitions."]],["Standing Single Leg Curl","0795-C5jncD2","hamstrings","glutes",["glutes"],["Stand with your feet hip-width apart and your hands on your hips.","Shift your weight onto your left leg and lift your right foot off the ground, bending your knee.","Slowly curl your right heel towards your glutes, squeezing your hamstring.","Pause for a moment at the top, then slowly lower your right foot back down to the starting position.","Repeat for the desired number of repetitions, then switch legs."]],["Standing Wheel Rollerout","0796-KtRomty","abs","lower back",["lower back","shoulders"],["Start by standing tall with your feet shoulder-width apart and the wheel roller in front of you.","Bend at your waist and slowly roll the wheel forward, keeping your back straight and your core engaged.","Continue rolling forward until you feel a stretch in your abs and your body is extended as far as possible.","Pause for a moment, then slowly roll the wheel back towards your body, returning to the starting position.","Repeat for the desired number of repetitions."]],["Star Jump (Male)","3223-HtfCpfi","cardiovascular system","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart and your arms by your sides.","Bend your knees slightly and jump up explosively.","As you jump, spread your legs and extend your arms out to the sides, forming a star shape with your body.","Land softly on the balls of your feet with your knees slightly bent.","Repeat for the desired number of repetitions."]],["Stationary Bike Run V. 3","2138-H1PESYI","cardiovascular system","quadriceps",["quadriceps","hamstrings","calves"],["Adjust the seat height and position to ensure proper alignment.","Place your feet on the pedals and secure them with the straps if available.","Start pedaling at a comfortable pace.","Maintain a steady rhythm and increase the resistance as desired.","Engage your core muscles to maintain stability and proper posture.","Continue pedaling for the desired duration of your workout.","Gradually decrease the resistance and slow down before coming to a complete stop.","Stretch your legs and cool down after the workout."]],["Stationary Bike Walk","0798-a8VDgLw","cardiovascular system","quadriceps",["quadriceps","hamstrings","calves"],["Adjust the seat height and position on the stationary bike to ensure proper alignment.","Place your feet on the pedals and secure them with the straps if available.","Start pedaling at a comfortable pace, keeping your back straight and core engaged.","Maintain a steady rhythm and increase the resistance level if desired.","Continue pedaling for the desired duration of your cardio workout.","Cool down by gradually reducing your pace and resistance level.","Stretch your leg muscles after the workout to prevent tightness and promote recovery."]],["Straddle Maltese","3314-HfqciZF","abs","shoulders",["shoulders","chest"],["Start by hanging from a pair of rings with your arms fully extended and your body in a straight line.","Spread your legs wide apart, forming a straddle position.","Engage your core and slowly lower your body until your arms are parallel to the ground.","Hold this position for a few seconds, then push yourself back up to the starting position.","Repeat for the desired number of repetitions."]],["Straddle Planche","3298-BL3GHeY","abs","shoulders",["shoulders","triceps","chest"],["Start in a push-up position with your hands shoulder-width apart and your feet spread wide apart.","Engage your core and slowly shift your weight forward, bringing your shoulders over your hands.","Bend your elbows and lower your body towards the ground, keeping your elbows close to your sides.","Pause for a moment at the bottom, then push through your hands to straighten your arms and lift your body back up to the starting position.","Repeat for the desired number of repetitions."]],["Straight Leg Outer Hip Abductor","1427-mQ1tBXn","abductors","glutes",["glutes","hamstrings"],["Lie on your side with your legs straight and stacked on top of each other.","Place your bottom arm under your head for support.","Engage your core and lift your top leg as high as possible without rotating your hips or leaning backward.","Pause for a moment at the top, then slowly lower your leg back down to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Superman Push-up","0803-4GqRrAk","pectorals","core",["core","shoulders"],["Start in a high plank position with your hands slightly wider than shoulder-width apart and your feet together.","Engage your core and lower your body towards the ground, keeping your elbows close to your sides.","As you lower your body, simultaneously lift your right arm and left leg off the ground, extending them straight out.","Pause for a moment at the top, then lower your arm and leg back down while pushing yourself back up to the starting position.","Repeat the movement, this time lifting your left arm and right leg.","Continue alternating sides for the desired number of repetitions."]],["Suspended Abdominal Fallout","0805-X3TCNEU","abs","obliques",["obliques","hip flexors"],["Attach a suspension trainer to a high anchor point and adjust the straps to waist height.","Stand facing away from the anchor point and hold the handles with your arms extended in front of you.","Lean forward at the waist, keeping your body straight and your core engaged.","Lower your body as far as you can while maintaining control and tension in your abs.","Pause for a moment at the bottom, then slowly raise your body back up to the starting position.","Repeat for the desired number of repetitions."]],["Suspended Push-up","0806-IaGQCrC","pectorals","triceps",["triceps","shoulders","core"],["Find a suspension trainer and adjust it to an appropriate height.","Stand facing away from the anchor point and hold the handles with an overhand grip.","Walk your feet forward, leaning your body forward until your weight is supported by the suspension trainer.","Keep your body straight from head to heels, engage your core, and lower your chest towards the handles.","Push through your chest and arms to return to the starting position.","Repeat for the desired number of repetitions."]],["Suspended Reverse Crunch","0807-R1WYG5D","abs","hip flexors",["hip flexors"],["Hang from a pull-up bar with your arms fully extended and your palms facing away from you.","Engage your core and lift your knees up towards your chest, curling your pelvis towards your ribcage.","Pause for a moment at the top, then slowly lower your knees back down to the starting position.","Repeat for the desired number of repetitions."]],["Suspended Row","0808-4OaumBr","upper back","biceps",["biceps","shoulders"],["Set up a suspension trainer at an appropriate height.","Stand facing the anchor point with your feet shoulder-width apart.","Hold the handles with an overhand grip, palms facing each other.","Lean back, keeping your body straight and your heels on the ground.","Pull your chest towards the handles, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower yourself back to the starting position.","Repeat for the desired number of repetitions."]],["Suspended Split Squat","0809-QpXqiq8","quads","glutes",["glutes","hamstrings","calves"],["Stand facing away from a suspension trainer with your feet shoulder-width apart.","Extend one leg forward and place the top of your foot in the foot cradle of the suspension trainer.","Bend your standing leg and lower your body down into a lunge position, keeping your chest up and your knee in line with your toes.","Push through your heel to return to the starting position.","Repeat for the desired number of repetitions, then switch legs."]],["Swimmer Kicks V. 2 (Male)","3433-SP3hUez","glutes","hamstrings",["hamstrings","quadriceps","calves"],["Lie face down on a mat with your arms extended overhead.","Engage your core and lift your chest and legs off the ground simultaneously.","Kick your legs up and down in a fluttering motion, as if you were swimming.","Continue kicking for the desired number of repetitions.","Lower your chest and legs back down to the starting position."]],["Swing 360","3318-tnaj0mT","cardiovascular system","shoulders",["shoulders","core"],["Stand with your feet shoulder-width apart and knees slightly bent.","Hold your arms straight out in front of you, parallel to the ground.","Engage your core and swing your arms in a circular motion, rotating your torso as you do so.","Continue the circular motion, swinging your arms and rotating your torso for the desired number of repetitions.","Remember to breathe throughout the exercise."]],["Three Bench Dip","1753-DQ0cqkT","triceps","chest",["chest","shoulders"],["Sit on a bench with your hands gripping the edge, fingers pointing forward.","Slide your butt off the bench, supporting your weight with your hands.","Bend your elbows and lower your body until your upper arms are parallel to the ground.","Push yourself back up to the starting position.","Repeat for the desired number of repetitions."]],["Tire Flip","2459-oZjMu1t","glutes","hamstrings",["hamstrings","quadriceps","core"],["Stand with your feet shoulder-width apart, facing the tire.","Bend your knees and hinge at the hips, lowering into a squat position.","Reach down and grab the bottom edge of the tire with both hands, fingers facing towards you.","Engage your glutes and leg muscles, and explosively drive through your legs to lift the tire off the ground.","As the tire flips over, use your upper body strength to guide it and maintain control.","Once the tire is fully flipped, quickly step back and reset your stance.","Repeat for the desired number of repetitions."]],["Trap Bar Deadlift","0811-jQGwmxN","glutes","hamstrings",["hamstrings","quadriceps","lower back"],["Stand with your feet shoulder-width apart and the trap bar on the ground in front of you.","Bend at the hips and knees to lower yourself down and grip the handles of the trap bar with an overhand grip.","Keep your back straight and chest up as you begin to lift the trap bar off the ground by extending your hips and knees.","As you lift, focus on driving through your heels and squeezing your glutes at the top of the movement.","Lower the trap bar back down to the ground by bending at the hips and knees, keeping your back straight throughout the movement.","Repeat for the desired number of repetitions."]],["Triceps Dip","0814-X6C6i5Y","triceps","chest",["chest","shoulders"],["Sit on the edge of a bench or chair with your hands gripping the edge, fingers pointing forward.","Slide your butt off the bench, supporting your weight with your hands.","Bend your elbows and lower your body towards the ground, keeping your back close to the bench.","Pause for a moment at the bottom, then push yourself back up to the starting position.","Repeat for the desired number of repetitions."]],["Triceps Dip (Bench Leg)","0812-VuoerH0","triceps","chest",["chest","shoulders"],["Sit on the edge of a bench with your hands gripping the edge, fingers pointing forward.","Walk your feet forward, sliding your butt off the bench, and straighten your arms.","Bend your elbows and lower your body towards the ground, keeping your back close to the bench.","Push through your palms to straighten your arms and return to the starting position.","Repeat for the desired number of repetitions."]],["Triceps Dip (Between Benches)","0813-Wgbn9qo","triceps","chest",["chest","shoulders"],["Sit on a bench with your hands gripping the edge of the bench, fingers pointing forward.","Slide your butt off the bench, supporting your weight with your hands.","Bend your elbows and lower your body towards the ground, keeping your back close to the bench.","Pause for a moment at the bottom, then push yourself back up to the starting position.","Repeat for the desired number of repetitions."]],["Triceps Dips Floor","0815-7aVz15j","triceps","chest",["chest","shoulders"],["Sit on the edge of a chair or bench with your hands next to your hips, fingers pointing forward.","Slide your butt off the front of the chair with your legs extended in front of you.","Straighten your arms, keeping a little bend in your elbows to keep tension on your triceps and off your elbow joints.","Slowly bend your elbows to lower your body toward the floor until your elbows are at about a 90-degree angle.","Once you reach the bottom of the movement, press down into the chair to straighten your elbows, returning to the starting position.","Repeat for the desired number of repetitions."]],["Triceps Press","0816-fSrPP6B","triceps","shoulders",["shoulders"],["Stand with your feet shoulder-width apart and your knees slightly bent.","Extend your arms straight out in front of you, parallel to the ground.","Bend your elbows and lower your body towards the ground, keeping your upper arms close to your sides.","Pause for a moment at the bottom, then push yourself back up to the starting position.","Repeat for the desired number of repetitions."]],["Triceps Stretch","0817-uOV3Itw","triceps","shoulders",["shoulders"],["Stand or sit upright with your back straight.","Extend one arm overhead, bending it at the elbow.","Place your opposite hand on the bent elbow and gently pull it towards your head.","Hold the stretch for 15-30 seconds, feeling a gentle stretch in your triceps.","Release the stretch and repeat on the other arm."]],["Tuck Crunch","0871-BMMolZ3","abs","hip flexors",["hip flexors"],["Lie flat on your back with your knees bent and feet flat on the ground.","Place your hands behind your head with your elbows pointing outwards.","Engaging your abs, lift your shoulder blades off the ground and bring your knees towards your chest, simultaneously curling your upper body towards your knees.","Pause for a moment at the top, then slowly lower your shoulder blades and extend your legs back to the starting position.","Repeat for the desired number of repetitions."]],["Twin Handle Parallel Grip Lat Pulldown","0818-rkg41Fb","lats","biceps",["biceps","rhomboids","rear deltoids"],["Adjust the seat height and position yourself facing the cable machine.","Grasp the handles with an overhand grip, hands shoulder-width apart.","Sit down and position your thighs under the thigh pads, keeping your feet flat on the floor.","Lean back slightly and keep your chest up, maintaining a neutral spine.","Pull the handles down towards your upper chest, squeezing your shoulder blades together.","Pause for a moment at the bottom of the movement, feeling the contraction in your lats.","Slowly release the handles and return to the starting position.","Repeat for the desired number of repetitions."]],["Twist Hip Lift","1466-AX1kB0o","glutes","obliques",["obliques","hamstrings"],["Lie on your back with your knees bent and feet flat on the ground.","Place your hands by your sides for support.","Engage your glutes and lift your hips off the ground, forming a straight line from your knees to your shoulders.","While keeping your hips lifted, twist your lower body to the right side, bringing your knees towards the ground.","Return to the starting position and repeat the twist to the left side.","Continue alternating twists for the desired number of repetitions."]],["Twisted Leg Raise","2802-C0eCeEt","abs","obliques",["obliques","hip flexors"],["Lie flat on your back with your legs extended and your arms by your sides.","Place your hands under your glutes for support.","Engage your abs and lift both legs off the ground, keeping them straight.","As you lift your legs, twist your hips to one side, bringing your legs towards your opposite shoulder.","Pause for a moment at the top, then slowly lower your legs back down to the starting position.","Repeat the movement, this time twisting your hips to the other side.","Continue alternating sides for the desired number of repetitions."]],["Twisted Leg Raise (Female)","2801-yT9tk17","abs","obliques",["obliques","hip flexors"],["Lie flat on your back with your legs extended and your arms by your sides.","Bend your knees and lift your legs off the ground, bringing them towards your chest.","As you lift your legs, twist your hips to one side, bringing your knees towards your opposite shoulder.","Pause for a moment at the top, then slowly lower your legs back down to the starting position.","Repeat the movement, this time twisting your hips to the other side.","Continue alternating sides for the desired number of repetitions."]],["Two Toe Touch (Male)","3231-p195zsJ","spine","hamstrings",["hamstrings","glutes"],["Stand with your feet shoulder-width apart and your arms extended out to the sides.","Bend forward at the waist, keeping your back straight and your knees slightly bent.","Reach down towards your toes with both hands, keeping your legs straight.","Pause for a moment at the bottom, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Upper Back Stretch","1365-GSDioYu","upper back","shoulders",["shoulders"],["Stand up straight with your feet shoulder-width apart.","Extend your arms straight in front of you, parallel to the ground.","Interlace your fingers and rotate your palms away from your body.","Slowly raise your arms overhead, keeping them straight and parallel to each other.","As you raise your arms, squeeze your shoulder blades together.","Hold the stretch for 15-30 seconds, then release and repeat."]],["Upward Facing Dog","1366-01qpYSe","spine","shoulders",["shoulders","chest"],["Lie face down on the floor with your legs extended behind you.","Place your hands on the floor next to your lower ribs, fingers pointing forward.","Press your hands firmly into the floor and straighten your arms, lifting your torso and thighs off the ground.","Roll your shoulders back and down, opening your chest and lifting your gaze towards the ceiling.","Hold this position for a few breaths, then slowly lower your body back down to the starting position.","Repeat for the desired number of repetitions."]],["V-sit On Floor","3420-ZuXu4Eq","abs","hip flexors",["hip flexors"],["Sit on the floor with your legs extended in front of you.","Lean back slightly and lift your legs off the ground, keeping them straight.","Simultaneously, lift your upper body off the ground and reach your arms towards your legs.","Hold this position for a few seconds, then slowly lower your upper body and legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Vertical Leg Raise (On Parallel Bars)","0826-ZNgOYQU","abs","hip flexors",["hip flexors"],["Hang from the parallel bars with your arms fully extended and your body straight.","Engage your core and lift your legs up in front of you, keeping them straight.","Continue lifting until your legs are parallel to the ground or slightly higher.","Pause for a moment at the top, then slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Walk Elliptical Cross Trainer","2141-rjtuP6X","cardiovascular system","quadriceps",["quadriceps","hamstrings","glutes","calves"],["Adjust the resistance level and incline of the elliptical machine to your desired settings.","Step onto the pedals of the machine and grip the handles lightly.","Begin by pushing down with your feet and pulling the handles towards your body.","Continue this motion, alternating between pushing and pulling, to simulate a walking or running motion.","Maintain a steady pace and keep your core engaged throughout the exercise.","Continue for the desired duration of your cardio workout.","Gradually decrease the intensity and speed of the machine before stepping off."]],["Walking High Knees Lunge","3655-J9zIWig","cardiovascular system","quadriceps",["quadriceps","hamstrings","glutes","calves"],["Stand with your feet hip-width apart.","Lift your right knee up towards your chest as high as you can while balancing on your left leg.","Step forward with your right foot and lower your body into a lunge position, bending both knees to a 90-degree angle.","Push off with your right foot and bring your left knee up towards your chest.","Step forward with your left foot and lower your body into a lunge position.","Continue alternating legs and lunging forward, keeping your core engaged and maintaining a steady pace.","Repeat for the desired number of repetitions."]],["Walking Lunge","1460-IZVHb27","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart.","Take a step forward with your right leg, lowering your body into a lunge position.","Keep your torso upright and your front knee aligned with your ankle.","Push off with your right foot and bring your left foot forward, stepping into a lunge position with your left leg.","Continue alternating legs and walking forward, maintaining a controlled and steady pace.","Repeat for the desired number of repetitions."]],["Walking On Incline Treadmill","3666-rjiM4L3","cardiovascular system","quadriceps",["quadriceps","hamstrings","calves"],["Adjust the incline level on the treadmill to your desired intensity.","Stand on the treadmill with your feet shoulder-width apart.","Start walking at a comfortable pace, ensuring that you maintain proper form.","Engage your core muscles and keep your back straight throughout the exercise.","Continue walking on the incline treadmill for the desired duration of your cardio workout.","Gradually decrease the incline and speed of the treadmill to cool down before stopping."]],["Walking On Stepmill","2311-j9Q5crt","cardiovascular system","quadriceps",["quadriceps","hamstrings","glutes","calves"],["Adjust the stepmill machine to a comfortable level.","Step onto the machine and place your hands on the handrails for support.","Start walking by placing one foot on a step and then the other, alternating between legs.","Maintain an upright posture and engage your core muscles.","Continue walking for the desired duration or distance.","Gradually increase the intensity or speed as you become more comfortable with the exercise.","Remember to cool down and stretch after completing the exercise."]],["Weighted Bench Dip","0830-MU9HnE7","triceps","chest",["chest","shoulders"],["Sit on a bench with your hands gripping the edge, fingers pointing forward.","Slide your butt off the bench, supporting your weight with your hands.","Lower your body by bending your elbows until your upper arms are parallel to the floor.","Push yourself back up to the starting position by straightening your arms.","Repeat for the desired number of repetitions."]],["Weighted Close Grip Chin-up On Dip Cage","2987-Gk1r408","lats","biceps",["biceps","forearms"],["Stand in front of the dip cage and grab the parallel bars with an underhand grip, hands shoulder-width apart.","Hang from the bars with your arms fully extended, feet off the ground, and body straight.","Engage your back muscles and pull your body up towards the bars, keeping your elbows close to your sides.","Continue pulling until your chin is above the bars, then pause for a moment.","Slowly lower your body back down to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Weighted Cossack Squats (Male)","3643-GWoKnIm","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet wider than shoulder-width apart and toes pointing slightly outward.","Hold a weight in front of your chest with both hands.","Shift your weight to one side and lower your body by bending the knee of the side you shifted towards, while keeping the other leg straight.","Go as low as you can while maintaining balance and keeping your chest up.","Push through the heel of the bent leg to return to the starting position.","Repeat on the other side, alternating between legs."]],["Weighted Crunch","0832-s8nrDXF","abs","obliques",["obliques"],["Lie flat on your back with your knees bent and feet flat on the ground.","Hold a weight plate or dumbbell on your chest.","Engage your abs and lift your upper body off the ground, curling forward until your shoulder blades are off the ground.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Weighted Decline Sit-up","3670-EZeDVzO","abs","hip flexors",["hip flexors","lower back"],["Lie flat on a decline bench with your feet secured under the foot pads.","Place your hands behind your head or across your chest.","Engage your abs and slowly lift your upper body off the bench, curling forward until your torso is perpendicular to the ground.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Weighted Donkey Calf Raise","0833-LmaFNZS","calves","hamstrings",["hamstrings","glutes"],["Stand on a raised platform with your toes on the edge and your heels hanging off.","Hold onto a stable object for support.","Raise your heels as high as possible by extending your ankles.","Pause for a moment at the top, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Weighted Drop Push Up","1310-PSlvNMs","pectorals","triceps",["triceps","shoulders"],["Start in a high plank position with your hands slightly wider than shoulder-width apart and your feet together.","Lower your chest towards the ground, keeping your elbows close to your body.","Once your chest is just above the ground, explosively push yourself up, lifting your hands off the ground.","As you push up, quickly move your hands out to the sides and slightly forward, allowing your body to drop down towards the ground.","Catch yourself with your hands in the wider position and immediately lower your chest towards the ground again.","Repeat the push-up motion, dropping down and catching yourself with your hands in the narrower position.","Continue alternating between the wider and narrower hand positions for the desired number of repetitions."]],["Weighted Front Plank","2135-VBAWRPG","abs","shoulders",["shoulders","lower back"],["Start by lying face down on the floor.","Place your forearms on the ground, with your elbows directly under your shoulders.","Extend your legs straight out behind you, with your toes on the ground.","Engage your core and lift your body off the ground, balancing on your forearms and toes.","Keep your body in a straight line from your head to your heels.","Hold this position for the desired amount of time.","Lower your body back down to the starting position.","Repeat for the desired number of repetitions."]],["Weighted Front Raise","0834-e4aFmFY","delts","biceps",["biceps","forearms"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand with your palms facing your thighs.","Keeping your arms straight, exhale and lift the dumbbells in front of you until they are at shoulder level.","Pause for a moment at the top, then inhale and slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Weighted Hanging Leg-hip Raise","0866-QOA0FD0","abs","hip flexors",["hip flexors","lower back"],["Hang from a pull-up bar with your arms fully extended and your palms facing away from you.","Engage your core and lift your legs up in front of you, keeping them straight.","Continue lifting until your legs are parallel to the ground or slightly higher.","Pause for a moment at the top, then slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Weighted Hyperextension (On Stability Ball)","0835-8urJS9b","spine","glutes",["glutes","hamstrings"],["Position yourself face down on a stability ball with your hips resting on the ball and your feet against a wall for stability.","Place your hands behind your head or cross them over your chest.","Engage your core and slowly lift your upper body off the ball, extending your back until your body forms a straight line.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Weighted Kneeling Step With Swing","3641-7uFJuXp","delts","triceps",["triceps","core"],["Start in a kneeling position with your knees hip-width apart and your back straight.","Hold a weight in each hand, with your arms extended straight down in front of you.","Engage your core and swing the weights up and overhead, keeping your arms straight.","Lower the weights back down to the starting position and repeat for the desired number of repetitions."]],["Weighted Lunge With Swing","3644-5WiFcYk","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart, holding a weight in each hand.","Take a step forward with your right foot, lowering your body into a lunge position.","As you lunge forward, swing the weights forward and upward, keeping your arms straight.","Push off with your right foot and return to the starting position, swinging the weights back down.","Repeat with your left foot and continue alternating legs for the desired number of repetitions."]],["Weighted Muscle Up","3286-JsOV1SU","lats","biceps",["biceps","triceps","shoulders","chest"],["Start by hanging from a pull-up bar with your palms facing away from you and your hands slightly wider than shoulder-width apart.","Engage your core and pull your body up towards the bar, leading with your chest.","As you reach the top of the movement, transition your grip so that your palms are facing towards you.","Continue pulling yourself up until your chest reaches the bar, then pause for a moment.","Slowly lower yourself back down to the starting position, maintaining control throughout the movement.","Repeat for the desired number of repetitions."]],["Weighted Muscle Up (On Bar)","3312-MCkqdKE","lats","biceps",["biceps","triceps","shoulders","forearms"],["Start by hanging from a pull-up bar with your palms facing away from you and your hands slightly wider than shoulder-width apart.","Engage your core and pull your shoulder blades down and back.","Bend your elbows and pull your chest towards the bar, keeping your body straight.","Once your chest reaches the bar, push down with your hands and drive your elbows back, lifting your body above the bar.","Pause at the top of the movement, then slowly lower yourself back down to the starting position.","Repeat for the desired number of repetitions."]],["Weighted One Hand Pull Up","3290-fXfqg1E","lats","biceps",["biceps","forearms"],["Grab the pull-up bar with an overhand grip, slightly wider than shoulder-width apart.","Hang from the bar with your arm fully extended and your body straight.","Engage your core and pull your body up towards the bar by bending your elbow and squeezing your back muscles.","Continue pulling until your chin is above the bar.","Lower your body back down to the starting position with control.","Repeat for the desired number of repetitions."]],["Weighted Overhead Crunch (On Stability Ball)","0840-xmM75XG","abs","obliques",["obliques","lower back"],["Sit on a stability ball with your feet flat on the ground and your knees bent at a 90-degree angle.","Hold a weight plate or dumbbell with both hands and extend your arms overhead.","Engage your abs and slowly curl your torso forward, bringing your chest towards your knees.","Pause for a moment at the top, then slowly lower your torso back to the starting position.","Repeat for the desired number of repetitions."]],["Weighted Pull-up","0841-HMzLjXx","lats","biceps",["biceps","forearms"],["Grab the pull-up bar with an overhand grip, slightly wider than shoulder-width apart.","Hang from the bar with your arms fully extended and your body straight.","Engage your back muscles and pull your body up towards the bar, keeping your elbows close to your body.","Continue pulling until your chin is above the bar.","Pause for a moment at the top, then slowly lower your body back down to the starting position.","Repeat for the desired number of repetitions."]],["Weighted Round Arm","0844-VLYXo8S","delts","triceps",["triceps","upper back"],["Stand with your feet shoulder-width apart and hold a dumbbell in each hand.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Raise your arms out to the sides, keeping a slight bend in your elbows.","Continue lifting your arms until they are parallel to the ground.","Pause for a moment at the top, then slowly lower your arms back down to the starting position.","Repeat for the desired number of repetitions."]],["Weighted Russian Twist","0846-fZFZ704","abs","obliques",["obliques","lower back"],["Sit on the ground with your knees bent and your feet flat on the floor.","Hold a weight or medicine ball with both hands in front of your chest.","Lean back slightly, keeping your back straight and your core engaged.","Slowly twist your torso to the right, bringing the weight or medicine ball towards the floor on your right side.","Pause for a moment, then twist your torso to the left, bringing the weight or medicine ball towards the floor on your left side.","Continue alternating sides for the desired number of repetitions."]],["Weighted Russian Twist (Legs Up)","0845-WU9BLIs","abs","obliques",["obliques","hip flexors"],["Sit on the ground with your knees bent and feet lifted off the ground, keeping your legs together.","Hold the weight with both hands in front of your chest, keeping your elbows slightly bent.","Lean back slightly to engage your core muscles.","Twist your torso to the right, bringing the weight towards the ground on your right side.","Pause for a moment, then twist your torso to the left, bringing the weight towards the ground on your left side.","Continue alternating sides for the desired number of repetitions."]],["Weighted Russian Twist V. 2","2371-YIUAtYf","abs","obliques",["obliques","lower back"],["Sit on the ground with your knees bent and feet flat on the floor.","Hold the weight with both hands in front of your chest.","Lean back slightly to engage your core muscles.","Twist your torso to the right, bringing the weight towards the right side of your body.","Pause for a moment, then twist your torso to the left, bringing the weight towards the left side of your body.","Continue alternating sides for the desired number of repetitions."]],["Weighted Seated Bicep Curl (On Stability Ball)","0847-b4b6afT","biceps","forearms",["forearms"],["Sit on a stability ball with your feet flat on the ground and your back straight.","Hold a medicine ball with an underhand grip, palms facing up, and let your arms hang down by your sides.","Keeping your upper arms stationary, exhale and curl the medicine ball up towards your shoulders.","Pause for a moment at the top, squeezing your biceps.","Inhale and slowly lower the medicine ball back down to the starting position.","Repeat for the desired number of repetitions."]],["Weighted Seated Twist (On Stability Ball)","0849-s34Y4LR","abs","obliques",["obliques","lower back"],["Sit on a stability ball with your feet flat on the ground and your knees bent at a 90-degree angle.","Hold a weight plate or dumbbell with both hands close to your chest.","Engage your core and slowly rotate your torso to one side, keeping your hips stable.","Pause for a moment at the end of the rotation, then slowly return to the starting position.","Repeat the rotation to the other side.","Continue alternating sides for the desired number of repetitions."]],["Weighted Side Bend (On Stability Ball)","0850-6bOA1Oi","abs","obliques",["obliques","lower back"],["Sit on a stability ball with your feet shoulder-width apart and flat on the ground.","Hold a weight in one hand and place your other hand on your hip.","Engage your core and slowly bend sideways towards the weighted side, keeping your back straight.","Pause for a moment at the bottom, then slowly return to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Weighted Sissy Squat","0851-0lQnxMZ","quads","glutes",["glutes","hamstrings","calves"],["Stand with your feet shoulder-width apart and your toes pointing slightly outward.","Hold a weight in front of your chest with both hands, or place a barbell across your upper back.","Keeping your chest up and your core engaged, slowly lower your body down by bending at the knees and hips.","Continue lowering until your thighs are parallel to the ground or as low as you can comfortably go.","Pause for a moment at the bottom, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Weighted Squat","0852-JZuApnB","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart, toes pointing slightly outward.","Hold a weight in front of your chest or on your shoulders.","Engage your core and keep your chest up as you lower your hips down and back, as if sitting into a chair.","Lower until your thighs are parallel to the ground, or as low as you can comfortably go.","Push through your heels to stand back up, squeezing your glutes at the top.","Repeat for the desired number of repetitions."]],["Weighted Standing Curl","0853-M5Y7GPg","biceps","forearms",["forearms"],["Stand with your feet shoulder-width apart and hold a dumbbell in each hand, palms facing forward.","Keep your elbows close to your torso and exhale as you curl the weights up to shoulder level.","Pause for a moment at the top, then inhale as you slowly lower the weights back down to the starting position.","Repeat for the desired number of repetitions."]],["Weighted Standing Hand Squeeze","0854-bjqbauy","forearms","biceps",["biceps","triceps"],["Stand with your feet shoulder-width apart and hold a weight in each hand.","Extend your arms straight in front of you, palms facing each other.","Squeeze your hands together as hard as you can, engaging your forearms.","Hold the squeeze for a few seconds, then release.","Repeat for the desired number of repetitions."]],["Weighted Straight Bar Dip","3313-Ff18ItA","pectorals","triceps",["triceps","shoulders"],["Position yourself between parallel bars with your arms fully extended and your body straight.","Lower your body by bending your elbows until your upper arms are parallel to the ground.","Pause for a moment, then push yourself back up to the starting position by straightening your arms.","Repeat for the desired number of repetitions."]],["Weighted Stretch Lunge","3642-13VW2VO","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart.","Take a step forward with your right foot, keeping your back straight.","Lower your body by bending your knees until your right thigh is parallel to the ground.","Push through your right heel to return to the starting position.","Repeat with your left leg.","Continue alternating legs for the desired number of repetitions."]],["Weighted Svend Press","0856-I1OBLnn","pectorals","shoulders",["shoulders","triceps"],["Stand with your feet shoulder-width apart and hold a weight plate in front of your chest with both hands.","Keep your elbows slightly bent and your palms facing each other.","Press the weight plate straight out in front of you, fully extending your arms.","Pause for a moment at the end of the movement, then slowly bring the weight plate back to the starting position.","Repeat for the desired number of repetitions."]],["Weighted Three Bench Dips","1754-gtO1ErP","triceps","chest",["chest","shoulders"],["Sit on the edge of a bench with your hands gripping the edge, fingers pointing forward.","Walk your feet forward, sliding your butt off the bench and supporting your weight with your arms.","Lower your body by bending your elbows, keeping your back close to the bench.","Pause for a moment at the bottom, then push yourself back up to the starting position.","Repeat for the desired number of repetitions."]],["Weighted Tricep Dips","1755-bZq4bwK","triceps","chest",["chest","shoulders"],["Sit on the edge of a bench or chair with your hands gripping the edge next to your hips.","Slide your butt off the front of the bench with your legs extended in front of you.","Keep your back close to the bench and your elbows slightly bent.","Lower your body by bending your elbows until your upper arms are parallel to the floor.","Push yourself back up to the starting position by straightening your arms.","Repeat for the desired number of repetitions."]],["Weighted Triceps Dip On High Parallel Bars","1767-K1vlode","triceps","chest",["chest","shoulders"],["Position yourself between two parallel bars with your hands gripping the bars and your arms fully extended.","Bend your elbows and lower your body until your upper arms are parallel to the ground.","Pause for a moment, then push through your palms to straighten your arms and return to the starting position.","Repeat for the desired number of repetitions."]],["Wheel Rollerout","0857-NAgVB3t","abs","lower back",["lower back"],["Kneel on the floor and place the wheel roller in front of you.","Place your hands on the handles of the wheel roller and extend your arms straight out in front of you.","Engage your core muscles and slowly roll the wheel forward, keeping your back straight and your abs tight.","Continue rolling forward until your body is fully extended and your arms are overhead.","Pause for a moment, then slowly roll the wheel back towards your knees, maintaining control and keeping your abs engaged.","Repeat for the desired number of repetitions."]],["Wheel Run","3637-km2Ljzj","cardiovascular system","quadriceps",["quadriceps","hamstrings","calves"],["Start in a plank position with your hands on the wheel and your body straight.","Engage your core and start rolling the wheel forward by extending your arms.","Continue rolling until your body is fully extended and your arms are overhead.","Reverse the movement by pulling the wheel back towards your body, using your core and arms.","Repeat for the desired number of repetitions."]],["Wide Grip Pull-up","1429-Qqi7bko","lats","biceps",["biceps","forearms"],["Hang from a pull-up bar with your palms facing away from you and your hands wider than shoulder-width apart.","Engage your core and squeeze your shoulder blades together.","Pull your body up towards the bar until your chin is above the bar.","Lower your body back down to the starting position with control.","Repeat for the desired number of repetitions."]],["Wide Grip Rear Pull-up","1367-OYFhXVD","lats","biceps",["biceps","forearms"],["Grab the pull-up bar with a wide overhand grip, hands slightly wider than shoulder-width apart.","Hang from the bar with your arms fully extended and your body straight.","Engage your back muscles and pull your body up towards the bar, leading with your chest.","Continue pulling until your chin is above the bar.","Pause for a moment at the top, then slowly lower your body back down to the starting position.","Repeat for the desired number of repetitions."]],["Wide Hand Push Up","1311-JmMVpR3","pectorals","triceps",["triceps","shoulders"],["Start in a high plank position with your hands wider than shoulder-width apart.","Keep your body in a straight line from head to toe.","Lower your chest towards the ground by bending your elbows, keeping them close to your sides.","Push through your palms to extend your arms and return to the starting position.","Repeat for the desired number of repetitions."]],["Wide-grip Chest Dip On High Parallel Bars","2363-O2K9Vb5","pectorals","triceps",["triceps","shoulders"],["Position yourself on the parallel bars with your arms fully extended and your body suspended in the air.","Lean forward slightly and lower your body by bending your elbows until your chest is just above the bars.","Pause for a moment, then push yourself back up to the starting position by straightening your arms.","Repeat for the desired number of repetitions."]],["Wind Sprints","0858-Qoujh3Q","abs","quadriceps",["quadriceps","hamstrings","calves"],["Find an open space or a track to perform the exercise.","Start by standing with your feet shoulder-width apart.","Begin running as fast as you can, pumping your arms and driving your knees up.","Continue sprinting for a specific distance or time period.","Rest and repeat for the desired number of repetitions."]],["World Greatest Stretch","1604-DFGXwZr","hamstrings","glutes",["glutes","quadriceps","calves"],["Start in a lunge position with your right foot forward and your left foot back.","Place your hands on the ground on either side of your right foot.","Lower your left knee to the ground and extend your right leg, keeping your right foot flat on the ground.","Rotate your torso to the right, reaching your right arm up towards the ceiling.","Hold this position for a few seconds, then return to the starting position.","Switch sides and repeat the stretch with your left foot forward."]],["Wrist Circles","1428-2zNKRUB","forearms","hands",["hands","wrists"],["Extend your arms straight out in front of you.","Make a fist with both hands.","Rotate your wrists in a circular motion, keeping your arms still.","Continue the wrist circles for the desired number of repetitions."]],["Wrist Rollerer","0859-bd5b860","forearms","biceps",["biceps","triceps"],["Attach a weight to one end of a rope or bar.","Hold the other end of the rope or bar with both hands, palms facing down.","Stand with your feet shoulder-width apart and your arms fully extended in front of you.","Slowly roll the weight up towards your hands by flexing your wrists.","Pause for a moment at the top, then slowly lower the weight back down to the starting position.","Repeat for the desired number of repetitions."]]];
EX_LIB_RAW.forEach(function(a){var n=a[0];if(!EX_DB[n])EX_DB[n]={gif:BASE+"videos/"+a[1]+".gif",img:BASE+"images/"+a[1]+".jpg",target:a[2],muscle:a[3],secondary:a[4],steps:a[5]};});
// Normalize tiny/odd target groups into cleaner buckets (filter pills + heatmap).
const TARGET_FIX={'shoulders':'delts','levator scapulae':'traps','serratus anterior':'abs','spine':'lower back'};
Object.values(EX_DB).forEach(e=>{if(e&&TARGET_FIX[e.target])e.target=TARGET_FIX[e.target];if(e&&e.secondary)e.secondary=e.secondary.map(s=>TARGET_FIX[s]||s);});

function getEx(name){
  if(EX_DB[name])return EX_DB[name];
  const nl=name.toLowerCase();
  for(const[k,v]of Object.entries(EX_DB)){
    if(k.toLowerCase().split(' ').filter(w=>w.length>3).some(w=>nl.includes(w)))return v;
  }
  return null;
}

function bhFor(t){return TARGET2BH[t]||{view:'front',slugs:[]};}
function muscleMapSVG(view, activeSlugs, color, colorFn){
  const data=view==='back'?BH_POST:BH_ANT;
  const GREY='#3A3A3C', STROKE='#2C2C2E';
  let polys='';
  for(const slug in data){
    let f=GREY;
    if(colorFn){const c=colorFn(slug);if(c)f=c;}
    else if(activeSlugs&&activeSlugs.includes(slug))f=color;
    data[slug].forEach(pts=>{polys+=`<polygon points="${pts}" fill="${f}" stroke="${STROKE}" stroke-width="0.4"/>`;});
  }
  return `<svg viewBox="0 0 100 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" style="width:100%;height:100%">${polys}</svg>`;
}

function muscleSVG(target, muscle){
  const b=bhFor(target), ac=MC[target]||'#5F65D9', sec=bhFor(muscle);
  const secSlugs=(sec.view===b.view)?sec.slugs:[];
  return muscleMapSVG(b.view,null,null,(slug)=>{
    if(b.slugs.includes(slug))return ac;
    if(secSlugs.includes(slug))return ac+'66';
    return null;
  });
}

function mChips(exd) {
  if(!exd) return '';

  const ac = def.accent || '#5F65D9';
  let h = `<span class="muscle-chip mc-p" style="background:${ac}dd">${exd.target}</span>`;
  (exd.secondary||[]).slice(0,2).forEach(m => {
    h += `<span class="muscle-chip mc-s">${m}</span>`;
  });
  return h;
}

async function loadCloud(){
  if(!syncOnline)return false;
  // Each table loads independently. One table failing must NOT blank the others.
  const [wsR,wtsR,sdsR,mlsR,flsR]=await Promise.allSettled([
    sbF('workouts?order=date.desc&limit=200'),
    sbF('weight_log?order=date.asc'),
    sbF('set_data?limit=5000'),
    sbF('mini_log?limit=2000'),
    sbF('food_log?order=date.desc&limit=1000')
  ]);
  const okVal=(res,label)=>{
    if(res.status==='fulfilled')return res.value;
    console.warn('[KWT] Cloud table failed:',label,res.reason&&res.reason.message);
    return null;
  };
  const ws=okVal(wsR,'workouts'),wts=okVal(wtsR,'weight_log'),
        sds=okVal(sdsR,'set_data'),mls=okVal(mlsR,'mini_log'),fls=okVal(flsR,'food_log');
  if(ws){workoutLog=ws.map(r=>({date:r.date,dayLabel:r.day_label,startTs:r.start_ts,endTs:r.end_ts,durationSec:r.duration_sec,exercises:r.exercises||[],isPast:r.is_past||false,_dbid:r.id}));ls('wlog9',workoutLog);}
  if(wts){weightLog=wts.map(r=>({date:r.date,w:parseFloat(r.weight)}));ls('wt9',weightLog);}
  if(sds){setData={};sds.forEach(r=>{setData[r.key]=r.data;});ls('sd9',setData);}
  if(mls){miniLog={};mls.forEach(r=>{miniLog[r.key]={done:r.done||false,sets:safeJ(r.sets)||[]};}); ls('ml9',miniLog);}
  if(fls){foodLog={};fls.forEach(r=>{if(!foodLog[r.date])foodLog[r.date]=[];foodLog[r.date].push({name:r.name,serving:r.serving||'',cal:r.cal||0,pro:r.pro||0,carb:r.carb||0,fat:r.fat||0,_id:r.id});});ls('fl9',foodLog);}
  // Load water from set_data
  if(sds)loadWaterFromSD();
  // Load exercise customizations (add/remove/order) from set_data
  if(sds)loadExCustomizationsFromSD();
  // Recover sessions from logged sets that never got a Finish-ed workout record
  deriveSessionsFromSets();
  const anyOk=[ws,wts,sds,mls,fls].some(v=>v!==null);
  if(anyOk)console.log('[KWT] Cloud loaded | workouts:',workoutLog.length,'| weights:',weightLog.length,'| foods:',Object.keys(foodLog).length);
  else console.warn('[KWT] Cloud load failed: all tables errored');
  return anyOk;
}

// Vertical gradient fill (color → transparent) for Chart.js area fills.
function chartGrad(color, topAlpha){
  return (c)=>{
    const ch=c.chart, area=ch.chartArea; if(!area)return color+'00';
    const g=ch.ctx.createLinearGradient(0, area.top, 0, area.bottom);
    g.addColorStop(0, color+topAlpha);
    g.addColorStop(1, color+'00');
    return g;
  };
}

function startWoTimer(){
  // Clear any existing interval
  if(workoutInterval)clearInterval(workoutInterval);
  // Use 1s interval — on resume, updateWoTimer recalculates from stored start time
  workoutInterval=setInterval(updateWoTimer, 1000);
  updateWoTimer(); // immediate first tick
}

function updateWoTimer(){
  if(!workoutActive)return;
  // Always calculate from stored start — survives iOS suspension
  const stored=localStorage.getItem('_woStart');
  const start=stored?parseInt(stored):workoutStart;
  const elapsed=Math.floor((Date.now()-start)/1000);
  const el=document.getElementById('wtbTime');
  if(el)el.textContent=fmtDur(elapsed);
  // Also update workoutStart in memory to match persisted value
  if(stored)workoutStart=parseInt(stored);
}

      const sets=[];const p=parseInt(ex.sets)||3;
      for(let j=0;j<p+10;j++){const k=sk(tk,ex._uid,j);if(setData[k]&&setData[k].done)sets.push({reps:setData[k].reps||0,weight:setData[k].weight||0});}
      return{name:ex.name,sets};
    }).filter(e=>e.sets.length>0);
    workoutLog.unshift(currentWorkout);
    if(workoutLog.length>200)workoutLog=workoutLog.slice(0,200);
    ls('wlog9',workoutLog);sbSaveWo(currentWorkout);
    _lastWoDate=currentWorkout.date;_lastWoDur=dur;

function exportData(){

  const blob=new Blob([JSON.stringify({_kwt:1,exported:new Date().toISOString(),data},null,2)],{type:'application/json'});

function importData(e){
  const f=e.target.files&&e.target.files[0];e.target.value='';if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    let d;try{const j=JSON.parse(r.result);d=j.data||j;}catch(err){return alert('Invalid backup file.');}
    if(!d||typeof d!=='object')return alert('Invalid backup file.');
    if(!confirm('Restore this backup? Overwrites current local data, then reloads.'))return;
    try{Object.keys(d).forEach(k=>localStorage.setItem(k,d[k]));}catch(err){return alert('Restore failed: '+err.message);}
    alert('Backup restored. Reloading.');location.reload();
  };
  r.readAsText(f);
}

// Save (or update) a real workout record for a past date from the day view.
// Pulls in every set marked done for that date, plus a manual duration.
function saveDaySession(tk,d){
  const minEl=document.getElementById('daySessMin');
  const min=parseInt(minEl&&minEl.value)||0;
  const s=SCH[d];
  const order=getExOrder(d,tk);
  const exercises=order.map(ex=>{
    const sets=[];const p=parseInt(ex.sets)||3;
    for(let j=0;j<p+10;j++){const k=sk(tk,ex._uid,j);if(setData[k]&&setData[k].done)sets.push({reps:setData[k].reps||0,weight:setData[k].weight||0});}
    return{name:ex.name,sets};
  }).filter(e=>e.sets.length>0);
  if(!exercises.length&&!min){alert('Check off at least one set (✓) or enter a duration first.');return;}
  // Replace any existing entry for this date (real OR derived); reuse its ids so
  // we PATCH the same cloud row instead of inserting duplicates.
  let dbid=null,cid=null;
  for(let i=workoutLog.length-1;i>=0;i--){
    if(workoutLog[i].date===tk){
      if(workoutLog[i]._dbid&&!dbid)dbid=workoutLog[i]._dbid;
      if(workoutLog[i]._cid&&!cid)cid=workoutLog[i]._cid;
      workoutLog.splice(i,1);
    }
  }
  const wo={date:tk,dayLabel:s.label,startTs:0,endTs:0,durationSec:min*60,exercises,isPast:true,_cid:cid||Date.now().toString(36)};
  if(dbid)wo._dbid=dbid;
  workoutLog.unshift(wo);workoutLog.sort((a,b)=>b.date.localeCompare(a.date));
  ls('wlog9',workoutLog);
  if(dbid)sbUpdateWo(dbid,wo);else sbSaveWo(wo);
  alert('Session saved for '+fmtDate(tk)+(min?' · '+min+' min':'')+'.');
  renderDayDetail(d);
}

// Save all three exercise customization keys for a day to Supabase
function saveExCustomizations(tk, d){
  const addedKey   = `added-exs-${tk}-${d}`;
  const removedKey = `removed-exs-${tk}-${d}`;
  const orderKey   = `order-exs-${tk}-${d}`;
  // Use sbSaveSD which upserts into set_data table
  const added   = localStorage.getItem(addedKey);
  const removed = localStorage.getItem(removedKey);
  const order   = localStorage.getItem(orderKey);
  if(added)   sbSaveSD(addedKey,   JSON.parse(added));
  if(removed) sbSaveSD(removedKey, JSON.parse(removed));
  if(order)   sbSaveSD(orderKey,   JSON.parse(order));
}

// Load exercise customizations from Supabase setData into localStorage
// Called after cloud load completes
function loadExCustomizationsFromSD(){
  Object.keys(setData).forEach(key=>{
    if(key.startsWith('added-exs-') || 
       key.startsWith('removed-exs-') || 
       key.startsWith('order-exs-')){
      // setData[key] is already the parsed value — re-stringify for localStorage
      localStorage.setItem(key, JSON.stringify(setData[key]));
    }
  });
}

// Synthesize workout sessions from logged sets for any day that has done sets
// but no real `workouts` record. Recovers days where the user logged sets but
// never pressed Finish. Idempotent: skips dates already present in workoutLog
// (real records and previously-derived ones), so it can be called repeatedly.
// Derived entries are in-memory only (marked _derived) — never pushed to cloud.
// Stable set-data key: date:exerciseUid:setIndex (uid survives add/remove/reorder).
function sk(tk,uid,j){return `${tk}:${uid}:${j}`;}
// Migrate legacy index-based keys (YYYY-MM-DD-EI-J) → uid keys (assumes plan-EI).
// In-memory + idempotent; runs on every load. Old cloud rows orphan harmlessly.
function migrateSetKeys(){
  let changed=false;
  Object.keys(setData).forEach(k=>{
    const m=k.match(/^(\d{4}-\d{2}-\d{2})-(\d+)-(\d+)$/);
    if(!m)return;
    const nk=`${m[1]}:plan-${m[2]}:${m[3]}`;
    if(setData[nk]===undefined)setData[nk]=setData[k];
    delete setData[k];changed=true;
  });
  if(changed)ls('sd9',setData);
}
function deriveSessionsFromSets(){
  migrateSetKeys();
  const have=new Set(workoutLog.map(w=>w.date));
  const byDate={};
  Object.keys(setData).forEach(k=>{
    const m=k.match(/^(\d{4}-\d{2}-\d{2}):([^:]+):(\d+)$/);   // date:uid:setIndex
    if(!m)return;
    const sd=setData[k];
    if(!sd||!sd.done)return;                 // only count completed sets
    const date=m[1],uid=m[2];
    (byDate[date]=byDate[date]||{});
    (byDate[date][uid]=byDate[date][uid]||[]).push({reps:sd.reps||0,weight:sd.weight||0});
  });
  Object.keys(byDate).forEach(date=>{
    if(have.has(date))return;                // real record wins, and prevents dupes
    const d=new Date(date+'T12:00:00').getDay();
    const order=getExOrder(d,date);          // effective exercise list (add/remove/reorder)
    const exMap=byDate[date];
    const exercises=Object.keys(exMap).map(uid=>{
      const ex=order.find(e=>e._uid===uid);
      return {name:ex?ex.name:'Exercise',sets:exMap[uid]};
    }).filter(e=>e.sets.length);
    if(!exercises.length)return;
    const label=(SCH[d]&&SCH[d].label)||'Logged Session';
    workoutLog.push({date,dayLabel:label,startTs:0,endTs:0,durationSec:0,exercises,isPast:false,_derived:true});
    have.add(date);
  });
  workoutLog.sort((a,b)=>b.date.localeCompare(a.date));
}

}

// Build rows for the Add-Exercise list. Filters by query, caps at 80 so the
// full 1,360-entry library never renders thousands of DOM nodes at once.
// onclick uses the GLOBAL index into _aeNames so doAddEx stays correct.
function aeRowsFor(q){
  q = (q||'').toLowerCase().trim();
  const names = window._aeNames || [];
  const CAP = 80;
  let html = '', shown = 0;
  for(let idx=0; idx<names.length; idx++){
    const name = names[idx];
    if(q && !name.toLowerCase().includes(q)) continue;
    const exd = EX_DB[name]; if(!exd) continue;
    const ac = MC[exd.target] || '#5F65D9';
    html += `<div onclick="doAddEx(${idx})" style="display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:0.5px solid var(--bd);cursor:pointer;-webkit-tap-highlight-color:rgba(189,242,75,0.15);user-select:none;-webkit-user-select:none">

      <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">${name}</div>
        <div style="margin-top:4px"><span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:${ac}22;color:${ac}">${exd.target}</span></div></div>
      <div style="color:var(--grn);font-size:22px;font-weight:300;padding-right:4px">+</div>
    </div>`;
    if(++shown >= CAP) break;
  }
  if(!shown) return '<div style="padding:18px;color:var(--mu);font-size:13px;text-align:center">No matches.</div>';
  if(!q && names.length>CAP) html += `<div style="padding:12px;color:var(--mu);font-size:12px;text-align:center">Showing first ${CAP}. Type to search all ${names.length}.</div>`;
  else if(shown>=CAP) html += `<div style="padding:12px;color:var(--mu);font-size:12px;text-align:center">Showing first ${CAP} matches — refine search.</div>`;
  return html;
}

// ── DRAG TO REORDER EXERCISES ─────────────────────────────────────────────
let dragSrcIdx=null,touchDragIdx=null,touchClone=null;

function getExOrder(d,tk){
  const s=SCH[d];
  // Plan exercises: identified by original index, removedSet stores those indices
  const removedSet=new Set(JSON.parse(localStorage.getItem(`removed-exs-${tk}-${d}`)||'[]'));
  // Added exercises: each has a stable _uid assigned at creation
  const addedExs=JSON.parse(localStorage.getItem(`added-exs-${tk}-${d}`)||'[]');
  // Build combined list with stable _uid on every item
  const baseExs=s.exercises
    .map((e,i)=>({...e,_src:'plan',_planIdx:i,_uid:`plan-${i}`}))
    .filter(e=>!removedSet.has(e._planIdx));
  const addedWithSrc=addedExs.map((e,i)=>({...e,_src:'added',_uid:e._uid||`added-${i}`}));
  const allExs=[...baseExs,...addedWithSrc];
  // Apply saved display order (stored as _uid array)
  const orderKey=`order-exs-${tk}-${d}`;
  const savedOrder=JSON.parse(localStorage.getItem(orderKey)||'null');
  if(!savedOrder)return allExs;
  const reordered=[];
  savedOrder.forEach(uid=>{const ex=allExs.find(e=>e._uid===uid);if(ex)reordered.push(ex);});
  // Append any new items not yet in saved order
  allExs.forEach(e=>{if(!reordered.find(r=>r._uid===e._uid))reordered.push(e);});
  return reordered;
}

function saveExOrder(d,tk,exs){
  // Save order as array of _uids (stable identifiers)
  localStorage.setItem(`order-exs-${tk}-${d}`,JSON.stringify(exs.map(e=>e._uid)));
}

function dragStart(e,d,ei,tk){
  dragSrcIdx=ei;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',ei);
}
function dragOver(e,d,ei){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.ex-card').forEach(c=>c.classList.remove('drag-over'));
  e.currentTarget.closest('.ex-card')?.classList.add('drag-over');
}
function dragDrop(e,d,ei,tk){
  e.preventDefault();
  if(dragSrcIdx===null||dragSrcIdx===ei)return;
  const exs=getExOrder(d,tk);
  const [moved]=exs.splice(dragSrcIdx,1);
  exs.splice(ei,0,moved);
  saveExOrder(d,tk,exs); // saveExOrder now uses _uid internally
  dragSrcIdx=null;
  renderDayDetail(d);
}
function dragEnd(e,d,ei){
  dragSrcIdx=null;
  document.querySelectorAll('.ex-card').forEach(c=>{
    c.classList.remove('dragging');c.classList.remove('drag-over');
  });
}

// Touch drag support for iOS
function touchDragStart(e,d,ei,tk){
  e.stopPropagation();
  touchDragIdx=ei;
  const card=e.currentTarget.closest('.ex-card');
  if(card){
    touchClone=card.cloneNode(true);
    touchClone.style.cssText=`position:fixed;opacity:0.8;pointer-events:none;width:${card.offsetWidth}px;z-index:999;left:${card.getBoundingClientRect().left}px;top:${card.getBoundingClientRect().top}px`;
    document.body.appendChild(touchClone);
    card.classList.add('dragging');
  }
}
function touchDragMove(e,d,ei){
  e.preventDefault();
  if(!touchClone)return;
  const t=e.touches[0];
  touchClone.style.left=t.clientX-touchClone.offsetWidth/2+'px';
  touchClone.style.top=t.clientY-30+'px';
  // Highlight target
  document.querySelectorAll('.ex-card').forEach(c=>c.classList.remove('drag-over'));
  const el=document.elementFromPoint(t.clientX,t.clientY);
  const targetCard=el?.closest('.ex-card');
  if(targetCard&&!targetCard.classList.contains('dragging'))targetCard.classList.add('drag-over');
}
function touchDragEnd(e,d,ei,tk){
  if(touchClone){touchClone.remove();touchClone=null;}
  document.querySelectorAll('.ex-card').forEach(c=>{c.classList.remove('dragging');c.classList.remove('drag-over');});
  if(touchDragIdx===null)return;
  const t=e.changedTouches[0];
  const el=document.elementFromPoint(t.clientX,t.clientY);
  const targetCard=el?.closest('.ex-card');
  if(targetCard){
    const cards=[...document.querySelectorAll('#exList .ex-card')];
    const targetIdx=cards.indexOf(targetCard);
    if(targetIdx>=0&&targetIdx!==touchDragIdx){
      const exs=getExOrder(d,tk);
      const [moved]=exs.splice(touchDragIdx,1);
      exs.splice(targetIdx,0,moved);
      saveExOrder(d,tk,exs);
    }
  }
  touchDragIdx=null;
  renderDayDetail(d);
}

// Find the most recent time an exercise was performed BEFORE the given date.
// Scans workoutLog (real + derived sessions). Returns {reps,weight,date} of the
// last set of that session, or null if never performed before.
function lastExPerf(name,beforeDate){
  let best=null;
  for(const w of workoutLog){
    if(!w.exercises||(beforeDate&&w.date>=beforeDate))continue;
    const ex=w.exercises.find(e=>e.name===name&&e.sets&&e.sets.length);
    if(!ex)continue;
    if(!best||w.date>best.date){const ls=ex.sets[ex.sets.length-1];best={date:w.date,reps:ls.reps,weight:ls.weight};}
  }
  return best;
}
// ── ANALYTICS: 1RM, PRs, per-exercise history, set-vs-last, muscle heat ──
function est1RM(w,r){w=parseFloat(w)||0;r=parseInt(r)||0;if(!w||!r)return 0;return Math.round(w*(1+r/30));}
// Per-session summary for an exercise across all logged sessions (asc by date).
function exSessions(name){
  const out=[];
  workoutLog.forEach(w=>{
    if(!w.exercises)return;
    const ex=w.exercises.find(e=>e.name===name&&e.sets&&e.sets.length);
    if(!ex)return;
    let best=0,topW=0,topR=0,vol=0;
    ex.sets.forEach(s=>{const e=est1RM(s.weight,s.reps);if(e>best){best=e;topW=parseFloat(s.weight)||0;topR=parseInt(s.reps)||0;}vol+=(parseFloat(s.weight)||0)*(parseInt(s.reps)||0);});
    out.push({date:w.date,e1rm:best,topW,topR,vol,sets:ex.sets.length});
  });
  out.sort((a,b)=>a.date.localeCompare(b.date));
  return out;
}
function exPR(name){const s=exSessions(name);if(!s.length)return null;let pr=s[0];s.forEach(x=>{if(x.e1rm>pr.e1rm)pr=x;});return pr;}
// Full set list of the most recent prior session (for set-vs-last feedback).
function lastExSets(name,beforeDate){
  let best=null;
  for(const w of workoutLog){
    if(!w.exercises||(beforeDate&&w.date>=beforeDate))continue;
    const ex=w.exercises.find(e=>e.name===name&&e.sets&&e.sets.length);
    if(!ex)continue;
    if(!best||w.date>best.date)best={date:w.date,sets:ex.sets};
  }
  return best;
}
function deltaBadge(cur,prev){
  const a=est1RM(cur.weight,cur.reps),b=est1RM(prev.weight,prev.reps);
  if(!a||!b)return '';
  if(a>b)return '<span style="color:#BDF24B;font-weight:700">↑</span>';
  if(a<b)return '<span style="color:#FF453A;font-weight:700">↓</span>';
  return '<span style="color:var(--mu2)">=</span>';
}
// Weekly (last 7d) set volume per muscle target + per body-part, split front/back.
function weeklyPartVol(){
  const cutoff=(()=>{const d=new Date(Date.now()-7*864e5);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;})();
  const front={},back={},byTarget={};
  workoutLog.forEach(w=>{
    if(w.date<cutoff||!w.exercises)return;
    w.exercises.forEach(ex=>{
      const exd=EX_DB[ex.name];const tgt=exd&&exd.target;if(!tgt)return;
      const sets=ex.sets?ex.sets.length:0;
      byTarget[tgt]=(byTarget[tgt]||0)+sets;

function nutChangeDay(delta){
  const current=new Date((nutritionDate||todayKey())+'T12:00:00');
  current.setDate(current.getDate()+delta);
  const y2=current.getFullYear(),m2=String(current.getMonth()+1).padStart(2,'0'),d2=String(current.getDate()).padStart(2,'0');const newDate=`${y2}-${m2}-${d2}`;
  // Don't go past today
  if(newDate>todayKey())return;
  // Don't go before plan start
  if(newDate<'2026-06-01')return;
  nutritionDate=newDate;

  loadFoodForDate(newDate).then(()=>renderNutrition());
}
function nutGoToToday(){

  renderNutrition();

async function loadFoodForDate(date){
  // Check if we already have data for this date in cache
  // (could be empty — that's fine, just means no food logged)
  if(foodLog[date]!==undefined)return; // already loaded (even if empty array)
  if(!syncOnline)return;
  try{
    const rows=await sbF(`food_log?date=eq.${date}&order=created_at.asc`);
    foodLog[date]=rows.map(r=>({
      name:r.name,serving:r.serving||'',
      cal:r.cal||0,pro:r.pro||0,carb:r.carb||0,fat:r.fat||0,
      _id:r.id
    }));
    ls('fl9',foodLog);
  }catch(e){
    console.warn('[KWT] loadFoodForDate failed:',e.message);
    foodLog[date]=[]; // Mark as loaded but empty to avoid repeated fetches
  }
}

const PHASE_RANGES=[
  {s:'2026-06-01',e:'2026-08-31',c:'rgba(95,101,217,0.12)',tc:'#5F65D9',n:'Phase 1'},
  {s:'2026-09-01',e:'2026-11-30',c:'rgba(189,242,75,0.12)',tc:'#BDF24B',n:'Phase 2'},
  {s:'2026-12-01',e:'2027-03-31',c:'rgba(251,191,36,0.12)',tc:'#fbbf24',n:'Phase 3'},
  {s:'2027-04-01',e:'2027-06-25',c:'rgba(167,139,250,0.12)',tc:'#a78bfa',n:'Phase 4'},
];
function phaseOfDate(ds){for(let i=0;i<PHASE_RANGES.length;i++){if(ds>=PHASE_RANGES[i].s&&ds<=PHASE_RANGES[i].e)return i;}return-1;}
function sessionType(lbl){
  if(!lbl)return'';const l=lbl.toLowerCase();
  if(l.includes('push'))return'Push';if(l.includes('pull'))return'Pull';
  if(l.includes('leg'))return'Legs';if(l.includes('full'))return'Full';
  if(l.includes('core')||l.includes('recovery'))return'Core';
  if(l.includes('cardio'))return'Cardio';return lbl.split('—')[0].trim().slice(0,5);
}

// Tap a calendar day → jump to Today tab showing that exact date for full logging.
function logDayFromCal(ds){
  if(ds>todayKey())return;                 // no future logging
  carDay=new Date(ds+'T12:00:00').getDay();
  carDayDate=ds;
  closeModal('calModal');

  if(todayBtn)switchPage('today',todayBtn);

function renderCalendar(){
  const MY=['January','February','March','April','May','June','July','August','September','October','November','December'];
  let tm=5+calOffset,ty=2026+Math.floor(tm/12);tm=tm%12;
  const now=new Date();const ts=todayKey();
  const fd=new Date(ty,tm,1).getDay(),dim=new Date(ty,tm+1,0).getDate();
  const woMap={};workoutLog.forEach(w=>{woMap[w.date]={dur:w.durationSec||0,lbl:w.dayLabel||''};});
  const msStr=`${ty}-${String(tm+1).padStart(2,'0')}-01`;
  const pi=phaseOfDate(msStr);const pn=pi>=0?PHASE_RANGES[pi].n:'';const ptc=pi>=0?PHASE_RANGES[pi].tc:'var(--mu)';
  let html=`<div class="cal-wrap">
    <div class="cal-month-nav">
      <button class="cal-nav-btn" onclick="moveCalMonth(-1)" ${calOffset<=0?'disabled style="opacity:0.3"':''}>‹</button>
      <div style="text-align:center"><div class="cal-month-title">${MY[tm]} ${ty}</div>${pn?`<div style="font-size:10px;color:${ptc};font-weight:500;margin-top:1px">${pn}</div>`:''}</div>
      <button class="cal-nav-btn" onclick="moveCalMonth(1)" ${calOffset>=12?'disabled style="opacity:0.3"':''}>›</button>
    </div>
    <div class="cal-grid">`;
  ['Mo','Tu','We','Th','Fr','Sa','Su'].forEach(d=>html+=`<div class="cal-dow">${d}</div>`);
  // Monday-first offset (getDay: Sun=0 → 6, Mon=1 → 0 …)
  const lead=(new Date(ty,tm,1).getDay()+6)%7;
  for(let i=0;i<lead;i++)html+=`<div class="cal-c empty"></div>`;
  for(let day=1;day<=dim;day++){
    const ds=`${ty}-${String(tm+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dt=new Date(ds+'T12:00:00'),isT=ds===ts,isFut=dt>now;
    const isWed=ds==='2027-06-25',isSt=ds==='2026-06-01';
    const isWkd=!!woMap[ds];
    let cls='cal-c',style='';
    if(isFut)cls+=' future';
    else if(isWkd)cls+=' trained';                          // green fill
    else if(isSt){/* gold below */}
    else if(ds>='2026-06-02'&&ds<ts)cls+=' missed';         // past, not trained → orange (today excluded)
    if(isSt)style='background:#fbbf24;color:#0D0D0D';
    if(isWed)style='background:#a78bfa;color:#0D0D0D';
    if(isT)cls+=' tdy';                                      // today ring
    const loggable=ds<=ts;if(loggable)cls+=' tap';
    html+=`<div class="${cls}" style="${style}" ${loggable?`onclick="logDayFromCal('${ds}')"`:''}>${day}</div>`;
  }
  html+=`</div></div>
  <div class="cal-legend" style="margin-top:14px">
    <div class="cal-legend-item"><span class="cal-key" style="background:#BDF24B"></span>Trained</div>
    <div class="cal-legend-item"><span class="cal-key" style="background:#FF9500"></span>Missed</div>
    <div class="cal-legend-item"><span class="cal-key" style="background:#323232;outline:2px solid var(--acc);outline-offset:-2px"></span>Today</div>
    <div class="cal-legend-item"><span style="color:#fbbf24">⭐</span> Start <span style="color:#a78bfa;margin-left:4px">💍</span> Wedding</div>
  </div>`;
  document.getElementById('calContent').innerHTML=html;
}
function moveCalMonth(d){calOffset=Math.max(0,Math.min(12,calOffset+d));renderCalendar();}
