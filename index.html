<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kyle's Wed Training">
<meta name="theme-color" content="#0a0a0f">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230a0a0f'/%3E%3Ctext y='72' x='50' text-anchor='middle' font-size='60'%3E%F0%9F%8F%8B%EF%B8%8F%3C/text%3E%3C/svg%3E">
<title>Kyle's Wed Training</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS ─────────────────────────────────────────── */
:root{
  --bg:#0D0D0D; --s1:#161618; --s2:#1C1C1E; --s3:#2C2C2E; --s4:#3A3A3C;
  --bd:rgba(255,255,255,0.07); --bd2:rgba(255,255,255,0.13);
  --acc:#5F65D9; --acc-d:rgba(95,101,217,0.18);
  --grn:#BDF24B; --grn-d:rgba(189,242,75,0.14);
  --red:#FF453A; --red-d:rgba(255,69,58,0.14);
  --amb:#FFD60A; --amb-d:rgba(255,214,10,0.13);
  --tx:#FFFFFF; --mu:rgba(255,255,255,0.45); --mu2:rgba(255,255,255,0.28); --mu3:rgba(255,255,255,0.10);
  --r-xs:8px; --r-sm:12px; --r-md:16px; --r-lg:20px; --r-xl:24px;
  --st:env(safe-area-inset-top,0px); --sb:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);}
body{font-family:-apple-system,'SF Pro Text',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;padding-bottom:calc(76px + var(--sb));}
button,input,select,textarea{font-family:inherit;}
button{cursor:pointer;border:none;background:none;}
input:focus,select:focus,textarea:focus{outline:none;}

/* ── TOPBAR ─────────────────────────────────────────────────── */
.tb{position:sticky;top:0;z-index:200;padding:calc(var(--st) + 12px) 18px 12px;background:rgba(13,13,13,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:0.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}
.tb-title{font-size:17px;font-weight:700;letter-spacing:-0.4px;cursor:pointer;display:flex;align-items:center;gap:8px;}
.tb-sub{font-size:11px;color:var(--acc);font-weight:500;letter-spacing:0.05em;text-transform:uppercase;margin-top:2px;}
.tb-r{text-align:right;font-size:11px;color:var(--mu);line-height:1.6;}

/* ── BOTTOM NAV ─────────────────────────────────────────────── */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(22,22,24,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:0.5px solid var(--bd);display:flex;padding-bottom:var(--sb);}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;gap:3px;color:var(--mu2);font-size:10px;font-weight:500;transition:color 0.15s;}
.bn.active{color:var(--grn);}
.bn-ic{font-size:20px;line-height:1;}

/* ── PAGES ──────────────────────────────────────────────────── */
.page{display:none;padding:0 0 8px;}
.page.active{display:block;animation:fadeUp 0.18s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.pi{padding:0 16px;}

/* ── MODALS ─────────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-sheet{background:var(--s1);border-radius:var(--r-xl) var(--r-xl) 0 0;width:100%;max-height:90dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 18px calc(28px + var(--sb));}
.modal-handle{width:36px;height:4px;background:var(--s4);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:20px;font-weight:700;letter-spacing:-0.4px;margin-bottom:16px;}
.modal-close-btn{width:32px;height:32px;border-radius:50%;background:var(--s3);color:var(--mu);font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ── WORKOUT TIMER BANNER ───────────────────────────────────── */
.wtb{display:none;position:sticky;top:calc(var(--st) + 56px);z-index:150;background:rgba(95,101,217,0.10);border-bottom:0.5px solid rgba(95,101,217,0.22);padding:10px 18px;flex-direction:row;align-items:center;justify-content:space-between;}
.wtb.active{display:flex;}
.wtb-dot{width:8px;height:8px;border-radius:50%;background:var(--grn);box-shadow:0 0 8px rgba(189,242,75,0.7);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;};}
.wtb-time{font-size:24px;font-weight:800;letter-spacing:-1px;}
.wtb-lbl{font-size:11px;color:var(--mu);margin-top:1px;}

/* ── GREETING HEADER ────────────────────────────────────────── */
.greet-card{margin:16px 16px 0;border-radius:var(--r-lg);padding:18px 20px;background:linear-gradient(135deg,#1a1b3e 0%,#252660 100%);border:0.5px solid rgba(95,101,217,0.3);position:relative;overflow:hidden;}
.greet-card::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(95,101,217,0.15);}
.greet-card::before{content:'';position:absolute;bottom:-20px;right:20px;width:80px;height:80px;border-radius:50%;background:rgba(189,242,75,0.07);}
.greet-hi{font-size:12px;color:var(--mu);font-weight:500;margin-bottom:3px;}
.greet-name{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.greet-sub{font-size:12px;color:rgba(189,242,75,0.85);margin-top:6px;font-weight:500;}
.greet-meta{display:flex;gap:10px;margin-top:12px;}
.greet-pill{background:rgba(255,255,255,0.08);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:500;color:rgba(255,255,255,0.7);display:flex;align-items:center;gap:5px;}
.greet-pill-accent{background:rgba(189,242,75,0.12);color:var(--grn);}

/* ── START/STOP BUTTON ──────────────────────────────────────── */
.btn-sw{width:100%;border-radius:var(--r-md);padding:15px;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:8px;letter-spacing:0.01em;text-transform:uppercase;}
.btn-sw.idle{background:var(--grn);color:#0D0D0D;}
.btn-sw.active{background:var(--s2);border:1px solid var(--red-d);color:var(--red);}
.btn-sw:active{opacity:0.82;}

/* ── SECTION HEADER ─────────────────────────────────────────── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin:20px 16px 10px;}
.sec-title{font-size:16px;font-weight:700;letter-spacing:-0.2px;}
.sec-see-all{font-size:12px;font-weight:600;color:var(--grn);}

/* ── WEEK DAY STRIP (replaces carousel) ────────────────────── */
.week-strip{padding:0 16px 16px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.week-strip::-webkit-scrollbar{display:none;}
.wd{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;width:46px;}
.wd-label{font-size:10px;font-weight:600;color:var(--mu2);text-transform:uppercase;letter-spacing:0.06em;}
.wd-dot{width:6px;height:6px;border-radius:50%;background:var(--s3);}
.wd-dot.gym{background:var(--acc);}
.wd-dot.home{background:var(--grn);}
.wd-dot.rest{background:var(--s4);}
.wd-dot.free{background:var(--amb);}
.wd-circle{width:40px;height:40px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--mu);border:1.5px solid transparent;transition:all 0.15s;}
.wd-circle.today{border-color:var(--acc);color:var(--tx);}
.wd-circle.sel{background:var(--grn);color:#0D0D0D;border-color:var(--grn);}
.wd-circle-past{opacity:0.55;}
.wd-past .wd-label{color:var(--mu3);}
.wd-type{font-size:9px;color:var(--mu2);font-weight:500;text-align:center;line-height:1.2;max-width:44px;}

/* ── HERO SESSION CARD ──────────────────────────────────────── */
.hero-card{margin:0 16px 4px;border-radius:var(--r-lg);overflow:hidden;position:relative;min-height:140px;background:var(--s2);}
.hero-img{width:100%;height:160px;object-fit:cover;display:block;filter:brightness(0.55);}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(13,13,13,0.92) 0%,rgba(13,13,13,0.3) 60%,transparent 100%);}
.hero-body{position:absolute;bottom:0;left:0;right:0;padding:16px;}
.hero-type-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;padding:4px 10px;border-radius:20px;margin-bottom:8px;}
.hero-title{font-size:20px;font-weight:800;letter-spacing:-0.4px;line-height:1.2;}
.hero-meta{display:flex;gap:10px;margin-top:8px;}
.hero-meta-item{display:flex;align-items:center;gap:4px;font-size:11px;color:rgba(255,255,255,0.7);font-weight:500;}

/* ── FILTER PILLS ───────────────────────────────────────────── */
.filter-wrap{padding:0 16px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;margin-bottom:2px;}
.filter-wrap::-webkit-scrollbar{display:none;}
.filter-pill{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;border:0.5px solid var(--bd2);color:var(--mu);transition:all 0.15s;white-space:nowrap;}
.filter-pill.active{background:var(--grn);color:#0D0D0D;border-color:var(--grn);}

/* ── EXERCISE CARDS ─────────────────────────────────────────── */
.ex-list{padding:0 16px;}
.ex-card{background:var(--s1);border:0.5px solid var(--bd);border-radius:var(--r-md);margin-bottom:8px;overflow:hidden;transition:border-color 0.15s;}
.ex-card.logged{border-color:rgba(189,242,75,0.4);background:rgba(189,242,75,0.06);}
.ex-card.logged .ex-name{color:rgba(189,242,75,0.7) !important;text-decoration:line-through;text-decoration-color:rgba(189,242,75,0.3);}
.ex-card.logged .ex-accent{background:var(--grn) !important;}
.ex-card.done-3{border-color:rgba(189,242,75,0.6);background:rgba(189,242,75,0.10);}
.ex-card.done-3 .ex-accent{background:var(--grn) !important;}
.ex-card.done-3 .ex-name{color:var(--grn) !important;}
.ex-card.bonus{border-color:var(--amb-d);}

/* Main row — always visible */
.ex-row{display:flex;align-items:stretch;cursor:pointer;min-height:72px;}
.drag-handle{width:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--mu3);font-size:16px;cursor:grab;touch-action:none;}
.drag-handle:active{cursor:grabbing;}
.ex-card.dragging{opacity:0.4;border:1.5px dashed var(--acc);}
.ex-card.drag-over{border-top:2px solid var(--grn);}
.ex-accent{width:3px;flex-shrink:0;border-radius:0;}
/* Image: white bg, rounded, scale to fit */
.ex-img-box{width:72px;flex-shrink:0;background:#141416;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.ex-img-box img{width:100%;height:100%;object-fit:cover;display:block;background:#141416;}
.ex-img-fallback{width:72px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--s3);}
.ex-content{flex:1;padding:10px 10px 10px 12px;display:flex;flex-direction:column;justify-content:center;min-width:0;}
.ex-name{font-size:13px;font-weight:600;letter-spacing:-0.1px;line-height:1.3;}
.ex-card.logged .ex-name{color:var(--mu);text-decoration:line-through;text-decoration-color:var(--mu3);}
.ex-badges{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;align-items:center;}
.ex-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:0.04em;}
.eb-muscle{background:var(--acc-d);color:var(--acc);}
.eb-done{background:var(--grn-d);color:var(--grn);}
.eb-sec{background:var(--mu3);color:var(--mu);}
.eb-bonus{background:var(--amb-d);color:var(--amb);}
.eb-time{background:var(--s3);color:var(--mu2);}
.ex-expand-btn{width:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.ex-expand-circle{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--mu);transition:all 0.2s;}
.ex-expand-circle.open{background:var(--acc);border-color:var(--acc);color:#fff;transform:rotate(90deg);}

/* Expandable body */
.ex-body{display:none;border-top:0.5px solid var(--bd);}
.ex-body.open{display:block;}
/* GIF — white rounded container */
.ex-gif-box{margin:12px 12px 6px;border-radius:var(--r-sm);overflow:hidden;background:#141416;position:relative;}
.ex-gif-box img{width:100%;max-height:220px;object-fit:cover;display:block;}
.ex-gif-chips{position:absolute;bottom:8px;left:8px;right:8px;display:flex;gap:4px;flex-wrap:wrap;}
.muscle-chip{font-size:9px;padding:3px 8px;border-radius:20px;font-weight:700;backdrop-filter:blur(4px);}
.mc-p{background:rgba(95,101,217,0.88);color:#fff;}
.mc-s{background:rgba(0,0,0,0.6);color:rgba(255,255,255,0.85);}
.ex-note{font-size:12px;color:rgba(139,143,244,0.9);font-style:italic;line-height:1.5;padding:4px 12px 8px;}

/* ── SET LOGGER ─────────────────────────────────────────────── */
.set-logger{padding:10px 12px 14px;}
.set-logger-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--mu2);margin-bottom:9px;}
.set-hdr{display:grid;grid-template-columns:16px 1fr 1fr 30px 18px;gap:4px;align-items:center;padding:0 2px 7px;border-bottom:0.5px solid var(--bd);font-size:10px;color:var(--mu2);text-align:center;text-transform:uppercase;letter-spacing:0.07em;}
.set-row{display:grid;grid-template-columns:16px 1fr 1fr 30px 18px;gap:4px;align-items:center;padding:6px 2px;border-bottom:0.5px solid var(--mu3);}
.set-row:last-child{border-bottom:none;}
.set-num{font-size:12px;font-weight:600;color:var(--mu2);text-align:center;}
.set-inp{background:var(--s2);border:0.5px solid var(--bd2);border-radius:var(--r-xs);padding:7px 4px;color:var(--tx);font-size:13px;font-weight:600;text-align:center;width:100%;-webkit-appearance:none;}
.set-inp:focus{border-color:var(--acc);background:var(--s3);}
/* Stepper: [−][input][+] for reps & weight (no keyboard needed) */
.stepper{display:flex;align-items:stretch;background:var(--s2);border:0.5px solid var(--bd2);border-radius:var(--r-xs);overflow:hidden;min-width:0;}
.stepper .set-inp{border:none;border-radius:0;background:transparent;padding:7px 0;flex:1;min-width:0;}
.stepper .set-inp:focus{background:var(--s3);}
.stp{width:26px;flex-shrink:0;background:var(--s3);color:var(--tx);font-size:18px;font-weight:600;line-height:1;display:flex;align-items:center;justify-content:center;-webkit-user-select:none;user-select:none;touch-action:manipulation;}
.stp:active{background:var(--acc);color:#fff;}
.set-done-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--mu);background:var(--s2);transition:all 0.15s;}
.set-done-btn.done{background:var(--grn);border-color:var(--grn);color:#0D0D0D;}
.set-del-btn{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--red);opacity:0.55;background:var(--red-d);}
.add-set-btn{width:100%;margin-top:10px;padding:10px;background:var(--s2);border:0.5px dashed var(--bd2);border-radius:var(--r-sm);color:var(--mu);font-size:12px;display:flex;align-items:center;justify-content:center;gap:6px;font-weight:600;}

/* ── REST TIMER ─────────────────────────────────────────────── */
.rest-timer{background:var(--acc-d);border:0.5px solid rgba(95,101,217,0.25);border-radius:var(--r-sm);padding:10px 14px;margin:4px 12px 10px;display:none;align-items:center;justify-content:space-between;}
.rest-timer.show{display:flex;}
.rt-time{font-size:20px;font-weight:800;letter-spacing:-0.5px;color:var(--acc);}
.rt-skip{font-size:12px;color:var(--mu);padding:5px 12px;background:var(--s2);border-radius:var(--r-xs);font-weight:600;}

/* ── MINI SESSIONS ──────────────────────────────────────────── */
.mini-gif-box{margin:10px 12px 4px;border-radius:var(--r-sm);overflow:hidden;background:#141416;position:relative;}
.mini-gif-box img{width:100%;max-height:180px;object-fit:cover;display:block;}

/* ── SHARED ─────────────────────────────────────────────────── */
.motiv{background:rgba(95,101,217,0.10);border:0.5px solid rgba(95,101,217,0.22);border-radius:var(--r-md);padding:12px 14px;margin:0 16px 14px;font-size:13px;color:rgba(189,196,255,0.85);line-height:1.65;font-style:italic;}
.ring-wrap{display:flex;justify-content:center;margin:4px 0 14px;}
.ring-inner{position:relative;width:84px;height:84px;}
.ring-lbl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.ring-num{font-size:20px;font-weight:800;letter-spacing:-0.5px;line-height:1;}
.ring-sub{font-size:10px;color:var(--mu2);margin-top:1px;}
.free-card{background:var(--amb-d);border:0.5px solid rgba(255,214,10,0.2);border-radius:var(--r-md);padding:16px;margin:0 16px 10px;}
.free-title{font-size:15px;font-weight:700;color:var(--amb);margin-bottom:8px;}
.free-body{font-size:13px;color:rgba(255,214,10,0.65);line-height:1.7;}
.rest-day-wrap{text-align:center;padding:32px 16px;}

/* ── CARDS / BOXES ──────────────────────────────────────────── */
.card{background:var(--s1);border:0.5px solid var(--bd);border-radius:var(--r-md);padding:14px 16px;margin-bottom:10px;}
.sbox{background:var(--s2);border-radius:var(--r-sm);padding:14px;}
.sbox.click{cursor:pointer;transition:background 0.12s;}
.sbox.click:active{background:var(--s3);}
.sbox-lbl{font-size:10px;color:var(--mu2);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;font-weight:600;}
.sbox-val{font-size:22px;font-weight:800;letter-spacing:-0.5px;line-height:1.2;}
.sbox-sub{font-size:11px;color:var(--mu2);margin-top:3px;}
.sgrid{display:grid;gap:8px;margin-bottom:12px;}
.sg2{grid-template-columns:1fr 1fr;}
.sg3{grid-template-columns:1fr 1fr 1fr;}
.sg4{grid-template-columns:repeat(4,1fr);}
.chart-wrap{position:relative;width:100%;height:180px;margin:8px 0;}
.log-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--bd);font-size:13px;gap:6px;}
.log-row:last-child{border-bottom:none;}
.wo-row{padding:11px 0;border-bottom:0.5px solid var(--bd);display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.wo-row:last-child{border-bottom:none;}
.prog-bar{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;margin:6px 0;}
.prog-fill{height:100%;border-radius:3px;transition:width 0.5s ease;}
.tab-pills{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.tpill{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;border:0.5px solid var(--bd2);color:var(--mu);transition:all 0.15s;}
.tpill.active{background:var(--grn);color:#0D0D0D;border-color:var(--grn);}
.phase-tabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;margin-bottom:12px;}
.phase-tabs::-webkit-scrollbar{display:none;}
.ptab{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;border:0.5px solid var(--bd2);color:var(--mu);transition:all 0.15s;}
.ptab.active{color:#0D0D0D;font-weight:700;}
.day-tabs{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;}
.dtab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:0.5px solid var(--bd);color:var(--mu);transition:all 0.15s;}
.dtab.active{background:var(--s2);color:var(--tx);border-color:var(--bd2);}
.bsel-wrap{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:3px;margin-bottom:12px;}
.bsel-wrap::-webkit-scrollbar{display:none;}
.bsel{flex-shrink:0;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;border:0.5px solid var(--bd);color:var(--mu);transition:all 0.15s;}
.bsel.active{color:#0D0D0D;font-weight:700;}
.phase-strip{border-radius:var(--r-md);padding:14px 16px;margin-bottom:12px;border:0.5px solid rgba(255,255,255,0.06);}
.plan-ex-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--bd);}
.plan-ex-row:last-child{border-bottom:none;}
.plan-ex-thumb{width:52px;height:52px;border-radius:var(--r-xs);overflow:hidden;flex-shrink:0;background:#141416;display:flex;align-items:center;justify-content:center;}
.plan-ex-thumb img{width:100%;height:100%;object-fit:cover;display:block;}

/* ── NUTRITION ──────────────────────────────────────────────── */
.food-cat-lbl{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:0.08em;padding:10px 0 6px;}
.food-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--bd);}
.food-item:last-child{border-bottom:none;}
.food-add-btn{width:32px;height:32px;border-radius:50%;background:var(--grn-d);border:0.5px solid rgba(189,242,75,0.3);color:var(--grn);font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;font-weight:300;}
.food-add-btn:active{background:var(--grn);color:#0D0D0D;}
.lf-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--bd);gap:8px;font-size:13px;}
.lf-row:last-child{border-bottom:none;}
.inp{width:100%;background:var(--s2);border:0.5px solid var(--bd2);border-radius:var(--r-sm);padding:13px 14px;color:var(--tx);font-size:15px;}
.inp:focus{border-color:var(--acc);}
.btn-p{background:var(--grn);color:#0D0D0D;border-radius:var(--r-sm);padding:14px 20px;font-size:14px;font-weight:700;}
.btn-p:active{opacity:0.8;}
.btn-s{background:var(--s2);color:var(--tx);border:0.5px solid var(--bd2);border-radius:var(--r-sm);padding:13px 16px;font-size:13px;font-weight:600;}
.wed-banner{background:var(--grn-d);border:0.5px solid rgba(189,242,75,0.2);border-radius:var(--r-md);padding:14px 16px;margin-bottom:12px;cursor:pointer;}
.wed-text{font-size:13px;color:rgba(189,242,75,0.85);line-height:1.6;}
.nrule{display:flex;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--bd);font-size:13px;}
.nrule:last-child{border-bottom:none;}
.nrule-n{font-size:15px;font-weight:800;color:var(--acc);width:20px;flex-shrink:0;}
.nrule-t{color:var(--mu);line-height:1.5;}
.swap-row{padding:9px 0;border-bottom:0.5px solid var(--bd);font-size:13px;}
.swap-row:last-child{border-bottom:none;}

/* ── CALENDAR ───────────────────────────────────────────────── */
.cal-month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-month-title{font-size:17px;font-weight:700;letter-spacing:-0.3px;}
.cal-nav-btn{width:34px;height:34px;border-radius:50%;background:var(--s2);color:var(--tx);font-size:17px;display:flex;align-items:center;justify-content:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dow{font-size:10px;color:var(--mu2);text-align:center;padding:4px 0;font-weight:700;}
.cal-day{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:600;position:relative;padding:1px;}
.cal-day.future{color:var(--mu2);opacity:0.4;}
.cal-day.worked{background:rgba(189,242,75,0.14);color:var(--grn);}
.cal-day.missed{background:rgba(255,69,58,0.10);color:var(--red);}
.cal-day.today-mk{outline:1.5px solid var(--acc);outline-offset:-1px;}
.cal-day .cal-icon{position:absolute;top:1px;right:1px;font-size:8px;}
.cal-legend{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;justify-content:center;}
.cal-legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--mu);}
/* ── FLOATING CIRCLE CALENDAR ─────────────────────────────────────────── */
.cal-wrap{background:#141414;border:0.5px solid rgba(255,255,255,0.08);border-radius:20px;padding:14px 12px 16px;box-shadow:0 10px 34px rgba(0,0,0,0.5);}
.cal-c{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;background:#323232;color:#fff;transition:background 0.12s;}
.cal-c.empty{background:transparent;}
.cal-c.future{background:#1f1f1f;color:rgba(255,255,255,0.28);}
.cal-c.trained{background:#BDF24B;color:#0D0D0D;}
.cal-c.missed{background:#FF9500;color:#0D0D0D;}
.cal-c.tdy{outline:2px solid var(--acc);outline-offset:-2px;}
.cal-c.tap{cursor:pointer;}
.cal-c.tap:not(.trained):not(.missed):not(.future):active{background:#464646;}
.cal-key{width:13px;height:13px;border-radius:50%;display:inline-block;flex-shrink:0;}
/* Hevy-style clean calendar cells */
.cal-day2{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:13px;font-weight:600;border-radius:50%;transition:background 0.12s;}
.cal-day2:active{background:var(--s2);}
.cal-today2{outline:1.5px solid var(--acc);outline-offset:-1px;}
.cal-dot2{width:6px;height:6px;border-radius:50%;display:block;}
.wed-expand{display:none;padding-top:12px;border-top:0.5px solid var(--bd);margin-top:10px;}
.wed-expand.show{display:block;}
@keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.25);}100%{transform:scale(1);}}
.pop{animation:pop 0.2s ease;}

/* ── HAMBURGER SLIDE MENU ────────────────────────────────────────────── */
.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:600;display:none;}
.menu-overlay.show{display:block;}
.menu-drawer{position:absolute;top:0;right:0;height:100%;width:min(80vw,300px);background:var(--s1);border-left:0.5px solid var(--bd2);padding:calc(var(--st) + 20px) 18px calc(20px + var(--sb));transform:translateX(100%);transition:transform 0.22s ease;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:-8px 0 24px rgba(0,0,0,0.4);}
.menu-overlay.show .menu-drawer{transform:translateX(0);}
.menu-link{display:flex;align-items:center;gap:14px;width:100%;text-align:left;padding:14px 12px;border-radius:var(--r-sm);color:var(--tx);font-size:15px;font-weight:600;letter-spacing:-0.2px;transition:background 0.12s;}
.menu-link:active{background:var(--s3);}
.menu-ic{font-size:19px;width:24px;text-align:center;flex-shrink:0;}
/* ── TOAST + SESSION SUMMARY ──────────────────────────────────────────── */
#toast{position:fixed;left:50%;bottom:calc(92px + var(--sb));transform:translateX(-50%) translateY(20px);z-index:700;background:var(--grn);color:#0D0D0D;padding:11px 18px;border-radius:14px;font-size:13px;font-weight:700;line-height:1.3;box-shadow:0 6px 24px rgba(0,0,0,0.5);opacity:0;pointer-events:none;transition:opacity 0.25s,transform 0.25s;max-width:88vw;text-align:center;}
.sumbtn{padding:12px 0;border-radius:var(--r-sm);background:var(--s2);border:0.5px solid var(--bd2);color:var(--tx);font-size:15px;font-weight:600;}
.sumbtn.sel{background:var(--grn);border-color:var(--grn);color:#0D0D0D;}
</style>
</head>

  <div style="flex:1;text-align:center;min-width:0">

  </div>
</div>

<div class="wtb" id="wtb">

    <div class="wtb-dot"></div>
    <div><div class="wtb-time" id="wtbTime">0:00</div><div style="font-size:11px;color:var(--mu)">Workout in progress</div></div>

</div>

<div class="menu-overlay" id="menuOverlay" onclick="if(event.target===this)closeMenu()">
  <div class="menu-drawer" id="menuDrawer">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <div style="font-size:17px;font-weight:700;letter-spacing:-0.3px">Menu</div>
      <button class="modal-close-btn" onclick="closeMenu()">✕</button>
    </div>
    <button class="menu-link" onclick="menuGo('home')"><span class="menu-ic">🏠</span>Home</button>
    <button class="menu-link" onclick="menuGo('today')"><span class="menu-ic">⚡</span>Today</button>
    <button class="menu-link" onclick="menuGo('history')"><span class="menu-ic">📊</span>History</button>
    <button class="menu-link" onclick="menuGo('exercises')"><span class="menu-ic">🏋️</span>Exercises</button>

<!-- LOG PAST WORKOUT MODAL -->

const EX_LIB_RAW=[["3/4 Sit-Up","3_4_Sit-Up/0.jpg","abs",[],["Lie down on the floor and secure your feet. Your legs should be bent at the knees.","Place your hands behind or to the side of your head. You will begin with your back on the ground. This will be your starting position.","Flex your hips and spine to raise your torso toward your knees.","At the top of the contraction your torso should be perpendicular to the ground. Reverse the motion, going only ¾ of the way down.","Repeat for the recommended amount of repetitions."]],["90/90 Hamstring","90_90_Hamstring/0.jpg","hamstrings",["calves"],["Lie on your back, with one leg extended straight out.","With the other leg, bend the hip and knee to 90 degrees. You may brace your leg with your hands if necessary. This will be your starting position.","Extend your leg straight into the air, pausing briefly at the top. Return the leg to the starting position.","Repeat for 10-20 repetitions, and then switch to the other leg."]],["Ab Crunch Machine","Ab_Crunch_Machine/0.jpg","abs",[],["Select a light resistance and sit down on the ab machine placing your feet under the pads provided and grabbing the top handles. Your arms should be bent at a 90 degree angle as you rest the triceps on the pads provided. This will be your starting position.","At the same time, begin to lift the legs up as you crunch your upper torso. Breathe out as you perform this movement. Tip: Be sure to use a slow and controlled motion. Concentrate on using your abs to move the weight while relaxing your legs and feet.","After a second pause, slowly return to the starting position as you breathe in.","Repeat the movement for the prescribed amount of repetitions."]],["Ab Roller","Ab_Roller/0.jpg","abs",["delts"],["Hold the Ab Roller with both hands and kneel on the floor.","Now place the ab roller on the floor in front of you so that you are on all your hands and knees (as in a kneeling push up position). This will be your starting position.","Slowly roll the ab roller straight forward, stretching your body into a straight position. Tip: Go down as far as you can without touching the floor with your body. Breathe in during this portion of the movement.","After a pause at the stretched position, start pulling yourself back to the starting position as you breathe out. Tip: Go slowly and keep your abs tight at all times."]],["Adductor","Adductor/0.jpg","adductors",[],["Lie face down with one leg on a foam roll.","Rotate the leg so that the foam roll contacts against your inner thigh. Shift as much weight onto the foam roll as can be tolerated.","While trying to relax the muscles if the inner thigh, roll over the foam between your hip and knee, holding points of tension for 10-30 seconds. Repeat with the other leg."]],["Adductor/Groin","Adductor_Groin/0.jpg","adductors",[],["Lie on your back with your feet raised towards the ceiling.","Have your partner hold your feet or ankles. Abduct your legs as far as you can. This will be your starting position.","Attempt to squeeze your legs together for 10 or more seconds, while your partner prevents you from doing so.","Now, relax the muscles in your legs as your partner pushes your feet apart, stretching as far as is comfortable for you. Be sure to let your partner know when the stretch is adequate to prevent overstretching or injury."]],["Advanced Kettlebell Windmill","Advanced_Kettlebell_Windmill/0.jpg","abs",["glutes","hamstrings","delts"],["Clean and press a kettlebell overhead with one arm.","Keeping the kettlebell locked out at all times, push your butt out in the direction of the locked out kettlebell. Keep the non-working arm behind your back and turn your feet out at a forty-five degree angle from the arm with the kettlebell.","Lower yourself as far as possible.","Pause for a second and reverse the motion back to the starting position."]],["Air Bike","Air_Bike/0.jpg","abs",[],["Lie flat on the floor with your lower back pressed to the ground. For this exercise, you will need to put your hands beside your head. Be careful however to not strain with the neck as you perform it. Now lift your shoulders into the crunch position.","Bring knees up to where they are perpendicular to the floor, with your lower legs parallel to the floor. This will be your starting position.","Now simultaneously, slowly go through a cycle pedal motion kicking forward with the right leg and bringing in the knee of the left leg. Bring your right elbow close to your left knee by crunching to the side, as you breathe out.","Go back to the initial position as you breathe in.","Crunch to the opposite side as you cycle your legs and bring closer your left elbow to your right knee and exhale.","Continue alternating in this manner until all of the recommended repetitions for each side have been completed."]],["All Fours Quad Stretch","All_Fours_Quad_Stretch/0.jpg","quadriceps",["quadriceps"],["Start off on your hands and knees, then lift your leg off the floor and hold the foot with your hand.","Use your hand to hold the foot or ankle, keeping the knee fully flexed, stretching the quadriceps and hip flexors.","Focus on extending your hips, thrusting them towards the floor. Hold for 10-20 seconds and then switch sides."]],["Alternate Hammer Curl","Alternate_Hammer_Curl/0.jpg","biceps",["forearms"],["Stand up with your torso upright and a dumbbell in each hand being held at arms length. The elbows should be close to the torso.","The palms of the hands should be facing your torso. This will be your starting position.","While holding the upper arm stationary, curl the right weight forward while contracting the biceps as you breathe out. Continue the movement until your biceps is fully contracted and the dumbbells are at shoulder level. Hold the contracted position for a second as you squeeze the biceps. Tip: Only the forearms should move.","Slowly begin to bring the dumbbells back to starting position as your breathe in.","Repeat the movement with the left hand. This equals one repetition.","Continue alternating in this manner for the recommended amount of repetitions."]],["Alternate Heel Touchers","Alternate_Heel_Touchers/0.jpg","abs",[],["Lie on the floor with the knees bent and the feet on the floor around 18-24 inches apart. Your arms should be extended by your side. This will be your starting position.","Crunch over your torso forward and up about 3-4 inches to the right side and touch your right heel as you hold the contraction for a second. Exhale while performing this movement.","Now go back slowly to the starting position as you inhale.","Now crunch over your torso forward and up around 3-4 inches to the left side and touch your left heel as you hold the contraction for a second. Exhale while performing this movement and then go back to the starting position as you inhale. Now that both heels have been touched, that is considered 1 repetition.","Continue alternating sides in this manner until all prescribed repetitions are done."]],["Alternate Incline Dumbbell Curl","Alternate_Incline_Dumbbell_Curl/0.jpg","biceps",["forearms"],["Sit down on an incline bench with a dumbbell in each hand being held at arms length. Tip: Keep the elbows close to the torso.This will be your starting position.","While holding the upper arm stationary, curl the right weight forward while contracting the biceps as you breathe out. As you do so, rotate the hand so that the palm is facing up. Continue the movement until your biceps is fully contracted and the dumbbells are at shoulder level. Hold the contracted position for a second as you squeeze the biceps. Tip: Only the forearms should move.","Slowly begin to bring the dumbbell back to starting position as your breathe in.","Repeat the movement with the left hand. This equals one repetition.","Continue alternating in this manner for the recommended amount of repetitions."]],["Alternate Leg Diagonal Bound","Alternate_Leg_Diagonal_Bound/0.jpg","quadriceps",["abductors","adductors","calves","glutes","hamstrings"],["Assume a comfortable stance with one foot slightly in front of the other.","Begin by pushing off with the front leg, driving the opposite knee forward and as high as possible before landing. Attempt to cover as much distance to each side with each bound.","It may help to use a line on the ground to guage distance from side to side.","Repeat the sequence with the other leg."]],["Alternating Cable Shoulder Press","Alternating_Cable_Shoulder_Press/0.jpg","delts",["triceps"],["Move the cables to the bottom of the tower and select an appropriate weight.","Grasp the cables and hold them at shoulder height, palms facing forward. This will be your starting position.","Keeping your head and chest up, extend through the elbow to press one side directly over head.","After pausing at the top, return to the starting position and repeat on the opposite side."]],["Alternating Deltoid Raise","Alternating_Deltoid_Raise/0.jpg","delts",[],["In a standing position, hold a pair of dumbbells at your side.","Keeping your elbows slightly bent, raise the weights directly in front of you to shoulder height, avoiding any swinging or cheating.","Return the weights to your side.","On the next repetition, raise the weights laterally, raising them out to your side to about shoulder height.","Return the weights to the starting position and continue alternating to the front and side."]],["Alternating Floor Press","Alternating_Floor_Press/0.jpg","pectorals",["abs","delts","triceps"],["Lie on the floor with two kettlebells next to your shoulders.","Position one in place on your chest and then the other, gripping the kettlebells on the handle with the palms facing forward.","Extend both arms, so that the kettlebells are being held above your chest. Lower one kettlebell, bringing it to your chest and turn the wrist in the direction of the locked out kettlebell.","Raise the kettlebell and repeat on the opposite side."]],["Alternating Hang Clean","Alternating_Hang_Clean/0.jpg","hamstrings",["biceps","calves","forearms","glutes","lower back","traps"],["Place two kettlebells between your feet. To get in the starting position, push your butt back and look straight ahead.","Clean one kettlebell to your shoulder and hold on to the other kettlebell in a hanging position. Clean the kettlebell to your shoulder by extending through the legs and hips as you pull the kettlebell towards your shoulders. Rotate your wrist as you do so.","Lower the cleaned kettlebell to a hanging position and clean the alternate kettlebell. Repeat."]],["Alternating Kettlebell Press","Alternating_Kettlebell_Press/0.jpg","delts",["triceps"],["Clean two kettlebells to your shoulders. Clean the kettlebells to your shoulders by extending through the legs and hips as you pull the kettlebells towards your shoulders. Rotate your wrists as you do so.","Press one directly overhead by extending through the elbow, turning it so the palm faces forward while holding the other kettlebell stationary .","Lower the pressed kettlebell to the starting position and immediately press with your other arm."]],["Alternating Kettlebell Row","Alternating_Kettlebell_Row/0.jpg","upper back",["biceps","lats"],["Place two kettlebells in front of your feet. Bend your knees slightly and push your butt out as much as possible. As you bend over to get into the starting position grab both kettlebells by the handles.","Pull one kettlebell off of the floor while holding on to the other kettlebell. Retract the shoulder blade of the working side, as you flex the elbow, drawing the kettlebell towards your stomach or rib cage.","Lower the kettlebell in the working arm and repeat with your other arm."]],["Alternating Renegade Row","Alternating_Renegade_Row/0.jpg","upper back",["abs","biceps","pectorals","lats","triceps"],["Place two kettlebells on the floor about shoulder width apart. Position yourself on your toes and your hands as though you were doing a pushup, with the body straight and extended. Use the handles of the kettlebells to support your upper body. You may need to position your feet wide for support.","Push one kettlebell into the floor and row the other kettlebell, retracting the shoulder blade of the working side as you flex the elbow, pulling it to your side.","Then lower the kettlebell to the floor and begin the kettlebell in the opposite hand. Repeat for several reps."]],["Ankle Circles","Ankle_Circles/0.jpg","calves",[],["Use a sturdy object like a squat rack to hold yourself.","Lift the right leg in the air (just around 2 inches from the floor) and perform a circular motion with the big toe. Pretend that you are drawing a big circle with it. Tip: One circle equals 1 repetition. Breathe normally as you perform the movement.","When you are done with the right foot, then repeat with the left leg."]],["Ankle On The Knee","Ankle_On_The_Knee/0.jpg","glutes",[],["From a lying position, bend your knees and keep your feet on the floor.","Place your ankle of one foot on your opposite knee.","Grasp the thigh or knee of the bottom leg and pull both of your legs into the chest. Relax your neck and shoulders. Hold for 10-20 seconds and then switch sides."]],["Anterior Tibialis-SMR","Anterior_Tibialis-SMR/0.jpg","calves",[],["Begin seated on the ground with your legs bent and your feet on the floor.","Using a Muscle Roller or a rolling pin, apply pressure to the muscles on the outside of your shins. Work from just below the knee to above the ankle, pausing at points of tension for 10-30 seconds. Repeat on the other leg."]],["Anti-Gravity Press","Anti-Gravity_Press/0.jpg","delts",["upper back","traps","triceps"],["Place a bar on the ground behind the head of an incline bench.","Lay on the bench face down. With a pronated grip, pick the barbell up from the floor. Flex the elbows, performing a reverse curl to bring the bar near your chest. This will be your starting position.","To begin, press the barbell out in front of your head by extending your elbows. Keep your arms parallel to the ground throughout the movement.","Return to the starting position and repeat to complete the set."]],["Arm Circles","Arm_Circles/0.jpg","delts",["traps"],["Stand up and extend your arms straight out by the sides. The arms should be parallel to the floor and perpendicular (90-degree angle) to your torso. This will be your starting position.","Slowly start to make circles of about 1 foot in diameter with each outstretched arm. Breathe normally as you perform the movement.","Continue the circular motion of the outstretched arms for about ten seconds. Then reverse the movement, going the opposite direction."]],["Arnold Dumbbell Press","Arnold_Dumbbell_Press/0.jpg","delts",["triceps"],["Sit on an exercise bench with back support and hold two dumbbells in front of you at about upper chest level with your palms facing your body and your elbows bent. Tip: Your arms should be next to your torso. The starting position should look like the contracted portion of a dumbbell curl.","Now to perform the movement, raise the dumbbells as you rotate the palms of your hands until they are facing forward.","Continue lifting the dumbbells until your arms are extended above you in straight arm position. Breathe out as you perform this portion of the movement.","After a second pause at the top, begin to lower the dumbbells to the original position by rotating the palms of your hands towards you. Tip: The left arm will be rotated in a counter clockwise manner while the right one will be rotated clockwise. Breathe in as you perform this portion of the movement.","Repeat for the recommended amount of repetitions."]],["Around The Worlds","Around_The_Worlds/0.jpg","pectorals",["delts"],["Lay down on a flat bench holding a dumbbell in each hand with the palms of the hands facing towards the ceiling. Tip: Your arms should be parallel to the floor and next to your thighs. To avoid injury, make sure that you keep your elbows slightly bent. This will be your starting position.","Now move the dumbbells by creating a semi-circle as you displace them from the initial position to over the head. All of the movement should happen with the arms parallel to the floor at all times. Breathe in as you perform this portion of the movement.","Reverse the movement to return the weight to the starting position as you exhale."]],["Atlas Stone Trainer","Atlas_Stone_Trainer/0.jpg","lower back",["biceps","forearms","glutes","hamstrings","quadriceps"],["This trainer is effective for developing Atlas Stone strength for those who don't have access to stones, and are typically made from bar ends or heavy pipe.","Begin by loading the desired weight onto the bar. Straddle the weight, wrapping your arms around the implement, bending at the hips.","Begin by pulling the weight up past the knees, extending through the hips. As the weight clears the knees, it can be lapped by resting it on your thighs and sitting back, hugging it tightly to your chest.","Finish the movement by extending through your hips and knees to raise the weight as high as possible. The weight can be returned to the lap or to the ground for successive repetitions."]],["Atlas Stones","Atlas_Stones/0.jpg","lower back",["abs","adductors","biceps","calves","forearms","glutes","hamstrings","upper back","quadriceps","traps"],["Begin with the atlas stone between your feet. Bend at the hips to wrap your arms vertically around the Atlas Stone, attempting to get your fingers underneath the stone. Many stones will have a small flat portion on the bottom, which will make the stone easier to hold.","Pulling the stone into your torso, drive through the back half of your feet to pull the stone from the ground.","As the stone passes the knees, lap it by sitting backward, pulling the stone on top of your thighs.","Sit low, getting the stone high onto your chest as you change your grip to reach over the stone. Stand, driving through with your hips. Close distance to the loading platform, and lean back, extending the hips to get the stone as high as possible."]],["Axle Deadlift","Axle_Deadlift/0.jpg","lower back",["forearms","glutes","hamstrings","upper back","quadriceps","traps"],["Approach the bar so that it is centered over your feet. You feet should be about hip width apart. Bend at the hip to grip the bar at shoulder width, allowing your shoulder blades to protract. Typically, you would use an over/under grip.","With your feet and your grip set, take a big breath and then lower your hips and flex the knees until your shins contact the bar. Look forward with your head, keep your chest up and your back arched, and begin driving through the heels to move the weight upward.","After the bar passes the knees, aggressively pull the bar back, pulling your shoulder blades together as you drive your hips forward into the bar.","Lower the bar by bending at the hips and guiding it to the floor."]],["Back Flyes - With Bands","Back_Flyes_-_With_Bands/0.jpg","delts",["upper back","triceps"],["Run a band around a stationary post like that of a squat rack.","Grab the band by the handles and stand back so that the tension in the band rises.","Extend and lift the arms straight in front of you. Tip: Your arms should be straight and parallel to the floor while perpendicular to your torso. Your feet should be firmly planted on the floor spread at shoulder width. This will be your starting position.","As you exhale, move your arms to the sides and back. Keep your arms extended and parallel to the floor. Continue the movement until the arms are extended to your sides.","After a pause, go back to the original position as you inhale.","Repeat for the recommended amount of repetitions."]],["Backward Drag","Backward_Drag/0.jpg","quadriceps",["calves","forearms","glutes","hamstrings","lower back"],["Load a sled with the desired weight, attaching a rope or straps to the sled that you can hold onto.","Begin the exercise by moving backwards for a given distance. Leaning back, extend through the legs for short steps to move as quickly as possible."]],["Backward Medicine Ball Throw","Backward_Medicine_Ball_Throw/0.jpg","delts",[],["This exercise is best done with a partner. If you lack a partner, the ball can be thrown and retrieved or thrown against a wall.","Begin standing a few meters in front of your partner, both facing the same direction. Begin holding the ball between your legs.","Squat down and then forcefully reverse direction, coming to full extension and you toss the ball over your head to your partner.","Your partner can then roll the ball back to you. Repeat for the desired number of repetitions."]],["Balance Board","Balance_Board/0.jpg","calves",["hamstrings","quadriceps"],["Place a balance board in front of you.","Stand up on it and try to balance yourself.","Hold the balance for as long as desired."]],["Ball Leg Curl","Ball_Leg_Curl/0.jpg","hamstrings",["calves","glutes"],["Begin on the floor laying on your back with your feet on top of the ball.","Position the ball so that when your legs are extended your ankles are on top of the ball. This will be your starting position.","Raise your hips off of the ground, keeping your weight on the shoulder blades and your feet.","Flex the knees, pulling the ball as close to you as you can, contracting the hamstrings.","After a brief pause, return to the starting position."]],["Band Assisted Pull-Up","Band_Assisted_Pull-Up/0.jpg","lats",["abs","forearms","upper back"],["Choke the band around the center of the pullup bar. You can use different bands to provide varying levels of assistance.","Pull the end of the band down, and place one bent knee into the loop, ensuring it won't slip out. Take a medium to wide grip on the bar. This will be your starting position.","Pull yourself upward by contracting the lats as you flex the elbow. The elbow should be driven to your side. Pull to the front, attempting to get your chin over the bar. Avoid swinging or jerking movements.","After a brief pause, return to the starting position."]],["Band Good Morning","Band_Good_Morning/0.jpg","hamstrings",["glutes","lower back"],["Using a 41 inch band, stand on one end, spreading your feet a small amount. Bend at the hips to loop the end of the band behind your neck. This will be your starting position.","Keeping your legs straight, extend through the hips to come to a near vertical position.","Ensure that you do not round your back as you go down back to the starting position."]],["Band Good Morning (Pull Through)","Band_Good_Morning_Pull_Through/0.jpg","hamstrings",["glutes","lower back"],["Loop the band around a post. Standing a little ways away, loop the opposite end around the neck. Your hands can help hold the band in position.","Begin by bending at the hips, getting your butt back as far as possible. Keep your back flat and bend forward to about 90 degrees. Your knees should be only slightly bent.","Return to the starting position be driving through with the hips to come back to a standing position."]],["Band Hip Adductions","Band_Hip_Adductions/0.jpg","adductors",[],["Anchor a band around a solid post or other object.","Stand with your left side to the post, and put your right foot through the band, getting it around the ankle.","Stand up straight and hold onto the post if needed. This will be your starting position.","Keeping the knee straight, raise your right legs out to the side as far as you can.","Return to the starting position and repeat for the desired rep count.","Switch sides."]],["Band Pull Apart","Band_Pull_Apart/0.jpg","delts",["upper back","traps"],["Begin with your arms extended straight out in front of you, holding the band with both hands.","Initiate the movement by performing a reverse fly motion, moving your hands out laterally to your sides.","Keep your elbows extended as you perform the movement, bringing the band to your chest. Ensure that you keep your shoulders back during the exercise.","Pause as you complete the movement, returning to the starting position under control."]],["Band Skull Crusher","Band_Skull_Crusher/0.jpg","triceps",[],["Secure a band to the base of a rack or the bench. Lay on the bench so that the band is lined up with your head.","Take hold of the band, raising your elbows so that the upper arm is perpendicular to the floor. With the elbow flexed, the band should be above your head. This will be your starting position.","Extend through the elbow to straighten your arm, keeping your upper arm in place. Pause at the top of the motion, and return to the starting position."]],["Barbell Ab Rollout","Barbell_Ab_Rollout/0.jpg","abs",["lower back","delts"],["For this exercise you will need to get into a pushup position, but instead of having your hands of the floor, you will be grabbing on to an Olympic barbell (loaded with 5-10 lbs on each side) instead. This will be your starting position.","While keeping a slight arch on your back, lift your hips and roll the barbell towards your feet as you exhale. Tip: As you perform the movement, your glutes should be coming up, you should be keeping the abs tight and should maintain your back posture at all times. Also your arms should be staying perpendicular to the floor throughout the movement. If you don't, you will work out your shoulders and back more than the abs.","After a second contraction at the top, start to roll the barbell back forward to the starting position slowly as you inhale.","Repeat for the recommended amount of repetitions."]],["Barbell Ab Rollout - On Knees","Barbell_Ab_Rollout_-_On_Knees/0.jpg","abs",["lower back","delts"],["Hold an Olympic barbell loaded with 5-10lbs on each side and kneel on the floor.","Now place the barbell on the floor in front of you so that you are on all your hands and knees (as in a kneeling push up position). This will be your starting position.","Slowly roll the barbell straight forward, stretching your body into a straight position. Tip: Go down as far as you can without touching the floor with your body. Breathe in during this portion of the movement.","After a second pause at the stretched position, start pulling yourself back to the starting position as you breathe out. Tip: Go slowly and keep your abs tight at all times."]],["Barbell Bench Press - Medium Grip","Barbell_Bench_Press_-_Medium_Grip/0.jpg","pectorals",["delts","triceps"],["Lie back on a flat bench. Using a medium width grip (a grip that creates a 90-degree angle in the middle of the movement between the forearms and the upper arms), lift the bar from the rack and hold it straight over you with your arms locked. This will be your starting position.","From the starting position, breathe in and begin coming down slowly until the bar touches your middle chest.","After a brief pause, push the bar back to the starting position as you breathe out. Focus on pushing the bar using your chest muscles. Lock your arms and squeeze your chest in the contracted position at the top of the motion, hold for a second and then start coming down slowly again. Tip: Ideally, lowering the weight should take about twice as long as raising it.","Repeat the movement for the prescribed amount of repetitions.","When you are done, place the bar back in the rack."]],["Barbell Curl","Barbell_Curl/0.jpg","biceps",["forearms"],["Stand up with your torso upright while holding a barbell at a shoulder-width grip. The palm of your hands should be facing forward and the elbows should be close to the torso. This will be your starting position.","While holding the upper arms stationary, curl the weights forward while contracting the biceps as you breathe out. Tip: Only the forearms should move.","Continue the movement until your biceps are fully contracted and the bar is at shoulder level. Hold the contracted position for a second and squeeze the biceps hard.","Slowly begin to bring the bar back to starting position as your breathe in.","Repeat for the recommended amount of repetitions."]],["Barbell Curls Lying Against An Incline","Barbell_Curls_Lying_Against_An_Incline/0.jpg","biceps",[],["Lie against an incline bench, with your arms holding a barbell and hanging down in a horizontal line. This will be your starting position.","While keeping the upper arms stationary, curl the weight up as high as you can while squeezing the biceps. Breathe out as you perform this portion of the movement. Tip: Only the forearms should move. Do not swing the arms.","After a second contraction, slowly go back to the starting position as you inhale. Tip: Make sure that you go all of the way down.","Repeat for the recommended amount of repetitions."]],["Barbell Deadlift","Barbell_Deadlift/0.jpg","lower back",["calves","forearms","glutes","hamstrings","lats","upper back","quadriceps","traps"],["Stand in front of a loaded barbell.","While keeping the back as straight as possible, bend your knees, bend forward and grasp the bar using a medium (shoulder width) overhand grip. This will be the starting position of the exercise. Tip: If it is difficult to hold on to the bar with this grip, alternate your grip or use wrist straps.","While holding the bar, start the lift by pushing with your legs while simultaneously getting your torso to the upright position as you breathe out. In the upright position, stick your chest out and contract the back by bringing the shoulder blades back. Think of how the soldiers in the military look when they are in standing in attention.","Go back to the starting position by bending at the knees while simultaneously leaning the torso forward at the waist while keeping the back straight. When the weights on the bar touch the floor you are back at the starting position and ready to perform another repetition.","Perform the amount of repetitions prescribed in the program."]],["Barbell Full Squat","Barbell_Full_Squat/0.jpg","quadriceps",["calves","glutes","hamstrings","lower back"],["This exercise is best performed inside a squat rack for safety purposes. To begin, first set the bar on a rack just above shoulder level. Once the correct height is chosen and the bar is loaded, step under the bar and place the back of your shoulders (slightly below the neck) across it.","Hold on to the bar using both arms at each side and lift it off the rack by first pushing with your legs and at the same time straightening your torso.","Step away from the rack and position your legs using a shoulder-width medium stance with the toes slightly pointed out. Keep your head up at all times and maintain a straight back. This will be your starting position.","Begin to slowly lower the bar by bending the knees and sitting back with your hips as you maintain a straight posture with the head up. Continue down until your hamstrings are on your calves. Inhale as you perform this portion of the movement.","Begin to raise the bar as you exhale by pushing the floor with the heel or middle of your foot as you straighten the legs and extend the hips to go back to the starting position.","Repeat for the recommended amount of repetitions."]],["Barbell Glute Bridge","Barbell_Glute_Bridge/0.jpg","glutes",["calves","hamstrings"],["Begin seated on the ground with a loaded barbell over your legs. Using a fat bar or having a pad on the bar can greatly reduce the discomfort caused by this exercise. Roll the bar so that it is directly above your hips, and lay down flat on the floor.","Begin the movement by driving through with your heels, extending your hips vertically through the bar. Your weight should be supported by your upper back and the heels of your feet.","Extend as far as possible, then reverse the motion to return to the starting position."]],["Barbell Guillotine Bench Press","Barbell_Guillotine_Bench_Press/0.jpg","pectorals",["delts","triceps"],["Using a medium width grip (a grip that creates a 90-degree angle in the middle of the movement between the forearms and the upper arms), lift the bar from the rack and hold it straight over your neck with your arms locked. This will be your starting position.","As you breathe in, bring the bar down slowly until it is about 1 inch from your neck.","After a second pause, bring the bar back to the starting position as you breathe out and push the bar using your chest muscles. Lock your arms and squeeze your chest in the contracted position, hold for a second and then start coming down slowly again. It should take at least twice as long to go down than to come up.","Repeat the movement for the prescribed amount of repetitions.","When you are done, place the bar back in the rack."]],["Barbell Hack Squat","Barbell_Hack_Squat/0.jpg","quadriceps",["calves","forearms","hamstrings"],["Stand up straight while holding a barbell behind you at arms length and your feet at shoulder width. Tip: A shoulder width grip is best with the palms of your hands facing back. You can use wrist wraps for this exercise for a better grip. This will be your starting position.","While keeping your head and eyes up and back straight, squat until your upper thighs are parallel to the floor. Breathe in as you slowly go down.","Pressing mainly with the heel of the foot and squeezing the thighs, go back up as you breathe out.","Repeat for the recommended amount of repetitions."]],["Barbell Hip Thrust","Barbell_Hip_Thrust/0.jpg","glutes",["calves","hamstrings"],["Begin seated on the ground with a bench directly behind you. Have a loaded barbell over your legs. Using a fat bar or having a pad on the bar can greatly reduce the discomfort caused by this exercise.","Roll the bar so that it is directly above your hips, and lean back against the bench so that your shoulder blades are near the top of it.","Begin the movement by driving through your feet, extending your hips vertically through the bar. Your weight should be supported by your shoulder blades and your feet. Extend as far as possible, then reverse the motion to return to the starting position."]],["Barbell Incline Bench Press - Medium Grip","Barbell_Incline_Bench_Press_-_Medium_Grip/0.jpg","pectorals",["delts","triceps"],["Lie back on an incline bench. Using a medium-width grip (a grip that creates a 90-degree angle in the middle of the movement between the forearms and the upper arms), lift the bar from the rack and hold it straight over you with your arms locked. This will be your starting position.","As you breathe in, come down slowly until you feel the bar on you upper chest.","After a second pause, bring the bar back to the starting position as you breathe out and push the bar using your chest muscles. Lock your arms in the contracted position, squeeze your chest, hold for a second and then start coming down slowly again. Tip: it should take at least twice as long to go down than to come up.","Repeat the movement for the prescribed amount of repetitions.","When you are done, place the bar back in the rack."]],["Barbell Incline Shoulder Raise","Barbell_Incline_Shoulder_Raise/0.jpg","delts",["pectorals"],["Lie back on an Incline Bench. Using a medium width grip (a grip that is slightly wider than shoulder width), lift the bar from the rack and hold it straight over you with your arms straight. This will be your starting position.","While keeping the arms straight, lift the bar by protracting your shoulder blades, raising the shoulders from the bench as you breathe out.","Bring back the bar to the starting position as you breathe in.","Repeat for the recommended amount of repetitions."]],["Barbell Lunge","Barbell_Lunge/0.jpg","quadriceps",["calves","glutes","hamstrings"],["This exercise is best performed inside a squat rack for safety purposes. To begin, first set the bar on a rack just below shoulder level. Once the correct height is chosen and the bar is loaded, step under the bar and place the back of your shoulders (slightly below the neck) across it.","Hold on to the bar using both arms at each side and lift it off the rack by first pushing with your legs and at the same time straightening your torso.","Step away from the rack and step forward with your right leg and squat down through your hips, while keeping the torso upright and maintaining balance. Inhale as you go down. Note: Do not allow your knee to go forward beyond your toes as you come down, as this will put undue stress on the knee joint. li>","Using mainly the heel of your foot, push up and go back to the starting position as you exhale.","Repeat the movement for the recommended amount of repetitions and then perform with the left leg."]],["Barbell Rear Delt Row","Barbell_Rear_Delt_Row/0.jpg","delts",["biceps","lats","upper back"],["Stand up straight while holding a barbell using a wide (higher than shoulder width) and overhand (palms facing your body) grip.","Bend knees slightly and bend over as you keep the natural arch of your back. Let the arms hang in front of you as they hold the bar. Once your torso is parallel to the floor, flare the elbows out and away from your body. Tip: Your torso and your arms should resemble the letter \"T\". Now you are ready to begin the exercise.","While keeping the upper arms perpendicular to the torso, pull the barbell up towards your upper chest as you squeeze the rear delts and you breathe out. Tip: When performed correctly, this exercise should resemble a bench press in reverse. Also, refrain from using your biceps to do the work. Focus on targeting the rear delts; the arms should only act as hooks.","Slowly go back to the initial position as you breathe in.","Repeat for the recommended amount of repetitions."]],["Barbell Rollout from Bench","Barbell_Rollout_from_Bench/0.jpg","abs",["glutes","hamstrings","lats","delts"],["Place a loaded barbell on the ground, near the end of a bench. Kneel with both legs on the bench, and take a medium to narrow grip on the barbell. This will be your starting position.","To begin, extend through the hips to slowly roll the bar forward. As you roll out, flex the shoulder to roll the bar above your head. Ensure that your arms remain extended throughout the movement.","When the bar has been moved as far forward as possible, return to the starting position."]],["Barbell Seated Calf Raise","Barbell_Seated_Calf_Raise/0.jpg","calves",[],["Place a block about 12 inches in front of a flat bench.","Sit on the bench and place the ball of your feet on the block.","Have someone place a barbell over your upper thighs about 3 inches above your knees and hold it there. This will be your starting position.","Raise up on your toes as high as possible as you squeeze the calves and as you breathe out.","After a second contraction, slowly go back to the starting position. Tip: To get maximum benefit stretch your calves as far as you can.","Repeat for the recommended amount of repetitions."]],["Barbell Shoulder Press","Barbell_Shoulder_Press/0.jpg","delts",["pectorals","triceps"],["Sit on a bench with back support in a squat rack. Position a barbell at a height that is just above your head. Grab the barbell with a pronated grip (palms facing forward).","Once you pick up the barbell with the correct grip width, lift the bar up over your head by locking your arms. Hold at about shoulder level and slightly in front of your head. This is your starting position.","Lower the bar down to the shoulders slowly as you inhale.","Lift the bar back up to the starting position as you exhale.","Repeat for the recommended amount of repetitions."]],["Barbell Shrug","Barbell_Shrug/0.jpg","traps",[],["Stand up straight with your feet at shoulder width as you hold a barbell with both hands in front of you using a pronated grip (palms facing the thighs). Tip: Your hands should be a little wider than shoulder width apart. You can use wrist wraps for this exercise for a better grip. This will be your starting position.","Raise your shoulders up as far as you can go as you breathe out and hold the contraction for a second. Tip: Refrain from trying to lift the barbell by using your biceps.","Slowly return to the starting position as you breathe in.","Repeat for the recommended amount of repetitions."]],["Barbell Shrug Behind The Back","Barbell_Shrug_Behind_The_Back/0.jpg","traps",["forearms","upper back"],["Stand up straight with your feet at shoulder width as you hold a barbell with both hands behind your back using a pronated grip (palms facing back). Tip: Your hands should be a little wider than shoulder width apart. You can use wrist wraps for this exercise for better grip. This will be your starting position.","Raise your shoulders up as far as you can go as you breathe out and hold the contraction for a second. Tip: Refrain from trying to lift the barbell by using your biceps. The arms should remain stretched out at all times.","Slowly return to the starting position as you breathe in.","Repeat for the recommended amount of repetitions."]],["Barbell Side Bend","Barbell_Side_Bend/0.jpg","abs",["lower back"],["Stand up straight while holding a barbell placed on the back of your shoulders (slightly below the neck). Your feet should be shoulder width apart. This will be your starting position.","While keeping your back straight and your head up, bend only at the waist to the right as far as possible. Breathe in as you bend to the side. Then hold for a second and come back up to the starting position as you exhale. Tip: Keep the rest of the body stationary.","Now repeat the movement but bending to the left instead. Hold for a second and come back to the starting position.","Repeat for the recommended amount of repetitions."]],["Barbell Side Split Squat","Barbell_Side_Split_Squat/0.jpg","quadriceps",["calves","hamstrings","lower back"],["Stand up straight while holding a barbell placed on the back of your shoulders (slightly below the neck). Your feet should be placed wide apart with the foot of the lead leg angled out to the side. This will be your starting position.","Lower your body towards the side of your angled foot by bending the knee and hip of your lead leg and while keeping the opposite leg only slightly bent. Breathe in as you lower your body.","Return to the starting position by extending the hip and knee of the lead leg. Breathe out as you perform this movement.","After performing the recommended amount of reps, repeat the movement with the opposite leg."]],["Barbell Squat","Barbell_Squat/0.jpg","quadriceps",["calves","glutes","hamstrings","lower back"],["This exercise is best performed inside a squat rack for safety purposes. To begin, first set the bar on a rack to just below shoulder level. Once the correct height is chosen and the bar is loaded, step under the bar and place the back of your shoulders (slightly below the neck) across it.","Hold on to the bar using both arms at each side and lift it off the rack by first pushing with your legs and at the same time straightening your torso.","Step away from the rack and position your legs using a shoulder width medium stance with the toes slightly pointed out. Keep your head up at all times and also maintain a straight back. This will be your starting position. (Note: For the purposes of this discussion we will use the medium stance described above which targets overall development; however you can choose any of the three stances discussed in the foot stances section).","Begin to slowly lower the bar by bending the knees and hips as you maintain a straight posture with the head up. Continue down until the angle between the upper leg and the calves becomes slightly less than 90-degrees. Inhale as you perform this portion of the movement. Tip: If you performed the exercise correctly, the front of the knees should make an imaginary straight line with the toes that is perpendicular to the front. If your knees are past that imaginary line (if they are past your toes) then you are placing undue stress on the knee and the exercise has been performed incorrectly.","Begin to raise the bar as you exhale by pushing the floor with the heel of your foot as you straighten the legs again and go back to the starting position.","Repeat for the recommended amount of repetitions."]],["Barbell Squat To A Bench","Barbell_Squat_To_A_Bench/0.jpg","quadriceps",["calves","glutes","hamstrings","lower back"],["This exercise is best performed inside a squat rack for safety purposes. To begin, first place a flat bench or a box behind you. The flat bench is used to teach you to set your hips back and to hit depth.","","Then, set the bar on a rack that best matches your height. Once the correct height is chosen and the bar is loaded, step under the bar and place the back of your shoulders (slightly below the neck) across it.","Hold on to the bar using both arms at each side and lift it off the rack by first pushing with your legs and at the same time straightening your torso.","Step away from the rack and position your legs using a shoulder width medium stance with the toes slightly pointed out. Keep your head up at all times as looking down will get you off balance and also maintain a straight back. This will be your starting position. (Note: For the purposes of this discussion we will use the medium stance described above which targets overall development; however you can choose any of the three stances discussed in the foot stances section).","Begin to slowly lower the bar by bending the knees and sitting your hips back as you maintain a straight posture with the head up. Continue down until you slightly touch the bench behind you. Inhale as you perform this portion of the movement. Tip: If you performed the exercise correctly, the front of the knees should make an imaginary straight line with the toes that is perpendicular to the front. If your knees are past that imaginary line (if they are past your toes) then you are placing undue stress on the knee and the exercise has been performed incorrectly.","Begin to raise the bar as you exhale by pushing the floor with the heel of your foot as you straighten the legs and extend the hips to go back to the starting position.","Repeat for the recommended amount of repetitions."]],["Barbell Step Ups","Barbell_Step_Ups/0.jpg","quadriceps",["calves","glutes","hamstrings","quadriceps"],["Stand up straight while holding a barbell placed on the back of your shoulders (slightly below the neck) and stand upright behind an elevated platform (such as the one used for spotting behind a flat bench). This is your starting position.","Place the right foot on the elevated platform. Step on the platform by extending the hip and the knee of your right leg. Use the heel mainly to lift the rest of your body up and place the foot of the left leg on the platform as well. Breathe out as you execute the force required to come up.","Step down with the left leg by flexing the hip and knee of the right leg as you inhale. Return to the original standing position by placing the right foot of to next to the left foot on the initial position.","Repeat with the right leg for the recommended amount of repetitions and then perform with the left leg."]],["Barbell Walking Lunge","Barbell_Walking_Lunge/0.jpg","quadriceps",["calves","glutes","hamstrings"],["Begin standing with your feet shoulder width apart and a barbell across your upper back.","Step forward with one leg, flexing the knees to drop your hips. Descend until your rear knee nearly touches the ground. Your posture should remain upright, and your front knee should stay above the front foot.","Drive through the heel of your lead foot and extend both knees to raise yourself back up.","Step forward with your rear foot, repeating the lunge on the opposite leg."]],["Battling Ropes","Battling_Ropes/0.jpg","delts",["pectorals","forearms"],["For this exercise you will need a heavy rope anchored at its center 15-20 feet away. Standing in front of the rope, take an end in each hand with your arms extended at your side. This will be your starting position.","Initiate the movement by rapidly raising one arm to shoulder level as quickly as you can.","As you let that arm drop to the starting position, raise the opposite side.","Continue alternating your left and right arms, whipping the ropes up and down as fast as you can."]],["Bear Crawl Sled Drags","Bear_Crawl_Sled_Drags/0.jpg","quadriceps",["calves","glutes","hamstrings"],["Wearing either a harness or a loose weight belt, attach the chain to the back so that you will be facing away from the sled. Bend down so that your hands are on the ground. Your back should be flat and knees bent. This is your starting position.","Begin by driving with legs, alternating left and right. Use your hands to maintain balance and to help pull. Try to keep your back flat as you move over a given distance."]],["Behind Head Chest Stretch","Behind_Head_Chest_Stretch/0.jpg","pectorals",["delts"],["Sit upright on the floor with your partner behind you.","Place your hands behind your hand, and push your elbows back as far as you can. Your partner should hold your elbows. This will be your starting position.","Gently attempt to pull your elbows forward with your hands still behind your head for 10 or more seconds. Your partner should prevent your elbows from moving.","Now, relax your muscles and have your partner gently pull the elbows back as far as it comfortable for you. Be sure to let your partner know when the stretch is adequate to prevent overstretching or injury."]],["Bench Dips","Bench_Dips/0.jpg","triceps",["pectorals","delts"],["For this exercise you will need to place a bench behind your back. With the bench perpendicular to your body, and while looking away from it, hold on to the bench on its edge with the hands fully extended, separated at shoulder width. The legs will be extended forward, bent at the waist and perpendicular to your torso. This will be your starting position.","Slowly lower your body as you inhale by bending at the elbows until you lower yourself far enough to where there is an angle slightly smaller than 90 degrees between the upper arm and the forearm. Tip: Keep the elbows as close as possible throughout the movement. Forearms should always be pointing down.","Using your triceps to bring your torso up again, lift yourself back to the starting position.","Repeat for the recommended amount of repetitions."]],["Bench Jump","Bench_Jump/0.jpg","quadriceps",["calves","glutes","hamstrings"],["Begin with a box or bench 1-2 feet in front of you. Stand with your feet shoulder width apart. This will be your starting position.","Perform a short squat in preparation for the jump; swing your arms behind you.","Rebound out of this position, extending through the hips, knees, and ankles to jump as high as possible. Swing your arms forward and up.","Jump over the bench, landing with the knees bent, absorbing the impact through the legs.","Turn around and face the opposite direction, then jump back over the bench."]],["Bench Press - Powerlifting","Bench_Press_-_Powerlifting/0.jpg","triceps",["pectorals","forearms","lats","delts"],["Begin by lying on the bench, getting your head beyond the bar if possible. Tuck your feet underneath you and arch your back. Using the bar to help support your weight, lift your shoulder off the bench and retract them, squeezing the shoulder blades together. Use your feet to drive your traps into the bench. Maintain this tight body position throughout the movement.","However wide your grip, it should cover the ring on the bar. Pull the bar out of the rack without protracting your shoulders. Focus on squeezing the bar and trying to pull it apart.","Lower the bar to your lower chest or upper stomach. The bar, wrist, and elbow should stay in line at all times.","Pause when the barbell touches your torso, and then drive the bar up with as much force as possible. The elbows should be tucked in until lockout."]],["Bench Press - With Bands","Bench_Press_-_With_Bands/0.jpg","pectorals",["delts","triceps"],["Using a flat bench secure a band under the leg of the bench that is nearest to your head.","Once the band is secure, grab it by both handles and lie down on the bench.","Extend your arms so that you are holding the band
