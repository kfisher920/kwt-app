<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kyle's Wed Training">
<meta name="theme-color" content="#0a0a0f">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230a0a0f'/%3E%3Ctext y='72' x='50' text-anchor='middle' font-size='60'%3E%F0%9F%8F%8B%EF%B8%8F%3C/text%3E%3C/svg%3E">
<title>Kyle's Wed Training</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS ─────────────────────────────────────────── */
:root{
  --bg:#0D0D0D; --s1:#161618; --s2:#1C1C1E; --s3:#2C2C2E; --s4:#3A3A3C;
  --bd:rgba(255,255,255,0.07); --bd2:rgba(255,255,255,0.13);
  --acc:#5F65D9; --acc-d:rgba(95,101,217,0.18);
  --grn:#BDF24B; --grn-d:rgba(189,242,75,0.14);
  --red:#FF453A; --red-d:rgba(255,69,58,0.14);
  --amb:#FFD60A; --amb-d:rgba(255,214,10,0.13);
  --tx:#FFFFFF; --mu:rgba(255,255,255,0.45); --mu2:rgba(255,255,255,0.28); --mu3:rgba(255,255,255,0.10);
  --r-xs:8px; --r-sm:12px; --r-md:16px; --r-lg:20px; --r-xl:24px;
  --st:env(safe-area-inset-top,0px); --sb:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);}
body{font-family:-apple-system,'SF Pro Text',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;padding-bottom:calc(76px + var(--sb));}
button,input,select,textarea{font-family:inherit;}
button{cursor:pointer;border:none;background:none;}
input:focus,select:focus,textarea:focus{outline:none;}

/* ── TOPBAR ─────────────────────────────────────────────────── */
.tb{position:sticky;top:0;z-index:200;padding:calc(var(--st) + 12px) 18px 12px;background:rgba(13,13,13,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:0.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}
.tb-title{font-size:17px;font-weight:700;letter-spacing:-0.4px;cursor:pointer;display:flex;align-items:center;gap:8px;}
.tb-sub{font-size:11px;color:var(--acc);font-weight:500;letter-spacing:0.05em;text-transform:uppercase;margin-top:2px;}
.tb-r{text-align:right;font-size:11px;color:var(--mu);line-height:1.6;}

/* ── BOTTOM NAV ─────────────────────────────────────────────── */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(22,22,24,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:0.5px solid var(--bd);display:flex;padding-bottom:var(--sb);}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;gap:3px;color:var(--mu2);font-size:10px;font-weight:500;transition:color 0.15s;}
.bn.active{color:var(--grn);}
.bn-ic{font-size:20px;line-height:1;}

/* ── PAGES ──────────────────────────────────────────────────── */
.page{display:none;padding:0 0 8px;}
.page.active{display:block;animation:fadeUp 0.18s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.pi{padding:0 16px;}

/* ── MODALS ─────────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-sheet{background:var(--s1);border-radius:var(--r-xl) var(--r-xl) 0 0;width:100%;max-height:90dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 18px calc(28px + var(--sb));}
.modal-handle{width:36px;height:4px;background:var(--s4);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:20px;font-weight:700;letter-spacing:-0.4px;margin-bottom:16px;}
.modal-close-btn{width:32px;height:32px;border-radius:50%;background:var(--s3);color:var(--mu);font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ── WORKOUT TIMER BANNER ───────────────────────────────────── */
.wtb{display:none;position:sticky;top:calc(var(--st) + 56px);z-index:150;background:rgba(95,101,217,0.10);border-bottom:0.5px solid rgba(95,101,217,0.22);padding:10px 18px;flex-direction:row;align-items:center;justify-content:space-between;}
.wtb.active{display:flex;}
.wtb-dot{width:8px;height:8px;border-radius:50%;background:var(--grn);box-shadow:0 0 8px rgba(189,242,75,0.7);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;};}
.wtb-time{font-size:24px;font-weight:800;letter-spacing:-1px;}
.wtb-lbl{font-size:11px;color:var(--mu);margin-top:1px;}

/* ── GREETING HEADER ────────────────────────────────────────── */
.greet-card{margin:16px 16px 0;border-radius:var(--r-lg);padding:18px 20px;background:linear-gradient(135deg,#1a1b3e 0%,#252660 100%);border:0.5px solid rgba(95,101,217,0.3);position:relative;overflow:hidden;}
.greet-card::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(95,101,217,0.15);}
.greet-card::before{content:'';position:absolute;bottom:-20px;right:20px;width:80px;height:80px;border-radius:50%;background:rgba(189,242,75,0.07);}
.greet-hi{font-size:12px;color:var(--mu);font-weight:500;margin-bottom:3px;}
.greet-name{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.greet-sub{font-size:12px;color:rgba(189,242,75,0.85);margin-top:6px;font-weight:500;}
.greet-meta{display:flex;gap:10px;margin-top:12px;}
.greet-pill{background:rgba(255,255,255,0.08);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:500;color:rgba(255,255,255,0.7);display:flex;align-items:center;gap:5px;}
.greet-pill-accent{background:rgba(189,242,75,0.12);color:var(--grn);}

/* ── START/STOP BUTTON ──────────────────────────────────────── */
.btn-sw{width:100%;border-radius:var(--r-md);padding:15px;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:8px;letter-spacing:0.01em;text-transform:uppercase;}
.btn-sw.idle{background:var(--grn);color:#0D0D0D;}
.btn-sw.active{background:var(--s2);border:1px solid var(--red-d);color:var(--red);}
.btn-sw:active{opacity:0.82;}

/* ── SECTION HEADER ─────────────────────────────────────────── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin:20px 16px 10px;}
.sec-title{font-size:16px;font-weight:700;letter-spacing:-0.2px;}
.sec-see-all{font-size:12px;font-weight:600;color:var(--grn);}

/* ── WEEK DAY STRIP (replaces carousel) ────────────────────── */
.week-strip{padding:0 16px 16px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.week-strip::-webkit-scrollbar{display:none;}
.wd{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;width:46px;}
.wd-label{font-size:10px;font-weight:600;color:var(--mu2);text-transform:uppercase;letter-spacing:0.06em;}
.wd-dot{width:6px;height:6px;border-radius:50%;background:var(--s3);}
.wd-dot.gym{background:var(--acc);}
.wd-dot.home{background:var(--grn);}
.wd-dot.rest{background:var(--s4);}
.wd-dot.free{background:var(--amb);}
.wd-circle{width:40px;height:40px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--mu);border:1.5px solid transparent;transition:all 0.15s;}
.wd-circle.today{border-color:var(--acc);color:var(--tx);}
.wd-circle.sel{background:var(--grn);color:#0D0D0D;border-color:var(--grn);}
.wd-circle-past{opacity:0.55;}
.wd-past .wd-label{color:var(--mu3);}
.wd-type{font-size:9px;color:var(--mu2);font-weight:500;text-align:center;line-height:1.2;max-width:44px;}

/* ── HERO SESSION CARD ──────────────────────────────────────── */
.hero-card{margin:0 16px 4px;border-radius:var(--r-lg);overflow:hidden;position:relative;min-height:140px;background:var(--s2);}
.hero-img{width:100%;height:160px;object-fit:cover;display:block;filter:brightness(0.55);}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(13,13,13,0.92) 0%,rgba(13,13,13,0.3) 60%,transparent 100%);}
.hero-body{position:absolute;bottom:0;left:0;right:0;padding:16px;}
.hero-type-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;padding:4px 10px;border-radius:20px;margin-bottom:8px;}
.hero-title{font-size:20px;font-weight:800;letter-spacing:-0.4px;line-height:1.2;}
.hero-meta{display:flex;gap:10px;margin-top:8px;}
.hero-meta-item{display:flex;align-items:center;gap:4px;font-size:11px;color:rgba(255,255,255,0.7);font-weight:500;}

/* ── FILTER PILLS ───────────────────────────────────────────── */
.filter-wrap{padding:0 16px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;margin-bottom:2px;}
.filter-wrap::-webkit-scrollbar{display:none;}
.filter-pill{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;border:0.5px solid var(--bd2);color:var(--mu);transition:all 0.15s;white-space:nowrap;}
.filter-pill.active{background:var(--grn);color:#0D0D0D;border-color:var(--grn);}

/* ── EXERCISE CARDS ─────────────────────────────────────────── */
.ex-list{padding:0 16px;}
.ex-card{background:var(--s1);border:0.5px solid var(--bd);border-radius:var(--r-md);margin-bottom:8px;overflow:hidden;transition:border-color 0.15s;}
.ex-card.logged{border-color:rgba(189,242,75,0.4);background:rgba(189,242,75,0.06);}
.ex-card.logged .ex-name{color:rgba(189,242,75,0.7) !important;text-decoration:line-through;text-decoration-color:rgba(189,242,75,0.3);}
.ex-card.logged .ex-accent{background:var(--grn) !important;}
.ex-card.done-3{border-color:rgba(189,242,75,0.6);background:rgba(189,242,75,0.10);}
.ex-card.done-3 .ex-accent{background:var(--grn) !important;}
.ex-card.done-3 .ex-name{color:var(--grn) !important;}
.ex-card.bonus{border-color:var(--amb-d);}

/* Main row — always visible */
.ex-row{display:flex;align-items:stretch;cursor:pointer;min-height:72px;}
.drag-handle{width:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--mu3);font-size:16px;cursor:grab;touch-action:none;}
.drag-handle:active{cursor:grabbing;}
.ex-card.dragging{opacity:0.4;border:1.5px dashed var(--acc);}
.ex-card.drag-over{border-top:2px solid var(--grn);}
.ex-accent{width:3px;flex-shrink:0;border-radius:0;}
/* Image: white bg, rounded, scale to fit */
.ex-img-box{width:72px;flex-shrink:0;background:#fff;display:flex;align-items:center;justify-content:center;padding:4px;overflow:hidden;}
.ex-img-box img{width:100%;height:100%;object-fit:contain;display:block;background:#fff;}
.ex-img-fallback{width:72px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--s3);}
.ex-content{flex:1;padding:10px 10px 10px 12px;display:flex;flex-direction:column;justify-content:center;min-width:0;}
.ex-name{font-size:13px;font-weight:600;letter-spacing:-0.1px;line-height:1.3;}
.ex-card.logged .ex-name{color:var(--mu);text-decoration:line-through;text-decoration-color:var(--mu3);}
.ex-badges{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;align-items:center;}
.ex-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:0.04em;}
.eb-muscle{background:var(--acc-d);color:var(--acc);}
.eb-done{background:var(--grn-d);color:var(--grn);}
.eb-sec{background:var(--mu3);color:var(--mu);}
.eb-bonus{background:var(--amb-d);color:var(--amb);}
.eb-time{background:var(--s3);color:var(--mu2);}
.ex-expand-btn{width:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.ex-expand-circle{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--mu);transition:all 0.2s;}
.ex-expand-circle.open{background:var(--acc);border-color:var(--acc);color:#fff;transform:rotate(90deg);}

/* Expandable body */
.ex-body{display:none;border-top:0.5px solid var(--bd);}
.ex-body.open{display:block;}
/* GIF — white rounded container */
.ex-gif-box{margin:12px 12px 6px;border-radius:var(--r-sm);overflow:hidden;background:#fff;position:relative;}
.ex-gif-box img{width:100%;max-height:220px;object-fit:contain;display:block;}
.ex-gif-chips{position:absolute;bottom:8px;left:8px;right:8px;display:flex;gap:4px;flex-wrap:wrap;}
.muscle-chip{font-size:9px;padding:3px 8px;border-radius:20px;font-weight:700;backdrop-filter:blur(4px);}
.mc-p{background:rgba(95,101,217,0.88);color:#fff;}
.mc-s{background:rgba(0,0,0,0.6);color:rgba(255,255,255,0.85);}
.ex-note{font-size:12px;color:rgba(139,143,244,0.9);font-style:italic;line-height:1.5;padding:4px 12px 8px;}

/* ── SET LOGGER ─────────────────────────────────────────────── */
.set-logger{padding:10px 12px 14px;}
.set-logger-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--mu2);margin-bottom:9px;}
.set-hdr{display:grid;grid-template-columns:16px 1fr 1fr 30px 18px;gap:4px;align-items:center;padding:0 2px 7px;border-bottom:0.5px solid var(--bd);font-size:10px;color:var(--mu2);text-align:center;text-transform:uppercase;letter-spacing:0.07em;}
.set-row{display:grid;grid-template-columns:16px 1fr 1fr 30px 18px;gap:4px;align-items:center;padding:6px 2px;border-bottom:0.5px solid var(--mu3);}
.set-row:last-child{border-bottom:none;}
.set-num{font-size:12px;font-weight:600;color:var(--mu2);text-align:center;}
.set-inp{background:var(--s2);border:0.5px solid var(--bd2);border-radius:var(--r-xs);padding:7px 4px;color:var(--tx);font-size:13px;font-weight:600;text-align:center;width:100%;-webkit-appearance:none;}
.set-inp:focus{border-color:var(--acc);background:var(--s3);}
/* Stepper: [−][input][+] for reps & weight (no keyboard needed) */
.stepper{display:flex;align-items:stretch;background:var(--s2);border:0.5px solid var(--bd2);border-radius:var(--r-xs);overflow:hidden;min-width:0;}
.stepper .set-inp{border:none;border-radius:0;background:transparent;padding:7px 0;flex:1;min-width:0;}
.stepper .set-inp:focus{background:var(--s3);}
.stp{width:26px;flex-shrink:0;background:var(--s3);color:var(--tx);font-size:18px;font-weight:600;line-height:1;display:flex;align-items:center;justify-content:center;-webkit-user-select:none;user-select:none;touch-action:manipulation;}
.stp:active{background:var(--acc);color:#fff;}
.set-done-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--mu);background:var(--s2);transition:all 0.15s;}
.set-done-btn.done{background:var(--grn);border-color:var(--grn);color:#0D0D0D;}
.set-del-btn{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--red);opacity:0.55;background:var(--red-d);}
.add-set-btn{width:100%;margin-top:10px;padding:10px;background:var(--s2);border:0.5px dashed var(--bd2);border-radius:var(--r-sm);color:var(--mu);font-size:12px;display:flex;align-items:center;justify-content:center;gap:6px;font-weight:600;}

/* ── REST TIMER ─────────────────────────────────────────────── */
.rest-timer{background:var(--acc-d);border:0.5px solid rgba(95,101,217,0.25);border-radius:var(--r-sm);padding:10px 14px;margin:4px 12px 10px;display:none;align-items:center;justify-content:space-between;}
.rest-timer.show{display:flex;}
.rt-time{font-size:20px;font-weight:800;letter-spacing:-0.5px;color:var(--acc);}
.rt-skip{font-size:12px;color:var(--mu);padding:5px 12px;background:var(--s2);border-radius:var(--r-xs);font-weight:600;}

/* ── MINI SESSIONS ──────────────────────────────────────────── */
.mini-gif-box{margin:10px 12px 4px;border-radius:var(--r-sm);overflow:hidden;background:#fff;position:relative;}
.mini-gif-box img{width:100%;max-height:180px;object-fit:contain;display:block;}

/* ── SHARED ─────────────────────────────────────────────────── */
.motiv{background:rgba(95,101,217,0.10);border:0.5px solid rgba(95,101,217,0.22);border-radius:var(--r-md);padding:12px 14px;margin:0 16px 14px;font-size:13px;color:rgba(189,196,255,0.85);line-height:1.65;font-style:italic;}
.ring-wrap{display:flex;justify-content:center;margin:4px 0 14px;}
.ring-inner{position:relative;width:84px;height:84px;}
.ring-lbl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.ring-num{font-size:20px;font-weight:800;letter-spacing:-0.5px;line-height:1;}
.ring-sub{font-size:10px;color:var(--mu2);margin-top:1px;}
.free-card{background:var(--amb-d);border:0.5px solid rgba(255,214,10,0.2);border-radius:var(--r-md);padding:16px;margin:0 16px 10px;}
.free-title{font-size:15px;font-weight:700;color:var(--amb);margin-bottom:8px;}
.free-body{font-size:13px;color:rgba(255,214,10,0.65);line-height:1.7;}
.rest-day-wrap{text-align:center;padding:32px 16px;}

/* ── CARDS / BOXES ──────────────────────────────────────────── */
.card{background:var(--s1);border:0.5px solid var(--bd);border-radius:var(--r-md);padding:14px 16px;margin-bottom:10px;}
.sbox{background:var(--s2);border-radius:var(--r-sm);padding:14px;}
.sbox.click{cursor:pointer;transition:background 0.12s;}
.sbox.click:active{background:var(--s3);}
.sbox-lbl{font-size:10px;color:var(--mu2);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;font-weight:600;}
.sbox-val{font-size:22px;font-weight:800;letter-spacing:-0.5px;line-height:1.2;}
.sbox-sub{font-size:11px;color:var(--mu2);margin-top:3px;}
.sgrid{display:grid;gap:8px;margin-bottom:12px;}
.sg2{grid-template-columns:1fr 1fr;}
.sg3{grid-template-columns:1fr 1fr 1fr;}
.sg4{grid-template-columns:repeat(4,1fr);}
.chart-wrap{position:relative;width:100%;height:180px;margin:8px 0;}
.log-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--bd);font-size:13px;gap:6px;}
.log-row:last-child{border-bottom:none;}
.wo-row{padding:11px 0;border-bottom:0.5px solid var(--bd);display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.wo-row:last-child{border-bottom:none;}
.prog-bar{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;margin:6px 0;}
.prog-fill{height:100%;border-radius:3px;transition:width 0.5s ease;}
.tab-pills{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.tpill{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;border:0.5px solid var(--bd2);color:var(--mu);transition:all 0.15s;}
.tpill.active{background:var(--grn);color:#0D0D0D;border-color:var(--grn);}
.phase-tabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;margin-bottom:12px;}
.phase-tabs::-webkit-scrollbar{display:none;}
.ptab{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;border:0.5px solid var(--bd2);color:var(--mu);transition:all 0.15s;}
.ptab.active{color:#0D0D0D;font-weight:700;}
.day-tabs{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;}
.dtab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:0.5px solid var(--bd);color:var(--mu);transition:all 0.15s;}
.dtab.active{background:var(--s2);color:var(--tx);border-color:var(--bd2);}
.bsel-wrap{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:3px;margin-bottom:12px;}
.bsel-wrap::-webkit-scrollbar{display:none;}
.bsel{flex-shrink:0;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;border:0.5px solid var(--bd);color:var(--mu);transition:all 0.15s;}
.bsel.active{color:#0D0D0D;font-weight:700;}
.phase-strip{border-radius:var(--r-md);padding:14px 16px;margin-bottom:12px;border:0.5px solid rgba(255,255,255,0.06);}
.plan-ex-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--bd);}
.plan-ex-row:last-child{border-bottom:none;}
.plan-ex-thumb{width:52px;height:52px;border-radius:var(--r-xs);overflow:hidden;flex-shrink:0;background:#fff;display:flex;align-items:center;justify-content:center;}
.plan-ex-thumb img{width:100%;height:100%;object-fit:contain;display:block;}

/* ── NUTRITION ──────────────────────────────────────────────── */
.food-cat-lbl{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:0.08em;padding:10px 0 6px;}
.food-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--bd);}
.food-item:last-child{border-bottom:none;}
.food-add-btn{width:32px;height:32px;border-radius:50%;background:var(--grn-d);border:0.5px solid rgba(189,242,75,0.3);color:var(--grn);font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;font-weight:300;}
.food-add-btn:active{background:var(--grn);color:#0D0D0D;}
.lf-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--bd);gap:8px;font-size:13px;}
.lf-row:last-child{border-bottom:none;}
.inp{width:100%;background:var(--s2);border:0.5px solid var(--bd2);border-radius:var(--r-sm);padding:13px 14px;color:var(--tx);font-size:15px;}
.inp:focus{border-color:var(--acc);}
.btn-p{background:var(--grn);color:#0D0D0D;border-radius:var(--r-sm);padding:14px 20px;font-size:14px;font-weight:700;}
.btn-p:active{opacity:0.8;}
.btn-s{background:var(--s2);color:var(--tx);border:0.5px solid var(--bd2);border-radius:var(--r-sm);padding:13px 16px;font-size:13px;font-weight:600;}
.wed-banner{background:var(--grn-d);border:0.5px solid rgba(189,242,75,0.2);border-radius:var(--r-md);padding:14px 16px;margin-bottom:12px;cursor:pointer;}
.wed-text{font-size:13px;color:rgba(189,242,75,0.85);line-height:1.6;}
.nrule{display:flex;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--bd);font-size:13px;}
.nrule:last-child{border-bottom:none;}
.nrule-n{font-size:15px;font-weight:800;color:var(--acc);width:20px;flex-shrink:0;}
.nrule-t{color:var(--mu);line-height:1.5;}
.swap-row{padding:9px 0;border-bottom:0.5px solid var(--bd);font-size:13px;}
.swap-row:last-child{border-bottom:none;}

/* ── CALENDAR ───────────────────────────────────────────────── */
.cal-month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-month-title{font-size:17px;font-weight:700;letter-spacing:-0.3px;}
.cal-nav-btn{width:34px;height:34px;border-radius:50%;background:var(--s2);color:var(--tx);font-size:17px;display:flex;align-items:center;justify-content:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dow{font-size:10px;color:var(--mu2);text-align:center;padding:4px 0;font-weight:700;}
.cal-day{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:600;position:relative;padding:1px;}
.cal-day.future{color:var(--mu2);opacity:0.4;}
.cal-day.worked{background:rgba(189,242,75,0.14);color:var(--grn);}
.cal-day.missed{background:rgba(255,69,58,0.10);color:var(--red);}
.cal-day.today-mk{outline:1.5px solid var(--acc);outline-offset:-1px;}
.cal-day .cal-icon{position:absolute;top:1px;right:1px;font-size:8px;}
.cal-legend{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;justify-content:center;}
.cal-legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--mu);}
/* ── FLOATING CIRCLE CALENDAR ─────────────────────────────────────────── */
.cal-wrap{background:#141414;border:0.5px solid rgba(255,255,255,0.08);border-radius:20px;padding:14px 12px 16px;box-shadow:0 10px 34px rgba(0,0,0,0.5);}
.cal-c{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;background:#323232;color:#fff;transition:background 0.12s;}
.cal-c.empty{background:transparent;}
.cal-c.future{background:#1f1f1f;color:rgba(255,255,255,0.28);}
.cal-c.trained{background:#BDF24B;color:#0D0D0D;}
.cal-c.missed{background:#FF9500;color:#0D0D0D;}
.cal-c.tdy{outline:2px solid var(--acc);outline-offset:-2px;}
.cal-c.tap{cursor:pointer;}
.cal-c.tap:not(.trained):not(.missed):not(.future):active{background:#464646;}
.cal-key{width:13px;height:13px;border-radius:50%;display:inline-block;flex-shrink:0;}
/* Hevy-style clean calendar cells */
.cal-day2{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:13px;font-weight:600;border-radius:50%;transition:background 0.12s;}
.cal-day2:active{background:var(--s2);}
.cal-today2{outline:1.5px solid var(--acc);outline-offset:-1px;}
.cal-dot2{width:6px;height:6px;border-radius:50%;display:block;}
.wed-expand{display:none;padding-top:12px;border-top:0.5px solid var(--bd);margin-top:10px;}
.wed-expand.show{display:block;}
@keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.25);}100%{transform:scale(1);}}
.pop{animation:pop 0.2s ease;}

/* ── HAMBURGER SLIDE MENU ────────────────────────────────────────────── */
.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:600;display:none;}
.menu-overlay.show{display:block;}
.menu-drawer{position:absolute;top:0;right:0;height:100%;width:min(80vw,300px);background:var(--s1);border-left:0.5px solid var(--bd2);padding:calc(var(--st) + 20px) 18px calc(20px + var(--sb));transform:translateX(100%);transition:transform 0.22s ease;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:-8px 0 24px rgba(0,0,0,0.4);}
.menu-overlay.show .menu-drawer{transform:translateX(0);}
.menu-link{display:flex;align-items:center;gap:14px;width:100%;text-align:left;padding:14px 12px;border-radius:var(--r-sm);color:var(--tx);font-size:15px;font-weight:600;letter-spacing:-0.2px;transition:background 0.12s;}
.menu-link:active{background:var(--s3);}
.menu-ic{font-size:19px;width:24px;text-align:center;flex-shrink:0;}
/* ── TOAST + SESSION SUMMARY ──────────────────────────────────────────── */
#toast{position:fixed;left:50%;bottom:calc(92px + var(--sb));transform:translateX(-50%) translateY(20px);z-index:700;background:var(--grn);color:#0D0D0D;padding:11px 18px;border-radius:14px;font-size:13px;font-weight:700;line-height:1.3;box-shadow:0 6px 24px rgba(0,0,0,0.5);opacity:0;pointer-events:none;transition:opacity 0.25s,transform 0.25s;max-width:88vw;text-align:center;}
.sumbtn{padding:12px 0;border-radius:var(--r-sm);background:var(--s2);border:0.5px solid var(--bd2);color:var(--tx);font-size:15px;font-weight:600;}
.sumbtn.sel{background:var(--grn);border-color:var(--grn);color:#0D0D0D;}
</style>
</head>

  <div style="flex:1;text-align:center;min-width:0">

  </div>
</div>

<div class="wtb" id="wtb">

<div class="menu-overlay" id="menuOverlay" onclick="if(event.target===this)closeMenu()">

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <div style="font-size:17px;font-weight:700;letter-spacing:-0.3px">Menu</div>
      <button class="modal-close-btn" onclick="closeMenu()">✕</button>
    </div>
    <button class="menu-link" onclick="menuGo('home')"><span class="menu-ic">🏠</span>Home</button>
    <button class="menu-link" onclick="menuGo('today')"><span class="menu-ic">⚡</span>Today</button>
    <button class="menu-link" onclick="menuGo('history')"><span class="menu-ic">📊</span>History</button>
    <button class="menu-link" onclick="menuGo('exercises')"><span class="menu-ic">🏋️</span>Exercises</button>

<!-- LOG PAST WORKOUT MODAL -->

const EX_LIB_RAW=[["3/4 Sit-up","0001-2gPfomN","abs","hip flexors",["hip flexors","lower back"],["Lie flat on your back with your knees bent and feet flat on the ground.","Place your hands behind your head with your elbows pointing outwards.","Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["45° Side Bend","0002-Hy9D21L","abs","obliques",["obliques"],["Stand with your feet shoulder-width apart and your arms extended straight down by your sides.","Keeping your back straight and your core engaged, slowly bend your torso to one side, lowering your hand towards your knee.","Pause for a moment at the bottom, then slowly return to the starting position.","Repeat on the other side.","Continue alternating sides for the desired number of repetitions."]],["Air Bike","0003-1ZFqTDN","abs","hip flexors",["hip flexors"],["Lie flat on your back with your hands placed behind your head.","Lift your legs off the ground and bend your knees at a 90-degree angle.","Bring your right elbow towards your left knee while simultaneously straightening your right leg.","Return to the starting position and repeat the movement on the opposite side, bringing your left elbow towards your right knee while straightening your left leg.","Continue alternating sides in a pedaling motion for the desired number of repetitions."]],["All Fours Squad Stretch","1512-qBcKorM","quads","hamstrings",["hamstrings","glutes"],["Start on all fours with your hands directly under your shoulders and your knees directly under your hips.","Extend one leg straight back, keeping your knee bent and your foot flexed.","Slowly lower your hips towards the ground, feeling a stretch in your quads.","Hold this position for 20-30 seconds.","Switch legs and repeat the stretch on the other side."]],["Alternate Heel Touchers","0006-qaZVsGk","abs","obliques",["obliques"],["Lie flat on your back with your knees bent and feet flat on the ground.","Extend your arms straight out to the sides, parallel to the ground.","Engaging your abs, lift your shoulders off the ground and reach your right hand towards your right heel.","Return to the starting position and repeat on the left side, reaching your left hand towards your left heel.","Continue alternating sides for the desired number of repetitions."]],["Alternate Lateral Pulldown","0007-4IKbhHV","lats","biceps",["biceps","rhomboids"],["Sit on the cable machine with your back straight and feet flat on the ground.","Grasp the handles with an overhand grip, slightly wider than shoulder-width apart.","Lean back slightly and pull the handles towards your chest, squeezing your shoulder blades together.","Pause for a moment at the peak of the movement, then slowly release the handles back to the starting position.","Repeat for the desired number of repetitions."]],["Ankle Circles","1368-uL9CsKm","calves","ankle stabilizers",["ankle stabilizers"],["Sit on the ground with your legs extended in front of you.","Lift one leg off the ground and rotate your ankle in a circular motion.","Perform the desired number of circles in one direction, then switch to the other direction.","Repeat with the other leg."]],["Archer Pull Up","3293-72BC5Za","lats","biceps",["biceps","forearms"],["Start by hanging from a pull-up bar with an overhand grip, slightly wider than shoulder-width apart.","Engage your core and pull your shoulder blades down and back.","As you pull yourself up, bend one arm and bring your elbow towards your side, while keeping the other arm straight.","Continue pulling until your chin is above the bar and your bent arm is fully flexed.","Lower yourself back down with control, straightening the bent arm and repeating the movement on the other side.","Alternate sides with each repetition."]],["Archer Push Up","3294-A9qxk2F","pectorals","triceps",["triceps","shoulders","core"],["Start in a push-up position with your hands slightly wider than shoulder-width apart.","Extend one arm straight out to the side, parallel to the ground.","Lower your body by bending your elbows, keeping your back straight and core engaged.","Push back up to the starting position.","Repeat on the other side, extending the opposite arm out to the side.","Continue alternating sides for the desired number of repetitions."]],["Arm Slingers Hanging Bent Knee Legs","2355-uWpxD4v","abs","shoulders",["shoulders","back"],["Hang from a pull-up bar with your arms fully extended and your knees bent at a 90-degree angle.","Engage your core and lift your knees towards your chest, bringing them as close to your elbows as possible.","Slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Arm Slingers Hanging Straight Legs","2333-PXTIwgu","abs","shoulders",["shoulders","back"],["Hang from a pull-up bar with your arms fully extended and your legs straight down.","Engage your core and lift your legs up in front of you until they are parallel to the ground.","Hold for a moment at the top, then slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Arms Apart Circular Toe Touch (Male)","3214-RtyAsy1","glutes","hamstrings",["hamstrings","quadriceps","calves"],["Stand with your feet shoulder-width apart and arms extended to the sides.","Keeping your legs straight, bend forward at the waist and reach down towards your toes with your right hand.","As you reach down, simultaneously lift your left leg straight up behind you, maintaining balance.","Return to the starting position and repeat the movement with your left hand reaching towards your toes and your right leg lifting up behind you.","Continue alternating sides for the desired number of repetitions."]],["Arms Overhead Full Sit-up (Male)","3204-NAkmgdx","abs","hip flexors",["hip flexors","lower back"],["Lie flat on your back with your knees bent and feet flat on the ground.","Extend your arms overhead, keeping them straight.","Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is upright.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Assisted Chest Dip (Kneeling)","0009-PAgTVaK","pectorals","triceps",["triceps","shoulders"],["Adjust the machine to your desired height and secure your knees on the pad.","Grasp the handles with your palms facing down and your arms fully extended.","Lower your body by bending your elbows until your upper arms are parallel to the floor.","Pause for a moment, then push yourself back up to the starting position.","Repeat for the desired number of repetitions."]],["Assisted Hanging Knee Raise","0011-03lzqwk","abs","hip flexors",["hip flexors"],["Hang from a pull-up bar with your arms fully extended and your palms facing away from you.","Engage your core muscles and lift your knees towards your chest, bending at the hips and knees.","Pause for a moment at the top of the movement, squeezing your abs.","Slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Assisted Hanging Knee Raise With Throw Down","0010-8K0w2yA","abs","hip flexors",["hip flexors","lower back"],["Hang from a pull-up bar with your arms fully extended and your palms facing away from you.","Engage your core and lift your knees towards your chest, keeping your legs together.","Once your knees are at chest level, explosively throw your legs down towards the ground, extending them fully.","Allow your legs to swing back up and repeat the movement for the desired number of repetitions."]],["Assisted Lying Calves Stretch","1708-GxDwDX0","calves","hamstrings",["hamstrings"],["Lie on your back with your legs extended.","Bend one knee and place your foot flat on the ground.","Using your hands or a towel, gently pull your toes towards your body, feeling a stretch in your calf.","Hold the stretch for 20-30 seconds.","Release the stretch and repeat on the other leg."]],["Assisted Lying Glutes Stretch","1709-yn0LjwL","glutes","hamstrings",["hamstrings"],["Lie on your back with your legs extended.","Bend your right knee and place your right ankle on your left thigh, just above the knee.","Grasp your left thigh with both hands and gently pull it towards your chest.","Hold the stretch for 20-30 seconds.","Release and repeat on the other side."]],["Assisted Lying Gluteus And Piriformis Stretch","1710-RQNVT10","glutes","hamstrings",["hamstrings"],["Lie on your back with your legs extended.","Bend your right knee and place your right ankle on your left thigh, just above the knee.","Grasp your left thigh with both hands and gently pull it towards your chest.","Hold the stretch for 20-30 seconds.","Release the stretch and repeat on the other side."]],["Assisted Lying Leg Raise With Lateral Throw Down","0012-UGhRD1A","abs","hip flexors",["hip flexors","obliques"],["Lie flat on your back with your legs extended and your arms by your sides.","Place your hands under your glutes for support.","Engage your abs and lift your legs off the ground, keeping them straight.","While keeping your legs together, lower them to one side until they are a few inches above the ground.","Pause for a moment, then lift your legs back to the starting position.","Repeat the movement to the other side.","Continue alternating sides for the desired number of repetitions."]],["Assisted Lying Leg Raise With Throw Down","0013-VX5YKR5","abs","hip flexors",["hip flexors","quadriceps"],["Lie flat on your back with your legs extended and your arms by your sides.","Place your hands under your glutes for support.","Engage your core and lift your legs off the ground, keeping them straight.","Raise your legs until they are perpendicular to the ground.","Lower your legs back down to the starting position.","Simultaneously, throw your legs down towards the ground, keeping them straight.","Raise your legs back up to the starting position.","Repeat for the desired number of repetitions."]],["Assisted Motion Russian Twist","0014-r7cT9YD","abs","obliques",["obliques","lower back"],["Sit on the ground with your knees bent and feet flat on the floor.","Hold the medicine ball with both hands in front of your chest.","Lean back slightly, engaging your abs and keeping your back straight.","Slowly twist your torso to the right, bringing the medicine ball towards the right side of your body.","Pause for a moment, then twist your torso to the left, bringing the medicine ball towards the left side of your body.","Continue alternating sides for the desired number of repetitions."]],["Assisted Parallel Close Grip Pull-up","0015-vrhHa6D","lats","biceps",["biceps","forearms"],["Adjust the machine to your desired weight and height.","Place your hands on the parallel bars with a close grip, palms facing each other.","Hang from the bars with your arms fully extended and your feet off the ground.","Engage your back muscles and pull your body up towards the bars, keeping your elbows close to your body.","Continue pulling until your chin is above the bars.","Pause for a moment at the top, then slowly lower your body back down to the starting position.","Repeat for the desired number of repetitions."]],["Assisted Prone Hamstring","0016-VedGSby","hamstrings","glutes",["glutes","lower back"],["Lie face down on a mat or bench with your legs fully extended.","Have a partner or use a resistance band to secure your ankles.","Engage your hamstrings and lift your legs towards your glutes, keeping your knees straight.","Pause for a moment at the top, then slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Assisted Prone Lying Quads Stretch","1713-YUYAMEj","quads","hamstrings",["hamstrings","glutes"],["Lie face down on the ground with your legs extended.","Bend your left knee and reach back with your left hand to grab your left foot or ankle.","Gently pull your left foot towards your glutes, feeling a stretch in your left quad.","Hold the stretch for 20-30 seconds, then release.","Repeat with your right leg."]],["Assisted Prone Rectus Femoris Stretch","1714-2Ryn564","abs","quadriceps",["quadriceps"],["Lie face down on the ground with your legs straight.","Bend your right knee and reach back with your right hand to grab your right foot or ankle.","Gently pull your right foot or ankle towards your glutes, feeling a stretch in the front of your right thigh.","Hold the stretch for 20-30 seconds.","Release and repeat on the other side."]],["Assisted Pull-up","0017-kiJ4Z2K","lats","biceps",["biceps","forearms"],["Adjust the machine to your desired weight and height settings.","Grasp the handles with an overhand grip, slightly wider than shoulder-width apart.","Hang with your arms fully extended and your feet off the ground.","Engage your back muscles and pull your body up towards the handles, keeping your elbows close to your body.","Continue pulling until your chin is above the handles.","Pause for a moment at the top, then slowly lower your body back down to the starting position.","Repeat for the desired number of repetitions."]],["Assisted Seated Pectoralis Major Stretch With Stability Ball","1716-RoV1Rfa","pectorals","shoulders",["shoulders","triceps"],["Sit on a stability ball with your feet flat on the ground and your back straight.","Hold a stability ball with both hands and extend your arms straight out in front of you.","Slowly lower the stability ball towards your chest, feeling a stretch in your pectoral muscles.","Hold the stretch for a few seconds, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Assisted Side Lying Adductor Stretch","1712-hC6oYY5","adductors","hamstrings",["hamstrings","glutes"],["Lie on your side with your legs straight and stacked on top of each other.","Bend your bottom leg slightly for stability.","Place your top foot on a stable surface, such as a bench or step.","Keeping your top leg straight, slowly lower it towards the ground, feeling a stretch in your inner thigh.","Hold the stretch for 20-30 seconds.","Return to the starting position and repeat on the other side."]],["Assisted Sit-up","1758-aumB2IV","abs","hip flexors",["hip flexors"],["Sit on the edge of a bench or have someone hold your feet down.","Lie flat on your back with your knees bent and feet flat on the ground.","Place your hands behind your head with your elbows pointing outwards.","Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Assisted Standing Chin-up","1431-7OeHptV","lats","biceps",["biceps","forearms"],["Adjust the machine to your desired assistance level.","Stand on the foot platform and grip the handles with an overhand grip, slightly wider than shoulder-width apart.","Keep your chest up and shoulders back, engage your core, and slightly bend your knees.","Pull your body up by flexing your elbows and driving your elbows down towards your sides.","Continue pulling until your chin is above the bar.","Pause for a moment at the top, then slowly lower your body back down to the starting position.","Repeat for the desired number of repetitions."]],["Assisted Standing Pull-up","1432-f4xtKBj","lats","biceps",["biceps","forearms"],["Adjust the machine to your desired weight and height settings.","Stand facing the machine with your feet shoulder-width apart.","Grasp the handles with an overhand grip, slightly wider than shoulder-width apart.","Engage your lats and biceps, and pull yourself up towards the handles.","Pause for a moment at the top, squeezing your back muscles.","Slowly lower yourself back down to the starting position.","Repeat for the desired number of repetitions."]],["Assisted Standing Triceps Extension (With Towel)","0018-7HcfMBP","triceps","shoulders",["shoulders"],["Stand with your feet shoulder-width apart and hold a towel with both hands behind your head.","Keep your elbows close to your ears and your upper arms stationary.","Slowly extend your forearms upward, squeezing your triceps at the top.","Pause for a moment, then slowly lower the towel back down to the starting position.","Repeat for the desired number of repetitions."]],["Assisted Triceps Dip (Kneeling)","0019-J60bN17","triceps","chest",["chest","shoulders"],["Adjust the machine to your desired weight and height.","Kneel down on the pad facing the machine, with your hands gripping the handles.","Lower your body by bending your elbows, keeping your back straight and close to the machine.","Pause for a moment at the bottom, then push yourself back up to the starting position.","Repeat for the desired number of repetitions."]],["Assisted Wide-grip Chest Dip (Kneeling)","2364-PnZJIrk","pectorals","triceps",["triceps","shoulders"],["Adjust the machine to your desired height and secure your knees on the pad.","Grasp the handles with a wide grip and keep your elbows slightly bent.","Lower your body by bending your elbows until your upper arms are parallel to the floor.","Push yourself back up to the starting position by extending your arms.","Repeat for the desired number of repetitions."]],["Astride Jumps (Male)","3220-f9lVSSI","cardiovascular system","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart.","Bend your knees and lower your body into a squat position.","Jump explosively upwards, extending your legs and arms.","While in the air, spread your legs apart and bring your arms out to the sides.","Land softly with your feet shoulder-width apart, bending your knees to absorb the impact.","Repeat for the desired number of repetitions."]],["Back And Forth Step","3672-fNGumX0","cardiovascular system","quadriceps",["quadriceps","hamstrings","glutes","calves"],["Stand with your feet shoulder-width apart.","Step forward with your right foot, bending your knee and lowering your body into a lunge position.","Push off with your right foot and step back to the starting position.","Repeat the movement with your left foot, alternating legs with each step.","Continue stepping back and forth, maintaining a steady pace.","Repeat for the desired duration or number of repetitions."]],["Back Extension On Exercise Ball","1314-qLpO4vV","spine","glutes",["glutes","hamstrings"],["Place the stability ball on the ground and lie face down on top of it, with your hips resting on the ball and your feet against a wall or other stable surface.","Position your hands behind your head or crossed over your chest.","Engage your core and slowly lift your upper body off the ball, extending your back until your body forms a straight line from your head to your heels.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Back Lever","3297-GaSzzuh","upper back","biceps",["biceps","forearms","core"],["Start by hanging from a pull-up bar with an overhand grip, hands slightly wider than shoulder-width apart.","Engage your core and pull your shoulder blades down and back.","Bend your knees and tuck them towards your chest.","Slowly lift your legs up, keeping them straight, until your body is parallel to the ground.","Hold this position for a few seconds, then slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Back Pec Stretch","1405-chfnQnM","lats","shoulders",["shoulders","chest"],["Stand tall with your feet shoulder-width apart.","Extend your arms straight out in front of you, parallel to the ground.","Cross your arms in front of your body, with your right arm over your left arm.","Interlock your fingers and rotate your palms away from your body.","Slowly raise your arms up and away from your body, feeling a stretch in your back and chest.","Hold the stretch for 15-30 seconds, then release.","Repeat on the opposite side."]],["Backward Jump","1473-SaDOwk7","quads","hamstrings",["hamstrings","glutes","calves"],["Stand with your feet shoulder-width apart.","Bend your knees slightly and jump backwards, pushing off with both feet.","Land softly on the balls of your feet, bending your knees to absorb the impact.","Repeat for the desired number of repetitions."]],["Balance Board","0020-xAySMB0","quads","calves",["calves","hamstrings","glutes"],["Place the balance board on a flat surface.","Step onto the balance board with one foot, ensuring it is centered.","Slowly shift your weight onto the foot on the balance board, keeping your core engaged.","Maintain your balance and stability as you hold the position for a desired amount of time.","Repeat the exercise with the other foot."]],["Band Alternating Biceps Curl","0968-3omWx6P","biceps","forearms",["forearms"],["Stand with your feet shoulder-width apart and hold the band with an underhand grip, palms facing up.","Keep your elbows close to your sides and slowly curl one arm up towards your shoulder, squeezing your biceps at the top.","Lower the arm back down to the starting position and repeat with the other arm.","Continue alternating arms for the desired number of repetitions."]],["Band Alternating V-up","0969-ztAa1RK","abs","hip flexors",["hip flexors"],["Lie flat on your back with your legs straight and your arms extended overhead, holding the band.","Engage your abs and lift your legs and upper body off the ground simultaneously, reaching your hands towards your toes.","As you lower your legs and upper body back down, switch the position of your legs, crossing one over the other.","Repeat the movement, alternating the position of your legs with each repetition.","Continue for the desired number of repetitions."]],["Band Assisted Pull-up","0970-r1XNRYB","lats","biceps",["biceps","forearms"],["Attach the band to a pull-up bar or sturdy anchor point.","Step onto the band and grip the bar with your palms facing away from you, hands slightly wider than shoulder-width apart.","Hang with your arms fully extended, keeping your core engaged and your shoulders down and back.","Pull your body up towards the bar by squeezing your shoulder blades together and driving your elbows down towards your hips.","Continue pulling until your chin is above the bar, then slowly lower yourself back down to the starting position.","Repeat for the desired number of repetitions."]],["Band Assisted Wheel Rollerout","0971-zhF9lW4","abs","lower back",["lower back"],["Kneel on the floor and hold the handles of the band with both hands, palms facing down.","Place the band on the ground in front of you and position your hands shoulder-width apart.","Engage your core and slowly roll the wheel forward, extending your body as far as you can while maintaining control.","Pause for a moment at the furthest point, then slowly roll the wheel back towards your knees to return to the starting position.","Repeat for the desired number of repetitions."]],["Band Bench Press","1254-khlHMqs","pectorals","triceps",["triceps","shoulders"],["Lie flat on a bench with your feet flat on the ground and your back pressed against the bench.","Grasp the band handles with an overhand grip, slightly wider than shoulder-width apart.","Extend your arms fully, pushing the bands away from your chest.","Slowly lower the bands back down to your chest, keeping your elbows at a 90-degree angle.","Repeat for the desired number of repetitions."]],["Band Bent-over Hip Extension","0980-wSScovH","glutes","hamstrings",["hamstrings","lower back"],["Attach the band to a sturdy anchor point at ankle height.","Stand facing away from the anchor point with your feet shoulder-width apart.","Step back to create tension in the band, keeping your knees slightly bent.","Hinge at the hips and lean forward, maintaining a neutral spine.","Extend your right leg straight back, squeezing your glutes at the top.","Lower your right leg back down and repeat with the left leg.","Continue alternating legs for the desired number of repetitions."]],["Band Bicycle Crunch","0972-tZkGYZ9","abs","hip flexors",["hip flexors","obliques"],["Lie flat on your back with your hands behind your head and your knees bent.","Lift your feet off the ground and bring your right knee towards your chest while simultaneously twisting your torso to bring your left elbow towards your right knee.","Straighten your right leg while bringing your left knee towards your chest and twisting your torso to bring your right elbow towards your left knee.","Continue alternating the twisting motion, as if you are pedaling a bicycle, while keeping your core engaged throughout the movement.","Repeat for the desired number of repetitions."]],["Band Close-grip Pulldown","0974-DptumMx","lats","biceps",["biceps","forearms"],["Attach the band to a high anchor point, such as a pull-up bar or sturdy beam.","Stand facing the anchor point and grab the band with an underhand grip, hands shoulder-width apart.","Step back to create tension in the band, keeping your feet hip-width apart.","Engage your core and keep your back straight as you pull the band down towards your chest, squeezing your shoulder blades together.","Pause for a moment at the bottom of the movement, then slowly release the band back to the starting position.","Repeat for the desired number of repetitions."]],["Band Close-grip Push-up","0975-ufaxB52","triceps","chest",["chest","shoulders"],["Place a band around your upper arms, just above the elbows.","Assume a push-up position with your hands directly under your shoulders and your body in a straight line from head to heels.","Bend your elbows and lower your chest towards the ground, keeping your elbows close to your sides.","Push through your palms to extend your arms and return to the starting position.","Repeat for the desired number of repetitions."]],["Band Concentration Curl","0976-kmVVAfu","biceps","forearms",["forearms"],["Sit on a bench or chair with your legs spread apart and your feet flat on the ground.","Hold one end of the band in your hand and step on the other end with your foot on the same side.","Lean forward slightly and rest your elbow on the inside of your thigh, just above the knee.","With your palm facing up, slowly curl your hand towards your shoulder, keeping your upper arm stationary.","Pause for a moment at the top, then slowly lower your hand back down to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Band Fixed Back Close Grip Pulldown","3117-4LoWllp","lats","biceps",["biceps","forearms"],["Attach the band to a fixed point above you, such as a pull-up bar or sturdy beam.","Sit down on a bench or chair facing the band, with your feet flat on the ground and your knees bent.","Grasp the band with a close grip, palms facing towards you.","Keep your back straight and engage your core.","Pull the band down towards your chest, squeezing your shoulder blades together.","Pause for a moment at the bottom of the movement, feeling the contraction in your lats.","Slowly release the band back to the starting position, maintaining control throughout the movement.","Repeat for the desired number of repetitions."]],["Band Fixed Back Underhand Pulldown","3116-ZH68exZ","lats","biceps",["biceps","rhomboids","rear deltoids"],["Attach the band to a sturdy anchor point above your head.","Stand facing the anchor point with your feet shoulder-width apart.","Grasp the band with an underhand grip, hands slightly wider than shoulder-width apart.","Step back to create tension in the band, keeping your arms fully extended.","Engage your core and squeeze your shoulder blades together.","Pull the band down towards your chest, leading with your elbows.","Pause for a moment at the bottom of the movement, feeling the contraction in your lats.","Slowly release the tension in the band and return to the starting position.","Repeat for the desired number of repetitions."]],["Band Front Lateral Raise","0977-sTg7iys","delts","traps",["traps","upper back"],["Stand with your feet shoulder-width apart and hold the band in front of your thighs with your palms facing down.","Keep your arms straight and lift the band up in front of you until your arms are parallel to the ground.","Pause for a moment at the top, then slowly lower the band back down to the starting position.","Repeat for the desired number of repetitions."]],["Band Front Raise","0978-TFA88iB","delts","triceps",["triceps","upper back"],["Stand with your feet shoulder-width apart and hold the band in front of your thighs with your palms facing down.","Keep your arms straight and slowly raise them forward until they are parallel to the ground.","Pause for a moment at the top, then slowly lower your arms back down to the starting position.","Repeat for the desired number of repetitions."]],["Band Hip Lift","1408-E4R8Hz1","glutes","hamstrings",["hamstrings","quadriceps"],["Lie on your back with your knees bent and feet flat on the ground.","Place a resistance band just above your knees.","Engage your glutes and core muscles.","Press your heels into the ground and lift your hips off the floor, squeezing your glutes at the top.","Pause for a moment at the top, then slowly lower your hips back down to the starting position.","Repeat for the desired number of repetitions."]],["Band Horizontal Pallof Press","0979-9pa4H5m","abs","obliques",["obliques","glutes"],["Attach the band to a sturdy anchor point at waist height.","Stand perpendicular to the anchor point with your feet shoulder-width apart.","Grasp the band handle with both hands and step away from the anchor point to create tension in the band.","Bring your hands to your chest, keeping your elbows bent and close to your body.","Engage your core and maintain a stable stance.","Extend your arms straight out in front of you, pushing the band away from your body.","Hold the extended position for a few seconds, focusing on maintaining tension in your core.","Slowly bring your hands back to your chest, resisting the pull of the band.","Repeat for the desired number of repetitions."]],["Band Jack Knife Sit-up","0981-KCBKjma","abs","hip flexors",["hip flexors"],["Lie flat on your back with your legs straight and your arms extended overhead, holding the band.","Engage your abs and lift your legs and upper body simultaneously, bringing your hands towards your feet.","Pause for a moment at the top, then slowly lower your legs and upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Band Kneeling One Arm Pulldown","0983-pmnrOp0","lats","biceps",["biceps","rhomboids"],["Attach the band to a sturdy anchor point above your head.","Kneel down and hold the band with one hand, palm facing down.","Extend your arm fully overhead, keeping your elbow slightly bent.","Engage your lat muscles and pull the band down towards your side, bringing your elbow towards your ribcage.","Pause for a moment at the bottom, then slowly release the tension and return to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Band Kneeling Twisting Crunch","0985-225x2Vd","abs","obliques",["obliques"],["Attach the band to a sturdy anchor point at waist height.","Kneel down facing away from the anchor point and hold the band with both hands, keeping your elbows bent and close to your sides.","Engage your abs and slowly twist your torso to one side, bringing your hands towards your opposite hip.","Pause for a moment, then slowly return to the starting position.","Repeat on the other side.","Continue alternating sides for the desired number of repetitions."]],["Band Lying Hip Internal Rotation","0984-vIICElP","glutes","hamstrings",["hamstrings","quadriceps"],["Lie on your back with your legs straight and a resistance band looped around your feet.","Bend your knees and bring them towards your chest, keeping your feet together.","Slowly rotate your knees outwards, away from each other, while keeping your feet together.","Pause for a moment at the end of the rotation, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Band Lying Straight Leg Raise","1002-bbLR7fB","abs","hip flexors",["hip flexors"],["Lie flat on your back with your legs straight and your feet together.","Place the band around the arches of your feet and hold the ends of the band with your hands.","Engaging your abs, lift both legs off the ground until they are perpendicular to the floor.","Pause for a moment at the top, then slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Band One Arm Overhead Biceps Curl","0986-UNAB8ak","biceps","forearms",["forearms","shoulders"],["Stand with your feet shoulder-width apart and place one end of the band under your foot.","Hold the other end of the band with your arm fully extended overhead, palm facing forward.","Keeping your upper arm stationary, curl your forearm towards your shoulder, squeezing your biceps.","Pause for a moment at the top, then slowly lower your forearm back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Band One Arm Single Leg Split Squat","0987-arsYEd3","quads","glutes",["glutes","hamstrings"],["Stand with your feet hip-width apart and place a resistance band around your ankles.","Extend one leg forward and rest the top of your foot on a bench or step behind you.","Hold onto a support with one hand for balance.","Bend your standing leg and lower your body down into a squat position, keeping your knee in line with your toes.","Push through your heel to return to the starting position.","Repeat for the desired number of repetitions, then switch legs."]],["Band One Arm Standing Low Row","0988-km0sQC0","upper back","biceps",["biceps","shoulders"],["Attach the band to a stable anchor point at waist height.","Stand facing the anchor point with your feet shoulder-width apart.","Hold the band with one hand, palm facing inward, and step back to create tension in the band.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Pull the band towards your waist, squeezing your shoulder blades together.","Pause for a moment at the top of the movement, then slowly release the band back to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Band One Arm Twisting Chest Press","0989-c16nYGA","pectorals","shoulders",["shoulders","triceps"],["Attach the band to a sturdy anchor point at chest height.","Stand with your side facing the anchor point and grab the band with one hand.","Step away from the anchor point to create tension in the band.","Position your feet shoulder-width apart and slightly bend your knees.","Bring your hand holding the band across your body, towards the opposite shoulder.","While maintaining tension in the band, push your hand forward and away from your body, extending your arm.","Slowly return to the starting position and repeat for the desired number of repetitions.","Switch sides and repeat the exercise with the other hand."]],["Band One Arm Twisting Seated Row","0990-DKBwJrL","upper back","biceps",["biceps","shoulders"],["Sit on a bench or chair with your feet flat on the ground and your back straight.","Hold the band with one hand and extend your arm fully in front of you.","Keeping your back straight, pull the band towards your body by bending your elbow and squeezing your shoulder blades together.","At the same time, twist your torso towards the side of the pulling arm.","Pause for a moment at the top, then slowly release the tension in the band and return to the starting position.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Band Pull Through","0991-VtTbiP3","glutes","hamstrings",["hamstrings","lower back"],["Attach a resistance band to a sturdy anchor point at ground level.","Stand facing away from the anchor point with your feet shoulder-width apart.","Step forward to create tension in the band, keeping your knees slightly bent.","Hinge at the hips and push your glutes back, maintaining a slight bend in your knees.","Lower your torso until it is parallel to the ground, feeling a stretch in your hamstrings.","Drive your hips forward and squeeze your glutes to return to the starting position.","Repeat for the desired number of repetitions."]],["Band Push Sit-up","0992-zFzbBfL","abs","shoulders",["shoulders","chest"],["Attach the band securely to a stable anchor point.","Lie flat on your back with your knees bent and feet flat on the ground.","Hold the band with both hands and extend your arms straight up towards the ceiling.","Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Band Reverse Fly","0993-sTfvVsG","delts","upper back",["upper back","trapezius"],["Attach the band to a stationary object at chest height.","Stand with your feet shoulder-width apart and hold the band with both hands in front of you.","Keep your arms straight and lift them out to the sides until they are parallel to the ground.","Squeeze your shoulder blades together at the top of the movement.","Slowly lower your arms back to the starting position.","Repeat for the desired number of repetitions."]],["Band Reverse Wrist Curl","0994-Ezpnw9d","forearms","forearms",["forearms"],["Sit on a bench or chair with your feet flat on the ground.","Hold the band with an overhand grip, palms facing down, and wrap it around your fingers.","Rest your forearms on your thighs, with your wrists hanging off the edge.","Slowly curl your wrists upward, squeezing your forearms.","Pause for a moment at the top, then slowly lower your wrists back down to the starting position.","Repeat for the desired number of repetitions."]],["Band Seated Hip Internal Rotation","0996-9gbyYKk","glutes","hamstrings",["hamstrings","quadriceps"],["Sit on a chair or bench with your back straight and feet flat on the ground.","Place a resistance band around your thighs, just above your knees.","Keep your knees bent at a 90-degree angle and your feet shoulder-width apart.","Engage your glutes and slowly rotate your knees outward, pushing against the resistance of the band.","Pause for a moment at the end of the movement, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Band Seated Twist","1011-S1JXDAG","abs","obliques",["obliques"],["Sit on the ground with your legs extended in front of you and your back straight.","Wrap the band around your waist and hold the ends with both hands.","Engage your abs and slowly twist your torso to one side, keeping your back straight and your feet on the ground.","Pause for a moment at the end of the twist, then slowly return to the starting position.","Repeat the twist to the other side.","Continue alternating sides for the desired number of repetitions."]],["Band Shoulder Press","0997-peAeMR3","delts","triceps",["triceps","upper back"],["Stand with your feet shoulder-width apart and place the band under your feet.","Hold the band with your palms facing forward and raise your hands to shoulder height, elbows bent.","Press the band overhead, fully extending your arms.","Pause for a moment at the top, then slowly lower the band back to shoulder height.","Repeat for the desired number of repetitions."]],["Band Shrug","1018-trmte8s","traps","shoulders",["shoulders"],["Stand with your feet shoulder-width apart and place the band under your feet, holding the ends with your hands.","Keep your arms straight and relaxed, and let the band hang in front of your thighs.","Engage your traps by shrugging your shoulders upward, lifting the band as high as possible.","Hold the contraction for a moment, then slowly lower your shoulders back down to the starting position.","Repeat for the desired number of repetitions."]],["Band Side Triceps Extension","0998-obe5LMq","triceps","shoulders",["shoulders"],["Stand with your feet shoulder-width apart and hold the band with both hands, palms facing down.","Extend your arms straight out to the sides, keeping them parallel to the ground.","Slowly bend your elbows and bring your hands towards your shoulders, keeping your upper arms still.","Pause for a moment, then slowly extend your arms back out to the starting position.","Repeat for the desired number of repetitions."]],["Band Single Leg Calf Raise","0999-9JprnPh","calves","ankles",["ankles","feet"],["Stand with your feet hip-width apart and place the band around the ball of your left foot.","Hold onto a stable object for balance if needed.","Slowly raise your left heel off the ground, lifting your body weight onto the ball of your foot.","Pause for a moment at the top, then slowly lower your left heel back down to the starting position.","Repeat for the desired number of repetitions, then switch to the right leg."]],["Band Single Leg Reverse Calf Raise","1000-QsSQWbf","calves","hamstrings",["hamstrings","glutes"],["Stand with your feet hip-width apart and place the band around the ball of your foot.","Hold onto a stable object for balance.","Slowly raise your heel off the ground, lifting your body weight onto the ball of your foot.","Pause for a moment at the top, then slowly lower your heel back down to the starting position.","Repeat for the desired number of repetitions, then switch to the other leg."]],["Band Single Leg Split Squat","1001-y8bYM8w","quads","glutes",["glutes","hamstrings"],["Stand with your feet hip-width apart and place a resistance band around your ankles.","Take a big step forward with your right foot and a smaller step back with your left foot.","Bend your knees and lower your body until your right thigh is parallel to the ground, keeping your left knee slightly above the ground.","Push through your right heel to return to the starting position.","Repeat on the other side."]],["Band Squat","1004-TUZLh71","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart, with the band placed just above your knees.","Keeping your chest up and core engaged, push your hips back and bend your knees to lower into a squat position.","Make sure your knees are tracking over your toes and your weight is in your heels.","Pause for a moment at the bottom, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Band Squat Row","1003-w1NOByi","glutes","hamstrings",["hamstrings","quadriceps","back"],["Attach the band to a sturdy anchor point at waist height.","Stand facing the anchor point with your feet shoulder-width apart.","Hold the band handles with your palms facing each other and your arms extended in front of you.","Bend your knees and lower into a squat position, keeping your back straight and chest lifted.","From the squat position, pull the band handles towards your body, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly release the tension and return to the starting position.","Repeat for the desired number of repetitions."]],["Band Standing Crunch","1005-Kzg30R7","abs","obliques",["obliques"],["Attach the band to a sturdy anchor point at waist height.","Stand facing away from the anchor point with your feet shoulder-width apart.","Hold the band with both hands and bring it up to your chest, keeping your elbows bent and close to your body.","Engage your abs and slowly crunch forward, bringing your chest towards your knees.","Pause for a moment at the top of the crunch, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Band Standing Rear Delt Row","1022-tc5dYrf","delts","trapezius",["trapezius","rhomboids","biceps"],["Stand with your feet shoulder-width apart and place the band under your feet.","Hold the band handles with your palms facing each other and your arms extended in front of you.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Pull the band towards your chest, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly release the tension and return to the starting position.","Repeat for the desired number of repetitions."]],["Band Standing Twisting Crunch","1007-euq4pwp","abs","obliques",["obliques"],["Stand with your feet shoulder-width apart and place the band around your upper back, crossing it in front of your chest.","Hold the ends of the band with your hands, keeping your elbows bent and close to your sides.","Engage your abs and twist your torso to one side, bringing your elbow towards the opposite knee.","Pause for a moment, then return to the starting position.","Repeat on the other side.","Continue alternating sides for the desired number of repetitions."]],["Band Step-up","1008-d5bTEPV","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Place a band around your thighs, just above your knees.","Stand facing a step or platform with your feet hip-width apart.","Step up onto the platform with your right foot, pushing through your heel.","Extend your left leg behind you, keeping it straight.","Lower your left foot back down to the ground.","Repeat with your left foot stepping up onto the platform.","Continue alternating legs for the desired number of repetitions."]],["Band Stiff Leg Deadlift","1009-kuMiR2T","glutes","hamstrings",["hamstrings","lower back"],["Stand with your feet shoulder-width apart and place the band around your ankles.","Hold the band with both hands in front of your thighs, palms facing your body.","Keeping your back straight and your core engaged, hinge at the hips and slowly lower your upper body towards the ground.","As you lower, push your hips back and allow your knees to bend slightly.","Lower the band towards the ground, feeling a stretch in your hamstrings.","Pause for a moment at the bottom, then engage your glutes and hamstrings to lift your upper body back up to the starting position.","Repeat for the desired number of repetitions."]],["Band Straight Back Stiff Leg Deadlift","1023-lHeUULr","glutes","hamstrings",["hamstrings","lower back"],["Stand with your feet shoulder-width apart and place the band around your upper legs.","Hold the band with both hands in front of your thighs, palms facing your body.","Keeping your back straight and your knees slightly bent, hinge at the hips and lower the band towards the ground.","Feel the stretch in your hamstrings as you lower the band.","Engage your glutes and hamstrings to lift your body back up to the starting position.","Repeat for the desired number of repetitions."]],["Band Straight Leg Deadlift","1010-KUaoUV8","spine","hamstrings",["hamstrings","glutes"],["Stand with your feet shoulder-width apart and place the band around your feet.","Hold the band with both hands, palms facing your body, and keep your arms straight.","Engage your core and maintain a slight bend in your knees.","Slowly hinge forward at your hips, keeping your back straight and chest lifted.","Lower the band towards the ground while keeping your legs straight.","Pause for a moment at the bottom, then squeeze your glutes and hamstrings to return to the starting position.","Repeat for the desired number of repetitions."]],["Band Twisting Overhead Press","1012-u4bAmKp","delts","triceps",["triceps","upper back"],["Stand with your feet shoulder-width apart and place the band under your feet.","Hold the band handles at shoulder height with your palms facing forward.","Engage your core and press the band overhead, fully extending your arms.","As you press, twist your torso to one side, keeping your hips stable.","Pause for a moment at the top, then return to the starting position.","Repeat the press and twist on the opposite side.","Continue alternating sides for the desired number of repetitions."]],["Band Two Legs Calf Raise - (Band Under Both Legs) V. 2","1369-jl6uxZV","calves","ankles",["ankles","feet"],["Stand with your feet shoulder-width apart and place a resistance band under both feet.","Hold the ends of the band with your hands for stability.","Raise your heels off the ground as high as possible, using your calves.","Pause for a moment at the top, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Band Underhand Pulldown","1013-k6tUeqS","lats","biceps",["biceps","forearms"],["Attach the band to a high anchor point, such as a pull-up bar or sturdy beam.","Stand facing the anchor point with your feet shoulder-width apart.","Grasp the band with an underhand grip, hands slightly wider than shoulder-width apart.","Extend your arms fully overhead, keeping your elbows slightly bent.","Engage your lats and pull the band down towards your chest, squeezing your shoulder blades together.","Pause for a moment at the bottom of the movement, then slowly release the tension and return to the starting position.","Repeat for the desired number of repetitions."]],["Band V-up","1014-H6ETwO9","abs","hip flexors",["hip flexors"],["Lie flat on your back with your legs straight and your arms extended overhead, holding the band.","Engaging your abs, lift your legs and upper body off the ground simultaneously, reaching your hands towards your toes.","Pause for a moment at the top, then slowly lower your legs and upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Band Vertical Pallof Press","1015-G7PXMlT","abs","obliques",["obliques","glutes"],["Stand with your feet shoulder-width apart and wrap the band around a sturdy object at chest height.","Hold the band with both hands and step away from the anchor point, creating tension in the band.","Position yourself perpendicular to the anchor point, with your side facing the band.","Extend your arms straight out in front of you, keeping your hands at chest height.","Engage your core and press the band away from your chest, fully extending your arms.","Hold the position for a few seconds, then slowly bring the band back towards your chest.","Repeat for the desired number of repetitions, then switch sides."]],["Band Wrist Curl","1016-vUTfFHw","forearms","biceps",["biceps","triceps"],["Sit on a bench or chair with your feet flat on the ground.","Hold the band with both hands, palms facing up, and rest your forearms on your thighs.","Slowly curl your wrists upward, squeezing your forearms.","Pause for a moment at the top, then slowly lower your wrists back down to the starting position.","Repeat for the desired number of repetitions."]],["Band Y-raise","1017-aHDy5O5","delts","traps",["traps","rhomboids"],["Stand with your feet shoulder-width apart and hold the band in front of your thighs with your palms facing inwards.","Keep your arms straight and lift them up and out to the sides, forming a 'Y' shape with your body.","Squeeze your shoulder blades together at the top of the movement.","Slowly lower your arms back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Alternate Biceps Curl","0023-Yza7XrQ","biceps","forearms",["forearms"],["Stand up straight with your feet shoulder-width apart and hold a barbell in each hand, palms facing forward.","Keep your upper arms stationary and exhale as you curl the weights while contracting your biceps.","Continue to raise the barbells until your biceps are fully contracted and the barbells are at shoulder level.","Hold the contracted position for a brief paus
