e as you squeeze your biceps.","Inhale as you slowly begin to lower the barbells back to the starting position.","Repeat for the desired number of repetitions, alternating arms."]],["Barbell Bench Front Squat","0024-Y7YcmIJ","quads","hamstrings",["hamstrings","glutes","calves"],["Start by standing with your feet shoulder-width apart and the barbell resting on your upper chest, just below your collarbone.","Hold the barbell with an overhand grip, keeping your elbows up and your upper arms parallel to the ground.","Lower your body down into a squat position by bending at the knees and hips, keeping your back straight and your chest up.","Pause for a moment at the bottom of the squat, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Bench Press","0025-EIeI8Vf","pectorals","triceps",["triceps","shoulders"],["Lie flat on a bench with your feet flat on the ground and your back pressed against the bench.","Grasp the barbell with an overhand grip slightly wider than shoulder-width apart.","Lift the barbell off the rack and hold it directly above your chest with your arms fully extended.","Lower the barbell slowly towards your chest, keeping your elbows tucked in.","Pause for a moment when the barbell touches your chest.","Push the barbell back up to the starting position by extending your arms.","Repeat for the desired number of repetitions."]],["Barbell Bench Squat","0026-W9pFVv1","quads","glutes",["glutes","hamstrings","calves"],["Set up a barbell on a squat rack at chest height.","Stand facing away from the rack, with your feet shoulder-width apart.","Bend your knees and lower your body down into a squat position, keeping your back straight and chest up.","Grasp the barbell with an overhand grip, slightly wider than shoulder-width apart.","Lift the barbell off the rack and step back, ensuring your feet are still shoulder-width apart.","Lower your body down into a squat, keeping your knees in line with your toes.","Pause for a moment at the bottom, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Bent Arm Pullover","1316-cA9FuWG","lats","triceps",["triceps","chest"],["Lie flat on a bench with your head at one end and your feet on the floor.","Hold a barbell with a shoulder-width grip and extend your arms straight above your chest.","Lower the barbell behind your head while keeping your arms slightly bent.","Pause for a moment, then raise the barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Bent Over Row","0027-eZyBC3j","upper back","biceps",["biceps","forearms"],["Stand with your feet shoulder-width apart and knees slightly bent.","Bend forward at the hips while keeping your back straight and chest up.","Grasp the barbell with an overhand grip, hands slightly wider than shoulder-width apart.","Pull the barbell towards your lower chest by retracting your shoulder blades and squeezing your back muscles.","Pause for a moment at the top, then slowly lower the barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Biceps Curl (With Arm Blaster)","2407-aee2Fcj","biceps","forearms",["forearms"],["Stand up straight with your feet shoulder-width apart and hold a barbell with an underhand grip, palms facing up.","Place your upper arms against the arm blaster, keeping your elbows close to your torso.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the barbell until your biceps are fully contracted and the bar is at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Clean And Press","0028-SGY8Zui","quads","hamstrings",["hamstrings","glutes","shoulders","triceps"],["Stand with your feet shoulder-width apart and the barbell on the floor in front of you.","Bend your knees and hinge at the hips to lower down and grip the barbell with an overhand grip, hands slightly wider than shoulder-width apart.","Drive through your heels and extend your hips and knees to lift the barbell off the floor, keeping it close to your body.","As the barbell reaches your thighs, explosively extend your hips, shrug your shoulders, and pull the barbell up towards your chest.","As the barbell reaches chest height, quickly drop under it and catch it at shoulder level, with your elbows pointing forward and your palms facing up.","From the catch position, press the barbell overhead by extending your arms and pushing the barbell straight up.","Lower the barbell back down to the starting position and repeat for the desired number of repetitions."]],["Barbell Clean-grip Front Squat","0029-qi996YS","glutes","quadriceps",["quadriceps","hamstrings","calves","core"],["Start by standing with your feet shoulder-width apart and the barbell resting on your upper chest, with your elbows pointing forward.","Lower your body by bending your knees and pushing your hips back, as if you are sitting back into a chair.","Keep your chest up and your back straight as you lower down, making sure your knees do not go past your toes.","Continue lowering until your thighs are parallel to the ground, or as low as you can comfortably go.","Pause for a moment at the bottom, then push through your heels to stand back up, extending your hips and knees.","Repeat for the desired number of repetitions."]],["Barbell Close-grip Bench Press","0030-J6Dx1Mu","triceps","chest",["chest","shoulders"],["Lie flat on a bench with your feet flat on the ground and your back pressed against the bench.","Grasp the barbell with a close grip, slightly narrower than shoulder-width apart.","Unrack the barbell and lower it slowly towards your chest, keeping your elbows close to your body.","Pause for a moment when the barbell touches your chest.","Push the barbell back up to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Barbell Curl","0031-25GPyDY","biceps","forearms",["forearms"],["Stand up straight with your feet shoulder-width apart and hold a barbell with an underhand grip, palms facing forward.","Keep your elbows close to your torso and exhale as you curl the weights while contracting your biceps.","Continue to raise the bar until your biceps are fully contracted and the bar is at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale as you slowly begin to lower the bar back to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Deadlift","0032-ila4NZS","glutes","hamstrings",["hamstrings","lower back"],["Stand with your feet shoulder-width apart and the barbell on the ground in front of you.","Bend your knees and hinge at the hips to lower your torso and grip the barbell with an overhand grip, hands slightly wider than shoulder-width apart.","Keep your back straight and chest lifted as you drive through your heels to lift the barbell off the ground, extending your hips and knees.","As you stand up straight, squeeze your glutes and keep your core engaged.","Lower the barbell back down to the ground by bending at the hips and knees, keeping your back straight.","Repeat for the desired number of repetitions."]],["Barbell Decline Bench Press","0033-GrO65fd","pectorals","triceps",["triceps","shoulders"],["Lie on a decline bench with your feet secured and your head lower than your hips.","Grasp the barbell with an overhand grip slightly wider than shoulder-width apart.","Unrack the barbell and lower it slowly towards your chest, keeping your elbows tucked in.","Pause for a moment at the bottom, then push the barbell back up to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Decline Bent Arm Pullover","0034-hMEptv0","lats","triceps",["triceps","chest"],["Lie down on a decline bench with your head lower than your hips and your feet secured.","Hold a barbell with a pronated grip (palms facing away from you) and extend your arms straight above your chest.","Lower the barbell behind your head in a controlled manner, keeping your arms slightly bent.","Pause for a moment, then raise the barbell back to the starting position by contracting your lats.","Repeat for the desired number of repetitions."]],["Barbell Decline Close Grip To Skull Press","0035-LMGXZn8","triceps","chest",["chest","shoulders"],["Lie on a decline bench with your head lower than your feet and hold a barbell with a close grip.","Lower the barbell towards your forehead by bending your elbows, keeping your upper arms stationary.","Pause for a moment, then extend your arms to press the barbell back up to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Decline Pullover","1255-9sgNE2O","pectorals","triceps",["triceps","shoulders"],["Lie down on a decline bench with your head lower than your hips and your feet secured.","Hold the barbell with a pronated grip (palms facing away from you) and your hands slightly wider than shoulder-width apart.","Extend your arms above your chest, keeping a slight bend in your elbows.","Lower the barbell in an arc motion behind your head, feeling a stretch in your chest and shoulders.","Pause for a moment, then return the barbell to the starting position by reversing the motion.","Repeat for the desired number of repetitions."]],["Barbell Decline Wide-grip Press","0036-hl8DUh8","pectorals","triceps",["triceps","shoulders"],["Lie on a decline bench with your feet secured and your head lower than your hips.","Grasp the barbell with a wide grip, slightly wider than shoulder-width apart.","Lower the barbell to your chest, keeping your elbows out to the sides.","Push the barbell back up to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Barbell Decline Wide-grip Pullover","0037-Hj4FOCd","lats","triceps",["triceps","chest"],["Lie on a decline bench with your head lower than your hips and your feet secured.","Hold a barbell with a wide grip and extend your arms straight above your chest.","Lower the barbell behind your head in a controlled manner, keeping your arms straight.","Pause for a moment, then raise the barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Drag Curl","0038-IENzBdA","biceps","forearms",["forearms"],["Stand with your feet shoulder-width apart and hold a barbell with an underhand grip, palms facing up.","Let the barbell hang at arm's length in front of your thighs.","Keeping your upper arms stationary, curl the barbell up towards your chest by contracting your biceps.","Pause for a moment at the top, then slowly lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Floor Calf Raise","1370-2IHEa2T","calves","hamstrings",["hamstrings"],["Place a barbell on the floor in front of you.","Stand with the balls of your feet on the edge of the barbell, with your heels hanging off.","Hold onto a stable object for balance if needed.","Raise your heels as high as possible, using your calves to lift your body.","Pause for a moment at the top, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Front Chest Squat","0039-IeTIEqg","glutes","quadriceps",["quadriceps","hamstrings","calves","core"],["Start by standing with your feet shoulder-width apart, toes slightly turned out.","Hold the barbell in front of your chest with your hands shoulder-width apart, elbows pointing forward.","Engage your core and keep your chest up as you lower your body down into a squat position, pushing your hips back and bending your knees.","Lower until your thighs are parallel to the ground, or as low as you can comfortably go.","Pause for a moment at the bottom, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Front Raise","0041-b2Uoz54","delts","biceps",["biceps","triceps"],["Stand with your feet shoulder-width apart and hold a barbell in front of your thighs with an overhand grip.","Keep your arms straight and lift the barbell forward and upward until it reaches shoulder level.","Pause for a moment at the top, then slowly lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Front Raise And Pullover","0040-33AzZeV","pectorals","deltoids",["deltoids","triceps"],["Stand with your feet shoulder-width apart and hold a barbell with an overhand grip, palms facing down.","Keep your arms straight and raise the barbell in front of you until it reaches shoulder height.","Pause for a moment at the top, then slowly lower the barbell back down to the starting position.","Next, lower the barbell behind your head, keeping your arms straight.","Pause for a moment at the bottom, then raise the barbell back up to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Front Squat","0042-zG0zs85","glutes","quadriceps",["quadriceps","hamstrings","calves","core"],["Start by standing with your feet shoulder-width apart, toes slightly turned out.","Hold the barbell in front of your shoulders, resting it on your collarbone and shoulders.","Engage your core and keep your chest up as you lower your body down into a squat position, pushing your hips back and bending your knees.","Lower until your thighs are parallel to the ground, or as low as you can comfortably go.","Pause for a moment at the bottom, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Full Squat","0043-qXTaZnJ","glutes","quadriceps",["quadriceps","hamstrings","calves","core"],["Stand with your feet shoulder-width apart, toes slightly turned out.","Hold the barbell across your upper back, resting it on your traps or rear delts.","Engage your core and keep your chest up as you begin to lower your body down.","Bend at the knees and hips, pushing your hips back and down as if sitting into a chair.","Lower yourself until your thighs are parallel to the ground or slightly below.","Keep your knees in line with your toes and your weight in your heels.","Drive through your heels to stand back up, extending your hips and knees.","Repeat for the desired number of repetitions."]],["Barbell Full Squat (Back Pov)","1461-DhMl549","glutes","quadriceps",["quadriceps","hamstrings","calves","core"],["Stand with your feet shoulder-width apart, toes slightly turned out.","Hold the barbell across your upper back, resting it on your traps or rear delts.","Engage your core and keep your chest up as you begin to lower your body down.","Bend at the knees and hips, pushing your hips back and down as if sitting into a chair.","Lower your body until your thighs are parallel to the ground or slightly below.","Keep your knees in line with your toes and your weight in your heels.","Drive through your heels to stand back up, extending your hips and knees.","Repeat for the desired number of repetitions."]],["Barbell Full Squat (Side Pov)","1462-iYzB0Cz","glutes","quadriceps",["quadriceps","hamstrings","calves","core"],["Stand with your feet shoulder-width apart, toes slightly turned out.","Hold the barbell across your upper back, resting it on your traps or rear delts.","Engage your core and keep your chest up as you begin to lower your body down.","Bend at the knees and hips, pushing your hips back and down as if sitting into a chair.","Lower your body until your thighs are parallel to the ground or slightly below.","Keep your knees in line with your toes and your weight in your heels.","Drive through your heels to stand back up, extending your hips and knees.","Repeat for the desired number of repetitions."]],["Barbell Full Zercher Squat","1545-vR1vold","glutes","quadriceps",["quadriceps","hamstrings","calves","core"],["Stand with your feet shoulder-width apart and toes slightly turned out.","Hold the barbell in the crooks of your elbows, with your hands gripping the barbell for stability.","Engage your core and keep your chest lifted as you lower your hips back and down into a squat position.","Keep your knees in line with your toes and your weight in your heels.","Lower until your thighs are parallel to the ground, or as low as you can comfortably go.","Drive through your heels to stand back up, squeezing your glutes at the top of the movement.","Repeat for the desired number of repetitions."]],["Barbell Glute Bridge","1409-qKBpF7I","glutes","hamstrings",["hamstrings","lower back"],["Start by lying flat on your back on the ground with your knees bent and feet flat on the floor.","Place a barbell across your hips, holding it securely with both hands.","Engage your glutes and core muscles, then lift your hips off the ground until your body forms a straight line from your knees to your shoulders.","Pause for a moment at the top, squeezing your glutes.","Slowly lower your hips back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Glute Bridge Two Legs On Bench (Male)","3562-qg2PGl6","glutes","hamstrings",["hamstrings","core"],["Start by sitting on the edge of a bench with your upper back resting against it and your feet flat on the ground, hip-width apart.","Place a barbell across your hips, holding it securely with both hands.","Engage your glutes and core muscles, then press through your heels to lift your hips off the bench, creating a straight line from your knees to your shoulders.","Pause for a moment at the top, squeezing your glutes.","Slowly lower your hips back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Good Morning","0044-XlZ4lAC","hamstrings","lower back",["lower back"],["Start by standing with your feet shoulder-width apart and the barbell resting on your upper back.","Keeping your back straight and your core engaged, hinge forward at the hips, pushing your buttocks back as if you were trying to touch the wall behind you with your glutes.","Lower your torso until it is parallel to the ground, feeling a stretch in your hamstrings.","Pause for a moment, then return to the starting position by squeezing your glutes and pushing your hips forward.","Repeat for the desired number of repetitions."]],["Barbell Guillotine Bench Press","0045-GXoaSgn","pectorals","shoulders",["shoulders","triceps"],["Lie flat on a bench with your feet flat on the ground and your back pressed against the bench.","Grasp the barbell with an overhand grip, slightly wider than shoulder-width apart.","Lower the barbell slowly towards your neck, keeping your elbows pointed outwards.","Pause for a moment when the barbell is just above your neck.","Push the barbell back up to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Barbell Hack Squat","0046-5VCj6iH","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Start by standing with your feet shoulder-width apart and your toes slightly turned out.","Hold the barbell behind your legs, resting it on your upper thighs.","Lower your body by bending at the knees and hips, keeping your back straight and your chest up.","Continue lowering until your thighs are parallel to the ground, or as low as you can comfortably go.","Pause for a moment, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Barbell High Bar Squat","1436-Gnfo4FM","glutes","quadriceps",["quadriceps","hamstrings","calves","core"],["Stand with your feet shoulder-width apart, toes slightly turned out.","Place the barbell on your upper back, resting it on your traps.","Engage your core and keep your chest up as you begin to squat down, pushing your hips back and bending your knees.","Lower yourself until your thighs are parallel to the ground, or as low as you can comfortably go.","Drive through your heels to stand back up, extending your hips and knees.","Repeat for the desired number of repetitions."]],["Barbell Incline Bench Press","0047-3TZduzM","pectorals","shoulders",["shoulders","triceps"],["Set up an incline bench at a 45-degree angle.","Lie down on the bench with your feet flat on the ground.","Grasp the barbell with an overhand grip, slightly wider than shoulder-width apart.","Unrack the barbell and lower it slowly towards your chest, keeping your elbows at a 45-degree angle.","Pause for a moment at the bottom, then push the barbell back up to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Incline Close Grip Bench Press","1719-gx7s7uF","triceps","chest",["chest","shoulders"],["Set up an incline bench at a 45-degree angle.","Lie down on the bench with your feet flat on the ground.","Grasp the barbell with a close grip, slightly narrower than shoulder-width apart.","Unrack the barbell and lower it slowly towards your chest, keeping your elbows close to your body.","Pause for a moment when the barbell touches your chest.","Push the barbell back up to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Barbell Incline Reverse-grip Press","0048-641mIfk","triceps","chest",["chest","shoulders"],["Set up an incline bench at a 45-degree angle.","Lie back on the bench and grasp the barbell with a reverse grip, hands slightly wider than shoulder-width apart.","Unrack the barbell and lower it towards your upper chest, keeping your elbows tucked in.","Pause for a moment at the bottom, then push the barbell back up to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Incline Row","0049-dmgMp3n","upper back","biceps",["biceps","forearms"],["Set up an incline bench at a 45-degree angle.","Lie face down on the bench with your chest against the pad and your feet flat on the ground.","Grasp the barbell with an overhand grip, slightly wider than shoulder-width apart.","Keep your back straight and your core engaged.","Pull the barbell towards your chest, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower the barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Incline Shoulder Raise","0050-xi0yckC","serratus anterior","deltoids",["deltoids","trapezius"],["Set up an incline bench at a 45-degree angle.","Sit on the bench with your back against the pad and feet flat on the ground.","Hold a barbell with an overhand grip, slightly wider than shoulder-width apart.","Lift the barbell up to shoulder height, keeping your elbows slightly bent.","Slowly raise the barbell overhead, extending your arms fully.","Pause for a moment at the top, then slowly lower the barbell back to shoulder height.","Repeat for the desired number of repetitions."]],["Barbell Jefferson Squat","0051-pkSoCW9","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart and toes slightly turned out.","Hold the barbell with an overhand grip, resting it on the front of your body, just below your waist.","Step your left foot forward and your right foot back, keeping your feet shoulder-width apart.","Bend your knees and lower your body down into a squat position, keeping your back straight and chest up.","Push through your heels to stand back up to the starting position.","Repeat the movement, alternating your forward and back foot with each repetition."]],["Barbell Jm Bench Press","0052-ZsiqXYa","triceps","chest",["chest","shoulders"],["Lie flat on a bench with your feet flat on the ground and your back pressed against the bench.","Grasp the barbell with an overhand grip, slightly wider than shoulder-width apart.","Lower the barbell to your chest, keeping your elbows tucked in close to your body.","Push the barbell back up to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Barbell Jump Squat","0053-1gFNTZV","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Start by standing with your feet shoulder-width apart, holding a barbell across your upper back.","Lower your body into a squat position by bending your knees and pushing your hips back.","Once you reach the bottom of the squat, explode upwards by jumping off the ground.","As you jump, extend your hips, knees, and ankles, pushing through your toes.","Land softly back into the squat position and immediately repeat the movement for the desired number of repetitions."]],["Barbell Lateral Lunge","1410-py1HSzx","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart, holding a barbell across your upper back.","Take a big step to the side with your right foot, keeping your left foot planted.","Bend your right knee and lower your body down into a lunge position, keeping your left leg straight.","Push off with your right foot and return to the starting position.","Repeat on the other side, stepping with your left foot."]],["Barbell Low Bar Squat","1435-bTpEUcm","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart and the barbell resting on your upper back.","Keeping your chest up and core engaged, slowly lower your body by bending your knees and pushing your hips back.","Continue lowering until your thighs are parallel to the ground or slightly below.","Pause for a moment, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Lunge","0054-t8iSghb","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Start by standing with your feet shoulder-width apart and a barbell resting on your upper back.","Take a step forward with your right foot, keeping your torso upright.","Lower your body by bending your right knee until your thigh is parallel to the ground.","Push through your right heel to return to the starting position.","Repeat with your left leg, alternating legs for the desired number of repetitions."]],["Barbell Lying Back Of The Head Tricep Extension","1720-yg8Totb","triceps","shoulders",["shoulders"],["Lie flat on a bench with your feet flat on the ground and your head at the end of the bench.","Hold a barbell with an overhand grip, hands shoulder-width apart, and extend your arms straight up over your chest.","Keeping your upper arms stationary, slowly lower the barbell behind your head by bending your elbows.","Pause for a moment, then extend your arms back up to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Lying Close-grip Press","0055-EcaV7aL","triceps","chest",["chest","shoulders"],["Lie flat on a bench with your feet flat on the ground and your back pressed against the bench.","Grasp the barbell with a close grip, hands shoulder-width apart, palms facing towards your feet.","Lift the barbell off the rack and hold it directly above your chest with your arms fully extended.","Slowly lower the barbell towards your chest, keeping your elbows close to your body.","Pause for a moment when the barbell touches your chest, then push it back up to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Lying Close-grip Triceps Extension","0056-HJ63mSO","triceps","shoulders",["shoulders"],["Lie flat on a bench with your feet flat on the ground and your head at the end of the bench.","Grasp the barbell with a close grip, hands shoulder-width apart, palms facing up.","Extend your arms fully, lifting the barbell above your chest.","Keeping your upper arms stationary, slowly lower the barbell towards your forehead by bending your elbows.","Pause for a moment at the bottom, then extend your arms back to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Lying Extension","0057-EMpUwRI","triceps","shoulders",["shoulders"],["Lie flat on a bench with your feet flat on the ground and your head at the end of the bench.","Hold the barbell with an overhand grip, hands shoulder-width apart, and extend your arms straight up over your chest.","Keeping your upper arms stationary, slowly lower the barbell towards your forehead by bending your elbows.","Pause for a moment, then extend your arms back up to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Lying Lifting (On Hip)","0058-SNFfUff","glutes","hamstrings",["hamstrings","quadriceps"],["Lie flat on your back on a bench with your feet flat on the ground and your knees bent.","Hold the barbell with an overhand grip and position it on your hips.","Engaging your glutes, lift your hips off the bench until your body forms a straight line from your knees to your shoulders.","Pause for a moment at the top, then slowly lower your hips back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Lying Preacher Curl","0059-SYJ4Bkt","biceps","forearms",["forearms"],["Sit on a preacher bench with your chest against the pad and your arms extended over the edge, holding a barbell with an underhand grip.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the bar until your biceps are fully contracted and the bar is at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Lying Triceps Extension","0061-iZop9xO","triceps","shoulders",["shoulders"],["Lie flat on a bench with your feet flat on the ground and your head at the end of the bench.","Hold the barbell with an overhand grip, hands shoulder-width apart, and extend your arms straight up over your chest.","Keeping your upper arms stationary, slowly lower the barbell towards your forehead by bending your elbows.","Pause for a moment at the bottom, then extend your arms back up to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Lying Triceps Extension Skull Crusher","0060-h8LFzo9","triceps","shoulders",["shoulders"],["Lie flat on a bench with your feet flat on the ground and your head at the end of the bench.","Hold the barbell with an overhand grip, hands shoulder-width apart, and extend your arms straight up over your chest.","Keeping your upper arms stationary, slowly lower the barbell towards your forehead by bending your elbows.","Pause for a moment when the barbell is just above your forehead, then extend your arms back up to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Narrow Stance Squat","0063-elhhVgj","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart and toes pointing slightly outward.","Hold the barbell across your upper back, resting it on your traps or rear delts.","Engage your core and keep your chest up as you slowly lower your body by bending your knees and pushing your hips back.","Continue lowering until your thighs are parallel to the ground or slightly below.","Pause for a moment, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Barbell One Arm Bent Over Row","0064-Jsgsc27","upper back","biceps",["biceps","forearms"],["Stand with your feet shoulder-width apart, knees slightly bent, and hold a barbell with one hand using an overhand grip.","Bend forward at the hips, keeping your back straight and your head in a neutral position.","Pull the barbell up towards your chest, keeping your elbow close to your body and squeezing your shoulder blades together.","Lower the barbell back down to the starting position in a controlled manner.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Barbell One Arm Floor Press","0065-vtusOWT","triceps","chest",["chest","shoulders"],["Lie flat on your back on the floor with your knees bent and feet flat on the ground.","Hold the barbell with one hand, palm facing up, and extend your arm straight up over your chest.","Slowly lower the barbell towards your chest, keeping your elbow close to your body.","Pause for a moment at the bottom, then push the barbell back up to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Barbell One Arm Side Deadlift","0066-2DxtqHL","glutes","hamstrings",["hamstrings","quadriceps","lower back"],["Stand with your feet shoulder-width apart, holding a barbell in one hand with an overhand grip.","Keep your back straight and your core engaged.","Bend at the hips and lower the barbell towards the outside of your leg, keeping your arm straight and your chest up.","Lower the barbell as far as you can while maintaining good form.","Pause for a moment, then slowly return to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Barbell One Arm Snatch","0067-xHKN2s8","delts","traps",["traps","forearms","core"],["Stand with your feet shoulder-width apart, toes pointing slightly outwards.","Hold the barbell with an overhand grip, hands slightly wider than shoulder-width apart.","Bend your knees and lower your hips into a squat position, keeping your back straight and chest up.","Explosively extend your hips, knees, and ankles, driving the barbell upwards.","As the barbell reaches chest level, pull it upwards with your arm, keeping it close to your body.","Rotate your elbow under the barbell and extend your arm fully overhead, locking out your elbow.","Lower the barbell back down to the starting position in a controlled manner.","Repeat for the desired number of repetitions, then switch arms."]],["Barbell One Leg Squat","0068-uKyN64F","quads","glutes",["glutes","hamstrings","calves"],["Stand with your feet shoulder-width apart and hold a barbell across your upper back.","Lift one foot off the ground and extend it forward, keeping it parallel to the ground.","Bend your standing leg and lower your body down as if sitting back into a chair, keeping your chest up and your back straight.","Lower yourself until your thigh is parallel to the ground, then push through your heel to return to the starting position.","Repeat for the desired number of repetitions, then switch legs and repeat."]],["Barbell Overhead Squat","0069-gfk9kD4","quads","glutes",["glutes","hamstrings","calves","core"],["Stand with your feet shoulder-width apart and toes slightly turned out.","Hold the barbell with a wide grip, positioning it overhead with your arms fully extended.","Engage your core and lower your body down into a squat position, keeping your chest up and knees tracking over your toes.","Pause for a moment at the bottom, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Palms Down Wrist Curl Over A Bench","1411-yzYH9pI","forearms","biceps",["biceps","brachialis"],["Sit on a bench with your feet flat on the ground and your forearms resting on your thighs, palms facing down.","Hold a barbell with an overhand grip, hands shoulder-width apart.","Lower the barbell towards the ground by flexing your wrists, keeping your forearms stationary.","Pause for a moment at the bottom, then slowly raise the barbell back up by extending your wrists.","Repeat for the desired number of repetitions."]],["Barbell Palms Up Wrist Curl Over A Bench","1412-SJAA2IQ","forearms","biceps",["biceps","shoulders"],["Sit on a bench with your feet flat on the ground and hold a barbell with an underhand grip, palms facing up.","Rest your forearms on the bench, allowing your wrists to hang off the edge.","Keeping your forearms stationary, exhale and curl your wrists upwards as far as possible.","Hold the contracted position for a brief pause, then inhale and slowly lower the barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Pendlay Row","3017-r0z6xzQ","upper back","biceps",["biceps","forearms"],["Stand with your feet shoulder-width apart and your knees slightly bent.","Bend forward at the hips, keeping your back straight and your chest up.","Grasp the barbell with an overhand grip, slightly wider than shoulder-width apart.","Pull the barbell towards your upper abdomen, squeezing your shoulder blades together.","Lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Pin Presses","1751-bndCa3Q","triceps","shoulders",["shoulders"],["Set up a barbell on a power rack at chest height.","Stand facing the barbell and position yourself underneath it, with your feet shoulder-width apart.","Grip the barbell with an overhand grip, slightly wider than shoulder-width apart.","Lift the barbell off the rack and hold it directly above your chest, with your arms fully extended.","Lower the barbell down towards your chest, keeping your elbows tucked in close to your body.","Pause for a moment when the barbell touches your chest.","Push the barbell back up to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Barbell Preacher Curl","0070-qOgPVf6","biceps","forearms",["forearms"],["Sit on a preacher bench with your upper arms resting on the pad and your chest against the support.","Grasp the barbell with an underhand grip, slightly wider than shoulder-width apart.","Keeping your upper arms stationary, exhale and curl the barbell up towards your shoulders.","Pause for a moment at the top, squeezing your biceps.","Inhale and slowly lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Press Sit-up","0071-wnEscH8","abs","shoulders",["shoulders","chest"],["Lie flat on your back on a mat with your knees bent and feet flat on the ground.","Hold the barbell with an overhand grip, resting it on your chest.","Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Prone Incline Curl","0072-WLvTAv5","biceps","forearms",["forearms"],["Set up an incline bench at a 45-degree angle.","Lie face down on the bench with your chest and stomach resting against it.","Hold a barbell with an underhand grip, shoulder-width apart.","Extend your arms fully, allowing the barbell to hang down towards the floor.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the barbell until your biceps are fully contracted and the bar is at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Pullover","0073-i6LWjok","lats","chest",["chest","triceps"],["Lie flat on a bench with your head at one end and your feet on the floor.","Hold a barbell with a shoulder-width grip and extend your arms straight above your chest.","Keeping your arms straight, lower the barbell behind your head in a controlled manner until you feel a stretch in your lats.","Pause for a moment, then raise the barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Pullover To Press","0022-znLogoF","lats","triceps",["triceps","chest","shoulders"],["Lie flat on a bench with your head at one end and your feet on the ground.","Hold the barbell with a pronated grip (palms facing away from you) and extend your arms straight above your chest.","Keeping your arms straight, lower the barbell behind your head in an arc-like motion until you feel a stretch in your lats.","Pause for a moment, then reverse the motion and press the barbell back to the starting position above your chest.","Repeat for the desired number of repetitions."]],["Barbell Rack Pull","0074-za9Ni4z","glutes","hamstrings",["hamstrings","lower back"],["Set up a barbell on a rack at knee height.","Stand with your feet shoulder-width apart, toes pointing slightly outwards.","Bend at the hips and knees to lower yourself down and grip the barbell with an overhand grip, hands shoulder-width apart.","Engage your core and lift the barbell by extending your hips and knees, pulling your shoulders back and squeezing your glutes at the top.","Lower the barbell back down to the starting position by bending at the hips and knees.","Repeat for the desired number of repetitions."]],["Barbell Rear Delt Raise","0075-Ln9iTbU","delts","traps",["traps","rhomboids"],["Stand with your feet shoulder-width apart and hold a barbell with an overhand grip, palms facing down.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Raise the barbell out to the sides, keeping your arms straight, until they are parallel to the ground.","Pause for a moment at the top, then slowly lower the barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Rear Delt Row","0076-S9zHIvU","delts","trapezius",["trapezius","rhomboids","biceps"],["Stand with your feet shoulder-width apart and knees slightly bent.","Hold a barbell with an overhand grip, hands slightly wider than shoulder-width apart.","Bend forward at the hips, keeping your back straight and chest up.","Pull the barbell towards your chest, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower the barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Rear Lunge","0078-VaP75jl","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Start by standing with your feet shoulder-width apart and a barbell resting on your upper back.","Take a step backward with your right foot, landing on the ball of your foot.","Bend both knees to lower your body until your left thigh is parallel to the ground.","Push through your left heel to return to the starting position.","Repeat with the other leg."]],["Barbell Rear Lunge V. 2","0077-62Nw60O","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart and hold a barbell across your upper back.","Take a step backward with your right foot, landing on the ball of your foot.","Bend both knees to lower your body until your left thigh is parallel to the ground.","Push through your left heel to return to the starting position.","Repeat with the other leg."]],["Barbell Revers Wrist Curl V. 2","0079-qDnGfDb","forearms","biceps",["biceps","brachialis"],["Sit on a bench with your feet flat on the ground and your knees bent.","Hold a barbell with an overhand grip, palms facing down, and your hands shoulder-width apart.","Rest your forearms on your thighs, allowing your wrists to hang off the edge.","Keeping your forearms stationary, exhale and curl your wrists upward as far as possible.","Hold the contracted position for a brief pause, then inhale and slowly lower the barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Reverse Close-grip Bench Press","2187-YqJw82s","triceps","chest",["chest","shoulders"],["Lie flat on a bench with your feet flat on the ground and your back pressed against the bench.","Grasp the barbell with a reverse grip, hands shoulder-width apart.","Lift the barbell off the rack and hold it directly above your chest with your arms fully extended.","Slowly lower the barbell down towards your chest, keeping your elbows close to your body.","Pause for a moment when the barbell is just above your chest.","Push the barbell back up to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Barbell Reverse Curl","0080-xNrS20v","biceps","forearms",["forearms"],["Stand up straight with your feet shoulder-width apart and hold a barbell with an overhand grip, palms facing down.","Keep your upper arms stationary and exhale as you curl the barbell upward, contracting your biceps.","Continue to raise the barbell until your biceps are fully contracted and the barbell is at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale as you slowly lower the barbell back to the starting position, keeping your upper arms stationary.","Repeat for the desired number of repetitions."]],["Barbell Reverse Grip Bent Over Row","0118-SzX3uzM","upper back","biceps",["biceps","forearms"],["Stand with your feet shoulder-width apart and knees slightly bent.","Hold a barbell with an overhand grip, palms facing down, and hands slightly wider than shoulder-width apart.","Bend forward at the hips, keeping your back straight and chest up, until your torso is almost parallel to the floor.","Pull the barbell towards your lower chest, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower the barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Reverse Grip Decline Bench Press","1256-DotAgEF","pectorals","triceps",["triceps","shoulders"],["Lie on a decline bench with your feet secured and your head lower than your hips.","Grasp the barbell with a reverse grip, slightly wider than shoulder-width apart.","Unrack the barbell and lower it slowly towards your chest, keeping your elbows tucked in.","Pause for a moment at the bottom, then push the barbell back up to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Reverse Grip Incline Bench Press","1257-DU7I633","pectorals","triceps",["triceps","shoulders"],["Set up an incline bench at a 45-degree angle.","Lie down on the bench with your feet flat on the ground.","Grasp the barbell with a reverse grip, hands slightly wider than shoulder-width apart.","Unrack the barbell and lower it slowly towards your chest, keeping your elbows tucked in.","Pause for a moment when the barbell touches your chest.","Push the barbell back up to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Barbell Reverse Grip Incline Bench Row","1317-8d8qJQI","upper back","biceps",["biceps","forearms"],["Set up an incline bench at a 45-degree angle.","Sit on the bench facing the backrest with your chest against it.","Grab the barbell with a reverse grip (palms facing down) and hands slightly wider than shoulder-width apart.","Keep your back straight and core engaged.","Pull the barbell towards your upper abdomen, squeezing your shoulder blades together.","Pause for a moment at the top of the movement.","Slowly lower the barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Reverse Grip Skullcrusher","1721-yRLPCLu","triceps","forearms",["forearms"],["Lie flat on a bench with your feet flat on the ground and your head at the end of the bench.","Hold the barbell with a reverse grip, palms facing towards your face, and your hands shoulder-width apart.","Extend your arms straight up over your chest, keeping your elbows in and your wrists straight.","Slowly lower the barbell towards your forehead by bending your elbows, keeping your upper arms stationary.","Pause for a moment at the bottom, then extend your arms back up to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Reverse Preacher Curl","0081-4LIG9xr","biceps","forearms",["forearms"],["Sit on a preacher bench with your chest against the pad and your arms extended straight down, holding a barbell with an overhand grip.","Keeping your upper arms stationary, exhale and curl the barbell upward while contracting your biceps.","Continue to raise the barbell until your biceps are fully contracted and the barbell is at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly lower the barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Reverse Wrist Curl","0082-LsZkfU6","forearms","biceps",["biceps","brachialis"],["Sit on a bench with your feet flat on the ground and hold a barbell with an overhand grip, palms facing down.","Rest your forearms on your thighs, allowing your wrists to hang off the edge.","Slowly curl your wrists upward, bringing the barbell towards your body.","Pause for a moment at the top, then slowly lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Rollerout","0084-7M66AVi","abs","lower back",["lower back"],["Kneel on the floor and hold a barbell with both hands, shoulder-width apart.","Roll the barbell forward, extending your arms and keeping your core engaged.","Continue rolling forward until your body is fully extended and your arms are overhead.","Pause for a moment, then slowly roll the barbell back towards your knees, maintaining control.","Repeat for the desired number of repetitions."]],["Barbell Rollerout From Bench","0083-Gxg9lDc","abs","shoulders",["shoulders","triceps"],["Start by kneeling on the floor with a barbell placed on a bench in front of you.","Grasp the barbell with an overhand grip, slightly wider than shoulder-width apart.","Keeping your core engaged and your back straight, slowly roll the barbell forward, extending your arms in front of you.","Continue rolling the barbell forward until your body is fully extended and your arms are overhead.","Pause for a moment at the fully extended position, then slowly roll the barbell back towards your body, returning to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Romanian Deadlift","0085-wQ2c4XD","glutes","hamstrings",["hamstrings","lower back"],["Stand with your feet shoulder-width apart and your toes pointing forward.","Hold the barbell with an overhand grip, hands slightly wider than shoulder-width apart.","Bend at the hips, keeping your back straight and your knees slightly bent.","Lower the barbell towards the ground, keeping it close to your body.","Feel the stretch in your hamstrings as you lower the barbell.","Once you feel a stretch in your hamstrings, push your hips forward and stand up straight.","Squeeze your glutes at the top of the movement.","Lower the barbell back down to the starting position and repeat for the desired number of repetitions."]],["Barbell Seated Behind Head Military Press","0086-ngPpyRS","delts","triceps",["triceps","upper back"],["Sit on a bench with your back straight and feet flat on the ground.","Hold the barbell with an overhand grip, slightly wider than shoulder-width apart.","Lift the barbell off the rack and bring it down to shoulder level, behind your head.","Press the barbell upward until your arms are fully extended.","Lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Seated Bradford Rocky Press","0087-0dCyly0","delts","triceps",["triceps","upper back"],["Sit on a bench with your back straight and feet flat on the ground.","Hold the barbell with an overhand grip, slightly wider than shoulder-width apart.","Lift the barbell to shoulder height, keeping your elbows slightly bent and pointing forward.","Press the barbell overhead, fully extending your arms.","Lower the barbell back to shoulder height and repeat for the desired number of repetitions."]],["Barbell Seated Calf Raise","0088-ktsFQAZ","calves","hamstrings",["hamstrings","quadriceps"],["Sit on a bench with your feet flat on the floor and a barbell resting on your thighs.","Place the balls of your feet on a raised platform, such as a block or step.","Position the barbell across your thighs and hold it securely with your hands.","Keeping your back straight and your core engaged, lift your heels off the ground by extending your ankles.","Pause for a moment at the top, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Seated Close Grip Behind Neck Triceps Extension","1718-4CBIBOM","triceps","shoulders",["shoulders"],["Sit on a bench with your back straight and feet flat on the ground.","Hold the barbell with a close grip behind your neck, palms facing forward.","Keep your elbows close to your head and slowly lower the barbell towards the back of your head.","Pause for a moment, then extend your arms back up to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Seated Close-grip Concentration Curl","0089-1V1gj1u","biceps","forearms",["forearms"],["Sit on a bench with your feet flat on the floor and hold a barbell with an underhand grip, hands shoulder-width apart.","Rest your upper arms against your inner thighs, just above your knees, and let the barbell hang down in front of you.","Keeping your upper arms stationary, exhale and curl the barbell up towards your shoulders, contracting your biceps.","Hold the contracted position for a brief pause, then inhale and slowly lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Seated Good Morning","0090-d960PgE","glutes","hamstrings",["hamstrings","lower back"],["Sit on a bench with your feet flat on the ground and a barbell resting on your upper back.","Keep your back straight and your chest up.","Slowly hinge forward at the hips, lowering your torso towards the ground.","Pause for a moment at the bottom, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Seated Overhead Press","0091-kTbSH9h","delts","triceps",["triceps","upper back"],["Sit on a bench with your back straight and feet flat on the ground.","Hold the barbell with an overhand grip, slightly wider than shoulder-width apart.","Lift the barbell off the rack and bring it to shoulder level, with your elbows bent and palms facing forward.","Press the barbell overhead by extending your arms fully.","Pause for a moment at the top, then slowly lower the barbell back to shoulder level.","Repeat for the desired number of repetitions."]],["Barbell Seated Overhead Triceps Extension","0092-5uFK1xr","triceps","shoulders",["shoulders"],["Sit on a bench with your back straight and feet flat on the ground.","Hold a barbell with an overhand grip, hands shoulder-width apart, and raise it overhead.","Lower the barbell behind your head by bending your elbows, keeping your upper arms close to your head.","Pause for a moment, then extend your arms to raise the barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Seated Twist","0094-dFSNDOA","abs","obliques",["obliques","lower back"],["Sit on a flat bench with your feet flat on the ground and your knees bent.","Hold a barbell with both hands in front of your chest, keeping your elbows slightly bent.","Engage your core and slowly twist your torso to one side, keeping your back straight.","Pause for a moment at the end of the twist, then slowly rotate back to the starting position.","Repeat the twist to the other side.","Continue alternating sides for the desired number of repetitions."]],["Barbell Shrug","0095-dG7tG5y","traps","shoulders",["shoulders"],["Stand with your feet shoulder-width apart and hold a barbell in front of you with an overhand grip.","Keep your arms straight and your back straight throughout the exercise.","Lift your shoulders up towards your ears as high as possible, squeezing your traps at the top.","Hold for a moment, then slowly lower your shoulders back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Side Bent V. 2","0096-i4JkUaL","abs","obliques",["obliques","lower back"],["Stand with your feet shoulder-width apart and hold a barbell with both hands, palms facing down.","Keep your back straight and core engaged throughout the exercise.","Slowly bend your torso to the right side, lowering the barbell towards your right knee.","Pause for a moment, then return to the starting position.","Repeat the movement on the left side.","Continue alternating sides for the desired number of repetitions."]],["Barbell Side Split Squat","0098-W31mMjd","quads","glutes",["glutes","hamstrings","calves"],["Stand with your feet wider than shoulder-width apart, toes pointing slightly outward.","Hold a barbell across your upper back, resting it on your traps.","Engage your core and keep your chest up as you lower your body down into a squat position, bending at the knees and hips.","As you lower, push your knees out to the sides and keep your weight on your heels.","Lower until your thighs are parallel to the ground, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Side Split Squat V. 2","0097-HUEqZ1y","quads","glutes",["glutes","hamstrings","calves"],["Stand with your feet wider than shoulder-width apart, toes pointing slightly outwards.","Hold a barbell across your upper back, resting it on your shoulders.","Take a big step to the side with your right foot, keeping your left foot planted.","Bend your right knee and lower your body down into a squat position, keeping your chest up and your back straight.","Push through your right heel to return to the starting position.","Repeat on the other side, stepping out with your left foot.","Continue alternating sides for the desired number of repetitions."]],["Barbell Single Leg Deadlift","1756-gEyURal","glutes","hamstrings",["hamstrings","lower back"],["Stand with your feet hip-width apart, holding a barbell in front of your thighs with an overhand grip.","Shift your weight onto your left foot and lift your right foot slightly off the ground.","Hinge forward at the hips, keeping your back straight and your right leg extended behind you for balance.","Lower the barbell towards the ground, keeping it close to your body and your left leg slightly bent.","Pause for a moment at the bottom, then engage your glutes and hamstrings to lift your torso back up to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Barbell Single Leg Split Squat","0099-gGNQmVt","quads","glutes",["glutes","hamstrings","calves"],["Stand with your feet shoulder-width apart, holding a barbell across your upper back.","Take a large step forward with one leg, keeping your torso upright.","Lower your body by bending your front knee and hip, while keeping your back leg straight.","Continue lowering until your front thigh is parallel to the ground.","Pause for a moment, then push through your front heel to return to the starting position.","Repeat for the desired number of repetitions, then switch legs."]],["Barbell Sitted Alternate Leg Raise","2799-G7xoEzr","abs","hip flexors",["hip flexors"],["Sit on a bench with your back straight and hold a barbell across your thighs.","Keeping your legs straight, lift one leg up as high as possible while keeping the other leg on the ground.","Lower the raised leg back down and repeat with the other leg.","Continue alternating legs for the desired number of repetitions."]],["Barbell Sitted Alternate Leg Raise (Female)","2800-BCs0G2F","abs","hip flexors",["hip flexors","quadriceps"],["Sit on a bench with your back straight and hold a barbell across your thighs.","Place your hands on the sides of the bench for support.","Keeping your legs straight, lift one leg up as high as possible while keeping it parallel to the ground.","Lower the leg back down and repeat with the other leg.","Continue alternating legs for the desired number of repetitions."]],["Barbell Skier","0100-4Leypho","delts","triceps",["triceps","core"],["Stand with your feet shoulder-width apart and hold a barbell in front of your thighs with an overhand grip.","Bend your knees slightly and hinge forward at the hips, keeping your back straight and chest up.","Simultaneously lift the barbell up towards your shoulders while jumping slightly off the ground.","As you reach the top of the movement, quickly reverse the motion and lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Speed Squat","0101-euI1BwR","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart, toes slightly turned out.","Hold the barbell across your upper back, resting it on your traps or rear delts.","Engage your core and keep your chest up as you lower your hips back and down, as if sitting into a chair.","Lower until your thighs are parallel to the ground, or as low as you can comfortably go.","Drive through your heels to stand back up, squeezing your glutes at the top.","Repeat for the desired number of repetitions."]],["Barbell Split Squat V. 2","2810-HBYyX94","quads","glutes",["glutes","hamstrings","calves"],["Start by standing with your feet shoulder-width apart, holding a barbell across your upper back.","Take a large step forward with your right foot, keeping your torso upright.","Lower your body by bending your knees and hips until your right thigh is parallel to the ground.","Pause for a moment, then push through your right heel to return to the starting position.","Repeat with your left leg forward for the desired number of repetitions."]],["Barbell Squat (On Knees)","0102-oR7O9LW","quads","glutes",["glutes","hamstrings","calves"],["Start by kneeling on the ground with your knees hip-width apart and your toes pointing forward.","Place a barbell across your shoulders, gripping it with an overhand grip and your hands slightly wider than shoulder-width apart.","Engage your core and keep your chest lifted as you slowly lower your body down by bending your knees, keeping your back straight.","Continue lowering until your thighs are parallel to the ground, or as low as you can comfortably go.","Pause for a moment at the bottom, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Squat Jump Step Rear Lunge","2798-RYcV1kH","quads","glutes",["glutes","hamstrings","calves"],["Start by standing with your feet shoulder-width apart, holding a barbell across your upper back.","Lower your body into a squat position by bending your knees and pushing your hips back.","Explode upwards, jumping off the ground as high as you can.","Land softly on your feet and immediately step back with one leg into a reverse lunge.","Lower your body down until your front thigh is parallel to the ground, keeping your back straight.","Push through your front heel to return to the starting position.","Repeat the jump and lunge sequence on the other leg.","Continue alternating legs for the desired number of repetitions."]],["Barbell Standing Ab Rollerout","0103-xnInPfE","abs","shoulders",["shoulders","lower back"],["Stand upright with your feet shoulder-width apart and hold the barbell with both hands in front of your thighs.","Engage your core and slowly roll the barbell down towards the ground, keeping your back straight and your arms extended.","Continue rolling the barbell forward until your body is fully extended and your hands are directly above your head.","Pause for a moment, then slowly roll the barbell back towards your thighs, maintaining control and keeping your core engaged.","Repeat for the desired number of repetitions."]],["Barbell Standing Back Wrist Curl","0104-2qTvJAZ","forearms","biceps",["biceps","shoulders"],["Stand up straight with your feet shoulder-width apart and hold a barbell with an overhand grip.","Rest the barbell on the back of your hands with your palms facing down and your fingers pointing towards your body.","Keeping your upper arms stationary, exhale and curl your wrists upwards as far as possible.","Hold the contracted position for a brief pause, then inhale and slowly lower the barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Standing Bradford Press","0105-dCPESfR","delts","triceps",["triceps","upper back"],["Stand with your feet shoulder-width apart and hold the barbell in front of your shoulders with an overhand grip.","Press the barbell overhead, fully extending your arms.","Lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Standing Calf Raise","1372-8ozhUIZ","calves","hamstrings",["hamstrings","glutes"],["Stand with your feet shoulder-width apart and place a barbell across your upper back.","Raise your heels off the ground as high as possible, using only your toes.","Pause for a moment at the top, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Standing Close Grip Curl","0106-4dUn2iv","biceps","forearms",["forearms"],["Stand up straight with your feet shoulder-width apart and hold a barbell with an underhand grip, hands close together.","Keep your elbows close to your torso and your upper arms stationary throughout the movement.","Exhale as you curl the weights while contracting your biceps. Continue to raise the bar until your biceps are fully contracted and the bar is at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale as you slowly begin to bring the barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Standing Close Grip Military Press","1456-wdRZISl","delts","triceps",["triceps","upper back"],["Stand with your feet shoulder-width apart and hold the barbell with an overhand grip, hands slightly closer than shoulder-width apart.","Lift the barbell to shoulder height, keeping your elbows close to your body.","Press the barbell overhead, extending your arms fully.","Lower the barbell back to shoulder height.","Repeat for the desired number of repetitions."]],["Barbell Standing Concentration Curl","2414-vsMcDi9","biceps","forearms",["forearms"],["Stand with your feet shoulder-width apart and hold a barbell in one hand, palm facing up.","Rest your opposite hand on your thigh for support.","Keeping your upper arm stationary, exhale and curl the weight up towards your shoulder.","Pause for a moment at the top, squeezing your biceps.","Inhale and slowly lower the weight back down to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Barbell Standing Front Raise Over Head","0107-S8mo30S","delts","triceps",["triceps","upper back"],["Stand with your feet shoulder-width apart, holding a barbell in front of your thighs with an overhand grip.","Keep your back straight and engage your core.","Slowly raise the barbell in front of you, keeping your arms straight and your palms facing down.","Continue lifting until the barbell is slightly above shoulder level.","Pause for a moment at the top, then slowly lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Standing Leg Calf Raise","0108-rGwhJ5o","calves","hamstrings",["hamstrings","glutes"],["Stand with your feet shoulder-width apart and place a barbell across your upper back.","Raise your heels off the ground as high as possible, using your calves.","Pause for a moment at the top, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Standing Overhead Triceps Extension","0109-dZl9Q27","triceps","shoulders",["shoulders"],["Stand with your feet shoulder-width apart and hold a barbell with an overhand grip.","Raise the barbell overhead, fully extending your arms.","Keeping your upper arms close to your head, slowly lower the barbell behind your head by bending your elbows.","Pause for a moment, then raise the barbell back to the starting position by extending your arms.","Repeat for the desired number of repetitions."]],["Barbell Standing Reverse Grip Curl","0110-LWuA3aZ","biceps","forearms",["forearms"],["Stand up straight with your feet shoulder-width apart and hold a barbell with an underhand grip, palms facing up.","Keep your elbows close to your torso and your upper arms stationary.","Exhale and curl the weights while contracting your biceps, bringing the barbell as close to your shoulders as possible.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly lower the barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Standing Rocking Leg Calf Raise","0111-6HiHHe0","calves","hamstrings",["hamstrings","quadriceps"],["Stand with your feet shoulder-width apart and hold a barbell across your upper back.","Raise your heels off the ground as high as possible, balancing on the balls of your feet.","Slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Standing Twist","0112-yQe5HpE","abs","obliques",["obliques","lower back"],["Stand with your feet shoulder-width apart and hold a barbell in front of your chest with both hands, palms facing down.","Engage your core and keep your back straight throughout the exercise.","Slowly twist your torso to the right, pivoting on your feet and hips, while keeping your lower body stable.","Pause for a moment at the end of the twist, then slowly return to the starting position.","Repeat the twist to the left side.","Continue alternating twists for the desired number of repetitions."]],["Barbell Standing Wide Grip Biceps Curl","1629-faHKVkK","biceps","forearms",["forearms"],["Stand with your feet shoulder-width apart and hold a barbell with an underhand grip, hands wider than shoulder-width apart.","Keep your back straight and your elbows close to your torso.","Exhale and curl the barbell up towards your shoulders, keeping your upper arms stationary.","Pause for a moment at the top, squeezing your biceps.","Inhale and slowly lower the barbell back to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Barbell Standing Wide Military Press","1457-Kyd9Rz5","delts","triceps",["triceps","upper back"],["Stand with your feet shoulder-width apart and hold the barbell with an overhand grip, slightly wider than shoulder-width.","Lift the barbell to shoulder height, keeping your elbows slightly in front of the bar.","Press the barbell overhead, extending your arms fully.","Lower the barbell back to shoulder height and repeat for the desired number of repetitions."]],["Barbell Standing Wide-grip Curl","0113-NdIb5Z1","biceps","forearms",["forearms","shoulders"],["Stand up straight with your feet shoulder-width apart and hold a barbell with an overhand grip, hands wider than shoulder-width apart.","Let the barbell hang at arm's length in front of your thighs, with your palms facing away from your body.","Keeping your upper arms stationary, exhale and curl the barbell upward by contracting your biceps.","Continue to raise the barbell until your biceps are fully contracted and the barbell is at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Step-up","0114-Kxquu2E","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand in front of a bench or step with a barbell resting on your upper back.","Place one foot on the bench or step, ensuring your entire foot is in contact with the surface.","Push through your heel and step up onto the bench or step, fully extending your hip and knee.","Pause briefly at the top, then lower yourself back down to the starting position.","Repeat with the opposite leg.","Continue alternating legs for the desired number of repetitions."]],["Barbell Stiff Leg Good Morning","0115-JrOHAZc","glutes","hamstrings",["hamstrings","lower back"],["Stand with your feet shoulder-width apart and your knees slightly bent.","Hold the barbell across your upper back, resting it on your traps.","Keeping your back straight, hinge forward at the hips, pushing your glutes back.","Lower your torso until it is parallel to the ground, feeling a stretch in your hamstrings.","Engage your glutes and hamstrings to return to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Straight Leg Deadlift","0116-hrVQWvE","hamstrings","glutes",["glutes","lower back"],["Stand with your feet shoulder-width apart and your toes pointing forward.","Hold the barbell with an overhand grip, hands slightly wider than shoulder-width apart.","Bend at your hips and lower the barbell towards the ground, keeping your back straight and your knees slightly bent.","Lower the barbell until you feel a stretch in your hamstrings.","Engage your hamstrings and glutes to lift the barbell back up to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Sumo Deadlift","0117-KgI0tqW","glutes","hamstrings",["hamstrings","quadriceps","lower back"],["Stand with your feet wider than shoulder-width apart, toes pointing outwards.","Place a barbell on the ground in front of you, centered between your feet.","Bend your knees and lower your hips, keeping your back straight and chest up, to grip the barbell with an overhand grip.","Engage your core and drive through your heels to lift the barbell off the ground, extending your hips and knees simultaneously.","As you lift, keep your chest up and back straight, and push your hips forward to fully engage your glutes.","Pause for a moment at the top, then slowly lower the barbell back down to the starting position, maintaining control throughout the movement.","Repeat for the desired number of repetitions."]],["Barbell Thruster","3305-f7Y9eDZ","delts","quadriceps",["quadriceps","glutes","hamstrings","core"],["Start by standing with your feet shoulder-width apart, holding a barbell at shoulder height with an overhand grip.","Lower into a squat position by bending your knees and pushing your hips back.","As you reach the bottom of the squat, explosively drive through your heels to stand up, simultaneously pressing the barbell overhead.","Lower the barbell back to shoulder height as you lower back into the squat position.","Repeat for the desired number of repetitions."]],["Barbell Upright Row","0120-UDlhcO8","delts","traps",["traps","biceps"],["Stand with your feet shoulder-width apart and hold a barbell with an overhand grip, hands slightly wider than shoulder-width apart.","Let the barbell hang in front of your thighs, arms fully extended.","Keeping your back straight and core engaged, exhale and lift the barbell straight up towards your chin, leading with your elbows.","Pause for a moment at the top, then inhale and slowly lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Upright Row V. 2","0119-83HoW9X","delts","traps",["traps","biceps"],["Stand with your feet shoulder-width apart and hold a barbell with an overhand grip, hands slightly wider than shoulder-width apart.","Let the barbell hang in front of your thighs, arms fully extended.","Keeping your back straight, exhale and lift the barbell straight up towards your chin, leading with your elbows.","Pause for a moment at the top, then inhale and slowly lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Upright Row V. 3","0121-fI18Rbc","delts","traps",["traps","biceps"],["Stand with your feet shoulder-width apart and hold a barbell with an overhand grip, hands slightly wider than shoulder-width apart.","Let the barbell hang in front of your thighs, arms fully extended.","Keeping your core engaged and back straight, exhale as you lift the barbell straight up towards your chin, leading with your elbows.","Pause for a moment at the top, then inhale as you slowly lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Wide Bench Press","0122-JsKq9so","pectorals","shoulders",["shoulders","triceps"],["Lie flat on a bench with your feet flat on the ground and your back pressed against the bench.","Grasp the barbell with a wide grip, slightly wider than shoulder-width apart.","Lift the barbell off the rack and hold it directly above your chest with your arms fully extended.","Lower the barbell slowly towards your chest, keeping your elbows slightly flared out.","Pause for a moment when the barbell touches your chest, then push it back up to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Wide Reverse Grip Bench Press","1258-945zpRg","pectorals","triceps",["triceps","shoulders"],["Lie flat on a bench with your feet flat on the ground and your back pressed against the bench.","Grasp the barbell with a wide reverse grip, slightly wider than shoulder-width apart.","Lift the barbell off the rack and hold it directly above your chest with your arms fully extended.","Lower the barbell slowly towards your chest, keeping your elbows tucked in and your wrists straight.","Pause for a moment when the barbell touches your chest, then push it back up to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Wide Squat","0124-s7HX1BY","quads","glutes",["glutes","hamstrings","calves"],["Stand with your feet wider than shoulder-width apart, toes pointing slightly outward.","Hold the barbell across your upper back, resting it on your traps or rear delts.","Engage your core and keep your chest up as you lower your body down into a squat, pushing your hips back and bending your knees.","Lower until your thighs are parallel to the ground, or as low as you can comfortably go.","Pause for a moment at the bottom, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Wide-grip Upright Row","0123-RgJDRR1","delts","traps",["traps","biceps"],["Stand with your feet shoulder-width apart and hold a barbell with an overhand grip, hands wider than shoulder-width apart.","Let the barbell hang in front of your thighs, arms fully extended.","Keeping your back straight, exhale and lift the barbell straight up towards your chin, leading with your elbows.","Pause for a moment at the top, then inhale and slowly lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Wrist Curl","0126-82LxxkW","forearms","biceps",["biceps","brachialis"],["Sit on a bench with your feet flat on the ground and your forearms resting on your thighs, holding a barbell with an underhand grip.","Allow the barbell to roll down to your fingertips, keeping your wrists straight.","Slowly curl the barbell up towards your forearms by flexing your wrists.","Pause for a moment at the top, then slowly lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Wrist Curl V. 2","0125-6kSxYnw","forearms","biceps",["biceps","brachialis"],["Sit on a bench with your feet flat on the ground and your knees bent.","Hold a barbell with an underhand grip, palms facing up, and your hands shoulder-width apart.","Rest your forearms on your thighs, allowing your wrists to hang off the edge.","Slowly curl your wrists upward, bringing the barbell towards your forearms.","Pause for a moment at the top, then slowly lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Barbell Zercher Squat","0127-LSTChY9","glutes","quadricep
