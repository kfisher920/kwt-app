cting your biceps.","Pause for a moment at the top, then slowly lower the barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Farmers Walk","2133-qPEzJjA","quads","calves",["calves","forearms","core"],["Stand up straight with a dumbbell in each hand, palms facing your sides.","Keep your back straight and your shoulders back.","Take small, controlled steps forward, maintaining an upright posture.","Continue walking for the desired distance or time.","To finish, stop walking and carefully lower the dumbbells to your sides."]],["Finger Curls","0455-awG04cF","forearms","wrist flexors",["wrist flexors","grip muscles"],["Sit on a bench with your feet flat on the ground and hold a barbell with an underhand grip, palms facing up.","Rest your forearms on your thighs, allowing your wrists to hang off the edge.","Slowly curl your fingers towards your palms, squeezing the barbell tightly.","Hold the contraction for a moment, then slowly release your fingers back to the starting position.","Repeat for the desired number of repetitions."]],["Flag","3303-pQ0Mx1Z","abs","obliques",["obliques","shoulders"],["Start by gripping a vertical pole with both hands, palms facing each other, and arms fully extended.","Engage your core and lift your legs off the ground, keeping them straight.","Using your core and upper body strength, raise your legs until they are parallel to the ground.","Hold this position for as long as you can, maintaining a straight body line.","Slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Flexion Leg Sit Up (Bent Knee)","0456-AR0ig3o","abs","hip flexors",["hip flexors"],["Lie flat on your back with your knees bent and feet flat on the ground.","Place your hands behind your head with your elbows pointing outwards.","Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle.","At the same time, lift your legs off the ground, bending your knees and bringing them towards your chest.","Pause for a moment at the top, then slowly lower your upper body and legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Flexion Leg Sit Up (Straight Arm)","0457-KZn52RC","abs","hip flexors",["hip flexors","quadriceps"],["Lie flat on your back with your legs extended and arms straight above your head.","Engaging your abs, lift your upper body off the ground while simultaneously lifting your legs towards your chest.","Reach your hands towards your toes as you lift your upper body and legs.","Pause for a moment at the top, then slowly lower your upper body and legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Floor Fly (With Barbell)","0458-neonEDL","pectorals","deltoids",["deltoids","triceps"],["Lie flat on your back on the floor with your knees bent and feet flat on the ground.","Hold a barbell with an overhand grip, arms extended straight up over your chest.","Slowly lower the barbell out to the sides, keeping a slight bend in your elbows.","Lower the barbell until your arms are parallel to the floor, feeling a stretch in your chest.","Pause for a moment, then squeeze your chest muscles to bring the barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Flutter Kicks","0459-UVo2Qs2","glutes","hip flexors",["hip flexors","lower abs"],["Lie flat on your back with your legs extended and your hands by your sides.","Engage your core and lift your legs off the ground about 6 inches.","Keeping your legs straight, alternate lifting one leg slightly higher than the other.","Continue this fluttering motion for the desired number of repetitions."]],["Forward Jump","1472-uZKq7lo","quads","calves",["calves","hamstrings","glutes"],["Stand with your feet shoulder-width apart.","Bend your knees and lower your body into a squat position.","Swing your arms back for momentum.","Jump forward explosively, extending your hips, knees, and ankles.","Land softly on the balls of your feet and immediately go into the next jump.","Repeat for the desired number of repetitions."]],["Forward Lunge (Male)","3470-kMzUs9Y","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet hip-width apart and hands on your hips.","Take a big step forward with your right foot, lowering your body into a lunge position.","Bend your right knee to about 90 degrees, keeping your knee aligned with your ankle.","Push off with your right foot and return to the starting position.","Repeat with your left leg, alternating sides for the desired number of repetitions."]],["Frankenstein Squat","3194-bdWcbaU","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart and hold the barbell in front of your body with straight arms.","Keeping your back straight, lower your body by bending at the knees and hips, as if sitting back into a chair.","Continue lowering until your thighs are parallel to the ground, or as low as you can comfortably go.","Pause for a moment, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Frog Crunch","2429-FFRP97T","abs","hip flexors",["hip flexors"],["Lie flat on your back with your knees bent and feet flat on the ground.","Place your hands behind your head with your elbows pointing outwards.","Engaging your abs, lift your upper body off the ground, curling forward until your torso is at a 45-degree angle.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Frog Planche","3301-rQhGcin","abs","shoulders",["shoulders","chest","triceps"],["Start in a push-up position with your hands shoulder-width apart and your feet together.","Bend your elbows and lower your body towards the ground, keeping your back straight.","As you lower your body, lift your feet off the ground and bring your knees towards your chest.","Hold this position for a few seconds, then extend your legs back out and push yourself back up to the starting position.","Repeat for the desired number of repetitions."]],["Front Lever","3296-PkCN2lv","abs","lats",["lats","shoulders","forearms"],["Start by hanging from a pull-up bar with an overhand grip, hands shoulder-width apart.","Engage your core and pull your shoulder blades down and back.","Bend your knees and tuck them towards your chest.","Simultaneously, lift your legs up and extend them straight out in front of you, keeping your body parallel to the ground.","Hold this position for as long as you can, aiming for a full front lever position.","To release, slowly lower your legs back down and return to the starting position.","Repeat for the desired number of repetitions."]],["Front Lever Reps","3295-hbY9wqG","upper back","core",["core","shoulders"],["Hang from a pull-up bar with an overhand grip, palms facing away from you.","Engage your core and pull your shoulder blades down and back.","Keeping your body straight, lift your legs up until they are parallel to the ground.","Hold this position for as long as you can, aiming for 10-20 seconds.","Slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Front Plank With Twist","0464-CosupLu","abs","obliques",["obliques","shoulders"],["Start in a high plank position with your hands directly under your shoulders and your body in a straight line from head to toe.","Engage your core and glutes to maintain a stable position.","Rotate your torso to the right, lifting your right arm and extending it towards the ceiling.","Keep your hips and legs stable as you twist.","Hold for a moment, then return to the starting position.","Repeat the twist on the left side.","Continue alternating sides for the desired number of repetitions."]],["Full Maltese","3315-YRaCa5Y","abs","shoulders",["shoulders","chest"],["Start by standing with your feet shoulder-width apart and your arms extended straight out to the sides.","Slowly lean forward, keeping your arms straight, until your upper body is parallel to the ground.","Engage your core and hold this position for a few seconds.","Return to the starting position by pushing through your feet and standing back up.","Repeat for the desired number of repetitions."]],["Full Planche","3299-YZ4961r","abs","shoulders",["shoulders","chest","triceps"],["Start in a push-up position with your hands shoulder-width apart and your fingers pointing forward.","Engage your core and slowly shift your weight forward, lifting your feet off the ground.","Continue shifting your weight forward until your body is parallel to the ground, balancing on your hands.","Hold this position for as long as you can, maintaining a straight body line.","Slowly lower your feet back to the ground and return to the starting position.","Repeat for the desired number of repetitions."]],["Full Planche Push-up","3327-gw9PqGk","pectorals","shoulders",["shoulders","triceps","core"],["Start in a push-up position with your hands placed slightly wider than shoulder-width apart.","Engage your core and lower your body down towards the ground, keeping your elbows close to your sides.","As you lower yourself, lean your body forward and lift your feet off the ground, balancing on your hands.","Continue to lower your body until your chest is just above the ground.","Push through your hands and extend your arms to lift your body back up to the starting position.","Maintain a straight line from your head to your heels throughout the movement.","Repeat for the desired number of repetitions."]],["Gironda Sternum Chin","0466-IL0JUxR","lats","biceps",["biceps","rhomboids","rear deltoids"],["Stand facing a high bar with your feet shoulder-width apart.","Reach up and grab the bar with an overhand grip, slightly wider than shoulder-width apart.","Hang from the bar with your arms fully extended and your body straight.","Engage your lats and biceps to pull your chest up towards the bar, leading with your sternum.","Pause for a moment at the top, then slowly lower yourself back down to the starting position.","Repeat for the desired number of repetitions."]],["Glute Bridge March","3561-GibBPPg","glutes","hamstrings",["hamstrings","quadriceps"],["Lie flat on your back with your knees bent and feet flat on the ground.","Engage your glutes and lift your hips off the ground, forming a straight line from your knees to your shoulders.","While keeping your hips lifted, lift one foot off the ground and bring your knee towards your chest.","Lower your foot back to the ground and repeat the movement with the other leg.","Continue alternating legs in a marching motion while maintaining the bridge position.","Repeat for the desired number of repetitions."]],["Glute Bridge Two Legs On Bench (Male)","3523-aWedzZX","glutes","hamstrings",["hamstrings","core"],["Sit on the edge of a bench with your back against it and your feet flat on the ground.","Place your hands on the bench beside your hips for support.","Engage your glutes and hamstrings, then lift your hips off the bench until your body forms a straight line from your knees to your shoulders.","Pause for a moment at the top, then slowly lower your hips back down to the starting position.","Repeat for the desired number of repetitions."]],["Glute-ham Raise","3193-Vvwjz6N","hamstrings","glutes",["glutes","lower back"],["Adjust the glute-ham raise machine to fit your body.","Position yourself face down on the machine with your ankles secured.","Place your hands on your chest or cross them over your chest.","Engage your hamstrings and glutes to lift your upper body up towards the ceiling.","Continue lifting until your body is in a straight line from your head to your heels.","Pause for a moment at the top, then slowly lower your body back down to the starting position.","Repeat for the desired number of repetitions."]],["Gorilla Chin","0467-bmwlYvD","abs","forearms",["forearms","biceps"],["Stand with your feet shoulder-width apart and your knees slightly bent.","Grasp a pull-up bar with an overhand grip, slightly wider than shoulder-width apart.","Hang from the bar with your arms fully extended and your palms facing away from you.","Engage your core and pull your body up towards the bar, bringing your chin above the bar.","Pause for a moment at the top, then slowly lower your body back down to the starting position.","Repeat for the desired number of repetitions."]],["Groin Crunch","0469-mWppALS","abs","hip flexors",["hip flexors","inner thighs"],["Lie flat on your back with your knees bent and feet flat on the ground.","Place your hands behind your head with your elbows pointing outwards.","Engaging your abs, lift your legs off the ground, bringing your knees towards your chest.","Pause for a moment at the top, then slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Hack Calf Raise","1383-2ORFMoR","calves","hamstrings",["hamstrings","glutes"],["Adjust the sled machine to a comfortable weight.","Stand on the sled machine with your toes on the platform and your heels hanging off.","Hold onto the handles for stability.","Raise your heels as high as possible by pushing through the balls of your feet.","Pause for a moment at the top, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Hack One Leg Calf Raise","1384-AxFoqAD","calves","hamstrings",["hamstrings","glutes"],["Adjust the sled machine to an appropriate weight.","Stand on the sled machine with one foot, keeping the other foot off the ground.","Hold onto the handles for stability.","Raise your heel as high as possible, lifting your body up on the ball of your foot.","Pause for a moment at the top, then slowly lower your heel back down to the starting position.","Repeat for the desired number of repetitions.","Switch legs and repeat the exercise."]],["Half Knee Bends (Male)","3221-ia6kIIl","cardiovascular system","quadriceps",["quadriceps","hamstrings","glutes"],["Stand with your feet shoulder-width apart.","Bend your knees and lower your body down as if you were sitting back into a chair.","Keep your chest up and your weight in your heels.","Pause for a moment at the bottom, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Half Sit-up (Male)","3202-iQ241UP","abs","hip flexors",["hip flexors"],["Lie flat on your back with your knees bent and feet flat on the ground.","Place your hands behind your head with your elbows pointing outwards.","Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Hamstring Stretch","1511-99rWm7w","hamstrings","glutes",["glutes"],["Stand with your feet shoulder-width apart.","Step forward with your right foot and shift your weight onto your right leg.","Keeping your back straight, slowly bend forward at the hips, reaching towards your right foot with both hands.","Hold the stretch for 20-30 seconds, then return to the starting position.","Repeat on the other side."]],["Hands Bike","2139-pAIWRGu","pectorals","triceps",["triceps","shoulders"],["Adjust the seat height and handlebar position to a comfortable level.","Sit on the ergometer with your back straight and feet on the pedals.","Grasp the handles with your hands and position your arms at a 90-degree angle.","Start pedaling with your hands, pushing and pulling the handles in a controlled motion.","Continue pedaling for the desired duration or number of repetitions."]],["Hands Clasped Circular Toe Touch (Male)","3218-B5xca8s","glutes","hamstrings",["hamstrings","quadriceps","calves"],["Stand with your feet shoulder-width apart and your hands clasped together in front of your chest.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Lower your hands towards your toes in a circular motion, reaching as far as you can without straining.","Pause for a moment at the bottom, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Hands Reversed Clasped Circular Toe Touch (Male)","3215-yq3GAJX","glutes","hamstrings",["hamstrings","quadriceps","calves"],["Stand with your feet shoulder-width apart and your arms extended to the sides.","Bend forward at the waist, keeping your back straight and your knees slightly bent.","Reach down with your hands and clasp them together behind your legs.","Slowly raise your hands up and over your head in a circular motion, keeping your legs straight.","Continue the circular motion until your hands touch your toes.","Reverse the motion and bring your hands back down to the starting position.","Repeat for the desired number of repetitions."]],["Handstand","3302-XooAdhl","triceps","shoulders",["shoulders","core"],["Find an open space with enough room to perform a handstand.","Place your hands on the ground shoulder-width apart, fingers pointing forward.","Kick your legs up towards the wall, using your core and shoulders to maintain balance.","Once in a handstand position, engage your triceps to support your body weight.","Hold the handstand for as long as you can maintain balance.","To come down, slowly lower your legs back to the ground.","Repeat for the desired number of repetitions."]],["Handstand Push-up","0471-rQxwMxO","triceps","shoulders",["shoulders","chest","core"],["Find a wall and face away from it, standing a few feet away.","Place your hands on the ground shoulder-width apart and kick your feet up against the wall, coming into a handstand position.","Bend your elbows and lower your head towards the ground, keeping your body in a straight line.","Push through your hands and extend your arms to return to the starting position.","Repeat for the desired number of repetitions."]],["Hanging Leg Hip Raise","1764-VEcJRo2","abs","hip flexors",["hip flexors","lower back"],["Hang from a pull-up bar with your arms fully extended and your palms facing away from you.","Engage your core and lift your legs up by flexing your hips and knees until your thighs are parallel to the ground.","Pause for a moment at the top, then slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Hanging Leg Raise","0472-I3tsCnC","abs","hip flexors",["hip flexors"],["Hang from a pull-up bar with your arms fully extended and your palms facing away from you.","Engage your core and lift your legs up in front of you, keeping them straight.","Continue lifting until your legs are parallel to the ground or as high as you can comfortably go.","Pause for a moment at the top, then slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Hanging Oblique Knee Raise","1761-BaE7O6U","abs","obliques",["obliques"],["Hang from a pull-up bar with your arms fully extended and your palms facing away from you.","Engage your core and lift your knees towards your chest, twisting your torso to the side as you do so.","Pause for a moment at the top, then slowly lower your legs back down to the starting position.","Repeat on the other side, twisting your torso in the opposite direction.","Continue alternating sides for the desired number of repetitions."]],["Hanging Pike","0473-nuBF9MO","abs","hip flexors",["hip flexors","shoulders"],["Hang from a pull-up bar with your arms fully extended and your palms facing away from you.","Engage your core and lift your legs up towards the bar, keeping them straight.","Continue lifting until your body forms a 'V' shape, with your legs parallel to the ground.","Hold the position for a moment, then slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Hanging Straight Leg Hip Raise","0474-pj0X0tF","abs","hip flexors",["hip flexors"],["Hang from a pull-up bar with your arms fully extended and your palms facing away from you.","Engage your core and lift your legs up in front of you until they are parallel to the ground.","Pause for a moment at the top, then slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Hanging Straight Leg Raise","0475-4Ml7QFO","abs","hip flexors",["hip flexors"],["Hang from a pull-up bar with your arms fully extended and your palms facing away from you.","Engage your core and lift your legs up in front of you, keeping them straight.","Continue lifting until your legs are parallel to the ground or as high as you can comfortably go.","Pause for a moment at the top, then slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Hanging Straight Twisting Leg Hip Raise","0476-Q6bvyen","abs","obliques",["obliques","hip flexors"],["Hang from a pull-up bar with your arms fully extended and your legs straight.","Engage your core and lift your legs up towards your chest, keeping them straight.","Once your legs are parallel to the ground, twist your hips to one side, bringing your legs towards that side.","Pause for a moment, then return to the starting position.","Repeat the movement, but this time twist your hips to the opposite side.","Continue alternating sides for the desired number of repetitions."]],["High Knee Against Wall","3636-ealLwvX","cardiovascular system","quadriceps",["quadriceps","hamstrings","glutes","calves"],["Stand facing a wall with your feet hip-width apart.","Place your hands on the wall for support.","Engage your core and lift your right knee up towards your chest, while keeping your left foot on the ground.","Quickly switch legs, bringing your left knee up towards your chest and lowering your right foot back down.","Continue alternating legs in a running motion, bringing your knees up as high as possible.","Maintain a fast pace and keep your upper body stable throughout the exercise.","Repeat for the desired duration or number of repetitions."]],["Hip Raise (Bent Knee)","0484-196HJGw","abs","glutes",["glutes","hamstrings"],["Lie flat on your back with your knees bent and feet flat on the ground.","Place your hands by your sides, palms facing down.","Engage your core and glutes, then lift your hips off the ground until your body forms a straight line from your knees to your shoulders.","Pause for a moment at the top, then slowly lower your hips back down to the starting position.","Repeat for the desired number of repetitions."]],["Hug Keens To Chest","1418-znP9SIh","glutes","hamstrings",["hamstrings","quadriceps"],["Start by standing with your feet shoulder-width apart.","Bend your knees and lower your body down into a squat position.","As you squat down, bring your knees up towards your chest and hug them with your arms.","Hold this position for a moment, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Hyght Dumbbell Fly","3234-P9ZRyLT","pectorals","shoulders",["shoulders"],["Lie flat on a bench with a dumbbell in each hand, palms facing each other.","Extend your arms straight up over your chest, with a slight bend in your elbows.","Keeping a slight bend in your elbows, lower the dumbbells out to the sides in a wide arc until you feel a stretch in your chest.","Pause for a moment, then reverse the movement and bring the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Hyperextension","0489-zhMwOwE","spine","glutes",["glutes","hamstrings"],["Adjust the hyperextension bench so that your upper thighs are resting on the pad and your feet are secured.","Cross your arms over your chest or place your hands behind your head.","Lower your upper body towards the ground while keeping your back straight.","Pause for a moment at the bottom, then raise your upper body back up until it is in line with your legs.","Repeat for the desired number of repetitions."]],["Hyperextension (On Bench)","0488-zkgRrbK","spine","glutes",["glutes","hamstrings"],["Adjust the hyperextension bench so that your hips are resting comfortably on the pad and your feet are secured.","Cross your arms over your chest or place your hands behind your head.","Slowly lower your upper body towards the ground while keeping your back straight.","Pause for a moment at the bottom, then raise your upper body back up until it is in line with your legs.","Repeat for the desired number of repetitions."]],["Impossible Dips","3289-05Cf2v8","triceps","chest",["chest","shoulders"],["Position yourself between two parallel bars with your arms fully extended and your body suspended in the air.","Bend your knees and cross your ankles.","Lower your body by bending your elbows until your upper arms are parallel to the ground.","Pause for a moment, then push yourself back up to the starting position by straightening your arms.","Repeat for the desired number of repetitions."]],["Inchworm","1471-ZgsNQ6d","abs","shoulders",["shoulders","hamstrings"],["Start in a standing position with your feet hip-width apart.","Bend forward at the waist and place your hands on the ground in front of you.","Walk your hands forward until you are in a high plank position, with your body in a straight line from head to toe.","Pause for a moment, then walk your hands back towards your feet, keeping your legs as straight as possible.","Once your hands reach your feet, stand back up to the starting position.","Repeat for the desired number of repetitions."]],["Inchworm V. 2","3698-TV87DNB","abs","shoulders",["shoulders","hamstrings"],["Start in a standing position with your feet hip-width apart.","Bend forward at the waist and place your hands on the ground in front of you.","Walk your hands forward until you are in a high plank position, with your body in a straight line from head to toe.","Keeping your legs straight, walk your feet towards your hands, bringing your hips up towards the ceiling.","Continue walking your hands forward, repeating the movement for the desired number of repetitions."]],["Incline Close-grip Push-up","0490-1YB40kg","triceps","chest",["chest","shoulders"],["Place your hands on an elevated surface, such as a bench or step, slightly wider than shoulder-width apart.","Extend your legs behind you, resting on the balls of your feet, with your body forming a straight line from head to heels.","Lower your chest towards the elevated surface by bending your elbows, keeping them close to your sides.","Pause for a moment at the bottom, then push yourself back up to the starting position by straightening your arms.","Repeat for the desired number of repetitions."]],["Incline Leg Hip Raise (Leg Straight)","0491-eVxAzgz","abs","hip flexors",["hip flexors"],["Lie on an incline bench with your back flat against the bench and your legs extended straight out in front of you.","Place your hands on the sides of the bench for support.","Engaging your abs, lift your legs off the bench, raising them as high as you can while keeping them straight.","Pause for a moment at the top, then slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Incline Push Up Depth Jump","0492-CB8WET1","pectorals","triceps",["triceps","shoulders","core"],["Find an elevated surface, such as a bench or step, and place your hands shoulder-width apart on the edge.","Step your feet back, keeping your body in a straight line from head to heels.","Lower your chest towards the edge of the surface, bending your elbows and keeping your body aligned.","Push through your palms to extend your arms and return to the starting position.","Jump off the edge of the surface, landing softly with your knees slightly bent.","Repeat the push-up and depth jump for the desired number of repetitions."]],["Incline Push-up","0493-B1EVP9F","pectorals","triceps",["triceps","shoulders"],["Place your hands on an elevated surface, such as a bench or step, slightly wider than shoulder-width apart.","Extend your legs behind you, resting on the balls of your feet, creating a straight line from your head to your heels.","Lower your chest towards the elevated surface by bending your elbows, keeping your body in a straight line.","Pause for a moment at the bottom, then push yourself back up to the starting position by straightening your arms.","Repeat for the desired number of repetitions."]],["Incline Push-up (On Box)","3785-F7vjXqT","pectorals","triceps",["triceps","shoulders"],["Place your hands on the edge of a box or elevated surface, slightly wider than shoulder-width apart.","Extend your legs behind you, resting on the balls of your feet, creating a straight line from your head to your heels.","Lower your chest towards the box by bending your elbows, keeping your body in a straight line.","Pause for a moment at the bottom, then push yourself back up to the starting position by straightening your arms.","Repeat for the desired number of repetitions."]],["Incline Reverse Grip Push-up","0494-XaaRnRn","pectorals","triceps",["triceps","shoulders"],["Place your hands on the edge of a bench or elevated surface, slightly wider than shoulder-width apart.","Extend your legs behind you, resting on the balls of your feet, creating a straight line from your head to your heels.","Lower your chest towards the bench by bending your elbows, keeping them close to your sides.","Pause for a moment at the bottom, then push yourself back up to the starting position by extending your arms.","Repeat for the desired number of repetitions."]],["Incline Scapula Push Up","3011-GdMa1ET","serratus anterior","triceps",["triceps","shoulders"],["Set up an incline bench at a 45-degree angle.","Place your hands on the bench slightly wider than shoulder-width apart.","Position your feet on the ground, hip-width apart.","Lower your chest towards the bench, keeping your elbows tucked in.","As you lower, retract your shoulder blades, squeezing your scapulae together.","Push through your palms to extend your arms and return to the starting position.","Repeat for the desired number of repetitions."]],["Incline Twisting Sit-up","0495-9ZGZuOD","abs","obliques",["obliques"],["Set up an incline bench at a 45-degree angle.","Lie down on the bench with your feet secured under the foot pads.","Place your hands behind your head or across your chest.","Engage your abs and lift your upper body off the bench, curling forward.","As you curl up, twist your torso to one side, bringing your elbow towards the opposite knee.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat the movement, this time twisting your torso to the other side.","Continue alternating sides for the desired number of repetitions."]],["Intermediate Hip Flexor And Quad Stretch","1564-tFGKm99","quads","hamstrings",["hamstrings","glutes"],["Stand upright with your feet shoulder-width apart.","Hold onto a stable object for support.","Bend your right knee and bring your right foot towards your glutes, grabbing the rope with your right hand.","Slowly pull your right foot towards your glutes, feeling a stretch in your right quad.","Hold the stretch for 20-30 seconds.","Release the stretch and repeat on the left side."]],["Inverse Leg Curl (Bench Support)","0496-ms7tjSG","hamstrings","glutes",["glutes","calves"],["Lie face down on a bench with your hips at the edge and your legs extended straight behind you.","Hold onto the bench for support.","Keeping your upper body still, bend your knees and curl your legs towards your glutes.","Pause for a moment at the top, then slowly extend your legs back to the starting position.","Repeat for the desired number of repetitions."]],["Inverse Leg Curl (On Pull-up Cable Machine)","2400-0rHfvy9","hamstrings","glutes",["glutes","calves"],["Adjust the cable machine so that the ankle straps are at the lowest setting.","Lie face down on the bench with your legs extended and the ankle straps attached to your feet.","Hold onto the handles of the bench for stability.","Bend your knees and curl your legs towards your glutes, squeezing your hamstrings.","Pause for a moment at the top of the movement, then slowly lower your legs back to the starting position.","Repeat for the desired number of repetitions."]],["Inverted Row","0499-bZGHsAZ","upper back","biceps",["biceps","forearms"],["Set up a bar at waist height or use a suspension trainer.","Stand facing the bar or suspension trainer, with your feet shoulder-width apart.","Grab the bar or handles with an overhand grip, slightly wider than shoulder-width apart.","Lean back, keeping your body straight and your heels on the ground.","Pull your chest towards the bar or handles, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower yourself back to the starting position.","Repeat for the desired number of repetitions."]],["Inverted Row Bent Knees","2300-VPPtusI","upper back","biceps",["biceps","forearms"],["Set up a bar at waist height and lie underneath it.","Grab the bar with an overhand grip, slightly wider than shoulder-width apart.","Position your body so that your heels are on the ground and your body is straight.","Pull your chest up towards the bar by squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower your body back down to the starting position.","Repeat for the desired number of repetitions."]],["Inverted Row On Bench","2298-Mxa7Cr8","upper back","biceps",["biceps","forearms"],["Set up a bench at a height that allows your body to hang freely underneath it.","Lie face up on the ground with your head towards the bench.","Reach up and grab the bench with an overhand grip, slightly wider than shoulder-width apart.","Position your body so that your heels are on the ground and your arms are fully extended.","Engage your core and squeeze your shoulder blades together as you pull your chest up towards the bench.","Pause for a moment at the top of the movement, then slowly lower your body back down to the starting position.","Repeat for the desired number of repetitions."]],["Inverted Row V. 2","0497-uX3sUBz","upper back","biceps",["biceps","forearms"],["Set up a bar at waist height on a Smith machine or use a suspension trainer.","Stand facing the bar or suspension trainer and grab it with an overhand grip, hands shoulder-width apart.","Walk your feet forward, leaning back until your body is at a slight angle.","Keep your body straight and pull your chest up towards the bar or handles, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower yourself back down to the starting position.","Repeat for the desired number of repetitions."]],["Inverted Row With Straps","0498-jdiExfW","upper back","biceps",["biceps","forearms"],["Set up a suspension trainer or straps at chest height.","Stand facing the anchor point and grab the handles with an overhand grip.","Walk your feet forward, leaning back until your body is at an angle.","Keep your body straight and engage your core.","Pull your chest towards the handles, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower yourself back to the starting position.","Repeat for the desired number of repetitions."]],["Iron Cross Stretch","1419-pZwUsKB","glutes","hamstrings",["hamstrings","quadriceps"],["Lie flat on your back with your arms extended out to the sides.","Raise your legs up towards the ceiling, keeping them straight.","Slowly lower your legs to one side, aiming to touch the floor with your feet.","Hold the stretch for a few seconds, then return your legs to the starting position.","Repeat the stretch on the other side.","Continue alternating sides for the desired number of repetitions."]],["Isometric Chest Squeeze","1297-HbSG1Pw","pectorals","triceps",["triceps","shoulders"],["Stand with your feet shoulder-width apart and your knees slightly bent.","Extend your arms straight out in front of you, parallel to the ground, with your palms facing each other.","Squeeze your chest muscles together as hard as you can, while keeping your arms straight.","Hold this position for a few seconds, focusing on contracting your chest muscles.","Release the squeeze and relax your chest muscles.","Repeat for the desired number of repetitions."]],["Isometric Wipers","0500-11wrviz","pectorals","shoulders",["shoulders","triceps","core"],["Start by lying flat on your back on a mat or bench.","Extend your arms straight out to the sides, perpendicular to your body.","Engage your core and lift both legs off the ground, keeping them together and straight.","Slowly lower your legs to one side, aiming to touch the ground with your feet while maintaining control.","Pause for a moment, then use your core to lift your legs back to the starting position.","Repeat the movement, this time lowering your legs to the opposite side.","Continue alternating sides for the desired number of repetitions."]],["Jack Burpee","0501-mr7pkqP","cardiovascular system","quadriceps",["quadriceps","hamstrings","calves","shoulders","triceps","core"],["Start in a standing position with your feet shoulder-width apart.","Lower your body into a squat position, placing your hands on the ground in front of you.","Kick your feet back, landing in a push-up position.","Perform a push-up, lowering your chest to the ground and then pushing back up.","Jump your feet forward, landing in a squat position.","Jump up explosively, reaching your arms overhead.","Land softly and immediately lower back into the squat position to begin the next repetition."]],["Jack Jump (Male)","3224-1g5bPpA","cardiovascular system","quadriceps",["quadriceps","calves"],["Stand with your feet together and your arms by your sides.","Jump up, spreading your feet apart and raising your arms above your head.","As you land, quickly jump back to the starting position.","Repeat for the desired number of repetitions."]],["Jackknife Sit-up","0507-mbkgB44","abs","hip flexors",["hip flexors"],["Lie flat on your back with your legs extended and your arms overhead.","Engage your core and lift your legs and upper body simultaneously, reaching your hands towards your toes.","Pause for a moment at the top, then slowly lower your legs and upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Janda Sit-up","0508-1GPHRyK","abs","hip flexors",["hip flexors","lower back"],["Lie flat on your back with your knees bent and feet flat on the ground.","Place your hands behind your head with your elbows pointing outwards.","Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Jump Rope","2612-e1e76I2","cardiovascular system","calves",["calves","quadriceps","hamstrings","glutes"],["Hold the handles of the jump rope with your hands, palms facing inward.","Stand with your feet shoulder-width apart and knees slightly bent.","Swing the rope over your head and jump over it as it comes towards your feet.","Land softly on the balls of your feet and repeat the jump as the rope comes around again.","Continue jumping for the desired duration or number of repetitions."]],["Jump Squat","0514-LIlE5Tn","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart.","Lower your body into a squat position by bending your knees and pushing your hips back.","Jump explosively off the ground, extending your hips, knees, and ankles.","While in mid-air, quickly bring your arms forward for balance.","Land softly on the balls of your feet and immediately go into the next repetition.","Repeat for the desired number of repetitions."]],["Jump Squat V. 2","0513-TDYiji6","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart.","Lower your body into a squat position by bending your knees and pushing your hips back.","Jump explosively, extending your hips and knees fully.","Land softly on the balls of your feet and immediately lower your body back into a squat position.","Repeat for the desired number of repetitions."]],["Kettlebell Advanced Windmill","0517-Kal9cQQ","abs","obliques",["obliques","shoulders"],["Stand with your feet wider than shoulder-width apart, toes pointing slightly outward.","Hold a kettlebell in your right hand, with your arm extended overhead and your palm facing forward.","Rotate your left foot slightly to the right, and shift your weight onto your left leg.","Bend your left knee and hinge at the hip, lowering your torso towards the left side.","Keep your right arm extended overhead and your eyes on the kettlebell.","As you lower your torso, allow your right leg to straighten and your right foot to pivot slightly.","Lower your torso until you feel a stretch in your left hamstring and your right arm is pointing towards the ground.","Pause for a moment, then engage your core and push through your left heel to return to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Kettlebell Alternating Hang Clean","0518-I4tibZG","forearms","shoulders",["shoulders","traps","core"],["Stand with your feet shoulder-width apart, holding a kettlebell in each hand with an overhand grip.","Bend your knees slightly and hinge forward at the hips, keeping your back straight and chest up.","Allow the kettlebells to hang in front of your body with your arms fully extended.","In one fluid motion, explosively extend your hips, shrug your shoulders, and pull the kettlebells up towards your shoulders.","As the kettlebells reach shoulder height, rotate your wrists and catch the kettlebells in the rack position, with your palms facing inward and the kettlebells resting on the outside of your forearms.","Lower the kettlebells back down to the starting position and repeat the movement with the opposite arm.","Continue alternating arms for the desired number of repetitions."]],["Kettlebell Alternating Press","0520-5KLbZWx","delts","triceps",["triceps","core"],["Stand with your feet shoulder-width apart, holding a kettlebell in each hand at shoulder height.","Press one kettlebell overhead, fully extending your arm.","Lower the kettlebell back to shoulder height.","Repeat with the other arm.","Continue alternating arms for the desired number of repetitions."]],["Kettlebell Alternating Press On Floor","0519-7w6i0vE","pectorals","shoulders",["shoulders","triceps"],["Start by lying on your back on the floor with your knees bent and feet flat on the ground.","Hold a kettlebell in each hand, with your palms facing towards your feet and your arms extended straight up towards the ceiling.","Lower one kettlebell down towards your shoulder while keeping the other kettlebell extended straight up.","Press the lowered kettlebell back up to the starting position while simultaneously lowering the other kettlebell down towards your shoulder.","Continue alternating the press motion with each kettlebell for the desired number of repetitions."]],["Kettlebell Alternating Renegade Row","0521-b9kqlBy","upper back","core",["core","shoulders"],["Start in a high plank position with your hands gripping the kettlebells and your feet hip-width apart.","Engage your core and keep your body in a straight line from head to heels.","Pull one kettlebell up towards your chest, keeping your elbow close to your body.","Lower the kettlebell back down to the starting position and repeat with the other arm.","Continue alternating arms for the desired number of repetitions."]],["Kettlebell Alternating Row","0522-Ca76jUE","upper back","biceps",["biceps","forearms"],["Stand with your feet shoulder-width apart, knees slightly bent, and hold a kettlebell in each hand with your palms facing your body.","Bend forward at the hips, keeping your back straight and your core engaged.","Pull one kettlebell up towards your chest, keeping your elbow close to your body and squeezing your shoulder blades together.","Lower the kettlebell back down to the starting position and repeat with the other arm.","Continue alternating arms for the desired number of repetitions."]],["Kettlebell Arnold Press","0523-UM8mgyG","delts","triceps",["triceps","upper back"],["Stand with your feet shoulder-width apart, holding a kettlebell in each hand at shoulder height with your palms facing towards you.","Engage your core and press the kettlebells overhead, rotating your palms to face forward as you extend your arms.","Pause at the top of the movement, then slowly lower the kettlebells back to the starting position.","Repeat for the desired number of repetitions."]],["Kettlebell Bent Press","0524-kjE55n5","abs","shoulders",["shoulders","triceps","obliques"],["Stand with your feet shoulder-width apart, holding a kettlebell in your right hand.","Bend your knees slightly and press the kettlebell overhead with your right arm, keeping your elbow locked.","Rotate your torso to the left, shifting your weight onto your left foot.","Bend your left knee and lower your torso towards the ground, keeping your right arm extended overhead.","As you lower, keep your eyes on the kettlebell and your chest lifted.","Once your left hand touches the ground, push through your left foot and straighten your left leg, driving your hips forward.","As you drive your hips forward, use your core and right arm to press the kettlebell back up to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Kettlebell Bottoms Up Clean From The Hang Position","0525-4KJEpzb","biceps","forearms",["forearms","shoulders"],["Stand with your feet shoulder-width apart, holding a kettlebell in one hand with an overhand grip.","Bend your knees slightly and hinge forward at the hips, keeping your back straight and chest up.","Allow the kettlebell to hang down between your legs, with your arm fully extended.","In one fluid motion, explosively extend your hips and knees while pulling the kettlebell up towards your shoulder.","As the kettlebell reaches shoulder height, rotate your wrist so that the bottom of the kettlebell is facing up.","Catch the kettlebell at shoulder height with your elbow bent and your palm facing up.","Lower the kettlebell back down to the starting position by reversing the movement.","Repeat for the desired number of repetitions, then switch sides."]],["Kettlebell Double Alternating Hang Clean","0526-a4F9Oyc","biceps","forearms",["forearms","shoulders"],["Stand with your feet shoulder-width apart, holding a kettlebell in each hand with an overhand grip.","Bend your knees slightly and hinge forward at the hips, keeping your back straight and chest up.","Allow the kettlebells to hang straight down in front of your body.","In one fluid motion, explosively extend your hips and knees while shrugging your shoulders.","As the kettlebells rise, pull them up towards your shoulders, keeping your elbows high and out to the sides.","Catch the kettlebells at shoulder height, with your palms facing inward and your elbows pointing forward.","Lower the kettlebells back down to the starting position and repeat for the desired number of repetitions."]],["Kettlebell Double Jerk","0527-tznL2Ad","delts","triceps",["triceps","core"],["Stand with your feet shoulder-width apart, holding a kettlebell in each hand at shoulder height.","Bend your knees slightly and engage your core.","Press the kettlebells overhead, fully extending your arms.","Bend your knees and quickly drop into a partial squat.","Explosively extend your hips and knees, driving the kettlebells overhead.","Lock out your arms and catch the kettlebells overhead with your knees slightly bent.","Stand up straight and return to the starting position.","Repeat for the desired number of repetitions."]],["Kettlebell Double Push Press","0528-I4KkPdl","delts","triceps",["triceps","core"],["Start by standing with your feet shoulder-width apart, holding a kettlebell in each hand at shoulder height.","Bend your knees slightly and engage your core.","Initiate the movement by explosively extending your hips, knees, and ankles, driving the kettlebells overhead.","As the kettlebells reach the top, press them fully overhead, locking out your arms.","Lower the kettlebells back to the starting position by bending your elbows and bringing them back down to shoulder height.","Repeat for the desired number of repetitions."]],["Kettlebell Double Snatch","0529-M74kdvm","delts","trapezius",["trapezius","forearms","core"],["Stand with your feet shoulder-width apart, holding a kettlebell in each hand at arm's length in front of your thighs.","Bend your knees slightly and hinge forward at the hips, keeping your back flat and chest up.","In one explosive motion, extend your hips, knees, and ankles, and simultaneously pull the kettlebells up towards your shoulders.","As the kettlebells reach shoulder level, rotate your wrists and punch the kettlebells overhead, fully extending your arms.","Lower the kettlebells back down to the starting position and repeat for the desired number of repetitions."]],["Kettlebell Double Windmill","0530-OaE7CpD","abs","shoulders",["shoulders","hamstrings"],["Stand with your feet shoulder-width apart, holding a kettlebell in your right hand.","Extend your right arm overhead, keeping your eyes on the kettlebell.","Rotate your left foot 45 degrees to the left and your right foot 90 degrees to the right.","Bend at the waist to the left, keeping your right arm extended overhead.","Lower the kettlebell towards the ground, reaching towards your left foot.","Pause for a moment, then engage your core and push through your right foot to return to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Kettlebell Extended Range One Arm Press On Floor","0531-rseLfH3","pectorals","triceps",["triceps","shoulders"],["Start by lying on your back on the floor with your knees bent and feet flat on the ground.","Hold a kettlebell in one hand, with your palm facing towards your feet.","Extend your arm straight up towards the ceiling, keeping your elbow locked and your wrist straight.","Slowly lower the kettlebell back down to the starting position, maintaining control throughout the movement.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Kettlebell Figure 8","0532-L4ay0PW","abs","shoulders",["shoulders","forearms"],["Stand with your feet shoulder-width apart, holding a kettlebell in one hand.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Pass the kettlebell between your legs, switching hands as it reaches the back of your legs.","As the kettlebell comes forward, pass it to the other hand between your legs.","Continue passing the kettlebell between your legs in a figure 8 motion.","Maintain a steady pace and engage your core throughout the exercise.","Repeat for the desired number of repetitions."]],["Kettlebell Front Squat","0533-DB0n8AG","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart, toes slightly turned out.","Hold the kettlebell with both hands in front of your chest, close to your body.","Engage your core and keep your chest up as you lower your hips down and back, as if sitting into a chair.","Lower until your thighs are parallel to the ground, or as low as you can comfortably go.","Drive through your heels to stand back up, squeezing your glutes at the top.","Repeat for the desired number of repetitions."]],["Kettlebell Goblet Squat","0534-ZA8b5hc","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart, holding a kettlebell close to your chest with both hands.","Keeping your chest up and core engaged, lower your body down into a squat position by bending at the knees and hips.","Continue lowering until your thighs are parallel to the ground, or as low as you can comfortably go.","Pause for a moment at the bottom, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Kettlebell Hang Clean","0535-LHWF7us","hamstrings","glutes",["glutes","quadriceps","calves"],["Stand with your feet shoulder-width apart, holding a kettlebell in front of your thighs.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Lower the kettlebell towards the ground, allowing it to swing between your legs.","Quickly extend your hips and knees, using the momentum to swing the kettlebell up to shoulder height.","As the kettlebell reaches shoulder height, rotate your wrists and catch the kettlebell in the rack position, with your elbow tucked in and the kettlebell resting on your forearm.","Lower the kettlebell back down to the starting position between your legs, and repeat for the desired number of repetitions."]],["Kettlebell Lunge Pass Through","0536-WKMQzCD","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart, holding a kettlebell in front of your chest with both hands.","Take a step forward with your right foot, lowering your body into a lunge position.","As you lunge forward, pass the kettlebell under your right thigh and transfer it to your left hand.","Push off with your right foot to return to the starting position, while simultaneously passing the kettlebell back to your right hand.","Repeat the lunge on the opposite side, passing the kettlebell under your left thigh.","Continue alternating lunges and passing the kettlebell between hands for the desired number of repetitions."]],["Kettlebell One Arm Clean And Jerk","0537-vzAxBtt","delts","triceps",["triceps","core"],["Stand with your feet shoulder-width apart, holding a kettlebell in one hand with an overhand grip.","Bend your knees slightly and hinge at the hips, lowering the kettlebell between your legs.","Explosively extend your hips, knees, and ankles, using the momentum to swing the kettlebell up to shoulder height.","As the kettlebell reaches shoulder height, rotate your wrist and punch your hand straight up, locking out your arm overhead.","Lower the kettlebell back down to the starting position and repeat for the desired number of repetitions."]],["Kettlebell One Arm Floor Press","1298-rg59QCH","pectorals","triceps",["triceps","shoulders"],["Lie flat on your back on the floor with your knees bent and feet flat on the ground.","Hold the kettlebell in one hand with your palm facing towards your feet and your arm extended straight up towards the ceiling.","Slowly lower the kettlebell towards your chest by bending your elbow, keeping your upper arm close to your body.","Pause for a moment when the kettlebell is just above your chest, then push it back up to the starting position by extending your elbow.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Kettlebell One Arm Jerk","0538-S37C94C","delts","triceps",["triceps","core"],["Stand with your feet shoulder-width apart, holding a kettlebell in one hand at shoulder height.","Bend your knees slightly and engage your core.","Press the kettlebell overhead in a straight line, fully extending your arm.","As you press the kettlebell overhead, simultaneously dip your knees and quickly straighten them to generate momentum.","As the kettlebell reaches its highest point, quickly drop underneath it by bending your knees and hips.","Catch the kettlebell with a slight bend in your knees and hips, and your arm fully extended overhead.","Stand up straight, fully extending your knees and hips, and stabilize the kettlebell overhead.","Lower the kettlebell back to the starting position by bending your knees and hips, and repeat for the desired number of repetitions."]],["Kettlebell One Arm Military Press To The Side","0539-yCvYdi7","delts","triceps",["triceps","core"],["Stand with your feet shoulder-width apart, holding a kettlebell in one hand at shoulder height.","Engage your core and keep your back straight.","Press the kettlebell overhead, extending your arm fully.","Pause for a moment at the top, then slowly lower the kettlebell back to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Kettlebell One Arm Push Press","0540-osdXT3K","delts","triceps",["triceps","core"],["Stand with your feet shoulder-width apart, holding a kettlebell in one hand at shoulder level.","Bend your knees slightly and engage your core.","Press the kettlebell overhead by extending your arm and fully extending your legs.","Lower the kettlebell back to the starting position by bending your knees and bringing the kettlebell back to your shoulder.","Repeat for the desired number of repetitions, then switch sides."]],["Kettlebell One Arm Row","0541-g9AsZ8P","upper back","biceps",["biceps","forearms"],["Stand with your feet shoulder-width apart, holding a kettlebell in one hand with an overhand grip.","Bend your knees slightly and hinge forward at the hips, keeping your back straight and your core engaged.","Pull the kettlebell up towards your chest, keeping your elbow close to your body and squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower the kettlebell back down to the starting position.","Repeat for the desired number of repetitions, then switch sides and repeat with the other arm."]],["Kettlebell One Arm Snatch","0542-aXcUyKb","delts","trapezius",["trapezius","forearms","core"],["Stand with your feet shoulder-width apart, holding a kettlebell in one hand between your legs.","Bend your knees slightly and hinge at the hips, lowering the kettlebell towards the ground.","Explosively extend your hips and knees, using the momentum to swing the kettlebell up towards your shoulder.","As the kettlebell reaches shoulder height, rotate your hand and punch it straight up overhead, fully extending your arm.","Lower the kettlebell back down between your legs and repeat for the desired number of repetitions."]],["Kettlebell Pirate Supper Legs","0543-kuXhl0o","delts","triceps",["triceps","forearms"],["Stand with your feet shoulder-width apart, holding a kettlebell in one hand.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Raise the kettlebell up to shoulder height, keeping your elbow close to your body.","Extend your arm fully overhead, straightening your elbow.","Lower the kettlebell back down to shoulder height, then return to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Kettlebell Pistol Squat","0544-5bpPTHv","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart, holding a kettlebell in front of your chest with both hands.","Lift your left foot off the ground and extend it forward, keeping it parallel to the ground.","Slowly lower your body down into a squat position, keeping your right foot flat on the ground and your left leg extended.","Pause for a moment at the bottom of the squat, then push through your right heel to return to the starting position.","Repeat for the desired number of repetitions, then switch legs."]],["Kettlebell Plyo Push-up","0545-ktf3nvW","pectorals","triceps",["triceps","shoulders","core"],["Start in a high plank position with your hands on the kettlebells, shoulder-width apart.","Lower your chest towards the ground, keeping your elbows close to your body.","Push through your hands explosively, lifting your hands off the kettlebells and extending your arms fully.","Land softly back on the kettlebells and immediately lower your chest back down for the next repetition.","Repeat for the desired number of repetitions."]],["Kettlebell Seated Press","0546-BkxB8LW","delts","triceps",["triceps","core"],["Sit on a bench with your back straight and feet flat on the ground.","Hold a kettlebell in each hand at shoulder height, palms facing forward.","Press the kettlebells overhead, fully extending your arms.","Lower the kettlebells back to shoulder height.","Repeat for the desired number of repetitions."]],["Kettlebell Seated Two Arm Military Press","1438-ZEkjZDi","delts","triceps",["triceps","upper back"],["Sit on a bench with your back straight and feet flat on the ground.","Hold a kettlebell in each hand at shoulder level with your palms facing forward.","Press the kettlebells overhead by extending your arms fully.","Pause for a moment at the top, then slowly lower the kettlebells back to shoulder level.","Repeat for the desired number of repetitions."]],["Kettlebell Seesaw Press","0547-UDm6cGl","delts","triceps",["triceps","core"],["Stand with your feet shoulder-width apart, holding a kettlebell in each hand at shoulder height.","Press one kettlebell overhead while keeping the other kettlebell at shoulder height.","Lower the pressed kettlebell back to shoulder height while simultaneously pressing the other kettlebell overhead.","Continue alternating the pressing motion, creating a seesaw-like movement.","Repeat for the desired number of repetitions."]],["Kettlebell Sumo High Pull","0548-8ARQ9Hw","traps","shoulders",["shoulders","glutes","hamstrings"],["Stand with your feet wider than shoulder-width apart, toes pointing outwards.","Hold a kettlebell with both hands in front of your body, arms extended downwards.","Bend your knees and lower your hips into a squat position, keeping your back straight.","Drive through your heels and explosively extend your hips and knees, pulling the kettlebell up towards your chin.","As you pull the kettlebell up, keep your elbows high and wide, and squeeze your shoulder blades together.","Lower the kettlebell back down to the starting position and repeat for the desired number of repetitions."]],["Kettlebell Swing","0549-UHJlbu3","glutes","hamstrings",["hamstrings","core"],["Stand with your feet shoulder-width apart, toes pointed slightly outward.","Hold the kettlebell with both hands in front of your body, arms extended.","Bend your knees slightly and hinge at the hips, pushing your butt back.","Swing the kettlebell back between your legs, keeping your arms straight and maintaining a flat back.","Drive your hips forward and swing the kettlebell up to shoulder height, using the momentum generated by your hips.","Allow the kettlebell to swing back down between your legs and repeat the movement for the desired number of repetitions."]],["Kettlebell Thruster","0550-yWxMvB5","delts","quadriceps",["quadriceps","glutes","core"],["Start by standing with your feet shoulder-width apart, holding a kettlebell in front of your chest with both hands, palms facing each other.","Lower into a squat position by bending your knees and pushing your hips back, keeping your chest up and your back straight.","As you reach the bottom of the squat, explosively drive through your heels to stand up, simultaneously pressing the kettlebell overhead.","Lock out your arms at the top of the movement, fully extending your elbows.","Lower the kettlebell back to the starting position by reversing the movement, bending your elbows and lowering the weight back to your chest.","Repeat for the desired number of repetitions."]],["Kettlebell Turkish Get Up (Squat Style)","0551-Ha7SZ3y","glutes","quadriceps",["quadriceps","hamstrings","core"],["Start by lying on your back with your legs extended and the kettlebell held in your right hand, arm fully extended above your shoulder.","Bend your right knee and place your right foot flat on the ground, keeping your left leg extended.","Pressing through your right foot, lift your hips off the ground, coming into a bridge position.","Slide your left leg underneath your body, bending your left knee and placing your left foot flat on the ground.","Rotate your torso to the left, bringing your left hand to the ground for support.","Pressing through your right foot and left hand, lift your torso off the ground, coming into a kneeling position.","From the kneeling position, stand up, keeping the kettlebell extended overhead.","Reverse the movement to return to the starting position.","Repeat the exercise on the other side, starting with the kettlebell in your left hand."]],["Kettlebell Two Arm Clean","0552-7Ba7bQ2","delts","traps",["traps","forearms"],["Stand with your feet shoulder-width apart, holding a kettlebell in front of your thighs with both hands, palms facing towards you.","Bend your knees slightly and hinge at the hips, lowering the kettlebell towards the ground.","Explosively extend your hips and knees, using the momentum to pull the kettlebell up towards your shoulders.","As the kettlebell reaches shoulder height, rotate your wrists and catch the kettlebell in the rack position, with your elbows tucked in and the kettlebell resting on the back of your forearm.","Lower the kettlebell back down to the starting position and repeat for the desired number of repetitions."]],["Kettlebell Two Arm Military Press","0553-blBXysN","delts","triceps",["triceps","upper back"],["Stand with your feet shoulder-width apart, holding a kettlebell in each hand at shoulder level with your palms facing forward.","Engage your core and press the kettlebells overhead, fully extending your arms.","Pause for a moment at the top, then slowly lower the kettlebells back to the starting position.","Repeat for the desired number of repetitions."]],["Kettlebell Two Arm Row","1345-wf24o8S","upper back","biceps",["biceps","forearms"],["Stand with your feet shoulder-width apart, knees slightly bent, and hold a kettlebell in each hand with your palms facing your body.","Bend forward at the hips, keeping your back straight and your core engaged.","Pull the kettlebells up towards your chest, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower the kettlebells back down to the starting position.","Repeat for the desired number of repetitions."]],["Kettlebell Windmill","0554-9Tkqa9O","abs","obliques",["obliques","shoulders"],["Stand with your feet shoulder-width apart, holding a kettlebell in your right hand overhead.","Rotate your left foot outwards about 45 degrees and keep your right foot pointing forward.","Bend your torso to the left side, keeping your right arm extended overhead and your eyes on the kettlebell.","Lower your torso as far as you can while keeping your right arm straight and your left arm extended to the side.","Pause for a moment, then return to the starting position by pushing through your right foot and engaging your obliques.","Repeat for the desired number of repetitions, then switch sides."]],["Kick Out Sit","0555-v7p5bYl","hamstrings","quadriceps",["quadriceps","glutes"],["Sit on the edge of a bench or chair with your feet flat on the ground and your knees bent at a 90-degree angle.","Lean back slightly and place your hands on the edge of the bench or chair for support.","Engaging your hamstrings, lift your feet off the ground and extend your legs straight out in front of you.","Pause for a moment at the top, then slowly bend your knees and bring your feet back towards your body.","Repeat for the desired number of repetitions."]],["Kipping Muscle Up","0558-pM07UxU","lats","biceps",["biceps","triceps","shoulders","core"],["Start by hanging from a pull-up bar with an overhand grip, hands slightly wider than shoulder-width apart.","Engage your core and use a swinging motion to generate momentum.","As you swing forward, pull your chest towards the bar, using your lats and biceps to initiate the movement.","Continue the upward motion until your chest reaches the bar, then transition into a dip position by pushing down on the bar and extending your arms.","Lower yourself back down to the starting position by bending your arms and controlling the descent.","Repeat for the desired number of repetitions."]],["Knee Touch Crunch","3640-dTg95eZ","abs","hip flexors",["hip flexors"],["Lie flat on your back with your knees bent and feet flat on the ground.","Place your hands behind your head with your elbows pointing outwards.","Engaging your abs, lift your shoulder blades off the ground and reach your right hand towards your left knee.","Return to the starting position and repeat, this time reaching your left hand towards your right knee.","Continue alternating sides for the desired number of repetitions."]],["Kneeling Jump Squat","1420-UgDm3oy","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Start by kneeling on the ground with your feet hip-width apart and your toes pointing forward.","Hold a barbell across your upper back, resting it on your shoulders.","Engage your core and glutes, then explosively jump up into the air, extending your hips and knees.","As you jump, push through your toes and fully extend your ankles, knees, and hips.","Land softly back on the ground, bending your knees to absorb the impact.","Immediately go into the next repetition, repeating the jump squat motion."]],["Kneeling Lat Stretch","1346-f38OEuO","lats","shoulders",["shoulders","triceps"],["Kneel on the ground with your knees hip-width apart and your toes pointing back.","Extend your arms overhead and interlace your fingers.","Keeping your back straight, slowly lean to the right side, feeling a stretch in your left lat muscle.","Hold the stretch for 20-30 seconds, then return to the starting position.","Repeat the stretch on the left side, leaning to the left and feeling a stretch in your right lat muscle.","Continue alternating sides for the desired number of repetitions."]],["Kneeling Plank Tap Shoulder (Male)","3239-h1ezqSu","abs","shoulders",["shoulders","triceps"],["Start in a kneeling position with your hands on the ground, shoulder-width apart.","Extend your legs behind you, resting on your toes, and lift your body into a plank position.","Keeping your core engaged and your hips stable, lift one hand off the ground and tap the opposite shoulder.","Return the hand to the ground and repeat with the other hand.","Continue alternating sides for the desired number of repetitions."]],["Kneeling Push-up (Male)","3211-ZOuKWir","pectorals","triceps",["triceps","shoulders"],["Start by kneeling on the ground with your hands shoulder-width apart, fingers pointing forward.","Extend your legs behind you, resting on the balls of your feet, so that your body forms a straight line from head to heels.","Engage your core and lower your body towards the ground by bending your elbows, keeping them close to your sides.","Continue lowering until your chest is just above the ground, then push back up to the starting position by straightening your arms.","Repeat for the desired number of repetitions."]],["Korean Dips","3288-rWoBmi5","pectorals","triceps",["triceps","shoulders"],["Position yourself between two parallel bars with your arms extended and supporting your body weight.","Lower your body by bending your elbows until your upper arms are parallel to the ground.","Pause for a moment, then push yourself back up to the starting position by straightening your arms.","Repeat for the desired number of repetitions."]],["L-pull-up","3418-d1GgzTU","lats","biceps",["biceps","forearms"],["Grab the pull-up bar with an overhand grip, slightly wider than shoulder-width apart.","Hang with your arms fully extended and your body straight.","Engage your lats and biceps to pull your body up towards the bar, keeping your elbows close to your body.","Continue pulling until your chin is above the bar.","Pause for a moment at the top, then slowly lower your body back down to the starting position.","Repeat for the desired number of repetitions."]],["L-sit On Floor","3419-UpWmA5E","abs","hip flexors",["hip flexors"],["Sit on the floor with your legs extended in front of you.","Place your hands on the floor beside your hips, fingers pointing forward.","Engage your core and lift your legs off the ground, keeping them straight.","Try to bring your legs parallel to the floor, forming an 'L' shape with your body.","Hold this position for as long as you can.","Slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Landmine 180","0562-QYysSLV","abs","obliques",["obliques","quadriceps"],["Stand with your feet shoulder-width apart and hold the barbell with both hands in front of your chest.","Bend your knees slightly and rotate your torso to the right, swinging the barbell down towards your right hip.","As you reach the bottom of the movement, quickly reverse the motion and rotate your torso to the left, swinging the barbell up and across your body towards your left shoulder.","Continue this twisting motion, alternating sides, for the desired number of repetitions."]],["Landmine Lateral Raise","3237-eXMFHww","delts","traps",["traps","upper back"],["Stand with your feet shoulder-width apart and knees slightly bent.","Hold the barbell with an overhand grip, resting it on the front of your shoulders.","Keeping your core engaged and back straight, lift the barbell up and away from your body, raising it to shoulder height.","Pause for a moment at the top, then slowly lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Lean Planche","3300-LYJodFS","abs","shoulders",["shoulders","chest","triceps"],["Start in a push-up position with your hands shoulder-width apart and your body straight.","Engage your core and slowly shift your weight forward, bringing your shoulders past your hands.","Keep your elbows slightly bent and your body straight as you lean forward.","Hold this position for a few seconds, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Left Hook. Boxing","2271-hoXt6wv","delts","biceps",["biceps","triceps","forearms"],["Stand with your feet shoulder-width apart and your knees slightly bent.","Keep your left hand up to protect your face and your right hand by your chin.","Rotate your hips and pivot on your left foot as you extend your left arm forward in a punching motion.","Twist your torso and engage your core muscles to generate power in the punch.","Snap your arm back to the starting position and repeat for the desired number of repetitions."]],["Leg Pull In Flat Bench","0570-OyoZ3Pu","abs","hip flexors",["hip flexors","lower back"],["Sit on a flat bench with your legs extended straight out in front of you.","Place your hands on the bench beside your hips for support.","Engage your abs and lift your legs off the ground, bringing your knees towards your chest.","Pause for a moment at the top, then slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Leg Up Hamstring Stretch","1576-sU5BrfP","hamstrings","glutes",["glutes"],["Lie flat on your back with your legs extended.","Bend one knee and bring it towards your chest, holding onto your thigh or shin.","Straighten your leg as much as possible while keeping it elevated.","Hold the stretch for 20-30 seconds.","Repeat with the other leg."]],["Lever Alternate Leg Press","2287-V07qpXy","quads","hamstrings",["hamstrings","glutes"],["Adjust the seat and foot platform of the leverage machine to your desired position.","Sit on the machine with your back against the backrest and your feet on the foot platform.","Place your hands on the handles or sides of the machine for stability.","Push one foot against the foot platform, extending your leg until it is almost fully straight.","Pause for a moment, then slowly bend your leg and return to the starting position.","Repeat with the other leg.","Continue alternating legs for the desired number of repetitions."]],["Lever Alternating Narrow Grip Seated Row","0571-w2oRpuH","upper back","biceps",["biceps","forearms"],["Adjust the seat height and footplate position to ensure proper alignment.","Sit on the machine with your back straight and feet flat on the footplate.","Grasp the handles with a narrow grip, palms facing each other.","Keep your chest up and shoulders back throughout the exercise.","Pull one handle towards your torso while keeping the other handle stationary.","Squeeze your shoulder blades together at the end of the movement.","Slowly return the handle to the starting position and repeat with the other side.","Continue alternating sides for the desired number of repetitions."]],["Lever Assisted Chin-up","0572-MaMuGH6","lats","biceps",["biceps","forearms"],["Adjust the leverage machine to your desired resistance level.","Stand on the foot platform and grip the handles with an overhand grip, slightly wider than shoulder-width apart.","Hang with your arms fully extended, keeping your body straight.","Engage your back muscles and pull your body up towards the handles, leading with your chest.","Continue pulling until your chin is above the handles.","Pause for a moment at the top, then slowly lower your body back down to the starting position.","Repeat for the desired number of repetitions."]],["Lever Back Extension","0573-rUXfn3R","spine","glutes",["glutes","hamstrings"],["Adjust the machine to fit your body size and range of motion.","Sit on the machine with your back against the pad and your feet secured.","Place your hands on the handles or grip bars.","Engage your core and slowly lean forward, allowing your back to round slightly.","Pause for a moment at the bottom position, feeling a stretch in your lower back.","Using your back muscles, slowly raise your torso back to the starting position.","Repeat for the desired number of repetitions."]],["Lever Bent Over Row","0574-X3cqyXz","upper back","biceps",["biceps","forearms"],["Stand with your feet shoulder-width apart and knees slightly bent.","Hold the barbell with an overhand grip, hands slightly wider than shoulder-width apart.","Bend forward at the hips, keeping your back straight and chest up.","Pull the barbell towards your lower chest, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower the barbell back to the starting position.","Repeat for the desired number of repetitions."]],["Lever Bent-over Row With V-bar","3200-LuBEORI","upper back","biceps",["biceps","forearms"],["Adjust the seat height and position yourself facing the machine.","Grasp the v-bar with an overhand grip, keeping your back straight and your knees slightly bent.","Pull the v-bar towards your abdomen, squeezing your shoulder blades together.","Pause for a moment at the top of the movement, then slowly release the weight back to the starting position.","Repeat for the desired number of repetitions."]],["Lever Bicep Curl","0575-q6y3OhV","biceps","forearms",["forearms"],["Adjust the seat height and position yourself on the machine with your back against the pad.","Grasp the handles with an underhand grip, palms facing up, and keep your elbows close to your sides.","Exhale and curl the handles upward, contracting your biceps.","Pause for a moment at the top of the movement, squeezing your biceps.","Inhale and slowly lower the handles back to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Lever Calf Press","2289-7B4F5nZ","calves","hamstrings",["hamstrings"],["Adjust the seat of the leverage machine so that your shoulders are aligned with the lever pad.","Place your toes on the lever pad, with your heels hanging off the edge.","Grasp the handles or side supports for stability.","Push the lever pad down by extending your ankles, contracting your calf muscles.","Pause for a moment at the bottom of the movement.","Slowly return to the starting position by allowing your heels to rise back
