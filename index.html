nd towards your chest, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly release the tension and return to the starting position.","Repeat for the desired number of repetitions."]],["Reverse Crunch","0872-nCU1Ekp","abs","hip flexors",["hip flexors"],["Lie flat on your back with your arms extended along your sides.","Bend your knees and lift your feet off the ground, bringing your thighs perpendicular to the floor.","Contract your abs and curl your hips off the floor, bringing your knees towards your chest.","Pause for a moment at the top, then slowly lower your hips back down to the starting position.","Repeat for the desired number of repetitions."]],["Reverse Dip","0672-NZ5Qqkz","triceps","chest",["chest","shoulders"],["Position yourself between two parallel bars with your arms fully extended and your body straight.","Lower your body by bending your elbows until your upper arms are parallel to the ground.","Pause for a moment, then push yourself back up to the starting position by straightening your arms.","Repeat for the desired number of repetitions."]],["Reverse Grip Machine Lat Pulldown","0673-ecpY0rH","lats","biceps",["biceps","forearms"],["Adjust the seat height and position yourself on the machine with your knees under the pads and your feet flat on the ground.","Grasp the handles with an underhand grip, slightly wider than shoulder-width apart.","Sit upright with your chest out and shoulders back, maintaining a slight arch in your lower back.","Pull the handles down towards your chest, squeezing your shoulder blades together.","Pause for a moment at the bottom of the movement, then slowly release the handles back to the starting position.","Repeat for the desired number of repetitions."]],["Reverse Grip Pull-up","0674-YAk5dIw","lats","biceps",["biceps","forearms"],["Grab the pull-up bar with an underhand grip, hands shoulder-width apart.","Hang from the bar with your arms fully extended and your body straight.","Engage your back muscles and pull your body up towards the bar, leading with your chest.","Continue pulling until your chin is above the bar.","Pause for a moment at the top, then slowly lower your body back down to the starting position.","Repeat for the desired number of repetitions."]],["Reverse Hyper Extension (On Stability Ball)","0675-vM5YS2g","glutes","hamstrings",["hamstrings","lower back"],["Lie face down on a stability ball with your hips resting on the ball and your legs extended straight behind you.","Place your hands on the ground in front of you for stability.","Engaging your glutes and hamstrings, lift your legs up towards the ceiling as high as you can.","Pause for a moment at the top, then slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Reverse Hyper On Flat Bench","1423-OrETs32","glutes","hamstrings",["hamstrings","lower back"],["Lie face down on a flat bench with your hips at the edge and your legs hanging off the bench.","Hold onto the bench for stability.","Keeping your legs straight, raise them up towards the ceiling as high as you can.","Squeeze your glutes at the top of the movement.","Slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Reverse Plank With Leg Lift","3663-tFToB7l","abs","glutes",["glutes","hamstrings","shoulders"],["Sit on the ground with your legs extended in front of you and your hands resting on the ground behind you, fingers pointing towards your feet.","Press through your hands and lift your hips off the ground, coming into a reverse plank position.","Engage your core and lift one leg off the ground, extending it straight up towards the ceiling.","Hold for a moment, then lower your leg back down.","Repeat with the other leg.","Continue alternating legs for the desired number of repetitions."]],["Ring Dips","0677-ezTvXcr","triceps","chest",["chest","shoulders"],["Start by hanging from the rings with your arms fully extended and your body straight.","Lower your body by bending your elbows until your shoulders are below your elbows.","Push yourself back up to the starting position by straightening your arms.","Repeat for the desired number of repetitions."]],["Rocking Frog Stretch","2571-2Dk4xQV","glutes","hamstrings",["hamstrings","quadriceps"],["Start by kneeling on the ground with your knees hip-width apart.","Place your hands on the ground in front of you for support.","Slowly lean forward, shifting your weight onto your hands and extending your legs behind you.","Keep your back straight and engage your glutes as you push your hips back and up towards the ceiling.","Hold this position for a few seconds, feeling a stretch in your glutes.","Slowly return to the starting position by bending your knees and lowering your hips back down.","Repeat for the desired number of repetitions."]],["Rocky Pull-up Pulldown","0678-cQ19bBP","lats","biceps",["biceps","forearms"],["Stand in front of a pull-up bar with your feet shoulder-width apart.","Reach up and grab the bar with an overhand grip, slightly wider than shoulder-width apart.","Hang from the bar with your arms fully extended and your body straight.","Engage your back muscles and pull your body up towards the bar, leading with your chest.","Pause for a moment at the top, then slowly lower your body back down to the starting position.","Repeat for the desired number of repetitions."]],["Roller Back Stretch","2208-isofgzg","spine","hamstrings",["hamstrings","glutes"],["Start by sitting on the ground with your legs extended in front of you.","Place the roller perpendicular to your body, just below your glutes.","Slowly roll your body backwards, allowing the roller to move up your back.","Continue rolling until the roller reaches your upper back.","Pause for a moment, then slowly roll back to the starting position.","Repeat for the desired number of repetitions."]],["Roller Body Saw","2204-XeMvLgE","abs","shoulders",["shoulders","triceps","core"],["Start in a plank position with your forearms on the roller and your body in a straight line.","Engage your core and slowly roll the roller forward, extending your body as far as you can while maintaining control.","Pause for a moment at the furthest point, then slowly roll the roller back towards your starting position.","Repeat for the desired number of repetitions."]],["Roller Hip Lat Stretch","2205-0L2KwtI","glutes","hamstrings",["hamstrings","quadriceps"],["Start by kneeling on the ground with the roller positioned under your hips.","Place your hands on the roller for support.","Slowly roll the roller forward, extending your hips and stretching your glutes.","Hold the stretch for a few seconds, then roll back to the starting position.","Repeat for the desired number of repetitions."]],["Roller Hip Stretch","2202-oMypNrz","glutes","hamstrings",["hamstrings","quadriceps"],["Start by sitting on the ground with your legs extended in front of you.","Place the roller under your glutes, just above your knees.","Lean back and place your hands on the ground behind you for support.","Engage your glutes and slowly roll the roller forward, bending your knees and bringing them towards your chest.","Pause for a moment at the end of the movement, feeling a stretch in your glutes.","Slowly roll the roller back to the starting position, extending your legs.","Repeat for the desired number of repetitions."]],["Roller Reverse Crunch","2206-SKXQAx3","abs","hip flexors",["hip flexors"],["Lie flat on your back with your arms extended straight above your head and your legs straight out in front of you.","Place the roller between your feet and grip it with your toes.","Engaging your abs, lift your legs off the ground and curl your knees towards your chest, rolling the roller towards your body.","Pause for a moment at the top, then slowly lower your legs back down to the starting position, rolling the roller away from your body.","Repeat for the desired number of repetitions."]],["Roller Seated Shoulder Flexor Depresor Retractor","2203-8coXSYU","pectorals","deltoids",["deltoids","triceps"],["Sit on a flat surface with your legs extended in front of you.","Hold the roller with both hands, palms facing down, and place it on your thighs.","Lean forward slightly and roll the roller away from your body, extending your arms straight in front of you.","Pause for a moment, then slowly roll the roller back towards your body, bending your arms and bringing the roller back to your thighs.","Repeat for the desired number of repetitions."]],["Roller Seated Single Leg Shoulder Flexor Depresor Retractor","2209-CjETvlw","pectorals","deltoids",["deltoids","triceps"],["Sit on a flat surface with your legs extended in front of you.","Hold the roller with both hands, palms facing down, and place it on your thighs.","Lean back slightly and engage your core muscles.","Raise the roller up to shoulder level, keeping your arms straight.","Slowly lower the roller back down to your thighs.","Repeat for the desired number of repetitions."]],["Roller Side Lat Stretch","2207-c3Pfhti","lats","shoulders",["shoulders","triceps"],["Stand with your feet shoulder-width apart and hold the roller with both hands in front of your body.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Extend your arms forward and roll the roller down towards your feet, feeling a stretch in your lats.","Hold the stretch for a few seconds, then slowly roll the roller back up to the starting position.","Repeat for the desired number of repetitions."]],["Rope Climb","0680-yaAxcQr","upper back","forearms",["forearms","biceps","shoulders"],["Stand facing the rope with your feet shoulder-width apart.","Grab the rope with both hands, palms facing towards you.","Bend your knees slightly and engage your core.","Begin pulling yourself up the rope by alternating hand-over-hand movements.","Use your legs to assist in the upward movement.","Continue climbing until you reach the desired height or the top of the rope.","To descend, reverse the hand-over-hand movement while controlling your descent.","Repeat for the desired number of repetitions."]],["Run","0685-oLrKqDH","cardiovascular system","quadriceps",["quadriceps","hamstrings","calves"],["Start by standing upright with your feet hip-width apart.","Engage your core and keep your upper body relaxed.","Begin jogging in place, lifting your knees up towards your chest and landing softly on the balls of your feet.","Maintain a steady pace and continue jogging for the desired duration or distance.","Remember to breathe deeply and maintain good posture throughout the exercise."]],["Run (Equipment)","0684-y5p0H8a","cardiovascular system","quadriceps",["quadriceps","hamstrings","calves"],["Start by standing upright with your feet hip-width apart.","Engage your core and keep your upper body relaxed.","Begin jogging in place, lifting your knees up towards your chest and landing softly on the balls of your feet.","Maintain a steady pace and continue jogging for the desired duration or distance.","Remember to breathe deeply and maintain good posture throughout the exercise."]],["Runners Stretch","1585-0mB6wHO","hamstrings","calves",["calves","quadriceps"],["Stand with your feet hip-width apart.","Take a step forward with your right foot, keeping your left foot planted.","Bend your right knee and lower your body down, keeping your left leg straight.","Place your hands on your right thigh for support.","Hold the stretch for 20-30 seconds, then switch sides and repeat."]],["Russian Twist","0687-XVDdcoj","abs","obliques",["obliques"],["Sit on the ground with your knees bent and feet flat on the floor.","Lean back slightly while keeping your back straight and your core engaged.","Hold your hands together in front of your chest or hold a weight if desired.","Lift your feet off the ground, balancing on your sit bones.","Twist your torso to the right, bringing your hands or weight towards the right side of your body.","Pause for a moment, then twist your torso to the left, bringing your hands or weight towards the left side of your body.","Continue alternating sides for the desired number of repetitions."]],["Scapula Dips","3012-7xeukSt","traps","rhomboids",["rhomboids","deltoids"],["Start by standing with your feet shoulder-width apart and your arms extended in front of you.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Lower your body by bending your elbows and retracting your shoulder blades, as if you are trying to squeeze a pencil between them.","Pause for a moment at the bottom, then push through your hands to extend your elbows and return to the starting position.","Repeat for the desired number of repetitions."]],["Scapula Push-up","3021-jV65tKx","serratus anterior","triceps",["triceps","shoulders"],["Start in a high plank position with your hands directly under your shoulders and your body in a straight line.","Lower your chest towards the ground, keeping your elbows close to your body.","As you lower, squeeze your shoulder blades together and push your chest forward.","Pause for a moment at the bottom, then push back up to the starting position.","Repeat for the desired number of repetitions."]],["Scapular Pull-up","0688-uTBt1HV","traps","biceps",["biceps","rhomboids","rear deltoids"],["Start by hanging from a pull-up bar with your palms facing away from you and your arms fully extended.","Retract your shoulder blades by pulling them down and back.","Engage your back muscles and pull your body up towards the bar, focusing on squeezing your shoulder blades together.","Pause for a moment at the top of the movement, then slowly lower your body back down to the starting position.","Repeat for the desired number of repetitions."]],["Scissor Jumps (Male)","3219-Eh2v5Iu","cardiovascular system","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart.","Jump off the ground and simultaneously cross your right leg in front of your left leg.","As you land, quickly switch legs, crossing your left leg in front of your right leg.","Continue alternating legs and jumping as quickly as possible.","Repeat for the desired number of repetitions."]],["Seated Calf Stretch (Male)","1390-17bqEXD","calves","hamstrings",["hamstrings"],["Sit on the edge of a chair or bench with your feet flat on the ground.","Extend one leg straight out in front of you, keeping your heel on the ground.","Lean forward slightly, feeling a stretch in your calf muscle.","Hold the stretch for 20-30 seconds.","Switch legs and repeat the stretch."]],["Seated Glute Stretch","1424-DeDThfG","glutes","hamstrings",["hamstrings"],["Sit on the ground with your legs extended in front of you.","Bend your right knee and cross your right ankle over your left thigh.","Place your right hand on the ground behind you for support.","With your left hand, gently press down on your right knee to deepen the stretch.","Hold the stretch for 30 seconds to 1 minute.","Switch sides and repeat."]],["Seated Leg Raise","0689-Hgs6Nl1","abs","hip flexors",["hip flexors"],["Sit on a flat bench with your back straight and your feet flat on the ground.","Place your hands on the sides of the bench for support.","Keeping your legs straight, slowly raise them up in front of you until they are parallel to the ground.","Pause for a moment at the top, then slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Seated Lower Back Stretch","0690-QFmz6ch","lats","glutes",["glutes","hamstrings"],["Sit on the edge of a chair with your feet flat on the ground.","Place your hands on your thighs or on the sides of the chair for support.","Slowly lean forward from your hips, keeping your back straight.","Feel the stretch in your lower back and hold for 20-30 seconds.","Slowly return to the starting position and repeat for the desired number of repetitions."]],["Seated Piriformis Stretch","2567-QY39eBr","glutes","hamstrings",["hamstrings"],["Sit on the ground with your legs extended in front of you.","Bend your right knee and place your right foot on the outside of your left knee.","Place your left elbow on the outside of your right knee and gently twist your torso to the right.","Hold the stretch for 20-30 seconds, then switch sides and repeat."]],["Seated Side Crunch (Wall)","0691-Y9hNPcN","abs","obliques",["obliques"],["Sit on the floor with your back against a wall and your legs extended in front of you.","Bend your knees and place your feet flat on the floor, hip-width apart.","Place your hands behind your head with your elbows pointing outwards.","Engage your abs and lean to one side, bringing your elbow towards your hip.","Pause for a moment, then return to the starting position.","Repeat on the other side.","Continue alternating sides for the desired number of repetitions."]],["Seated Wide Angle Pose Sequence","1587-HIgYKAB","hamstrings","quadriceps",["quadriceps","calves"],["Sit on the ground with your legs extended in a wide angle.","Flex your feet and engage your quadriceps.","Place your hands on the ground behind you for support.","Keeping your back straight, lean forward from your hips.","Continue leaning forward until you feel a stretch in your hamstrings.","Hold this position for a few breaths.","Slowly release the stretch and return to the starting position.","Repeat for the desired number of repetitions."]],["Self Assisted Inverse Leg Curl","0697-GwYwElT","hamstrings","glutes",["glutes","calves"],["Lie flat on your back on a mat or bench with your legs extended.","Place your hands by your sides or under your glutes for support.","Bend your knees and lift your feet off the ground, bringing your thighs towards your chest.","Pause for a moment at the top, then slowly lower your legs back to the starting position.","Repeat for the desired number of repetitions."]],["Self Assisted Inverse Leg Curl (On Floor)","0696-E4PwJqI","hamstrings","glutes",["glutes","calves"],["Lie flat on your back with your legs extended and your arms by your sides.","Bend your knees and place your feet flat on the ground, hip-width apart.","Lift your hips off the ground, engaging your glutes and hamstrings.","Slowly curl your legs towards your glutes, keeping your hips lifted.","Pause for a moment at the top, then slowly extend your legs back to the starting position.","Lower your hips back down to the ground.","Repeat for the desired number of repetitions."]],["Semi Squat Jump (Male)","3222-6FMU51h","cardiovascular system","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart.","Bend your knees and lower your body into a squat position.","Jump explosively, extending your hips and knees while swinging your arms for momentum.","Land softly on the balls of your feet and immediately go into the next repetition.","Repeat for the desired number of repetitions."]],["Short Stride Run","3656-CcWEoWV","cardiovascular system","quadriceps",["quadriceps","hamstrings","calves"],["Find an open space or a treadmill to perform the exercise.","Stand tall with your feet hip-width apart.","Start jogging in place, lifting your knees high and pumping your arms.","After a few seconds, start taking short strides forward, maintaining a quick pace.","Continue running with short strides for the desired duration or distance."]],["Shoulder Grip Pull-up","1763-YtgD7Xq","lats","biceps",["biceps","forearms"],["Grab the pull-up bar with a shoulder-width grip, palms facing away from you.","Hang freely with your arms fully extended.","Engage your back muscles and pull your body up towards the bar until your chin is above the bar.","Pause for a moment at the top, then slowly lower your body back down to the starting position.","Repeat for the desired number of repetitions."]],["Shoulder Tap","3699-yRpV5TC","abs","shoulders",["shoulders","triceps"],["Start in a high plank position with your hands directly under your shoulders and your body in a straight line.","Engage your core and lift your right hand off the ground, reaching across to tap your left shoulder.","Place your right hand back on the ground and repeat with your left hand tapping your right shoulder.","Continue alternating shoulder taps while keeping your hips and torso stable.","Repeat for the desired number of repetitions."]],["Shoulder Tap Push-up","0699-qEse6fe","pectorals","triceps",["triceps","core"],["Start in a high plank position with your hands slightly wider than shoulder-width apart and your body in a straight line from head to heels.","Lower your body towards the ground by bending your elbows, keeping them close to your sides.","As you push back up, lift your right hand off the ground and tap your left shoulder.","Return your right hand to the ground and repeat the push-up, this time lifting your left hand and tapping your right shoulder.","Continue alternating shoulder taps with each push-up repetition.","Maintain a stable core and avoid excessive hip rotation throughout the exercise.","Repeat for the desired number of repetitions."]],["Side Bridge Hip Abduction","1774-WL4EmxJ","abductors","glutes",["glutes","obliques"],["Lie on your side with your legs extended and stacked on top of each other.","Prop yourself up on your forearm, keeping your elbow directly below your shoulder.","Engage your core and lift your hips off the ground, creating a straight line from your head to your feet.","While keeping your core engaged, lift your top leg as high as possible without rotating your hips.","Pause for a moment at the top, then lower your leg back down.","Repeat for the desired number of repetitions, then switch sides."]],["Side Bridge V. 2","0705-RKjH6Lt","abs","obliques",["obliques","glutes"],["Lie on your side with your legs extended and stacked on top of each other.","Place your forearm on the ground directly below your shoulder, with your elbow bent at a 90-degree angle.","Engage your core and lift your hips off the ground, creating a straight line from your head to your feet.","Hold this position for the desired amount of time.","Lower your hips back down to the starting position.","Repeat on the other side."]],["Side Hip (On Parallel Bars)","0709-jTkSc6o","abs","obliques",["obliques","hip flexors"],["Stand between two parallel bars with your feet shoulder-width apart.","Place your hands on the bars and lift your body off the ground, supporting your weight on your arms.","Engage your abs and slowly lift your legs to the side, keeping them straight.","Pause for a moment at the top, then slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Side Hip Abduction","0710-7WaDzyL","abductors","glutes",["glutes","quadriceps"],["Stand with your feet shoulder-width apart and your hands on your hips.","Shift your weight to one leg and lift the opposite leg out to the side, keeping it straight.","Pause for a moment at the top, then slowly lower your leg back down to the starting position.","Repeat on the other side.","Continue alternating sides for the desired number of repetitions."]],["Side Lying Floor Stretch","1358-jDOKRM5","lats","obliques",["obliques","glutes"],["Lie on your side with your legs straight and your bottom arm extended straight overhead.","Bend your top knee and place your foot on the ground in front of your bottom leg.","Reach your top arm over your head and grab onto something stable, like a wall or a piece of furniture.","Slowly lift your bottom leg off the ground, keeping it straight, until you feel a stretch in your side.","Hold the stretch for 20-30 seconds, then slowly lower your leg back down.","Repeat on the other side."]],["Side Lying Hip Adduction (Male)","3667-c8f5cSY","adductors","glutes",["glutes","hamstrings"],["Lie on your side with your legs straight and stacked on top of each other.","Place your bottom arm under your head for support.","Engage your adductors and lift your top leg as high as possible without rotating your hips or leaning backward.","Pause for a moment at the top, then slowly lower your leg back down to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Side Plank Hip Adduction","1775-VO2qeJg","adductors","obliques",["obliques","glutes"],["Start by lying on your side with your legs extended and stacked on top of each other.","Prop yourself up on your forearm, keeping your elbow directly below your shoulder.","Engage your core and lift your hips off the ground, creating a straight line from your head to your feet.","While maintaining the side plank position, lift your top leg towards the ceiling, keeping it straight.","Slowly lower your leg back down to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Side Push Neck Stretch","0716-oQRJYkC","levator scapulae","trapezius",["trapezius","sternocleidomastoid"],["Stand or sit up straight with your shoulders relaxed.","Tilt your head to the right, bringing your right ear towards your right shoulder.","Place your right hand on the left side of your head and gently apply pressure to increase the stretch.","Hold the stretch for 15-30 seconds.","Repeat on the other side, tilting your head to the left and applying pressure with your left hand.","Repeat the stretch 2-3 times on each side."]],["Side Push-up","0717-wpbD28t","triceps","shoulders",["shoulders","chest","core"],["Start by lying on your side with your legs extended and stacked on top of each other.","Place your bottom hand on the ground directly under your shoulder, fingers pointing forward.","Press through your bottom hand to lift your body off the ground, keeping your legs straight and your core engaged.","Extend your top arm straight up towards the ceiling, creating a straight line from your head to your heels.","Lower your body back down to the starting position with control.","Repeat for the desired number of repetitions, then switch sides."]],["Side Wrist Pull Stretch","0721-UtmIqcI","forearms","wrists",["wrists","hands"],["Stand with your feet shoulder-width apart and your arms extended in front of you.","Extend your right arm out to the side, parallel to the ground, with your palm facing down.","With your left hand, grab your right hand and gently pull it towards your body, feeling a stretch in your right forearm.","Hold the stretch for 15-30 seconds, then release.","Repeat on the other side."]],["Side-to-side Chin","0720-isAAZWA","lats","biceps",["biceps","forearms"],["Stand with your feet shoulder-width apart and your knees slightly bent.","Grasp a pull-up bar with an overhand grip, hands slightly wider than shoulder-width apart.","Hang from the bar with your arms fully extended and your body relaxed.","Pull yourself up by bending your elbows and bringing your chin towards the bar, while keeping your body straight.","Once your chin is above the bar, lower yourself back down to the starting position.","Repeat for the desired number of repetitions."]],["Side-to-side Toe Touch (Male)","3213-WCAvOfC","abs","obliques",["obliques","hip flexors"],["Stand with your feet shoulder-width apart and your arms extended to the sides.","Bend at the waist to the right, reaching your right hand towards your right foot while keeping your left hand extended to the side.","Return to the starting position and then bend at the waist to the left, reaching your left hand towards your left foot while keeping your right hand extended to the side.","Repeat the side-to-side bending motion for the desired number of repetitions."]],["Single Arm Push-up","0725-MUic5zN","pectorals","triceps",["triceps","shoulders","core"],["Start in a push-up position with your hands shoulder-width apart and one hand placed slightly wider than the other.","Engage your core and lower your body towards the ground by bending your elbows, keeping your back straight.","As you lower yourself, shift your weight to one side and lift the opposite arm off the ground, extending it straight out to the side.","Push through your chest and triceps to raise your body back up to the starting position, while simultaneously lowering your extended arm back to the ground.","Repeat the movement, alternating the arm you extend with each repetition."]],["Single Leg Bridge With Outstretched Leg","3645-rmEukuS","glutes","hamstrings",["hamstrings","quadriceps"],["Lie on your back with your knees bent and feet flat on the ground.","Extend one leg straight out in front of you.","Engage your glutes and lift your hips off the ground, forming a straight line from your knees to your shoulders.","Hold for a moment at the top, then slowly lower your hips back down to the starting position.","Repeat for the desired number of repetitions, then switch legs."]],["Single Leg Calf Raise (On A Dumbbell)","0727-fKZgDEO","calves","ankles",["ankles","feet"],["Stand with your feet hip-width apart and hold a dumbbell in one hand.","Lift one foot off the ground and balance on the other foot.","Slowly raise your heel as high as possible, using your calf muscles.","Pause for a moment at the top, then slowly lower your heel back down.","Repeat for the desired number of repetitions, then switch to the other leg."]],["Single Leg Platform Slide","0730-LNE3wfo","hamstrings","glutes",["glutes","quadriceps"],["Start by standing with one foot on a platform or slide board.","Bend your knee slightly and slide the foot on the platform backward, extending your leg.","Keep your core engaged and maintain a straight posture throughout the movement.","Slowly return to the starting position by sliding your foot back to the initial position.","Repeat the movement for the desired number of repetitions, then switch legs."]],["Single Leg Squat (Pistol) Male","1759-nqs5HGV","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart and arms extended in front of you.","Lift your right foot off the ground and extend it forward.","Slowly lower your body down by bending your left knee and pushing your hips back.","Keep your chest up and your back straight as you lower yourself down.","Lower until your left thigh is parallel to the ground, or as low as you can comfortably go.","Pause for a moment at the bottom, then push through your left heel to return to the starting position.","Repeat for the desired number of repetitions, then switch legs."]],["Sissy Squat","1489-xdYPUtE","quads","calves",["calves","glutes"],["Stand with your feet shoulder-width apart and your toes pointing slightly outward.","Hold onto a stable object for balance if needed.","Slowly lower your body by bending your knees and leaning back, keeping your torso upright.","Continue lowering until your thighs are parallel to the ground or as far as you can comfortably go.","Pause for a moment, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Sit-up V. 2","0735-Bn6TXyO","abs","hip flexors",["hip flexors"],["Lie flat on your back with your knees bent and feet flat on the ground.","Place your hands behind your head with your elbows pointing outwards.","Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Sit-up With Arms On Chest","3679-6ZCiYWQ","abs","hip flexors",["hip flexors"],["Lie flat on your back with your knees bent and feet flat on the ground.","Cross your arms over your chest.","Engaging your abs, lift your upper body off the ground towards your knees.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Skater Hops","3361-zfNHMN9","cardiovascular system","quadriceps",["quadriceps","hamstrings","glutes","calves"],["Stand with your feet shoulder-width apart.","Bend your knees slightly and jump to the right, landing on your right foot.","As you land, swing your left leg behind your right leg and tap the ground with your left toes.","Immediately jump to the left, landing on your left foot.","As you land, swing your right leg behind your left leg and tap the ground with your right toes.","Continue alternating sides, jumping and tapping the ground with each leg.","Repeat for the desired number of repetitions."]],["Ski Ergometer","2142-vpQaQkH","triceps","shoulders",["shoulders","forearms"],["Adjust the seat height and footrests to a comfortable position.","Grasp the handles with an overhand grip, palms facing down.","Sit up straight with your feet flat on the footrests.","Extend your arms straight out in front of you, keeping your elbows slightly bent.","Engage your triceps and push the handles down towards your thighs.","Pause for a moment at the bottom, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Ski Step","3671-5MRH8H2","cardiovascular system","quadriceps",["quadriceps","hamstrings","glutes","calves"],["Stand with your feet shoulder-width apart.","Bend your knees slightly and keep your back straight.","Jump to the right, landing on your right foot while swinging your left leg behind your right leg.","Immediately jump to the left, landing on your left foot while swinging your right leg behind your left leg.","Continue alternating jumps from side to side, mimicking a skiing motion.","Repeat for the desired number of repetitions."]],["Skin The Cat","3304-MSfvriJ","upper back","shoulders",["shoulders","core"],["Start by hanging from a bar with your arms fully extended and your body relaxed.","Engage your core and lift your legs up, bringing your knees towards your chest.","Continue to lift your legs up and over your head, allowing your body to pass through the arms.","Once your legs are fully extended over your head, begin to lower them back down towards the starting position.","As you lower your legs, allow your body to pass back through the arms until you are hanging with your arms fully extended again.","Repeat for the desired number of repetitions."]],["Sled 45 Degrees One Leg Press","1425-WWD6FzI","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Adjust the sled machine to a 45-degree angle.","Sit on the sled machine with your back against the pad and your feet on the footplate.","Place one foot on the footplate and extend your leg, pushing the sled away from you.","Slowly bend your knee and lower the sled back to the starting position.","Repeat with the other leg.","Continue alternating legs for the desired number of repetitions."]],["Sled 45в° Calf Press","0738-qCNVnaU","calves","hamstrings",["hamstrings"],["Adjust the sled machine to a 45-degree angle.","Place your feet on the sled platform with your toes pointing forward.","Push the sled platform away from you by extending your ankles and calves.","Pause for a moment at the top, then slowly lower the sled platform back to the starting position.","Repeat for the desired number of repetitions."]],["Sled 45в° Leg Press","0739-10Z2DXU","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Adjust the seat and footplate of the sled machine to a comfortable position.","Sit on the sled machine with your back against the backrest and your feet shoulder-width apart on the footplate.","Grip the handles on the sides of the seat for stability.","Push the footplate away from your body by extending your legs, keeping your heels on the footplate.","Continue pushing until your legs are almost fully extended, but without locking your knees.","Pause for a moment at the top of the movement, then slowly lower the footplate back towards your body by bending your knees.","Repeat for the desired number of repetitions."]],["Sled 45в° Leg Press (Back Pov)","1464-yn2lLSI","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Adjust the seat of the sled machine so that your knees are at a 45-degree angle.","Sit on the sled machine with your back against the backrest and your feet shoulder-width apart on the footplate.","Grip the handles on the sides of the seat for stability.","Push the footplate away from your body by extending your legs, keeping your heels on the footplate.","Pause for a moment at the fully extended position.","Slowly bend your knees and lower the footplate back towards your body, controlling the movement.","Repeat for the desired number of repetitions."]],["Sled 45° Leg Press (Side Pov)","1463-2Qh2J1e","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Adjust the seat of the sled machine so that your knees are at a 90-degree angle when your feet are on the footplate.","Sit on the sled machine with your back flat against the backrest and your feet shoulder-width apart on the footplate.","Grip the handles on the sides of the seat for stability.","Push against the footplate to extend your legs, straightening them completely.","Pause for a moment at the top, then slowly bend your knees to lower the footplate back to the starting position.","Repeat for the desired number of repetitions."]],["Sled 45в° Leg Wide Press","0740-tj41Nu6","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Adjust the sled machine to a 45-degree angle.","Sit on the sled machine with your back against the pad and your feet on the foot platform.","Position your feet wider than shoulder-width apart.","Push against the foot platform to extend your legs and straighten your knees.","Pause for a moment at the end of the movement, then slowly bend your knees to return to the starting position.","Repeat for the desired number of repetitions."]],["Sled Calf Press On Leg Press","1391-ykHcWme","calves","hamstrings",["hamstrings","quadriceps"],["Adjust the seat of the leg press machine so that your knees are slightly bent when your feet are on the sled.","Place your feet shoulder-width apart on the sled, with your toes pointing forward.","Release the safety handles and push the sled away from you by extending your knees and ankles.","Pause for a moment at the top of the movement, then slowly lower the sled back down by bending your knees and ankles.","Repeat for the desired number of repetitions."]],["Sled Closer Hack Squat","0741-gf3ZjB9","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Adjust the sled machine to a comfortable weight and position yourself with your back against the pad.","Place your feet shoulder-width apart on the platform, toes slightly pointed outwards.","Grip the handles on the sides of the machine for stability.","Engage your core and slowly lower your body by bending your knees and hips, keeping your back straight.","Continue lowering until your thighs are parallel to the ground or slightly below.","Pause for a moment at the bottom, then push through your heels to extend your legs and return to the starting position.","Repeat for the desired number of repetitions."]],["Sled Forward Angled Calf Raise","0742-XDOiFns","calves","hamstrings",["hamstrings","glutes"],["Adjust the sled machine to a comfortable weight and position yourself on the machine with your toes on the platform and your heels hanging off.","Place your hands on the handles or the sides of the machine for support.","Engage your calves and slowly raise your heels as high as possible, pushing against the resistance of the sled.","Pause for a moment at the top of the movement, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Sled Hack Squat","0743-Qa55kX1","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Adjust the sled machine to a comfortable position for your height.","Stand with your feet shoulder-width apart on the platform, toes slightly pointed outwards.","Hold onto the handles or bars for stability.","Lower your body by bending your knees and hips, keeping your back straight and chest up.","Continue lowering until your thighs are parallel to the ground or slightly below.","Pause for a moment, then push through your heels to raise your body back up to the starting position.","Repeat for the desired number of repetitions."]],["Sled Lying Calf Press","2334-g376LuL","calves","hamstrings",["hamstrings","glutes"],["Adjust the sled machine to a comfortable weight.","Sit on the sled machine with your back against the pad and your feet on the platform.","Place your toes and the balls of your feet on the edge of the platform, with your heels hanging off.","Push the platform away from you by extending your ankles, keeping your knees slightly bent.","Continue pushing until your calves are fully contracted.","Hold the contraction for a moment, then slowly lower the platform back to the starting position.","Repeat for the desired number of repetitions."]],["Sled Lying Squat","0744-9n2149Z","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Adjust the sled machine to a comfortable weight.","Lie on your back on the sled machine with your feet on the footplate.","Position your feet shoulder-width apart and slightly angled outwards.","Grip the handles of the sled machine for stability.","Engage your glutes and core muscles.","Push through your heels and extend your legs to lift the sled.","Lower the sled back down by bending your knees and hips.","Repeat for the desired number of repetitions."]],["Sled One Leg Calf Press On Leg Press","1392-u0pLNgz","calves","hamstrings",["hamstrings","glutes"],["Adjust the seat of the leg press machine so that your knees are slightly bent when your feet are on the sled.","Sit on the machine with your back against the backrest and your feet on the sled, shoulder-width apart.","Place your toes and the balls of your feet on the sled, keeping your heels off.","Push the sled forward by extending your ankles, keeping your knees slightly bent.","Pause for a moment at the top, then slowly lower the sled back down by flexing your ankles.","Repeat for the desired number of repetitions."]],["Sledge Hammer","1496-REXmfVC","abs","forearms",["forearms","shoulders"],["Stand with your feet shoulder-width apart and hold the sledge hammer with both hands.","Engage your core and keep your back straight.","Swing the sledge hammer down towards the ground, using your core and upper body strength.","As you swing down, pivot your hips and transfer the force to the hammer.","Repeat for the desired number of repetitions."]],["Smith Back Shrug","0746-MzNnwx9","traps","shoulders",["shoulders"],["Stand with your feet shoulder-width apart and your knees slightly bent.","Grasp the barbell with an overhand grip, hands slightly wider than shoulder-width apart.","Keep your arms straight and allow the barbell to hang in front of your thighs.","Lift your shoulders straight up towards your ears, squeezing your traps at the top.","Hold for a moment, then lower your shoulders back down to the starting position.","Repeat for the desired number of repetitions."]],["Smith Behind Neck Press","0747-Gpn4ADc","delts","triceps",["triceps","upper back"],["Adjust the seat height of the smith machine so that the bar is at shoulder level.","Stand with your feet shoulder-width apart and your knees slightly bent.","Grasp the bar with an overhand grip, slightly wider than shoulder-width apart.","Lift the bar off the rack and step back, maintaining a stable stance.","Lower the bar down to the back of your neck, keeping your elbows pointing forward.","Press the bar up overhead until your arms are fully extended.","Pause for a moment at the top, then slowly lower the bar back down to the starting position.","Repeat for the desired number of repetitions."]],["Smith Bench Press","0748-trqKQv2","pectorals","triceps",["triceps","shoulders"],["Adjust the height of the smith machine bar to chest level.","Lie flat on the bench with your feet firmly planted on the ground.","Grip the bar with an overhand grip slightly wider than shoulder-width apart.","Unrack the bar and lower it towards your chest, keeping your elbows tucked in.","Pause for a moment when the bar touches your chest.","Push the bar back up to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Smith Bent Knee Good Morning","0749-1bQkKZK","glutes","hamstrings",["hamstrings","lower back"],["Start by standing with your feet shoulder-width apart, toes pointing forward.","Place the barbell across your upper back, resting it on your traps.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Lower your torso until it is parallel to the ground, feeling a stretch in your hamstrings.","Engage your glutes and hamstrings to raise your torso back up to the starting position.","Repeat for the desired number of repetitions."]],["Smith Bent Over Row","1359-ZX9UZmj","upper back","biceps",["biceps","forearms"],["Set up the smith machine with the bar at hip height.","Stand facing the bar with your feet shoulder-width apart.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Grasp the bar with an overhand grip, hands slightly wider than shoulder-width apart.","Pull the bar towards your lower chest, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower the bar back down to the starting position.","Repeat for the desired number of repetitions."]],["Smith Chair Squat","0750-Gu2rNJd","quads","glutes",["glutes","hamstrings","calves"],["Adjust the height of the smith machine bar to a comfortable position.","Stand with your feet shoulder-width apart, toes slightly turned out.","Place the barbell across your upper back, resting it on your traps.","Engage your core and keep your chest up as you slowly lower your body by bending your knees and hips.","Continue lowering until your thighs are parallel to the ground, or as low as you can comfortably go.","Pause for a moment, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Smith Close-grip Bench Press","0751-WcHl7ru","triceps","chest",["chest","shoulders"],["Adjust the seat height and position yourself on the bench with your feet flat on the ground.","Grasp the barbell with a close grip, slightly narrower than shoulder-width apart.","Lower the barbell towards your chest, keeping your elbows close to your body.","Pause for a moment at the bottom, then push the barbell back up to the starting position.","Repeat for the desired number of repetitions."]],["Smith Deadlift","0752-UfePqpx","glutes","hamstrings",["hamstrings","quadriceps","lower back"],["Set up the smith machine with the bar at hip height.","Stand with your feet shoulder-width apart, toes pointing slightly outward.","Bend at the hips and knees, keeping your back straight and chest up, and grip the bar with an overhand grip slightly wider than shoulder-width apart.","Engage your core and lift the bar by extending your hips and knees, keeping the bar close to your body.","Stand up straight, fully extending your hips and knees.","Lower the bar back down by bending at the hips and knees, maintaining control and keeping your back straight.","Repeat for the desired number of repetitions."]],["Smith Decline Bench Press","0753-ETZfAbZ","pectorals","triceps",["triceps","shoulders"],["Adjust the decline bench to the desired angle.","Lie down on the bench with your feet secured under the foot pads.","Grasp the barbell with an overhand grip slightly wider than shoulder-width apart.","Unrack the barbell and lower it slowly towards your chest, keeping your elbows tucked in.","Pause for a moment at the bottom, then push the barbell back up to the starting position.","Repeat for the desired number of repetitions."]],["Smith Decline Reverse-grip Press","0754-MY9P1WA","pectorals","triceps",["triceps","shoulders"],["Adjust the smith machine to a decline position.","Lie down on the bench with your feet secured under the foot pads.","Grasp the barbell with a reverse grip, hands slightly wider than shoulder-width apart.","Unrack the barbell and lower it towards your chest, keeping your elbows tucked in.","Pause for a moment at the bottom, then push the barbell back up to the starting position.","Repeat for the desired number of repetitions."]],["Smith Front Squat (Clean Grip)","1433-lFhb2Rw","glutes","quadriceps",["quadriceps","hamstrings","calves","core"],["Set up the smith machine with the barbell at shoulder height.","Stand facing the barbell with your feet shoulder-width apart.","Grasp the barbell with an overhand grip, slightly wider than shoulder-width apart.","Step back and position the barbell on your front shoulders, resting it on your collarbone and deltoids.","Keep your chest up, back straight, and core engaged.","Lower your body by bending at the knees and hips, as if sitting back into a chair.","Continue lowering until your thighs are parallel to the ground or slightly below.","Pause for a moment, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Smith Full Squat","3281-NNoHCEA","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Set up the smith machine with the barbell at shoulder height.","Stand with your feet shoulder-width apart, toes slightly turned out.","Step under the bar and position it across your upper back, resting on your traps.","Grip the bar with your hands slightly wider than shoulder-width apart.","Unrack the bar and take a step back, maintaining a stable stance.","Keeping your chest up and core engaged, initiate the squat by pushing your hips back and bending your knees.","Lower your body until your thighs are parallel to the ground, or as low as your flexibility allows.","Pause for a moment at the bottom, then drive through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Smith Hack Squat","0755-ZuPXtCK","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Adjust the barbell on the smith machine to an appropriate height for your body.","Stand with your feet shoulder-width apart, toes slightly pointed outwards.","Position yourself under the barbell, resting it on your upper traps and shoulders.","Grasp the barbell with an overhand grip, slightly wider than shoulder-width apart.","Engage your core and keep your chest up as you unrack the barbell.","Take a step back and position your feet slightly wider than shoulder-width apart.","Bend your knees and lower your body down, keeping your chest up and back straight.","Continue descending until your thighs are parallel to the ground or slightly below.","Pause for a moment at the bottom, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Smith Hip Raise","0756-CqhoytW","abs","glutes",["glutes","hamstrings"],["Position yourself on the smith machine with your back against the pad and your feet shoulder-width apart.","Place your hands on the barbell, slightly wider than shoulder-width apart.","Engage your core and glutes, then push through your heels to raise your hips off the ground.","Continue lifting until your body forms a straight line from your knees to your shoulders.","Hold for a moment at the top, then slowly lower your hips back down to the starting position.","Repeat for the desired number of repetitions."]],["Smith Incline Bench Press","0757-5v7KYld","pectorals","shoulders",["shoulders","triceps"],["Adjust the bench to a 30-45 degree incline.","Sit on the bench with your back flat against the pad and feet firmly on the ground.","Grasp the barbell with an overhand grip slightly wider than shoulder-width apart.","Unrack the barbell and lower it slowly towards your upper chest, keeping your elbows slightly tucked in.","Pause for a moment at the bottom, then push the barbell back up to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Smith Incline Reverse-grip Press","0758-78VqWQK","pectorals","triceps",["triceps","shoulders"],["Adjust the seat of the smith machine to a comfortable incline angle.","Sit on the machine with your back against the pad and your feet flat on the ground.","Grasp the bar with an overhand grip that is slightly wider than shoulder-width apart.","Unrack the bar and lower it slowly towards your chest, keeping your elbows tucked in.","Pause for a moment when the bar is just above your chest.","Push the bar back up to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Smith Incline Shoulder Raises","0759-ayAHcEm","serratus anterior","deltoids",["deltoids","trapezius"],["Adjust the smith machine to an incline position.","Stand facing the machine with your feet shoulder-width apart.","Grasp the bar with an overhand grip, slightly wider than shoulder-width apart.","Keep your back straight and core engaged.","Raise the barbell up towards the ceiling, leading with your elbows.","Pause for a moment at the top, then slowly lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Smith Leg Press","0760-7zdxRTl","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Adjust the seat and footplate of the smith machine to a comfortable position.","Sit on the machine with your back against the backrest and your feet shoulder-width apart on the footplate.","Grasp the handles or sides of the machine for stability.","Push the footplate away from you by extending your legs, keeping your back against the backrest.","Pause for a moment at the fully extended position.","Slowly bend your knees and lower the footplate back towards you, returning to the starting position.","Repeat for the desired number of repetitions."]],["Smith Low Bar Squat","1434-RGLscZM","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Set up the smith machine with the barbell at a height that allows you to comfortably rest it on your upper back.","Stand with your feet shoulder-width apart, toes slightly turned outwards.","Step under the bar and position it across your upper back, resting it on your traps.","Grip the bar with your hands slightly wider than shoulder-width apart.","Unrack the bar by straightening your legs and stepping back from the rack.","Take a deep breath and brace your core.","Initiate the squat by pushing your hips back and bending your knees.","Lower your body until your thighs are parallel to the ground or slightly below.","Keep your chest up and your back straight throughout the movement.","Drive through your heels to stand back up, extending your hips and knees.","Repeat for the desired number of repetitions."]],["Smith Machine Bicep Curl","1683-zILLZ98","biceps","forearms",["forearms"],["Adjust the height of the smith machine bar to be at waist level.","Stand facing the smith machine with your feet shoulder-width apart.","Grasp the bar with an underhand grip, hands slightly wider than shoulder-width apart.","Keep your elbows close to your sides and your upper arms stationary.","Exhale and curl the bar up towards your shoulders, contracting your biceps.","Pause for a moment at the top of the movement, squeezing your biceps.","Inhale and slowly lower the bar back down to the starting position.","Repeat for the desired number of repetitions."]],["Smith Machine Decline Close Grip Bench Press","1625-yB9SvIF","triceps","chest",["chest","shoulders"],["Adjust the bench on the smith machine to a decline position.","Lie down on the bench with your feet firmly planted on the ground.","Grasp the barbell with a close grip, slightly narrower than shoulder-width apart.","Unrack the barbell and lower it slowly towards your chest, keeping your elbows close to your body.","Pause for a moment when the barbell is just above your chest.","Push the barbell back up to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Smith Machine Incline Tricep Extension","1752-o8aOcrz","triceps","shoulders",["shoulders"],["Adjust the seat of the smith machine so that the bar is at shoulder height.","Sit on the bench with your back against the pad and your feet flat on the ground.","Grasp the bar with an overhand grip, slightly wider than shoulder-width apart.","Extend your arms fully, lifting the bar off the rack and holding it directly above your chest.","Lower the bar slowly towards your forehead, keeping your elbows close to your head.","Pause for a moment at the bottom, then push the bar back up to the starting position.","Repeat for the desired number of repetitions."]],["Smith Machine Reverse Decline Close Grip Bench Press","1626-QyO6Uma","pectorals","triceps",["triceps","shoulders"],["Adjust the smith machine to a decline position.","Lie down on the bench with your feet secured under the foot pads.","Grasp the barbell with a close grip, slightly narrower than shoulder-width apart.","Unrack the barbell and lower it slowly towards your chest, keeping your elbows tucked in.","Pause for a moment at the bottom, then push the barbell back up to the starting position.","Repeat for the desired number of repetitions."]],["Smith Narrow Row","0761-JGKowMS","upper back","biceps",["biceps","rear deltoids"],["Adjust the seat height and position yourself on the machine with your feet flat on the floor.","Grasp the handles with an overhand grip, slightly narrower than shoulder-width apart.","Keep your back straight and your chest up as you pull the handles towards your body, squeezing your shoulder blades together.","Pause for a moment at the peak of the movement, then slowly release the handles back to the starting position.","Repeat for the desired number of repetitions."]],["Smith One Arm Row","1360-Q4DSJPC","upper back","biceps",["biceps","forearms"],["Adjust the height of the smith machine bar to waist level.","Stand facing the smith machine with your feet shoulder-width apart.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Grasp the bar with one hand using an overhand grip, with your palm facing down.","Keep your elbow close to your body and pull the bar towards your waist, squeezing your shoulder blades together.","Pause for a moment at the top of the movement, then slowly lower the bar back to the starting position.","Repeat for the desired number of repetitions, then switch to the other arm."]],["Smith One Leg Floor Calf Raise","1393-9GXrTE6","calves","hamstrings",["hamstrings","glutes"],["Position yourself on the floor under the smith machine bar, facing away from the machine.","Place the balls of your feet on a raised surface, such as a weight plate or block.","Position the smith machine bar across your lower legs, just above your ankles.","Hold onto the bar with your hands for stability.","Raise your heels off the ground by extending your ankles, lifting your body up.","Pause at the top of the movement, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Smith Rear Delt Row","0762-nFUwqG6","delts","trapezius",["trapezius","rhomboids","biceps"],["Adjust the seat height and position yourself on the machine with your chest against the pad and your feet flat on the ground.","Grasp the handles with an overhand grip, slightly wider than shoulder-width apart.","Keep your back straight and your core engaged as you pull the handles towards your chest, squeezing your shoulder blades together.","Pause for a moment at the top of the movement, then slowly release the handles back to the starting position.","Repeat for the desired number of repetitions."]],["Smith Reverse Calf Raises","0763-ywaNfuh","calves","hamstrings",["hamstrings"],["Adjust the smith machine bar to a height just below your shoulders.","Stand facing the bar with your feet hip-width apart and toes pointing forward.","Place the balls of your feet on the edge of a step or platform, with your heels hanging off.","Hold onto the bar for support, keeping your back straight and core engaged.","Raise your heels as high as possible, lifting your body weight onto the balls of your feet.","Pause for a moment at the top, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Smith Reverse Grip Bent Over Row","1361-aaxA3cm","upper back","biceps",["biceps","forearms"],["Set up the smith machine with the bar at hip height.","Stand facing the bar with your feet shoulder-width apart.","Bend your knees slightly and hinge forward at the hips, keeping your back straight.","Grasp the bar with an underhand grip, hands shoulder-width apart.","Pull the bar towards your lower chest, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower the bar back down to the starting position.","Repeat for the desired number of repetitions."]],["Smith Reverse-grip Press","0764-zK8Fu1W","pectorals","triceps",["triceps","shoulders"],["Adjust the height of the smith machine bar to chest level.","Stand facing the bar with your feet shoulder-width apart.","Grasp the bar with an overhand grip, hands slightly wider than shoulder-width apart.","Step back and position yourself with a slight bend in your knees.","Keep your chest up and core engaged throughout the exercise.","Lower the bar towards your chest, keeping your elbows tucked in.","Pause for a moment at the bottom, then push the bar back up to the starting position.","Repeat for the desired number of repetitions."]],["Smith Seated One Leg Calf Raise","1395-0S75mYG","calves","hamstrings",["hamstrings"],["Sit on the machine with your back against the pad and your feet on the footrest.","Place one leg on the footrest and keep the other leg off the footrest.","Using your calf muscles, raise your heel as high as possible.","Pause for a moment at the top, then slowly lower your heel back down to the starting position.","Repeat for the desired number of repetitions, then switch legs and repeat."]],["Smith Seated Shoulder Press","0765-xUwnBMT","delts","triceps",["triceps","upper back"],["Adjust the seat height so that the handles are at shoulder level.","Sit on the machine with your back against the pad and your feet flat on the floor.","Grasp the handles with an overhand grip and lift them off the supports, extending your arms fully.","Lower the handles down to shoulder level, keeping your elbows slightly bent.","Press the handles up overhead until your arms are fully extended.","Pause for a moment at the top, then slowly lower the handles back down to shoulder level.","Repeat for the desired number of repetitions."]],["Smith Seated Wrist Curl","1426-B6dAO1t","forearms","biceps",["biceps","brachialis"],["Sit on a bench in front of a Smith machine with your feet flat on the ground.","Grasp the barbell with an underhand grip, hands shoulder-width apart.","Rest your forearms on your thighs, allowing your wrists to hang off.","Slowly curl your wrists upward, bringing the barbell towards your forearms.","Pause for a moment at the top, then slowly lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Smith Shoulder Press","0766-903mzG8","delts","triceps",["triceps","upper back"],["Adjust the seat height and position yourself on the smith machine with your feet shoulder-width apart.","Grasp the bar with an overhand grip, slightly wider than shoulder-width apart.","Lift the bar off the rack and position it at shoulder level, with your elbows bent and palms facing forward.","Press the bar upward until your arms are fully extended overhead.","Pause for a moment at the top, then slowly lower the bar back down to shoulder level.","Repeat for the desired number of repetitions."]],["Smith Shrug","0767-OUQ0ZyW","traps","shoulders",["shoulders"],["Stand with your feet shoulder-width apart and your knees slightly bent.","Grasp the barbell with an overhand grip, hands slightly wider than shoulder-width apart.","Keep your arms straight and your shoulders relaxed.","Lift your shoulders up towards your ears, squeezing your traps at the top.","Hold for a moment, then slowly lower your shoulders back down to the starting position.","Repeat for the desired number of repetitions."]],["Smith Single Leg Split Squat","0768-wWFspEi","quads","glutes",["glutes","hamstrings"],["Stand in front of the smith machine with your feet shoulder-width apart.","Place one foot behind you on a bench or step, with your toes pointing forward.","Hold onto the smith machine bar for stability.","Bend your front knee and lower your body down into a lunge position, keeping your back straight.","Pause for a moment at the bottom, then push through your front heel to return to the starting position.","Repeat for the desired number of repetitions, then switch legs."]],["Smith Sprint Lunge","0769-HsjbB1z","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Set up the smith machine with the barbell at hip height.","Stand facing away from the machine with your feet shoulder-width apart.","Step back with your right foot and place it on the barbell, resting the top of your foot on the bar.","Bend your left knee and lower your body into a lunge position, keeping your back straight.","Push through your left heel to return to the starting position.","Repeat on the other side, stepping back with your left foot.","Continue alternating sides for the desired number of repetitions."]],["Smith Squat","0770-jFtipLl","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Set up the smith machine with the barbell at an appropriate height for your squat.","Stand with your feet shoulder-width apart, toes slightly turned out.","Position yourself under the barbell, resting it on your upper traps and shoulders.","Grip the barbell with a wide grip, slightly wider than shoulder-width apart.","Engage your core and unrack the barbell, stepping back to clear the rack.","Keeping your chest up and back straight, initiate the squat by bending at the hips and knees.","Lower your body until your thighs are parallel to the ground or slightly below.","Pause for a moment at the bottom, then drive through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Smith Standing Back Wrist Curl","0771-hfmQ0Tz","forearms","biceps",["biceps","triceps"],["Stand facing the smith machine with your feet shoulder-width apart.","Grasp the barbell with an overhand grip, hands shoulder-width apart.","Keep your back straight and your elbows close to your body.","Slowly curl your wrists upwards, bringing the barbell towards your body.","Pause for a moment at the top, then slowly lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Smith Standing Behind Head Military Press","0772-ht8xDrP","delts","triceps",["triceps","upper back"],["Adjust the seat height of the smith machine so that the bar is at shoulder level.","Stand with your feet shoulder-width apart and your knees slightly bent.","Grasp the bar with an overhand grip, slightly wider than shoulder-width apart.","Lift the bar off the rack and step back, maintaining a stable stance.","Position the bar behind your head, resting on your upper traps.","Keep your core engaged and your chest lifted throughout the exercise.","Press the bar overhead by extending your arms, fully straightening them.","Pause briefly at the top of the movement, then slowly lower the bar back down to the starting position.","Repeat for the desired number of repetitions."]],["Smith Standing Leg Calf Raise","0773-6MaEjVA","calves","hamstrings",["hamstrings","glutes"],["Adjust the smith machine bar to a height that allows you to stand with your feet flat on the ground and your shoulders under the bar.","Position yourself under the bar with your feet shoulder-width apart and your toes pointing forward.","Place your hands on the bar for stability.","Engage your calves and slowly raise your heels off the ground, lifting your body up onto your toes.","Pause for a moment at the top, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Smith Standing Military Press","0774-jjUPrze","delts","triceps",["triceps","upper back"],["Stand with your feet shoulder-width apart and your knees slightly bent.","Grasp the barbell with an overhand grip, slightly wider than shoulder-width apart.","Lift the barbell off the rack and bring it down to shoulder level, with your palms facing forward.","Press the barbell upward until your arms are fully extended overhead.","Pause for a moment at the top, then slowly lower the barbell back down to shoulder level.","Repeat for the desired number of repetitions."]],["Smith Sumo Squat","3142-dzz6BiV","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Set up the smith machine with the barbell at hip height.","Stand with your feet wider than shoulder-width apart, toes pointing outwards.","Position yourself under the barbell, resting it on your upper back and shoulders.","Engage your core and keep your chest up as you lower your body down into a squat position, pushing your hips back and bending your knees.","Lower yourself until your thighs are parallel to the ground, or as low as you can comfortably go.","Pause for a moment at the bottom, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Smith Toe Raise","1396-Y4QlY8z","calves","ankles",["ankles","shins"],["Adjust the smith machine bar to a height that allows you to comfortably stand with your feet flat on the ground.","Position yourself under the bar with your shoulders directly below it and your feet shoulder-width apart.","Place the balls of your feet on a raised platform or weight plates, with your heels hanging off the edge.","Grasp the bar with an overhand grip, slightly wider than shoulder-width apart.","Engage your core and keep your back straight throughout the exercise.","Slowly raise your heels as high as possible, lifting your body weight onto the balls of your feet.","Pause for a moment at the top, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Smith Upright Row","0775-1DN3iz4","delts","traps",["traps","biceps"],["Stand with your feet shoulder-width apart, facing the smith machine.","Grasp the barbell with an overhand grip, hands slightly wider than shoulder-width apart.","Keep your back straight and your core engaged.","Pull the barbell up towards your chin, leading with your elbows.","Pause for a moment at the top, then slowly lower the barbell back down to the starting position.","Repeat for the desired number of repetitions."]],["Smith Wide Grip Bench Press","1308-zoOvPcx","pectorals","triceps",["triceps","shoulders"],["Adjust the bench to a comfortable position on the smith machine.","Lie down on the bench with your feet flat on the ground.","Grasp the barbell with a wide grip, slightly wider than shoulder-width apart.","Unrack the barbell and lower it slowly towards your chest, keeping your elbows out to the sides.","Pause for a moment when the barbell touches your chest.","Push the barbell back up to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Smith Wide Grip Decline Bench Press","1309-wi2H9QX","pectorals","triceps",["triceps","shoulders"],["Adjust the decline bench to the desired angle.","Lie down on the bench with your feet secured under the foot pads.","Grasp the barbell with a wide grip, slightly wider than shoulder-width apart.","Unrack the barbell and lower it slowly towards your chest, keeping your elbows pointed outwards.","Pause for a moment when the barbell touches your chest.","Push the barbell back up to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Snatch Pull","0776-dG5Smob","quads","hamstrings",["hamstrings","glutes","calves"],["Stand with your feet shoulder-width apart and the barbell on the ground in front of you.","Bend your knees and hinge at the hips to lower into a squat position, gripping the barbell with an overhand grip.","Keep your back straight and chest up as you drive through your heels to lift the barbell off the ground, extending your hips and knees.","As the barbell reaches hip level, explosively pull it upwards, shrugging your shoulders and pulling your elbows high and to the sides.","As the barbell reaches its highest point, quickly drop underneath it, pulling yourself into a deep squat position.","Catch the barbell overhead with your arms fully extended and your knees bent.","Stand up by extending your hips and knees, keeping the barbell overhead.","Lower the barbell back down to the starting position by reversing the movement.","Repeat for the desired number of repetitions."]],["Spell Caster","0777-p9cCe2r","abs","obliques",["obliques","lower back"],["Stand with your feet shoulder-width apart and hold a dumbbell in one hand.","Bend your knees slightly and hinge forward at the waist, keeping your back straight.","Extend your arm with the dumbbell towards the opposite foot, rotating your torso as you do so.","Return to the starting position and repeat on the other side.","Continue alternating sides for the desired number of repetitions."]],["Sphinx","1362-DIVyqrU","spine","glutes",["glutes","hamstrings"],["Lie face down on the ground with your forearms flat on the floor, elbows directly under your shoulders.","Engage your core and lift your chest off the ground, keeping your forearms and toes on the floor.","Hold this position for a few seconds, making sure to keep your neck in a neutral position.","Slowly lower your chest back down to the starting position.","Repeat for the desired number of repetitions."]],["Spider Crawl Push Up","0778-P9GFBME","glutes","core",["core","chest","shoulders"],["Start in a push-up position with your hands slightly wider than shoulder-width apart and your feet together.","Bring your right knee towards your right elbow, keeping it off the ground.","As you bring your right knee back, simultaneously lower your body towards the ground by bending your elbows.","Push back up to the starting position and repeat with your left knee towards your left elbow.","Continue alternating sides for the desired number of repetitions."]],["Spine Stretch","1363-JbC2iaV","spine","hamstrings",["hamstrings","glutes"],["Sit on the ground with your legs extended in front of you.","Place your hands on the ground behind you, fingers pointing towards your body.","Engage your core and slowly lean back, keeping your back straight.","Continue leaning back until you feel a stretch in your spine.","Hold the stretch for a few seconds, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Spine Twist","2329-2jl9K55","abs","obliques",["obliques","lower back"],["Sit on the ground with your legs extended in front of you.","Bend your knees and place your feet flat on the ground, hip-width apart.","Place your hands behind your head with your elbows pointing outwards.","Engage your abs and slowly twist your torso to the right, bringing your right elbow towards your left knee.","Pause for a moment at the end of the twist, then slowly return to the starting position.","Repeat the twist to the left side, bringing your left elbow towards your right knee.","Continue alternating sides for the desired number of repetitions."]],["Split Squats","2368-9E25EOx","quads","glutes",["glutes","hamstrings","calves"],["Stand with your feet shoulder-width apart.","Take a step forward with one foot and place it about two feet in front of the other foot.","Lower your body by bending your knees and hips, keeping your back straight.","Continue lowering until your front thigh is parallel to the ground, and your back knee is hovering just above the ground.","Pause for a moment, then push through your front heel to return to the starting position.","Repeat for the desired number of repetitions, then switch legs and repeat."]],["Squat Jerk","0786-IMRsOCn","quads","glutes",["glutes","hamstrings","calves","core"],["Start with the barbell resting on your shoulders, with your feet shoulder-width apart.","Lower your body into a squat position, keeping your chest up and your knees tracking over your toes.","As you reach the bottom of the squat, explosively drive through your legs and push the barbell overhead.","As the barbell reaches its peak, quickly drop into a split position, with one foot forward and one foot back.","Catch the barbell overhead with your arms fully extended and your back knee slightly touching the ground.","Stand up from the split position, bringing your feet back together.","Lower the barbell back to your shoulders and repeat for the desired number of repetitions."]],["Squat On Bosu Ball","1705-T2fA5Ir","quads","glutes",["glutes","hamstrings","calves"],["Place the bosu ball on the ground with the flat side up.","Stand with your feet shoulder-width apart and position yourself on top of the bosu ball.","Lower your body down by bending your knees and hips, as if sitting back into a chair.","Keep your chest up and your weight on your heels.","Lower yourself until your thighs are parallel to the ground.","Pause for a moment, then push through your heels to return to the starting position.","Repeat for the desired number of repetitions."]],["Squat To Overhead Reach","1685-QChZi3x","quads","glutes",["glutes","hamstrings","core"],["Stand with your feet shoulder-width apart and toes slightly turned out.","Lower your body down into a squat position by bending your knees and pushing your hips back.","As you come up from the squat, extend your arms overhead, reaching towards the ceiling.","Return to the starting position by lowering your arms and bending your knees to squat down again.","Repeat for the desired number of repetitions."]],["Squat To Overhead Reach With Twist","1686-5BZHW9s","quads","glutes",["glutes","hamstrings","core"],["Stand with your feet shoulder-width apart and toes slightly turned out.","Lower your body into a squat position by bending your knees and pushing your hips back.","As you come up from the squat, raise your arms overhead and twist your torso to one side.","Return to the starting position and repeat the squat, this time twisting your torso to the opposite side.","Continue alternating sides with each squat repetition."]],["Stability Ball Crunch (Full Range Hands Behind Head)","2297-Gn5FwYT","abs","hip flexors",["hip flexors"],["Sit on the stability ball with your feet flat on the ground and your knees bent at a 90-degree angle.","Place your hands behind your head with your elbows pointing outwards.","Engaging your abs, slowly curl your upper body forward, bringing your chest towards your knees.","Pause for a moment at the top, then slowly lower your upper body back to the starting position.","Repeat for the desired number of repetitions."]],["Stalder Press","3291-zd4P4B2","triceps","shoulders",["shoulders","core"],["Start by standing with your feet shoulder-width apart and your arms extended overhead.","Bend your knees slightly and engage your core.","Lower your body down into a squat position while keeping your arms extended overhead.","As you squat down, press your arms down towards the ground, engaging your triceps.","Pause for a moment at the bottom of the squat, then push through your heels to stand back up while simultaneously raising your arms back overhead.","Repeat for the desired number of repetitions."]],["Standing Archer","3669-JF8AkMX","upper back","shoulders",["shoulders","biceps","forearms"],["Stand with your feet shoulder-width apart and your knees slightly bent.","Extend your arms straight out in front of you at shoulder height, parallel to the ground.","Rotate your torso to the right,
