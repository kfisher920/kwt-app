ntrol.","Once you are standing completely straight up, lower the bar by pushing the hips back, only slightly bending the knees, unlike when squatting. Tip: Take a deep breath at the start of the movement and keep your chest up. Hold your breath as you lower and exhale as you complete the movement.","Repeat for the recommended amount of repetitions."]],["Romanian Deadlift from Deficit","Romanian_Deadlift_from_Deficit/0.jpg","hamstrings",["forearms","glutes","lower back","traps"],["Begin standing while holding a bar at arm's length in front of you. You can stand on a raised platform to increase the range of motion.","Begin by flexing the knees slightly, and then flex at the hip, moving your butt back as far as possible, lowering the torso as far as flexibility allows. The back should remain in absolute extension at all times, and the bar should remain in contact with the legs. If done properly, there should be heavy tension felt in the hamstrings.","Reverse the motion to return to the starting position."]],["Rope Climb","Rope_Climb/0.jpg","lats",["biceps","forearms","upper back","delts"],["Grab the rope with both hands above your head. Pull down on the rope as you take a small jump.","Wrap the rope around one leg, using your feet to pinch the rope. Reach up as high as possible with your arms, gripping the rope tightly.","Release the rope from your feet as you pull yourself up with your arms, bringing your knees towards your chest.","Resecure your feet on the rope, and then stand up to take another high hold on the rope. Continue until you reach the top of the rope.","To lower yourself, loosen the grip of your feet on the rope as you slide down using a hand over hand motion."]],["Rope Crunch","Rope_Crunch/0.jpg","abs",[],["Kneel 1-2 feet in front of a cable system with a rope attached.","After selecting an appropriate weight, grasp the rope with both hands reaching overhead. Your torso should be upright in the starting position.","To begin, flex at the spine, attempting to bring your rib cage to your legs as you pull the cable down.","Pause at the bottom of the motion, and then slowly return to the starting position.","These can be done with twists or to the side to hit the obliques."]],["Rope Jumping","Rope_Jumping/0.jpg","quadriceps",["calves","hamstrings"],["Hold an end of the rope in each hand. Position the rope behind you on the ground. Raise your arms up and turn the rope over your head bringing it down in front of you. When it reaches the ground, jump over it. Find a good turning pace that can be maintained. Different speeds and techniques can be used to introduce variation.","Rope jumping is exciting, challenges your coordination, and requires a lot of energy. A 150 lb person will burn about 350 calories jumping rope for 30 minutes, compared to over 450 calories running."]],["Rope Straight-Arm Pulldown","Rope_Straight-Arm_Pulldown/0.jpg","lats",[],["Attach a rope to a high pulley and make your weight selection. Stand a couple feet back from the pulley with your feet staggered and take the rope with both hands. Lean forward from the hip, keeping your back straight, with your arms extended up in front of you. This will be your starting position.","Keeping your arms straight, extend the shoulder to pull the rope down to your thighs.","Pause at the bottom of the motion, squeezing your lats.","Return to the starting position without allowing the weight to fully rest on the stack."]],["Round The World Shoulder Stretch","Round_The_World_Shoulder_Stretch/0.jpg","delts",["biceps","pectorals"],["Stand up straight with your legs together, holding a bodybar or broomstick.","Hold the pole behind your hips with a wider than shoulder width grip. Your palms should be down and your thumbs facing out.","Slowly lift your arms up behind your head. Don't force it if it gets hard to lift further."]],["Rowing, Stationary","Rowing_Stationary/0.jpg","quadriceps",["biceps","calves","glutes","hamstrings","lower back","upper back"],["To begin, seat yourself on the rower. Make sure that your heels are resting comfortably against the base of the foot pedals and that the straps are secured. Select the program that you wish to use, if applicable. Sit up straight and bend forward at the hips.","There are three phases of movement when using a rower. The first phase is when you come forward on the rower. Your knees are bent and against your chest. Your upper body is leaning slightly forward while still maintaining good posture. Next, push against the foot pedals and extend your legs while bringing your hands to your upper abdominal area, squeezing your shoulders back as you do so. To avoid straining your back, use primarily your leg and hip muscles.","The recovery phase simply involves straightening your arms, bending the knees, and bringing your body forward again as you transition back into the first phase."]],["Runner's Stretch","Runners_Stretch/0.jpg","hamstrings",["calves"],["It's easiest to get into this stretch if you start standing up, put one leg behind you, and slowly lower your torso down to the floor.","Keep the front heel on the floor (if it lifts up, scoot your other leg further back).","Place your hands on either side of your front leg. To get more out of this stretch, push your butt up toward the ceiling, and then gradually lower it back toward the floor. You'll Stretch the hip flexor of the back leg and the hamstring and buttocks of the front."]],["Running, Treadmill","Running_Treadmill/0.jpg","quadriceps",["calves","glutes","hamstrings"],["To begin, step onto the treadmill and select the desired option from the menu. Most treadmills have a manual setting, or you can select a program to run. Typically, you can enter your age and weight to estimate the amount of calories burned during exercise. Elevation can be adjusted to change the intensity of the workout.","Treadmills offer convenience, cardiovascular benefits, and usually have less impact than running outside. A 150 lb person will burn over 450 calories running 8 miles per hour for 30 minutes. Maintain proper posture as you run, and only hold onto the handles when necessary, such as when dismounting or checking your heart rate."]],["Russian Twist","Russian_Twist/0.jpg","abs",["lower back"],["Lie down on the floor placing your feet either under something that will not move or by having a partner hold them. Your legs should be bent at the knees.","Elevate your upper body so that it creates an imaginary V-shape with your thighs. Your arms should be fully extended in front of you perpendicular to your torso and with the hands clasped. This is the starting position.","Twist your torso to the right side until your arms are parallel with the floor while breathing out.","Hold the contraction for a second and move back to the starting position while breathing out. Now move to the opposite side performing the same techniques you applied to the right side.","Repeat for the recommended amount of repetitions."]],["Sandbag Load","Sandbag_Load/0.jpg","quadriceps",["abs","biceps","calves","forearms","glutes","hamstrings","lower back","upper back","delts","traps"],["To load sandbags or other objects, begin with the implements placed a distance from the loading platform, typically 50 feet.","Begin by lifting the sandbag. Sandbags are extremely awkward, and the manner of lifting them can vary depending on the particular sandbag used. Reach as far around it as possible, extending through the hips and knees to pull it up high. Shouldering is usually not allowed.","Move as quickly as possible to the platform, and load it, extending through your hips, knees, and ankles to get it as high as possible. Place it onto the platform, ensuring it doesn't fall off.","Return to the starting position to retrieve the next sandbag, and repeat until the event is completed."]],["Scapular Pull-Up","Scapular_Pull-Up/0.jpg","traps",["lats","upper back"],["Take a pronated grip on a pull-up bar.","From a hanging position, raise yourself a few inches without using your arms. Do this by depressing your shoulder girdle in a reverse shrugging motion.","Pause at the completion of the movement, and then slowly return to the starting position before performing more repetitions."]],["Scissor Kick","Scissor_Kick/0.jpg","abs",[],["To begin, lie down with your back pressed against the floor or on an exercise mat (optional). Your arms should be fully extended to the sides with your palms facing down. Note: The arms should be stationary the entire time.","With a slight bend at the knees, lift your legs up so that your heels are about 6 inches off the ground. This is the starting position.","Now lift your left leg up to about a 45 degree angle while your right leg is lowered until the heel is about 2-3 inches from the ground.","Switch movements by raising your right leg up and lowering your left leg. Remember to breathe while performing this exercise.","Repeat for the recommended amount of repetitions."]],["Scissors Jump","Scissors_Jump/0.jpg","quadriceps",["glutes","hamstrings"],["Assume a lunge stance position with one foot forward with the knee bent, and the rear knee nearly touching the ground.","Ensure that the front knee is over the midline of the foot. Extending through both legs, jump as high as possible, swinging your arms to gain lift.","As you jump as high as you can, switch the position of your legs, moving your front leg to the back and the rear leg to the front.","As you land, absorb the impact through the legs by adopting the lunge position, and repeat."]],["Seated Band Hamstring Curl","Seated_Band_Hamstring_Curl/0.jpg","hamstrings",[],["Secure a band close to the ground and place a bench a couple feet away from it.","Seat yourself on the bench and secure the band behind your ankles, beginning with your legs straight. This will be your starting position.","Flex the knees, bringing your feet towards the bench. You may need to lean back slightly to keep your feet from striking the floor.","Pause at the completion of the movement, and then slowly return to the starting position."]],["Seated Barbell Military Press","Seated_Barbell_Military_Press/0.jpg","delts",["triceps"],["Sit on a Military Press Bench with a bar behind your head and either have a spotter give you the bar (better on the rotator cuff this way) or pick it up yourself carefully with a pronated grip (palms facing forward). Tip: Your grip should be wider than shoulder width and it should create a 90-degree angle between the forearm and the upper arm as the barbell goes down.","Once you pick up the barbell with the correct grip length, lift the bar up over your head by locking your arms. Hold at about shoulder level and slightly in front of your head. This is your starting position.","Lower the bar down to the collarbone slowly as you inhale.","Lift the bar back up to the starting position as you exhale.","Repeat for the recommended amount of repetitions."]],["Seated Barbell Twist","Seated_Barbell_Twist/0.jpg","abs",[],["Start out by sitting at the end of a flat bench with a barbell placed on top of your thighs. Your feet should be shoulder width apart from each other.","Grip the bar with your palms facing down and make sure your hands are wider than shoulder width apart from each other. Begin to lift the barbell up over your head until your arms are fully extended.","Now lower the barbell behind your head until it is resting along the base of your neck. This is the starting position.","While keeping your feet and head stationary, move your waist from side to side so that your oblique muscles feel the contraction. Only move from side to side as far as your waist will allow you to go. Stretching or moving too far can cause an injury to occur. Tip: Use a slow and controlled motion.","Remember to breathe out while twisting your body to the side and in when moving back to the starting position.","Repeat for the recommended amount of repetitions."]],["Seated Bent-Over One-Arm Dumbbell Triceps Extension","Seated_Bent-Over_One-Arm_Dumbbell_Triceps_Extension/0.jpg","triceps",[],["Sit down at the end of a flat bench with a dumbbell in one arm using a neutral grip (palms of the hand facing you).","Bend your knees slightly and bring your torso forward, by bending at the waist, while keeping the back straight until it is almost parallel to the floor. Make sure that you keep the head up.","The upper arm with the dumbbell should be close to the torso and aligned with it (lifted up until it is parallel to the floor while the forearms are pointing towards the floor as the hands hold the weights). Tip: There should be a 90-degree angle between the forearms and the upper arm. This is your starting position.","Keeping the upper arm stationary, use the triceps to lift the weight as you exhale until the forearm is parallel to the floor and the whole arm is extended. Like many other arm exercises, only the forearm moves.","After a second contraction at the top, slowly lower the dumbbell back to the starting position as you inhale.","Repeat the movement for the prescribed amount of repetitions.","Switch arms and repeat the exercise."]],["Seated Bent-Over Rear Delt Raise","Seated_Bent-Over_Rear_Delt_Raise/0.jpg","delts",[],["Place a couple of dumbbells looking forward in front of a flat bench.","Sit on the end of the bench with your legs together and the dumbbells behind your calves.","Bend at the waist while keeping the back straight in order to pick up the dumbbells. The palms of your hands should be facing each other as you pick them. This will be your starting position.","Keeping your torso forward and stationary, and the arms slightly bent at the elbows, lift the dumbbells straight to the side until both arms are parallel to the floor. Exhale as you lift the weights. (Note: avoid swinging the torso or bringing the arms back as opposed to the side.)","After a one second contraction at the top, slowly lower the dumbbells back to the starting position.","Repeat for the recommended amount of repetitions."]],["Seated Bent-Over Two-Arm Dumbbell Triceps Extension","Seated_Bent-Over_Two-Arm_Dumbbell_Triceps_Extension/0.jpg","triceps",[],["Sit down at the end of a flat bench with a dumbbell in both arms using a neutral grip (palms of the hand facing you).","Bend your knees slightly and bring your torso forward, by bending at the waist, while keeping the back straight until it is almost parallel to the floor. Make sure that you keep the head up.","The upper arms with the dumbbells should be close to the torso and aligned with it (lifted up until they are parallel to the floor while the forearms are pointing towards the floor as the hands hold the weights). Tip: There should be a 90-degree angle between the forearms and the upper arm. This is your starting position.","Keeping the upper arms stationary, use the triceps to lift the weight as you exhale until the forearms are parallel to the floor and the whole arm is extended. Like many other arm exercises, only the forearm moves.","After a second contraction at the top, slowly lower the dumbbells back to the starting position as you inhale.","Repeat the movement for the prescribed amount of repetitions."]],["Seated Biceps","Seated_Biceps/0.jpg","biceps",["pectorals","delts"],["Sit on the floor with your knees bent and your partner standing behind you. Extend your arms straight behind you with your palms facing each other. Your partner will hold your wrists for you. This will be the starting position.","Attempt to flex your elbows, while your partner prevents any actual movement.","After 10-20 seconds, relax your arms while your partner gently pulls your wrists up to stretch your biceps. Be sure to let your partner know when the stretch is appropriate to prevent injury or overstretching."]],["Seated Cable Rows","Seated_Cable_Rows/0.jpg","upper back",["biceps","lats","delts"],["For this exercise you will need access to a low pulley row machine with a V-bar. Note: The V-bar will enable you to have a neutral grip where the palms of your hands face each other. To get into the starting position, first sit down on the machine and place your feet on the front platform or crossbar provided making sure that your knees are slightly bent and not locked.","Lean over as you keep the natural alignment of your back and grab the V-bar handles.","With your arms extended pull back until your torso is at a 90-degree angle from your legs. Your back should be slightly arched and your chest should be sticking out. You should be feeling a nice stretch on your lats as you hold the bar in front of you. This is the starting position of the exercise.","Keeping the torso stationary, pull the handles back towards your torso while keeping the arms close to it until you touch the abdominals. Breathe out as you perform that movement. At that point you should be squeezing your back muscles hard. Hold that contraction for a second and slowly go back to the original position while breathing in.","Repeat for the recommended amount of repetitions."]],["Seated Cable Shoulder Press","Seated_Cable_Shoulder_Press/0.jpg","delts",["triceps"],["Adjust the weight to an appropriate amount and be seated, grasping the handles. Your upper arms should be about 90 degrees to the body, with your head and chest up. The elbows should also be bent to about 90 degrees. This will be your starting position.","Begin by extending through the elbow, pressing the handles together above your head.","After pausing at the top, return the handles to the starting position. Ensure that you maintain tension on the cables.","You can also execute this movement with your back off the pad and alternate hands."]],["Seated Calf Raise","Seated_Calf_Raise/0.jpg","calves",[],["Sit on the machine and place your toes on the lower portion of the platform provided with the heels extending off. Choose the toe positioning of your choice (forward, in, or out) as per the beginning of this chapter.","Place your lower thighs under the lever pad, which will need to be adjusted according to the height of your thighs. Now place your hands on top of the lever pad in order to prevent it from slipping forward.","Lift the lever slightly by pushing your heels up and release the safety bar. This will be your starting position.","Slowly lower your heels by bending at the ankles until the calves are fully stretched. Inhale as you perform this movement.","Raise the heels by extending the ankles as high as possible as you contract the calves and breathe out. Hold the top contraction for a second.","Repeat for the recommended amount of repetitions."]],["Seated Calf Stretch","Seated_Calf_Stretch/0.jpg","calves",["hamstrings","lower back"],["Sit up straight on an exercise mat.","Bend one knee and put that foot on the floor to stabilize the torso.","Straighten your other leg and flex your ankle.","Using a band, towel, or your hand if you can reach, pull the toes toward you. Hold for 10 to 20 seconds, then switch sides."]],["Seated Close-Grip Concentration Barbell Curl","Seated_Close-Grip_Concentration_Barbell_Curl/0.jpg","biceps",[],["Sit down on a flat bench with a barbell or E-Z Bar in front of you in between your legs. Your legs should be spread with the knees bent and the feet on the floor.","Use your arms to pick the barbell up and place the back of your upper arms on top of your inner thighs (around three and a half inches away from the front of the knee). A supinated grip closer than shoulder width is needed to perform this exercise. Tip: Your arm should be extended at arms length and the barbell should be above the floor. This will be your starting position.","While holding the upper arms stationary, curl the weights forward while contracting the biceps as you breathe out. Only the forearms should move. Continue the movement until your biceps are fully contracted and the dumbbells are at shoulder level. Hold the contracted position for a second as you squeeze the biceps.","Slowly begin to bring the barbell back to starting position as your breathe in. Tip: Avoid swinging motions at any time.","Repeat for the recommended amount of repetitions."]],["Seated Dumbbell Curl","Seated_Dumbbell_Curl/0.jpg","biceps",[],["Sit on a flat bench with a dumbbell on each hand being held at arms length. The elbows should be close to the torso.","Rotate the palms of the hands so that they are facing your torso. This will be your starting position.","While holding the upper arm stationary, curl the weights and start twisting the wrists once the dumbbells pass your thighs so that the palms of your hands face forward at the end of the movement. Make sure that you contract the biceps as you breathe out and make sure that only the forearms move. Continue the movement until your biceps are fully contracted and the dumbbells are at shoulder level. Hold the contracted position for a second as you squeeze the biceps.","Slowly begin to bring the dumbbells back to the starting position as your breathe in and as you rotate the wrists back to a neutral grip.","Repeat for the recommended amount of repetitions."]],["Seated Dumbbell Inner Biceps Curl","Seated_Dumbbell_Inner_Biceps_Curl/0.jpg","biceps",[],["Sit on the end of a flat bench with a dumbbell in each hand being held at arms length. The elbows should be close to the torso.","Rotate the palms of the hands so that they are facing inward in a neutral position. This will be your starting position.","While holding the upper arms stationary, curl the dumbbells out and up, turning the palms out as you lift and keeping your forearms in line with your outer deltoids. Tips:","Only the forearms should move. Continue the movement until your biceps are fully contracted and the dumbbells are at shoulder level. Hold the contracted position for a second as you squeeze the biceps.","Slowly begin to bring the dumbbells back to the starting position as your breathe in. Remember to rotate your arms as you lower the dumbbells so that you can switch back to a neutral grip.","Repeat for the recommended amount of repetitions."]],["Seated Dumbbell Palms-Down Wrist Curl","Seated_Dumbbell_Palms-Down_Wrist_Curl/0.jpg","forearms",[],["Start out by placing two dumbbells on the floor in front of a flat bench.","Sit down on the edge of the flat bench with your legs at about shoulder width apart. Make sure to keep your feet on the floor.","Use your arms to grab both of the dumbbells and bring them up so that your forearms are resting against your thighs with the palms of the hands facing down. Your wrists should be hanging over the edge of your thighs.","Start out by curling your wrist upwards and exhaling.","Slowly lower your wrists back down to the starting position while inhaling. Make sure to inhale during this part of the exercise. Tip: Your forearms should be stationary as your wrist is the only movement needed to perform this exercise.","Repeat for the recommended amount of repetitions.","When finished, simply lower the dumbbells to the floor."]],["Seated Dumbbell Palms-Up Wrist Curl","Seated_Dumbbell_Palms-Up_Wrist_Curl/0.jpg","forearms",[],["Start out by placing two dumbbells on the floor in front of a flat bench.","Sit down on the edge of the flat bench with your legs at about shoulder width apart. Make sure to keep your feet on the floor.","Use your arms to grab both of the dumbbells and bring them up so that your forearms are resting against your thighs with the palms of the hands facing up. Your wrists should be hanging over the edge of your thighs.","Start out by curling your wrist upwards and exhaling.","Slowly lower your wrists back down to the starting position while inhaling. Make sure to inhale during this part of the exercise. Tip: Your forearms should be stationary as your wrist is the only movement needed to perform this exercise.","Repeat for the recommended amount of repetitions.","When finished, simply lower the dumbbells to the floor."]],["Seated Dumbbell Press","Seated_Dumbbell_Press/0.jpg","delts",["triceps"],["Grab a couple of dumbbells and sit on a military press bench or a utility bench that has a back support on it as you place the dumbbells upright on top of your thighs.","Clean the dumbbells up one at a time by using your thighs to bring the dumbbells up to shoulder height at each side.","Rotate the wrists so that the palms of your hands are facing forward. This is your starting position.","As you exhale, push the dumbbells up until they touch at the top.","After a second pause, slowly come down back to the starting position as you inhale.","Repeat for the recommended amount of repetitions."]],["Seated Flat Bench Leg Pull-In","Seated_Flat_Bench_Leg_Pull-In/0.jpg","abs",[],["Sit on a bench with the legs stretched out in front of you slightly below parallel and your arms holding on to the sides of the bench. Your torso should be leaning backwards around a 45-degree angle from the bench. This will be your starting position.","Bring the knees in toward you as you move your torso closer to them at the same time. Breathe out as you perform this movement.","After a second pause, go back to the starting position as you inhale.","Repeat for the recommended amount of repetitions."]],["Seated Floor Hamstring Stretch","Seated_Floor_Hamstring_Stretch/0.jpg","hamstrings",["calves"],["Sit on a mat with your right leg extended in front of you and your left leg bent with your foot against your right inner thigh.","Lean forward from your hips and reach for your ankle until you feel a stretch in your hamstring. Hold for 15 seconds, then repeat for your other side."]],["Seated Front Deltoid","Seated_Front_Deltoid/0.jpg","delts",["pectorals"],["Sit upright on the floor with your legs bent, your partner standing behind you. Stick your arms straight out to your sides, with your palms facing the ground. Attempt to move them as far behind you as possible, as your assistant holds your wrists. This will be your starting position.","Keeping your elbows straight, attempt to move your arms to the front, with your partner gently restraining you to prevent any actual movement for 10-20 seconds.","Now, relax your muscles and allow your partner to gently increase the stretch on the shoulders and chest. Hold for 10 to 20 seconds."]],["Seated Glute","Seated_Glute/0.jpg","glutes",["adductors"],["In a seated position with your knees bent, cross one ankle over the opposite knee. Your partner will stand behind you. Now, lean forward as your partner braces your shoulders with their hands. This will be your starting position.","Attempt to push your torso back for 10-20 seconds, as your partner prevents any actual movement of your torso.","Now relax your muscles as your partner increases the stretch by gently pushing your torso forward for 10-20 seconds."]],["Seated Good Mornings","Seated_Good_Mornings/0.jpg","lower back",["glutes"],["Set up a box in a power rack. The pins should be set at an appropriate height. Begin by stepping under the bar and placing it across the back of the shoulders, not on top of your traps. Squeeze your shoulder blades together and rotate your elbows forward, attempting to bend the bar across your shoulders.","Remove the bar from the rack, creating a tight arch in your lower back. Keep your head facing forward. With your back, shoulders, and core tight, push your knees and butt out and you begin your descent. Sit back with your hips until you are seated on the box. This will be your starting position.","Keeping the bar tight, bend forward at the hips as much as possible. If you set the pins to what would be parallel, you not only have a safety if you fail, but know when to stop.","Pause just above the pins and reverse the motion until your torso it upright."]],["Seated Hamstring","Seated_Hamstring/0.jpg","hamstrings",["calves"],["In a seated position with your legs extended, have your partner stand behind you. Now, lean forward as your partner braces your shoulders with their hands. This will be your starting position.","Attempt to push your torso back for 10-20 seconds, as your partner prevents any actual movement of your torso.","Now relax your muscles as your partner increases the stretch by gently pushing your torso forward for 10-20 seconds."]],["Seated Hamstring and Calf Stretch","Seated_Hamstring_and_Calf_Stretch/0.jpg","hamstrings",["calves"],["Loop a belt, rope, or band around one foot. Sit down with both legs extended . This will be your starting position.","Leaning forward slightly, pull on the belt to draw the toes of your foot back. Hold this position for 10-20 seconds and then repeat with the other leg."]],["Seated Head Harness Neck Resistance","Seated_Head_Harness_Neck_Resistance/0.jpg","traps",[],["Place a neck strap on the floor at the end of a flat bench. Once you have selected the weights, sit at the end of the flat bench with your feet wider than shoulder width apart from each other. Your toes should be pointed out.","Slowly move your torso forward until it is almost parallel with the floor. Using both hands, securely position the neck strap around your head. Tip: Make sure the weights are still lying on the floor to prevent any strain on the neck. Now grab the weight with both hands while elevating your torso back until it is almost perpendicular to the floor. Note: Your head and torso needs to be slightly tilted forward to perform this exercise.","Now place both hands on top of your knees. This is the starting position.","Slowly lower your neck down until your chin touches the upper part of your chest while breathing in.","While exhaling, bring your neck back to the starting position.","Repeat for the recommended amount of repetitions."]],["Seated Leg Curl","Seated_Leg_Curl/0.jpg","hamstrings",[],["Adjust the machine lever to fit your height and sit on the machine with your back against the back support pad.","Place the back of lower leg on top of padded lever (just a few inches under the calves) and secure the lap pad against your thighs, just above the knees. Then grasp the side handles on the machine as you point your toes straight (or you can also use any of the other two stances) and ensure that the legs are fully straight right in front of you. This will be your starting position.","As you exhale, pull the machine lever as far as possible to the back of your thighs by flexing at the knees. Keep your torso stationary at all times. Hold the contracted position for a second.","Slowly return to the starting position as you breathe in.","Repeat for the recommended amount of repetitions."]],["Seated Leg Tucks","Seated_Leg_Tucks/0.jpg","abs",[],["Sit on a bench with the legs stretched out in front of you slightly below parallel and your arms holding on to the sides of the bench. Your torso should be leaning backwards around a 45-degree angle from the bench. This will be your starting position.","Bring the knees in toward you as you move your torso closer to them at the same time. Breathe out as you perform this movement.","After a second pause, go back to the starting position as you inhale.","Repeat for the recommended amount of repetitions."]],["Seated One-Arm Dumbbell Palms-Down Wrist Curl","Seated_One-Arm_Dumbbell_Palms-Down_Wrist_Curl/0.jpg","forearms",[],["Sit on a flat bench with a dumbbell in your right hand.","Place your feet flat on the floor, at a distance that is slightly wider than shoulder width apart.","Lean forward and place your right forearm on top of your upper right thigh with your palm down. Tip: Make sure that the back of the wrist lies on top of your knees. This will be your starting position.","Lower the dumbbell as far as possible as you keep a tight grip on the dumbbell. Inhale as you perform this movement.","Now curl the dumbbell as high as possible as you contract the forearms and as you exhale. Keep the contraction for a second before you lower again. Tip: The only movement should happen at the wrist.","Perform for the recommended amount of repetitions, switch arms and repeat the movement."]],["Seated One-Arm Dumbbell Palms-Up Wrist Curl","Seated_One-Arm_Dumbbell_Palms-Up_Wrist_Curl/0.jpg","forearms",[],["Sit on a flat bench with a dumbbell in your right hand.","Place your feet flat on the floor, at a distance that is slightly wider than shoulder width apart.","Lean forward and place your right forearm on top of your upper right thigh with your palm up. Tip: Make sure that the front of the wrist lies on top of your knees. This will be your starting position.","Lower the dumbbell as far as possible as you keep a tight grip on the dumbbell. Inhale as you perform this movement.","Now curl the dumbbell as high as possible as you contract the forearms and as you exhale. Keep the contraction for a second before you lower again. Tip: The only movement should happen at the wrist.","Perform for the recommended amount of repetitions, switch arms and repeat the movement."]],["Seated One-arm Cable Pulley Rows","Seated_One-arm_Cable_Pulley_Rows/0.jpg","upper back",["biceps","lats","traps"],["To get into the starting position, first sit down on the machine and place your feet on the front platform or crossbar provided making sure that your knees are slightly bent and not locked.","Lean over as you keep the natural alignment of your back and grab the single handle attachment with your left arm using a palms-down grip.","With your arm extended pull back until your torso is at a 90-degree angle from your legs. Your back should be slightly arched and your chest should be sticking out. You should be feeling a nice stretch on your lat as you hold the bar in front of you. The right arm can be kept by the waist. This is the starting position of the exercise.","Keeping the torso stationary, pull the handles back towards your torso while keeping the arms close to it as you rotate the wrist, so that by the time your hand is by your abdominals it is in a neutral position (palms facing the torso). Breathe out as you perform that movement. At that point you should be squeezing your back muscles hard.","Hold that contraction for a second and slowly go back to the original position while breathing in. Tip: Remember to rotate the wrist as you go back to the starting position so that the palms are facing down again.","Repeat for the recommended amount of repetitions and then perform the same movement with the right hand."]],["Seated Overhead Stretch","Seated_Overhead_Stretch/0.jpg","abs",[],["Sit up straight on an exercise mat.","Touch the soles of your feet together with your feet six to eight inches in front of your hips.","Place one hand on the floor beside you and your other hand behind your head.","Lift your elbow to the ceiling as you incline your torso to the other side. Hold for 10 to 20 seconds, then switch sides."]],["Seated Palm-Up Barbell Wrist Curl","Seated_Palm-Up_Barbell_Wrist_Curl/0.jpg","forearms",[],["Hold a barbell with both hands and your palms facing up; hands spaced about shoulder width.","Place your feet flat on the floor, at a distance that is slightly wider than shoulder width apart.","Lean forward and place your forearms on top of your upper thighs with your palms up. Tip: Make sure that the front of the wrists lay on top of your knees. This will be your starting position.","Lower the bar as far as possible while inhaling and keeping a tight grip.","Now curl bar up as high as possible while flexing the forearms and exhaling. Hold the contraction at the top for a second and Tip: Only the wrist should move."]],["Seated Palms-Down Barbell Wrist Curl","Seated_Palms-Down_Barbell_Wrist_Curl/0.jpg","forearms",[],["Hold a barbell with both hands and your palms facing down; hands spaced about shoulder width.","Place your feet flat on the floor, at a distance that is slightly wider than shoulder width apart.","Lean forward and place your forearms on top of your upper thighs with your palms down. Tip: Make sure that the back of the wrists lay on top of your knees. This will be your starting position.","Lower the bar as far as possible while inhaling and keeping a tight grip.","Now curl bar up as high as possible while flexing the forearms and exhaling. Hold the contraction at the top for a second and Tip: Only the wrist should move."]],["Seated Side Lateral Raise","Seated_Side_Lateral_Raise/0.jpg","delts",[],["Pick a couple of dumbbells and sit at the end of a flat bench with your feet firmly on the floor. Hold the dumbbells with your palms facing in and your arms straight down at your sides at arms' length. This will be your starting position.","While maintaining the torso stationary (no swinging), lift the dumbbells to your side with a slight bend on the elbow and the hands slightly tilted forward as if pouring water in a glass. Continue to go up until you arms are parallel to the floor. Exhale as you execute this movement and pause for a second at the top.","Lower the dumbbells back down slowly to the starting position as you inhale.","Repeat for the recommended amount of repetitions."]],["Seated Triceps Press","Seated_Triceps_Press/0.jpg","triceps",[],["Sit down on a bench with back support and grasp a dumbbell with both hands and hold it overhead at arm's length. Tip: a better way is to have somebody hand it to you especially if it is very heavy. The resistance should be resting in the palms of your hands with your thumbs around it. The palm of the hand should be facing inward. This will be your starting position.","Keeping your upper arms close to your head (elbows in) and perpendicular to the floor, lower the resistance in a semi-circular motion behind your head until your forearms touch your biceps. Tip: The upper arms should remain stationary and only the forearms should move. Breathe in as you perform this step.","Go back to the starting position by using the triceps to raise the dumbbell. Breathe out as you perform this step.","Repeat for the recommended amount of repetitions."]],["Seated Two-Arm Palms-Up Low-Pulley Wrist Curl","Seated_Two-Arm_Palms-Up_Low-Pulley_Wrist_Curl/0.jpg","forearms",[],["Put a bench in front of a low pulley machine that has a barbell or EZ Curl attachment on it.","Move the bench far enough away so that when you bring the handle to the top of your thighs tension is created on the cable due to the weight stack being moved up.","Now hold the handle with both hands, palms up, using a shoulder-width grip.","Step back and sit on the bench with your feet about shoulder width apart, firmly on the floor.","Lean forward and place the forearms on your thighs with the back of your wrists over your knees. This will be your starting position.","Lower the bar as far as possible, while inhaling and keeping a tight grip.","Now curl the bar up as high as possible while contracting the forearms. Tip: Only the wrist should move; not the forearms.","After a second contraction at the top go back to the starting position as you inhale.","Repeat for the recommended amount of repetitions."]],["See-Saw Press (Alternating Side Press)","See-Saw_Press_Alternating_Side_Press/0.jpg","delts",["abs","triceps"],["Grab a dumbbell with each hand and stand up erect.","Clean (lift) the dumbbells to the chest/shoulder level and then rotate your wrists so that your palms are facing towards you as if you were getting ready to perform an Arnold Press. This will be your starting position.","Now start extending your left arm overhead as you rotate the wrist so that the palm of your hand faces forward as you go up. Your elbows should come out also as you lift the weight. Simultaneously, you will also be bending from your hip to your opposite side. Tip: If you perform the exercise correctly, is should look as if you are trying to reach for something overhead on the right hand side of your body, but with your left arm. Breathe out as you perform this movement.","Once you reach the top position breathe in. Then, with the weight fully extended overhead and you bent over to your right hand side, begin the movement to the left side.","Repeat for the recommended amount of repetitions."]],["Shotgun Row","Shotgun_Row/0.jpg","lats",["biceps","upper back"],["Attach a single handle to a low cable.","After selecting the correct weight, stand a couple feet back with a wide-split stance. Your arm should be extended and your shoulder forward. This will be your starting position.","Perform the movement by retracting the shoulder and flexing the elbow. As you pull, supinate the wrist, turning the palm upward as you go.","After a brief pause, return to the starting position."]],["Shoulder Circles","Shoulder_Circles/0.jpg","delts",["traps"],["With shoulders relaxed and arms resting loosely at your sides (or in your lap if you're seated), gently roll your shoulders forward, up, back, and down.","Reverse direction. You can do this exercise alternating shoulders or both at the same time."]],["Shoulder Press - With Bands","Shoulder_Press_-_With_Bands/0.jpg","delts",["triceps"],["To begin, stand on an exercise band so that tension begins at arm's length. Grasp the handles and lift them so that the hands are at shoulder height at each side.","Rotate the wrists so that the palms of your hands are facing forward. Your elbows should be bent, with the upper arms and forearms in line to the torso. This is your starting position.","As you exhale, lift the handles up until your arms are fully extended overhead."]],["Shoulder Raise","Shoulder_Raise/0.jpg","delts",["lats"],["Relax your arms to your sides and raise your shoulders up toward your ears, then back down."]],["Shoulder Stretch","Shoulder_Stretch/0.jpg","delts",[],["Reach your left arm across your body and hold it straight."]],["Side-Lying Floor Stretch","Side-Lying_Floor_Stretch/0.jpg","lats",[],["First lie on your left side, bending your left knee in front of you to stabilize your torso (use your abdominal muscles as well to hold you upright).","Straighten your right leg and rest the right foot on the floor behind your left. Straighten your right arm over your head and gently pull on your right wrist to stretch the entire right side of the body. Switch sides."]],["Side Bridge","Side_Bridge/0.jpg","abs",["delts"],[]],["Side Hop-Sprint","Side_Hop-Sprint/0.jpg","quadriceps",["abductors","adductors","calves","hamstrings"],["Stand to the side of a cone or hurdle.","Begin this drill by hopping sideways over the obstacle, rebounding out of your landing to hop back to where you started.","Hop for a prescribed number or repetitions as quickly as possible, and finish this drill by sprinting a short distance upon landing the last hop."]],["Side Jackknife","Side_Jackknife/0.jpg","abs",[],[]],["Side Lateral Raise","Side_Lateral_Raise/0.jpg","delts",[],["Pick a couple of dumbbells and stand with a straight torso and the dumbbells by your side at arms length with the palms of the hand facing you. This will be your starting position.","While maintaining the torso in a stationary position (no swinging), lift the dumbbells to your side with a slight bend on the elbow and the hands slightly tilted forward as if pouring water in a glass. Continue to go up until you arms are parallel to the floor. Exhale as you execute this movement and pause for a second at the top.","Lower the dumbbells back down slowly to the starting position as you inhale.","Repeat for the recommended amount of repetitions."]],["Side Laterals to Front Raise","Side_Laterals_to_Front_Raise/0.jpg","delts",["traps"],["In a standing position, hold a pair of dumbbells at your side. This will be your starting position.","Keeping your elbows slightly bent, raise the weights directly in front of you to shoulder height, avoiding any swinging or cheating.","At the top of the exercise move the weights out in front of you, keeping your arms extended.","Lower the weights with a controlled motion.","On the next repetition, raise the weights in front of you to shoulder height before moving the weights laterally to your sides.","Lower the weights to the starting position."]],["Side Leg Raises","Side_Leg_Raises/0.jpg","adductors",[],["Stand next to a chair, which you may hold onto as a support. Stand on one leg. This will be your starting position.","Keeping your leg straight, raise it as far out to the side as possible, and swing it back down, allowing it to cross the opposite leg.","Repeat this swinging motion 5-10 times, increasing the range of motion as you do so."]],["Side Lying Groin Stretch","Side_Lying_Groin_Stretch/0.jpg","adductors",["hamstrings"],["Start off by lying on your right side and bend your right knee in front of you to stabilize the torso.","Rest your head on your right hand or shoulder. Lift your left leg upward and hold it by the back of the knee (easier) or the foot (harder).","Pull your left knee in toward your left shoulder and simultaneously press your foot or knee down to the floor. To intensify this stretch, straighten your left leg. Switch sides."]],["Side Neck Stretch","Side_Neck_Stretch/0.jpg","traps",[],["Start with your shoulders relaxed, gently tilt your head towards your shoulder.","Assist stretch with a gentle pull on the side of the head."]],["Side Standing Long Jump","Side_Standing_Long_Jump/0.jpg","quadriceps",["calves","glutes","hamstrings"],["Begin standing with your feet hip width apart in an athletic stance. Your head and chest should be up, knees and hips slightly bent. This will be your starting position.","Leaning to your right, extend through your hips, knees, and ankles to jump into the air. Block with the arms to lead the movement, jumping as far to your right as you can.","Land facing the same direction with your feet hip width apart, absorbing the impact through your lower body."]],["Side To Side Chins","Side_To_Side_Chins/0.jpg","lats",["biceps","forearms","upper back","delts"],["Grab the pull-up bar with the palms facing forward using a wide grip.","As you have both arms extended in front of you holding the bar at a wide grip, bring your torso back around 30 degrees or so while creating a curvature on your lower back and sticking your chest out. This is your starting position.","Pull your torso up while leaning to the left hand side until the bar almost touches your upper chest by drawing the shoulders and the upper arms down and back. Exhale as you perform this portion of the movement. Tip: Concentrate on squeezing the back muscles once you reach the full contracted position. The upper torso should remain stationary as it moves through space (no swinging) and only the arms should move. The forearms should do no other work other than hold the bar.","After a second of contraction, inhale as you go back to the starting position.","Now, pull your torso up while leaning to the right hand side until the bar almost touches your upper chest by drawing the shoulders and the upper arms down and back. Exhale as you perform this portion of the movement. Tip: Concentrate on squeezing the back muscles once you reach the full contracted position. The upper torso should remain stationary as it moves through space and only the arms should move. The forearms should do no other work other than hold the bar.","After a second of contraction, inhale as you go back to the starting position.","Repeat steps 3-6 until you have performed the prescribed amount of repetitions for each side."]],["Side Wrist Pull","Side_Wrist_Pull/0.jpg","delts",["forearms","lats"],["This stretch works best standing. Cross your left arm over the midline of your body and hold the left wrist in your right hand down at the level of your hips. Start the stretch with a bent left arm.","Slowly straighten, pull, and lift it up to shoulder height, as pictured. Feel this stretch originate in your back, not your shoulders, and don't pull too hard on the shoulders joint. Switch sides."]],["Side to Side Box Shuffle","Side_to_Side_Box_Shuffle/0.jpg","quadriceps",["abductors","adductors","calves","hamstrings"],["Stand to one side of the box with your left foot resting on the middle of it.","To begin, jump up and over to the other side of the box, landing with your right foot on top of the box and your left foot on the floor. Swing your arms to aid your movement.","Continue shuffling back and forth across the box."]],["Single-Arm Cable Crossover","Single-Arm_Cable_Crossover/0.jpg","pectorals",[],["Begin by moving the pulleys to the high position, select the resistance to be used, and take a handle in each hand.","Step forward in front of both pulleys with your arms extended in front of you, bringing your hands together. Your head and chest should be up as you lean forward, while your feet should be staggered. This will be your starting position.","Keeping your left arm in place, allow your right arm to extend out to the side, maintaining a slight bend at the elbow. The right arm should be perpendicular to the body at approximately shoulder level.","Return your arm back to the starting position by pulling your hand back to the midline of the body.","Hold for a second at the starting position and repeat the movement on the opposite side. Continue alternating back and forth for the prescribed number of repetitions."]],["Single-Arm Linear Jammer","Single-Arm_Linear_Jammer/0.jpg","delts",["pectorals","triceps"],["Position a bar into a landmine or securely anchor it in a corner. Load the bar to an appropriate weight.","Raise the bar from the floor, taking it to your shoulders with one or both hands. Adopt a wide stance. This will be your starting position.","Perform the movement by extending the elbow, pressing the weight up. Move explosively, extending the hips and knees fully to produce maximal force.","Return to the starting position."]],["Single-Arm Push-Up","Single-Arm_Push-Up/0.jpg","pectorals",["delts","triceps"],["Begin laying prone on the ground. Move yourself into a position supporting your weight on your toes and one arm. Your working arm should be placed directly under the shoulder, fully extended. Your legs should be extended, and for this movement you may need a wider base, placing your feet further apart than in a normal push-up.","Maintain good posture, and place your free hand behind your back. This will be your starting position.","Lower yourself by allowing the elbow to flex until you touch the ground.","Descend slowly, and reverse direction be extending the arm to return to the starting position."]],["Single-Cone Sprint Drill","Single-Cone_Sprint_Drill/0.jpg","quadriceps",["calves","glutes","hamstrings"],["This drill teaches quick foot action. You need a single cone. Begin standing next to the cone with one arm back and one arm forward.","Chop the feet as quickly as possible, blocking with the arms. Circle the cone, keep your knees up, with violent foot action.","Rest after three trips around the cone."]],["Single-Leg High Box Squat","Single-Leg_High_Box_Squat/0.jpg","quadriceps",["glutes","hamstrings"],["Position a box in a rack. Secure a band or rope in place above the box.","Standing in front of it, step onto the box to a full standing position, letting your other leg remain unsupported. Hold onto the band for balance",". Continue stepping up and down on the same leg before switching to the opposite side."]],["Single-Leg Hop Progression","Single-Leg_Hop_Progression/0.jpg","quadriceps",["abductors","adductors","calves","hamstrings"],["Arrange a line of cones in front of you. Assume a relaxed standing position, balanced on one leg. Raise the knee of your opposite leg. This will be your starting position.","Hop forward, jumping and landing with the same leg over the cone.","Use a countermovement jump to hop from cone to cone.","At the end, turn around and go back on the other leg."]],["Single-Leg Lateral Hop","Single-Leg_Lateral_Hop/0.jpg","quadriceps",["abductors","adductors","calves","hamstrings"],["Stand to the side of a cone or hurdle. To get into the start position, stand on one leg with your knee slightly bent.","To begin, execute a counterjump to hop sideways over the cone.","Land on your jumping leg, and immediately rebound out of it by jumping back to the start position.","Continue hopping back and forth."]],["Single-Leg Leg Extension","Single-Leg_Leg_Extension/0.jpg","quadriceps",[],["Seat yourself in the machine and adjust it so that you are positioned properly. The pad should be against the lower part of the shin but not in contact with the ankle. Adjust the seat so that the pivot point is in line with your knee. Select a weight appropriate for your abilities.","Maintaining good posture, fully extend one leg, pausing at the top of the motion.","Return to the starting position without letting the weight stop, keeping tension on the muscle.","Repeat for the desired number of repetitions."]],["Single-Leg Stride Jump","Single-Leg_Stride_Jump/0.jpg","quadriceps",["abductors","adductors","calves","hamstrings"],["Stand to the side of a box with your inside foot on top of it, close to the edge.","Begin by swinging the arms upward as you push through the top leg, jumping upward as high as possible. Attempt to drive the opposite knee upward.","Land in the same position that you started, using your inside leg to decelerate the impact."]],["Single Dumbbell Raise","Single_Dumbbell_Raise/0.jpg","delts",["forearms","traps"],["With a wide stance, hold a dumbell with both hands, grasping the head of the dumbbell instead of the handle. Your arms should be extended and hanging at the waist. This will be your starting position.","Raise the weight until it is above shoulder level, keeping your arms extended. Your torso and hips should remain stationary throughout the movement.","Return to the starting position and repeat for the recommended amount of repetitions."]],["Single Leg Butt Kick","Single_Leg_Butt_Kick/0.jpg","quadriceps",["calves","hamstrings"],["Begin by standing on one leg, with the bent knee raised. This will be your start position.","Using a countermovement jump, take off upward by extending the hip, knee, and ankle of the grounded leg.","Immediately flex the knee and attempt to touch your butt with the heel of your jumping leg.","Return the leg to a partially bent position underneath the hips and land. Your opposite leg should stay in relatively the same position throughout the drill."]],["Single Leg Glute Bridge","Single_Leg_Glute_Bridge/0.jpg","glutes",["hamstrings"],["Lay on the floor with your feet flat and knees bent.","Raise one leg off of the ground, pulling the knee to your chest. This will be your starting position.","Execute the movement by driving through the heel, extending your hip upward and raising your glutes off of the ground.","Extend as far as possible, pause and then return to the starting position."]],["Single Leg Push-off","Single_Leg_Push-off/0.jpg","quadriceps",["calves","hamstrings"],["Stand on the ground with one foot resting on the box, heel close to the edge.","Push off with your foot on top of the box, trying to gain as much height as possible by extending through the hip and knee.","Land with the same foot on top of the box, returning your other foot back to the start position."]],["Sit-Up","Sit-Up/0.jpg","abs",[],["Lie down on the floor placing your feet either under something that will not move or by having a partner hold them. Your legs should be bent at the knees.","Place your hands behind your head and lock them together by clasping your fingers. This is the starting position.","Elevate your upper body so that it creates an imaginary V-shape with your thighs. Breathe out when performing this part of the exercise.","Once you feel the contraction for a second, lower your upper body back down to the starting position while inhaling.","Repeat for the recommended amount of repetitions."]],["Sit Squats","Sit_Squats/0.jpg","quadriceps",["abductors","glutes","hamstrings"],["Stand with your feet shoulder width apart. This will be your starting position.","Begin the movement by flexing your knees and hips, sitting back with your hips.","Continue until you have squatted a portion of the way down, but are above parallel, and quickly reverse the motion until you return to the starting position. Repeat for 5-10 repetitions."]],["Skating","Skating/0.jpg","quadriceps",["abductors","adductors","calves","glutes","hamstrings"],["Roller skating is a fun activity which can be effective in improving cardiorespiratory fitness and muscular endurance. It requires relatively good balance and coordination. It is necessary to learn the basics of skating including turning and stopping and to wear protective gear to avoid possible injury.","You can skate at a comfortable pace for 30 minutes straight. If you want a cardio challenge, do interval skating — speed skate two minutes of every five minutes, using the remaining three minutes to recover. A 150 lb person will typically burn about 175 calories in 30 minutes skating at a comfortable pace, similar to brisk walking."]],["Sled Drag - Harness","Sled_Drag_-_Harness/0.jpg","quadriceps",["calves","glutes","hamstrings"],["To begin, load the sled with the desired weight and attach the pulling strap. You can pull with handles, use a harness, or attach the pulling strap to a weight belt.","Whether pulling forwards or backwards, lean in the direction of travel and progress by extending through the hips and knees."]],["Sled Overhead Backward Walk","Sled_Overhead_Backward_Walk/0.jpg","delts",["calves","upper back","quadriceps"],["Attach dual handles to a sled connected by a rope or chain. Load the sled to a light weight.","Face the sled, backing up until there is some tension in the line. Hold your hands directly above your head with your elbows extended. This will be your starting position.","Walk backwards, keeping your arms raised above your head. Avoid jerky movements."]],["Sled Overhead Triceps Extension","Sled_Overhead_Triceps_Extension/0.jpg","triceps",[],["Attach dual handles to a sled using a chain or rope. Load the sled to an appropriate load.","Facing away from the sled, step away until there is tension in the line. Raise your hands above your head, keeping them together, palms facing each other. Your elbows should be pointed upward with the elbows flexed. This will be your starting position.","Extend through the elbow to straighten the arm. Ensure that your upper arm stays in position to isolate the triceps.","Upon full extension, step forward to take the slack out of the line. You may keep your feet staggered for more stability."]],["Sled Push","Sled_Push/0.jpg","quadriceps",["calves","pectorals","glutes","hamstrings","triceps"],["Load your pushing sled with the desired weight.","Take an athletic posture, leaning into the sled with your arms fully extended, grasping the handles. Push the sled as fast as possible, focusing on extending your hips and knees to strengthen your posterior chain."]],["Sled Reverse Flye","Sled_Reverse_Flye/0.jpg","delts",[],["Attach dual handles to a sled connected by a rope or chain. Load the sled to a light weight.","Face the sled, backing up until there is some tension in the line. Take both handles at arms length at about waist level. Bend the knees slightly and keep your chest and head up. This will be your starting position.","Without flexing the elbow, pull the handles upward and apart, performing a reverse fly with some external rotation. Your palms should be facing forward as you do this.","Return to the starting position, taking a couple steps back to take the slack out of the line."]],["Sled Row","Sled_Row/0.jpg","upper back",["biceps","lats"],["Attach dual handles to a sled connected by a rope or chain. Load the sled to an appropriate weight. Face the sled, backing up until there is some tension in the line.","With a handle in each hand, bend the knees slightly, keep your head and chest up, and begin with your arms extended.","To initiate the movement, flex the elbow as you retract your shoulder blades, pulling the sled towards you.","Take a step or two back to get tension in the line and repeat."]],["Sledgehammer Swings","Sledgehammer_Swings/0.jpg","abs",["calves","forearms","lats","upper back","delts"],["You will need a tire and a sledgehammer for this exercise. Stand in front of the tire about two feet away from it with a staggered stance. Grip the sledgehammer.","If you are right handed, your left hand should be at the bottom of the handle, and your right hand should be choking up closer to the head.","As you bring the sledge up, your right hand slides toward the head; as you swing down, your right hand will slide down to join your left hand. Slam it down as hard as you can against the tire. Control the bounce of the hammer off of the tire.","Repeat on the other side."]],["Smith Incline Shoulder Raise","Smith_Incline_Shoulder_Raise/0.jpg","delts",["pectorals"],["Place an incline bench underneath the smith machine. Place the barbell at a height that you can reach when lying down and your arms are almost fully extended. Once the weight you need is selected, lie down on the incline bench and make sure your shoulders are aligned right under the barbell.","Using a shoulder width pronated (palms forward) grip, lift the bar from the rack and hold it straight over you with a slight bend at the elbows. This will be your starting position.","As you breathe out, lift the bar up until your arms are fully extended. Note: The contraction should be felt around the shoulders.","After a second pause, bring the bar back down to the starting position as you breathe in.","Repeat the movement for the prescribed amount of repetitions.","When you are done, place the bar back in the rack."]],["Smith Machine Behind the Back Shrug","Smith_Machine_Behind_the_Back_Shrug/0.jpg","traps",["delts"],["With the bar at thigh level, load an appropriate weight.","Stand with the bar behind you, taking a shoulder-width, pronated grip on the bar and unhook the weight. You should be standing up straight with your head and chest up and your arms extended. This will be your starting position.","Initiate the movement by shrugging your shoulders straight up. Do not flex the arms or wrist during the movement.","After a brief pause return the weight to the starting position.","Repeat for the desired number of repetitions before engaging the hooks to rack the weight."]],["Smith Machine Bench Press","Smith_Machine_Bench_Press/0.jpg","pectorals",["delts","triceps"],["Place a flat bench underneath the smith machine. Now place the barbell at a height that you can reach when lying down and your arms are almost fully extended. Once the weight you need is selected, lie down on the flat bench. Using a pronated grip that is wider than shoulder width, unlock the bar from the rack and hold it straight over you with your arms locked. This will be your starting position.","As you breathe in, come down slowly until you feel the bar on your middle chest.","After a second pause, bring the bar back to the starting position as you breathe out and push the bar using your chest muscles. Lock your arms in the contracted position, hold for a second and then start coming down slowly again. Tip: It should take at least twice as long to go down than to come up.","Repeat the movement for the prescribed amount of repetitions.","When you are done, lock the bar back in the rack."]],["Smith Machine Bent Over Row","Smith_Machine_Bent_Over_Row/0.jpg","upper back",["biceps","lats","delts"],["Set the barbell attached to the smith machine to a height that is about 2 inches below your knees.","Bend your knees slightly and bring your torso forward, by bending at the waist, while keeping the back straight until it is almost parallel to the floor. Tip: Make sure that you keep the head up.","Now grasp the barbell using an overhand (pronated) grip and unlock it from the smith machine rack. Then let it hang directly in front of you as your arms hang extended perpendicular to the floor and your torso. This is your starting position.","While keeping the torso stationary, lift the barbell as you breathe out, keeping the elbows close to the body and not doing any force with the forearm other than holding the weights. On the top contracted position, squeeze the back muscles and hold for a second.","Slowly lower the weight again to the starting position as you inhale.","Repeat for the recommended amount of repetitions."]],["Smith Machine Calf Raise","Smith_Machine_Calf_Raise/0.jpg","calves",[],["Place a block or weight plate below the bar on the Smith machine. Set the bar to a position that best matches your height. Once the correct height is chosen and the bar is loaded, step onto the plates with the balls of your feet and place the bar on the back of your shoulders.","Take the bar with both hands facing forward. Rotate the bar to unrack it. This will be your starting position.","Raise your heels as high as possible by pushing off of the balls of your feet, flexing your calf at the top of the contraction. Your knees should remain extended. Hold the contracted position for a second before you start to go back down.","Return slowly to the starting position as you breathe in while lowering your heels.","Repeat for the recommended amount of repetitions."]],["Smith Machine Close-Grip Bench Press","Smith_Machine_Close-Grip_Bench_Press/0.jpg","triceps",["pectorals","delts"],["Place a flat bench underneath the smith machine. Place the barbell at a height that you can reach when lying down and your arms are almost fully extended. Once the weight you need is selected, lie down on the flat bench. Using a close and pronated grip (palms facing forward) that is around shoulder width, unlock the bar from the rack and hold it straight over you with your arms locked. This will be your starting position.","As you breathe in, come down slowly until you feel the bar on your middle chest. Tip: Make sure that as opposed to a regular bench press, you keep the elbows close to the torso at all times in order to maximize triceps involvement.","After a second pause, bring the bar back to the starting position as you breathe out and push the bar using your triceps muscles. Lock your arms in the contracted position, hold for a second and then start coming down slowly again. Tip: It should take at least twice as long to go down than to come up.","Repeat the movement for the prescribed amount of repetitions.","When you are done, lock the bar back in the rack."]],["Smith Machine Decline Press","Smith_Machine_Decline_Press/0.jpg","pectorals",["delts","triceps"],["Position a decline bench in the rack so that the bar will be above your chest. Load an appropriate weight and take your place on the bench.","Rotate the bar to unhook it from the rack and fully extend your arms. Your back should be slightly arched and your shoulder blades retracted. This will be your starting position.","Begin the movement by flexing your arms, lowering the bar to your chest.","Pause briefly, and then extend your arms to push the weight back to the starting position.","After completing the desired number of repetitions, rotate the bar to rack the weight."]],["Smith Machine Hang Power Clean","Smith_Machine_Hang_Power_Clean/0.jpg","hamstrings",["glutes","lower back","quadriceps","delts","traps"],["Position the bar at knee height and load it to an appropriate weight.","Take a pronated grip on the bar outside of shoulder width and unhook the bar from the machine. Your arms should be fully extended with your head and chest up. Your elbows should be pointed out with your shoulders back and down. Your hips should be back, loading the tension into the hamstrings. This will be your starting position.","Initate the movement by forcefully extending the hips and knees, accelerating into the bar. Ensure that you keep your arms straight during this part of the motion.","Upon full extension, rebend the hips and knees to lower your receiving position.","Allow the arms to flex at this point, rotating the elbows around the bar to receive it on your shoulders.","Extend through the hips and knees to come to a standing position with the bar racked on your shoulders to complete the movement."]],["Smith Machine Hip Raise","Smith_Machine_Hip_Raise/0.jpg","abs",[],["Position a bench in the rack and load the bar to an appropriate weight. Lie down on the bench, placing the bottom of your feet against the bar. Unlock the bar and extend your legs. You may need to use your hands to assist you. For added stability grasp the sides of the Smith Machine. This will be your starting position.","Initiate the movement by rotating your pelvis, flexing your spine to raise your hips off of the bench. Maintain a slight bend in the knees throughout the motion.","After a brief pause, return the hips to the bench.","Repeat for the desired number of repetitions."]],["Smith Machine Incline Bench Press","Smith_Machine_Incline_Bench_Press/0.jpg","pectorals",["delts","triceps"],["Place an incline bench underneath the smith machine. Place the barbell at a height that you can reach when lying down and your arms are almost fully extended. Once the weight you need is selected, lie down on the incline bench and make sure your upper chest is aligned with the barbell. Using a pronated grip (palms facing forward) that is wider than shoulder width, unlock the bar from the rack and hold it straight over you with your arms locked. This will be your starting position.","As you breathe in, come down slowly until you feel the bar on your upper chest.","After a second pause, bring the bar back to the starting position as you breathe out and push the bar using your chest muscles. Lock your arms in the contracted position, hold for a second and then start coming down slowly again. Tip: It should take at least twice as long to go down than to come up.","Repeat the movement for the prescribed amount of repetitions.","When you are done, place the bar back in the rack."]],["Smith Machine Leg Press","Smith_Machine_Leg_Press/0.jpg","quadriceps",["calves","glutes","hamstrings"],["Position a Smith machine bar a couple feet off of the ground. Ensure that it is resting on the safeties. After loading the bar to an appropriate weight, lie underneath the bar. Place the middle of your feet on the bar, tucking your knees to your chest. This will be your starting position.","Begin the movement by driving through your feet to move the bar upward, extending the hips and knees. Do not lock out your knees.","At the top of the motion, pause briefly before returning to the starting position."]],["Smith Machine One-Arm Upright Row","Smith_Machine_One-Arm_Upright_Row/0.jpg","delts",["biceps","traps"],["With the bar at thigh level, load an appropriate weight.","Take a wide grip on the bar and unhook the weight, removing your off hand from the bar. Your arm should be extended as you stand up straight with your head and chest up. This will be your starting position.","Begin the movement by flexing the elbow, raising the upper arm with the elbow pointed out. Continue until your upper arm is parallel to the floor.","After a brief pause, return the weight to the starting position.","Repeat for the desired number of repetitions before engaging the hooks to rack the weight."]],["Smith Machine Overhead Shoulder Press","Smith_Machine_Overhead_Shoulder_Press/0.jpg","delts",["triceps"],["To begin, place a flat bench (or preferably one with back support) underneath a smith machine. Position the barbell at a height so that when seated on the flat bench, the arms must be almost fully extended to reach the barbell.","Once you have the correct height, sit slightly in behind the barbell so that there is an imaginary straight line from the tip of your nose to the barbell. Your feet should be stationary. Grab the barbell with the palms facing forward, unlock it and lift it up so that your arms are fully extended. This is the starting position.","Slowly begin to lower the barbell until it is level with your chin while inhaling.","Then lift the barbell back to the starting position using your shoulders while exhaling.","Repeat for the recommended amount of repetitions."]],["Smith Machine Pistol Squat","Smith_Machine_Pistol_Squat/0.jpg","quadriceps",["calves","glutes","hamstrings"],["To begin, first set the bar to a position that best matches your height. Step under it and position the bar across the back of your shoulders.","Take the bar with your hands facing forward, unlock it and lift it off the rack by extending your legs. 3","Move one foot forward about 12 inches in front of the bar. Extend the other leg out in front of you, holding it off the ground. Look forward at all times and maintain a neutral or slightly arched spine. This will be your starting position.","Maintaining good posture, lower yourself by flexing the knee and hip, going down as far as flexibility allows.","Pause briefly at the bottom and then return to the starting position by driving through the heel of your foot, extending the knee and hip."]],["Smith Machine Reverse Calf Raises","Smith_Machine_Reverse_Calf_Raises/0.jpg","calves",[],["Adjust the barbell on the smith machine to fit your height and align a raised platform right under the bar.","Stand on the platform with the heels of your feet secured on top of it with the balls of your feet extending off it. Position your toes facing forward with a shoulder width stance.","Now, place your shoulders under the barbell while maintaining the foot positioning described and push the barbell up by extending your hips and knees until your torso is standing erect. The knees should be kept with a slight bend; never locked. This will be your starting position. Tip: The barbell on your back is only for balance purposes.","Raise the balls of your feet as you breathe out by extending your toes as high as possible and flexing your calf. Ensure that the knee is kept stationary at all times. There should be no bending at any time. Hold the contracted position for a second before you start to go back down.","Slowly go back down to the starting position as you breathe in by lowering the balls of your feet and toes.","Repeat for the recommended amount of repetitions."]],["Smith Machine Squat","Smith_Machine_Squat/0.jpg","quadriceps",["calves","glutes","hamstrings","lower back"],["To begin, first set the bar on the height that best matches your height. Once the correct height is chosen and the bar is loaded, step under the bar and place the back of your shoulders (slightly below the neck) across it.","Hold on to the bar using both arms at each side (palms facing forward), unlock it and lift it off the rack by first pushing with your legs and at the same time straightening your torso.","Position your legs using a shoulder width medium stance with the toes slightly pointed out. Keep your head up at all times and also maintain a straight back. This will be your starting position. (Note: For the purposes of this discussion we will use the medium stance which targets overall development; however you can choose any of the three stances discussed in the foot stances section).","Begin to slowly lower the bar by bending the knees as you maintain a straight posture with the head up. Continue down until the angle between the upper leg and the calves becomes slightly less than 90-degrees (which is the point in which the upper legs are below parallel to the floor). Inhale as you perform this portion of the movement. Tip: If you performed the exercise correctly, the front of the knees should make an imaginary straight line with the toes that is perpendicular to the front. If your knees are past that imaginary line (if they are past your toes) then you are placing undue stress on the knee and the exercise has been performed incorrectly.","Begin to raise the bar as you exhale by pushing the floor with the heel of your foot as you straighten the legs again and go back to the starting position.","Repeat for the recommended amount of repetitions."]],["Smith Machine Stiff-Legged Deadlift","Smith_Machine_Stiff-Legged_Deadlift/0.jpg","hamstrings",["glutes","lower back"],["To begin, set the bar on the smith machine to a height that is around the middle of your thighs. Once the correct height is chosen and the bar is loaded, grasp the bar using a pronated (palms forward) grip that is shoulder width apart. You may need some wrist wraps if using a significant amount of weight.","Lift the bar up by fully extending your arms while keeping your back straight. Stand with your torso straight and your legs spaced using a shoulder width or narrower stance. The knees should be slightly bent. This is your starting position.","Keeping the knees stationary, lower the barbell to over the top of your feet by bending at the waist while keeping your back straight. Keep moving forward as if you were going to pick something from the floor until you feel a stretch on the hamstrings. Exhale as you perform this movement","Start bringing your torso up straight again as soon as you feel the hamstrings stretch by extending your hips and waist until you are back at the starting position. Inhale as you perform this movement.","Repeat for the recommended amount of repetitions."]],["Smith Machine Upright Row","Smith_Machine_Upright_Row/0.jpg","traps",["biceps","upper back","delts"],["To begin, set the bar on the smith machine to a height that is around the middle of your thighs. Once the correct height is chosen and the bar is loaded, grasp the bar using a pronated (palms forward) grip that is shoulder width apart. You may need some wrist wraps if using a significant amount of weight.","Lift the barbell up and fully extend your arms with your back straight. There should be a slight bend at the elbows. This is the starting position.","Use your side shoulders to lift the bar as you exhale. The bar should be close to the body as you move it up. Continue to lift it until it nearly touches your chin. Tip: Your elbows should drive the motion. As you lift the bar, your elbows should always be higher than your forearms. Also, keep your torso stationary and pause for a second at the top of the movement.","Lower the bar back down slowly to the starting position. Inhale as you perform this portion of the movement.","Repeat for the recommended amount of repetitions."]],["Smith Single-Leg Split Squat","Smith_Single-Leg_Split_Squat/0.jpg","quadriceps",["calves","glutes","hamstrings"],["To begin, place a flat bench 2-3 feet behind the smith machine. Then, set the bar on the height that best matches your height. Once the correct height is chosen and the bar is loaded, step under the bar and place the back of your shoulders (slightly below the neck) across it.","Hold on to the bar using both arms at each side (palms facing forward), unlock it and lift it off the rack by first pushing with your legs and at the same time straightening your torso.","Position your legs by placing one foot slightly forward under the bar and extending your other leg back and place the top of your foot on the bench. This will be your starting position","Begin to slowly lower the bar by bending the knee as you maintain a straight posture with the head up. Continue down until the angle between the upper leg and the calf becomes slightly less than 90-degrees (which is the point in which the upper legs are below parallel to the floor). Inhale as you perform this portion of the movement. Tip: If you performed the exercise correctly, the front of the knee should make an imaginary straight line with the toes that is perpendicular to the front. If your knee is past that imaginary line (if it is past your toes) then you are placing undue stress on the knee and the exercise has been performed incorrectly.","Begin to raise the bar as you exhale by pushing the floor with the heel of your foot mainly as you straighten your leg again and go back to the starting position.","Repeat for the recommended amount of repetitions.","Switch legs and repeat the movement."]],["Snatch","Snatch/0.jpg","quadriceps",["biceps","glutes","hamstrings","lower back","delts","traps","triceps"],["Place your feet at a shoulder width stance with the barbell resting right above the connection between the toes and the rest of the foot.","Wit
