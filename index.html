ction, then slowly release the tension and return to the starting position.","Repeat for the desired number of repetitions."]],["Cable Seated One Arm Alternate Row","0214-vpp9Ku2","upper back","biceps",["biceps","forearms"],["Sit on a bench facing a cable machine with your feet flat on the ground and knees slightly bent.","Grasp the handle with one hand and keep your arm fully extended in front of you.","Pull the handle towards your body, retracting your shoulder blade and keeping your elbow close to your side.","Pause for a moment at the top of the movement, squeezing your back muscles.","Slowly release the handle back to the starting position.","Repeat with the other arm.","Alternate between arms for the desired number of repetitions."]],["Cable Seated One Arm Concentration Curl","1642-rZ80Gbp","biceps","forearms",["forearms"],["Sit on a bench with your feet flat on the floor and your back straight.","Hold a cable handle with one hand and place your elbow on the inside of your thigh, just above the knee.","Keep your upper arm stationary and curl the cable handle towards your shoulder while exhaling.","Pause for a moment at the top of the movement, squeezing your biceps.","Slowly lower the cable handle back to the starting position while inhaling.","Repeat for the desired number of repetitions, then switch arms."]],["Cable Seated Overhead Curl","1643-DpWMFP5","biceps","forearms",["forearms","shoulders"],["Sit on a bench facing the cable machine with your feet flat on the ground.","Grasp the cable attachment with an underhand grip, palms facing up, and your hands shoulder-width apart.","Keep your upper arms stationary and your elbows close to your sides.","Exhale and curl the cable attachment towards your shoulders, contracting your biceps.","Pause for a moment at the top of the movement, squeezing your biceps.","Inhale and slowly lower the cable attachment back to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Cable Seated Rear Lateral Raise","0215-x825CZm","delts","traps",["traps","rhomboids"],["Sit on a bench facing the cable machine with your feet flat on the ground.","Grasp the cable handles with an overhand grip and extend your arms straight in front of you.","Keeping your arms straight, slowly raise them out to the sides until they are parallel to the floor.","Pause for a moment at the top, then slowly lower your arms back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Seated Row","0861-fUBheHs","upper back","biceps",["biceps","forearms"],["Sit on the cable row machine with your feet flat on the footrests and your knees slightly bent.","Grasp the handles with an overhand grip, keeping your back straight and your shoulders relaxed.","Pull the handles towards your body, squeezing your shoulder blades together.","Pause for a moment at the peak of the movement, then slowly release the handles back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Seated Shoulder Internal Rotation","0216-YPoVrBi","delts","rotator cuff",["rotator cuff","triceps"],["Sit on a bench or chair facing the cable machine with your feet flat on the ground.","Hold the cable handle with your arm extended straight out in front of you, parallel to the ground.","Keep your elbow slightly bent and your shoulder blades pulled back and down.","Slowly rotate your arm inward, bringing the cable handle towards the center of your body.","Pause for a moment at the end of the movement, then slowly return to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Cable Seated Twist","2399-UEjSrKI","abs","obliques",["obliques"],["Sit on a cable machine with your feet flat on the ground and your knees slightly bent.","Hold the cable handle with both hands and extend your arms straight in front of you.","Keeping your core engaged, slowly rotate your torso to one side, pulling the cable across your body.","Pause for a moment at the end of the range of motion, then slowly rotate back to the starting position.","Repeat on the other side.","Continue alternating sides for the desired number of repetitions."]],["Cable Seated Wide-grip Row","0218-qcY50ZD","upper back","biceps",["biceps","forearms"],["Sit on the cable row machine with your feet flat on the footrests and your knees slightly bent.","Grasp the handle with a wide overhand grip, palms facing down.","Keep your back straight and lean slightly forward from the hips.","Pull the handle towards your lower chest, squeezing your shoulder blades together.","Pause for a moment at the peak of the contraction.","Slowly release the handle back to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Cable Shoulder Press","0219-PzQanLE","delts","triceps",["triceps","upper back"],["Adjust the cable machine so that the handles are at shoulder height.","Stand facing away from the machine with your feet shoulder-width apart.","Grasp the handles with an overhand grip and bring them up to shoulder level, with your elbows bent and pointing outwards.","Press the handles upwards until your arms are fully extended overhead.","Pause for a moment at the top, then slowly lower the handles back down to shoulder level.","Repeat for the desired number of repetitions."]],["Cable Shrug","0220-Eg98Ft9","traps","shoulders",["shoulders"],["Stand facing the cable machine with your feet shoulder-width apart.","Grasp the cable handles with an overhand grip and let your arms hang down in front of you.","Keeping your arms straight, shrug your shoulders up towards your ears.","Hold the contraction for a moment, then slowly lower your shoulders back down to the starting position.","Repeat for the desired number of repetitions."]],["Cable Side Bend","0222-wPypxFY","abs","obliques",["obliques"],["Stand with your feet shoulder-width apart and grasp the cable handle with one hand.","Keep your back straight and your core engaged.","Slowly bend sideways at the waist, lowering the cable handle towards your knee.","Pause for a moment, then return to the starting position.","Repeat on the other side.","Alternate sides for the desired number of repetitions."]],["Cable Side Bend Crunch (Bosu Ball)","0221-qatbkEd","abs","obliques",["obliques"],["Stand with your feet shoulder-width apart, holding a cable handle in one hand.","Place the other hand on your hip.","Engage your core and slowly bend sideways towards the hand holding the cable, keeping your back straight.","Pause for a moment at the bottom of the movement, then slowly return to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Cable Side Crunch","0223-q2ADGqV","abs","obliques",["obliques"],["Attach a cable handle to a low pulley and stand sideways to the machine.","Grasp the handle with the hand furthest from the machine and place your other hand on your hip.","Keep your feet shoulder-width apart and your knees slightly bent.","With your abs engaged, bend sideways at the waist, bringing your elbow down towards your hip.","Pause for a moment at the bottom, then slowly return to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Cable Squat Row (With Rope Attachment)","1717-f7fnAIB","lats","biceps",["biceps","rhomboids","rear deltoids"],["Attach a rope to a cable machine at waist height.","Stand facing the cable machine with your feet shoulder-width apart.","Bend your knees and lower your body into a squat position, keeping your back straight and chest up.","Grasp the rope with an overhand grip, with your hands shoulder-width apart.","Engage your core and pull the rope towards your body, squeezing your shoulder blades together.","Keep your elbows close to your body and continue pulling until your hands reach your chest.","Pause for a moment at the top of the movement, then slowly release the rope and extend your arms back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Squatting Curl","1644-3XFdb1Z","biceps","forearms",["forearms"],["Attach a cable handle to the lowest setting on a cable machine.","Stand facing the machine with your feet shoulder-width apart.","Hold the cable handle with an underhand grip, palms facing up, and arms fully extended.","Lower your body into a squat position, keeping your back straight and knees behind your toes.","As you squat down, curl the cable handle towards your shoulders, keeping your elbows close to your sides.","Pause for a moment at the top of the curl, squeezing your biceps.","Slowly lower the cable handle back to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Cable Standing Back Wrist Curl","0224-VhX2JdE","forearms","biceps",["biceps","brachialis"],["Stand facing a cable machine with your feet shoulder-width apart.","Hold the cable handle with an overhand grip, palms facing down.","Keep your arms straight and your elbows close to your sides.","Slowly curl your wrists upward, bringing the cable handle towards your body.","Pause for a moment at the top, then slowly lower the cable handle back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Standing Calf Raise","1375-yl2IYyy","calves","hamstrings",["hamstrings","glutes"],["Stand facing a cable machine with your feet shoulder-width apart.","Hold onto the cable machine handles or attach a cable ankle strap to your ankles.","Raise your heels off the ground by extending your ankles as high as possible.","Pause for a moment at the top, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Cable Standing Cross-over High Reverse Fly","0225-P5p0j8B","delts","trapezius",["trapezius","rhomboids","rear deltoids"],["Attach a D-handle to each side of a cable machine at shoulder height.","Stand in the middle of the cable machine with your feet shoulder-width apart.","Grasp the handles with an overhand grip and extend your arms out to the sides, palms facing forward.","Keep a slight bend in your elbows and maintain a straight back throughout the exercise.","Engage your shoulder muscles and squeeze your shoulder blades together as you pull the handles towards the front of your body.","Pause for a moment at the peak of the movement, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Cable Standing Crunch","0226-jpgqxiS","abs","obliques",["obliques"],["Attach a cable handle to a high pulley and stand facing away from the machine.","Hold the handle with both hands and place it behind your head, keeping your elbows bent.","Stand with your feet shoulder-width apart and your knees slightly bent.","Keeping your abs engaged, exhale and crunch your torso down towards your knees, bringing your elbows towards your thighs.","Pause for a moment at the bottom of the movement, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Cable Standing Crunch (With Rope Attachment)","0874-XU3ePuv","abs","obliques",["obliques"],["Attach a rope to a cable machine at chest height.","Stand facing away from the machine with your feet shoulder-width apart.","Hold the rope with both hands and bring it behind your head, keeping your elbows bent.","Engage your abs and slowly crunch your torso forward, bringing your elbows towards your knees.","Pause for a moment at the top of the crunch, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Cable Standing Fly","0227-Pr9Rhf4","pectorals","deltoids",["deltoids","triceps"],["Attach the handles to the cables at chest height.","Stand with your feet shoulder-width apart, facing away from the cable machine.","Grasp the handles with an overhand grip, palms facing forward.","Step forward slightly to create tension in the cables.","Keep your core engaged and your back straight throughout the exercise.","With a slight bend in your elbows, slowly bring your arms forward and together in front of your chest.","Squeeze your chest muscles at the peak of the movement.","Slowly reverse the movement, returning your arms to the starting position.","Repeat for the desired number of repetitions."]],["Cable Standing Hip Extension","0228-Kpajagk","glutes","hamstrings",["hamstrings","quadriceps"],["Attach a cable to a low pulley and stand facing away from the machine.","Place the cable around your ankle and stand with your feet shoulder-width apart.","Keep your core engaged and your back straight throughout the exercise.","Slowly extend your leg straight back, squeezing your glutes at the top of the movement.","Pause for a moment, then return to the starting position.","Repeat for the desired number of repetitions.","Switch sides and repeat with the other leg."]],["Cable Standing Inner Curl","0229-YwnI4ja","biceps","forearms",["forearms"],["Stand facing a cable machine with your feet shoulder-width apart.","Grasp the cable handle with an underhand grip, palms facing up.","Keep your elbows close to your sides and your upper arms stationary.","Exhale and curl the cable handle towards your shoulders, contracting your biceps.","Pause for a moment at the top of the movement, squeezing your biceps.","Inhale and slowly lower the cable handle back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Standing Lift","0230-qFpAkpP","abs","obliques",["obliques","lower back"],["Stand facing the cable machine with your feet shoulder-width apart.","Hold the cable handle with both hands and position it at waist height.","Engage your core and maintain a straight back throughout the exercise.","Keeping your arms straight, exhale and lift the cable handle up towards your opposite shoulder, rotating your torso.","Pause for a moment at the top, then inhale and slowly lower the cable handle back to the starting position.","Repeat for the desired number of repetitions, then switch sides."]],["Cable Standing One Arm Triceps Extension","0231-sYCcnon","triceps","shoulders",["shoulders"],["Stand with your feet shoulder-width apart, facing the cable machine.","Hold the cable handle with your right hand, palm facing down, and position your arm so that it is fully extended and parallel to the ground.","Keep your elbow stationary and close to your body.","Slowly bend your elbow, lowering the cable handle towards the back of your head.","Pause for a moment at the bottom of the movement, then extend your arm back to the starting position.","Repeat for the desired number of repetitions, then switch sides and perform the exercise with your left arm."]],["Cable Standing One Leg Calf Raise","1376-fgc9Xdl","calves","ankles",["ankles","feet"],["Stand facing a cable machine with your feet shoulder-width apart.","Hold onto the cable machine for support.","Lift one leg off the ground and balance on the other leg.","Slowly raise your heel off the ground, lifting your body up onto your toes.","Pause for a moment at the top, then slowly lower your heel back down to the starting position.","Repeat for the desired number of repetitions, then switch legs."]],["Cable Standing Pulldown (With Rope)","0232-CvPn9WV","biceps","forearms",["forearms","shoulders"],["Attach a rope to the cable machine at the highest setting.","Stand facing the machine with your feet shoulder-width apart.","Grasp the rope with an overhand grip, palms facing down.","Keep your back straight and core engaged throughout the exercise.","Pull the rope down towards your thighs, squeezing your biceps.","Pause for a moment at the bottom, then slowly release the rope back up.","Repeat for the desired number of repetitions."]],["Cable Standing Rear Delt Row (With Rope)","0233-ZfyAGhK","delts","trapezius",["trapezius","rhomboids","biceps"],["Stand facing a cable machine with your feet shoulder-width apart.","Hold the cable attachment with both hands, palms facing each other, and step back to create tension in the cable.","Keep your back straight and your core engaged.","Pull the cable towards your body, squeezing your shoulder blades together.","Pause for a moment at the peak of the movement, then slowly release the cable back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Standing Reverse Grip One Arm Overhead Tricep Extension","1727-i11JWU7","triceps","shoulders",["shoulders"],["Stand facing away from the cable machine with your feet shoulder-width apart.","Hold the cable handle with an underhand grip and extend your arm overhead, keeping your elbow close to your head.","Keep your upper arm stationary and slowly lower the cable handle behind your head by bending your elbow.","Pause for a moment at the bottom, then extend your arm back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Cable Standing Row (V-bar)","0234-4f8RXP8","upper back","biceps",["biceps","shoulders"],["Stand facing the cable machine with your feet shoulder-width apart.","Grasp the v-bar attachment with an overhand grip, palms facing down.","Keep your back straight and your core engaged.","Pull the v-bar towards your body, squeezing your shoulder blades together.","Pause for a moment at the peak of the movement, then slowly release the tension and return to the starting position.","Repeat for the desired number of repetitions."]],["Cable Standing Shoulder External Rotation","0235-FWdVhcW","delts","rotator cuff",["rotator cuff","trapezius"],["Stand with your feet shoulder-width apart and your knees slightly bent.","Hold the cable handle with your arm extended in front of you, parallel to the ground.","Keep your elbow slightly bent and your shoulder blades pulled back.","Slowly rotate your arm outward, away from your body, while keeping your elbow in the same position.","Pause for a moment at the end of the movement, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Cable Standing Twist Row (V-bar)","0236-JOZhu2h","upper back","biceps",["biceps","shoulders"],["Attach a v-bar attachment to a cable machine at chest height.","Stand facing the cable machine with your feet shoulder-width apart.","Grasp the v-bar with an overhand grip, palms facing down.","Take a step back to create tension in the cable.","Keep your back straight and core engaged throughout the exercise.","Pull the v-bar towards your torso by retracting your shoulder blades and bending your elbows.","As you pull, twist your torso to one side, squeezing your shoulder blades together.","Pause for a moment at the top of the movement, feeling the contraction in your upper back.","Slowly release the tension and return to the starting position, untwisting your torso.","Repeat the movement for the desired number of repetitions, alternating the twisting direction with each rep."]],["Cable Standing Up Straight Crossovers","1269-UKWTJWR","pectorals","deltoids",["deltoids","triceps"],["Stand in the middle of a cable machine with your feet shoulder-width apart.","Hold the handles of the cables with your palms facing down and your arms extended straight out to the sides.","Keeping your arms straight, bring your hands together in front of your body, crossing them over each other.","Pause for a moment, then slowly return to the starting position, keeping your arms extended.","Repeat for the desired number of repetitions."]],["Cable Straight Arm Pulldown","0238-x69MAlq","lats","shoulders",["shoulders","biceps"],["Attach a straight bar to the high pulley of a cable machine.","Stand facing the machine with your feet shoulder-width apart.","Grasp the bar with an overhand grip, keeping your arms straight and your palms facing down.","Engage your lats and pull the bar down towards your thighs, keeping your arms straight throughout the movement.","Pause for a moment at the bottom, then slowly return the bar to the starting position.","Repeat for the desired number of repetitions."]],["Cable Straight Arm Pulldown (With Rope)","0237-DT14T9T","lats","biceps",["biceps","forearms"],["Attach a rope to the cable machine at the highest setting.","Stand facing the machine with your feet shoulder-width apart.","Grasp the rope with both hands, palms facing down.","Extend your arms fully in front of you, keeping your elbows slightly bent.","Engage your lats and slowly pull the rope down towards your thighs, keeping your arms straight.","Pause for a moment at the bottom, then slowly release the tension and return to the starting position.","Repeat for the desired number of repetitions."]],["Cable Straight Back Seated Row","0239-Tq6gbK6","upper back","biceps",["biceps","forearms","shoulders"],["Sit on the cable row machine with your feet flat on the footrests and your knees slightly bent.","Grasp the cable handles with an overhand grip, palms facing down.","Keep your back straight and lean slightly forward from the hips.","Pull the cable handles towards your body, squeezing your shoulder blades together.","Pause for a moment at the peak of the movement, then slowly release the handles back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Supine Reverse Fly","0240-PQcUlDi","delts","trapezius",["trapezius","rhomboids"],["Attach a D-handle to a low pulley cable machine and lie face down on a flat bench.","Grasp the D-handle with each hand, palms facing down, and extend your arms straight out in front of you.","Keeping your arms straight, raise them out to the sides until they are parallel to the floor.","Pause for a moment at the top, then slowly lower your arms back down to the starting position.","Repeat for the desired number of repetitions."]],["Cable Thibaudeau Kayak Row","2464-ZgwWBoC","lats","biceps",["biceps","rhomboids","rear deltoids"],["Attach a cable handle to a low pulley and sit facing the machine with your feet flat on the floor.","Grasp the handle with your right hand and extend your arm fully, keeping a slight bend in your elbow.","Lean forward from your hips, keeping your back straight and your abs engaged.","Pull the handle towards your torso by retracting your shoulder blade and bending your elbow, keeping your arm close to your body.","Squeeze your back muscles at the top of the movement, then slowly return to the starting position.","Repeat for the desired number of repetitions, then switch sides and perform with your left arm."]],["Cable Triceps Pushdown (V-bar)","0241-gAwDzB3","triceps","forearms",["forearms"],["Attach a v-bar attachment to the cable machine at the highest setting.","Stand facing the cable machine with your feet shoulder-width apart.","Grasp the v-bar with an overhand grip, palms facing down, and your hands shoulder-width apart.","Keep your elbows close to your sides and your upper arms stationary throughout the exercise.","Engage your triceps and exhale as you push the v-bar down until your arms are fully extended.","Pause for a moment at the bottom of the movement, squeezing your triceps.","Inhale as you slowly return the v-bar to the starting position, maintaining control.","Repeat for the desired number of repetitions."]],["Cable Triceps Pushdown (V-bar) (With Arm Blaster)","2405-OxJk1fg","triceps","forearms",["forearms"],["Attach a v-bar attachment to the cable machine at the highest setting.","Stand facing the cable machine with your feet shoulder-width apart.","Grasp the v-bar with an overhand grip, palms facing down, and your hands shoulder-width apart.","Keep your elbows close to your sides and your upper arms stationary throughout the exercise.","Engage your triceps and exhale as you push the v-bar down until your arms are fully extended.","Pause for a moment at the bottom of the movement, squeezing your triceps.","Inhale as you slowly return the v-bar to the starting position, maintaining control.","Repeat for the desired number of repetitions."]],["Cable Tuck Reverse Crunch","0242-TXtXc84","abs","hip flexors",["hip flexors"],["Attach a cable to a low pulley and lie down on a mat facing up.","Hold the cable with both hands and extend your arms straight up above your chest.","Bend your knees and lift your legs up, bringing your knees towards your chest.","At the same time, curl your pelvis up towards your chest, lifting your hips off the ground.","Pause for a moment at the top, then slowly lower your legs and hips back down to the starting position.","Repeat for the desired number of repetitions."]],["Cable Twist","0243-aVs3BR3","abs","obliques",["obliques"],["Stand with your feet shoulder-width apart, facing the cable machine.","Hold the cable handle with both hands in front of your chest, keeping your arms slightly bent.","Engage your core and twist your torso to the right, pulling the cable across your body.","Pause for a moment at the end of the movement, feeling the contraction in your abs and obliques.","Slowly return to the starting position, resisting the cable's pull.","Repeat the movement to the left side.","Continue alternating sides for the desired number of repetitions."]],["Cable Twist (Up-down)","0862-fhZQPlV","abs","obliques",["obliques","lower back"],["Stand with your feet shoulder-width apart, facing the cable machine.","Hold the cable handle with both hands in front of your chest, keeping your arms slightly bent.","Engage your core and slowly rotate your torso to one side, keeping your hips and legs stable.","Pause for a moment at the end of the rotation, then slowly return to the starting position.","Repeat the rotation to the opposite side.","Continue alternating sides for the desired number of repetitions."]],["Cable Twisting Pull","0244-zCgxPbV","lats","shoulders",["shoulders","biceps"],["Attach a cable handle to a low pulley and stand facing the machine.","Grasp the handle with your left hand and step away from the machine, extending your arm fully.","Position your feet shoulder-width apart, with your knees slightly bent.","Keep your back straight and your core engaged throughout the exercise.","Pull the handle towards your body, rotating your torso to the right as you do so.","Squeeze your back muscles at the end of the movement.","Slowly return to the starting position, keeping tension on the cable.","Repeat for the desired number of repetitions, then switch sides and perform with your right hand."]],["Cable Two Arm Curl On Incline Bench","1645-H9y3Dkr","biceps","forearms",["forearms"],["Sit on an incline bench with your back against the pad and your feet flat on the ground.","Grasp the cable handles with an underhand grip, palms facing up, and your arms fully extended.","Keeping your upper arms stationary, exhale and curl the handles towards your shoulders while contracting your biceps.","Pause for a moment at the top of the movement, squeezing your biceps.","Inhale and slowly lower the handles back to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Cable Two Arm Tricep Kickback","1728-vvNjDJS","triceps","shoulders",["shoulders"],["Stand with your feet shoulder-width apart and knees slightly bent.","Hold the cable handle in each hand with your palms facing inwards and your arms bent at a 90-degree angle.","Keeping your upper arms stationary, extend your forearms backwards until your arms are fully extended.","Pause for a moment, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Cable Underhand Pulldown","0245-xBYcQHj","lats","biceps",["biceps","forearms"],["Adjust the cable machine so that the pulldown bar is at a height above your head.","Sit down on the seat and grab the pulldown bar with an underhand grip, hands slightly wider than shoulder-width apart.","Keep your back straight and lean back slightly.","Pull the bar down towards your chest, squeezing your shoulder blades together.","Pause for a moment at the bottom of the movement, then slowly release the bar back up to the starting position.","Repeat for the desired number of repetitions."]],["Cable Upper Chest Crossovers","1270-j7XMAyn","pectorals","deltoids",["deltoids","triceps"],["Attach the handles to the cables at chest height.","Stand in the center of the cable machine with one foot slightly in front of the other.","Grasp the handles with your palms facing down and your arms extended out to the sides.","Keep a slight bend in your elbows and engage your core.","Pull the cables together in front of your chest, crossing them over each other.","Squeeze your chest muscles at the peak of the movement.","Slowly release the cables back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Upper Row","1324-PQStVXH","upper back","biceps",["biceps","shoulders"],["Attach a straight bar to a cable machine at chest height.","Stand facing the machine with your feet shoulder-width apart.","Grasp the bar with an overhand grip, hands slightly wider than shoulder-width apart.","Keep your back straight and your core engaged.","Pull the bar towards your upper chest, squeezing your shoulder blades together.","Pause for a moment at the top of the movement.","Slowly release the bar back to the starting position.","Repeat for the desired number of repetitions."]],["Cable Upright Row","0246-cALKspW","delts","traps",["traps","biceps"],["Stand with your feet shoulder-width apart, knees slightly bent, and hold the cable attachment with an overhand grip.","Keep your back straight and your core engaged throughout the exercise.","Pull the cable attachment straight up towards your chin, leading with your elbows.","Pause for a moment at the top, squeezing your shoulder blades together.","Slowly lower the cable attachment back down to the starting position.","Repeat for the desired number of repetitions."]],["Cable Wide Grip Rear Pulldown Behind Neck","1325-CmEr4pM","lats","biceps",["biceps","rhomboids","rear deltoids"],["Adjust the cable machine so that the pulldown bar is at a height above your head.","Sit down on the seat and grab the pulldown bar with a wide overhand grip.","Keep your back straight and your chest up as you lean back slightly.","Pull the bar down towards your upper chest, squeezing your shoulder blades together.","Pause for a moment at the bottom of the movement, then slowly release the bar back up to the starting position.","Repeat for the desired number of repetitions."]],["Cable Wrist Curl","0247-LrV4s90","forearms","biceps",["biceps","brachialis"],["Attach a straight bar to a low pulley cable machine.","Stand facing the machine with your feet shoulder-width apart.","Grasp the bar with an underhand grip, palms facing up, and your hands shoulder-width apart.","Rest your forearms on a bench or pad, with your wrists hanging off the edge.","Keeping your forearms stationary, exhale and curl your wrists upward as far as possible.","Pause for a moment at the top, then inhale and slowly lower the bar back to the starting position.","Repeat for the desired number of repetitions."]],["Calf Push Stretch With Hands Against Wall","1407-PzNxakt","calves","hamstrings",["hamstrings"],["Stand facing a wall with your feet hip-width apart.","Place your hands against the wall at shoulder height.","Step back with one foot, keeping your heel on the ground and your leg straight.","Bend your front knee slightly and lean forward, feeling a stretch in your calf.","Hold the stretch for 20-30 seconds.","Switch legs and repeat the stretch."]],["Calf Stretch With Hands Against Wall","1377-m0tCHqc","calves","hamstrings",["hamstrings"],["Stand facing a wall with your feet hip-width apart.","Place your hands against the wall at shoulder height.","Step your right foot back, keeping your heel on the ground and your leg straight.","Bend your left knee and lean forward, keeping your back leg straight and your heel on the ground.","Hold the stretch for 20-30 seconds.","Switch legs and repeat the stretch."]],["Calf Stretch With Rope","1378-1LVFcEn","calves","hamstrings",["hamstrings"],["Stand facing a wall or sturdy object with your feet hip-width apart.","Hold the ends of the rope in each hand and place the middle of the rope around the ball of your right foot.","Step back with your left foot, keeping your heel on the ground and your leg straight.","Lean forward, keeping your back straight, and gently pull on the rope to stretch your calf.","Hold the stretch for 20-30 seconds, then release.","Repeat on the other leg."]],["Cambered Bar Lying Row","0248-R5swFnc","upper back","biceps",["biceps","forearms"],["Set up a barbell on the floor and lie face down on a bench with your chest just off the edge.","Reach down and grab the barbell with an overhand grip, slightly wider than shoulder-width apart.","With your legs straight and feet on the ground, lift the barbell off the floor by extending your arms.","Pull the barbell towards your chest, squeezing your shoulder blades together.","Lower the barbell back down to the starting position and repeat for the desired number of repetitions."]],["Captains Chair Straight Leg Raise","2963-weoDEpH","abs","hip flexors",["hip flexors"],["Sit on the captain's chair with your back against the backrest and your forearms resting on the arm pads.","Keep your upper body stable and your back straight.","Engage your abs and lift your legs up in front of you, keeping them straight.","Continue lifting until your legs are parallel to the ground or as high as you can comfortably go.","Pause for a moment at the top, then slowly lower your legs back down to the starting position.","Repeat for the desired number of repetitions."]],["Chair Leg Extended Stretch","1548-xGgAGPm","quads","hamstrings",["hamstrings","calves"],["Sit on the edge of a chair with your back straight and feet flat on the ground.","Extend one leg straight out in front of you, keeping your heel on the ground.","Lean forward slightly, feeling a stretch in your quadriceps.","Hold this position for 20-30 seconds.","Switch legs and repeat the stretch."]],["Chest And Front Of Shoulder Stretch","1271-Uto7l43","pectorals","deltoids",["deltoids"],["Stand tall with your feet shoulder-width apart.","Extend your arms straight out in front of you at shoulder height.","Cross your arms in front of your body, with your right arm on top of your left arm.","Interlace your fingers and press your palms together.","Gently squeeze your shoulder blades together and push your hands forward, feeling a stretch in your chest and front of your shoulders.","Hold the stretch for 20-30 seconds, then release.","Repeat for the desired number of repetitions."]],["Chest Dip","0251-9WTm7dq","pectorals","triceps",["triceps","shoulders"],["Position yourself on parallel bars with your arms fully extended and your body straight.","Lower your body by bending your elbows until your shoulders are below your elbows.","Push yourself back up to the starting position by straightening your arms.","Repeat for the desired number of repetitions."]],["Chest Dip (On Dip-pull-up Cage)","1430-XgWyAiA","pectorals","triceps",["triceps","shoulders"],["Adjust the dip bars to a height that allows you to comfortably grip them.","Stand between the bars and place your hands on each bar, slightly wider than shoulder-width apart.","Jump up and straighten your arms, supporting your body weight on the bars.","Bend your knees and cross your ankles behind you.","Lower your body by bending your elbows, keeping your chest up and your shoulders down.","Continue lowering until your shoulders are below your elbows or until you feel a stretch in your chest.","Push through your palms and extend your elbows to raise your body back up to the starting position.","Repeat for the desired number of repetitions."]],["Chest Dip On Straight Bar","2462-LQFOrMn","pectorals","triceps",["triceps","shoulders"],["Grab the parallel bars with your palms facing down and your arms fully extended.","Bend your knees and cross your ankles.","Lower your body by bending your arms until your shoulders are below your elbows.","Push yourself back up to the starting position by straightening your arms.","Repeat for the desired number of repetitions."]],["Chest Stretch With Exercise Ball","1272-ykA5tU7","pectorals","shoulders",["shoulders","triceps"],["Sit on the stability ball with your feet flat on the ground and your back straight.","Hold the exercise ball with both hands and extend your arms straight out in front of you.","Slowly bring the exercise ball towards your chest, feeling a stretch in your chest muscles.","Hold the stretch for a few seconds, then slowly return to the starting position.","Repeat for the desired number of repetitions."]],["Chest Tap Push-up (Male)","3216-7E06s6d","pectorals","triceps",["triceps","shoulders"],["Start in a high plank position with your hands slightly wider than shoulder-width apart and your body in a straight line.","Lower your body towards the ground by bending your elbows, keeping them close to your sides.","As you lower yourself, tap your chest with your right hand.","Push yourself back up to the starting position.","Repeat the movement, this time tapping your chest with your left hand.","Continue alternating sides for the desired number of repetitions."]],["Chin-up","1326-T2mxWqc","lats","biceps",["biceps","forearms"],["Hang from a pull-up bar with your palms facing towards you and your hands shoulder-width apart.","Engage your core and pull your body up towards the bar, leading with your chest.","Continue pulling until your chin is above the bar.","Pause for a moment at the top, then slowly lower your body back down to the starting position.","Repeat for the desired number of repetitions."]],["Chin-ups (Narrow Parallel Grip)","0253-G70mEAJ","upper back","biceps",["biceps","forearms"],["Hang from a pull-up bar with a narrow parallel grip, palms facing towards you.","Engage your back muscles and pull your body up towards the bar, keeping your elbows close to your body.","Continue pulling until your chin is above the bar.","Pause for a moment at the top, then slowly lower your body back down to the starting position.","Repeat for the desired number of repetitions."]],["Circles Knee Stretch","0257-X7jbxra","calves","hamstrings",["hamstrings","quadriceps"],["Stand with your feet shoulder-width apart and your hands on your hips.","Bend your knees slightly and lift your heels off the ground, balancing on the balls of your feet.","Keeping your knees bent, rotate your knees in a circular motion, first clockwise and then counterclockwise.","Perform the movement for the desired number of repetitions."]],["Clap Push Up","1273-wigSg76","pectorals","triceps",["triceps","shoulders"],["Start in a high plank position with your hands slightly wider than shoulder-width apart.","Lower your body towards the ground by bending your elbows, keeping your core engaged.","Push through your palms explosively to propel your body off the ground.","While in mid-air, clap your hands together before landing back in the starting position.","Repeat for the desired number of repetitions."]],["Clock Push-up","0258-CMAxnsG","pectorals","triceps",["triceps","shoulders","core"],["Start in a high plank position with your hands directly under your shoulders and your body in a straight line.","Lower your body towards the ground by bending your elbows, keeping them close to your sides.","As you lower, rotate your body to the left, extending your left arm straight out to the side.","Push back up to the starting position, while rotating your body to the center.","Repeat the push-up, this time rotating your body to the right and extending your right arm out to the side.","Continue alternating sides with each repetition."]],["Close Grip Chin-up","1327-VnfUNW7","lats","biceps",["biceps","forearms"],["Grab the pull-up bar with your palms facing towards you and your hands shoulder-width apart.","Hang from the bar with your arms fully extended and your feet off the ground.","Engage your back muscles and pull your body up towards the bar, keeping your elbows close to your body.","Continue pulling until your chin is above the bar.","Pause for a moment at the top, then slowly lower your body back down to the starting position.","Repeat for the desired number of repetitions."]],["Close-grip Push-up","0259-x6KpKpq","triceps","chest",["chest","shoulders"],["Start in a high plank position with your hands placed close together, directly under your shoulders.","Engage your core and lower your body towards the ground, keeping your elbows close to your sides.","Push through your palms to extend your arms and return to the starting position.","Repeat for the desired number of repetitions."]],["Close-grip Push-up (On Knees)","2398-v3vLFW0","triceps","chest",["chest","shoulders"],["Start by getting on your hands and knees, with your hands shoulder-width apart and your knees hip-width apart.","Lower your upper body towards the ground by bending your elbows, keeping them close to your sides.","Pause for a moment when your chest is just above the ground.","Push through your palms to straighten your arms and return to the starting position.","Repeat for the desired number of repetitions."]],["Cocoons","0260-SLKj2pX","abs","hip flexors",["hip flexors","lower back"],["Lie flat on your back with your knees bent and feet flat on the ground.","Place your hands behind your head with your elbows pointing outwards.","Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Crab Twist Toe Touch","1468-xgsGFVM","abs","obliques",["obliques","hip flexors"],["Start by sitting on the ground with your knees bent and feet flat on the floor.","Place your hands behind you, fingers pointing towards your feet, and lift your hips off the ground.","Extend one leg straight out in front of you while simultaneously reaching your opposite hand towards your toes.","Return to the starting position and repeat on the other side.","Continue alternating sides for the desired number of repetitions."]],["Cross Body Crunch","0262-rbu5UUb","abs","obliques",["obliques"],["Lie flat on your back with your knees bent and feet flat on the ground.","Place your hands behind your head with your elbows pointing outwards.","Engaging your abs, lift your upper body off the ground and twist to bring your right elbow towards your left knee.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat on the other side, bringing your left elbow towards your right knee.","Repeat for the desired number of repetitions."]],["Crunch (Hands Overhead)","0267-kjJ3VoQ","abs","hip flexors",["hip flexors"],["Lie flat on your back with your knees bent and feet flat on the ground.","Extend your arms straight above your head.","Engaging your abs, lift your upper body off the ground, curling forward towards your knees.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Crunch (On Stability Ball)","0271-MCUhf1F","abs","hip flexors",["hip flexors"],["Sit on the stability ball with your feet flat on the ground and your knees bent at a 90-degree angle.","Lie back on the ball until your lower back is supported and your upper body is parallel to the floor.","Place your hands behind your head or across your chest.","Engage your abs and lift your upper body towards your knees, curling your torso forward.","Pause for a moment at the top of the movement, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Crunch (On Stability Ball, Arms Straight)","0272-Sn8wxAI","abs","hip flexors",["hip flexors"],["Sit on the stability ball with your feet flat on the ground and your knees bent at a 90-degree angle.","Lie back on the ball until your lower back is supported and your upper body is parallel to the floor.","Place your hands behind your head or cross them over your chest.","Engage your abs and lift your upper body off the ball, curling your shoulders towards your hips.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Crunch Floor","0274-TFqbd8t","abs","hip flexors",["hip flexors"],["Lie flat on your back with your knees bent and feet flat on the ground.","Place your hands behind your head with your elbows pointing outwards.","Engage your abs and lift your shoulders off the ground, curling forward towards your knees.","Pause for a moment at the top, then slowly lower your shoulders back down to the starting position.","Repeat for the desired number of repetitions."]],["Curl-up","3016-g2oKspu","abs","hip flexors",["hip flexors"],["Lie flat on your back with your knees bent and feet flat on the ground.","Place your hands behind your head with your elbows pointing outwards.","Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Curtsey Squat","3769-gUjqdei","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart.","Take a step diagonally behind and across your body with your right foot, crossing it behind your left leg.","Bend both knees as if you were curtsying, lowering your body towards the ground.","Keep your torso upright and your weight on your front foot.","Push through your front foot to return to the starting position.","Repeat on the other side, stepping diagonally behind and across your body with your left foot."]],["Cycle Cross Trainer","2331-XSCHmiI","cardiovascular system","quadriceps",["quadriceps","hamstrings","glutes"],["Adjust the seat height and position yourself on the cycle cross trainer.","Place your feet on the pedals and grip the handlebars.","Start pedaling in a smooth and controlled motion.","Maintain a steady pace and increase the resistance if desired.","Continue pedaling for the desired duration of your cardio workout."]],["Dead Bug","0276-iny3m5y","abs","hip flexors",["hip flexors","lower back"],["Lie flat on your back with your arms extended towards the ceiling.","Bend your knees and lift your legs off the ground, creating a 90-degree angle at your hips and knees.","Engage your core and lower back to press your lower back into the ground.","Slowly lower your right arm and left leg towards the ground, keeping them straight and hovering just above the floor.","Pause for a moment, then return to the starting position.","Repeat the movement with your left arm and right leg.","Continue alternating sides for the desired number of repetitions."]],["Decline Crunch","0277-9Ap7miY","abs","hip flexors",["hip flexors"],["Lie on a decline bench with your feet secured and your knees bent at a 90-degree angle.","Place your hands behind your head or across your chest.","Engage your abs and lift your upper body towards your knees, curling your torso.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Decline Push-up","0279-i5cEhka","pectorals","triceps",["triceps","shoulders"],["Place your hands on the ground slightly wider than shoulder-width apart, with your feet elevated on a stable surface.","Keep your body in a straight line from head to toe, engaging your core muscles.","Lower your chest towards the ground by bending your elbows, keeping them close to your body.","Push through your palms to extend your arms and return to the starting position.","Repeat for the desired number of repetitions."]],["Decline Sit-up","0282-QLL2gdc","abs","hip flexors",["hip flexors","lower back"],["Lie on a decline bench with your feet secured and your knees bent.","Place your hands behind your head or across your chest.","Engage your abs and lift your upper body off the bench, curling forward towards your knees.","Pause for a moment at the top, then slowly lower your upper body back down to the starting position.","Repeat for the desired number of repetitions."]],["Deep Push Up","1274-vptOQ4N","pectorals","triceps",["triceps","shoulders"],["Start in a high plank position with your hands slightly wider than shoulder-width apart and your body in a straight line.","Lower your chest towards the ground by bending your elbows, keeping them close to your body.","Push through your palms to extend your arms and return to the starting position.","Repeat for the desired number of repetitions."]],["Diamond Push-up","0283-soIB2rj","triceps","chest",["chest","shoulders"],["Start in a high plank position with your hands close together, forming a diamond shape with your thumbs and index fingers.","Keep your body in a straight line from head to toe, engaging your core and glutes.","Lower your chest towards the diamond shape formed by your hands, keeping your elbows close to your body.","Pause for a moment at the bottom, then push yourself back up to the starting position.","Repeat for the desired number of repetitions."]],["Donkey Calf Raise","0284-u5ESqzH","calves","hamstrings",["hamstrings","glutes"],["Stand with your toes on an elevated surface, such as a step or block.","Place your hands on a stable support, such as a wall or railing, for balance.","Raise your heels as high as possible, lifting your body weight onto the balls of your feet.","Pause for a moment at the top, then slowly lower your heels back down to the starting position.","Repeat for the desired number of repetitions."]],["Drop Push Up","1275-Q497lAE","pectorals","triceps",["triceps","shoulders"],["Start in a high plank position with your hands slightly wider than shoulder-width apart.","Lower your chest towards the ground, keeping your elbows close to your body.","Once your chest is just above the ground, quickly drop your knees to the ground.","Push yourself back up to the starting position by extending your arms.","Repeat for the desired number of repetitions."]],["Dumbbell Alternate Biceps Curl","0285-BU15nH4","biceps","forearms",["forearms"],["Stand up straight with a dumbbell in each hand, palms facing forward and arms fully extended.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions, alternating arms."]],["Dumbbell Alternate Biceps Curl (With Arm Blaster)","2403-CfKsRbG","biceps","forearms",["forearms"],["Stand up straight with your feet shoulder-width apart and hold a dumbbell in each hand, palms facing forward.","Place the arm blaster on your upper arms, ensuring a secure fit.","Keeping your upper arms stationary, exhale and curl one dumbbell up towards your shoulder while contracting your biceps.","Continue to raise the dumbbell until your biceps are fully contracted and the dumbbell is at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly lower the dumbbell back to the starting position.","Repeat the movement with the opposite arm.","Continue alternating arms for the desired number of repetitions."]],["Dumbbell Alternate Hammer Preacher Curl","1646-fy7Tgy4","biceps","forearms",["forearms"],["Sit on a preacher bench with a dumbbell in each hand, palms facing your torso and arms fully extended.","Keep your upper arms stationary and exhale as you curl the weights while contracting your biceps.","Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the recommended amount of repetitions."]],["Dumbbell Alternate Preacher Curl","1647-NlfIbzq","biceps","forearms",["forearms"],["Sit on a preacher bench with a dumbbell in each hand, palms facing up.","Rest your upper arms on the pad of the preacher bench, allowing your arms to fully extend.","Keeping your upper arms stationary, exhale and curl the dumbbell in your right hand as you contract your biceps.","Continue to curl the dumbbell until your biceps are fully contracted and the dumbbell is at shoulder level.","Pause for a moment, then inhale and slowly lower the dumbbell back to the starting position.","Repeat the movement with your left arm.","Continue alternating arms for the desired number of repetitions."]],["Dumbbell Alternate Seated Hammer Curl","1648-6em2Dxj","biceps","forearms",["forearms"],["Sit on a bench with a dumbbell in each hand, palms facing your torso and arms extended down.","Keep your back straight and your elbows close to your torso.","Exhale and curl the dumbbell in your right hand towards your shoulder, keeping your upper arm stationary.","Continue to raise the dumbbell until your biceps are fully contracted and the dumbbell is at shoulder level.","Pause for a brief moment, then inhale and slowly lower the dumbbell back to the starting position.","Repeat the movement with your left arm.","Continue alternating arms for the desired number of repetitions."]],["Dumbbell Alternate Side Press","0286-izMnLqz","delts","triceps",["triceps","core"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand at shoulder height.","Press one dumbbell overhead while keeping the other dumbbell at shoulder height.","Lower the pressed dumbbell back to shoulder height while pressing the other dumbbell overhead.","Continue alternating sides for the desired number of repetitions."]],["Dumbbell Alternating Bicep Curl With Leg Raised On Exercise Ball","1649-Zwiw7XR","biceps","forearms",["forearms","shoulders"],["Stand with your feet shoulder-width apart and hold a dumbbell in each hand, palms facing forward.","Place an exercise ball behind you and position one foot on top of it, keeping your balance.","With your arms fully extended and elbows close to your sides, curl one dumbbell towards your shoulder while keeping your upper arm stationary.","Lower the dumbbell back down to the starting position and repeat with the other arm.","Continue alternating arms for the desired number of repetitions."]],["Dumbbell Alternating Seated Bicep Curl On Exercise Ball","1650-J74XlNf","biceps","forearms",["forearms"],["Sit on an exercise ball with your feet flat on the ground and your back straight.","Hold a dumbbell in each hand with your palms facing forward and your arms fully extended.","Keeping your upper arms stationary, exhale and curl one dumbbell while rotating your forearm until your palm is facing your shoulder.","Inhale and slowly lower the dumbbell back to the starting position.","Repeat the curl with the other arm.","Continue alternating curls for the desired number of repetitions."]],["Dumbbell Arnold Press","2137-Xy4jlWA","delts","triceps",["triceps","upper chest"],["Sit on a bench with back support and hold a dumbbell in each hand at shoulder level, palms facing your body and elbows bent.","Press the dumbbells upward until your arms are fully extended and your palms are facing forward.","Rotate your wrists as you lift, so that your palms are facing forward at the top of the movement.","Pause for a moment at the top, then slowly lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Arnold Press V. 2","0287-eOrFCnx","delts","triceps",["triceps","upper chest"],["Sit on a bench with back support and hold a dumbbell in each hand at shoulder level, palms facing your body and elbows bent.","Press the dumbbells upward until your arms are fully extended and your palms are facing forward.","Rotate your wrists as you lift, so that your palms end up facing forward at the top of the movement.","Pause for a moment at the top, then slowly lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Around Pullover","0288-vi8EhoE","pectorals","triceps",["triceps","latissimus dorsi"],["Lie flat on a bench with your head at one end and your feet firmly on the ground.","Hold a dumbbell with both hands and extend your arms straight above your chest.","Keeping your arms straight, slowly lower the dumbbell behind your head in an arc motion.","Pause for a moment at the bottom, then raise the dumbbell back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Bench Press","0289-SpYC0Kp","pectorals","triceps",["triceps","shoulders"],["Lie flat on a bench with your feet flat on the ground and your back pressed against the bench.","Hold a dumbbell in each hand, with your palms facing forward and your arms extended above your chest.","Lower the dumbbells slowly to the sides of your chest, keeping your elbows at a 90-degree angle.","Pause for a moment, then push the dumbbells back up to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Dumbbell Bench Seated Press","0290-3d7wHyd","delts","triceps",["triceps","chest"],["Sit on a bench with a dumbbell in each hand, resting on your thighs.","Lean back and position the dumbbells to the sides of your chest, palms facing forward.","Press the dumbbells upward until your arms are fully extended.","Pause for a moment at the top, then slowly lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Bench Squat","0291-mnzcrIB","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Place a dumbbell on the ground in front of a bench.","Stand facing away from the bench with your feet shoulder-width apart.","Bend at the knees and hips to lower yourself down towards the bench, keeping your chest up and back straight.","Once your glutes touch the bench, push through your heels to stand back up to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Bent Over Row","0293-BJ0Hz5L","upper back","biceps",["biceps","forearms"],["Stand with your feet shoulder-width apart, knees slightly bent, and hold a dumbbell in each hand with your palms facing your body.","Bend forward at the hips, keeping your back straight and your core engaged.","Let your arms hang straight down towards the floor, with your elbows slightly bent.","Pull the dumbbells up towards your chest, squeezing your shoulder blades together.","Pause for a moment at the top, then slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Bicep Curl Lunge With Bowling Motion","1651-1VpF8db","biceps","forearms",["forearms","shoulders"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand with your palms facing forward.","Take a step forward with your right foot, bending your right knee and lowering your body into a lunge position.","As you lunge forward, curl the dumbbells up towards your shoulders, keeping your elbows close to your body.","At the bottom of the lunge, rotate your torso to the right, as if you were bowling a ball.","Reverse the motion, stepping back with your right foot and returning to the starting position while lowering the dumbbells back down.","Repeat the lunge and curl motion, this time rotating your torso to the left.","Continue alternating sides for the desired number of repetitions."]],["Dumbbell Bicep Curl On Exercise Ball With Leg Raised","1652-2NImIAG","biceps","forearms",["forearms","shoulders"],["Sit on an exercise ball with your feet flat on the ground and your back straight.","Hold a dumbbell in each hand with your palms facing forward and your arms fully extended.","Slowly curl the dumbbells towards your shoulders, keeping your elbows close to your sides.","Pause for a moment at the top of the movement, then slowly lower the dumbbells back to the starting position.","While performing the bicep curl, raise one leg off the ground and hold it in the air for the duration of the exercise.","Repeat for the desired number of repetitions, then switch legs and repeat."]],["Dumbbell Bicep Curl With Stork Stance","1653-uSkDMYl","biceps","forearms",["forearms"],["Stand with your feet shoulder-width apart and hold a dumbbell in each hand, palms facing forward.","Extend one leg behind you, balancing on the toes of that foot.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the weights until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions, then switch legs and repeat."]],["Dumbbell Biceps Curl","0294-NbVPDMW","biceps","forearms",["forearms"],["Stand up straight with a dumbbell in each hand, palms facing forward and arms fully extended.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the weights until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Biceps Curl (With Arm Blaster)","2401-nlJsbkW","biceps","forearms",["forearms"],["Stand up straight with a dumbbell in each hand, palms facing forward.","Keep your elbows close to your torso and your upper arms stationary.","Exhale and curl the weights while contracting your biceps.","Continue to raise the weights until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Biceps Curl Reverse","1654-nFc4FyV","biceps","forearms",["forearms"],["Stand up straight with a dumbbell in each hand, palms facing down and arms fully extended.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Biceps Curl Squat","1655-niXESDw","biceps","forearms",["forearms"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand with your palms facing forward.","Keeping your back straight and your elbows close to your sides, exhale and curl the dumbbells up towards your shoulders.","Pause for a moment at the top, squeezing your biceps.","Inhale and slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Biceps Curl V Sit On Bosu Ball","1656-H1XAdpk","biceps","forearms",["forearms","shoulders"],["Sit on a bosu ball with your feet flat on the ground and your knees bent at a 90-degree angle.","Hold a dumbbell in each hand with your palms facing forward and your arms fully extended down by your sides.","Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps.","Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Burpee","1201-0JtKWum","cardiovascular system","quadriceps",["quadriceps","hamstrings","calves","shoulders","triceps","core"],["Start in a standing position with your feet shoulder-width apart and a dumbbell in each hand.","Lower your body into a squat position, placing the dumbbells on the ground in front of you.","Kick your feet back into a push-up position, keeping your body in a straight line.","Perform a push-up, bending your elbows and lowering your chest towards the ground.","Jump your feet back towards your hands, landing in a squat position.","Stand up explosively, lifting the dumbbells off the ground and bringing them to your shoulders.","Press the dumbbells overhead, fully extending your arms.","Lower the dumbbells back to your shoulders and repeat the entire sequence for the desired number of repetitions."]],["Dumbbell Clean","0295-7Hg55JG","glutes","hamstrings",["hamstrings","quadriceps","calves"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand with an overhand grip.","Bend your knees and lower your hips into a squat position, keeping your back straight and chest up.","Explosively extend your hips and knees, driving through your heels to jump off the ground.","As you jump, shrug your shoulders and pull the dumbbells up towards your shoulders, keeping them close to your body.","Catch the dumbbells at shoulder height, with your elbows pointing forward and your palms facing up.","Lower the dumbbells back down to the starting position by reversing the movement.","Repeat for the desired number of repetitions."]],["Dumbbell Close Grip Press","1731-7jGOBF3","triceps","chest",["chest","shoulders"],["Sit on a flat bench with a dumbbell in each hand, resting on your thighs.","Using your thighs to help raise the dumbbells, lift the dumbbells one at a time so that you can hold them in front of you at shoulder width.","Once at shoulder width, rotate your wrists forward so that the palms of your hands are facing away from you. This will be your starting position.","As you breathe in, slowly lower the dumbbells to your side until they are about level with your chest.","As you exhale, use your triceps to lift the dumbbells back to the starting position. Make sure to use only your triceps and do not use your forearms or biceps to help lift the dumbbells.","After a second pause at the contracted position, repeat the movement for the prescribed amount of repetitions."]],["Dumbbell Close-grip Press","0296-RxayqAZ","triceps","chest",["chest","shoulders"],["Sit on a flat bench with a dumbbell in each hand, resting on your thighs.","Using your thighs to help raise the dumbbells, lift the dumbbells one at a time so that you can hold them in front of you at shoulder width.","Once at shoulder width, rotate your wrists forward so that the palms of your hands are facing away from you. This will be your starting position.","As you breathe in, slowly lower the dumbbells to your side until they are about level with your chest.","As you exhale, use your triceps to lift the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Concentration Curl","0297-gvsWLQw","biceps","forearms",["forearms"],["Sit on a bench with your legs spread apart and a dumbbell in one hand, resting your elbow on the inside of your thigh.","Fully extend your arm and hold the dumbbell with an underhand grip.","Keeping your upper arm stationary, exhale and curl the weight up towards your shoulder while contracting your biceps.","Continue to raise the dumbbell until your biceps are fully contracted and the dumbbell is at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly lower the dumbbell back to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell Contralateral Forward Lunge","3635-ecl28tP","glutes","quadriceps",["quadriceps","hamstrings","calves"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand.","Take a step forward with your right foot, keeping your back straight and core engaged.","Lower your body by bending both knees until your right thigh is parallel to the ground.","Push through your right heel to return to the starting position.","Repeat with your left leg.","Alternate legs for the desired number of repetitions."]],["Dumbbell Cross Body Hammer Curl","0298-Qyk5J3p","biceps","forearms",["forearms"],["Stand up straight with a dumbbell in each hand, palms facing your body.","Keep your elbows close to your torso and your upper arms stationary.","Exhale and curl the weights while contracting your biceps, bringing the dumbbells across your body towards your opposite shoulder.","Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Cross Body Hammer Curl V. 2","1657-HDYiZcY","biceps","forearms",["forearms"],["Stand up straight with a dumbbell in each hand, palms facing your body.","Keep your elbows close to your torso and your upper arms stationary.","Exhale and curl the weights while contracting your biceps, bringing the dumbbells as close to your opposite shoulder as possible.","Hold the contracted position for a brief pause as you squeeze your biceps.","Inhale and slowly begin to lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Cuban Press","0299-QfAKy1G","delts","triceps",["triceps","upper back"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand at shoulder height with your palms facing down.","Keeping your core engaged and your elbows slightly bent, press the dumbbells up and overhead until your arms are fully extended.","Rotate your wrists so that your palms are facing forward.","Slowly lower the dumbbells back to the starting position, rotating your wrists back to the starting position as you do so.","Repeat for the desired number of repetitions."]],["Dumbbell Cuban Press V. 2","2136-BqgCRif","delts","triceps",["triceps","upper back"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand at shoulder height with your palms facing down.","Keeping your core engaged and your back straight, press the dumbbells straight up overhead until your arms are fully extended.","Rotate your wrists so that your palms are facing forward.","Lower the dumbbells back down to shoulder height, rotating your wrists back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Deadlift","0300-nUwVh7b","glutes","hamstrings",["hamstrings","lower back"],["Stand with your feet shoulder-width apart, toes pointing forward.","Hold a dumbbell in each hand, palms facing your body, arms extended downwards.","Bend at your hips and knees, lowering the dumbbells towards the ground while keeping your back straight.","Push through your heels and extend your hips and knees, lifting the dumbbells back up to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Decline Bench Press","0301-DwhEmmE","pectorals","triceps",["triceps","shoulders"],["Lie down on a decline bench with your feet secured and your head lower than your hips.","Hold a dumbbell in each hand and extend your arms straight up above your chest, palms facing forward.","Lower the dumbbells slowly to the sides of your chest, keeping your elbows at a 90-degree angle.","Push the dumbbells back up to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Dumbbell Decline Fly","0302-xXm4nYq","pectorals","shoulders",["shoulders"],["Lie on a decline bench with your feet secured and your head lower than your hips.","Hold a dumbbell in each hand with your palms facing each other and your arms extended above your chest.","Lower the dumbbells out to the sides in a wide arc until you feel a stretch in your chest.","Pause for a moment, then squeeze your chest muscles to bring the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Decline Hammer Press","0303-1qrWgZ2","pectorals","triceps",["triceps","shoulders"],["Lie on a decline bench with your feet secured and your head lower than your hips.","Hold a dumbbell in each hand with your palms facing each other and your arms extended above your chest.","Lower the dumbbells to the sides of your chest, keeping your elbows slightly bent.","Press the dumbbells back up to the starting position, fully extending your arms.","Repeat for the desired number of repetitions."]],["Dumbbell Decline One Arm Fly","1276-NL6YBwN","pectorals","shoulders",["shoulders"],["Lie down on a decline bench with a dumbbell in one hand, resting it on your thigh.","Using your thigh to help raise the dumbbell, lift it up to shoulder width with your palm facing your torso.","Rotate your wrist so that the palm of your hand is facing forward.","As you breathe in, lower the dumbbell slowly to the side until you feel a stretch in your chest.","Exhale and use your chest muscles to bring the dumbbell back up to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell Decline One Arm Hammer Press","1617-SHUMp5H","triceps","chest",["chest","shoulders"],["Lie on a decline bench with a dumbbell in one hand, resting on your chest.","Extend your arm straight up, keeping your elbow slightly bent.","Lower the dumbbell down towards your shoulder, keeping your elbow close to your body.","Press the dumbbell back up to the starting position.","Repeat for the desired number of repetitions, then switch arms."]],["Dumbbell Decline Shrug","0305-cwsAI4G","traps","shoulders",["shoulders","rhomboids"],["Set up a decline bench at a 45-degree angle.","Lie face down on the bench with your chest and stomach resting against it.","Hold a dumbbell in each hand with your arms fully extended towards the floor.","Keeping your arms straight, raise your shoulders towards your ears as high as possible.","Hold the contraction for a moment, then slowly lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Decline Shrug V. 2","0304-bRlbdjK","traps","shoulders",["shoulders","rhomboids"],["Set up a decline bench at a 45-degree angle.","Lie face down on the bench with your chest and stomach resting on it.","Hold a dumbbell in each hand with your palms facing each other and your arms fully extended.","Keeping your arms straight, raise your shoulders as high as possible while squeezing your shoulder blades together.","Hold the contraction for a brief pause, then lower the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Decline Triceps Extension","0306-OTgkHwR","triceps","shoulders",["shoulders"],["Lie on a decline bench with your head lower than your feet and hold a dumbbell in each hand, palms facing each other.","Extend your arms fully, keeping your elbows close to your head.","Lower the dumbbells slowly behind your head, bending your elbows.","Pause for a moment, then raise the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Decline Twist Fly","0307-reFHapa","pectorals","shoulders",["shoulders","triceps"],["Lie down on a decline bench with your head lower than your hips.","Hold a dumbbell in each hand with your palms facing each other and your arms extended straight up over your chest.","Lower the dumbbells out to the sides in a wide arc until you feel a stretch in your chest.","As you lower the dumbbells, twist your wrists so that your palms face forward at the bottom of the movement.","Reverse the motion and bring the dumbbells back up to the starting position, squeezing your chest muscles at the top.","Repeat for the desired number of repetitions."]],["Dumbbell Finger Curls","1437-mtXengz","forearms","wrist flexors",["wrist flexors","wrist extensors"],["Sit on a bench or chair with your feet flat on the ground and your back straight.","Hold a dumbbell in one hand with an underhand grip, resting your forearm on your thigh, palm facing up.","Allow the dumbbell to roll down to your fingertips, then curl it back up by flexing your fingers.","Repeat for the desired number of repetitions, then switch to the other hand."]],["Dumbbell Fly","0308-yz9nUhF","pectorals","shoulders",["shoulders"],["Lie flat on a bench with a dumbbell in each hand, palms facing each other.","Extend your arms straight up over your chest, with a slight bend in your elbows.","Keeping a slight bend in your elbows, lower your arms out to the sides in a wide arc until you feel a stretch in your chest.","Pause for a moment, then reverse the movement and bring the dumbbells back up to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Fly On Exercise Ball","1277-Lt3iWnf","pectorals","shoulders",["shoulders","triceps"],["Sit on an exercise ball and hold a dumbbell in each hand.","Walk your feet forward and roll your body down until your head, neck, and upper back are supported by the ball.","Extend your arms straight up above your chest, palms facing each other.","Bend your elbows slightly and lower your arms out to the sides in a wide arc until you feel a stretch in your chest.","Pause for a moment, then reverse the movement and squeeze your chest muscles as you bring the dumbbells back to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Forward Lunge Triceps Extension","1732-XalXcvM","triceps","shoulders",["shoulders","core"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand.","Take a step forward with your right foot, lowering your body into a lunge position.","Keep your back straight and your chest up.","Extend your arms straight overhead, keeping your elbows close to your ears.","Lower the dumbbells behind your head by bending your elbows.","Pause for a moment, then straighten your arms to return to the starting position.","Repeat the movement for the desired number of repetitions, then switch legs and repeat."]],["Dumbbell Front Raise","0310-3eGE2JC","delts","biceps",["biceps","trapezius"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand with your palms facing your thighs.","Keeping your arms straight, exhale and lift the dumbbells in front of you until they are at shoulder level.","Pause for a moment at the top, then inhale and slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Front Raise V. 2","0309-Rr7S3yg","delts","trapezius",["trapezius","biceps"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand with your palms facing your thighs.","Keep your back straight and engage your core.","Slowly lift the dumbbells in front of you, with your arms straight, until they are at shoulder level.","Pause for a moment at the top, then slowly lower the dumbbells back down to the starting position.","Repeat for the desired number of repetitions."]],["Dumbbell Full Can Lateral Raise","0311-AQ0mC4Y","delts","traps",["traps","rotator cuff"],["Stand with your feet shoulder-width apart, holding a dumbbell in each hand with your palms facing your body.","Keep your back straight and engage your core.","Raise your arms out to the sides, keeping a slight bend in your elbows, until they are parallel to the g
